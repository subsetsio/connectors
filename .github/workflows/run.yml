name: Run Connector
run-name: "${{ inputs.slug }} :: ${{ inputs.run_id }}"

on:
  workflow_dispatch:
    inputs:
      slug:
        description: Connector directory under the repo root
        required: true
        type: string
      run_id:
        description: Harness run id (groups self-retrigger continuations)
        required: false
        type: string
      dag_target:
        description: Restrict the DAG to this node kind (e.g. transform)
        required: false
        type: string
      dag_on_failure:
        description: "crash | continue"
        required: false
        type: string
        default: continue

concurrency:
  group: run-${{ inputs.slug }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Install connector system packages (opt-in)
        working-directory: src/${{ inputs.slug }}
        run: |
          # A connector that needs OS-level tools (e.g. mdbtools for MS Access)
          # ships an apt-packages.txt; absent file = no-op for every other connector.
          if [ -f apt-packages.txt ]; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq $(grep -vE '^\s*#|^\s*$' apt-packages.txt)
          fi
      - name: Install connector dependencies
        working-directory: src/${{ inputs.slug }}
        # Deliberately secret-free: dependency resolution/builds can execute
        # connector-controlled code (build hooks), so nothing sensitive may be
        # in this step's environment.
        run: uv sync
      - name: Run connector
        id: run
        working-directory: src/${{ inputs.slug }}
        run: uv run --no-sync python -m subsets_utils.runner
        env:
          PYTHONUNBUFFERED: "1"
          CI: "true"
          # Capture http/data/run/state CSVs into LOG_DIR (evacuated to R2
          # with the rest of the logs). Opt-in flag, default-on for cloud runs.
          ENABLE_LOGGING: "true"
          CONNECTOR_NAME: ${{ inputs.slug }}
          RUN_ID: ${{ inputs.run_id }}
          DAG_TARGET: ${{ inputs.dag_target }}
          DAG_ON_FAILURE: ${{ inputs.dag_on_failure }}
          # Single-repo: every Actions secret arrives as one JSON blob, but it
          # is consumed by the TRUSTED supervisor (subsets_utils.runner) only.
          # The supervisor scrubs every blob key from the connector subprocess
          # environment and re-injects just the R2 storage credential plus the
          # connector's own CONN_<SLUG>_* secrets (de-prefixed) — so
          # model-authored code never sees GH_RETRIGGER_PAT or other
          # connectors' keys. Secret names are managed by the harness secret
          # sync (hardened/secrets.py).
          HARNESS_SECRETS: ${{ toJSON(secrets) }}
      - name: Fallback retrigger (continuation hand-off failed in-process)
        # Fires only when the runner wanted a successor but could not confirm
        # one (exit 2 + retrigger_needed): a second, independent dispatch path
        # so a transient API failure inside the leg can't kill the chain.
        # The poller's continuation-lost detection remains the last resort.
        if: ${{ failure() && steps.run.outputs.retrigger_needed == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_RETRIGGER_PAT }}
          SLUG: ${{ inputs.slug }}
          RESOLVED_RUN_ID: ${{ steps.run.outputs.resolved_run_id }}
          DAG_TARGET: ${{ inputs.dag_target }}
          DAG_ON_FAILURE: ${{ inputs.dag_on_failure }}
        run: |
          set -e
          args=(-f "slug=$SLUG" -f "run_id=$RESOLVED_RUN_ID")
          [ -n "$DAG_TARGET" ] && args+=(-f "dag_target=$DAG_TARGET")
          [ -n "$DAG_ON_FAILURE" ] && args+=(-f "dag_on_failure=$DAG_ON_FAILURE")
          for i in 1 2 3; do
            if gh workflow run run.yml --repo "$GITHUB_REPOSITORY" "${args[@]}"; then
              echo "Fallback retrigger dispatched (attempt $i)"
              exit 0
            fi
            sleep $((i * 10))
          done
          echo "Fallback retrigger failed after 3 attempts" >&2
          exit 1
