# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-front-variation`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [end_date, glacier_name, glacier_id, series_id, country]
temporal: end_date
checks:
  - kind: unique
    columns: [end_date, glacier_name, glacier_id, series_id, country]
  - kind: not_null
    col: end_date
  - kind: not_null
    col: glacier_name
  - kind: not_null
    col: glacier_id
  - kind: not_null
    col: series_id
  - kind: not_null
    col: country
  - kind: row_floor
    min: 25062
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
