# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-change`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, end_date, begin_date, country, end_date_unc]
temporal: begin_date
checks:
  - kind: unique
    columns: [id, end_date, begin_date, country, end_date_unc]
  - kind: not_null
    col: id
  - kind: not_null
    col: end_date
  - kind: not_null
    col: begin_date
  - kind: not_null
    col: country
  - kind: not_null
    col: end_date_unc
  - kind: row_floor
    min: 572641
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
