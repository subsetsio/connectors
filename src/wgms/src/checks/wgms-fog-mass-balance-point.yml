# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-mass-balance-point`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, begin_date, end_date, glacier_name, glacier_id]
temporal: begin_date
checks:
  - kind: unique
    columns: [id, begin_date, end_date, glacier_name, glacier_id]
  - kind: not_null
    col: id
  - kind: not_null
    col: begin_date
  - kind: not_null
    col: end_date
  - kind: not_null
    col: glacier_name
  - kind: not_null
    col: glacier_id
  - kind: row_floor
    min: 36630
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
