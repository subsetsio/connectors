# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-mass-balance-band`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lower_elevation, upper_elevation, glacier_name, glacier_id, year]
temporal: year
checks:
  - kind: unique
    columns: [lower_elevation, upper_elevation, glacier_name, glacier_id, year]
  - kind: not_null
    col: lower_elevation
  - kind: not_null
    col: upper_elevation
  - kind: not_null
    col: glacier_name
  - kind: not_null
    col: glacier_id
  - kind: not_null
    col: year
  - kind: row_floor
    min: 24871
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
