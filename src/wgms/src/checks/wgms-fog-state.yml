# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-state`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, glacier_name, glacier_id, date, date_unc]
temporal: date
checks:
  - kind: unique
    columns: [id, glacier_name, glacier_id, date, date_unc]
  - kind: not_null
    col: id
  - kind: not_null
    col: glacier_name
  - kind: not_null
    col: glacier_id
  - kind: not_null
    col: date
  - kind: not_null
    col: date_unc
  - kind: row_floor
    min: 5739
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
