# compiled by `hardened compile-checks` — post-publish audit of `wgms-amce-region`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [area_km2, gt_sigma, gt, mwe, mwe_sigma]
temporal: year
checks:
  - kind: unique
    columns: [area_km2, gt_sigma, gt, mwe, mwe_sigma]
  - kind: not_null
    col: area_km2
  - kind: not_null
    col: gt_sigma
  - kind: not_null
    col: gt
  - kind: not_null
    col: mwe
  - kind: not_null
    col: mwe_sigma
  - kind: row_floor
    min: 698
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
