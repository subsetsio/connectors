# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-change-band`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [change_id, upper_elevation, lower_elevation, country]
checks:
  - kind: unique
    columns: [change_id, upper_elevation, lower_elevation, country]
  - kind: not_null
    col: change_id
  - kind: not_null
    col: upper_elevation
  - kind: not_null
    col: lower_elevation
  - kind: not_null
    col: country
  - kind: row_floor
    min: 14190
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
