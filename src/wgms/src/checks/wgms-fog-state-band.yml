# compiled by `hardened compile-checks` — post-publish audit of `wgms-fog-state-band`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [area, lower_elevation, upper_elevation, state_id, glacier_name]
checks:
  - kind: unique
    columns: [area, lower_elevation, upper_elevation, state_id, glacier_name]
  - kind: not_null
    col: area
  - kind: not_null
    col: lower_elevation
  - kind: not_null
    col: upper_elevation
  - kind: not_null
    col: state_id
  - kind: not_null
    col: glacier_name
  - kind: row_floor
    min: 1976
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
