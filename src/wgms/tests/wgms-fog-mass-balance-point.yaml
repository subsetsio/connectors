spec_id: wgms-fog-mass-balance-point
status: active
tests:
  - row_count: {min: 70000}
    reason: mass_balance_point contains point measurements for many glaciers and years in the current FoG release.
    certainty: 85
  - not_null: glacier_id
  - not_null: year
  - freshness: {col: year, reaches: 2024}
    reason: the current FoG release covers annual mass-balance observations through 2024.
    certainty: 85
    points_outward: true
