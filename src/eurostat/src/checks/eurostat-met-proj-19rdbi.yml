# compiled by `hardened compile-checks` — post-publish audit of `eurostat-met-proj-19rdbi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, projection, indic_de, unit, metroreg, time_period]
checks:
  - kind: unique
    columns: [freq, projection, indic_de, unit, metroreg, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: projection
  - kind: not_null
    col: indic_de
  - kind: not_null
    col: unit
  - kind: not_null
    col: metroreg
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 67650
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
