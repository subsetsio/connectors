# compiled by `hardened compile-checks` — post-publish audit of `eurostat-lfsq-epgana`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, age, sex, nace_r1, worktime, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, age, sex, nace_r1, worktime, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: not_null
    col: nace_r1
  - kind: not_null
    col: worktime
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2890860
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
