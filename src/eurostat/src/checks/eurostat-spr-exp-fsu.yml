# compiled by `hardened compile-checks` — post-publish audit of `eurostat-spr-exp-fsu`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, spscheme, spdep, spdepm, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, spscheme, spdep, spdepm, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: spscheme
  - kind: not_null
    col: spdep
  - kind: not_null
    col: spdepm
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 186487
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
