# compiled by `hardened compile-checks` — post-publish audit of `eurostat-iss-21gvcsg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, gd_serv, indic_sb, bus_part, locpart, nace_r2, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, gd_serv, indic_sb, bus_part, locpart, nace_r2, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: gd_serv
  - kind: not_null
    col: indic_sb
  - kind: not_null
    col: bus_part
  - kind: not_null
    col: locpart
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2450
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
