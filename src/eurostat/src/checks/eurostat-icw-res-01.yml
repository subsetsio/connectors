# compiled by `hardened compile-checks` — post-publish audit of `eurostat-icw-res-01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, quant_inc, quant_expn, quant_wlth, indic_ewb, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, quant_inc, quant_expn, quant_wlth, indic_ewb, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: quant_inc
  - kind: not_null
    col: quant_expn
  - kind: not_null
    col: quant_wlth
  - kind: not_null
    col: indic_ewb
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 65768
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
