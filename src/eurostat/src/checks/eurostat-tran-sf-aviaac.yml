# compiled by `hardened compile-checks` — post-publish audit of `eurostat-tran-sf-aviaac`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, airc_cat, tra_oper, c_regis, geo, accident, time_period]
checks:
  - kind: unique
    columns: [freq, unit, airc_cat, tra_oper, c_regis, geo, accident, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: airc_cat
  - kind: not_null
    col: tra_oper
  - kind: not_null
    col: c_regis
  - kind: not_null
    col: geo
  - kind: not_null
    col: accident
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 297144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
