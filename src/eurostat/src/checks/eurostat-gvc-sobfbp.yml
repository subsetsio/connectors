# compiled by `hardened compile-checks` — post-publish audit of `eurostat-gvc-sobfbp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, bus_func, bus_part, indic_sbs, geo, time_period]
checks:
  - kind: unique
    columns: [freq, bus_func, bus_part, indic_sbs, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: bus_func
  - kind: not_null
    col: bus_part
  - kind: not_null
    col: indic_sbs
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 396
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
