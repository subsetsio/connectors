# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ef-lus-org`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, statinfo, so_eur, uaarea, agriprod, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, statinfo, so_eur, uaarea, agriprod, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: so_eur
  - kind: not_null
    col: uaarea
  - kind: not_null
    col: agriprod
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2027200
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
