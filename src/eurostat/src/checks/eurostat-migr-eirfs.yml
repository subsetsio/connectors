# compiled by `hardened compile-checks` — post-publish audit of `eurostat-migr-eirfs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, border, unit, reason, citizen, geo, time_period]
checks:
  - kind: unique
    columns: [freq, border, unit, reason, citizen, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: border
  - kind: not_null
    col: unit
  - kind: not_null
    col: reason
  - kind: not_null
    col: citizen
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 1790638
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
