# compiled by `hardened compile-checks` — post-publish audit of `eurostat-avia-if-typ`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, tra_infr, rep_airp, time_period]
checks:
  - kind: unique
    columns: [freq, tra_infr, rep_airp, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: tra_infr
  - kind: not_null
    col: rep_airp
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 10202
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
