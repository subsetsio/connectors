# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ilc-pw05b`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, lev_satis, life_sat, isced11, sex, age, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, lev_satis, life_sat, isced11, sex, age, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: lev_satis
  - kind: not_null
    col: life_sat
  - kind: not_null
    col: isced11
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 107514
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
