# compiled by `hardened compile-checks` — post-publish audit of `eurostat-edat-aes-l33`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, age, unit, isced11, lev_know, geo, time_period]
checks:
  - kind: unique
    columns: [freq, age, unit, isced11, lev_know, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: age
  - kind: not_null
    col: unit
  - kind: not_null
    col: isced11
  - kind: not_null
    col: lev_know
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2428
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
