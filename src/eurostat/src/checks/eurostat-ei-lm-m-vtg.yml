# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ei-lm-m-vtg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, s_adj, sex, age, geo, revdate, time_period]
temporal: revdate
checks:
  - kind: unique
    columns: [freq, unit, s_adj, sex, age, geo, revdate, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: s_adj
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: geo
  - kind: not_null
    col: revdate
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 790017
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
