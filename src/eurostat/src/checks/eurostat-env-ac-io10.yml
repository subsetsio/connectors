# compiled by `hardened compile-checks` — post-publish audit of `eurostat-env-ac-io10`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, airpol, cpa08, ind_acct, origin, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, airpol, cpa08, ind_acct, origin, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: airpol
  - kind: not_null
    col: cpa08
  - kind: not_null
    col: ind_acct
  - kind: not_null
    col: origin
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 590940
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
