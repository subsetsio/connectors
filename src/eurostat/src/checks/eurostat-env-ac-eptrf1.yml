# compiled by `hardened compile-checks` — post-publish audit of `eurostat-env-ac-eptrf1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, ceparema, sector, env_econ, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, ceparema, sector, env_econ, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: ceparema
  - kind: not_null
    col: sector
  - kind: not_null
    col: env_econ
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 18312
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
