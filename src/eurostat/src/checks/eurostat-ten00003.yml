# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ten00003`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, wat_proc, wat_src, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, wat_proc, wat_src, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: wat_proc
  - kind: not_null
    col: wat_src
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 481
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
