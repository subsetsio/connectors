# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ef-rd-leg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, leg_form, so_eur, ruraldev, statinfo, farmtype, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, leg_form, so_eur, ruraldev, statinfo, farmtype, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: leg_form
  - kind: not_null
    col: so_eur
  - kind: not_null
    col: ruraldev
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: farmtype
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 1319521
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
