# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ilc-pw02b`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, life_sat, statinfo, deg_urb, hhcomp, quant_inc, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, life_sat, statinfo, deg_urb, hhcomp, quant_inc, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: life_sat
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: deg_urb
  - kind: not_null
    col: hhcomp
  - kind: not_null
    col: quant_inc
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 38592
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
