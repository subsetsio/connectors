    columns: [freq, nrg_src, age, yn_arope, sex, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: nrg_src
  - kind: not_null
    col: age
  - kind: not_null
    col: yn_arope
  - kind: not_null
    col: sex
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 8820
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
