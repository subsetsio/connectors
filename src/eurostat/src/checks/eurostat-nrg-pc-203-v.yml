# compiled by `hardened compile-checks` — post-publish audit of `eurostat-nrg-pc-203-v`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, nrg_cons, siec, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, nrg_cons, siec, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: nrg_cons
  - kind: not_null
    col: siec
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 805
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
