    columns: [freq, hhcomp, rskpovth, lev_bur, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: hhcomp
  - kind: not_null
    col: rskpovth
  - kind: not_null
    col: lev_bur
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 51561
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
