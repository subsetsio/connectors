# compiled by `hardened compile-checks` — post-publish audit of `eurostat-gvc-sobfga`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, partner, bus_func, indic_sbs, geo, time_period]
checks:
  - kind: unique
    columns: [freq, partner, bus_func, indic_sbs, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: partner
  - kind: not_null
    col: bus_func
  - kind: not_null
    col: indic_sbs
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 1518
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
