# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ilc-di30a`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, trans1y, quantile, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, trans1y, quantile, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: trans1y
  - kind: not_null
    col: quantile
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 20157
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
