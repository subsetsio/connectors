# compiled by `hardened compile-checks` — post-publish audit of `eurostat-apri-pi15-outq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, p_adj, unit, product, geo, time_period]
checks:
  - kind: unique
    columns: [freq, p_adj, unit, product, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: p_adj
  - kind: not_null
    col: unit
  - kind: not_null
    col: product
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 103549
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
