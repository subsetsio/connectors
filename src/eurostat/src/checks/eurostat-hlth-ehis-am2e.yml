# compiled by `hardened compile-checks` — post-publish audit of `eurostat-hlth-ehis-am2e`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, n_contact, isco08, isced11, sex, age, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, n_contact, isco08, isced11, sex, age, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: n_contact
  - kind: not_null
    col: isco08
  - kind: not_null
    col: isced11
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 58680
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
