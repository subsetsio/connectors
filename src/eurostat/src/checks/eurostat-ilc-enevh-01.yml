# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ilc-enevh-01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, tenure, building, yn_arope, yes_no, age, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, tenure, building, yn_arope, yes_no, age, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: tenure
  - kind: not_null
    col: building
  - kind: not_null
    col: yn_arope
  - kind: not_null
    col: yes_no
  - kind: not_null
    col: age
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 5346
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
