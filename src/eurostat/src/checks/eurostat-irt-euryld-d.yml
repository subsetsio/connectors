# compiled by `hardened compile-checks` — post-publish audit of `eurostat-irt-euryld-d`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, yld_curv, maturity, bonds, geo, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, yld_curv, maturity, bonds, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: yld_curv
  - kind: not_null
    col: maturity
  - kind: not_null
    col: bonds
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 5975066
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
