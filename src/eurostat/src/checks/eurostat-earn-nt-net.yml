# compiled by `hardened compile-checks` — post-publish audit of `eurostat-earn-nt-net`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, currency, estruct, ecase, geo, time_period]
checks:
  - kind: unique
    columns: [freq, currency, estruct, ecase, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: currency
  - kind: not_null
    col: estruct
  - kind: not_null
    col: ecase
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 99993
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
