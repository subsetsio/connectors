# compiled by `hardened compile-checks` — post-publish audit of `eurostat-iww-go-anave`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, natvessr, tra_cov, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, natvessr, tra_cov, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: natvessr
  - kind: not_null
    col: tra_cov
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 45866
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
