# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ef-ah-poult`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, statinfo, farmtype, lsu, yn_acs, animals, hous_ani, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, statinfo, farmtype, lsu, yn_acs, animals, hous_ani, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: farmtype
  - kind: not_null
    col: lsu
  - kind: not_null
    col: yn_acs
  - kind: not_null
    col: animals
  - kind: not_null
    col: hous_ani
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 165313
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
