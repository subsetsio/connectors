# compiled by `hardened compile-checks` — post-publish audit of `eurostat-iww-go-atyvefl`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, c_unload, c_load, vessel, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, c_unload, c_load, vessel, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: c_unload
  - kind: not_null
    col: c_load
  - kind: not_null
    col: vessel
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 988162
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
