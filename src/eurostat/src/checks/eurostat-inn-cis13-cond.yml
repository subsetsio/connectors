# compiled by `hardened compile-checks` — post-publish audit of `eurostat-inn-cis13-cond`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, nace_r2, sizeclas, unit, lev_impt, enterpr, reason, geo, time_period]
checks:
  - kind: unique
    columns: [freq, nace_r2, sizeclas, unit, lev_impt, enterpr, reason, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: sizeclas
  - kind: not_null
    col: unit
  - kind: not_null
    col: lev_impt
  - kind: not_null
    col: enterpr
  - kind: not_null
    col: reason
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 72470
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
