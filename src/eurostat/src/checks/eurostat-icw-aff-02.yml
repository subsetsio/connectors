# compiled by `hardened compile-checks` — post-publish audit of `eurostat-icw-aff-02`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, lev_expn, lev_depr, yn_rskpov, coicop, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, lev_expn, lev_depr, yn_rskpov, coicop, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: lev_expn
  - kind: not_null
    col: lev_depr
  - kind: not_null
    col: yn_rskpov
  - kind: not_null
    col: coicop
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 30237
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
