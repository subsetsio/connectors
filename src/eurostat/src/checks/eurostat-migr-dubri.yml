# compiled by `hardened compile-checks` — post-publish audit of `eurostat-migr-dubri`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, request, leg_prov, partner, applicant, sex, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, request, leg_prov, partner, applicant, sex, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: request
  - kind: not_null
    col: leg_prov
  - kind: not_null
    col: partner
  - kind: not_null
    col: applicant
  - kind: not_null
    col: sex
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 4200422
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
