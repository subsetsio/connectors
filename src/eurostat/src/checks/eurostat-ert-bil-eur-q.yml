# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ert-bil-eur-q`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, statinfo, unit, currency, time_period]
checks:
  - kind: unique
    columns: [freq, statinfo, unit, currency, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: unit
  - kind: not_null
    col: currency
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 5303
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
