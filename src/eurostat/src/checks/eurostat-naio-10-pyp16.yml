# compiled by `hardened compile-checks` — post-publish audit of `eurostat-naio-10-pyp16`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, stk_flow, ind_use, prd_ava, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, stk_flow, ind_use, prd_ava, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: stk_flow
  - kind: not_null
    col: ind_use
  - kind: not_null
    col: prd_ava
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2585910
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
