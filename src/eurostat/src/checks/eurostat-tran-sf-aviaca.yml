# compiled by `hardened compile-checks` — post-publish audit of `eurostat-tran-sf-aviaca`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, victim, c_regis, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, victim, c_regis, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: victim
  - kind: not_null
    col: c_regis
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 62026
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
