# compiled by `hardened compile-checks` — post-publish audit of `eurostat-road-go-ta-dctg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, nst07, distance, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, nst07, distance, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: nst07
  - kind: not_null
    col: distance
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 171464
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
