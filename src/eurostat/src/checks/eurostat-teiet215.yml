# compiled by `hardened compile-checks` — post-publish audit of `eurostat-teiet215`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, stk_flow, indic_et, partner, bclas_bec, geo, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, stk_flow, indic_et, partner, bclas_bec, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: stk_flow
  - kind: not_null
    col: indic_et
  - kind: not_null
    col: partner
  - kind: not_null
    col: bclas_bec
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 174
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
