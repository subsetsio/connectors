# compiled by `hardened compile-checks` — post-publish audit of `eurostat-inn-cis13-coop`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, locpart, unit, coop_ptn, sizeclas, nace_r2, geo, time_period]
checks:
  - kind: unique
    columns: [freq, locpart, unit, coop_ptn, sizeclas, nace_r2, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: locpart
  - kind: not_null
    col: unit
  - kind: not_null
    col: coop_ptn
  - kind: not_null
    col: sizeclas
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 127769
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
