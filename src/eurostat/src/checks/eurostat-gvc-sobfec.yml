# compiled by `hardened compile-checks` — post-publish audit of `eurostat-gvc-sobfec`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, src_act, size_emp, nace_r2, indic_sbs, geo, time_period]
checks:
  - kind: unique
    columns: [freq, src_act, size_emp, nace_r2, indic_sbs, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: src_act
  - kind: not_null
    col: size_emp
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: indic_sbs
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 792
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
