# compiled by `hardened compile-checks` — post-publish audit of `eurostat-rail-if-lvlcros`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, lvlcros, geo, unit, time_period]
checks:
  - kind: unique
    columns: [freq, lvlcros, geo, unit, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: lvlcros
  - kind: not_null
    col: geo
  - kind: not_null
    col: unit
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 694
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
