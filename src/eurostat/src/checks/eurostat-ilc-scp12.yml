# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ilc-scp12`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, frequenc, pers_cat, deg_urb, hhcomp, quant_inc, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, frequenc, pers_cat, deg_urb, hhcomp, quant_inc, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: frequenc
  - kind: not_null
    col: pers_cat
  - kind: not_null
    col: deg_urb
  - kind: not_null
    col: hhcomp
  - kind: not_null
    col: quant_inc
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 86688
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
