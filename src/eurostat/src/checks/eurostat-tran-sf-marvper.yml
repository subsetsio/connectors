# compiled by `hardened compile-checks` — post-publish audit of `eurostat-tran-sf-marvper`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, pers_cat, victim, seabasin, c_regis, time_period]
checks:
  - kind: unique
    columns: [freq, unit, pers_cat, victim, seabasin, c_regis, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: pers_cat
  - kind: not_null
    col: victim
  - kind: not_null
    col: seabasin
  - kind: not_null
    col: c_regis
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 1334
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
