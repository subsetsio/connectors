# compiled by `hardened compile-checks` — post-publish audit of `eurostat-hlth-ehis-pe9i`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, unit, physact, quant_inc, sex, age, geo, time_period]
checks:
  - kind: unique
    columns: [freq, unit, physact, quant_inc, sex, age, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit
  - kind: not_null
    col: physact
  - kind: not_null
    col: quant_inc
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 29808
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
