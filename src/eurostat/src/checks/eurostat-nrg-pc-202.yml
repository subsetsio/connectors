# compiled by `hardened compile-checks` — post-publish audit of `eurostat-nrg-pc-202`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, siec, nrg_cons, unit, tax, currency, geo, time_period]
checks:
  - kind: unique
    columns: [freq, siec, nrg_cons, unit, tax, currency, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: siec
  - kind: not_null
    col: nrg_cons
  - kind: not_null
    col: unit
  - kind: not_null
    col: tax
  - kind: not_null
    col: currency
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 30398
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
