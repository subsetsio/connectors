# compiled by `hardened compile-checks` — post-publish audit of `eurostat-hlth-nrdc3c`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, icd10, age, hospcare, sex, c_resid, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, icd10, age, hospcare, sex, c_resid, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: icd10
  - kind: not_null
    col: age
  - kind: not_null
    col: hospcare
  - kind: not_null
    col: sex
  - kind: not_null
    col: c_resid
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 104
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
