# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ef-mp-mach`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, uaarea, farmtype, owner, statinfo, agr_inp, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, uaarea, farmtype, owner, statinfo, agr_inp, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: uaarea
  - kind: not_null
    col: farmtype
  - kind: not_null
    col: owner
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: agr_inp
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 890539
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
