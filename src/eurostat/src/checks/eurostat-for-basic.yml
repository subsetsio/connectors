# compiled by `hardened compile-checks` — post-publish audit of `eurostat-for-basic`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, prod_wd, treespec, stk_flow, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, prod_wd, treespec, stk_flow, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: prod_wd
  - kind: not_null
    col: treespec
  - kind: not_null
    col: stk_flow
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 72168
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
