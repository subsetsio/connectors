# compiled by `hardened compile-checks` — post-publish audit of `eurostat-tps00083`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, indic_sp, spdeps, spfunc, geo, time_period]
checks:
  - kind: unique
    columns: [freq, indic_sp, spdeps, spfunc, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: indic_sp
  - kind: not_null
    col: spdeps
  - kind: not_null
    col: spfunc
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2040
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
