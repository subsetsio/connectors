# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ef-lf-fam-sh`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, statinfo, fam_farm, unit, geo, time_period]
checks:
  - kind: unique
    columns: [freq, statinfo, fam_farm, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: statinfo
  - kind: not_null
    col: fam_farm
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 1943
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
