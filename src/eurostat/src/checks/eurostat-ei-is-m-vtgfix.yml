# compiled by `hardened compile-checks` — post-publish audit of `eurostat-ei-is-m-vtgfix`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, revdate, s_adj, nace_r2, unit, geo, time_period]
temporal: revdate
checks:
  - kind: unique
    columns: [freq, revdate, s_adj, nace_r2, unit, geo, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: revdate
  - kind: not_null
    col: s_adj
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: unit
  - kind: not_null
    col: geo
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2251249
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
