# compiled by `hardened compile-checks` — post-publish audit of `instituto-nacional-de-estad-sticas-df-tmici-sexo`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, area_ref, sexo, time_period, unidad]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, area_ref, sexo, time_period, unidad]
  - kind: not_null
    col: freq
  - kind: not_null
    col: area_ref
  - kind: not_null
    col: sexo
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unidad
  - kind: row_floor
    min: 102
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
