# compiled by `hardened compile-checks` — post-publish audit of `ecdc-salm-current-fwd-amr-yearly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [population, region_name, region_code, time, indicator]
temporal: time
checks:
  - kind: unique
    columns: [population, region_name, region_code, time, indicator]
  - kind: not_null
    col: population
  - kind: not_null
    col: region_name
  - kind: not_null
    col: region_code
  - kind: not_null
    col: time
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 146758
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
