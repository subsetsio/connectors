# compiled by `hardened compile-checks` — post-publish audit of `rbnz-m1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, indicator_label, sheet, file_stem, value]
temporal: date
checks:
  - kind: unique
    columns: [date, indicator_label, sheet, file_stem, value]
  - kind: not_null
    col: date
  - kind: not_null
    col: indicator_label
  - kind: not_null
    col: sheet
  - kind: not_null
    col: file_stem
  - kind: not_null
    col: value
  - kind: row_floor
    min: 3383
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
