# compiled by `hardened compile-checks` — post-publish audit of `rbnz-b13`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, series_name, indicator_label, file_stem]
temporal: date
checks:
  - kind: unique
    columns: [date, series_name, indicator_label, file_stem]
  - kind: not_null
    col: date
  - kind: not_null
    col: series_name
  - kind: not_null
    col: indicator_label
  - kind: not_null
    col: file_stem
  - kind: row_floor
    min: 369
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
