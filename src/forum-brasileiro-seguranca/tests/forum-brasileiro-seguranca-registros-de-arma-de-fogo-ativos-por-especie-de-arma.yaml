spec_id: forum-brasileiro-seguranca-registros-de-arma-de-fogo-ativos-por-especie-de-arma
status: active
tests:
  - not_null: geography
    reason: every row is anchored to a Brazilian geography (Brasil/region/UF)
    certainty: 95
  - not_null: year
    certainty: 95
  - column_type: {col: year, type: integer}
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 90
  - between: {col: year, lo: 1995, hi: current_year()}
    reason: Anuario tables report annual series within the modern data era
    certainty: 85
    points_outward: true
    severity: warn
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
  - freshness: {col: year, reaches: 2024}
    reason: the 2025 Anuario Brasileiro de Seguranca Publica workbook primarily reports annual indicators through 2024
    certainty: 85
    points_outward: true
  - distinct_count: {col: geography, min: 5}
    reason: a geography-by-year cross-tab covers multiple places; <5 geographies means the parser stopped early
    certainty: 75
  - row_count: {min: 10}
    reason: geography x years x measures should produce multiple long rows per table
    certainty: 75
