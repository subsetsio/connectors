spec_id: forum-brasileiro-seguranca-obitos-decorrentes-de-acidentes-do-trabalho-atividades-selecionadas
status: active
tests:
  - not_null: geography
    reason: every row is anchored to a Brazilian geography (Brasil/region/UF)
    certainty: 95
  - not_null: year
    certainty: 95
  - column_type: {col: year, type: integer}
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 90
  - between: {col: year, lo: 1995, hi: current_year()}
    reason: Anuario tables report annual series within the modern data era
    certainty: 85
    points_outward: true
    severity: warn
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
  - freshness: {col: year, reaches: 2023}
    reason: this workbook table is sourced from school/director or occupational datasets whose latest included year is 2023
    certainty: 85
    points_outward: true
  - distinct_count: {col: geography, min: 3}
    reason: this table is a narrow national, regional, or category series rather than a full UF cross-tab
    certainty: 75
  - row_count: {min: 10}
    reason: geography x years x measures should produce multiple long rows per table
    certainty: 75
