# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-numero-de-adolescentes-apreendidos-em-flagrante-e-por-mandado-judicial`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geography, measure, year, geo_level]
temporal: year
checks:
  - kind: unique
    columns: [geography, measure, year, geo_level]
  - kind: not_null
    col: geography
  - kind: not_null
    col: measure
  - kind: not_null
    col: year
  - kind: not_null
    col: geo_level
  - kind: row_floor
    min: 243
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
