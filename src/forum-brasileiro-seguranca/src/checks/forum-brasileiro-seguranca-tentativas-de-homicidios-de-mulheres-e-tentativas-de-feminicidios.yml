# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-tentativas-de-homicidios-de-mulheres-e-tentativas-de-feminicidios`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geography, geo_level, year, measure, value]
temporal: year
checks:
  - kind: unique
    columns: [geography, geo_level, year, measure, value]
  - kind: not_null
    col: geography
  - kind: not_null
    col: geo_level
  - kind: not_null
    col: year
  - kind: not_null
    col: measure
  - kind: not_null
    col: value
  - kind: row_floor
    min: 168
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
