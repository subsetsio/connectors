# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-penalidades-aplicadas-pela-policia-federal-a-estabelecimentos-de-segur`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measure, geography, year]
temporal: year
checks:
  - kind: unique
    columns: [measure, geography, year]
  - kind: not_null
    col: measure
  - kind: not_null
    col: geography
  - kind: not_null
    col: year
  - kind: row_floor
    min: 10
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
