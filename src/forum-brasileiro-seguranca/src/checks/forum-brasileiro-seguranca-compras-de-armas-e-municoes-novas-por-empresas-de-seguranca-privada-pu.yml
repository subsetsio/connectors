# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-compras-de-armas-e-municoes-novas-por-empresas-de-seguranca-privada-pu`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, geography, measure, geo_level]
temporal: year
checks:
  - kind: unique
    columns: [year, geography, measure, geo_level]
  - kind: not_null
    col: year
  - kind: not_null
    col: geography
  - kind: not_null
    col: measure
  - kind: not_null
    col: geo_level
  - kind: row_floor
    min: 83
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
