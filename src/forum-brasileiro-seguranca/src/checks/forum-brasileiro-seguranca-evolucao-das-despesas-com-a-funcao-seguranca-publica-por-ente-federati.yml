# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-evolucao-das-despesas-com-a-funcao-seguranca-publica-por-ente-federati`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geography, year, measure]
temporal: year
checks:
  - kind: unique
    columns: [geography, year, measure]
  - kind: not_null
    col: geography
  - kind: not_null
    col: year
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 8
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
