# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-obitos-decorrentes-de-acidentes-do-trabalho-atividades-selecionadas`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, geography, measure]
temporal: year
checks:
  - kind: unique
    columns: [year, geography, measure]
  - kind: not_null
    col: year
  - kind: not_null
    col: geography
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 7
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
