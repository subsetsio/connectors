# compiled by `hardened compile-checks` — post-publish audit of `forum-brasileiro-seguranca-medidas-protetivas-de-urgencia-distribuidas-e-concedidas-pelos-tribuna-t52`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measure, geography, geo_level, year]
temporal: year
checks:
  - kind: unique
    columns: [measure, geography, geo_level, year]
  - kind: not_null
    col: measure
  - kind: not_null
    col: geography
  - kind: not_null
    col: geo_level
  - kind: not_null
    col: year
  - kind: row_floor
    min: 121
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
