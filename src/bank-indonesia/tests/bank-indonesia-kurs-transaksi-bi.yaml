spec_id: bank-indonesia-kurs-transaksi-bi
status: active
tests:
  - not_null: date
    reason: every BI transaction-rate row is dated; tgl_subkurslokal is the series key
    certainty: 95
  - not_null: currency
    reason: each row is one foreign currency vs IDR; mts_subkurslokal is always populated
    certainty: 95
  - column_type: {col: date, type: string}
    reason: raw keeps the ISO YYYY-MM-DD string; the transform CASTs to DATE
    certainty: 90
  - unique: [date, currency]
    reason: one buy/sell quote per currency per business day; dupes mean a window was re-pulled without de-dup
    certainty: 90
  - relationship: {left: buy, op: "<=", right: sell}
    reason: BI buys foreign currency below and sells above (beli <= jual) by construction of a bid/ask quote
    certainty: 85
  - at_least: {col: buy, expr: 0}
    reason: exchange rates are strictly positive
    certainty: 95
  - at_least: {col: sell, expr: 0}
    reason: exchange rates are strictly positive
    certainty: 95
  - at_least: {col: unit, expr: 1}
    reason: nil_subkurslokal is the quotation unit (1, 100, ...), always >= 1
    certainty: 90
  - distinct_count: {col: currency, min: 10}
    reason: the Lokal family quotes ~20-30 currencies; far fewer means the currency enumeration broke
    certainty: 80
  - freshness: {col: date, reaches: today - 10d}
    reason: BI publishes transaction rates on business days; latest should be within ~10 days allowing weekends/holidays
    certainty: 70
    points_outward: true
    severity: warn
