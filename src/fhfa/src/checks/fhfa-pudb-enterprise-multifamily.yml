# compiled by `hardened compile-checks` — post-publish audit of `fhfa-pudb-enterprise-multifamily`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [record_num_mf_nf, afford_mf, units_num_cat, tract_income_cat, purpose_mf_nf]
checks:
  - kind: unique
    columns: [record_num_mf_nf, afford_mf, units_num_cat, tract_income_cat, purpose_mf_nf]
  - kind: not_null
    col: record_num_mf_nf
  - kind: not_null
    col: afford_mf
  - kind: not_null
    col: units_num_cat
  - kind: not_null
    col: tract_income_cat
  - kind: not_null
    col: purpose_mf_nf
  - kind: row_floor
    min: 2762
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
