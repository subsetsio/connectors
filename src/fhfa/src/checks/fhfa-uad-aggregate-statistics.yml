# compiled by `hardened compile-checks` — post-publish audit of `fhfa-uad-aggregate-statistics`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source, appraisalsource, seriesid, geolevel, fips, purpose, year, quarter, characteristic1, category1]
temporal: year
checks:
  - kind: unique
    columns: [source, appraisalsource, seriesid, geolevel, fips, purpose, year, quarter, characteristic1, category1]
  - kind: not_null
    col: source
  - kind: not_null
    col: appraisalsource
  - kind: not_null
    col: seriesid
  - kind: not_null
    col: geolevel
  - kind: not_null
    col: fips
  - kind: not_null
    col: purpose
  - kind: not_null
    col: year
  - kind: not_null
    col: quarter
  - kind: not_null
    col: characteristic1
  - kind: not_null
    col: category1
  - kind: row_floor
    min: 3011595
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
