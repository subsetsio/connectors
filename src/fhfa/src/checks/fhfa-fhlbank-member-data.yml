# compiled by `hardened compile-checks` — post-publish audit of `fhfa-fhlbank-member-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fhfa_id, member_name, fed_id, zip, mem_date]
temporal: release_period
checks:
  - kind: unique
    columns: [fhfa_id, member_name, fed_id, zip, mem_date]
  - kind: not_null
    col: fhfa_id
  - kind: not_null
    col: member_name
  - kind: not_null
    col: fed_id
  - kind: not_null
    col: zip
  - kind: not_null
    col: mem_date
  - kind: row_floor
    min: 3163
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
