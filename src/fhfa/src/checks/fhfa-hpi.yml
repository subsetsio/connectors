# compiled by `hardened compile-checks` — post-publish audit of `fhfa-hpi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [hpi_type, hpi_flavor, frequency, level, place_id, yr, period]
temporal: yr
checks:
  - kind: unique
    columns: [hpi_type, hpi_flavor, frequency, level, place_id, yr, period]
  - kind: not_null
    col: hpi_type
  - kind: not_null
    col: hpi_flavor
  - kind: not_null
    col: frequency
  - kind: not_null
    col: level
  - kind: not_null
    col: place_id
  - kind: not_null
    col: yr
  - kind: not_null
    col: period
  - kind: row_floor
    min: 92408
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
