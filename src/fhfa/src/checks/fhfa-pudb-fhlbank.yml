# compiled by `hardened compile-checks` — post-publish audit of `fhfa-pudb-fhlbank`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [loancharacteristicsid, totalmonthlyincomeamount, censustractminorityratiopercent, censustractmedfamincomeamount, loanacquisitionactualupbamt]
temporal: year
checks:
  - kind: unique
    columns: [loancharacteristicsid, totalmonthlyincomeamount, censustractminorityratiopercent, censustractmedfamincomeamount, loanacquisitionactualupbamt]
  - kind: not_null
    col: loancharacteristicsid
  - kind: not_null
    col: totalmonthlyincomeamount
  - kind: not_null
    col: censustractminorityratiopercent
  - kind: not_null
    col: censustractmedfamincomeamount
  - kind: not_null
    col: loanacquisitionactualupbamt
  - kind: row_floor
    min: 23490
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
