# compiled by `hardened compile-checks` — post-publish audit of `fhfa-nmdb-aggregate-statistics`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source, frequency, geolevel, geoid, market, period, seriesid]
temporal: year
checks:
  - kind: unique
    columns: [source, frequency, geolevel, geoid, market, period, seriesid]
  - kind: not_null
    col: source
  - kind: not_null
    col: frequency
  - kind: not_null
    col: geolevel
  - kind: not_null
    col: geoid
  - kind: not_null
    col: market
  - kind: not_null
    col: period
  - kind: not_null
    col: seriesid
  - kind: row_floor
    min: 262774
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
