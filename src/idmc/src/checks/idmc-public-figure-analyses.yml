# compiled by `hardened compile-checks` — post-publish audit of `idmc-public-figure-analyses`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [description, iso3, year, figure_cause_name, figure_category_name]
temporal: year
checks:
  - kind: unique
    columns: [description, iso3, year, figure_cause_name, figure_category_name]
  - kind: not_null
    col: description
  - kind: not_null
    col: iso3
  - kind: not_null
    col: year
  - kind: not_null
    col: figure_cause_name
  - kind: not_null
    col: figure_category_name
  - kind: row_floor
    min: 647
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
