spec_id: idmc-displacements
status: active
tests:
  - row_count: {min: 2000}
    reason: combined GIDD displacement totals cover country-years globally.
    certainty: 90
  - not_null: iso3
  - not_null: year
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 2008, hi: current_year()}
    points_outward: true
    certainty: 95
  - freshness: {col: year, reaches: current_year() - 1}
    points_outward: true
    certainty: 85
  - unique: [iso3, year]
    reason: displacements endpoint is one combined row per country-year.
    certainty: 80
  - column_type: {col: conflict_new_displacement, type: integer}
  - column_type: {col: disaster_new_displacement, type: integer}
