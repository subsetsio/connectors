spec_id: unep-subnational-adm1
status: active
coverage:
  frozen: true
  reason: UNEP GCS object gaul1-all-2018.csv is a fixed 1984-2018 SDG 6.6.1 snapshot; future releases are expected as re-versioned filenames rather than in-place updates.
tests:
  - row_count: {min: 100000}
    reason: first-level administrative regions over 35 annual observations
    certainty: 90
  - not_null: year
  - not_null: adm0_code
  - not_null: adm1_code
  - column_type: {col: year, type: integer}
  - column_type: {col: adm0_code, type: integer}
  - column_type: {col: adm1_code, type: integer}
  - column_type: {col: country_name, type: string}
  - column_type: {col: region_name, type: string}
  - column_type: {col: permanent_sq_km, type: float}
  - column_type: {col: seasonal_sq_km, type: float}
  - between: {col: year, lo: 1984, hi: 2018}
    reason: published 2018 vintage covers annual observations from 1984 through 2018
    certainty: 95
  - unique: [adm0_code, adm1_code, year]
    reason: one row per GAUL ADM1 unit and year
    certainty: 95
  - median_between: {col: permanent_sq_km, lo: 0, hi: 50000}
    reason: surface-water area is non-negative and ADM1 medians should stay below national scale
    certainty: 80
  - median_between: {col: seasonal_sq_km, lo: 0, hi: 50000}
    reason: surface-water area is non-negative and ADM1 medians should stay below national scale
    certainty: 80
