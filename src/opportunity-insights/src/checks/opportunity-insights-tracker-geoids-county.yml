# compiled by `hardened compile-checks` — post-publish audit of `opportunity-insights-tracker-geoids-county`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [countyname, statename, stateabbrev]
checks:
  - kind: unique
    columns: [countyname, statename, stateabbrev]
  - kind: not_null
    col: countyname
  - kind: not_null
    col: statename
  - kind: not_null
    col: stateabbrev
  - kind: row_floor
    min: 1571
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
