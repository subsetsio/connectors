# compiled by `hardened compile-checks` — post-publish audit of `opportunity-insights-tracker-ui-claims-city-weekly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, month, day_endofweek, cityid]
temporal: year
checks:
  - kind: unique
    columns: [year, month, day_endofweek, cityid]
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: day_endofweek
  - kind: not_null
    col: cityid
  - kind: row_floor
    min: 6450
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
