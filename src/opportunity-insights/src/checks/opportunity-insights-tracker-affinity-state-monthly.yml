# compiled by `hardened compile-checks` — post-publish audit of `opportunity-insights-tracker-affinity-state-monthly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, month, day_endofmonth, statefips, freq]
temporal: year
checks:
  - kind: unique
    columns: [year, month, day_endofmonth, statefips, freq]
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: day_endofmonth
  - kind: not_null
    col: statefips
  - kind: not_null
    col: freq
  - kind: row_floor
    min: 1963
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
