# compiled by `hardened compile-checks` — post-publish audit of `opportunity-insights-tracker-policy-milestones-state`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, policy_description, statename]
temporal: date
checks:
  - kind: unique
    columns: [date, policy_description, statename]
  - kind: not_null
    col: date
  - kind: not_null
    col: policy_description
  - kind: not_null
    col: statename
  - kind: row_floor
    min: 336
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
