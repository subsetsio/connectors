spec_id: movebank-move-1429
status: active
coverage:
  frozen: true
  reason: Movebank Data Repository datapackages are fixed archival study snapshots; this connector republishes each archived bundle rather than tracking a live-updating feed.
tests:
  - row_count:
      min: 1
    reason: every published Movebank study archives at least one tracking record; 0 rows means a truncated or empty download
    certainty: 95
  - not_null: study_name
    reason: study-name is a standard Movebank export column written on every event row
    certainty: 85
    severity: warn
    points_outward: false
