spec_id: movebank-move-1208
status: active
coverage:
  frozen: true
  reason: Movebank Data Repository datapackages are fixed archival study snapshots; this connector republishes each archived bundle rather than tracking a live-updating feed.
tests:
  - row_count:
      min: 1
    reason: every accepted Movebank repository package should expose at least one tracking record; 0 rows means a truncated or empty download
    certainty: 90
  - not_null: study_name
    reason: study-name is a standard Movebank export column written on event rows when provided by the source
    certainty: 80
    severity: warn
    points_outward: false
