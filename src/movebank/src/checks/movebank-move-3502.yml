# compiled by `hardened compile-checks` — post-publish audit of `movebank-move-3502`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [timestamp, event_id, latitude, longitude]
temporal: timestamp
checks:
  - kind: unique
    columns: [timestamp, event_id, latitude, longitude]
  - kind: not_null
    col: timestamp
  - kind: not_null
    col: event_id
  - kind: not_null
    col: latitude
  - kind: not_null
    col: longitude
  - kind: row_floor
    min: 303
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
