# compiled by `hardened compile-checks` — post-publish audit of `federal-statistical-office-px-x-0703000000-101`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [structural_data, year, forest_zone]
temporal: year
checks:
  - kind: unique
    columns: [structural_data, year, forest_zone]
  - kind: not_null
    col: structural_data
  - kind: not_null
    col: year
  - kind: not_null
    col: forest_zone
  - kind: row_floor
    min: 2040
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
