# compiled by `hardened compile-checks` — post-publish audit of `environment-agency-readings`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measure_id, date_time]
temporal: date
checks:
  - kind: unique
    columns: [measure_id, date_time]
  - kind: not_null
    col: measure_id
  - kind: not_null
    col: date_time
  - kind: row_floor
    min: 2567828
regression:
  row_shrink_tolerance: 0.0
  key_shrink_tolerance: 0.0
  temporal_monotonic: true
