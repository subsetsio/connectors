# compiled by `hardened compile-checks` — post-publish audit of `saps-crime-stats-crime-statistics`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [station_crime_category, excel_row_number, station, source_workbook, measure_01_label]
temporal: release_year_start
checks:
  - kind: unique
    columns: [station_crime_category, excel_row_number, station, source_workbook, measure_01_label]
  - kind: not_null
    col: station_crime_category
  - kind: not_null
    col: excel_row_number
  - kind: not_null
    col: station
  - kind: not_null
    col: source_workbook
  - kind: not_null
    col: measure_01_label
  - kind: row_floor
    min: 686992
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
