    columns: [sheet, row_number, column_number]
  - kind: not_null
    col: sheet
  - kind: not_null
    col: row_number
  - kind: not_null
    col: column_number
  - kind: row_floor
    min: 171
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
