# compiled by `hardened compile-checks` — post-publish audit of `ppac-consumption-state-wise`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [product, region, state, fiscal_year]
temporal: fiscal_year
checks:
  - kind: unique
    columns: [product, region, state, fiscal_year]
  - kind: not_null
    col: product
  - kind: not_null
    col: region
  - kind: not_null
    col: state
  - kind: not_null
    col: fiscal_year
  - kind: row_floor
    min: 1042
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
