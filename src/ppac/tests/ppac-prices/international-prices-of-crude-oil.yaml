spec_id: ppac-prices/international-prices-of-crude-oil
status: active
tests:
  - not_null: item
    reason: every observation names its series/product (Indian basket crude price, monthly $/bbl)
    certainty: 95
  - not_null: period
    certainty: 95
  - not_null: value
    reason: rows with empty month cells are dropped during parse
    certainty: 90
  - column_type: {col: value, type: float}
    certainty: 95
  - matches: {col: period, pattern: '^[0-9]{4}-[0-9]{2}-01$'}
    reason: each month is normalised to the first of the calendar month
    certainty: 90
  - distinct_count: {col: item, min: 1}
    reason: the page exposes multiple series; a collapse to one means parse broke
    certainty: 80
    severity: warn
  - row_count: {min: 8}
    reason: recent financial years melted to long form; far fewer means the AjaxController returned empty
    certainty: 85
  - between: {col: value, lo: 1, hi: 250}
    reason: monthly crude basket price in $/bbl sits in low-hundreds
    certainty: 80
    severity: warn
