spec_id: ppac-consumption-state-wise
status: active
tests:
  - not_null: state
    certainty: 95
  - not_null: product
    certainty: 95
  - not_null: fiscal_year
    certainty: 95
  - not_null: value
    certainty: 90
  - column_type: {col: value, type: float}
    certainty: 95
  - matches: {col: fiscal_year, pattern: '^[0-9]{4}-[0-9]{2,4}$'}
    certainty: 90
  - row_count: {min: 800}
    reason: ~36 states x ~15 years x 3 product sheets; a collapse means a sheet/year was dropped
    certainty: 80
