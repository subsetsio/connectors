# CBS 37296ned — Bevolking; kerncijfers (population key figures, annual).
key: [measure, period]
temporal: year
columns:
  - name: measure
    type: VARCHAR
    description: CBS measure code (e.g. T001038_2 = total population)
  - name: measure_label
    type: VARCHAR
    description: Dutch label of the measure, resolved from MeasureCodes.csv
  - name: unit
    type: VARCHAR
    description: unit of the value (aantal, %, x 1 000, ...); null for unitless measures
  - name: period
    type: VARCHAR
    description: CBS period code (YYYYJJ00 = annual)
  - name: year
    type: BIGINT
    description: observation year, parsed from the period label
  - name: value
    type: DOUBLE
    description: observed value in `unit`
