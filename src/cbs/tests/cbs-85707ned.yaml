spec_id: cbs-85707ned
status: active
tests:
  - row_count: {min: 1}
    reason: every accepted CBS StatLine table has observations; an empty published table means the ZIP fetch or parse returned nothing rather than a real table.
    certainty: 90
  - not_null: measure
    reason: the fetch emits one long-format row per observation, each tagged with its CBS measure code; a null measure means the Observations.csv header drifted.
    certainty: 95
  - not_null: measure_label
    reason: measure codes are resolved against MeasureCodes.csv in the same ZIP; widespread nulls mean the code table failed to load.
    certainty: 80
    severity: warn
