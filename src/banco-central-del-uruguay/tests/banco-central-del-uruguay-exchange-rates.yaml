spec_id: banco-central-del-uruguay-exchange-rates
status: active
tests:
  - not_null: fecha
    reason: every quotation row carries its date; a null date means a malformed/placeholder row leaked past the empty-window filter
    certainty: 95
  - not_null: moneda
    certainty: 95
  - not_null: tcc
    reason: rows are only emitted when a buy rate exists; nulls would mean the float parse silently failed
    certainty: 90
  - column_type: {col: moneda, type: integer}
    certainty: 95
  - column_type: {col: tcc, type: float}
    certainty: 90
  - unique: [fecha, moneda]
    reason: one quotation per (date, currency) within a single market group; dupes mean overlapping windows or a re-pull without overwrite
    certainty: 85
  - between: {col: tcc, lo: 0.0000001, hi: 1000000}
    reason: a UYU-per-unit rate is always positive; bounds are loose to allow high-denomination currencies (e.g. depreciated pesos)
    certainty: 80
    severity: warn
  - enum: {col: grupo, values: [1]}
    reason: we only query market group 1 (mercado de cambios)
    certainty: 95
  - distinct_count: {col: codigo_iso, min: 20}
    reason: group 1 currently lists ~31 currencies; a sharp drop means the currency enumeration broke
    certainty: 80
  - matches: {col: fecha, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: raw stores the date as an ISO yyyy-mm-dd string straight from the SOAP response
    certainty: 90
