spec_id: office-of-the-registrar-general-and-census-commissioner-pc11-hl05
status: active
tests:
  - not_null: geo_level
    reason: every API row carries its geography level; null means a parse/shape break
    certainty: 95
  - column_type: {col: geo_level, type: integer}
    reason: geo_level is an integer hierarchy code (0=India, 1=State/UT)
    certainty: 90
  - enum: {col: geo_level, values: [0, 1]}
    reason: this connector fetches only national + state geography (geo_level=0,1)
    certainty: 95
  - column_type: {col: value, type: float}
    reason: the long-format measure, normalised to float (counts and areas); '' missing -> null
    certainty: 85
  - row_count: {min: 7644}
    reason: ~15288 rows observed at geo_level 0,1 for PC11_HL05; a large drop = truncated pagination
    certainty: 80
