# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dnudpriv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, time, sporg, instituttype, tiden]
temporal: time
checks:
  - kind: unique
    columns: [value, time, sporg, instituttype, tiden]
  - kind: not_null
    col: value
  - kind: not_null
    col: time
  - kind: not_null
    col: sporg
  - kind: not_null
    col: instituttype
  - kind: not_null
    col: tiden
  - kind: row_floor
    min: 3180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
