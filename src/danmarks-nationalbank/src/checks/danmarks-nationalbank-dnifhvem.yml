# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dnifhvem`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, investland, invsektor, investfond, hovedkat, misbrug2, forvalt, risiko, data, time]
temporal: time
checks:
  - kind: unique
    columns: [value, investland, invsektor, investfond, hovedkat, misbrug2, forvalt, risiko, data, time]
  - kind: not_null
    col: value
  - kind: not_null
    col: investland
  - kind: not_null
    col: invsektor
  - kind: not_null
    col: investfond
  - kind: not_null
    col: hovedkat
  - kind: not_null
    col: misbrug2
  - kind: not_null
    col: forvalt
  - kind: not_null
    col: risiko
  - kind: not_null
    col: data
  - kind: not_null
    col: time
  - kind: row_floor
    min: 14102320
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
