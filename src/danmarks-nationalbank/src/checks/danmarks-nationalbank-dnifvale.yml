# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dnifvale`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, hovedkat, vaerdi1, valuta, time]
temporal: time
checks:
  - kind: unique
    columns: [value, hovedkat, vaerdi1, valuta, time]
  - kind: not_null
    col: value
  - kind: not_null
    col: hovedkat
  - kind: not_null
    col: vaerdi1
  - kind: not_null
    col: valuta
  - kind: not_null
    col: time
  - kind: row_floor
    min: 3849
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
