# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dnfdiini`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, indlbranche, instrnat, data, time]
temporal: time
checks:
  - kind: unique
    columns: [value, indlbranche, instrnat, data, time]
  - kind: not_null
    col: value
  - kind: not_null
    col: indlbranche
  - kind: not_null
    col: instrnat
  - kind: not_null
    col: data
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1606
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
