# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dniip`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, balanc, instrument, indsek, valuta, land, udsek, time]
temporal: time
checks:
  - kind: unique
    columns: [value, balanc, instrument, indsek, valuta, land, udsek, time]
  - kind: not_null
    col: value
  - kind: not_null
    col: balanc
  - kind: not_null
    col: instrument
  - kind: not_null
    col: indsek
  - kind: not_null
    col: valuta
  - kind: not_null
    col: land
  - kind: not_null
    col: udsek
  - kind: not_null
    col: time
  - kind: row_floor
    min: 330300
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
