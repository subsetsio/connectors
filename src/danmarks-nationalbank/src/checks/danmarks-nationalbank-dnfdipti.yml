# compiled by `hardened compile-checks` — post-publish audit of `danmarks-nationalbank-dnfdipti`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, retnat, data, land, time]
temporal: time
checks:
  - kind: unique
    columns: [value, retnat, data, land, time]
  - kind: not_null
    col: value
  - kind: not_null
    col: retnat
  - kind: not_null
    col: data
  - kind: not_null
    col: land
  - kind: not_null
    col: time
  - kind: row_floor
    min: 123
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
