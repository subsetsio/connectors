# compiled by `hardened compile-checks` — post-publish audit of `understat-team-match-stats`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [league, season, team_id, match_index]
temporal: date
checks:
  - kind: unique
    columns: [league, season, team_id, match_index]
  - kind: not_null
    col: league
  - kind: not_null
    col: season
  - kind: not_null
    col: team_id
  - kind: not_null
    col: match_index
  - kind: row_floor
    min: 24468
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
