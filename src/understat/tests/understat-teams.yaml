spec_id: understat-teams
status: active
tests:
  - not_null: team_id
    certainty: 99
  - not_null: team_title
    certainty: 95
  - not_null: league
    certainty: 99
  - not_null: season
    certainty: 99
  - column_type: {col: season, type: integer}
    certainty: 95
  - unique: [league, season, team_id]
    reason: a team appears at most once within a league-season table
    certainty: 90
  - distinct_count: {col: league, min: 6}
    reason: a healthy pull covers all six Understat leagues
    certainty: 90
  - between: {col: season, lo: 2014, hi: current_year()}
    certainty: 95
coverage:
  frozen: true
  reason: team membership advances by season; match-bearing assets carry recency checks
