spec_id: understat-rosters
status: active
tests:
  - not_null: roster_id
    certainty: 99
  - not_null: match_id
    certainty: 99
  - not_null: player_id
    certainty: 95
  - not_null: player
    certainty: 95
  - enum: {col: side, values: [h, a]}
    certainty: 95
  - unique: roster_id
    reason: roster id is the source row id within match roster data
    certainty: 90
  - row_count: {min: 10000}
    reason: full multi-season roster corpus should be well above a single-season pull
    certainty: 90
coverage:
  frozen: true
  reason: roster rows are historical match-detail data discovered through match ids; recency is asserted on matches and team-match stats
