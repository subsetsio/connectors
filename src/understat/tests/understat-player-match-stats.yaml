spec_id: understat-player-match-stats
status: active
tests:
  - not_null: roster_id
    certainty: 99
  - not_null: match_id
    certainty: 99
  - not_null: player_id
    certainty: 95
  - not_null: player
    certainty: 95
  - enum: {col: side, values: [h, a]}
    certainty: 95
  - unique: roster_id
    reason: one player appearance row per roster id
    certainty: 90
  - row_count: {min: 10000}
    reason: full multi-season player appearance corpus should be well above a single-season pull
    certainty: 90
coverage:
  frozen: true
  reason: player appearance rows are historical match-detail data discovered through match ids; recency is asserted on matches and team-match stats
