# compiled by `hardened compile-checks` — post-publish audit of `cepii-intense`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, actor1countrycode, actor2countrycode, category]
checks:
  - kind: unique
    columns: [date, actor1countrycode, actor2countrycode, category]
  - kind: not_null
    col: date
  - kind: not_null
    col: actor1countrycode
  - kind: not_null
    col: actor2countrycode
  - kind: not_null
    col: category
  - kind: row_floor
    min: 845520
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
