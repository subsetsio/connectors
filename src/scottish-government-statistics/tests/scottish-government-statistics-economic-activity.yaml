spec_id: scottish-government-statistics-economic-activity
status: active
tests:
  - not_null: value
    reason: every observation row carries its measure value (the extraction pages ?measureType ?value per observation); a null means a page truncated or the join dropped the value
    certainty: 95
  - not_null: measure_type
    reason: every RDF Data Cube observation has a qb:measureType; a null measure_type means the measure-dimension assembly broke
    certainty: 95
