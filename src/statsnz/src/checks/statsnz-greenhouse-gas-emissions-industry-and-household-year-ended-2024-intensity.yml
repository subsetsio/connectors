# compiled by `hardened compile-checks` — post-publish audit of `statsnz-greenhouse-gas-emissions-industry-and-household-year-ended-2024-intensity`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, data_value, anzsic, anzsic_descriptor, year]
temporal: year
checks:
  - kind: unique
    columns: [row_number, data_value, anzsic, anzsic_descriptor, year]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: data_value
  - kind: not_null
    col: anzsic
  - kind: not_null
    col: anzsic_descriptor
  - kind: not_null
    col: year
  - kind: row_floor
    min: 4266
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
