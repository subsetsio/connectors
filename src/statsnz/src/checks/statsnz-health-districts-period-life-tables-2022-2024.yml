# compiled by `hardened compile-checks` — post-publish audit of `statsnz-health-districts-period-life-tables-2022-2024`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, value, area, age, measure]
temporal: time
checks:
  - kind: unique
    columns: [row_number, value, area, age, measure]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: value
  - kind: not_null
    col: area
  - kind: not_null
    col: age
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 47880
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
