# compiled by `hardened compile-checks` — post-publish audit of `statsnz-water-physical-stock-account-quarterly-1995-2020-csv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, value, yq, year, region]
temporal: year
checks:
  - kind: unique
    columns: [row_number, value, yq, year, region]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: value
  - kind: not_null
    col: yq
  - kind: not_null
    col: year
  - kind: not_null
    col: region
  - kind: row_floor
    min: 8504
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
