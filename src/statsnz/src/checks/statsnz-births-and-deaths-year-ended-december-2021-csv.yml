# compiled by `hardened compile-checks` — post-publish audit of `statsnz-births-and-deaths-year-ended-december-2021-csv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, period, source_file]
temporal: period
checks:
  - kind: unique
    columns: [row_number, period, source_file]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: period
  - kind: not_null
    col: source_file
  - kind: row_floor
    min: 960
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
