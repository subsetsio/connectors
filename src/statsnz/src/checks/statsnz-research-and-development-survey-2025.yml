# compiled by `hardened compile-checks` — post-publish audit of `statsnz-research-and-development-survey-2025`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, relative_sampling_error, rd_value, footnotes, variable]
temporal: year
checks:
  - kind: unique
    columns: [row_number, relative_sampling_error, rd_value, footnotes, variable]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: relative_sampling_error
  - kind: not_null
    col: rd_value
  - kind: not_null
    col: footnotes
  - kind: not_null
    col: variable
  - kind: row_floor
    min: 27474
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
