# compiled by `hardened compile-checks` — post-publish audit of `statsnz-annual-enterprise-survey-2025-financial-year-provisional-size-bands`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, value, industry_code_anzsic, industry_name_anzsic, year]
temporal: year
checks:
  - kind: unique
    columns: [row_number, value, industry_code_anzsic, industry_name_anzsic, year]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: value
  - kind: not_null
    col: industry_code_anzsic
  - kind: not_null
    col: industry_name_anzsic
  - kind: not_null
    col: year
  - kind: row_floor
    min: 11610
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
