# compiled by `hardened compile-checks` — post-publish audit of `statsnz-nzdep-period-life-tables-2022-2024`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, row_number, value_rnd, area, age]
temporal: time
checks:
  - kind: unique
    columns: [value, row_number, value_rnd, area, age]
  - kind: not_null
    col: value
  - kind: not_null
    col: row_number
  - kind: not_null
    col: value_rnd
  - kind: not_null
    col: area
  - kind: not_null
    col: age
  - kind: row_floor
    min: 66150
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
