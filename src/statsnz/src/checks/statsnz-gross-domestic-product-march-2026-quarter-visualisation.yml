# compiled by `hardened compile-checks` — post-publish audit of `statsnz-gross-domestic-product-march-2026-quarter-visualisation`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, amount, weight, quarter, seriesrefsndq]
temporal: quarter
checks:
  - kind: unique
    columns: [row_number, amount, weight, quarter, seriesrefsndq]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: amount
  - kind: not_null
    col: weight
  - kind: not_null
    col: quarter
  - kind: not_null
    col: seriesrefsndq
  - kind: row_floor
    min: 4212
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
