# compiled by `hardened compile-checks` — post-publish audit of `statsnz-2018-census-totals-by-topic-national-highlights-csv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [code, row_number, source_file]
checks:
  - kind: unique
    columns: [code, row_number, source_file]
  - kind: not_null
    col: code
  - kind: not_null
    col: row_number
  - kind: not_null
    col: source_file
  - kind: row_floor
    min: 2167
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
