# compiled by `hardened compile-checks` — post-publish audit of `statsnz-agricultural-production-statistics-key-tables-from-aps-2002-2017`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_file, sheet_name, row_number, column_index]
checks:
  - kind: unique
    columns: [source_file, sheet_name, row_number, column_index]
  - kind: not_null
    col: source_file
  - kind: not_null
    col: sheet_name
  - kind: not_null
    col: row_number
  - kind: not_null
    col: column_index
  - kind: row_floor
    min: 2401
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
