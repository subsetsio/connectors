# compiled by `hardened compile-checks` — post-publish audit of `statsnz-economic-survey-of-manufacturing-march-2026-quarter`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, series_reference, period, series_title_1, series_title_2]
temporal: period
checks:
  - kind: unique
    columns: [row_number, series_reference, period, series_title_1, series_title_2]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: series_reference
  - kind: not_null
    col: period
  - kind: not_null
    col: series_title_1
  - kind: not_null
    col: series_title_2
  - kind: row_floor
    min: 15504
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
