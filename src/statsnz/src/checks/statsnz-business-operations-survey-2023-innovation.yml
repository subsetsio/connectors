# compiled by `hardened compile-checks` — post-publish audit of `statsnz-business-operations-survey-2023-innovation`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, value, description, line_code, industry]
checks:
  - kind: unique
    columns: [row_number, value, description, line_code, industry]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: value
  - kind: not_null
    col: description
  - kind: not_null
    col: line_code
  - kind: not_null
    col: industry
  - kind: row_floor
    min: 5569
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
