# compiled by `hardened compile-checks` — post-publish audit of `statsnz-electronic-card-transactions-may-2026`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, data_value, period, series_reference, series_title_2]
temporal: period
checks:
  - kind: unique
    columns: [row_number, data_value, period, series_reference, series_title_2]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: data_value
  - kind: not_null
    col: period
  - kind: not_null
    col: series_reference
  - kind: not_null
    col: series_title_2
  - kind: row_floor
    min: 11126
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
