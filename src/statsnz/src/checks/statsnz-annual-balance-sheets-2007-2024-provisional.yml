# compiled by `hardened compile-checks` тАФ post-publish audit of `statsnz-annual-balance-sheets-2007-2024-provisional`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, values, asset_liability_code, descriptor, period]
temporal: period
checks:
  - kind: unique
    columns: [row_number, values, asset_liability_code, descriptor, period]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: values
  - kind: not_null
    col: asset_liability_code
  - kind: not_null
    col: descriptor
  - kind: not_null
    col: period
  - kind: row_floor
    min: 4104
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
