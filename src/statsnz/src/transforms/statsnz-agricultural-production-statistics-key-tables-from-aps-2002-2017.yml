# Hand-authored residual — see the .sql header. The compiled draft was a
# 226-column positional pass-through of 47 heterogeneous Excel key tables;
# this publishes the same data as one row per non-empty spreadsheet cell.
key: [source_file, sheet_name, row_number, column_index]
sort: [source_file, sheet_name, row_number, column_index]
columns:
  - name: source_file
    type: VARCHAR
    description: Name of the inner zip member (the Excel workbook) the cell came from, e.g. `2-beef-farm.xls`.
  - name: sheet_name
    type: VARCHAR
    description: Worksheet within the workbook, e.g. `Beef by Age, Sex & Size of Farm`. Carries the table's subject.
  - name: row_number
    type: BIGINT
    description: 1-based row position of the cell within the worksheet, after fully-empty rows and columns are dropped. Low row numbers are the sheet's title/header block.
  - name: column_index
    type: BIGINT
    description: 1-based column position of the cell within the worksheet. Positional only — each worksheet has its own layout, so the same index means different things in different sheets.
  - name: cell_value
    type: VARCHAR
    description: The cell's value as text (the source mixes labels, numbers and revision flags such as `R` in one grid, so no single type applies). Empty cells are not published.
