# hand-curated from the compiled draft — do not regenerate blindly.
# of raw asset `statsnz-abortion-statistics-year-ended-december-2019-csv`.
# 'as-dec19-abortions-by-age-of-woman.csv' has 10 trailing blank header cells,
# which the node named column_4..column_13. They are empty in 100% of all 400
# rows and carry no information, so they are dropped here.
key: [row_number, period, source_file]
temporal: period
sort: [period, row_number, source_file]
columns:
  - name: source_file
    type: VARCHAR
  - name: row_number
    type: BIGINT
  - name: period
    type: BIGINT
  - name: general_abortion_rate
    type: DOUBLE
  - name: induced_abortions
    type: VARCHAR
  - name: age_of_woman
    type: VARCHAR
  - name: abortion_rate
    type: DOUBLE
