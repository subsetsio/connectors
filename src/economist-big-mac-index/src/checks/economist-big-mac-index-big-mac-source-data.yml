# compiled by `hardened compile-checks` — post-publish audit of `economist-big-mac-index-big-mac-source-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, name, iso_a3, currency_code]
temporal: date
checks:
  - kind: unique
    columns: [date, name, iso_a3, currency_code]
  - kind: not_null
    col: date
  - kind: not_null
    col: name
  - kind: not_null
    col: iso_a3
  - kind: not_null
    col: currency_code
  - kind: row_floor
    min: 1186
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
