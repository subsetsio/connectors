# compiled by `hardened compile-checks` — post-publish audit of `unodc-sdg-dataset`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator, series, geo, iso3_code, year, sex, age, drug, crime, dim_comp1, altseries]
temporal: year
checks:
  - kind: unique
    columns: [indicator, series, geo, iso3_code, year, sex, age, drug, crime, dim_comp1, altseries]
  - kind: not_null
    col: indicator
  - kind: not_null
    col: series
  - kind: not_null
    col: geo
  - kind: not_null
    col: iso3_code
  - kind: not_null
    col: year
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: drug
  - kind: not_null
    col: crime
  - kind: not_null
    col: dim_comp1
  - kind: not_null
    col: altseries
  - kind: row_floor
    min: 31670
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
