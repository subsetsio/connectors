# compiled by `hardened compile-checks` — post-publish audit of `unodc-data-cts-violent-and-sexual-crime`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso3_code, indicator, dimension, category, sex, age, year, unit]
temporal: year
checks:
  - kind: unique
    columns: [iso3_code, indicator, dimension, category, sex, age, year, unit]
  - kind: not_null
    col: iso3_code
  - kind: not_null
    col: indicator
  - kind: not_null
    col: dimension
  - kind: not_null
    col: category
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: year
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 15868
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
