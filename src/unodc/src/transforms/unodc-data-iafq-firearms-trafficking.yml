# IAFQ has no row identity: (iso3_code, indicator, dimension, category, sex, age,
# year, unit) recurs with conflicting values. Declared explicitly keyless.
key: []
temporal: year
sort: [year, iso3_code, indicator, dimension, category, sex, age]
columns:
  - name: iso3_code
    type: VARCHAR
  - name: country
    type: VARCHAR
  - name: region
    type: VARCHAR
  - name: subregion
    type: VARCHAR
  - name: indicator
    type: VARCHAR
  - name: dimension
    type: VARCHAR
  - name: category
    type: VARCHAR
  - name: sex
    type: VARCHAR
  - name: age
    type: VARCHAR
  - name: year
    type: INTEGER
  - name: unit
    type: VARCHAR
  - name: value_raw
    type: VARCHAR
  - name: value
    type: DOUBLE
  - name: source
    type: VARCHAR
