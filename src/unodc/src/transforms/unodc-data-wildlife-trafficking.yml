  - name: year_range
    type: VARCHAR
  - name: indicator
    type: VARCHAR
  - name: series
    type: VARCHAR
  - name: taxonomic_group
    type: VARCHAR
  - name: unit
    type: VARCHAR
  - name: value_raw
