# compiled by `hardened compile-checks` — post-publish audit of `urssaf-effectifs-par-region`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [annee, ancienne_region, code_ancienne_region, nouvelle_region, code_nouvelle_region]
temporal: annee
checks:
  - kind: unique
    columns: [annee, ancienne_region, code_ancienne_region, nouvelle_region, code_nouvelle_region]
  - kind: not_null
    col: annee
  - kind: not_null
    col: ancienne_region
  - kind: not_null
    col: code_ancienne_region
  - kind: not_null
    col: nouvelle_region
  - kind: not_null
    col: code_nouvelle_region
  - kind: row_floor
    min: 39
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
