# compiled by `hardened compile-checks` — post-publish audit of `urssaf-accueil-urssaf-national`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nom_commune, code_commune_insee, adresse, site, titre_du_site]
temporal: date_mise_a_jour
checks:
  - kind: unique
    columns: [nom_commune, code_commune_insee, adresse, site, titre_du_site]
  - kind: not_null
    col: nom_commune
  - kind: not_null
    col: code_commune_insee
  - kind: not_null
    col: adresse
  - kind: not_null
    col: site
  - kind: not_null
    col: titre_du_site
  - kind: row_floor
    min: 62
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
