# compiled by `hardened compile-checks` — post-publish audit of `idb-database-for-revelation-of-expectations-in-latin-america-revela`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, date_predicted, country]
temporal: date
checks:
  - kind: unique
    columns: [date, date_predicted, country]
  - kind: not_null
    col: date
  - kind: not_null
    col: date_predicted
  - kind: not_null
    col: country
  - kind: row_floor
    min: 1855
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
