# compiled by `hardened compile-checks` — post-publish audit of `idb-database-of-political-institutions-2015`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [totalseats, ifs, countryname, year]
temporal: year
checks:
  - kind: unique
    columns: [totalseats, ifs, countryname, year]
  - kind: not_null
    col: totalseats
  - kind: not_null
    col: ifs
  - kind: not_null
    col: countryname
  - kind: not_null
    col: year
  - kind: row_floor
    min: 3651
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
