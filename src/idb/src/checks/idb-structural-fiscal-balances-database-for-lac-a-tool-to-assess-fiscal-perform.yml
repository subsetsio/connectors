# compiled by `hardened compile-checks` — post-publish audit of `idb-structural-fiscal-balances-database-for-lac-a-tool-to-assess-fiscal-perform`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year_date, year, country, indicator]
temporal: year
checks:
  - kind: unique
    columns: [year_date, year, country, indicator]
  - kind: not_null
    col: year_date
  - kind: not_null
    col: year
  - kind: not_null
    col: country
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1750
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
