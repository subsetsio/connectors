# compiled by `hardened compile-checks` — post-publish audit of `idb-suriname-survey-of-living-conditions-2016-2017`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [hhid, quantity, weight, psu, foodcode]
checks:
  - kind: unique
    columns: [hhid, quantity, weight, psu, foodcode]
  - kind: not_null
    col: hhid
  - kind: not_null
    col: quantity
  - kind: not_null
    col: weight
  - kind: not_null
    col: psu
  - kind: not_null
    col: foodcode
  - kind: row_floor
    min: 32903
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
