# compiled by `hardened compile-checks` — post-publish audit of `idb-finance-and-gender-issues-survey-jamaica-2011`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [idstd, d1a1x, n2a, l1, l2]
checks:
  - kind: unique
    columns: [idstd, d1a1x, n2a, l1, l2]
  - kind: not_null
    col: idstd
  - kind: not_null
    col: d1a1x
  - kind: not_null
    col: n2a
  - kind: not_null
    col: l1
  - kind: not_null
    col: l2
  - kind: row_floor
    min: 448
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
