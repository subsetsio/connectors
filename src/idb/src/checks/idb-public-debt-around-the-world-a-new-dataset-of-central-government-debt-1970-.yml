# compiled by `hardened compile-checks` — post-publish audit of `idb-public-debt-around-the-world-a-new-dataset-of-central-government-debt-1970-`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [debt_gdp, wbcode, country, year, wbregion]
temporal: year
checks:
  - kind: unique
    columns: [debt_gdp, wbcode, country, year, wbregion]
  - kind: not_null
    col: debt_gdp
  - kind: not_null
    col: wbcode
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: wbregion
  - kind: row_floor
    min: 1484
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
