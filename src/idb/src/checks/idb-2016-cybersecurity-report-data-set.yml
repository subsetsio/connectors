# compiled by `hardened compile-checks` — post-publish audit of `idb-2016-cybersecurity-report-data-set`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator_name, indicator, country, factor, nivel_de_madurez_texto_en]
temporal: year
checks:
  - kind: unique
    columns: [indicator_name, indicator, country, factor, nivel_de_madurez_texto_en]
  - kind: not_null
    col: indicator_name
  - kind: not_null
    col: indicator
  - kind: not_null
    col: country
  - kind: not_null
    col: factor
  - kind: not_null
    col: nivel_de_madurez_texto_en
  - kind: row_floor
    min: 808
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
