# compiled by `hardened compile-checks` — post-publish audit of `idb-olas-lapop-20182019-wash-indicators`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, count_respondents, indicator, iso3, quintile]
checks:
  - kind: unique
    columns: [value, count_respondents, indicator, iso3, quintile]
  - kind: not_null
    col: value
  - kind: not_null
    col: count_respondents
  - kind: not_null
    col: indicator
  - kind: not_null
    col: iso3
  - kind: not_null
    col: quintile
  - kind: row_floor
    min: 6660
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
