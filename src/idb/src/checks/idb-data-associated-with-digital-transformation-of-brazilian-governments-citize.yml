# compiled by `hardened compile-checks` — post-publish audit of `idb-data-associated-with-digital-transformation-of-brazilian-governments-citize`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [question_response, total, question_text, question_number]
checks:
  - kind: unique
    columns: [question_response, total, question_text, question_number]
  - kind: not_null
    col: question_response
  - kind: not_null
    col: total
  - kind: not_null
    col: question_text
  - kind: not_null
    col: question_number
  - kind: row_floor
    min: 190
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
