# compiled by `hardened compile-checks` — post-publish audit of `idb-data-associated-with-development-connections-impact-of-new-information-tech`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pais_nombre_es, pais_nombre_en, ano, indicador_nombre_en, indicador_nombre_es]
temporal: date
checks:
  - kind: unique
    columns: [pais_nombre_es, pais_nombre_en, ano, indicador_nombre_en, indicador_nombre_es]
  - kind: not_null
    col: pais_nombre_es
  - kind: not_null
    col: pais_nombre_en
  - kind: not_null
    col: ano
  - kind: not_null
    col: indicador_nombre_en
  - kind: not_null
    col: indicador_nombre_es
  - kind: row_floor
    min: 2640
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
