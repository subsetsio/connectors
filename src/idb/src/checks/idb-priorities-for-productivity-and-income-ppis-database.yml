# compiled by `hardened compile-checks` — post-publish audit of `idb-priorities-for-productivity-and-income-ppis-database`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, indicator, sector, normalization]
temporal: year
checks:
  - kind: unique
    columns: [country, year, indicator, sector, normalization]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: sector
  - kind: not_null
    col: normalization
  - kind: row_floor
    min: 40952
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
