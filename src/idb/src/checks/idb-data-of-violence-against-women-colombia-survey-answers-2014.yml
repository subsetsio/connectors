# compiled by `hardened compile-checks` — post-publish audit of `idb-data-of-violence-against-women-colombia-survey-answers-2014`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [column, type, source_resource]
checks:
  - kind: unique
    columns: [column, type, source_resource]
  - kind: not_null
    col: column
  - kind: not_null
    col: type
  - kind: not_null
    col: source_resource
  - kind: row_floor
    min: 2250
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
