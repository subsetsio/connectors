# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `open-meteo-air-quality`. Regenerate after model-verify.
# caution: Hourly CAMS air-quality data combines historical reanalysis with a short forward forecast window; use `time` to separate historical observations from forward-looking values.
key: [time, country, name]
temporal: time
sort: [time, country, name]
columns:
  - name: name
    type: VARCHAR
  - name: country
    type: VARCHAR
  - name: latitude
    type: DOUBLE
  - name: longitude
    type: DOUBLE
  - name: time
    type: TIMESTAMP
  - name: pm10
    type: DOUBLE
  - name: pm2_5
    type: DOUBLE
  - name: ozone
    type: DOUBLE
