spec_id: open-meteo-climate-projections
status: active
coverage:
  frozen: true
  reason: CMIP6 projection corpus is a fixed daily 1950-2050 projection window for the selected model.
tests:
  - not_null: name
    certainty: 99
  - not_null: model
    certainty: 99
  - not_null: date
    certainty: 99
  - enum: {col: model, values: [MRI_AGCM3_2_S]}
    reason: exactly the one CMIP6 model we request to stay inside the free-tier call budget
    certainty: 95
  - unique: [name, model, date]
    reason: one projection row per (city, model, date)
    certainty: 95
  - distinct_count: {col: name, min: 4, max: 6}
    certainty: 90
  - between: {col: latitude, lo: -90, hi: 90}
    certainty: 99
  - between: {col: temperature_2m_max, lo: -90, hi: 60}
    reason: physical daily max air temperature range
    certainty: 90
    severity: warn
  - at_most: {col: date, expr: "2050-12-31"}
    reason: downscaled CMIP6 projections end in 2050
    certainty: 95
    points_outward: true
  - at_least: {col: date, expr: "1950-01-01"}
    reason: projections begin in 1950
    certainty: 95
    points_outward: true
  - row_count: {min: 200000}
    reason: ~6 cities x 1 model x ~36.9k days (1950-2050)
    certainty: 85
