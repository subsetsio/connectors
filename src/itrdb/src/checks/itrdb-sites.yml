# compiled by `hardened compile-checks` — post-publish audit of `itrdb-sites`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [study_contribution_date, site_name, site_id, study_id, mappable]
temporal: study_contribution_date
checks:
  - kind: unique
    columns: [study_contribution_date, site_name, site_id, study_id, mappable]
  - kind: not_null
    col: study_contribution_date
  - kind: not_null
    col: site_name
  - kind: not_null
    col: site_id
  - kind: not_null
    col: study_id
  - kind: not_null
    col: mappable
  - kind: row_floor
    min: 4686
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
