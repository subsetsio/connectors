spec_id: ocha-affected-people-returnees
status: active
tests:
- not_null: population
- column_type:
    col: population
    type: integer
- at_least:
    col: population
    expr: 0
  certainty: 95
- not_null: origin_location_code
- not_null: asylum_location_code
- not_null: population_group
- between:
    col: min_age
    lo: 0
    hi: 120
  certainty: 85
  severity: warn
- freshness: {col: reference_period_start, reaches: today - 3y}
  reason: HAPI returnee observations should include a recent reference period, allowing for annual source update schedules.
  certainty: 70
