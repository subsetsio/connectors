spec_id: samhsa-escb-scz6
status: active
tests:
  - not_null: ffy_year
    reason: every Synar row is stamped with a federal fiscal year
    certainty: 95
  - not_null: data_value
    reason: the measured value is the point of the dataset
    certainty: 90
  - not_null: locationabbr
    certainty: 95
  - matches: {col: ffy_year, pattern: "^(19|20)[0-9]{2}$"}
    reason: Socrata serves ffy_year as a 4-digit year string (1997-2018)
    certainty: 90
  - row_count: {min: 800}
    reason: ~1,122 rows total; a big shortfall means the Socrata pull was truncated
    certainty: 85
  - distinct_count: {col: locationabbr, min: 40}
    reason: states + DC + territories + national total
    certainty: 80
  - matches: {col: locationabbr, pattern: "^[A-Z]{2,3}$"}
    reason: location abbreviations are 2-letter codes (plus a few like USA)
    certainty: 75
    severity: warn
