spec_id: eea-bathing-water-assessment-monitoringresult
status: active
tests:
  - not_null: bathingWaterIdentifier
    certainty: 95
  - not_null: sampleDate
    reason: "an assessment sample is dated"
    certainty: 85
  - column_type: {"col": "season", "type": "integer"}
    certainty: 95
  - matches: {"col": "sampleDate", "pattern": "^\\d{4}-\\d{2}-\\d{2}$"}
    reason: "date stored as ISO yyyy-mm-dd string in raw"
    certainty: 85
  - between: {"col": "season", "lo": 1990, "hi": "current_year()"}
    certainty: 90
  - row_count: {"min": 10000}
    reason: "~680k assessment samples"
    certainty: 85
