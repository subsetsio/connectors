spec_id: eea-bathing-water-mapping-lov
status: active
coverage:
  frozen: true
  reason: LOV statusDate records code lifecycle dates in the published WISE_BWD vocabulary, not an observation freshness clock; the accepted codebook is a stable reference snapshot.
tests:
  - not_null: id
    certainty: 90
  - not_null: label
    certainty: 90
  - not_null: notation
    certainty: 90
  - not_null: tableName
    reason: "each code belongs to a named list-of-values vocabulary"
    certainty: 90
  - matches: {"col": "statusDate", "pattern": "^\\d{4}-\\d{2}-\\d{2}$"}
    reason: "date stored as ISO yyyy-mm-dd string in raw"
    certainty: 85
  - row_count: {"min": 100}
    reason: "~286 code/label vocabulary entries"
    certainty: 80
