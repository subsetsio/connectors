spec_id: eea-bathing-water-assessment-bathingwaterquality
status: active
tests:
  - not_null: bathingWaterIdentifier
    certainty: 95
  - unique: UID
    certainty: 75
    severity: "warn"
  - column_type: {"col": "season", "type": "integer"}
    certainty: 95
  - column_type: {"col": "escherichiaColi90thPercentile", "type": "float"}
    reason: "microbiological percentile is a decimal measure"
    certainty: 75
    severity: "warn"
  - between: {"col": "season", "lo": 1990, "hi": "current_year()"}
    certainty: 90
  - freshness: {"col": "season", "reaches": 2024}
    reason: "EEA Bathing Water quality assessments are annual; the current WISE_BWD latest release reaches the 2024 bathing season"
    points_outward: true
  - matches: {"col": "countryCode", "pattern": "^[A-Z]{2}$"}
    certainty: 85
  - row_count: {"min": 1000}
    reason: "~87k rows"
    certainty: 85
