spec_id: eea-bathing-water-assessment-bathingwater
status: active
tests:
  - not_null: bathingWaterIdentifier
    reason: "every assessment row identifies a bathing water"
    certainty: 95
  - not_null: UID
    reason: "UID is the per-row surrogate key"
    certainty: 90
  - unique: UID
    reason: "UID should be a unique per-row id; dupes mean a page was re-pulled without overwrite"
    certainty: 75
    severity: "warn"
  - column_type: {"col": "season", "type": "integer"}
    certainty: 95
  - column_type: {"col": "hasReportedData", "type": "boolean"}
    reason: "bit flag stored as boolean in raw parquet"
    certainty: 90
  - between: {"col": "season", "lo": 1990, "hi": "current_year()"}
    reason: "BWD reporting seasons run from 1990 to the latest published year"
    certainty: 90
  - freshness: {"col": "season", "reaches": 2024}
    reason: "EEA Bathing Water assessments are annual; the current WISE_BWD latest release reaches the 2024 bathing season"
    points_outward: true
  - matches: {"col": "countryCode", "pattern": "^[A-Z]{2}$"}
    reason: "ISO 3166-1 alpha-2, plus EL/UK"
    certainty: 85
  - row_count: {"min": 1000}
    reason: "~87k rows across all seasons"
    certainty: 85
