spec_id: eea-bathing-water-timeseries-seasonalperiod
status: active
tests:
  - not_null: bathingWaterIdentifier
    certainty: 95
  - column_type: {"col": "season", "type": "integer"}
    certainty: 95
  - matches: {"col": "startDate", "pattern": "^\\d{4}-\\d{2}-\\d{2}$"}
    reason: "ISO date string in raw; nulls ignored by the check"
    certainty: 80
    severity: "warn"
  - between: {"col": "season", "lo": 1990, "hi": "current_year()"}
    certainty: 90
  - freshness: {"col": "season", "reaches": 2024}
    reason: "Seasonal-period time series are annual and should reach the current WISE_BWD latest bathing season"
    points_outward: true
  - row_count: {"min": 10000}
    reason: "~389k seasonal-period rows"
    certainty: 85
