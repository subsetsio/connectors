# compiled by `hardened compile-checks` — post-publish audit of `eea-bathing-water-assessment-bathingwaterstatus-country`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [countrycode, season, specialisedzonetype, quality]
temporal: season
checks:
  - kind: unique
    columns: [countrycode, season, specialisedzonetype, quality]
  - kind: not_null
    col: countrycode
  - kind: not_null
    col: season
  - kind: not_null
    col: specialisedzonetype
  - kind: not_null
    col: quality
  - kind: row_floor
    min: 4061
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
