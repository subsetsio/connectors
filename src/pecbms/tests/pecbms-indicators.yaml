spec_id: pecbms-indicators
status: active
coverage:
  frozen: true
  reason: time_period is a reference label describing the span used for each indicator, not an observation period for this catalog table; annual values carry the freshness test.
tests:
  - row_count: {min: 10}
  - not_null: indicator_id
  - not_null: indicator_name
  - not_null: region
  - unique: indicator_id
  - distinct_count: {col: indicator_id, min: 10}
