spec_id: pecbms-indicator-values
status: active
tests:
  - row_count: {min: 400}
  - not_null: indicator_id
  - not_null: year
  - not_null: index_value
  - column_type: {col: year, type: integer}
  - column_type: {col: index_value, type: float}
  - unique: [indicator_id, year]
    reason: each indicator has one published index value per year
    certainty: 95
  - between: {col: year, lo: 1980, hi: current_year()}
    certainty: 95
  - distinct_count: {col: indicator_id, min: 10}
  - freshness: {col: year, reaches: 2024}
    points_outward: true
    reason: the 2025 update publishes data through 2024
