# cmhc-34100154 — Canada Mortgage and Housing Corporation, housing starts, under construction and completions in selected census metropolitan areas, monthly
# Statistics Canada bulk CSV, monthly frequency. Dropped from the source columns: STATUS and SYMBOL
# (no information once no-observation rows are removed), UOM/UOM_ID/DECIMALS and SCALAR_FACTOR
# (constant per table — folded into the `value` description).
# caution: the `geo` column mixes aggregation levels: national, provincial and roll-up rows (e.g. Canada, the provinces, 'Census metropolitan areas', 'All census agglomerations 50,000 and over') appear as ordinary rows alongside individual centres — filter `geo` before summing.
# caution: `housing_estimates` stacks three distinct measures (housing starts, housing under construction, housing completions) in one value column — starts and completions are flows over the period while under construction is an end-of-period stock; never sum or average across this column.
# caution: `type_of_unit` mixes subtotals with their components — 'Total units' overlap the component categories ('Apartment and other unit types', 'Row units', 'Semi-detached units', 'Single-detached units'); summing across the column double-counts. Pick one level.
key: [ref_date, vector]
temporal: ref_date
sort: [ref_date, vector]
columns:
  - name: ref_date
    type: DATE
    description: "First day of the reference month, parsed from Statistics Canada's YYYY-MM REF_DATE."
  - name: geo
    type: VARCHAR
    description: "Statistics Canada geography name — a country, province, census metropolitan area, census agglomeration or urban centre. Roll-up rows sit alongside individual centres."
  - name: dguid
    type: VARCHAR
    description: "Statistics Canada Dissemination Geography Unique Identifier for `geo`, where the source supplies one; null for roll-up geographies."
  - name: housing_estimates
    type: VARCHAR
    description: "Which housing estimate the row measures: 'Housing starts', 'Housing under construction' or 'Housing completions'."
  - name: type_of_unit
    type: VARCHAR
    description: "Dwelling unit type. Includes subtotals alongside their components; see the caution above."
  - name: value
    type: DOUBLE
    description: "The housing estimate named in `housing_estimates`, in dwelling units."
  - name: terminated
    type: BOOLEAN
    description: "True when Statistics Canada has flagged this series (`vector`) as terminated and no longer updated."
  - name: vector
    type: VARCHAR
    description: "Statistics Canada vector id — the stable identifier of the individual time series this row belongs to (e.g. 'v733334')."
  - name: coordinate
    type: VARCHAR
    description: "Statistics Canada coordinate — the dot-separated position of the row's dimension members within the cube (e.g. '192.3.1'). Provenance only."
