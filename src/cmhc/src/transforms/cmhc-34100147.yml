# cmhc-34100147 — Canada Mortgage and Housing Corporation, preliminary housing starts
# Statistics Canada bulk CSV, monthly frequency (1999-02 to 2020-12). Dropped from the
# source columns: SYMBOL (100% null), UOM/UOM_ID/DECIMALS/SCALAR_FACTOR (constant per
# table — folded into the `value` description), TERMINATED (constant, never set).
# caution: the `geo` column mixes aggregation levels: national, provincial and roll-up rows (e.g. Canada, the provinces, 'Census metropolitan areas', 'All census agglomerations 50,000 and over') appear as ordinary rows alongside individual centres — filter `geo` before summing.
# caution: `type_of_unit` mixes subtotals with their components — 'Total units' overlaps the component categories ('All other types of units', 'Single-detached units'); summing across the column double-counts. Pick one level.
# caution: every row of this table is suppressed for confidentiality (`status` = 'x') — the source publishes the series skeleton (geography x type of unit x month) but no observations at all. `value` is null throughout. Statistics Canada no longer publishes this cube (the product id returns CUBE_NOT_AVAILABLE); the table carries no measurements and exists only as a record of the discontinued series.
key: [ref_date, vector]
temporal: ref_date
sort: [ref_date, vector]
columns:
  - name: ref_date
    type: DATE
    description: "First day of the reference month, parsed from Statistics Canada's YYYY-MM REF_DATE."
  - name: geo
    type: VARCHAR
    description: "Statistics Canada geography name — a country, province, census metropolitan area, census agglomeration or urban centre. Roll-up rows sit alongside individual centres."
  - name: dguid
    type: VARCHAR
    description: "Statistics Canada Dissemination Geography Unique Identifier for `geo`, where the source supplies one; null for roll-up geographies."
  - name: type_of_unit
    type: VARCHAR
    description: "Dwelling unit type. Includes subtotals alongside their components; see the caution above."
  - name: value
    type: DOUBLE
    description: "Number of dwelling units started (preliminary estimate). Null on every row of this table: Statistics Canada suppressed the entire cube for confidentiality. See `status` and the caution above."
  - name: status
    type: VARCHAR
    description: "Statistics Canada status flag qualifying `value`. Always 'x' here, meaning the observation is suppressed to meet the confidentiality requirements of the Statistics Act."
  - name: vector
    type: VARCHAR
    description: "Statistics Canada vector id — the stable identifier of the individual time series this row belongs to (e.g. 'v729865')."
  - name: coordinate
    type: VARCHAR
    description: "Statistics Canada coordinate — the dot-separated position of the row's dimension members within the cube (e.g. '28.3'). Provenance only."
