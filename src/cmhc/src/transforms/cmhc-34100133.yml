# cmhc-34100133 — Canada Mortgage and Housing Corporation, average rents for areas with a population of 10,000 and over
# Statistics Canada bulk CSV, annual frequency. Dropped from the source columns: STATUS and SYMBOL
# (no information once no-observation rows are removed), UOM/UOM_ID/DECIMALS and SCALAR_FACTOR
# (constant per table — folded into the `value` description).
# caution: `type_of_structure` categories are nested, not disjoint: 'Apartment structures of three units and over' contains 'Apartment structures of six units and over', and 'Row and apartment structures of three units and over' is the union of the row and apartment categories. Filter to one structure type; never sum across.
key: [ref_date, vector]
temporal: ref_date
sort: [ref_date, vector]
columns:
  - name: ref_date
    type: BIGINT
    description: "Reference year of the observation (Statistics Canada REF_DATE)."
  - name: geo
    type: VARCHAR
    description: "Statistics Canada geography name — a country, province, census metropolitan area, census agglomeration or urban centre. Roll-up rows sit alongside individual centres."
  - name: dguid
    type: VARCHAR
    description: "Statistics Canada Dissemination Geography Unique Identifier for `geo`, where the source supplies one; null for roll-up geographies."
  - name: type_of_structure
    type: VARCHAR
    description: "Rental structure type. The categories are nested rather than disjoint; see the caution above."
  - name: type_of_unit
    type: VARCHAR
    description: "Number of bedrooms in the rental unit: 'Bachelor units', 'One bedroom units', 'Three bedroom units', 'Two bedroom units'."
  - name: value
    type: DOUBLE
    description: "Average monthly rent, in Canadian dollars."
  - name: terminated
    type: BOOLEAN
    description: "True when Statistics Canada has flagged this series (`vector`) as terminated and no longer updated."
  - name: vector
    type: VARCHAR
    description: "Statistics Canada vector id — the stable identifier of the individual time series this row belongs to (e.g. 'v733334')."
  - name: coordinate
    type: VARCHAR
    description: "Statistics Canada coordinate — the dot-separated position of the row's dimension members within the cube (e.g. '192.3.1'). Provenance only."
