# compiled by `hardened compile-checks` — post-publish audit of `meta-climate-change-opinion-survey`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_code, response, country, variable, region]
checks:
  - kind: unique
    columns: [country_code, response, country, variable, region]
  - kind: not_null
    col: country_code
  - kind: not_null
    col: response
  - kind: not_null
    col: country
  - kind: not_null
    col: variable
  - kind: not_null
    col: region
  - kind: row_floor
    min: 7595
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
