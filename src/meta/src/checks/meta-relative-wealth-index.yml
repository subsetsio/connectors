# compiled by `hardened compile-checks` — post-publish audit of `meta-relative-wealth-index`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_file, latitude, longitude, rwi, error]
checks:
  - kind: unique
    columns: [source_file, latitude, longitude, rwi, error]
  - kind: not_null
    col: source_file
  - kind: not_null
    col: latitude
  - kind: not_null
    col: longitude
  - kind: not_null
    col: rwi
  - kind: not_null
    col: error
  - kind: row_floor
    min: 1439639
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
