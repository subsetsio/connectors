# compiled by `hardened compile-checks` — post-publish audit of `meta-international-migration-flows`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_from, country_to, migration_month]
temporal: migration_month
checks:
  - kind: unique
    columns: [country_from, country_to, migration_month]
  - kind: not_null
    col: country_from
  - kind: not_null
    col: country_to
  - kind: not_null
    col: migration_month
  - kind: row_floor
    min: 781577
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
