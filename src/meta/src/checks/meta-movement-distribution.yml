# compiled by `hardened compile-checks` — post-publish audit of `meta-movement-distribution`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ds, gadm_id, country, source_file, home_to_ping_distance_category]
temporal: ds
checks:
  - kind: unique
    columns: [ds, gadm_id, country, source_file, home_to_ping_distance_category]
  - kind: not_null
    col: ds
  - kind: not_null
    col: gadm_id
  - kind: not_null
    col: country
  - kind: not_null
    col: source_file
  - kind: not_null
    col: home_to_ping_distance_category
  - kind: row_floor
    min: 7020238
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
