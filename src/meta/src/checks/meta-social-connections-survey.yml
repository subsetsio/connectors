# compiled by `hardened compile-checks` — post-publish audit of `meta-social-connections-survey`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, variable, question_text, notes, country]
checks:
  - kind: unique
    columns: [value, variable, question_text, notes, country]
  - kind: not_null
    col: value
  - kind: not_null
    col: variable
  - kind: not_null
    col: question_text
  - kind: not_null
    col: notes
  - kind: not_null
    col: country
  - kind: row_floor
    min: 1317
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
