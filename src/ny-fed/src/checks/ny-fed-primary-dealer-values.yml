# compiled by `hardened compile-checks` — post-publish audit of `ny-fed-primary-dealer-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [asofdate, value, description, keyid]
temporal: asofdate
checks:
  - kind: unique
    columns: [asofdate, value, description, keyid]
  - kind: not_null
    col: asofdate
  - kind: not_null
    col: value
  - kind: not_null
    col: description
  - kind: not_null
    col: keyid
  - kind: row_floor
    min: 273554
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
