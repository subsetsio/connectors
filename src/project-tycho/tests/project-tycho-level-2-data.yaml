spec_id: project-tycho-level-2-data
status: active
coverage:
  frozen: true
  reason: HealthData.gov mirror is a fixed historical Project Tycho release ending in 2013.
tests:
  - not_null: epi_week
    certainty: 95
  - not_null: disease
    certainty: 95
  - not_null: event
    certainty: 95
  - column_type: {col: epi_week, type: string}
    certainty: 95
  - column_type: {col: number, type: string}
    certainty: 95
  - matches: {col: epi_week, pattern: "^[0-9]{6}$"}
    reason: Project Tycho Level 2 encodes epidemiological year/week as YYYYWW text.
    certainty: 90
  - distinct_count: {col: disease, min: 40}
    reason: Level 2 covers many nationally notifiable diseases, not a one-disease slice.
    certainty: 85
  - row_count: {min: 3000000}
    reason: The Level 2 ZIP contains about 3.66 million CSV rows; a much smaller table is truncated.
    certainty: 90
