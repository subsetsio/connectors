spec_id: abuse-ch-threatfox-iocs
status: active
# Raw is the ThreatFox full CSV dump normalized to ndjson — all string values.
# One row per IOC, keyed by ioc_id.
tests:
  - not_null: ioc_id
    reason: every ThreatFox IOC carries a numeric id; a null means banner/comment rows leaked in
    certainty: 95
  - unique: ioc_id
    reason: the full dump carries one row per distinct IOC, keyed by ioc_id
    certainty: 95
  - matches: {col: ioc_id, pattern: '^[0-9]+$'}
    reason: ioc_id is an integer rendered as a decimal string
    certainty: 95
  - not_null: ioc_value
    reason: the indicator value (ip:port, domain, url, hash) is the payload of the row
    certainty: 95
  - matches: {col: confidence_level, pattern: '^[0-9]{1,3}$'}
    reason: ThreatFox confidence is an integer percentage 0-100 stored as a string
    certainty: 85
  - row_count: {min: 1000}
    reason: the ThreatFox full dump lists hundreds of thousands of IOCs; far fewer means a truncated download
    certainty: 85
    points_outward: true
    severity: warn
