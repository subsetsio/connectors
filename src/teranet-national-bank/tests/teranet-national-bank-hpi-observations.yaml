spec_id: teranet-national-bank-hpi-observations
status: active
tests:
  - not_null: index_id
    reason: every observation row is tied to a published HPI index id
    certainty: 98
  - not_null: period
    reason: every observation is monthly and derived from the payload start date plus array offset
    certainty: 98
  - column_type: {col: period, type: date}
    certainty: 95
  - column_type: {col: index_value, type: float}
    certainty: 95
  - unique: [index_id, period]
    reason: the visualizer arrays contain one value per index per month
    certainty: 95
  - row_count: {min: 10000}
    reason: about 33 series across monthly history from 1990 produces well over 10k rows; fewer suggests truncation
    certainty: 85
  - distinct_count: {col: index_id, min: 30}
    reason: the visualizer currently carries 33 index series; below 30 means major coverage loss
    certainty: 85
  - at_least: {col: period, expr: "1990-06-01"}
    reason: the source history begins in June 1990
    certainty: 95
  - freshness: {col: period, reaches: today - 70d}
    reason: source publishes monthly; 70 days allows for release lag while still catching stale downloads
    certainty: 85
    points_outward: true
