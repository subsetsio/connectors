spec_id: teranet-national-bank-hpi-series
status: active
coverage:
  frozen: true
  reason: series metadata has no row-level observation date; updates are captured by full monthly replacement with the visualizer payload
tests:
  - not_null: index_id
    reason: every profile row is keyed by the source's HPI index id
    certainty: 98
  - not_null: name
    reason: every profile row has an English display name
    certainty: 95
  - column_type: {col: latest_index_value, type: float}
    certainty: 90
  - unique: index_id
    reason: there is exactly one profile record per HPI index id
    certainty: 95
  - row_count: {min: 30, max: 60}
    reason: the visualizer currently carries 35 profiles; this loose range catches empty/truncated payloads without blocking small additions
    certainty: 85
  - distinct_count: {col: updates, min: 2}
    reason: profiles include monthly and quarterly update cadences
    certainty: 80
    severity: warn
