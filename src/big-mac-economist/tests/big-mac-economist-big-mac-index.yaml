spec_id: big-mac-economist-big-mac-index
status: active
tests:
  # --- identity / keys ------------------------------------------------------
  - not_null: date
    reason: every observation is a dated semiannual release; the fetch fn skips rows without a date, so the raw asset never carries a null date
    certainty: 99
  - column_type: {col: date, type: string}
    reason: dates are carried through verbatim as the CSV's ISO text (the parquet schema stores them as strings; the transform does the DATE cast)
    certainty: 95
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: the source CSV dates are ISO calendar dates (release dates like 2000-04-01, 2025-01-01)
    certainty: 95
  - not_null: iso_a3
    reason: the full index identifies each row by an ISO-3166 alpha-3 country/region code (e.g. USA, EUZ for the euro area)
    certainty: 90
  - matches: {col: iso_a3, pattern: '^[A-Z]{3}$'}
    reason: iso_a3 is a 3-letter uppercase region code
    certainty: 85
  - not_null: currency_code
    reason: each row carries the local currency's ISO-4217 code
    certainty: 90
  - not_null: name
    reason: each row carries the country/region display name
    certainty: 95
  - unique: [date, iso_a3]
    reason: one row per country/region per release date; a duplicate means the parse double-counted or the raw was appended without overwrite
    certainty: 90

  # --- core price columns ---------------------------------------------------
  - not_null: local_price
    reason: the local Big Mac price is the core observed input and is present on every row
    certainty: 95
  - column_type: {col: local_price, type: float}
    reason: parsed via _parse_float into a float64 column
    certainty: 95
  - at_least: {col: local_price, expr: 0}
    reason: a local Big Mac price is a positive amount of local currency
    certainty: 95
  - not_null: dollar_ex
    reason: the USD exchange rate (local per USD) is present on every row; dollar_price is derived from it
    certainty: 90
  - at_least: {col: dollar_ex, expr: 0}
    reason: an exchange rate is strictly positive
    certainty: 95
  - not_null: dollar_price
    reason: dollar_price = local_price / dollar_ex is the headline figure and is populated for every row
    certainty: 95
  - between: {col: dollar_price, lo: 0, hi: 25}
    reason: a Big Mac in USD has historically ranged roughly 1-8; 25 is a generous ceiling guarding against a unit/parse error
    certainty: 85
    severity: warn

  # --- coverage / shape -----------------------------------------------------
  - row_count: {min: 1000}
    reason: ~50 countries x ~50 semiannual releases since 2000 gives well over a thousand rows; far fewer means the parse dropped data
    certainty: 90
  - distinct_count: {col: iso_a3, min: 20}
    reason: the index covers ~50 countries/regions; collapsing below 20 means the catalog parse broke
    certainty: 85
  - freshness: {col: date, reaches: today - 2y}
    reason: the Economist refreshes the file semiannually (Jan/Jul), so the latest release date should be within the last ~2 years
    certainty: 70
    points_outward: true
    severity: warn
