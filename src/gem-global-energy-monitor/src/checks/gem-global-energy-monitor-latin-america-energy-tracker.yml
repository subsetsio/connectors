# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [gem_unit_id, wiki_url, plant_name, gem_location_id, parent_gem_entity_id]
checks:
  - kind: unique
    columns: [gem_unit_id, wiki_url, plant_name, gem_location_id, parent_gem_entity_id]
  - kind: not_null
    col: gem_unit_id
  - kind: not_null
    col: wiki_url
  - kind: not_null
    col: plant_name
  - kind: not_null
    col: gem_location_id
  - kind: not_null
    col: parent_gem_entity_id
  - kind: row_floor
    min: 575
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
