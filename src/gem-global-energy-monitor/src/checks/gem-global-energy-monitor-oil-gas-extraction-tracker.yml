# compiled by `hardened compile-checks` — post-publish audit of `gem-global-energy-monitor-oil-gas-extraction-tracker`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unit_name, wiki_url_field, unit_id, country_area, fuel_type]
checks:
  - kind: unique
    columns: [unit_name, wiki_url_field, unit_id, country_area, fuel_type]
  - kind: not_null
    col: unit_name
  - kind: not_null
    col: wiki_url_field
  - kind: not_null
    col: unit_id
  - kind: not_null
    col: country_area
  - kind: not_null
    col: fuel_type
  - kind: row_floor
    min: 3836
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
