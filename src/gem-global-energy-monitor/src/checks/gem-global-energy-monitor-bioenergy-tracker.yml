# compiled by `hardened compile-checks` — post-publish audit of `gem-global-energy-monitor-bioenergy-tracker`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date_last_researched, gem_phase_id]
temporal: date_last_researched
checks:
  - kind: unique
    columns: [date_last_researched, gem_phase_id]
  - kind: not_null
    col: date_last_researched
  - kind: not_null
    col: gem_phase_id
  - kind: row_floor
    min: 2268
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
