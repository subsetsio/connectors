# compiled by `hardened compile-checks` — post-publish audit of `caiso-ene-cb-clr-awards`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [intervalendtime_gmt, node_id, intervalstarttime_gmt, opr_dt]
temporal: intervalstarttime_gmt
checks:
  - kind: unique
    columns: [intervalendtime_gmt, node_id, intervalstarttime_gmt, opr_dt]
  - kind: not_null
    col: intervalendtime_gmt
  - kind: not_null
    col: node_id
  - kind: not_null
    col: intervalstarttime_gmt
  - kind: not_null
    col: opr_dt
  - kind: row_floor
    min: 69351
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
