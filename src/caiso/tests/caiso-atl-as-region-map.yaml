spec_id: caiso-atl-as-region-map
coverage:
  frozen: true
  reason: Atlas AS-region mappings are effective-dated reference data; EFF_START_DT_GMT is a validity bound, not a publication freshness axis.
status: active
tests:
  - not_null: AS_REGION_ID
    reason: PNode to ancillary-services-region map — AS_REGION_ID is the dimension key present on every row
    certainty: 90
  - column_type: {col: AS_REGION_ID, type: string}
    reason: OASIS atlas ids are alphanumeric labels, not numerics
    certainty: 85
  - not_null: EFF_START_DT_GMT
    reason: every atlas row carries an effective-start stamp bounding its validity period
    certainty: 80
    severity: warn
