spec_id: caiso-atl-tac-area-map
coverage:
  frozen: true
  reason: Atlas TAC-area mappings are effective-dated reference data; EFF_START_DT is a validity bound, not a publication freshness axis.
status: active
tests:
  - not_null: TAC_AREA_ID
    reason: PNode to TAC-area map — TAC_AREA_ID is the dimension key present on every row
    certainty: 90
  - column_type: {col: TAC_AREA_ID, type: string}
    reason: OASIS atlas ids are alphanumeric labels, not numerics
    certainty: 85
  - not_null: EFF_START_DT_GMT
    reason: every atlas row carries an effective-start stamp bounding its validity period
    certainty: 80
    severity: warn
