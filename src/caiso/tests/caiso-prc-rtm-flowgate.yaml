spec_id: caiso-prc-rtm-flowgate
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    reason: every OASIS report row is interval-stamped (GMT)
    certainty: 95
  - column_type: {col: INTERVALSTARTTIME_GMT, type: timestamp}
    reason: OASIS emits ISO-8601 strings with a -0000 offset
    certainty: 90
  - not_null: TI_ID
    reason: the transmission-interface id keys each intertie constraint shadow-price row
    certainty: 85
  - column_type: {col: PRC, type: float}
    reason: PRC is the shadow price in $/MWh
    certainty: 80
  - freshness: {col: INTERVALSTARTTIME_GMT, reaches: today - 14d}
    reason: the fetch walks the date window up to the current day; RTM prices publish near-real-time
    certainty: 65
    points_outward: true
