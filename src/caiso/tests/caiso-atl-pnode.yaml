spec_id: caiso-atl-pnode
coverage:
  frozen: true
  reason: Atlas PNode records are effective-dated reference data; EFF_START_DT_GMT is a validity bound, not a publication freshness axis.
status: active
tests:
  - not_null: PNODE_ID
    reason: pricing-node (PNode) listing — PNODE_ID is the dimension key present on every row
    certainty: 90
  - column_type: {col: PNODE_ID, type: string}
    reason: OASIS atlas ids are alphanumeric labels, not numerics
    certainty: 85
  - not_null: EFF_START_DT_GMT
    reason: every atlas row carries an effective-start stamp bounding its validity period
    certainty: 80
    severity: warn
