spec_id: caiso-atl-resource
coverage:
  frozen: true
  reason: Atlas resource records are effective-dated reference data; EFF_START_DT_GMT is a validity bound, not a publication freshness axis.
status: active
tests:
  - not_null: RESOURCE_ID
    reason: generation/resource listing — RESOURCE_ID is the dimension key present on every row
    certainty: 90
  - column_type: {col: RESOURCE_ID, type: string}
    reason: OASIS atlas ids are alphanumeric labels, not numerics
    certainty: 85
  - not_null: EFF_START_DT_GMT
    reason: every atlas row carries an effective-start stamp bounding its validity period
    certainty: 80
    severity: warn
