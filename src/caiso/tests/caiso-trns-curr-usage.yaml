spec_id: caiso-trns-curr-usage
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    reason: every OASIS report row is interval-stamped (GMT)
    certainty: 95
  - column_type: {col: INTERVALSTARTTIME_GMT, type: timestamp}
    reason: OASIS emits ISO-8601 strings with a -0000 offset
    certainty: 90
  - not_null: TI_ID
    reason: the transmission-interface id keys each usage row
    certainty: 85
  - not_null: TI_DIRECTION
    reason: usage is directional (import/export) per interface
    certainty: 80
    severity: warn
  - column_type: {col: MW, type: float}
    reason: MW is the capacity/usage value
    certainty: 75
    severity: warn
  - freshness: {col: INTERVALSTARTTIME_GMT, reaches: today - 14d}
    reason: the fetch walks the date window up to the current day; current-usage is updated continuously
    certainty: 65
    points_outward: true
