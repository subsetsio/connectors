spec_id: caiso-prc-nomogram
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    reason: every OASIS report row is interval-stamped (GMT)
    certainty: 95
  - column_type: {col: INTERVALSTARTTIME_GMT, type: timestamp}
    reason: OASIS emits ISO-8601 strings with a -0000 offset
    certainty: 90
  - not_null: NOMOGRAM_ID
    reason: the nomogram/branch constraint id keys each shadow-price row
    certainty: 85
  - column_type: {col: PRC, type: float}
    reason: PRC is the shadow price in $/MWh
    certainty: 80
  - enum: {col: MARKET_RUN_ID, values: [DAM, HASP]}
    reason: rows are filtered to the market_run_id values this report is queried for
    certainty: 80
    severity: warn
  - freshness: {col: INTERVALSTARTTIME_GMT, reaches: today - 14d}
    reason: the fetch walks the date window up to the current day; DAM nomogram prices publish day-ahead
    certainty: 65
    points_outward: true
