spec_id: caiso-ene-mpm
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    reason: every OASIS report row is interval-stamped (GMT); a null means the CSV layout changed underneath us
    certainty: 95
  - column_type: {col: INTERVALSTARTTIME_GMT, type: timestamp}
    reason: OASIS emits ISO-8601 strings with a -0000 offset
    certainty: 90
  - not_null: OPR_DT
    reason: the operating-date column is populated on every row
    certainty: 90
  - column_type: {col: OPR_HR, type: integer}
    reason: OPR_HR is the integer CAISO trading hour
    certainty: 85
  - not_null: FLAG
    reason: the mitigation flag (Y/N) is the report's payload and is set on every interval
    certainty: 75
    severity: warn
  - freshness: {col: INTERVALSTARTTIME_GMT, reaches: today - 14d}
    reason: the fetch walks the date window up to the current day; MPM status is published near-real-time
    certainty: 65
    points_outward: true
