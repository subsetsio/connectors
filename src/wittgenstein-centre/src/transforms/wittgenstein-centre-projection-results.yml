key: [region, year, sex, edu, age_start, scenario]
temporal: year
sort: [year, region, sex, edu, age_start, scenario]
columns:
  - name: region
    type: VARCHAR
    description: WIC region or country code; includes countries and regional aggregates.
  - name: region_name
    type: VARCHAR
    description: Region or country name decoded from the source recode dictionary.
  - name: year
    type: INTEGER
    description: Projection year.
  - name: sex
    type: VARCHAR
    description: Sex code.
  - name: edu
    type: VARCHAR
    description: Education category code.
  - name: edu_label
    type: VARCHAR
    description: Education category label decoded from the source recode dictionary.
  - name: age_start
    type: INTEGER
    description: Starting age of the five-year age group.
  - name: scenario
    type: VARCHAR
    description: Shared Socioeconomic Pathway scenario code.
  - name: population
    type: DOUBLE
    description: Projected population count, in thousands.
  - name: births
    type: DOUBLE
    description: Projected births, in thousands.
  - name: emigrants
    type: DOUBLE
    description: Projected emigrants, in thousands.
  - name: immigrants
    type: DOUBLE
    description: Projected immigrants, in thousands.
  - name: deaths
    type: DOUBLE
    description: Projected deaths, in thousands.
