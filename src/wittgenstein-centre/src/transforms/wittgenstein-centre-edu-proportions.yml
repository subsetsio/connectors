    type: VARCHAR
    description: Region or country name decoded from the source recode dictionary.
  - name: year
    type: INTEGER
    description: Projection year.
  - name: sex
    type: VARCHAR
    description: Sex code.
  - name: edu
    type: VARCHAR
    description: Education category code.
