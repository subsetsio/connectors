# compiled by `hardened compile-checks` — post-publish audit of `nisra-megpalrei`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, friend, minority_ethnic_community, tlist_a1, year]
checks:
  - kind: unique
    columns: [value, friend, minority_ethnic_community, tlist_a1, year]
  - kind: not_null
    col: value
  - kind: not_null
    col: friend
  - kind: not_null
    col: minority_ethnic_community
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: row_floor
    min: 66
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
