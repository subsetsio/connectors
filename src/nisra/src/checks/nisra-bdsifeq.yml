# compiled by `hardened compile-checks` — post-publish audit of `nisra-bdsifeq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, internet_function, intfun, eqgrp, equality_group]
checks:
  - kind: unique
    columns: [value, internet_function, intfun, eqgrp, equality_group]
  - kind: not_null
    col: value
  - kind: not_null
    col: internet_function
  - kind: not_null
    col: intfun
  - kind: not_null
    col: eqgrp
  - kind: not_null
    col: equality_group
  - kind: row_floor
    min: 195
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
