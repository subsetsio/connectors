# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni43`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, roilgd, county, statistic, statistic_label]
checks:
  - kind: unique
    columns: [value, roilgd, county, statistic, statistic_label]
  - kind: not_null
    col: value
  - kind: not_null
    col: roilgd
  - kind: not_null
    col: county
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: row_floor
    min: 32
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
