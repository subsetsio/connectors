# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni03`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, census_year, ur_sex, sex]
checks:
  - kind: unique
    columns: [value, tlist_a1, census_year, ur_sex, sex]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: census_year
  - kind: not_null
    col: ur_sex
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 33
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
