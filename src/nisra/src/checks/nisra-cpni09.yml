# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni09`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [hh_comp, household_composition, statistic, statistic_label, niroi]
checks:
  - kind: unique
    columns: [hh_comp, household_composition, statistic, statistic_label, niroi]
  - kind: not_null
    col: hh_comp
  - kind: not_null
    col: household_composition
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: niroi
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
