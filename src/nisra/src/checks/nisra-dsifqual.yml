# compiled by `hardened compile-checks` — post-publish audit of `nisra-dsifqual`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [intfun, internet_function, statistic, statistic_label, highest_qualification_agg3]
checks:
  - kind: unique
    columns: [intfun, internet_function, statistic, statistic_label, highest_qualification_agg3]
  - kind: not_null
    col: intfun
  - kind: not_null
    col: internet_function
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: highest_qualification_agg3
  - kind: row_floor
    min: 67
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
