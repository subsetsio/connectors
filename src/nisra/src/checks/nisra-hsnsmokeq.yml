# compiled by `hardened compile-checks` — post-publish audit of `nisra-hsnsmokeq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, eqgrp, tlist_a1, financial_year, equality_group]
checks:
  - kind: unique
    columns: [value, eqgrp, tlist_a1, financial_year, equality_group]
  - kind: not_null
    col: value
  - kind: not_null
    col: eqgrp
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: financial_year
  - kind: not_null
    col: equality_group
  - kind: row_floor
    min: 510
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
