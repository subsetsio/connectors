    columns: [statistic, statistic_label, tlist_a1, year, lgd2014, local_government_district, camera_type, camera_type_2, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: lgd2014
  - kind: not_null
    col: local_government_district
  - kind: not_null
    col: camera_type
  - kind: not_null
    col: camera_type_2
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 216
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
