    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: financial_year
  - kind: not_null
    col: hsct
  - kind: not_null
    col: health_and_social_care_trust
  - kind: not_null
    col: dis
  - kind: not_null
    col: disease
  - kind: not_null
    col: unit
