    col: age
  - kind: not_null
    col: age_band
  - kind: not_null
    col: econ_activity
  - kind: not_null
    col: economic_activity
  - kind: row_floor
    min: 18
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
