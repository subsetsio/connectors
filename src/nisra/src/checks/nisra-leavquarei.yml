# compiled by `hardened compile-checks` — post-publish audit of `nisra-leavquarei`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tlist_a1, academic_year, statistic, statistic_label, meg]
checks:
  - kind: unique
    columns: [tlist_a1, academic_year, statistic, statistic_label, meg]
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: academic_year
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: meg
  - kind: row_floor
    min: 22
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
