# compiled by `hardened compile-checks` — post-publish audit of `nisra-bdsifqual`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, internet_function, intfun, highest_qualification_agg3, statistic]
checks:
  - kind: unique
    columns: [value, internet_function, intfun, highest_qualification_agg3, statistic]
  - kind: not_null
    col: value
  - kind: not_null
    col: internet_function
  - kind: not_null
    col: intfun
  - kind: not_null
    col: highest_qualification_agg3
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 39
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
