# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni24`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, general_health, general_health_2, statistic, niroi]
checks:
  - kind: unique
    columns: [value, general_health, general_health_2, statistic, niroi]
  - kind: not_null
    col: value
  - kind: not_null
    col: general_health
  - kind: not_null
    col: general_health_2
  - kind: not_null
    col: statistic
  - kind: not_null
    col: niroi
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
