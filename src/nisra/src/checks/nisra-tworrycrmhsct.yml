# compiled by `hardened compile-checks` — post-publish audit of `nisra-tworrycrmhsct`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic_label, health_and_social_care_trust, statistic, hsct, tlist_a1]
checks:
  - kind: unique
    columns: [statistic_label, health_and_social_care_trust, statistic, hsct, tlist_a1]
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: health_and_social_care_trust
  - kind: not_null
    col: statistic
  - kind: not_null
    col: hsct
  - kind: not_null
    col: tlist_a1
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
