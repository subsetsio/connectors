# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni14`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ethnicity, ethnicity_label, statistic, niroi, ireland_and_northern_ireland]
checks:
  - kind: unique
    columns: [ethnicity, ethnicity_label, statistic, niroi, ireland_and_northern_ireland]
  - kind: not_null
    col: ethnicity
  - kind: not_null
    col: ethnicity_label
  - kind: not_null
    col: statistic
  - kind: not_null
    col: niroi
  - kind: not_null
    col: ireland_and_northern_ireland
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
