# compiled by `hardened compile-checks` — post-publish audit of `nisra-mrgmthd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, mrgmthd, method_of_celebration]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, mrgmthd, method_of_celebration]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: mrgmthd
  - kind: not_null
    col: method_of_celebration
  - kind: row_floor
    min: 483
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
