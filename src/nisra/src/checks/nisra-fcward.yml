# compiled by `hardened compile-checks` — post-publish audit of `nisra-fcward`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_a1, year, ward2014, ward, unit]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_a1, year, ward2014, ward, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: ward2014
  - kind: not_null
    col: ward
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 125010
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
