    col: statistic
  - kind: not_null
    col: lgd2014
  - kind: not_null
    col: cahs
  - kind: not_null
    col: local_government_district
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
