# compiled by `hardened compile-checks` — post-publish audit of `nisra-descphsct`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_a1, academic_year, health_and_social_care_trust]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_a1, academic_year, health_and_social_care_trust]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: academic_year
  - kind: not_null
    col: health_and_social_care_trust
  - kind: row_floor
    min: 384
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
