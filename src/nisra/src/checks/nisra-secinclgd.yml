# compiled by `hardened compile-checks` — post-publish audit of `nisra-secinclgd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, statistic, statistic_label, lgd2014, tlist_a1]
checks:
  - kind: unique
    columns: [value, statistic, statistic_label, lgd2014, tlist_a1]
  - kind: not_null
    col: value
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: lgd2014
  - kind: not_null
    col: tlist_a1
  - kind: row_floor
    min: 780
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
