# compiled by `hardened compile-checks` — post-publish audit of `nisra-nicsemp08`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, sex, sex_label]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, sex, sex_label]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: sex
  - kind: not_null
    col: sex_label
  - kind: row_floor
    min: 63
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
