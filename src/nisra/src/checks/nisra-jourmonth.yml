# compiled by `hardened compile-checks` — post-publish audit of `nisra-jourmonth`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_m1, month, mode, transport_mode]
checks:
  - kind: unique
    columns: [value, tlist_m1, month, mode, transport_mode]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_m1
  - kind: not_null
    col: month
  - kind: not_null
    col: mode
  - kind: not_null
    col: transport_mode
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
