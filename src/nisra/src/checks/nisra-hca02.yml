# compiled by `hardened compile-checks` — post-publish audit of `nisra-hca02`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, county, county_belfast_dublin_city_separated, statistic, statistic_label]
checks:
  - kind: unique
    columns: [value, county, county_belfast_dublin_city_separated, statistic, statistic_label]
  - kind: not_null
    col: value
  - kind: not_null
    col: county
  - kind: not_null
    col: county_belfast_dublin_city_separated
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: row_floor
    min: 391
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
