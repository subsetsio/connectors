# compiled by `hardened compile-checks` — post-publish audit of `nisra-nibobus`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [coown, country_of_ownership, value, tlist_a1, year]
checks:
  - kind: unique
    columns: [coown, country_of_ownership, value, tlist_a1, year]
  - kind: not_null
    col: coown
  - kind: not_null
    col: country_of_ownership
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: row_floor
    min: 450
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
