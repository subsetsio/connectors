# compiled by `hardened compile-checks` — post-publish audit of `nisra-mrgtyp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, mrgtyp, type_of_marriage]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, mrgtyp, type_of_marriage]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: mrgtyp
  - kind: not_null
    col: type_of_marriage
  - kind: row_floor
    min: 276
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
