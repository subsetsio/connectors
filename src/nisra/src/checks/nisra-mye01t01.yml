# compiled by `hardened compile-checks` — post-publish audit of `nisra-mye01t01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, fiveyrage, five_year_age_bands]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, fiveyrage, five_year_age_bands]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: fiveyrage
  - kind: not_null
    col: five_year_age_bands
  - kind: row_floor
    min: 1620
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
