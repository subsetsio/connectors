# compiled by `hardened compile-checks` — post-publish audit of `nisra-hca03`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, urban_ruraldistrict, urban_rural_district, statistic, statistic_label]
checks:
  - kind: unique
    columns: [value, urban_ruraldistrict, urban_rural_district, statistic, statistic_label]
  - kind: not_null
    col: value
  - kind: not_null
    col: urban_ruraldistrict
  - kind: not_null
    col: urban_rural_district
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: row_floor
    min: 3553
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
