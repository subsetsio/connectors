# compiled by `hardened compile-checks` — post-publish audit of `nisra-socecrei`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [socio_economic_classification, socen, statistic, statistics, meg]
checks:
  - kind: unique
    columns: [socio_economic_classification, socen, statistic, statistics, meg]
  - kind: not_null
    col: socio_economic_classification
  - kind: not_null
    col: socen
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistics
  - kind: not_null
    col: meg
  - kind: row_floor
    min: 20
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
