# compiled by `hardened compile-checks` — post-publish audit of `nisra-fdie`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [regiondir, region_and_direction_of_investment, tlist_a1, year]
checks:
  - kind: unique
    columns: [regiondir, region_and_direction_of_investment, tlist_a1, year]
  - kind: not_null
    col: regiondir
  - kind: not_null
    col: region_and_direction_of_investment
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: row_floor
    min: 28
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
