# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni20`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, religion, religion_label, statistic, niroi]
checks:
  - kind: unique
    columns: [value, religion, religion_label, statistic, niroi]
  - kind: not_null
    col: value
  - kind: not_null
    col: religion
  - kind: not_null
    col: religion_label
  - kind: not_null
    col: statistic
  - kind: not_null
    col: niroi
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
