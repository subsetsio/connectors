# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni36`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, ur_sex, sex, niroi, ireland_and_northern_ireland]
checks:
  - kind: unique
    columns: [value, ur_sex, sex, niroi, ireland_and_northern_ireland]
  - kind: not_null
    col: value
  - kind: not_null
    col: ur_sex
  - kind: not_null
    col: sex
  - kind: not_null
    col: niroi
  - kind: not_null
    col: ireland_and_northern_ireland
  - kind: row_floor
    min: 3
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
