# compiled by `hardened compile-checks` — post-publish audit of `nisra-qce01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_q1, quarter, sector, industry_sector]
checks:
  - kind: unique
    columns: [value, tlist_q1, quarter, sector, industry_sector]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_q1
  - kind: not_null
    col: quarter
  - kind: not_null
    col: sector
  - kind: not_null
    col: industry_sector
  - kind: row_floor
    min: 255
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
