    col: countylgd
  - kind: not_null
    col: county_local_government_district
  - kind: not_null
    col: statistic
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 44
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
