# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpdsltns`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, dissolution_sex, dsltnsx]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, dissolution_sex, dsltnsx]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: dissolution_sex
  - kind: not_null
    col: dsltnsx
  - kind: row_floor
    min: 21
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
