    col: dea2014
  - kind: not_null
    col: district_electoral_area
  - kind: not_null
    col: hh_comp
  - kind: not_null
    col: household_composition
  - kind: row_floor
    min: 648
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
