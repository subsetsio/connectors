# compiled by `hardened compile-checks` — post-publish audit of `nisra-tniscscrimehsct`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, health_and_social_care_trust, statistic, statistic_label, hsct]
checks:
  - kind: unique
    columns: [value, health_and_social_care_trust, statistic, statistic_label, hsct]
  - kind: not_null
    col: value
  - kind: not_null
    col: health_and_social_care_trust
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: hsct
  - kind: row_floor
    min: 30
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
