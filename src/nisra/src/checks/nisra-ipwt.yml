# compiled by `hardened compile-checks` — post-publish audit of `nisra-ipwt`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_q1, quarter, hsct, health_and_social_care_trust, spec, specialty, unit]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_q1, quarter, hsct, health_and_social_care_trust, spec, specialty, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_q1
  - kind: not_null
    col: quarter
  - kind: not_null
    col: hsct
  - kind: not_null
    col: health_and_social_care_trust
  - kind: not_null
    col: spec
  - kind: not_null
    col: specialty
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 65660
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
