# compiled by `hardened compile-checks` — post-publish audit of `nisra-dslvldq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, dsl, digital_skill_level, statistic, statistic_label]
checks:
  - kind: unique
    columns: [value, dsl, digital_skill_level, statistic, statistic_label]
  - kind: not_null
    col: value
  - kind: not_null
    col: dsl
  - kind: not_null
    col: digital_skill_level
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: row_floor
    min: 8
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
