# compiled by `hardened compile-checks` — post-publish audit of `nisra-electdea`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dea2014, district_electoral_area, statistic, statistic_label]
checks:
  - kind: unique
    columns: [dea2014, district_electoral_area, statistic, statistic_label]
  - kind: not_null
    col: dea2014
  - kind: not_null
    col: district_electoral_area
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: row_floor
    min: 121
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
