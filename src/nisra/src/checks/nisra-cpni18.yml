# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni18`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_a1, census_year, niroi, ireland_and_northern_ireland, languagespoken, language_spoken, unit]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_a1, census_year, niroi, ireland_and_northern_ireland, languagespoken, language_spoken, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: census_year
  - kind: not_null
    col: niroi
  - kind: not_null
    col: ireland_and_northern_ireland
  - kind: not_null
    col: languagespoken
  - kind: not_null
    col: language_spoken
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 32
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
