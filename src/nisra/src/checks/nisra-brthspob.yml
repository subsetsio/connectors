# compiled by `hardened compile-checks` — post-publish audit of `nisra-brthspob`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, pob, place_of_birth, tlist_a1, year]
checks:
  - kind: unique
    columns: [value, pob, place_of_birth, tlist_a1, year]
  - kind: not_null
    col: value
  - kind: not_null
    col: pob
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: row_floor
    min: 82
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
