# compiled by `hardened compile-checks` — post-publish audit of `nisra-msa19`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, census_year, cob_hist, country_of_birth]
checks:
  - kind: unique
    columns: [value, tlist_a1, census_year, cob_hist, country_of_birth]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: census_year
  - kind: not_null
    col: cob_hist
  - kind: not_null
    col: country_of_birth
  - kind: row_floor
    min: 34
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
