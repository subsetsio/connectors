# compiled by `hardened compile-checks` — post-publish audit of `nisra-nihpivs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tlist_q1, quarter, acctype, accommodation_type]
checks:
  - kind: unique
    columns: [tlist_q1, quarter, acctype, accommodation_type]
  - kind: not_null
    col: tlist_q1
  - kind: not_null
    col: quarter
  - kind: not_null
    col: acctype
  - kind: not_null
    col: accommodation_type
  - kind: row_floor
    min: 212
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
