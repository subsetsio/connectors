# compiled by `hardened compile-checks` — post-publish audit of `nisra-brthsage`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, year, mthrage, mother_s_age]
checks:
  - kind: unique
    columns: [value, tlist_a1, year, mthrage, mother_s_age]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: mthrage
  - kind: not_null
    col: mother_s_age
  - kind: row_floor
    min: 1020
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
