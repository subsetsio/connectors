# compiled by `hardened compile-checks` — post-publish audit of `nisra-nicei`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tlist_q1, quarter, indices, indices_label, statistic]
checks:
  - kind: unique
    columns: [tlist_q1, quarter, indices, indices_label, statistic]
  - kind: not_null
    col: tlist_q1
  - kind: not_null
    col: quarter
  - kind: not_null
    col: indices
  - kind: not_null
    col: indices_label
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 729
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
