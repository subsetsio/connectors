# compiled by `hardened compile-checks` — post-publish audit of `nisra-abiru`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tlist_a1, year, standard_industrial_classification_section, sic1, statistic]
checks:
  - kind: unique
    columns: [tlist_a1, year, standard_industrial_classification_section, sic1, statistic]
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: year
  - kind: not_null
    col: standard_industrial_classification_section
  - kind: not_null
    col: sic1
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 315
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
