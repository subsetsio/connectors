# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni40`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_band_agg7, age_7_cats, ur_sex, sex, statistic]
checks:
  - kind: unique
    columns: [age_band_agg7, age_7_cats, ur_sex, sex, statistic]
  - kind: not_null
    col: age_band_agg7
  - kind: not_null
    col: age_7_cats
  - kind: not_null
    col: ur_sex
  - kind: not_null
    col: sex
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 21
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
