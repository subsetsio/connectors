# compiled by `hardened compile-checks` — post-publish audit of `nisra-cpni17`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, place_of_birth, placebirth, statistic, niroi]
checks:
  - kind: unique
    columns: [value, place_of_birth, placebirth, statistic, niroi]
  - kind: not_null
    col: value
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: placebirth
  - kind: not_null
    col: statistic
  - kind: not_null
    col: niroi
  - kind: row_floor
    min: 16
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
