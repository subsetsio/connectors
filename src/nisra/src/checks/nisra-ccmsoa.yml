# compiled by `hardened compile-checks` — post-publish audit of `nisra-ccmsoa`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [super_output_area, soa, value, tlist_m1, month]
checks:
  - kind: unique
    columns: [super_output_area, soa, value, tlist_m1, month]
  - kind: not_null
    col: super_output_area
  - kind: not_null
    col: soa
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_m1
  - kind: not_null
    col: month
  - kind: row_floor
    min: 46777
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
