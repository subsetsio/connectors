# compiled by `hardened compile-checks` — post-publish audit of `nisra-c21515eq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, eqgrp, equality_group, diststudy, distance_to_study]
checks:
  - kind: unique
    columns: [value, eqgrp, equality_group, diststudy, distance_to_study]
  - kind: not_null
    col: value
  - kind: not_null
    col: eqgrp
  - kind: not_null
    col: equality_group
  - kind: not_null
    col: diststudy
  - kind: not_null
    col: distance_to_study
  - kind: row_floor
    min: 266
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
