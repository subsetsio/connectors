# compiled by `hardened compile-checks` — post-publish audit of `nisra-uk10`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, ctry24cd, country, unpaid_care_agg5, provision_of_unpaid_care]
checks:
  - kind: unique
    columns: [value, ctry24cd, country, unpaid_care_agg5, provision_of_unpaid_care]
  - kind: not_null
    col: value
  - kind: not_null
    col: ctry24cd
  - kind: not_null
    col: country
  - kind: not_null
    col: unpaid_care_agg5
  - kind: not_null
    col: provision_of_unpaid_care
  - kind: row_floor
    min: 175
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
