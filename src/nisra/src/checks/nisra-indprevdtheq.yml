# compiled by `hardened compile-checks` — post-publish audit of `nisra-indprevdtheq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, tlist_a1, grouped_year, equalgroups, equality_groups]
checks:
  - kind: unique
    columns: [value, tlist_a1, grouped_year, equalgroups, equality_groups]
  - kind: not_null
    col: value
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: grouped_year
  - kind: not_null
    col: equalgroups
  - kind: not_null
    col: equality_groups
  - kind: row_floor
    min: 100
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
