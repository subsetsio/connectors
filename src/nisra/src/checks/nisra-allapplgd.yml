# compiled by `hardened compile-checks` — post-publish audit of `nisra-allapplgd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_a1, academic_year, lgd, local_government_district, apptype, type_of_apprenticeship, unit]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_a1, academic_year, lgd, local_government_district, apptype, type_of_apprenticeship, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: academic_year
  - kind: not_null
    col: lgd
  - kind: not_null
    col: local_government_district
  - kind: not_null
    col: apptype
  - kind: not_null
    col: type_of_apprenticeship
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 416
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
