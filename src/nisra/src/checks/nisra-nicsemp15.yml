# compiled by `hardened compile-checks` — post-publish audit of `nisra-nicsemp15`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, grade_level, dprtmnt, department, grade]
checks:
  - kind: unique
    columns: [value, grade_level, dprtmnt, department, grade]
  - kind: not_null
    col: value
  - kind: not_null
    col: grade_level
  - kind: not_null
    col: dprtmnt
  - kind: not_null
    col: department
  - kind: not_null
    col: grade
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
