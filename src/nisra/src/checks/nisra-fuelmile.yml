# compiled by `hardened compile-checks` — post-publish audit of `nisra-fuelmile`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [statistic, statistic_label, tlist_a1, financial_year, buses, bus_type, fuel, fuel_type, unit]
checks:
  - kind: unique
    columns: [statistic, statistic_label, tlist_a1, financial_year, buses, bus_type, fuel, fuel_type, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: financial_year
  - kind: not_null
    col: buses
  - kind: not_null
    col: bus_type
  - kind: not_null
    col: fuel
  - kind: not_null
    col: fuel_type
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 18
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
