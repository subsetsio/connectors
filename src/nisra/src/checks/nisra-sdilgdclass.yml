# compiled by `hardened compile-checks` — post-publish audit of `nisra-sdilgdclass`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, lgd2014, local_government_district, road_class, class]
checks:
  - kind: unique
    columns: [value, lgd2014, local_government_district, road_class, class]
  - kind: not_null
    col: value
  - kind: not_null
    col: lgd2014
  - kind: not_null
    col: local_government_district
  - kind: not_null
    col: road_class
  - kind: not_null
    col: class
  - kind: row_floor
    min: 36
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
