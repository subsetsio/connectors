    columns: [statistic, statistic_label, tlist_a1, ad_hoc_year, soa, super_output_area, cad, crime_and_disorder, unit]
  - kind: not_null
    col: statistic
  - kind: not_null
    col: statistic_label
  - kind: not_null
    col: tlist_a1
  - kind: not_null
    col: ad_hoc_year
  - kind: not_null
    col: soa
  - kind: not_null
    col: super_output_area
  - kind: not_null
    col: cad
  - kind: not_null
    col: crime_and_disorder
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 6230
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
