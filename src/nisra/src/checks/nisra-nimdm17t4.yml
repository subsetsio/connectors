# compiled by `hardened compile-checks` — post-publish audit of `nisra-nimdm17t4`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, super_output_area, soa, ats, access_to_services]
checks:
  - kind: unique
    columns: [value, super_output_area, soa, ats, access_to_services]
  - kind: not_null
    col: value
  - kind: not_null
    col: super_output_area
  - kind: not_null
    col: soa
  - kind: not_null
    col: ats
  - kind: not_null
    col: access_to_services
  - kind: row_floor
    min: 1780
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
