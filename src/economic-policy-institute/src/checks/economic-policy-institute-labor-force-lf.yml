# compiled by `hardened compile-checks` — post-publish audit of `economic-policy-institute-labor-force-lf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, frequency, indicator, measure, geo_type, geo_name, geo_code, group_name, group_value]
temporal: date
checks:
  - kind: unique
    columns: [date, frequency, indicator, measure, geo_type, geo_name, geo_code, group_name, group_value]
  - kind: not_null
    col: date
  - kind: not_null
    col: frequency
  - kind: not_null
    col: indicator
  - kind: not_null
    col: measure
  - kind: not_null
    col: geo_type
  - kind: not_null
    col: geo_name
  - kind: not_null
    col: geo_code
  - kind: not_null
    col: group_name
  - kind: not_null
    col: group_value
  - kind: row_floor
    min: 785438
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
