# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-nicp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, nbb_coicop, index_base, obs_status]
checks:
  - kind: unique
    columns: [obs_value, time_period, nbb_coicop, index_base, obs_status]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: nbb_coicop
  - kind: not_null
    col: index_base
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 48246
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
