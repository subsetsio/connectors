# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-indprod`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, nbb_prod_sector, adjustment, be_area]
temporal: time_period
checks:
  - kind: unique
    columns: [obs_value, time_period, nbb_prod_sector, adjustment, be_area]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: nbb_prod_sector
  - kind: not_null
    col: adjustment
  - kind: not_null
    col: be_area
  - kind: row_floor
    min: 125631
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
