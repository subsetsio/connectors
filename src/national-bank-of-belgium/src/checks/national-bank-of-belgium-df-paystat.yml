# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-paystat`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [paystat_item, time_period, paystat_type, freq]
checks:
  - kind: unique
    columns: [paystat_item, time_period, paystat_type, freq]
  - kind: not_null
    col: paystat_item
  - kind: not_null
    col: time_period
  - kind: not_null
    col: paystat_type
  - kind: not_null
    col: freq
  - kind: row_floor
    min: 600
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
