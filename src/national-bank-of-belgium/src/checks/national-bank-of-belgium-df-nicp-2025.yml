# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-nicp-2025`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, nbb_coicop, time_period, freq, derivation]
checks:
  - kind: unique
    columns: [obs_value, nbb_coicop, time_period, freq, derivation]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: nbb_coicop
  - kind: not_null
    col: time_period
  - kind: not_null
    col: freq
  - kind: not_null
    col: derivation
  - kind: row_floor
    min: 3866
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
