# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-regtrd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nuts, time_period, item, obs_status]
checks:
  - kind: unique
    columns: [nuts, time_period, item, obs_status]
  - kind: not_null
    col: nuts
  - kind: not_null
    col: time_period
  - kind: not_null
    col: item
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 7762
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
