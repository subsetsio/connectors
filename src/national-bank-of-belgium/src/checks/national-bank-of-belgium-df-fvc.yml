# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-fvc`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, fvc_rub, fvc_account]
checks:
  - kind: unique
    columns: [obs_value, time_period, fvc_rub, fvc_account]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: fvc_rub
  - kind: not_null
    col: fvc_account
  - kind: row_floor
    min: 1375
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
