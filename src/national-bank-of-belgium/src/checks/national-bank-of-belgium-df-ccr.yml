    columns: [dataflow, freq, ccr_item, ccr_unit, ccr_regio, ccr_size, ccr_branch, time_period, obs_status, decimals, obs_value]
  - kind: not_null
    col: dataflow
  - kind: not_null
    col: freq
  - kind: not_null
    col: ccr_item
  - kind: not_null
    col: ccr_unit
  - kind: not_null
    col: ccr_regio
  - kind: not_null
    col: ccr_size
  - kind: not_null
    col: ccr_branch
  - kind: not_null
    col: time_period
  - kind: not_null
    col: obs_status
  - kind: not_null
    col: decimals
  - kind: not_null
    col: obs_value
