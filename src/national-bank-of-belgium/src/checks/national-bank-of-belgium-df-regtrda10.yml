# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-regtrda10`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, nuts, time_period, branch, item]
checks:
  - kind: unique
    columns: [obs_value, nuts, time_period, branch, item]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: nuts
  - kind: not_null
    col: time_period
  - kind: not_null
    col: branch
  - kind: not_null
    col: item
  - kind: row_floor
    min: 20678
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
