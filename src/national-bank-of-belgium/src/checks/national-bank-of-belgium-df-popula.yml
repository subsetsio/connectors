# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-popula`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, be_region, gender]
checks:
  - kind: unique
    columns: [obs_value, time_period, be_region, gender]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: be_region
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 394
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
