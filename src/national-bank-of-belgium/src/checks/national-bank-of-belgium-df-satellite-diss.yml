# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-satellite-diss`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, account, branch, sector, time_period]
checks:
  - kind: unique
    columns: [obs_value, account, branch, sector, time_period]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: account
  - kind: not_null
    col: branch
  - kind: not_null
    col: sector
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 9382
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
