# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-histo-nicp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, index_base, obs_status, unit_measure]
checks:
  - kind: unique
    columns: [obs_value, time_period, index_base, obs_status, unit_measure]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: index_base
  - kind: not_null
    col: obs_status
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 582
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
