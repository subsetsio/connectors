# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-nadetail-diss`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dataflow, freq, account, indicator, prices, time_period, obs_status, conf_status, unit_mult, decimals, obs_value]
checks:
  - kind: unique
    columns: [dataflow, freq, account, indicator, prices, time_period, obs_status, conf_status, unit_mult, decimals, obs_value]
  - kind: not_null
    col: dataflow
  - kind: not_null
    col: freq
  - kind: not_null
    col: account
  - kind: not_null
    col: indicator
  - kind: not_null
    col: prices
  - kind: not_null
    col: time_period
  - kind: not_null
    col: obs_status
  - kind: not_null
    col: conf_status
  - kind: not_null
    col: unit_mult
  - kind: not_null
    col: decimals
  - kind: not_null
    col: obs_value
  - kind: row_floor
    min: 1305
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
