# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-shs-holder`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, shs_holder, freq, shs_type, unit_measure]
checks:
  - kind: unique
    columns: [time_period, shs_holder, freq, shs_type, unit_measure]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: shs_holder
  - kind: not_null
    col: freq
  - kind: not_null
    col: shs_type
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 535
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
