# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-belgium-df-itss`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, itss_area, int_acc_item, time_period, accounting_entry]
checks:
  - kind: unique
    columns: [obs_value, itss_area, int_acc_item, time_period, accounting_entry]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: itss_area
  - kind: not_null
    col: int_acc_item
  - kind: not_null
    col: time_period
  - kind: not_null
    col: accounting_entry
  - kind: row_floor
    min: 67144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
