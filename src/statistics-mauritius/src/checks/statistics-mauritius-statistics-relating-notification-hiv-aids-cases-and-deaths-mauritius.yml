# compiled by `hardened compile-checks` — post-publish audit of `statistics-mauritius-statistics-relating-notification-hiv-aids-cases-and-deaths-mauritius`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, male, female, year, underlying_cause_of_death]
temporal: package_metadata_modified
checks:
  - kind: unique
    columns: [row_number, male, female, year, underlying_cause_of_death]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: male
  - kind: not_null
    col: female
  - kind: not_null
    col: year
  - kind: not_null
    col: underlying_cause_of_death
  - kind: row_floor
    min: 34
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
