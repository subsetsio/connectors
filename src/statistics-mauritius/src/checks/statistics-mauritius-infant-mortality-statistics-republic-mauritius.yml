# compiled by `hardened compile-checks` — post-publish audit of `statistics-mauritius-infant-mortality-statistics-republic-mauritius`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, infant_death, year, country]
temporal: package_metadata_modified
checks:
  - kind: unique
    columns: [row_number, infant_death, year, country]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: infant_death
  - kind: not_null
    col: year
  - kind: not_null
    col: country
  - kind: row_floor
    min: 30
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
