spec_id: common-crawl-crawls
status: active
tests:
  - row_count: {min: 100}
    reason: Common Crawl has published monthly crawl collections since 2008.
    certainty: 95
  - not_null: crawl_id
  - not_null: to_ts
  - column_type: {col: crawl_id, type: string}
  - column_type: {col: to_ts, type: timestamp}
  - unique: crawl_id
    reason: collinfo.json has one record per crawl collection id.
    certainty: 98
  - matches: {col: crawl_id, pattern: "^CC-MAIN-([0-9]{4}-[0-9]{2}|[0-9]{4}|[0-9]{4}-[0-9]{4})$"}
    reason: Common Crawl main crawl ids usually follow CC-MAIN-YYYY-WW, with older archives using CC-MAIN-YYYY or CC-MAIN-YYYY-YYYY ids.
    certainty: 95
  - freshness: {col: to_ts, reaches: today - 120d}
    reason: Common Crawl publishes new crawls roughly monthly; allow slack for publication delays.
    certainty: 90
    points_outward: true
