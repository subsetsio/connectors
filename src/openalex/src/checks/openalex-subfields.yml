# compiled by `hardened compile-checks` — post-publish audit of `openalex-subfields`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, description, wikidata, topics, display_name]
temporal: updated_date
checks:
  - kind: unique
    columns: [id, description, wikidata, topics, display_name]
  - kind: not_null
    col: id
  - kind: not_null
    col: description
  - kind: not_null
    col: wikidata
  - kind: not_null
    col: topics
  - kind: not_null
    col: display_name
  - kind: row_floor
    min: 126
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
