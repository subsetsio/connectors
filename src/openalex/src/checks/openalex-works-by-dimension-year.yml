# compiled by `hardened compile-checks` — post-publish audit of `openalex-works-by-dimension-year`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [publication_year, dimension_label, dimension_key, dimension]
temporal: publication_year
checks:
  - kind: unique
    columns: [publication_year, dimension_label, dimension_key, dimension]
  - kind: not_null
    col: publication_year
  - kind: not_null
    col: dimension_label
  - kind: not_null
    col: dimension_key
  - kind: not_null
    col: dimension
  - kind: row_floor
    min: 7018
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
