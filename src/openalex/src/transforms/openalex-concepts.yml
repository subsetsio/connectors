# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `openalex-concepts`. Regenerate after model-verify.
# caution: OpenAlex marks concepts as deprecated in favor of the topic classification; use topic tables for current subject taxonomy work.
key: [id]
temporal: updated_date
sort: [updated_date, id]
columns:
  - name: id
    type: VARCHAR
  - name: display_name
    type: VARCHAR
  - name: description
    type: VARCHAR
  - name: level
    type: BIGINT
  - name: wikidata
    type: VARCHAR
  - name: ancestors
    type: JSON
  - name: related_concepts
    type: JSON
  - name: works_count
    type: BIGINT
  - name: cited_by_count
    type: BIGINT
  - name: h_index
    type: JSON
  - name: i10_index
    type: JSON
  - name: mean_citedness
    type: JSON
  - name: updated_date
    type: TIMESTAMP
