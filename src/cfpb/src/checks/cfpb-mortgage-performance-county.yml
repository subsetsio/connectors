# compiled by `hardened compile-checks` — post-publish audit of `cfpb-mortgage-performance-county`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fips_code, region_name, period, bucket]
temporal: period
checks:
  - kind: unique
    columns: [fips_code, region_name, period, bucket]
  - kind: not_null
    col: fips_code
  - kind: not_null
    col: region_name
  - kind: not_null
    col: period
  - kind: not_null
    col: bucket
  - kind: row_floor
    min: 107991
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
