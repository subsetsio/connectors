# compiled by `hardened compile-checks` — post-publish audit of `cfpb-cct-volume-data-income-level`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, date, income_level_group, market]
temporal: date
checks:
  - kind: unique
    columns: [month, date, income_level_group, market]
  - kind: not_null
    col: month
  - kind: not_null
    col: date
  - kind: not_null
    col: income_level_group
  - kind: not_null
    col: market
  - kind: row_floor
    min: 1448
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
