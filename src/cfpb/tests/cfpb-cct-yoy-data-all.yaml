spec_id: cfpb-cct-yoy-data-all
status: active
tests:
  - not_null: month
  - not_null: date
  - not_null: market
  - column_type: {col: yoy_num, type: float}
  - column_type: {col: yoy_vol, type: float}
  - row_count: {min: 700}
  - freshness: {col: date, reaches: today - 400d}
    reason: CFPB Consumer Credit Trends are monthly and current releases may lag by several months
    certainty: 80
    points_outward: true
