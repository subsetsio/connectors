spec_id: cfpb-cct-volume-data-age-group
status: active
tests:
  - not_null: month
  - not_null: date
  - not_null: market
  - not_null: age_group
  - column_type: {col: vol, type: float}
  - row_count: {min: 2500}
  - freshness: {col: date, reaches: today - 400d}
    reason: CFPB Consumer Credit Trends are monthly and current releases may lag by several months
    certainty: 80
    points_outward: true
