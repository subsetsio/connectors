spec_id: cfpb-cct-yoy-data-age-group
status: active
tests:
  - not_null: month
  - not_null: date
  - not_null: market
  - column_type: {col: "younger-than-30_yoy", type: float}
  - row_count: {min: 800}
  - freshness: {col: date, reaches: today - 400d}
    reason: CFPB Consumer Credit Trends are monthly and current releases may lag by several months
    certainty: 80
    points_outward: true
