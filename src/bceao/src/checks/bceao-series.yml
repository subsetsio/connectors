# compiled by `hardened compile-checks` — post-publish audit of `bceao-series`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [label, series_code, localities, unit, subsector]
checks:
  - kind: unique
    columns: [label, series_code, localities, unit, subsector]
  - kind: not_null
    col: label
  - kind: not_null
    col: series_code
  - kind: not_null
    col: localities
  - kind: not_null
    col: unit
  - kind: not_null
    col: subsector
  - kind: row_floor
    min: 1318
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
