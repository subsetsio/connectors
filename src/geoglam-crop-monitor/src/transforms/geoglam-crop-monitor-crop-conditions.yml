# GEOGLAM Crop Monitor global-synthesis crop-condition assessments, published
# as one faithful long-format table (one row per source polygon feature per
# assessment month). Keyless: the same (month, country, region, crop) recurs
# across distinct overlapping growing-area polygons — do NOT dedupe.
key: []
temporal: month
sort: [month, country, region, crop]
write_mode: overwrite   # full re-pull of every monthly layer each run
columns:
  - name: month
    type: DATE
    description: Assessment month (first day of the month), parsed from the source layer name Global_Synthesis_YYYYMM. Every row from one layer shares this value.
  - name: country
    type: VARCHAR
    description: Country the growing-area polygon falls in, as labelled by GEOGLAM.
  - name: region
    type: VARCHAR
    description: Sub-national region/growing area within the country, as labelled by GEOGLAM. Not unique — the same name can cover several distinct polygons.
  - name: crop
    type: VARCHAR
    description: Crop and season assessed (e.g. 'Spring Wheat', 'Maize 1', 'Rice 2'); the trailing number distinguishes multiple growing seasons of the same crop.
  - name: condition
    type: VARCHAR
    description: >-
      GEOGLAM crop-condition class for this polygon/crop/month, ordinal best-to-worst:
      Exceptional, Favourable, Watch, Poor, Failure. 'No Data' = monitored area with no
      assessment available; NULL = the source left the cell blank (crop out of season /
      area not assessed). Blank and '#N/A' sentinels are normalised to NULL; the case
      variant 'No data' and the misspellings 'Favuorable'/'Favourble' are unified. A few
      non-standard source labels ('Favourable-Watch', 'No Favourable') are passed through
      as-is. Qualitative — count rows per class, never sum or average.
  - name: drivers
    type: VARCHAR
    description: >-
      Comma-separated driver tags the source attaches to a non-favourable condition
      (e.g. 'Dry', 'Dry, Hot', 'Conflict', 'Socio-economic', 'Delayed Onset', 'Wet',
      'Extreme Event'). NULL when the source left it blank. Free-text list — split on
      ', ' to enumerate individual drivers.
