spec_id: geoglam-crop-monitor-crop-conditions
status: active
tests:
  - not_null: period
    reason: every row is stamped with the YYYYMM from its FeatureServer layer name
    certainty: 95
  - not_null: country
    reason: each crop-condition feature belongs to a country
    certainty: 90
  - not_null: crop
    reason: each feature is a (region, crop) assessment cell
    certainty: 90
  - not_null: conditions
    reason: the Conditions attribute is always present (may be a blank/No-Data marker, never null)
    certainty: 85
  - column_type: {col: period, type: string}
  - matches: {col: period, pattern: '^20[0-9]{4}$'}
    reason: period is YYYYMM derived from Global_Synthesis_YYYYMM layer names
    certainty: 90
  - freshness: {col: period, reaches: 202601}
    # `period` is a YYYYMM string, so `reaches` is a numeric YYYYMM literal
    # (the dynamic date tokens like `today - Nd` resolve to ISO dates, which the
    # comparator coerces to a lexicographic string compare vs a YYYYMM and thus
    # silently always-passes — see feedback). The source publishes monthly but
    # lags ~3 months and skips some months; latest observed is 202604. A static
    # floor of 202601 blocks only a catastrophic regression to pre-2026 data;
    # bump it forward periodically (cf. climate-action-tracker `reaches: 2024`).
    reason: GEOGLAM Crop Monitor is a live monthly series; a load whose newest month falls below Jan 2026 is stale/regressed
    certainty: 75
    points_outward: true
  - row_count: {min: 30000}
    reason: ~48 monthly layers x ~1000 region-crop features each (~50k total)
    certainty: 80
  - distinct_count: {col: period, min: 24}
    reason: one distinct period per monthly layer; >=24 months published since 2022-01
    certainty: 85
  - distinct_count: {col: crop, min: 5}
    reason: GEOGLAM tracks wheat/maize/rice/soybean/sorghum/millet families at minimum
    certainty: 80
  - enum:
      col: conditions
      values: ['Exceptional', 'Favourable', 'Watch', 'Poor', 'Failure', 'No Data', '#N/A', 'N/A', 'NA', ' ', '']
    reason: GEOGLAM condition classes plus blank / No-Data markers seen while probing
    certainty: 60
    severity: warn
    points_outward: true
