# compiled by `hardened compile-checks` — post-publish audit of `dg-ecfin-surveys-bcs-lh-indicators`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ref_area, activity, indicator, seasonal_adjust, freq, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [ref_area, activity, indicator, seasonal_adjust, freq, time_period]
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: activity
  - kind: not_null
    col: indicator
  - kind: not_null
    col: seasonal_adjust
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 39613
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
