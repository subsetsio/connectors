# compiled by `hardened compile-checks` — post-publish audit of `dbt-uk-tariff-2021-01-01--footnote-types`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [validity_start, trackedmodel_ptr_id, footnote_type_id, description, application_code]
temporal: validity_start
checks:
  - kind: unique
    columns: [validity_start, trackedmodel_ptr_id, footnote_type_id, description, application_code]
  - kind: not_null
    col: validity_start
  - kind: not_null
    col: trackedmodel_ptr_id
  - kind: not_null
    col: footnote_type_id
  - kind: not_null
    col: description
  - kind: not_null
    col: application_code
  - kind: row_floor
    min: 15
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
