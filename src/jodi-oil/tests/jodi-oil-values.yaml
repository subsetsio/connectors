spec_id: jodi-oil-values
status: active
tests:
  - not_null: ref_area
    reason: every JODI cell is reported for a country/area
    certainty: 98
  - not_null: time_period
    reason: every observation carries a YYYY-MM month
    certainty: 98
  - not_null: energy_product
    certainty: 98
  - not_null: flow_breakdown
    certainty: 98
  - column_type: {col: ref_area, type: string}
    certainty: 95
  - matches: {col: time_period, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: TIME_PERIOD is a monthly period like 2024-01
    certainty: 95
  - enum: {col: unit_measure, values: [CONVBBL, KBBL, KBD, KL, KTONS]}
    reason: JODI-Oil reports each cell in exactly these five units
    certainty: 95
  - enum: {col: tier, values: [primary, secondary]}
    reason: rows come from exactly the two corpus zips, tagged by tier
    certainty: 99
  - distinct_count: {col: ref_area, min: 90}
    reason: ~100+ reporting countries/areas; far fewer means a tier failed to parse
    certainty: 85
  - distinct_count: {col: unit_measure, min: 5, max: 5}
    reason: exactly five unit codes
    certainty: 90
  - row_count: {min: 1000000}
    reason: 20+ years x ~100 countries x products x flows x 5 units across both tiers is millions of rows
    certainty: 85
