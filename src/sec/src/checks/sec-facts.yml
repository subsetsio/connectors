# compiled by `hardened compile-checks` — post-publish audit of `sec-facts`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cik, taxonomy, tag, unit, fiscal_period, period_end, accession, loc]
temporal: period_end
checks:
  - kind: unique
    columns: [cik, taxonomy, tag, unit, fiscal_period, period_end, accession, loc]
  - kind: not_null
    col: cik
  - kind: not_null
    col: taxonomy
  - kind: not_null
    col: tag
  - kind: not_null
    col: unit
  - kind: not_null
    col: fiscal_period
  - kind: not_null
    col: period_end
  - kind: not_null
    col: accession
  - kind: not_null
    col: loc
  - kind: row_floor
    min: 3023289
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
