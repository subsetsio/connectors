# compiled by `hardened compile-checks` — post-publish audit of `afrobarometer-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [variable_code, country, round_num, answer_code]
temporal: round_num
checks:
  - kind: unique
    columns: [variable_code, country, round_num, answer_code]
  - kind: not_null
    col: variable_code
  - kind: not_null
    col: country
  - kind: not_null
    col: round_num
  - kind: not_null
    col: answer_code
  - kind: row_floor
    min: 599210
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
