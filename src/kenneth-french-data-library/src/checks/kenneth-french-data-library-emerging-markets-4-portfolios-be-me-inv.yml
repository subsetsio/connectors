# compiled by `hardened compile-checks` — post-publish audit of `kenneth-french-data-library-emerging-markets-4-portfolios-be-me-inv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, statistic, variable, period]
temporal: date
checks:
  - kind: unique
    columns: [date, statistic, variable, period]
  - kind: not_null
    col: date
  - kind: not_null
    col: statistic
  - kind: not_null
    col: variable
  - kind: not_null
    col: period
  - kind: row_floor
    min: 3388
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
