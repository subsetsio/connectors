# compiled by `hardened compile-checks` — post-publish audit of `kenneth-french-data-library-6-portfolios-2x3-weekly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, variable, statistic, period, block]
temporal: date
checks:
  - kind: unique
    columns: [date, variable, statistic, period, block]
  - kind: not_null
    col: date
  - kind: not_null
    col: variable
  - kind: not_null
    col: statistic
  - kind: not_null
    col: period
  - kind: not_null
    col: block
  - kind: row_floor
    min: 62556
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
