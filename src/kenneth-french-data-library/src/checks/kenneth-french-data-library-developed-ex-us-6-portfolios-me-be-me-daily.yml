# compiled by `hardened compile-checks` — post-publish audit of `kenneth-french-data-library-developed-ex-us-6-portfolios-me-be-me-daily`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, variable, statistic]
temporal: date
checks:
  - kind: unique
    columns: [date, variable, statistic]
  - kind: not_null
    col: date
  - kind: not_null
    col: variable
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 56220
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
