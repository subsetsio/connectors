spec_id: openpowerlifting-results
status: active
tests:
  - row_count: {min: 3000000}
    reason: the full OpenPowerlifting corpus is ~3.96M lifter-meet rows; a value far below means a truncated download
    certainty: 90
  - not_null: Name
    reason: every result row names a lifter (mandatory column per the source's column reference)
    certainty: 95
  - not_null: Sex
    certainty: 95
  - not_null: Event
    certainty: 95
  - not_null: Equipment
    certainty: 95
  - not_null: Federation
    certainty: 95
  - not_null: Date
    certainty: 95
  - not_null: MeetName
    certainty: 95
  - enum: {col: Sex, values: ["M", "F", "Mx"]}
    reason: source documents exactly three competition sex categories
    certainty: 90
  - enum: {col: Event, values: ["SBD", "BD", "SD", "SB", "S", "B", "D"]}
    reason: source documents these seven event combinations of squat/bench/deadlift
    certainty: 88
  - enum: {col: Equipment, values: ["Raw", "Wraps", "Single-ply", "Multi-ply", "Unlimited", "Straps"]}
    reason: source documents these six equipment categories
    certainty: 85
  - matches: {col: Date, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
    reason: meet start date is published in ISO-8601 YYYY-MM-DD
    certainty: 92
  - distinct_count: {col: Federation, min: 100}
    reason: OpenPowerlifting aggregates hundreds of distinct federations worldwide
    certainty: 80
