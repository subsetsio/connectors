# compiled by `hardened compile-checks` — post-publish audit of `stats-sa-time-series-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [variable_name, series_id, period_code, period, source_row_number]
temporal: fetched_at
checks:
  - kind: unique
    columns: [variable_name, series_id, period_code, period, source_row_number]
  - kind: not_null
    col: variable_name
  - kind: not_null
    col: series_id
  - kind: not_null
    col: period_code
  - kind: not_null
    col: period
  - kind: not_null
    col: source_row_number
  - kind: row_floor
    min: 101000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
