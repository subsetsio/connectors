# compiled by `hardened compile-checks` — post-publish audit of `central-bank-of-russia-pub-11-ds-19`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, period_label, element_id, element_name]
temporal: date
checks:
  - kind: unique
    columns: [date, period_label, element_id, element_name]
  - kind: not_null
    col: date
  - kind: not_null
    col: period_label
  - kind: not_null
    col: element_id
  - kind: not_null
    col: element_name
  - kind: row_floor
    min: 193
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
