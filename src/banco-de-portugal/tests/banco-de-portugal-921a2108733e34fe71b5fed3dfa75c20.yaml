spec_id: banco-de-portugal-921a2108733e34fe71b5fed3dfa75c20
status: active
tests:
  - not_null: series_id
    reason: every JSON-stat observation is decoded from a series; a null series_id means the cube-to-series mapping broke
    certainty: 95
  - not_null: reference_date
    reason: every observation sits on the reference_date axis of the cube
    certainty: 95
  - not_null: series_label
    reason: each series carries a label from extension.series; null means the label join was dropped
    certainty: 90
  - not_null: value
    reason: the parser skips JSON-stat null cells, so every persisted row carries a numeric value
    certainty: 90
  - column_type: {col: series_id, type: integer}
    reason: BPstat series ids are integers (e.g. 8201)
    certainty: 90
  - matches: {col: reference_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: reference_date is normalised to a 10-char ISO calendar date
    certainty: 85
  - unique: [series_id, reference_date]
    reason: one observation per series per reference_date; duplicates mean a page boundary double-counted cells across pages
    certainty: 85
  - row_count: {min: 1}
    reason: a rank-active dataset has at least one series with observations
    certainty: 90
