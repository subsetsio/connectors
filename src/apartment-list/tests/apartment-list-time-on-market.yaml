spec_id: apartment-list-time-on-market
status: active
tests:
  - not_null: location_name
  - not_null: location_fips_code
  - not_null: month
  - not_null: value
  - column_type: {col: month, type: date}
  - column_type: {col: value, type: float}
  - enum: {col: location_type, values: [National, State, Metro, County, City]}
    reason: source publishes these five geographic levels only
    certainty: 90
  - unique: [location_type, location_name, month]
    reason: melt emits one row per source location-row per month
    certainty: 85
  - row_count: {min: 12000}
    reason: ~200 locations x ~89 months (~17.8k valued, history starts 2019); <12k means truncated
    certainty: 80
  - between: {col: value, lo: 1, hi: 365}
    reason: median days a unit stays on market; realistically a few weeks to a few months
    certainty: 85
  - at_most: {col: month, expr: today}
    reason: no future months
    certainty: 95
    points_outward: true
  - at_least: {col: month, expr: "2019-01-01"}
    reason: time-on-market history begins January 2019
    certainty: 85
  - freshness: {col: month, reaches: today - 120d}
    reason: monthly product; newest month should be within ~4 months
    certainty: 70
    points_outward: true
    severity: warn
