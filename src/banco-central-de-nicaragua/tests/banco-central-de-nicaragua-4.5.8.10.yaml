spec_id: banco-central-de-nicaragua-4.5.8.10
status: active
tests:
  - not_null: value
    reason: a SIEC table with a null value cell is dropped in parsing; rows that survive must carry a numeric value
    certainty: 95
  - not_null: year
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 90
  - column_type: {col: year, type: integer}
    certainty: 95
  - row_count: {min: 1}
    reason: each published table is a real time series; 0 rows means the fetch or parse failed
    certainty: 95
  - between: {col: year, lo: 1900, hi: current_year()}
    reason: BCN series start no earlier than the 1960s and never publish future years here
    certainty: 85
    points_outward: true
    severity: warn
  - between: {col: month, lo: 1, hi: 12}
    reason: month derives from Ene..Dic / quarter labels, always 1-12
    certainty: 90
