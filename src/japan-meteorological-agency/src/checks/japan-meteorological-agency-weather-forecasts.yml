# compiled by `hardened compile-checks` — post-publish audit of `japan-meteorological-agency-weather-forecasts`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [office_code, report_datetime, area_code, element, valid_time]
temporal: report_datetime
checks:
  - kind: unique
    columns: [office_code, report_datetime, area_code, element, valid_time]
  - kind: not_null
    col: office_code
  - kind: not_null
    col: report_datetime
  - kind: not_null
    col: area_code
  - kind: not_null
    col: element
  - kind: not_null
    col: valid_time
  - kind: row_floor
    min: 3277
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
