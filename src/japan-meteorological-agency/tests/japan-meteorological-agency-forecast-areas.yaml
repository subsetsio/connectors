spec_id: japan-meteorological-agency-forecast-areas
status: active
tests:
  - row_count: {min: 1500}
    reason: forecast taxonomy includes centers, offices, class10 subdivisions, and class20 municipalities
    certainty: 95
  - not_null: code
  - not_null: level
  - column_type: {col: code, type: string}
  - column_type: {col: level, type: string}
  - enum: {col: level, values: ["centers", "offices", "class10s", "class20s"]}
    certainty: 98
  - unique: [code, level]
    reason: JMA area codes identify one area record within each taxonomy level
    certainty: 95
  - nullable: {col: name_en, max_null_frac: 0.05}
    reason: the public area taxonomy normally carries English names for nearly all areas
    certainty: 85
