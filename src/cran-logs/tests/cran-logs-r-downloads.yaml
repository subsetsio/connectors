spec_id: cran-logs-r-downloads
status: active
tests:
  - not_null: day
    certainty: 99
  - not_null: downloads
    certainty: 99
  - column_type: {col: downloads, type: integer}
    certainty: 95
  - at_least: {col: downloads, expr: 0}
    reason: download counts are non-negative
    certainty: 99
  - enum: {col: os, values: [osx, win, src]}
    reason: the R-downloads feed segments by these three platform buckets
    certainty: 75
    severity: warn
  - matches: {col: day, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
    certainty: 95
  - distinct_count: {col: version, min: 10}
    reason: R has shipped many point releases over the logged history
    certainty: 80
    severity: warn
