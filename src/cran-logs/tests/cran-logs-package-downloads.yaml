spec_id: cran-logs-package-downloads
status: active
tests:
  - not_null: package
    certainty: 99
  - not_null: day
    certainty: 99
  - not_null: downloads
    reason: null counts are dropped in the fetch fn before writing
    certainty: 99
  - column_type: {col: downloads, type: integer}
    certainty: 95
  - at_least: {col: downloads, expr: 0}
    reason: download counts are non-negative
    certainty: 99
  - matches: {col: day, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
    reason: cranlogs returns ISO calendar days
    certainty: 95
  - distinct_count: {col: package, min: 10000}
    reason: long-format counts across the whole CRAN ecosystem; few distinct packages means batching stopped early
    certainty: 90
  - row_count: {min: 1000000}
    reason: ~24k packages x thousands of days each is tens of millions of rows
    certainty: 85
