spec_id: dg-ecfin-business-and-consumer-surveys-bcs-indu-finv
status: active
tests:
  - row_count: {min: 1}
    reason: the fetch raises on an empty parse, so a published raw asset always has observations
    certainty: 99
  - not_null: date
    reason: every observation is keyed to a TIME_PERIOD; rows with an unparseable period are dropped in the fetch
    certainty: 99
  - not_null: value
    reason: empty OBS_VALUE rows are skipped in the fetch, so value is always present
    certainty: 99
  - not_null: ref_area
    reason: REF_AREA (country/aggregate) is a mandatory SDMX dimension on every BCS series
    certainty: 98
  - not_null: freq
    reason: FREQ is a mandatory SDMX dimension; every row carries M/Q/A
    certainty: 98
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: date is normalized to the ISO period-start (YYYY-MM-01 / quarter-start / YYYY-01-01) in the fetch
    certainty: 95
  - column_type: {col: value, type: float}
    reason: OBS_VALUE is cast to float in the fetch; read back as a floating-point column
    certainty: 85
    severity: warn
  - distinct_count: {col: ref_area, min: 2}
    reason: every BCS dataflow spans EU27 plus aggregates and candidate countries; a single area means the pull collapsed
    certainty: 85
    severity: warn
  - freshness: {col: date, reaches: 'today - 2y'}
    reason: BCS is refreshed monthly (annual investment surveys yearly); the latest period should be within two years
    certainty: 70
    severity: warn
    points_outward: true
