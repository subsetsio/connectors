key: []
temporal: period
sort: [period, subject_code]
columns:
  - {name: period,              type: DATE,    description: "Reporting date of the value"}
  - {name: subject_code,        type: VARCHAR, description: "NBS-supervised subject (entity) code"}
  - {name: val_type,            type: VARCHAR, description: "Reported value-type / metric code"}
  - {name: currency,            type: VARCHAR, description: "Currency of the reported value (e.g. SKK, EUR)"}
  - {name: num_value,           type: DOUBLE,  description: "Reported numeric value"}
  - {name: subject_name_act,    type: VARCHAR, description: "Current name of the supervised subject"}
  - {name: subject_name_hist,   type: VARCHAR, description: "Historical name of the subject at reporting time"}
  - {name: deputy_subject_code, type: VARCHAR, description: "Managing/parent subject code"}
  - {name: deputy_subject_name, type: VARCHAR, description: "Managing/parent subject name"}
  - {name: grp_name,            type: VARCHAR, description: "Subject group name"}
  - {name: grp_parent_name,     type: VARCHAR, description: "Parent group name"}
