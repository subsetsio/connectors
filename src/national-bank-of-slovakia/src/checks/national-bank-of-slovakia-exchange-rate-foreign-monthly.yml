# compiled by `hardened compile-checks` — post-publish audit of `national-bank-of-slovakia-exchange-rate-foreign-monthly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [valid_from, country, currency_name, currency_code, month_number]
temporal: valid_from
checks:
  - kind: unique
    columns: [valid_from, country, currency_name, currency_code, month_number]
  - kind: not_null
    col: valid_from
  - kind: not_null
    col: country
  - kind: not_null
    col: currency_name
  - kind: not_null
    col: currency_code
  - kind: not_null
    col: month_number
  - kind: row_floor
    min: 13000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
