spec_id: national-bank-of-slovakia-exchange-rate-foreign-monthly
status: active
tests:
  - not_null: valid_from
  - not_null: currency_code
  - not_null: value
  - column_type: {col: value, type: float}
  - unique: [valid_from, country, currency_code]
    reason: one rate per (month, country, currency); a code can repeat across countries within a month but not within one country
    certainty: 85
  - between: {col: value, lo: 0, hi: 1000000000}
    reason: EUR-base rates are positive; the upper bound guards against a parse blowing up a hyperinflation currency
    certainty: 75
    severity: warn
  - distinct_count: {col: currency_code, min: 90}
    reason: NBS quotes a broad selected-currency universe; a large shortfall means the monthly XML parse collapsed
    certainty: 80
  - freshness: {col: valid_from, reaches: today - 45d}
    reason: published monthly (validFrom = month start); the newest month must be recent
    points_outward: true
