spec_id: national-bank-of-slovakia-exchange-rate-foreign-monthly
status: active
tests:
  - not_null: valid_from
    reason: every monthly cross-section carries a validFrom date
    certainty: 95
  - not_null: currency_code
    certainty: 95
  - not_null: value
    reason: empty value cells are dropped during parsing, never emitted as null
    certainty: 90
  - column_type: {col: valid_from, type: date}
    certainty: 95
  - column_type: {col: currency_code, type: string}
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 95
  - at_least: {col: value, expr: 0}
    reason: EUR cross-rates are strictly positive
    certainty: 95
  - at_most: {col: value, expr: 10000000000}
    reason: legacy hyperinflation units reach the millions per EUR; a ceiling guards a unit slip
    certainty: 65
    severity: warn
  - at_least: {col: valid_from, expr: '1996-01-01'}
    reason: the selected-foreign-currency series begins in 1996
    certainty: 85
  - at_most: {col: valid_from, expr: today}
    certainty: 95
  - distinct_count: {col: currency_code, min: 100, max: 300}
    reason: ~120-150 currencies per monthly cross-section
    certainty: 80
    severity: warn
  - freshness: {col: valid_from, reaches: today - 70d}
    reason: published monthly; the latest month should be within ~2 months
    certainty: 75
    points_outward: true
    severity: warn
