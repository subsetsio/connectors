spec_id: dartmouth-atlas-of-health-care-mortality
status: active
coverage:
  frozen: true
  reason: >-
    Closed archive: the HRR and state mortality panels end at 2019. Dartmouth ceased updating the Atlas in 2024; the published longitudinal files have been byte-stable since 2021-2022, so this corpus does not advance.
tests:
  - not_null: source_file
  - not_null: geo_level
  - enum: {col: geo_level, values: [hrr, state]}
    reason: the mortality page publishes longitudinal Stata files at HRR and state levels
    certainty: 95
  - row_count: {min: 1000}
    reason: HRR and state mortality files together should contain a multi-year area-measure panel
    certainty: 80
