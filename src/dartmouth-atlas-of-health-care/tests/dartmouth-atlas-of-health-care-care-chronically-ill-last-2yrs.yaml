spec_id: dartmouth-atlas-of-health-care-care-chronically-ill-last-2yrs
status: active
tests:
  - not_null: geo_code
  - not_null: year
  - not_null: measure_code
  - not_null: geo_level
  - column_type: {col: year, type: integer}
  - enum: {col: geo_level, values: [hrr, state, hospital]}
    reason: geo_level is parsed from the source filename prefix; only these levels ship for this topic
    certainty: 90
  - between: {col: year, lo: 2008, hi: 2025}
    reason: Atlas data for this topic begins at 2008 and the archive is frozen at 2019
    certainty: 85
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
  - row_count: {min: 5000}
    reason: union of all geo-level/era files; far fewer rows means a file silently failed to download/parse
    certainty: 80
