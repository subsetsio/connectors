# compiled by `hardened compile-checks` — post-publish audit of `dartmouth-atlas-of-health-care-mortality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo_code, geo_name, year, event_label, eventname]
temporal: year
checks:
  - kind: unique
    columns: [geo_code, geo_name, year, event_label, eventname]
  - kind: not_null
    col: geo_code
  - kind: not_null
    col: geo_name
  - kind: not_null
    col: year
  - kind: not_null
    col: event_label
  - kind: not_null
    col: eventname
  - kind: row_floor
    min: 8617
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
