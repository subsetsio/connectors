# Rows are ranked inside overlapping rolling windows; filter to one window before aggregating counts.
key: [window_start, os_version, window]
temporal: window_start
sort: [window_start, window, rank, os_version]
columns:
  - name: window
    type: VARCHAR
    description: Rolling analytics window label, such as 30d, 90d, or 365d.
  - name: window_start
    type: DATE
    description: First date included in the rolling analytics window.
  - name: window_end
    type: DATE
    description: Last date included in the rolling analytics window.
  - name: rank
    type: INTEGER
    description: Rank of the macOS version by analytics event count within the window.
  - name: os_version
    type: VARCHAR
    description: macOS version string reported by Homebrew analytics clients.
  - name: count
    type: BIGINT
    description: Number of analytics events for this macOS version observed in the window.
  - name: percent
    type: DOUBLE
    description: Share of analytics events represented by this macOS version within the window.
