# Rows are ranked inside overlapping rolling windows; filter to one window before aggregating counts.
key: [window_start, cask, window]
temporal: window_start
sort: [window_start, window, rank, cask]
columns:
  - name: window
    type: VARCHAR
    description: Rolling analytics window label, such as 30d, 90d, or 365d.
  - name: window_start
    type: DATE
    description: First date included in the rolling analytics window.
  - name: window_end
    type: DATE
    description: Last date included in the rolling analytics window.
  - name: rank
    type: INTEGER
    description: Rank of the cask by install count within the window.
  - name: cask
    type: VARCHAR
    description: Homebrew cask token.
  - name: count
    type: BIGINT
    description: Number of cask install events observed in the window.
  - name: percent
    type: DOUBLE
    description: Share of cask install events represented by this cask within the window.
