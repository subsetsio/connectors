spec_id: homebrew-analytics-os-version
status: active
tests:
  - not_null: item
    reason: every ranked row names an OS version string
    certainty: 95
  - not_null: window
    certainty: 99
  - column_type: {col: rank, type: integer}
    certainty: 95
  - column_type: {col: count, type: integer}
    certainty: 90
  - column_type: {col: percent, type: float}
    certainty: 90
  - column_type: {col: window_end, type: date}
    certainty: 90
  - freshness: {col: window_end, reaches: today - 14d}
    reason: Homebrew analytics are rolling 30/90/365 day windows refreshed frequently; stale window end means the source or fetch has stopped advancing
    certainty: 85
    points_outward: true
  - enum: {col: window, values: ["30d", "90d", "365d"]}
    certainty: 95
  - distinct_count: {col: window, min: 3, max: 3}
    certainty: 90
  - between: {col: percent, lo: 0, hi: 100}
    reason: percent is each OS version's share of observations in the window
    certainty: 95
  - at_least: {col: rank, expr: 1}
    certainty: 99
  - unique: [window, rank]
    reason: one row per (window, rank)
    certainty: 90
  - row_count: {min: 500}
    reason: OS-version reports are smaller (hundreds of distinct versions) but cover three windows
    certainty: 75
