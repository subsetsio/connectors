spec_id: homebrew-analytics-cask-install
status: active
tests:
  - not_null: item
    reason: every ranked row names a cask
    certainty: 95
  - not_null: window
    certainty: 99
  - column_type: {col: rank, type: integer}
    certainty: 95
  - column_type: {col: count, type: integer}
    certainty: 90
  - column_type: {col: percent, type: float}
    certainty: 90
  - enum: {col: window, values: ["30d", "90d", "365d"]}
    certainty: 95
  - distinct_count: {col: window, min: 3, max: 3}
    certainty: 90
  - between: {col: percent, lo: 0, hi: 100}
    certainty: 95
  - at_least: {col: rank, expr: 1}
    certainty: 99
  - unique: [window, rank]
    reason: one row per (window, rank)
    certainty: 90
  - row_count: {min: 10000}
    reason: cask install reports list many thousands of casks across three windows
    certainty: 80
