spec_id: homebrew-analytics-install
status: active
tests:
  - not_null: item
    reason: every ranked row names a formula
    certainty: 95
  - not_null: window
    certainty: 99
  - column_type: {col: rank, type: integer}
    certainty: 95
  - column_type: {col: count, type: integer}
    reason: comma-grouped count strings are parsed to int in the fetch fn
    certainty: 90
  - column_type: {col: percent, type: float}
    certainty: 90
  - column_type: {col: window_start, type: date}
    certainty: 90
  - enum: {col: window, values: ["30d", "90d", "365d"]}
    reason: the connector pulls exactly these three rolling windows
    certainty: 95
  - distinct_count: {col: window, min: 3, max: 3}
    reason: a missing window means one per-window fetch silently failed
    certainty: 90
  - between: {col: percent, lo: 0, hi: 100}
    reason: percent is each item's share of total installs in the window
    certainty: 95
  - at_least: {col: rank, expr: 1}
    certainty: 99
  - unique: [window, rank]
    reason: one row per (window, rank); dupes mean two windows merged or a re-pull without overwrite
    certainty: 90
  - row_count: {min: 20000}
    reason: formula install reports list tens of thousands of formulae across three windows
    certainty: 80
