# compiled by `hardened compile-checks` — post-publish audit of `crates-io-version-downloads-daily`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [version_id, date]
temporal: date
checks:
  - kind: unique
    columns: [version_id, date]
  - kind: not_null
    col: version_id
  - kind: not_null
    col: date
  - kind: row_floor
    min: 19325433
regression:
  row_shrink_tolerance: 0.0
  key_shrink_tolerance: 0.0
  temporal_monotonic: true
