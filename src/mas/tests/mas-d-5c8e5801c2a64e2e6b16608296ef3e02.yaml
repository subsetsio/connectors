spec_id: mas-d-5c8e5801c2a64e2e6b16608296ef3e02
status: active
tests:
  - not_null: data_series_id
  - not_null: data_series
  - column_type: {col: data_series_id, type: integer}
  - not_null: period
  - not_null: value
  - column_type: {col: period, type: date}
  - column_type: {col: value, type: float}
  - unique: [data_series_id, period]
    reason: one observation per source series row per period; MAS tables can repeat display labels, so vault_id-derived data_series_id is the stable series identifier
    certainty: 95
  - row_count: {min: 1}
    reason: the dataset publishes at least one numeric series
  - freshness: {col: period, reaches: today - 200d}
    reason: quarterly release; ~1 quarter publication lag
    certainty: 80
    points_outward: true
