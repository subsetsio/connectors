spec_id: mas-d-5ee316e9f36b58ae54fbd68cf749c912
status: active
tests:
  - not_null: data_series
  - not_null: period
  - not_null: value
  - column_type: {col: period, type: date}
  - column_type: {col: value, type: float}
  - unique: [data_series, period]
    reason: one observation per series per period; a MAS dataset is a wide grid unpivoted to (series, period), so the grain is unique by construction
    certainty: 95
  - row_count: {min: 1}
    reason: the dataset publishes at least one numeric series
  - freshness: {col: period, reaches: today - 730d}
    reason: annual series running ~1 further year in arrears
    certainty: 80
    points_outward: true
