# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-thv43.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, disability, at_risk_of_poverty_threshold, sex]
checks:
  - kind: unique
    columns: [reference_period, disability, at_risk_of_poverty_threshold, sex]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: disability
  - kind: not_null
    col: at_risk_of_poverty_threshold
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 576
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
