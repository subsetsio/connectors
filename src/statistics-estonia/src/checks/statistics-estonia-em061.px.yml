# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-em061.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [controlling_country_region, economic_activity, indicator, reference_period]
checks:
  - kind: unique
    columns: [controlling_country_region, economic_activity, indicator, reference_period]
  - kind: not_null
    col: controlling_country_region
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: indicator
  - kind: not_null
    col: reference_period
  - kind: row_floor
    min: 993240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
