# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-htt44.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_persons, number_of_trainings, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [group_of_persons, number_of_trainings, year, indicator]
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: number_of_trainings
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 160
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
