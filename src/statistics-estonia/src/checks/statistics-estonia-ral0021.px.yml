# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ral0021.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, economic_activity, employed_persons, indicator]
checks:
  - kind: unique
    columns: [reference_period, economic_activity, employed_persons, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: employed_persons
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1674
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
