    columns: [type_of_health_risk, contact_with_health_risk, year, indicator]
  - kind: not_null
    col: type_of_health_risk
  - kind: not_null
    col: contact_with_health_risk
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 135
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
