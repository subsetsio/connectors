# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-kk031.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [environmental_protection_activity, year, indicator, institutional_sector]
temporal: year
checks:
  - kind: unique
    columns: [environmental_protection_activity, year, indicator, institutional_sector]
  - kind: not_null
    col: environmental_protection_activity
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: institutional_sector
  - kind: row_floor
    min: 1760
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
