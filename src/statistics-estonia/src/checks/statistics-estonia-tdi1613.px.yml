# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tdi1613.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [expectations_for_innovation, group_of_economic_activities, number_of_persons_employed]
temporal: year
checks:
  - kind: unique
    columns: [expectations_for_innovation, group_of_economic_activities, number_of_persons_employed]
  - kind: not_null
    col: expectations_for_innovation
  - kind: not_null
    col: group_of_economic_activities
  - kind: not_null
    col: number_of_persons_employed
  - kind: row_floor
    min: 450
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
