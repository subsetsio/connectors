# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts183.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, group_of_goods, type_of_transport]
checks:
  - kind: unique
    columns: [reference_period, group_of_goods, type_of_transport]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: group_of_goods
  - kind: not_null
    col: type_of_transport
  - kind: row_floor
    min: 4032
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
