# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl214492.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_group, language, command_of_language, sex, place_of_residence]
temporal: year
checks:
  - kind: unique
    columns: [age_group, language, command_of_language, sex, place_of_residence]
  - kind: not_null
    col: age_group
  - kind: not_null
    col: language
  - kind: not_null
    col: command_of_language
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: row_floor
    min: 540
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
