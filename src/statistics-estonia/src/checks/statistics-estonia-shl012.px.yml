# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-shl012.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [birth_cohort, change_in_body_mass_index, indicator]
checks:
  - kind: unique
    columns: [birth_cohort, change_in_body_mass_index, indicator]
  - kind: not_null
    col: birth_cohort
  - kind: not_null
    col: change_in_body_mass_index
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
