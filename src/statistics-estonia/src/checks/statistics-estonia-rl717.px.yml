# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl717.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, comfort_characteristics, number_of_rooms]
checks:
  - kind: unique
    columns: [location, comfort_characteristics, number_of_rooms]
  - kind: not_null
    col: location
  - kind: not_null
    col: comfort_characteristics
  - kind: not_null
    col: number_of_rooms
  - kind: row_floor
    min: 19240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
