# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-raa0066.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, type_of_asset, institutional_sector]
temporal: year
checks:
  - kind: unique
    columns: [year, type_of_asset, institutional_sector]
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_asset
  - kind: not_null
    col: institutional_sector
  - kind: row_floor
    min: 725
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
