# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-htt41.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, indicator, region, type_of_settlement, participation_in_training, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, indicator, region, type_of_settlement, participation_in_training, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: region
  - kind: not_null
    col: type_of_settlement
  - kind: not_null
    col: participation_in_training
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 648
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
