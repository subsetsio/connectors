    columns: [place_of_residence, age_group, native_and_foreign_origin_population, sex]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: age_group
  - kind: not_null
    col: native_and_foreign_origin_population
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 25725
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
