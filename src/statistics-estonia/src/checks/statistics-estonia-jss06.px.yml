    columns: [person_or_institution_they_talked_to]
  - kind: not_null
    col: person_or_institution_they_talked_to
  - kind: row_floor
    min: 2
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
