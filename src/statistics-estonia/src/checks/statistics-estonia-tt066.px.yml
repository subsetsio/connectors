# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt066.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region_county, educational_level, month, year]
temporal: month
checks:
  - kind: unique
    columns: [region_county, educational_level, month, year]
  - kind: not_null
    col: region_county
  - kind: not_null
    col: educational_level
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: row_floor
    min: 24219
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
