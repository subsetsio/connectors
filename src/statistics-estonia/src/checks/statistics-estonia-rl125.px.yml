# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl125.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, place_of_residence, country_of_birth, ethnic_nationality, citizenship, time_of_immigration]
checks:
  - kind: unique
    columns: [sex, place_of_residence, country_of_birth, ethnic_nationality, citizenship, time_of_immigration]
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: country_of_birth
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: citizenship
  - kind: not_null
    col: time_of_immigration
  - kind: row_floor
    min: 749700
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
