# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-le205.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [kind_of_expenditure, type_of_household, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [kind_of_expenditure, type_of_household, year, indicator]
  - kind: not_null
    col: kind_of_expenditure
  - kind: not_null
    col: type_of_household
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 7203
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
