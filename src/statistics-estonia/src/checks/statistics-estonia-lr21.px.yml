# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-lr21.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, indicator, type_of_right_of_residence]
temporal: year
checks:
  - kind: unique
    columns: [year, indicator, type_of_right_of_residence]
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: type_of_right_of_residence
  - kind: row_floor
    min: 21
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
