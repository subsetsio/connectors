# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv035.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [week, reference_period, age, sex, indicator]
checks:
  - kind: unique
    columns: [week, reference_period, age, sex, indicator]
  - kind: not_null
    col: week
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 6480
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
