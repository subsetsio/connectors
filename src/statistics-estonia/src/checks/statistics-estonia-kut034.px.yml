# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-kut034.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_persons, use_of_virtual_or_other_innovative_solutions, indicator]
temporal: year
checks:
  - kind: unique
    columns: [group_of_persons, use_of_virtual_or_other_innovative_solutions, indicator]
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: use_of_virtual_or_other_innovative_solutions
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 336
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
