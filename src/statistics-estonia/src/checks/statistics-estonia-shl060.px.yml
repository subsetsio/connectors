# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-shl060.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [birth_cohort, number_of_medications_used, indicator, year]
temporal: year
checks:
  - kind: unique
    columns: [birth_cohort, number_of_medications_used, indicator, year]
  - kind: not_null
    col: birth_cohort
  - kind: not_null
    col: number_of_medications_used
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: row_floor
    min: 108
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
