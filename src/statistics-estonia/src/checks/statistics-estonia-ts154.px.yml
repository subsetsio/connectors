# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts154.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, nationality_of_vessel, type_of_vessel, direction, indicator]
checks:
  - kind: unique
    columns: [reference_period, nationality_of_vessel, type_of_vessel, direction, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: nationality_of_vessel
  - kind: not_null
    col: type_of_vessel
  - kind: not_null
    col: direction
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 18018
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
