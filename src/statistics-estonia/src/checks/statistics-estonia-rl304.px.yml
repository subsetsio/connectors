# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl304.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [vocational_or_professional_education, general_education, ethnic_nationality, place_of_residence, sex]
checks:
  - kind: unique
    columns: [vocational_or_professional_education, general_education, ethnic_nationality, place_of_residence, sex]
  - kind: not_null
    col: vocational_or_professional_education
  - kind: not_null
    col: general_education
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 2160
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
