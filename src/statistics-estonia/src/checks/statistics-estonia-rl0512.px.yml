# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl0512.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_of_birth, previous_country_of_residence, age_group, sex, place_of_residence]
checks:
  - kind: unique
    columns: [country_of_birth, previous_country_of_residence, age_group, sex, place_of_residence]
  - kind: not_null
    col: country_of_birth
  - kind: not_null
    col: previous_country_of_residence
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: row_floor
    min: 12600
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
