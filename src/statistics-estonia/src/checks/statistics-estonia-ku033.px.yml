# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ku033.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, type_of_school, language_of_instruction_at_school]
temporal: year
checks:
  - kind: unique
    columns: [year, type_of_school, language_of_instruction_at_school]
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_school
  - kind: not_null
    col: language_of_instruction_at_school
  - kind: row_floor
    min: 400
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
