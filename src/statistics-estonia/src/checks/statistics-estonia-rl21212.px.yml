# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21212.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, number_of_flats_in_the_building, time_of_construction, indicator]
temporal: year
checks:
  - kind: unique
    columns: [location, number_of_flats_in_the_building, time_of_construction, indicator]
  - kind: not_null
    col: location
  - kind: not_null
    col: number_of_flats_in_the_building
  - kind: not_null
    col: time_of_construction
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 5236
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
