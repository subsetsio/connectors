# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts204.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [partner_country, reference_period, arrival_departure, type_of_flight, indicator]
checks:
  - kind: unique
    columns: [partner_country, reference_period, arrival_departure, type_of_flight, indicator]
  - kind: not_null
    col: partner_country
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: arrival_departure
  - kind: not_null
    col: type_of_flight
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 10206
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
