    columns: [group_of_individuals, device_internet_connection, indicator, year]
  - kind: not_null
    col: group_of_individuals
  - kind: not_null
    col: device_internet_connection
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: row_floor
    min: 960
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
