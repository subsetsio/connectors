# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-td029.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, persons_employed, source_of_funds, indicator]
checks:
  - kind: unique
    columns: [reference_period, persons_employed, source_of_funds, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: persons_employed
  - kind: not_null
    col: source_of_funds
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 252
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
