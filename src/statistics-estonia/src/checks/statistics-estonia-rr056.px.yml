# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rr056.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [function_of_government, year, indicator, sector]
temporal: year
checks:
  - kind: unique
    columns: [function_of_government, year, indicator, sector]
  - kind: not_null
    col: function_of_government
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: sector
  - kind: row_floor
    min: 72000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
