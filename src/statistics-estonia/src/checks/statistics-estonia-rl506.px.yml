# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl506.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [place_of_residence, source_of_subsistence, importance_of_source_of_subsistence, age, sex, household_size]
checks:
  - kind: unique
    columns: [place_of_residence, source_of_subsistence, importance_of_source_of_subsistence, age, sex, household_size]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: source_of_subsistence
  - kind: not_null
    col: importance_of_source_of_subsistence
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: not_null
    col: household_size
  - kind: row_floor
    min: 20448
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
