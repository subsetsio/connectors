# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tku30.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unequal_treatment, experience_of_unjustified_unequal_treatment, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [unequal_treatment, experience_of_unjustified_unequal_treatment, year, indicator]
  - kind: not_null
    col: unequal_treatment
  - kind: not_null
    col: experience_of_unjustified_unequal_treatment
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 63
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
