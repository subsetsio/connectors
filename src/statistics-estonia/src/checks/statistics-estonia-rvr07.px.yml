# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rvr07.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, county_of_destination, county_of_departure, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, county_of_destination, county_of_departure, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: county_of_destination
  - kind: not_null
    col: county_of_departure
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 9984
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
