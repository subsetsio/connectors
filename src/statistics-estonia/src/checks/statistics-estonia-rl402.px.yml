    columns: [sex, place_of_residence, source_of_subsistence, importance_of_source_of_subsistence, ethnic_nationality, age]
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: source_of_subsistence
  - kind: not_null
    col: importance_of_source_of_subsistence
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: age
  - kind: row_floor
    min: 12960
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
