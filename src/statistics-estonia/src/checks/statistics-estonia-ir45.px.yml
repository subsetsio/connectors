# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ir45.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, knowledge_of_estonian, citizenship, generation, indicator]
checks:
  - kind: unique
    columns: [reference_period, knowledge_of_estonian, citizenship, generation, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: knowledge_of_estonian
  - kind: not_null
    col: citizenship
  - kind: not_null
    col: generation
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1620
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
