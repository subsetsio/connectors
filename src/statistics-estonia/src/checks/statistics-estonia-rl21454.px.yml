# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21454.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [religion, ethnic_nationality, age_group, sex, place_of_residence]
temporal: year
checks:
  - kind: unique
    columns: [religion, ethnic_nationality, age_group, sex, place_of_residence]
  - kind: not_null
    col: religion
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: row_floor
    min: 5670
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
