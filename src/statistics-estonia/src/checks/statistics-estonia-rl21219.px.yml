# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21219.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, time_of_construction, comfort_characteristics, occupancy]
temporal: year
checks:
  - kind: unique
    columns: [location, time_of_construction, comfort_characteristics, occupancy]
  - kind: not_null
    col: location
  - kind: not_null
    col: time_of_construction
  - kind: not_null
    col: comfort_characteristics
  - kind: not_null
    col: occupancy
  - kind: row_floor
    min: 66885
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
