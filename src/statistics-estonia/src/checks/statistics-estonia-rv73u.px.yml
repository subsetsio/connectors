# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv73u.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, marital_status_of_mother, place_of_residence, time_of_birth, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, marital_status_of_mother, place_of_residence, time_of_birth, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: marital_status_of_mother
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: time_of_birth
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 972
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
