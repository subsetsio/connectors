# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-nh27.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, perceived_availability_of_state_support, sex, age_group]
temporal: year
checks:
  - kind: unique
    columns: [year, perceived_availability_of_state_support, sex, age_group]
  - kind: not_null
    col: year
  - kind: not_null
    col: perceived_availability_of_state_support
  - kind: not_null
    col: sex
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 112
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
