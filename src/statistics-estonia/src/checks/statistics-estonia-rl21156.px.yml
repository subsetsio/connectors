# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [occupation, place_of_residence, employment_status, sex]
temporal: year
checks:
  - kind: unique
    columns: [occupation, place_of_residence, employment_status, sex]
  - kind: not_null
    col: occupation
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: employment_status
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 8415
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
