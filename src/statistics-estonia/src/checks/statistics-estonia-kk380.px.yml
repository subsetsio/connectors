# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-kk380.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [economic_activity, environmental_protection_resource_management_activity, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [economic_activity, environmental_protection_resource_management_activity, year, indicator]
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: environmental_protection_resource_management_activity
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 5100
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
