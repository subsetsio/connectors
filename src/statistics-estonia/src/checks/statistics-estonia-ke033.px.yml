# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ke033.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, type_of_fuel_energy, indicator, type_of_power_plant]
temporal: year
checks:
  - kind: unique
    columns: [year, type_of_fuel_energy, indicator, type_of_power_plant]
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_fuel_energy
  - kind: not_null
    col: indicator
  - kind: not_null
    col: type_of_power_plant
  - kind: row_floor
    min: 3120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
