# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt4645.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, region_county, indicator, age_group]
checks:
  - kind: unique
    columns: [reference_period, region_county, indicator, age_group]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: region_county
  - kind: not_null
    col: indicator
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 12144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
