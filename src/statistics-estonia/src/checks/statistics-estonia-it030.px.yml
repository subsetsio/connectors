# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-it030.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [economic_activity, indicator, reference_period, number_of_persons_employed]
checks:
  - kind: unique
    columns: [economic_activity, indicator, reference_period, number_of_persons_employed]
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: indicator
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: number_of_persons_employed
  - kind: row_floor
    min: 6699
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
