    col: county
  - kind: not_null
    col: number_of_rooms
  - kind: not_null
    col: number_of_inhabitants_in_dwelling
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 100188
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
