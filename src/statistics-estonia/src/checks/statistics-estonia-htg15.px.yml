# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-htg15.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, source_of_financing, type_of_expenditure, type_of_education]
temporal: year
checks:
  - kind: unique
    columns: [year, source_of_financing, type_of_expenditure, type_of_education]
  - kind: not_null
    col: year
  - kind: not_null
    col: source_of_financing
  - kind: not_null
    col: type_of_expenditure
  - kind: not_null
    col: type_of_education
  - kind: row_floor
    min: 2016
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
