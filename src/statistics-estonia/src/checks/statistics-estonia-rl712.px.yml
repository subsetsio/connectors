# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl712.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, comfort_characteristics, occupancy, type_of_dwelling]
checks:
  - kind: unique
    columns: [location, comfort_characteristics, occupancy, type_of_dwelling]
  - kind: not_null
    col: location
  - kind: not_null
    col: comfort_characteristics
  - kind: not_null
    col: occupancy
  - kind: not_null
    col: type_of_dwelling
  - kind: row_floor
    min: 37000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
