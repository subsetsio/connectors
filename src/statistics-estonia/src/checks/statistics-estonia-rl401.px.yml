# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl401.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [place_of_residence, source_of_subsistence, sex, importance_of_source_of_subsistence]
checks:
  - kind: unique
    columns: [place_of_residence, source_of_subsistence, sex, importance_of_source_of_subsistence]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: source_of_subsistence
  - kind: not_null
    col: sex
  - kind: not_null
    col: importance_of_source_of_subsistence
  - kind: row_floor
    min: 13248
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
