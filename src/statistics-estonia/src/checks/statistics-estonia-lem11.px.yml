# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-lem11.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, income_quintile_of_household, economic_situation_in_comparison_with_one_year_ago]
temporal: year
checks:
  - kind: unique
    columns: [year, income_quintile_of_household, economic_situation_in_comparison_with_one_year_ago]
  - kind: not_null
    col: year
  - kind: not_null
    col: income_quintile_of_household
  - kind: not_null
    col: economic_situation_in_comparison_with_one_year_ago
  - kind: row_floor
    min: 135
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
