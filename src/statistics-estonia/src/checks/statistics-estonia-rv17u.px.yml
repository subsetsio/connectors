# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv17u.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, duration_of_marriage, age_of_mother, year]
temporal: year
checks:
  - kind: unique
    columns: [county, duration_of_marriage, age_of_mother, year]
  - kind: not_null
    col: county
  - kind: not_null
    col: duration_of_marriage
  - kind: not_null
    col: age_of_mother
  - kind: not_null
    col: year
  - kind: row_floor
    min: 4536
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
