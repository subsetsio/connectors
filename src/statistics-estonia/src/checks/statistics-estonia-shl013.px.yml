# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-shl013.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [change_in_body_mass_index, birth_cohort, sex, indicator]
checks:
  - kind: unique
    columns: [change_in_body_mass_index, birth_cohort, sex, indicator]
  - kind: not_null
    col: change_in_body_mass_index
  - kind: not_null
    col: birth_cohort
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
