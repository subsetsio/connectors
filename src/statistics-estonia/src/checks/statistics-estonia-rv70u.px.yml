# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv70u.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [birth_weight, age_of_mother, year, place_of_residence]
temporal: year
checks:
  - kind: unique
    columns: [birth_weight, age_of_mother, year, place_of_residence]
  - kind: not_null
    col: birth_weight
  - kind: not_null
    col: age_of_mother
  - kind: not_null
    col: year
  - kind: not_null
    col: place_of_residence
  - kind: row_floor
    min: 2340
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
