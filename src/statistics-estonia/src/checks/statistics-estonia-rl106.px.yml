# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl106.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location_at_the_moment_of_census, duration_of_temporary_presence, sex]
checks:
  - kind: unique
    columns: [location_at_the_moment_of_census, duration_of_temporary_presence, sex]
  - kind: not_null
    col: location_at_the_moment_of_census
  - kind: not_null
    col: duration_of_temporary_presence
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 3297
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
