# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-sh61.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_persons, smoking_consumption_of_alcohol, year]
temporal: year
checks:
  - kind: unique
    columns: [group_of_persons, smoking_consumption_of_alcohol, year]
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: smoking_consumption_of_alcohol
  - kind: not_null
    col: year
  - kind: row_floor
    min: 1020
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
