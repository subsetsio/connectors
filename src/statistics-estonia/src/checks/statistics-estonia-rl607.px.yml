# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl607.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [economic_activity, age, place_of_residence, sex]
checks:
  - kind: unique
    columns: [economic_activity, age, place_of_residence, sex]
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: age
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 1350
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
