# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv58u.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_group, year, marital_status, place_of_residence, sex]
temporal: year
checks:
  - kind: unique
    columns: [age_group, year, marital_status, place_of_residence, sex]
  - kind: not_null
    col: age_group
  - kind: not_null
    col: year
  - kind: not_null
    col: marital_status
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 5832
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
