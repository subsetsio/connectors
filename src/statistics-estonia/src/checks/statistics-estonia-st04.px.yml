# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-st04.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, income_quintile, ethnic_nationality]
checks:
  - kind: unique
    columns: [reference_period, income_quintile, ethnic_nationality]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: income_quintile
  - kind: not_null
    col: ethnic_nationality
  - kind: row_floor
    min: 132
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
