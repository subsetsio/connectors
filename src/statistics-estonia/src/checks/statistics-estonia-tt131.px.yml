# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt131.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, second_domestic_language, sex, ethnic_nationality, indicator]
checks:
  - kind: unique
    columns: [reference_period, second_domestic_language, sex, ethnic_nationality, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: second_domestic_language
  - kind: not_null
    col: sex
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1044
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
