# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rvr03.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, age_group, indicator, sex, type_of_migration]
temporal: year
checks:
  - kind: unique
    columns: [year, age_group, indicator, sex, type_of_migration]
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group
  - kind: not_null
    col: indicator
  - kind: not_null
    col: sex
  - kind: not_null
    col: type_of_migration
  - kind: row_floor
    min: 4446
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
