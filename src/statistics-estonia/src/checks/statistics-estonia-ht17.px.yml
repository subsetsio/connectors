# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ht17.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, county, language_of_instruction, sex, education_level]
checks:
  - kind: unique
    columns: [reference_period, county, language_of_instruction, sex, education_level]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: county
  - kind: not_null
    col: language_of_instruction
  - kind: not_null
    col: sex
  - kind: not_null
    col: education_level
  - kind: row_floor
    min: 6696
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
