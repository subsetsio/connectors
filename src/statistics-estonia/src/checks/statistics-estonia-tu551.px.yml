# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tu551.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, mode_of_accommodation, indicator]
checks:
  - kind: unique
    columns: [reference_period, mode_of_accommodation, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: mode_of_accommodation
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 729
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
