# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv262.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, month_of_contracting_the_marriage, type_of_marriage]
temporal: year
checks:
  - kind: unique
    columns: [year, month_of_contracting_the_marriage, type_of_marriage]
  - kind: not_null
    col: year
  - kind: not_null
    col: month_of_contracting_the_marriage
  - kind: not_null
    col: type_of_marriage
  - kind: row_floor
    min: 2028
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
