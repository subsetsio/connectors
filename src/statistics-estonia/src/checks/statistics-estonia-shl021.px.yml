# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-shl021.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [health_self_assessment, birth_cohort, sex, indicator, year]
temporal: year
checks:
  - kind: unique
    columns: [health_self_assessment, birth_cohort, sex, indicator, year]
  - kind: not_null
    col: health_self_assessment
  - kind: not_null
    col: birth_cohort
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: row_floor
    min: 210
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
