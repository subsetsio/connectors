# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-thv82.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [kind_of_expenditure, year, expenditure_quintile, type_of_household, indicator]
temporal: year
checks:
  - kind: unique
    columns: [kind_of_expenditure, year, expenditure_quintile, type_of_household, indicator]
  - kind: not_null
    col: kind_of_expenditure
  - kind: not_null
    col: year
  - kind: not_null
    col: expenditure_quintile
  - kind: not_null
    col: type_of_household
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 2660
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
