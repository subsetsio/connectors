# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-it431.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_individuals, reference_period, buying_ordering, indicator]
checks:
  - kind: unique
    columns: [group_of_individuals, reference_period, buying_ordering, indicator]
  - kind: not_null
    col: group_of_individuals
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: buying_ordering
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
