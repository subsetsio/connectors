# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv116.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, mother_s_citizenship, mother_s_age]
temporal: year
checks:
  - kind: unique
    columns: [year, mother_s_citizenship, mother_s_age]
  - kind: not_null
    col: year
  - kind: not_null
    col: mother_s_citizenship
  - kind: not_null
    col: mother_s_age
  - kind: row_floor
    min: 269
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
