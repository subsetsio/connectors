# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-let10.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [place_of_residence, year, washing_facilities]
temporal: year
checks:
  - kind: unique
    columns: [place_of_residence, year, washing_facilities]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: year
  - kind: not_null
    col: washing_facilities
  - kind: row_floor
    min: 375
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
