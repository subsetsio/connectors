key: [level_of_computer_skills, group_of_individuals, reference_period, indicator]
checks:
  - kind: unique
    columns: [level_of_computer_skills, group_of_individuals, reference_period, indicator]
  - kind: not_null
    col: level_of_computer_skills
  - kind: not_null
    col: group_of_individuals
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 4800
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
