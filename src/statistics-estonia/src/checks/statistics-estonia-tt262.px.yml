# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt262.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, place_of_residence, type_of_employment_relation, sex, indicator]
checks:
  - kind: unique
    columns: [reference_period, place_of_residence, type_of_employment_relation, sex, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: type_of_employment_relation
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 2220
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
