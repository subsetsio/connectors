# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl0221.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, comfort_characteristics, owner, occupancy, type_of_building]
checks:
  - kind: unique
    columns: [county, comfort_characteristics, owner, occupancy, type_of_building]
  - kind: not_null
    col: county
  - kind: not_null
    col: comfort_characteristics
  - kind: not_null
    col: owner
  - kind: not_null
    col: occupancy
  - kind: not_null
    col: type_of_building
  - kind: row_floor
    min: 24288
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
