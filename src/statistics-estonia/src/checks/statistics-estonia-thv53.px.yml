# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-thv53.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, disability, age_group, sex, occurrence_of_illness]
checks:
  - kind: unique
    columns: [reference_period, disability, age_group, sex, occurrence_of_illness]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: disability
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: not_null
    col: occurrence_of_illness
  - kind: row_floor
    min: 1152
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
