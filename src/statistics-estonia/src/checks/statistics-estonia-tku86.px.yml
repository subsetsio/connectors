# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tku86.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_enterprises, conflicts_between_enterprise_and_employees, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [group_of_enterprises, conflicts_between_enterprise_and_employees, year, indicator]
  - kind: not_null
    col: group_of_enterprises
  - kind: not_null
    col: conflicts_between_enterprise_and_employees
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
