# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl0223.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, main_heating_option, occupancy, type_of_building]
checks:
  - kind: unique
    columns: [location, main_heating_option, occupancy, type_of_building]
  - kind: not_null
    col: location
  - kind: not_null
    col: main_heating_option
  - kind: not_null
    col: occupancy
  - kind: not_null
    col: type_of_building
  - kind: row_floor
    min: 9128
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
