# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [birth_cohort, health_related_limitations_of_daily_life, sex, indicator, year]
temporal: year
checks:
  - kind: unique
    columns: [birth_cohort, health_related_limitations_of_daily_life, sex, indicator, year]
  - kind: not_null
    col: birth_cohort
  - kind: not_null
    col: health_related_limitations_of_daily_life
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: row_floor
    min: 120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
