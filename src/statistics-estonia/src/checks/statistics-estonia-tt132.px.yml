# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt132.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator, ethnic_nationality, sex, knowledge_of_languages, reference_period]
checks:
  - kind: unique
    columns: [indicator, ethnic_nationality, sex, knowledge_of_languages, reference_period]
  - kind: not_null
    col: indicator
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: sex
  - kind: not_null
    col: knowledge_of_languages
  - kind: not_null
    col: reference_period
  - kind: row_floor
    min: 1827
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
