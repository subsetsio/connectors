# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ko16.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region_administrative_unit, net_monthly_income_per_household_member, assessment, satisfaction, indicator]
temporal: year
checks:
  - kind: unique
    columns: [region_administrative_unit, net_monthly_income_per_household_member, assessment, satisfaction, indicator]
  - kind: not_null
    col: region_administrative_unit
  - kind: not_null
    col: net_monthly_income_per_household_member
  - kind: not_null
    col: assessment
  - kind: not_null
    col: satisfaction
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 14700
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
