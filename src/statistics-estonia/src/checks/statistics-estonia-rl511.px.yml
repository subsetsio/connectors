    columns: [place_of_residence, household_composition]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: household_composition
  - kind: row_floor
    min: 2944
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
