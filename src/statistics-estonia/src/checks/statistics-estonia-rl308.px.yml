# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl308.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, place_of_residence, age, economic_activity, ethnic_nationality, level_of_study]
checks:
  - kind: unique
    columns: [sex, place_of_residence, age, economic_activity, ethnic_nationality, level_of_study]
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: age
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: level_of_study
  - kind: row_floor
    min: 22500
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
