# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-th752.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, type_of_settlement_settlement_region, sex, age]
temporal: year
checks:
  - kind: unique
    columns: [year, type_of_settlement_settlement_region, sex, age]
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_settlement_settlement_region
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: row_floor
    min: 240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
