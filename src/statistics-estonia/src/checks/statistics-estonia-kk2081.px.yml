# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-kk2081.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pesticide_active_substance, crop, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [pesticide_active_substance, crop, year, indicator]
  - kind: not_null
    col: pesticide_active_substance
  - kind: not_null
    col: crop
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 40068
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
