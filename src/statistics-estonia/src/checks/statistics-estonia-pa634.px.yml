# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-pa634.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [economic_activity, major_group_of_occupation, reference_period, sex]
checks:
  - kind: unique
    columns: [economic_activity, major_group_of_occupation, reference_period, sex]
  - kind: not_null
    col: economic_activity
  - kind: not_null
    col: major_group_of_occupation
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 1320
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
