    columns: [sex, place_of_residence, type_of_dwelling, type_of_comfort_characteristics, ethnic_nationality, age]
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: type_of_dwelling
  - kind: not_null
    col: type_of_comfort_characteristics
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: age
  - kind: row_floor
    min: 102000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
