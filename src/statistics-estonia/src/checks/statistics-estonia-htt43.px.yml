# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-htt43.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_persons, year, working_and_not_working, indicator]
temporal: year
checks:
  - kind: unique
    columns: [group_of_persons, year, working_and_not_working, indicator]
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: year
  - kind: not_null
    col: working_and_not_working
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 84
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
