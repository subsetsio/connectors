# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-lev14.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cause_of_death, age_of_mother, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, cause_of_death, age_of_mother, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: cause_of_death
  - kind: not_null
    col: age_of_mother
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 3120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
