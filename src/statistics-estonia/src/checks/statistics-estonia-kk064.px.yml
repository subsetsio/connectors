# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-kk064.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, environmental_protection_activity, indicator, type_of_enterprise]
temporal: year
checks:
  - kind: unique
    columns: [year, environmental_protection_activity, indicator, type_of_enterprise]
  - kind: not_null
    col: year
  - kind: not_null
    col: environmental_protection_activity
  - kind: not_null
    col: indicator
  - kind: not_null
    col: type_of_enterprise
  - kind: row_floor
    min: 1275
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
