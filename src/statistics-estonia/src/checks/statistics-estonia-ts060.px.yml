# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts060.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, indicator, transport_type, revenue_income]
checks:
  - kind: unique
    columns: [reference_period, indicator, transport_type, revenue_income]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: indicator
  - kind: not_null
    col: transport_type
  - kind: not_null
    col: revenue_income
  - kind: row_floor
    min: 7070
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
