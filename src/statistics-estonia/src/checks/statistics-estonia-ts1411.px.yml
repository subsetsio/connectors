# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts1411.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, reference_period, indicator, loading_unloading]
checks:
  - kind: unique
    columns: [country, reference_period, indicator, loading_unloading]
  - kind: not_null
    col: country
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: indicator
  - kind: not_null
    col: loading_unloading
  - kind: row_floor
    min: 4650
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
