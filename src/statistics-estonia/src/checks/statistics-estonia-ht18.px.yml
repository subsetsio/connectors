# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ht18.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, grade, county, language_of_instruction]
temporal: year
checks:
  - kind: unique
    columns: [year, grade, county, language_of_instruction]
  - kind: not_null
    col: year
  - kind: not_null
    col: grade
  - kind: not_null
    col: county
  - kind: not_null
    col: language_of_instruction
  - kind: row_floor
    min: 12648
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
