# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-it42.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [group_of_individuals, reference_period, frequency_of_use, using_computer_internet]
checks:
  - kind: unique
    columns: [group_of_individuals, reference_period, frequency_of_use, using_computer_internet]
  - kind: not_null
    col: group_of_individuals
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: frequency_of_use
  - kind: not_null
    col: using_computer_internet
  - kind: row_floor
    min: 1120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
