# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv102u.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, month_of_birth, year, type_of_settlement_region]
temporal: year
checks:
  - kind: unique
    columns: [county, month_of_birth, year, type_of_settlement_region]
  - kind: not_null
    col: county
  - kind: not_null
    col: month_of_birth
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_settlement_region
  - kind: row_floor
    min: 3159
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
