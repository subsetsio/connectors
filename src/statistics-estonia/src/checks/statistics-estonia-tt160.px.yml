# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt160.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, participation_in_lifelong_learning, indicator]
checks:
  - kind: unique
    columns: [reference_period, participation_in_lifelong_learning, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: participation_in_lifelong_learning
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 319
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
