# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rr10.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [financial_transactions_and_balance_sheet, indicator, sector, counterpart, year, quarter, national_accounts]
temporal: quarter
checks:
  - kind: unique
    columns: [financial_transactions_and_balance_sheet, indicator, sector, counterpart, year, quarter, national_accounts]
  - kind: not_null
    col: financial_transactions_and_balance_sheet
  - kind: not_null
    col: indicator
  - kind: not_null
    col: sector
  - kind: not_null
    col: counterpart
  - kind: not_null
    col: year
  - kind: not_null
    col: quarter
  - kind: not_null
    col: national_accounts
  - kind: row_floor
    min: 45240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
