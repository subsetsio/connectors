# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv108.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, ethnic_nationality_of_mother, ethnic_nationality_of_father]
temporal: year
checks:
  - kind: unique
    columns: [year, ethnic_nationality_of_mother, ethnic_nationality_of_father]
  - kind: not_null
    col: year
  - kind: not_null
    col: ethnic_nationality_of_mother
  - kind: not_null
    col: ethnic_nationality_of_father
  - kind: row_floor
    min: 832
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
