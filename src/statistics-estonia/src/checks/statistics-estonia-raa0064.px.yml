# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-raa0064.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, place_of_destination_departure, quarter, value_share, indicator]
temporal: quarter
checks:
  - kind: unique
    columns: [year, place_of_destination_departure, quarter, value_share, indicator]
  - kind: not_null
    col: year
  - kind: not_null
    col: place_of_destination_departure
  - kind: not_null
    col: quarter
  - kind: not_null
    col: value_share
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1140
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
