# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-nh18.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, administrative_unit_of_place_of_residence, age_group, indicator, country_of_birth_citizenship, country, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, administrative_unit_of_place_of_residence, age_group, indicator, country_of_birth_citizenship, country, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: administrative_unit_of_place_of_residence
  - kind: not_null
    col: age_group
  - kind: not_null
    col: indicator
  - kind: not_null
    col: country_of_birth_citizenship
  - kind: not_null
    col: country
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 56160
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
