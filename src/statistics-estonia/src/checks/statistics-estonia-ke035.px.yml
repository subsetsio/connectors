# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ke035.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, type_of_fuel_energy, type_of_generator, indicator]
checks:
  - kind: unique
    columns: [reference_period, type_of_fuel_energy, type_of_generator, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: type_of_fuel_energy
  - kind: not_null
    col: type_of_generator
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 968
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
