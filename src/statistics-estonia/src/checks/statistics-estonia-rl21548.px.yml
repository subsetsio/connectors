# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21548.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, sex, age_group, place_of_residence, country_of_birth, ethnic_nationality, source_country]
temporal: year
checks:
  - kind: unique
    columns: [year, sex, age_group, place_of_residence, country_of_birth, ethnic_nationality, source_country]
  - kind: not_null
    col: year
  - kind: not_null
    col: sex
  - kind: not_null
    col: age_group
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: country_of_birth
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: source_country
  - kind: row_floor
    min: 23400
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
