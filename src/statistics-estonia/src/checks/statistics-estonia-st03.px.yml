# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-st03.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, place_of_residence, income_quintile]
checks:
  - kind: unique
    columns: [reference_period, place_of_residence, income_quintile]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: income_quintile
  - kind: row_floor
    min: 594
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
