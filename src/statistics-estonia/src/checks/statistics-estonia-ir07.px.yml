# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ir07.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator, reference_period, group_of_persons, origin]
checks:
  - kind: unique
    columns: [indicator, reference_period, group_of_persons, origin]
  - kind: not_null
    col: indicator
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: origin
  - kind: row_floor
    min: 14040
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
