# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl0709.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, ethnic_nationality, household_size, indicator]
checks:
  - kind: unique
    columns: [county, ethnic_nationality, household_size, indicator]
  - kind: not_null
    col: county
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: household_size
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 5060
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
