# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ku145.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_of_funding, year, broadcaster, indicator]
temporal: year
checks:
  - kind: unique
    columns: [source_of_funding, year, broadcaster, indicator]
  - kind: not_null
    col: source_of_funding
  - kind: not_null
    col: year
  - kind: not_null
    col: broadcaster
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 60
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
