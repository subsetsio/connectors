# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ir03.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_group, reference_period, group_of_persons, indicator]
checks:
  - kind: unique
    columns: [age_group, reference_period, group_of_persons, indicator]
  - kind: not_null
    col: age_group
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: group_of_persons
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 4500
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
