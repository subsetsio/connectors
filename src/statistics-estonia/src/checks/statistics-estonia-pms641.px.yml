# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-pms641.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type_of_housing_livestock, kind_of_livestock, indicator]
temporal: year
checks:
  - kind: unique
    columns: [type_of_housing_livestock, kind_of_livestock, indicator]
  - kind: not_null
    col: type_of_housing_livestock
  - kind: not_null
    col: kind_of_livestock
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 12
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
