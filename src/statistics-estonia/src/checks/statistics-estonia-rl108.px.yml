# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl108.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [permanent_place_of_residence, age, sex, location_at_the_moment_of_census]
checks:
  - kind: unique
    columns: [permanent_place_of_residence, age, sex, location_at_the_moment_of_census]
  - kind: not_null
    col: permanent_place_of_residence
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: not_null
    col: location_at_the_moment_of_census
  - kind: row_floor
    min: 1683
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
