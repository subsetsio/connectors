# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-let171.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [structure_of_household, year, equipment_with_sewerage]
temporal: year
checks:
  - kind: unique
    columns: [structure_of_household, year, equipment_with_sewerage]
  - kind: not_null
    col: structure_of_household
  - kind: not_null
    col: year
  - kind: not_null
    col: equipment_with_sewerage
  - kind: row_floor
    min: 147
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
