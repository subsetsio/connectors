# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ht04.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, county_of_residence, age, sex]
checks:
  - kind: unique
    columns: [reference_period, county_of_residence, age, sex]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: county_of_residence
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 9180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
