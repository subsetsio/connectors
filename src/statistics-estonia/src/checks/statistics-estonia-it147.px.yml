    col: economic_activity
  - kind: not_null
    col: number_of_persons_employed
  - kind: not_null
    col: reference_period
  - kind: row_floor
    min: 11223
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
