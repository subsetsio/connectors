# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-st10.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, educational_level_income_decile, source_of_income]
checks:
  - kind: unique
    columns: [reference_period, educational_level_income_decile, source_of_income]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: educational_level_income_decile
  - kind: not_null
    col: source_of_income
  - kind: row_floor
    min: 833
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
