# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt234.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, location_of_main_job, sex, place_of_residence, indicator]
checks:
  - kind: unique
    columns: [reference_period, location_of_main_job, sex, place_of_residence, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: location_of_main_job
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 2088
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
