    columns: [year, county, age_group, type_of_settlement_region, sex, indicator]
  - kind: not_null
    col: year
  - kind: not_null
    col: county
  - kind: not_null
    col: age_group
  - kind: not_null
    col: type_of_settlement_region
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 39244
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
