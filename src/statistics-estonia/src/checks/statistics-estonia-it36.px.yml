# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-it36.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [goods_services, reference_period, place_of_residence, indicator]
checks:
  - kind: unique
    columns: [goods_services, reference_period, place_of_residence, indicator]
  - kind: not_null
    col: goods_services
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 2520
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
