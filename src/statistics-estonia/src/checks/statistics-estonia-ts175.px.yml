# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ts175.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cargo_type, quarter, indicator]
temporal: quarter
checks:
  - kind: unique
    columns: [year, cargo_type, quarter, indicator]
  - kind: not_null
    col: year
  - kind: not_null
    col: cargo_type
  - kind: not_null
    col: quarter
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 840
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
