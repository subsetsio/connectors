# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-nh09.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [administrative_unit, year, type_of_ownership]
temporal: year
checks:
  - kind: unique
    columns: [administrative_unit, year, type_of_ownership]
  - kind: not_null
    col: administrative_unit
  - kind: not_null
    col: year
  - kind: not_null
    col: type_of_ownership
  - kind: row_floor
    min: 1350
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
