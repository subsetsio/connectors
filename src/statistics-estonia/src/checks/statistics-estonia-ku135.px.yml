# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ku135.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [producer, year, television_channel, indicator]
temporal: year
checks:
  - kind: unique
    columns: [producer, year, television_channel, indicator]
  - kind: not_null
    col: producer
  - kind: not_null
    col: year
  - kind: not_null
    col: television_channel
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 96
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
