# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-pm071.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [agricultural_land_field_crop, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [agricultural_land_field_crop, year, indicator]
  - kind: not_null
    col: agricultural_land_field_crop
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1202
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
