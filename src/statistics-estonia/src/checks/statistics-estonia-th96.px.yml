# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-th96.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_group, number_of_symptoms_of_diseases_appearing_during_the_last_6_months, sex, year]
temporal: year
checks:
  - kind: unique
    columns: [age_group, number_of_symptoms_of_diseases_appearing_during_the_last_6_months, sex, year]
  - kind: not_null
    col: age_group
  - kind: not_null
    col: number_of_symptoms_of_diseases_appearing_during_the_last_6_months
  - kind: not_null
    col: sex
  - kind: not_null
    col: year
  - kind: row_floor
    min: 315
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
