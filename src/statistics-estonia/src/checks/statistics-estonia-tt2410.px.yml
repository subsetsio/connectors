# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tt2410.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, region, sector_of_economy, indicator]
checks:
  - kind: unique
    columns: [reference_period, region, sector_of_economy, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: region
  - kind: not_null
    col: sector_of_economy
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 3360
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
