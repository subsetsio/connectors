# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-sk26.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reason_for_staying_at_safe_house, year, age_group, sex]
temporal: year
checks:
  - kind: unique
    columns: [reason_for_staying_at_safe_house, year, age_group, sex]
  - kind: not_null
    col: reason_for_staying_at_safe_house
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 825
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
