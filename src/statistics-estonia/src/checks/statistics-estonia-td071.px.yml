# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-td071.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, occupation_category, institutional_sector, sex, indicator]
checks:
  - kind: unique
    columns: [reference_period, occupation_category, institutional_sector, sex, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: occupation_category
  - kind: not_null
    col: institutional_sector
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1800
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
