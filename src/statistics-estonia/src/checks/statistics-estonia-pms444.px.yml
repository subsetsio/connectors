# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-pms444.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, indicator, legal_form_of_holder, reference_period]
checks:
  - kind: unique
    columns: [county, indicator, legal_form_of_holder, reference_period]
  - kind: not_null
    col: county
  - kind: not_null
    col: indicator
  - kind: not_null
    col: legal_form_of_holder
  - kind: not_null
    col: reference_period
  - kind: row_floor
    min: 624
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
