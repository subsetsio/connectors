# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ak033.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [primary_activity, full_part_time_job, sex]
temporal: period
checks:
  - kind: unique
    columns: [primary_activity, full_part_time_job, sex]
  - kind: not_null
    col: primary_activity
  - kind: not_null
    col: full_part_time_job
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 138
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
