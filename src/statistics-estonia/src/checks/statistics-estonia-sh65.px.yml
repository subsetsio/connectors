# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-sh65.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [smoking_consumption_of_alcohol, health_condition, year]
temporal: year
checks:
  - kind: unique
    columns: [smoking_consumption_of_alcohol, health_condition, year]
  - kind: not_null
    col: smoking_consumption_of_alcohol
  - kind: not_null
    col: health_condition
  - kind: not_null
    col: year
  - kind: row_floor
    min: 331
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
