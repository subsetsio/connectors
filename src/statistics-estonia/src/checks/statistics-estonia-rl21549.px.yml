# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21549.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_country, place_of_residence, ethnic_nationality, sex]
temporal: year
checks:
  - kind: unique
    columns: [source_country, place_of_residence, ethnic_nationality, sex]
  - kind: not_null
    col: source_country
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 5148
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
