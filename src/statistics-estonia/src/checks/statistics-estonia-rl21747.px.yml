# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21747.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type_of_family, size_of_family, indicator]
temporal: year
checks:
  - kind: unique
    columns: [type_of_family, size_of_family, indicator]
  - kind: not_null
    col: type_of_family
  - kind: not_null
    col: size_of_family
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 90
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
