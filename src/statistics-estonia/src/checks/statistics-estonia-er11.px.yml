# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-er11.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, number_of_units, type_of_enterprise_group]
temporal: year
checks:
  - kind: unique
    columns: [year, number_of_units, type_of_enterprise_group]
  - kind: not_null
    col: year
  - kind: not_null
    col: number_of_units
  - kind: not_null
    col: type_of_enterprise_group
  - kind: row_floor
    min: 176
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
