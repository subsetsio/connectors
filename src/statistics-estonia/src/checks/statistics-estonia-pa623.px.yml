# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-pa623.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [major_group_of_occupation, indicator, reference_period, sex]
checks:
  - kind: unique
    columns: [major_group_of_occupation, indicator, reference_period, sex]
  - kind: not_null
    col: major_group_of_occupation
  - kind: not_null
    col: indicator
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 660
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
