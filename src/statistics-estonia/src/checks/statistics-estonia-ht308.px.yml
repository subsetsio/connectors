# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ht308.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, region_of_origin, level_of_study, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, region_of_origin, level_of_study, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: region_of_origin
  - kind: not_null
    col: level_of_study
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 480
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
