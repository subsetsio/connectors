# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ir30.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_period, origin, duration_of_unemployment, sex, indicator]
checks:
  - kind: unique
    columns: [reference_period, origin, duration_of_unemployment, sex, indicator]
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: origin
  - kind: not_null
    col: duration_of_unemployment
  - kind: not_null
    col: sex
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 486
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
