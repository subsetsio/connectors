# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-ak012.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [primary_activity, day_of_the_week, sex, period]
temporal: period
checks:
  - kind: unique
    columns: [primary_activity, day_of_the_week, sex, period]
  - kind: not_null
    col: primary_activity
  - kind: not_null
    col: day_of_the_week
  - kind: not_null
    col: sex
  - kind: not_null
    col: period
  - kind: row_floor
    min: 828
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
