# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-em013.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator, county, reference_period, at_the_beginning_and_at_the_end_of_the_year]
checks:
  - kind: unique
    columns: [indicator, county, reference_period, at_the_beginning_and_at_the_end_of_the_year]
  - kind: not_null
    col: indicator
  - kind: not_null
    col: county
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: at_the_beginning_and_at_the_end_of_the_year
  - kind: row_floor
    min: 4080
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
