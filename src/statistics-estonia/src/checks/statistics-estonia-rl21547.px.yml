# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rl21547.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ethnic_nationality, time_of_immigration_return, place_of_residence, sex]
temporal: year
checks:
  - kind: unique
    columns: [ethnic_nationality, time_of_immigration_return, place_of_residence, sex]
  - kind: not_null
    col: ethnic_nationality
  - kind: not_null
    col: time_of_immigration_return
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 1710
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
