# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rv66.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cause_of_death_by_icd_10, sex_of_foetus]
temporal: year
checks:
  - kind: unique
    columns: [year, cause_of_death_by_icd_10, sex_of_foetus]
  - kind: not_null
    col: year
  - kind: not_null
    col: cause_of_death_by_icd_10
  - kind: not_null
    col: sex_of_foetus
  - kind: row_floor
    min: 1498
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
