# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-rlv706.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [place_of_residence, household_size, indicator, year]
temporal: year
checks:
  - kind: unique
    columns: [place_of_residence, household_size, indicator, year]
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: household_size
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: row_floor
    min: 4440
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
