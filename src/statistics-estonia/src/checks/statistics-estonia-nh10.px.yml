# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-nh10.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [administrative_unit_of_place_of_residence, indicator, year, age_group]
temporal: year
checks:
  - kind: unique
    columns: [administrative_unit_of_place_of_residence, indicator, year, age_group]
  - kind: not_null
    col: administrative_unit_of_place_of_residence
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 9544
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
