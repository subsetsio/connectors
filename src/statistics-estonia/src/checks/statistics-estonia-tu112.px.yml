# compiled by `hardened compile-checks` — post-publish audit of `statistics-estonia-tu112.px`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_of_residence, reference_period, county, indicator]
checks:
  - kind: unique
    columns: [country_of_residence, reference_period, county, indicator]
  - kind: not_null
    col: country_of_residence
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: county
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 29040
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
