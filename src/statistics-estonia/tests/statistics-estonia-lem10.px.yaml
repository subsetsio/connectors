spec_id: statistics-estonia-lem10.px
status: active
tests:
- row_count:
    min: 630
  reason: Statistics Estonia PxWeb table should materialize at least the profiled
    row count from the accepted raw pull.
  certainty: 80
- unique:
  - year
  - household_structure
  - economic_situation_in_comparison_with_one_year_ago
  reason: Verified by model-verify on the raw table profile.
