spec_id: statistics-estonia-ler04.px
status: active
tests:
- row_count:
    min: 1125
  reason: Statistics Estonia PxWeb table should materialize at least the profiled
    row count from the accepted raw pull.
  certainty: 80
- unique:
  - place_of_residence
  - year
  - number_of_rooms_per_household_member
  reason: Verified by model-verify on the raw table profile.
  certainty: 95
- freshness:
    col: year
    reaches: today - 4000d
  reason: Statistics Estonia is a live statistical publisher; a ten-year bound catches
    frozen or badly stale pulls while tolerating historical and discontinued table
    cadences in this broad PxWeb catalog.
  certainty: 70
  points_outward: true
