spec_id: australian-bureau-of-meteorology-stations
status: active
# Full national water monitoring-station register from KiWIS getStationList.
# Columns: station_no, station_id, station_name, latitude, longitude.
tests:
  - not_null: station_no
    reason: station_no is the station register's natural key; KiWIS returns it for every row
    certainty: 99

  - not_null: station_name
    reason: every station carries a name; a null would mean the returnfields contract changed
    certainty: 90

  - column_type: {col: latitude, type: float}
    reason: coordinates are parsed to float64 at the download layer (empty string -> null)
    certainty: 95

  - column_type: {col: longitude, type: float}
    certainty: 95

  - between: {col: latitude, lo: -90, hi: 90}
    reason: BOM stations sit on Earth; an out-of-range lat means a parse/column-swap bug
    certainty: 90

  - between: {col: longitude, lo: 90, hi: 170}
    reason: Australian territory (incl. external territories) spans roughly 90E..170E; a value outside means columns were swapped or mis-parsed
    certainty: 80
    severity: warn

  - row_count: {min: 10000}
    reason: getStationList returned ~139,772 stations during probing (the rainfall network alone is huge); far fewer means a truncated download
    certainty: 90

  - unique: station_no
    reason: one row per station; duplicates would mean the register was concatenated twice
    certainty: 85
    severity: warn
