spec_id: australian-bureau-of-meteorology-values
status: active
# Long-format daily observations from getTimeseriesValues, written as per-
# (parameter, series-chunk) parquet batches. Columns: ts_id, timestamp, value.
# The fetch drops rows whose value is null/blank before writing.
tests:
  - not_null: ts_id
    reason: every observation is tagged with the series it came from (the response block's ts_id)
    certainty: 99

  - not_null: value
    reason: the fetch explicitly drops null/blank values before writing, so every raw row carries a real number
    certainty: 98

  - not_null: timestamp
    reason: each observation has a KiWIS timestamp string; a null means the data array shape changed
    certainty: 97

  - column_type: {col: value, type: float}
    reason: values are parsed to float64 at the download layer
    certainty: 95

  - column_type: {col: ts_id, type: string}
    reason: ts_id is echoed as a string in the response block
    certainty: 95

  - matches: {col: timestamp, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'}
    reason: KiWIS timestamps are ISO8601 like 2010-01-01T09:00:00.000+10:00; the transform slices the leading YYYY-MM-DD
    certainty: 90

  - unique: [ts_id, timestamp]
    reason: date windows are non-overlapping within a chunk, so each (series, timestamp) appears once in raw; duplicates would mean a window overlap bug
    certainty: 75
    severity: warn
