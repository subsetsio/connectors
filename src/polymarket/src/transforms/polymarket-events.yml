# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `polymarket-events`. Regenerate after model-verify.
# caution: Events are grouping records for related markets; event-level volume and liquidity should not be summed together with market-level volume without choosing the intended aggregation level.
key: [event_id]
temporal: updated_at
sort: [updated_at, event_id]
columns:
  - name: event_id
    type: BIGINT
    description: Polymarket Gamma event identifier.
  - name: ticker
    type: VARCHAR
    description: Event ticker or short code assigned by Polymarket.
  - name: slug
    type: VARCHAR
    description: URL-friendly event slug.
  - name: title
    type: VARCHAR
    description: Human-readable event title.
  - name: category
    type: VARCHAR
    description: Polymarket event category when provided.
  - name: description
    type: VARCHAR
    description: Event description from Polymarket.
  - name: volume_usd
    type: DOUBLE
  - name: volume_24h_usd
    type: DOUBLE
  - name: volume_1wk_usd
    type: DOUBLE
  - name: volume_1mo_usd
    type: DOUBLE
  - name: volume_1yr_usd
    type: DOUBLE
  - name: liquidity_usd
    type: DOUBLE
  - name: open_interest
    type: DOUBLE
  - name: comment_count
    type: HUGEINT
  - name: competitive
    type: DOUBLE
  - name: neg_risk
    type: BOOLEAN
  - name: is_active
    type: BOOLEAN
  - name: is_closed
    type: BOOLEAN
  - name: is_archived
    type: BOOLEAN
  - name: is_featured
    type: BOOLEAN
  - name: is_restricted
    type: BOOLEAN
  - name: market_count
    type: BIGINT
  - name: start_date
    type: DATE
  - name: end_date
    type: DATE
  - name: creation_date
    type: DATE
  - name: created_at
    type: TIMESTAMP
  - name: updated_at
    type: TIMESTAMP
    description: Last update timestamp reported by Polymarket.
