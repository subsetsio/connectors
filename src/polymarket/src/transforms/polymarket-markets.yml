# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `polymarket-markets`. Regenerate after model-verify.
# caution: The raw market catalog can contain multiple snapshots of the same market across update times; use the latest-row transform when a one-row-per-market current catalog is needed.
# caution: Binary Yes/No prices are only populated when the upstream outcomes decode to the standard Yes/No pair.
key: [market_id, updated_at]
temporal: updated_at
sort: [updated_at, market_id]
columns:
  - name: market_id
    type: BIGINT
    description: Polymarket Gamma market identifier.
  - name: event_id
    type: BIGINT
    description: Parent event identifier grouping related markets.
  - name: event_slug
    type: VARCHAR
    description: URL-friendly slug of the parent event.
  - name: event_title
    type: VARCHAR
    description: Human-readable title of the parent event.
  - name: neg_risk
    type: BOOLEAN
  - name: question
    type: VARCHAR
  - name: slug
    type: VARCHAR
  - name: condition_id
    type: VARCHAR
  - name: outcome_yes_price
    type: DOUBLE
  - name: outcome_no_price
    type: DOUBLE
  - name: volume_usd
    type: DOUBLE
  - name: volume_24h_usd
    type: DOUBLE
  - name: volume_1wk_usd
    type: DOUBLE
  - name: volume_1mo_usd
    type: DOUBLE
  - name: volume_1yr_usd
    type: DOUBLE
  - name: liquidity_usd
    type: DOUBLE
  - name: last_trade_price
    type: DOUBLE
  - name: best_bid
    type: DOUBLE
  - name: best_ask
    type: DOUBLE
  - name: spread
    type: DOUBLE
  - name: competitive
    type: DOUBLE
  - name: is_active
    type: BOOLEAN
  - name: is_closed
    type: BOOLEAN
  - name: start_date
    type: DATE
  - name: end_date
    type: DATE
  - name: created_at
    type: TIMESTAMP
  - name: updated_at
    type: TIMESTAMP
    description: Last update timestamp reported by Polymarket.
