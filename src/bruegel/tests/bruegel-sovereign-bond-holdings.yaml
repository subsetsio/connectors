spec_id: bruegel-sovereign-bond-holdings
# Raw is long from the QUARTERLY + ANNUAL cross-country sheets: (date, country, holder_type, value, frequency).
tests:
  - not_null: date
    reason: every observation is stamped with a date
    certainty: 90
  - not_null: country
    reason: holdings are reported per issuing country
    certainty: 90
  - not_null: holder_type
    reason: each value column maps to a holder category
    certainty: 85
  - not_null: value
    reason: the parser drops NaN cells
    certainty: 95
  - enum: {col: frequency, values: [quarterly, annual]}
    reason: rows come from the QUARTERLY and ANNUAL sheets only
    certainty: 95
  - column_type: {col: value, type: float}
    reason: bond-holding amounts are floats
    certainty: 85
