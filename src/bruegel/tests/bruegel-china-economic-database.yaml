spec_id: bruegel-china-economic-database
# Raw is the flattened Dash dashboard: one row per (page, chart, series, unit, x).
# `unit` is the figure's y-axis title: a page can host two figures under the SAME
# title plotting the same series in different units ("Trade in Goods" as USD Billion
# and as YoY %), so unit is part of the row identity, not a description of it.
tests:
  - not_null: page
    reason: every observation is collected from a dashboard page route
    certainty: 90
  - not_null: chart
    reason: each figure carries a title used as the chart label
    certainty: 75
    severity: warn
  - not_null: unit
    reason: every figure labels its y-axis; a null unit means the layout shape changed
    certainty: 80
  - not_null: x
    reason: the parser skips points carrying no observation label
    certainty: 95
  - not_null: value
    reason: the parser skips None y-values, so every emitted row has a value
    certainty: 95
  - unique: [page, chart, series, unit, x]
    reason: >-
      one value per series point, once the y-axis unit disambiguates same-titled
      figures; the parser drops the exact-duplicate points a few traces plot twice
    certainty: 80
  - row_count: {min: 500}
    reason: many pages, each with several charts/series and a long monthly history
    certainty: 65
