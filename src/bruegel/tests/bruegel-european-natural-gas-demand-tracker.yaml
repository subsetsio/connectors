spec_id: bruegel-european-natural-gas-demand-tracker
# Raw is long monthly demand: (date, country, sector, value) where value is TWh deviation vs baseline.
tests:
  - not_null: date
    reason: each observation is a month-start date parsed from MM/YYYY
    certainty: 95
  - not_null: country
    reason: demand is reported per country
    certainty: 85
  - not_null: value
    reason: the parser skips None y-values
    certainty: 95
  - column_type: {col: value, type: float}
    reason: demand deviation is a TWh float
    certainty: 80
  - freshness: {col: date, reaches: today - 240d}
    reason: >-
      the tracker published monthly with a ~1-month lag, but upstream
      (benmcwilliams/gas-demand) has been paused since 2026-02-19 and every data
      file there still ends at 01/2026 — so the bound tolerates the observed stall
      while still tripping if the feed stays dead. A stale max points at the source.
    certainty: 60
    points_outward: true
    severity: warn
