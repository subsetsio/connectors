spec_id: bruegel-eu-renewables-value-tracker
# Raw is the "Data" sheet preserving original headers: zone, year, tech, CF, MV, CV, composition.
tests:
  - not_null: zone
    reason: every observation belongs to a bidding zone
    certainty: 85
  - not_null: year
    reason: each row is stamped with a year
    certainty: 85
  - not_null: tech
    reason: capacity factor / value metrics are reported per technology
    certainty: 80
  - between: {col: year, lo: 2010, hi: 2035}
    reason: the tracker spans recent history and near-term outlook years
    certainty: 60
    severity: warn
  - freshness: {col: year, reaches: current_year() - 2}
    reason: the renewables tracker is an annual dataset with recent history and near-term outlook years; a stale maximum year indicates the workbook stopped advancing
    certainty: 60
    points_outward: true
    severity: warn
