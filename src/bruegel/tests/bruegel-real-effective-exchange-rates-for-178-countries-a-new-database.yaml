spec_id: bruegel-real-effective-exchange-rates-for-178-countries-a-new-database
# Raw is long: (period, measure, frequency, country_set, country_code, value).
tests:
  - not_null: country_code
    reason: each observation is for a country
    certainty: 90
  - not_null: value
    reason: the parser drops NaN cells
    certainty: 95
  - not_null: period
    reason: every observation carries a period label
    certainty: 90
  - enum: {col: measure, values: [REER, NEER]}
    reason: sheets are named REER_* or NEER_*; measure is parsed from that prefix
    certainty: 95
  - enum: {col: frequency, values: [monthly, annual]}
    reason: sheets are MONTHLY or ANNUAL; frequency is lowercased from that token
    certainty: 95
  - column_type: {col: value, type: float}
    reason: exchange-rate index values are floats
    certainty: 85
  - distinct_count: {col: country_code, min: 100}
    reason: the database covers effective exchange rates for 178 countries
    certainty: 70
