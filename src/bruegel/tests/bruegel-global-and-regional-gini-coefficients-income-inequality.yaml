spec_id: bruegel-global-and-regional-gini-coefficients-income-inequality
# Raw is the melted "Database" sheet: (variable_name, income_type, mean_income, method, country_group, year, gini).
tests:
  - not_null: year
    reason: every observation is stamped with a year
    certainty: 90
  - not_null: gini
    reason: the parser drops rows with a NaN gini
    certainty: 95
  - column_type: {col: year, type: integer}
    reason: year is cast to int in the parser
    certainty: 90
  - column_type: {col: gini, type: float}
    reason: gini coefficients are floats
    certainty: 85
  - between: {col: gini, lo: 0, hi: 100}
    reason: Bruegel stores gini coefficients on a 0-100 index scale
    certainty: 80
  - between: {col: year, lo: 1800, hi: current_year()}
    reason: long-run global inequality series reach back into the 19th century but not beyond the current year
    certainty: 70
    points_outward: true
    severity: warn
