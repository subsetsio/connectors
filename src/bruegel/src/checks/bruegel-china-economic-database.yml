# compiled by `hardened compile-checks` — post-publish audit of `bruegel-china-economic-database`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [page, chart, series, unit, x]
checks:
  - kind: unique
    columns: [page, chart, series, unit, x]
  - kind: not_null
    col: page
  - kind: not_null
    col: chart
  - kind: not_null
    col: series
  - kind: not_null
    col: unit
  - kind: not_null
    col: x
  - kind: row_floor
    min: 32541
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
