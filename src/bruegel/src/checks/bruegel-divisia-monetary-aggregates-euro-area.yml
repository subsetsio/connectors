# compiled by `hardened compile-checks` — post-publish audit of `bruegel-divisia-monetary-aggregates-euro-area`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, series_name, subcategory, category]
temporal: date
checks:
  - kind: unique
    columns: [date, series_name, subcategory, category]
  - kind: not_null
    col: date
  - kind: not_null
    col: series_name
  - kind: not_null
    col: subcategory
  - kind: not_null
    col: category
  - kind: row_floor
    min: 4104
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
