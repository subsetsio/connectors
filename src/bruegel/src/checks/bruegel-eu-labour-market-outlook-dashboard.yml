# compiled by `hardened compile-checks` — post-publish audit of `bruegel-eu-labour-market-outlook-dashboard`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, indicator, breakdown]
temporal: year
checks:
  - kind: unique
    columns: [country, year, indicator, breakdown]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: not_null
    col: breakdown
  - kind: row_floor
    min: 36783
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
