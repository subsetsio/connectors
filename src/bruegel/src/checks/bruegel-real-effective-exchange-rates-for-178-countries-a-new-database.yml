# compiled by `hardened compile-checks` — post-publish audit of `bruegel-real-effective-exchange-rates-for-178-countries-a-new-database`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, country_code, country_set, measure, frequency]
temporal: period
checks:
  - kind: unique
    columns: [period, country_code, country_set, measure, frequency]
  - kind: not_null
    col: period
  - kind: not_null
    col: country_code
  - kind: not_null
    col: country_set
  - kind: not_null
    col: measure
  - kind: not_null
    col: frequency
  - kind: row_floor
    min: 205215
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
