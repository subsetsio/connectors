    type: VARCHAR
  - name: date
    type: DATE
  - name: direction_of_trade
    type: VARCHAR
  - name: country
    type: VARCHAR
  - name: unit
    type: VARCHAR
  - name: sitc_code
    type: JSON
  - name: sitc_category
    type: VARCHAR
  - name: value
    type: DOUBLE
