# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `wca-persons`. Regenerate after model-verify.
# caution: Person rows can include multiple sub_id values for the same public WCA id as the export preserves person record history.
key: [wca_id, name, country_id, sub_id]
temporal: export_date
sort: [export_date, wca_id, name, country_id, sub_id]
columns:
