    type: VARCHAR
  - name: gender
    type: VARCHAR
  - name: wca_id
    type: VARCHAR
  - name: sub_id
    type: BIGINT
  - name: country_id
    type: VARCHAR
  - name: source_table
    type: VARCHAR
  - name: export_date
    type: TIMESTAMP
  - name: export_version
    type: VARCHAR
