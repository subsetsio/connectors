# compiled by `hardened compile-checks` — post-publish audit of `wca-scrambles`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, competition_id, group_id, event_id, round_type_id]
temporal: export_date
checks:
  - kind: unique
    columns: [id, competition_id, group_id, event_id, round_type_id]
  - kind: not_null
    col: id
  - kind: not_null
    col: competition_id
  - kind: not_null
    col: group_id
  - kind: not_null
    col: event_id
  - kind: not_null
    col: round_type_id
  - kind: row_floor
    min: 1547050
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
