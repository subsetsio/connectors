spec_id: wca-persons
status: active
tests:
  - row_count: {min: 200000}
    reason: The WCA export contains hundreds of thousands of competitors.
    certainty: 95
  - not_null: wca_id
  - not_null: sub_id
  - unique: [wca_id, sub_id]
  - not_null: name
  - not_null: _export_date
  - freshness: {col: _export_date, reaches: today - 7d}
    points_outward: true
    certainty: 90
