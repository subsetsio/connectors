# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-visitors-of-museums-and-exhibition-by-month-and-museum`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number, lmthf, museum, year, month]
temporal: year
checks:
  - kind: unique
    columns: [number, lmthf, museum, year, month]
  - kind: not_null
    col: number
  - kind: not_null
    col: lmthf
  - kind: not_null
    col: museum
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: row_floor
    min: 686
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
