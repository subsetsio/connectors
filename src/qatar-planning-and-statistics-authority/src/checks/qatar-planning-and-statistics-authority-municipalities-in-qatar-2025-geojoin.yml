# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-municipalities-in-qatar-2025-geojoin`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [municipality_name, name, geo_point, geo_shape]
checks:
  - kind: unique
    columns: [municipality_name, name, geo_point, geo_shape]
  - kind: not_null
    col: municipality_name
  - kind: not_null
    col: name
  - kind: not_null
    col: geo_point
  - kind: not_null
    col: geo_shape
  - kind: row_floor
    min: 11
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
