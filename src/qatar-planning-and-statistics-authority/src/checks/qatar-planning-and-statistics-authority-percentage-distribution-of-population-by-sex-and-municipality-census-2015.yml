# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lbldy, geo_point, municipality, geo_shape, gender]
temporal: year
checks:
  - kind: unique
    columns: [lbldy, geo_point, municipality, geo_shape, gender]
  - kind: not_null
    col: lbldy
  - kind: not_null
    col: geo_point
  - kind: not_null
    col: municipality
  - kind: not_null
    col: geo_shape
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 8
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
