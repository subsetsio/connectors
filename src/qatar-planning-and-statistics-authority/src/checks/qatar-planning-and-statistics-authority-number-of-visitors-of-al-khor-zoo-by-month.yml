# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-number-of-visitors-of-al-khor-zoo-by-month`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, month_ar, year, sn]
temporal: year
checks:
  - kind: unique
    columns: [month, month_ar, year, sn]
  - kind: not_null
    col: month
  - kind: not_null
    col: month_ar
  - kind: not_null
    col: year
  - kind: not_null
    col: sn
  - kind: row_floor
    min: 30
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
