    columns: [date, segment]
  - kind: not_null
    col: date
  - kind: not_null
    col: segment
  - kind: row_floor
    min: 472
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
