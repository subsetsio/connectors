# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-number-of-organisms-traded-legally-and-illegally0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, category, lfy, type, lnw]
temporal: year
checks:
  - kind: unique
    columns: [year, category, lfy, type, lnw]
  - kind: not_null
    col: year
  - kind: not_null
    col: category
  - kind: not_null
    col: lfy
  - kind: not_null
    col: type
  - kind: not_null
    col: lnw
  - kind: row_floor
    min: 16
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
