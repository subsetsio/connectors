# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-heritage-sites-in-the-state-of-qatar0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [site_type, nw_lmwq, number, year, heritage_category]
temporal: year
checks:
  - kind: unique
    columns: [site_type, nw_lmwq, number, year, heritage_category]
  - kind: not_null
    col: site_type
  - kind: not_null
    col: nw_lmwq
  - kind: not_null
    col: number
  - kind: not_null
    col: year
  - kind: not_null
    col: heritage_category
  - kind: row_floor
    min: 45
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
