# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-students-being-offered-overseas-scholarships-by-country`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lbld, country, year]
temporal: year
checks:
  - kind: unique
    columns: [lbld, country, year]
  - kind: not_null
    col: lbld
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: row_floor
    min: 9
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
