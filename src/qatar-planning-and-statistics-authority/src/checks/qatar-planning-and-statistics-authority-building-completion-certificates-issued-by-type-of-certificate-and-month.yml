# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-building-completion-certificates-issued-by-type-of-certificate-and-month`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lshhr, month, year, certificate_type, nw_lshhd]
temporal: year
checks:
  - kind: unique
    columns: [lshhr, month, year, certificate_type, nw_lshhd]
  - kind: not_null
    col: lshhr
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: not_null
    col: certificate_type
  - kind: not_null
    col: nw_lshhd
  - kind: row_floor
    min: 36
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
