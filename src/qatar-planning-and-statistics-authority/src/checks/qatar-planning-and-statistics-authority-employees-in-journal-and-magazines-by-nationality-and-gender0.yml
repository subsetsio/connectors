# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-employees-in-journal-and-magazines-by-nationality-and-gender0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number, year, nationality, ljnsy, gender]
temporal: year
checks:
  - kind: unique
    columns: [number, year, nationality, ljnsy, gender]
  - kind: not_null
    col: number
  - kind: not_null
    col: year
  - kind: not_null
    col: nationality
  - kind: not_null
    col: ljnsy
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 20
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
