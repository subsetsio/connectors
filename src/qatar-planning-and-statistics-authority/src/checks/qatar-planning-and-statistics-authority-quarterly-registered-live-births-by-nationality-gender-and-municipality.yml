# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-quarterly-registered-live-births-by-nationality-gender-and-municipality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [municipality, lbldy, gender, ljns]
temporal: year
checks:
  - kind: unique
    columns: [municipality, lbldy, gender, ljns]
  - kind: not_null
    col: municipality
  - kind: not_null
    col: lbldy
  - kind: not_null
    col: gender
  - kind: not_null
    col: ljns
  - kind: row_floor
    min: 9
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
