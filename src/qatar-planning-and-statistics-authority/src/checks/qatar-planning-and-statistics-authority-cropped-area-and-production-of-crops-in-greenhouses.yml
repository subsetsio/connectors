# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-cropped-area-and-production-of-crops-in-greenhouses`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [crops, lmhswl, year]
temporal: year
checks:
  - kind: unique
    columns: [crops, lmhswl, year]
  - kind: not_null
    col: crops
  - kind: not_null
    col: lmhswl
  - kind: not_null
    col: year
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
