# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-registered-infant-deaths-by-gender-and-place-of-death`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, jnsy, nationality, gender, jns]
temporal: year
checks:
  - kind: unique
    columns: [year, jnsy, nationality, gender, jns]
  - kind: not_null
    col: year
  - kind: not_null
    col: jnsy
  - kind: not_null
    col: nationality
  - kind: not_null
    col: gender
  - kind: not_null
    col: jns
  - kind: row_floor
    min: 71
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
