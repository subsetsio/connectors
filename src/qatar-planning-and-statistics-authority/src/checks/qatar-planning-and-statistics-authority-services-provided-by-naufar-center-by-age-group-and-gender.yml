# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-services-provided-by-naufar-center-by-age-group-and-gender`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, age_group_ar, age_group, gender, gender_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, age_group_ar, age_group, gender, gender_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group_ar
  - kind: not_null
    col: age_group
  - kind: not_null
    col: gender
  - kind: not_null
    col: gender_ar
  - kind: row_floor
    min: 25
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
