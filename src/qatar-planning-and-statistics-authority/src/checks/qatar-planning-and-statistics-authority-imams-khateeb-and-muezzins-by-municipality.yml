# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-imams-khateeb-and-muezzins-by-municipality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number, municipality, year, lbldy, indicator]
temporal: year
checks:
  - kind: unique
    columns: [number, municipality, year, lbldy, indicator]
  - kind: not_null
    col: number
  - kind: not_null
    col: municipality
  - kind: not_null
    col: year
  - kind: not_null
    col: lbldy
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 88
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
