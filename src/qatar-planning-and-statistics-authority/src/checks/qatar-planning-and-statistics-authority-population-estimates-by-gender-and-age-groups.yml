# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-population-estimates-by-gender-and-age-groups`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age_groups, year, lnw, gender]
temporal: year
checks:
  - kind: unique
    columns: [age_groups, year, lnw, gender]
  - kind: not_null
    col: age_groups
  - kind: not_null
    col: year
  - kind: not_null
    col: lnw
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 198
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
