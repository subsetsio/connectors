# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-total-expatriate-workforce-by-gender-in-the-state-of-qatar`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, gender, gender_en]
temporal: year
checks:
  - kind: unique
    columns: [year, gender, gender_en]
  - kind: not_null
    col: year
  - kind: not_null
    col: gender
  - kind: not_null
    col: gender_en
  - kind: row_floor
    min: 6
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
