# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-total-water-storage-by-type-2023`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type, lnw, year, mlhzt]
temporal: year
checks:
  - kind: unique
    columns: [type, lnw, year, mlhzt]
  - kind: not_null
    col: type
  - kind: not_null
    col: lnw
  - kind: not_null
    col: year
  - kind: not_null
    col: mlhzt
  - kind: row_floor
    min: 4
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
