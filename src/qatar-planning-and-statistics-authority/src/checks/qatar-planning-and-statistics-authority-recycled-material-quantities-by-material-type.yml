# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-recycled-material-quantities-by-material-type`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, material_type, material_description, year]
temporal: year
checks:
  - kind: unique
    columns: [month, material_type, material_description, year]
  - kind: not_null
    col: month
  - kind: not_null
    col: material_type
  - kind: not_null
    col: material_description
  - kind: not_null
    col: year
  - kind: row_floor
    min: 126
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
