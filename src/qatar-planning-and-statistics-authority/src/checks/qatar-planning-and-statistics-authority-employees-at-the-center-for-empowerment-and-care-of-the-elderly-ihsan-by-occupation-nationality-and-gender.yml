# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-employees-at-the-center-for-empowerment-and-care-of-the-elderly-ihsan-by-occupation-nationality-and-gender`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [occupation, occupation_ar, year]
temporal: year
checks:
  - kind: unique
    columns: [occupation, occupation_ar, year]
  - kind: not_null
    col: occupation
  - kind: not_null
    col: occupation_ar
  - kind: not_null
    col: year
  - kind: row_floor
    min: 25
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
