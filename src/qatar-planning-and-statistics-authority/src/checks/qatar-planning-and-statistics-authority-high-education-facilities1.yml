# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-high-education-facilities1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year_lsn, gender, lnw, nationality, ljnsy]
checks:
  - kind: unique
    columns: [year_lsn, gender, lnw, nationality, ljnsy]
  - kind: not_null
    col: year_lsn
  - kind: not_null
    col: gender
  - kind: not_null
    col: lnw
  - kind: not_null
    col: nationality
  - kind: not_null
    col: ljnsy
  - kind: row_floor
    min: 4
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
