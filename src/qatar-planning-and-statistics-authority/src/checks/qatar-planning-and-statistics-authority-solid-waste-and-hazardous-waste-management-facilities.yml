# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-solid-waste-and-hazardous-waste-management-facilities`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [column00, column01, column02, column03]
checks:
  - kind: unique
    columns: [column00, column01, column02, column03]
  - kind: not_null
    col: column00
  - kind: not_null
    col: column01
  - kind: not_null
    col: column02
  - kind: not_null
    col: column03
  - kind: row_floor
    min: 5
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
