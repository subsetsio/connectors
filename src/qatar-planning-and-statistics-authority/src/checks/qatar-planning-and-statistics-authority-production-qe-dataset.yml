# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-production-qe-dataset`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, products_description, wsf_lmntjt, unit, lwhd]
temporal: year
checks:
  - kind: unique
    columns: [year, products_description, wsf_lmntjt, unit, lwhd]
  - kind: not_null
    col: year
  - kind: not_null
    col: products_description
  - kind: not_null
    col: wsf_lmntjt
  - kind: not_null
    col: unit
  - kind: not_null
    col: lwhd
  - kind: row_floor
    min: 7
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
