# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-number-of-new-projects-evaluated-for-their-impacts-on-the-environment-by-type`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number, year, type, lnw]
temporal: year
checks:
  - kind: unique
    columns: [number, year, type, lnw]
  - kind: not_null
    col: number
  - kind: not_null
    col: year
  - kind: not_null
    col: type
  - kind: not_null
    col: lnw
  - kind: row_floor
    min: 25
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
