# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-water-used-in-commercial-activity-and-commercial-gdp-at-constant-prices-of-2018`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, indicator_name, unit]
temporal: year
checks:
  - kind: unique
    columns: [year, indicator_name, unit]
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator_name
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 8
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
