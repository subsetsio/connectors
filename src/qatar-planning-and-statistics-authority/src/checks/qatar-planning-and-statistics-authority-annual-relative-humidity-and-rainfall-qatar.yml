# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-annual-relative-humidity-and-rainfall-qatar`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, nw_lqym, statistical_measure, lmw_shr_lmnkhy, climate_indicator]
temporal: year
checks:
  - kind: unique
    columns: [year, nw_lqym, statistical_measure, lmw_shr_lmnkhy, climate_indicator]
  - kind: not_null
    col: year
  - kind: not_null
    col: nw_lqym
  - kind: not_null
    col: statistical_measure
  - kind: not_null
    col: lmw_shr_lmnkhy
  - kind: not_null
    col: climate_indicator
  - kind: row_floor
    min: 13
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
