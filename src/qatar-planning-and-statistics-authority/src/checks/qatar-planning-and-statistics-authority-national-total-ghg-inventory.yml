# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-national-total-ghg-inventory`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [item, unit, lbyn, lwhd]
checks:
  - kind: unique
    columns: [item, unit, lbyn, lwhd]
  - kind: not_null
    col: item
  - kind: not_null
    col: unit
  - kind: not_null
    col: lbyn
  - kind: not_null
    col: lwhd
  - kind: row_floor
    min: 1
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
