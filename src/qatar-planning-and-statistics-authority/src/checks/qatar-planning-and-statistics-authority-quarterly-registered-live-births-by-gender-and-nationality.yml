# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-quarterly-registered-live-births-by-gender-and-nationality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nationality, year, ljnsy, quarter]
temporal: year
checks:
  - kind: unique
    columns: [nationality, year, ljnsy, quarter]
  - kind: not_null
    col: nationality
  - kind: not_null
    col: year
  - kind: not_null
    col: ljnsy
  - kind: not_null
    col: quarter
  - kind: row_floor
    min: 42
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
