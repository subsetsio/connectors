# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-type-of-animals-and-classification-at-the-zoo-in-al-khor-park`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, item, item_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, item, item_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: item
  - kind: not_null
    col: item_ar
  - kind: row_floor
    min: 12
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
