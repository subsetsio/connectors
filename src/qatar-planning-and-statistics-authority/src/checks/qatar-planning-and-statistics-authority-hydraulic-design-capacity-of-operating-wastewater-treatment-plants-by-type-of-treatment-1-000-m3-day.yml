# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-hydraulic-design-capacity-of-operating-wastewater-treatment-plants-by-type-of-treatment-1-000-m3-day`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, indicator_name]
temporal: year
checks:
  - kind: unique
    columns: [year, indicator_name]
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator_name
  - kind: row_floor
    min: 12
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
