# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-fog-dust-storm-and-haze-monthly-occurrence`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lshhr, month, year, lzhr_ljwy, weather_phenomenon]
temporal: year
checks:
  - kind: unique
    columns: [lshhr, month, year, lzhr_ljwy, weather_phenomenon]
  - kind: not_null
    col: lshhr
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: not_null
    col: lzhr_ljwy
  - kind: not_null
    col: weather_phenomenon
  - kind: row_floor
    min: 90
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
