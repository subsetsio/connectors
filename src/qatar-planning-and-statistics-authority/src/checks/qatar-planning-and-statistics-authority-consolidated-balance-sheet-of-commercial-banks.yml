# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-consolidated-balance-sheet-of-commercial-banks`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [particulars, lbnd, year, section, lqsm]
temporal: year
checks:
  - kind: unique
    columns: [particulars, lbnd, year, section, lqsm]
  - kind: not_null
    col: particulars
  - kind: not_null
    col: lbnd
  - kind: not_null
    col: year
  - kind: not_null
    col: section
  - kind: not_null
    col: lqsm
  - kind: row_floor
    min: 82
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
