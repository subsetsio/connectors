# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-registered-qatari-deaths-by-place-of-death-gender`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, place_of_death, mkn_lwf, gender, ljns]
temporal: year
checks:
  - kind: unique
    columns: [year, place_of_death, mkn_lwf, gender, ljns]
  - kind: not_null
    col: year
  - kind: not_null
    col: place_of_death
  - kind: not_null
    col: mkn_lwf
  - kind: not_null
    col: gender
  - kind: not_null
    col: ljns
  - kind: row_floor
    min: 62
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
