# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-number-of-private-centers-number-of-training-courses-and-number-of-trainees`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, indicator_ar, indicator]
temporal: year
checks:
  - kind: unique
    columns: [year, indicator_ar, indicator]
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator_ar
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 15
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
