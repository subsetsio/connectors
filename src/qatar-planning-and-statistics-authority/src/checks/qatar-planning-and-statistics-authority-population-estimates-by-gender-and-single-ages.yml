# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-population-estimates-by-gender-and-single-ages`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number, single_ages, year, lnw, gender]
temporal: year
checks:
  - kind: unique
    columns: [number, single_ages, year, lnw, gender]
  - kind: not_null
    col: number
  - kind: not_null
    col: single_ages
  - kind: not_null
    col: year
  - kind: not_null
    col: lnw
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 891
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
