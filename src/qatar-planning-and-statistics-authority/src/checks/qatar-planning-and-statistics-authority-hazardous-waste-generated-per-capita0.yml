# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-hazardous-waste-generated-per-capita0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [category, lfy, year, unit, lwhd]
temporal: year
checks:
  - kind: unique
    columns: [category, lfy, year, unit, lwhd]
  - kind: not_null
    col: category
  - kind: not_null
    col: lfy
  - kind: not_null
    col: year
  - kind: not_null
    col: unit
  - kind: not_null
    col: lwhd
  - kind: row_floor
    min: 56
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
