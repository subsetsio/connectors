# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-volunteers-at-qatar-center-for-voluntary-activities-by-nationality-and-gender`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, nationality, nationality_ar, gender, gender_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, nationality, nationality_ar, gender, gender_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: nationality
  - kind: not_null
    col: nationality_ar
  - kind: not_null
    col: gender
  - kind: not_null
    col: gender_ar
  - kind: row_floor
    min: 10
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
