# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-number-of-issued-newspapers-and-magazines-by-type-of-publication-and-period`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, period, period_ar, newspapers_magazines, newspapers_magazines_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, period, period_ar, newspapers_magazines, newspapers_magazines_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: period
  - kind: not_null
    col: period_ar
  - kind: not_null
    col: newspapers_magazines
  - kind: not_null
    col: newspapers_magazines_ar
  - kind: row_floor
    min: 10
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
