    columns: [type_of_violation_ar]
  - kind: not_null
    col: type_of_violation_ar
  - kind: row_floor
    min: 6
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
