# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-population-growth-in-qatar-by-sex-between-2010-and-2015-censuses`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, gender, gender_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, gender, gender_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: gender
  - kind: not_null
    col: gender_ar
  - kind: row_floor
    min: 2
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
