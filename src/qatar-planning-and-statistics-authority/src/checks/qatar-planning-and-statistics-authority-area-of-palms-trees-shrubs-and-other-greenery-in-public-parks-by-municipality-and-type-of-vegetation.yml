# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-area-of-palms-trees-shrubs-and-other-greenery-in-public-parks-by-municipality-and-type-of-vegetation`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, item, lbyn]
temporal: year
checks:
  - kind: unique
    columns: [year, item, lbyn]
  - kind: not_null
    col: year
  - kind: not_null
    col: item
  - kind: not_null
    col: lbyn
  - kind: row_floor
    min: 66
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
