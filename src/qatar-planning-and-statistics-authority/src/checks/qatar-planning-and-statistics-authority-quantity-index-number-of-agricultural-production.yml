# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-quantity-index-number-of-agricultural-production`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, product, lmntj]
temporal: year
checks:
  - kind: unique
    columns: [year, product, lmntj]
  - kind: not_null
    col: year
  - kind: not_null
    col: product
  - kind: not_null
    col: lmntj
  - kind: row_floor
    min: 42
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
