# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-cropped-area-and-production-of-open-field-during`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [crop, lmhswl, year, crop_group, mjmw_lmhswl]
temporal: year
checks:
  - kind: unique
    columns: [crop, lmhswl, year, crop_group, mjmw_lmhswl]
  - kind: not_null
    col: crop
  - kind: not_null
    col: lmhswl
  - kind: not_null
    col: year
  - kind: not_null
    col: crop_group
  - kind: not_null
    col: mjmw_lmhswl
  - kind: row_floor
    min: 84
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
