# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-services-rendered-by-family-consulting-center-wifaq-by-type-of-service-gender-and-nationality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, nationality_ar, nationality]
temporal: year
checks:
  - kind: unique
    columns: [year, nationality_ar, nationality]
  - kind: not_null
    col: year
  - kind: not_null
    col: nationality_ar
  - kind: not_null
    col: nationality
  - kind: row_floor
    min: 5
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
