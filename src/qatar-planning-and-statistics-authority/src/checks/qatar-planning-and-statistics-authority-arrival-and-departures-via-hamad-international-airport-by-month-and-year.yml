# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-arrival-and-departures-via-hamad-international-airport-by-month-and-year`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, lshhr, year, type, nw]
temporal: year
checks:
  - kind: unique
    columns: [month, lshhr, year, type, nw]
  - kind: not_null
    col: month
  - kind: not_null
    col: lshhr
  - kind: not_null
    col: year
  - kind: not_null
    col: type
  - kind: not_null
    col: nw
  - kind: row_floor
    min: 72
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
