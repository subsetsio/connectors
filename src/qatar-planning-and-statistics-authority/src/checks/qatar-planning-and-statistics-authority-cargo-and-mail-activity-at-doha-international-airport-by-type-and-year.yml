# compiled by `hardened compile-checks` — post-publish audit of `qatar-planning-and-statistics-authority-cargo-and-mail-activity-at-doha-international-airport-by-type-and-year`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, type, type_ar]
temporal: year
checks:
  - kind: unique
    columns: [year, type, type_ar]
  - kind: not_null
    col: year
  - kind: not_null
    col: type
  - kind: not_null
    col: type_ar
  - kind: row_floor
    min: 5
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
