spec_id: banco-de-guatemala-variables
status: active
tests:
  - not_null: variable_id
    reason: every BDEF variable has an ID; a null means the VariablesDisponibles parse broke
    certainty: 95
  - not_null: nombre
    reason: VariablesDisponibles returns a Nombre per variable; we fall back to the id only if absent
    certainty: 80
  - unique: variable_id
    reason: VariablesDisponibles lists each variable once
    certainty: 90
  - row_count: {min: 50}
    reason: Banguat's BDEF exposes on the order of a few hundred variables; <50 means enumeration was truncated
    certainty: 75
    severity: warn
