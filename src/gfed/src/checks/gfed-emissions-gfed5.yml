# compiled by `hardened compile-checks` — post-publish audit of `gfed-emissions-gfed5`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [species, unit, year, region, fire_type]
temporal: year
checks:
  - kind: unique
    columns: [species, unit, year, region, fire_type]
  - kind: not_null
    col: species
  - kind: not_null
    col: unit
  - kind: not_null
    col: year
  - kind: not_null
    col: region
  - kind: not_null
    col: fire_type
  - kind: row_floor
    min: 58800
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
