spec_id: unhcr-asylum-decisions
status: active
tests:
  - row_count: {min: 30000}
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 1951, hi: current_year()}
    certainty: 95
    points_outward: true
  - not_null: year
  - not_null: coo_iso
  - not_null: coa_iso
  - not_null: procedure_type
  - not_null: dec_level
  - column_type: {col: dec_total, type: integer}
  - nullable: {col: dec_total, max_null_frac: 0.95}
  - freshness: {col: year, reaches: today - 2y}
    points_outward: true
    reason: UNHCR asylum decision data is part of the annual Refugee Data Finder release.
