key: [year, origin_id, asylum_country_id]
temporal: year
columns:
  - name: year
    type: BIGINT
    description: Calendar year of the population observation.
  - name: origin_id
    type: BIGINT
    description: UNHCR numeric country or territory identifier for the population country of origin.
  - name: origin_code
    type: VARCHAR
    description: UNHCR country or territory code for the population country of origin.
  - name: origin_iso3
    type: VARCHAR
    description: ISO 3166-1 alpha-3 code for the population country of origin, where available.
  - name: origin_name
    type: VARCHAR
    description: Country or territory of origin name supplied by UNHCR.
  - name: asylum_country_id
    type: BIGINT
    description: UNHCR numeric country or territory identifier for the asylum or residence country.
  - name: asylum_country_code
    type: VARCHAR
    description: UNHCR country or territory code for the asylum or residence country.
  - name: asylum_country_iso3
    type: VARCHAR
    description: ISO 3166-1 alpha-3 code for the asylum or residence country, where available.
  - name: asylum_country_name
    type: VARCHAR
    description: Asylum or residence country or territory name supplied by UNHCR.
  - name: refugees
    type: BIGINT
    description: Number of refugees.
  - name: asylum_seekers
    type: BIGINT
    description: Number of asylum seekers.
  - name: returned_refugees
    type: BIGINT
    description: Number of returned refugees.
  - name: internally_displaced_persons
    type: BIGINT
    description: Number of internally displaced persons.
  - name: returned_internally_displaced_persons
    type: BIGINT
    description: Number of returned internally displaced persons.
  - name: stateless_persons
    type: BIGINT
    description: Number of stateless persons.
  - name: other_people_of_concern
    type: BIGINT
    description: Number of other people of concern to UNHCR.
  - name: other_people_in_need
    type: BIGINT
    description: Number of other people in need as reported by UNHCR, when available.
  - name: host_community
    type: BIGINT
    description: Number of host community members reported by UNHCR.
