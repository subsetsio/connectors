spec_id: hong-kong-observatory-sun-times
status: active
tests:
  - not_null: date
  - not_null: rise
    reason: the sun rises and sets every day in Hong Kong
    certainty: 95
  - not_null: "set"
    certainty: 95
  - unique: date
    reason: one almanac row per calendar date
    certainty: 95
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    certainty: 95
  - matches: {col: rise, pattern: '^[0-9]{2}:[0-9]{2}$'}
    certainty: 90
  - freshness: {col: date, reaches: today}
    reason: the almanac prediction window extends beyond the current date
    points_outward: true
