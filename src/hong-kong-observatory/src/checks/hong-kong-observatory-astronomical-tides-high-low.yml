# compiled by `hardened compile-checks` — post-publish audit of `hong-kong-observatory-astronomical-tides-high-low`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [station, year, month, day, event]
temporal: year
checks:
  - kind: unique
    columns: [station, year, month, day, event]
  - kind: not_null
    col: station
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: day
  - kind: not_null
    col: event
  - kind: row_floor
    min: 140090
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
