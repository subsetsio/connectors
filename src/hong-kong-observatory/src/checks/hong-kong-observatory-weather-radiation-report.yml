# compiled by `hardened compile-checks` — post-publish audit of `hong-kong-observatory-weather-radiation-report`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [report_date, station, metric, value]
temporal: report_date
checks:
  - kind: unique
    columns: [report_date, station, metric, value]
  - kind: not_null
    col: report_date
  - kind: not_null
    col: station
  - kind: not_null
    col: metric
  - kind: not_null
    col: value
  - kind: row_floor
    min: 91106
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
