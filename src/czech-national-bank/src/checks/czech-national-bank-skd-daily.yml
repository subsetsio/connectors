# compiled by `hardened compile-checks` — post-publish audit of `czech-national-bank-skd-daily`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [settlementdate, issuecode, issuename]
temporal: settlementdate
checks:
  - kind: unique
    columns: [settlementdate, issuecode, issuename]
  - kind: not_null
    col: settlementdate
  - kind: not_null
    col: issuecode
  - kind: not_null
    col: issuename
  - kind: row_floor
    min: 28770
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
