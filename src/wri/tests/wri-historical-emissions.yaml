spec_id: wri-historical-emissions
status: active
tests:
  - not_null: iso_code3
    reason: every Climate Watch emissions row is country-scoped
    certainty: 95
  - not_null: year
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - between: {col: year, lo: 1850, hi: current_year()}
    certainty: 95
    points_outward: true
  - freshness: {col: year, reaches: 2024}
    reason: Climate Watch historical emissions currently publish through 2024
    certainty: 90
    points_outward: true
  - row_count: {min: 1000000}
    reason: country-sector-gas-source annual emissions should produce a large long table
    certainty: 90
  - distinct_count: {col: data_source, min: 3}
    reason: Climate Watch combines multiple historical emissions sources
    certainty: 90
