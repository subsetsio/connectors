# compiled by `hardened compile-checks` — post-publish audit of `wri-net-zero-content`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, iso_code3, country, indicator_id, indicator_name]
checks:
  - kind: unique
    columns: [value, iso_code3, country, indicator_id, indicator_name]
  - kind: not_null
    col: value
  - kind: not_null
    col: iso_code3
  - kind: not_null
    col: country
  - kind: not_null
    col: indicator_id
  - kind: not_null
    col: indicator_name
  - kind: row_floor
    min: 428
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
