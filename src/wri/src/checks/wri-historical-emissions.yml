# compiled by `hardened compile-checks` — post-publish audit of `wri-historical-emissions`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso_code3, country, data_source, sector, gas, unit, year]
temporal: year
checks:
  - kind: unique
    columns: [iso_code3, country, data_source, sector, gas, unit, year]
  - kind: not_null
    col: iso_code3
  - kind: not_null
    col: country
  - kind: not_null
    col: data_source
  - kind: not_null
    col: sector
  - kind: not_null
    col: gas
  - kind: not_null
    col: unit
  - kind: not_null
    col: year
  - kind: row_floor
    min: 703723
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
