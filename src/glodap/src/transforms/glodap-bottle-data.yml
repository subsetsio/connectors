# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `glodap-bottle-data`. Regenerate after model-verify.
# caution: Rows are discrete bottle samples across many cruises, depths, regions, and measured parameters; filter by measurement flag and parameter columns before aggregating values.
# caution: Missing source measurements have been normalized from GLODAP sentinel codes to nulls, so nulls generally mean a parameter was not observed or not reported for that sample.
