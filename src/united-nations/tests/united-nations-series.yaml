spec_id: united-nations-series
status: active
tests:
  - not_null: series_code
  - not_null: description
  - not_null: release
  - unique: series_code
    reason: Series/List with allreleases=false returns the current release only, one row per series
    certainty: 97
  - row_count: {min: 600, max: 900}
    reason: ~713 series in the current release; the catalog grows slowly across releases
    certainty: 90
  - distinct_count: {col: release, min: 1, max: 1}
    reason: a single-release pull must carry exactly one release tag; more means allreleases leaked on
    certainty: 95
  - matches: {col: release, pattern: '^[0-9]{4}\.Q[0-9]\.G\.[0-9]{2}$'}
    reason: release tags look like 2026.Q2.G.01
    certainty: 90
    points_outward: true
    severity: warn
  - not_null: goals
    reason: every series hangs off at least one goal in the framework
    certainty: 90
  - matches: {col: series_code, pattern: '^[A-Z]{2}_[A-Z0-9_]+$'}
    reason: series codes are uppercase domain-prefixed identifiers like SI_POV_DAY1
    certainty: 85
    severity: warn
