spec_id: smhi-metobs-observations
status: active
tests:
  - row_count: {min: 100000}
  - not_null: parameter_key
  - not_null: station_key
  - not_null: date
  - not_null: value
  - matches: {col: date, pattern: "^\\d{4}-\\d{2}-\\d{2}$"}
  - freshness: {col: date, reaches: today - 14d}
    points_outward: true
    reason: meteorological observations include recent rolling periods in addition to corrected archive
