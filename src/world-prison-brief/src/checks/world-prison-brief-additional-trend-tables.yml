# compiled by `hardened compile-checks` — post-publish audit of `world-prison-brief-additional-trend-tables`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [jurisdiction_id, table_title, headers, year_text, count_text]
checks:
  - kind: unique
    columns: [jurisdiction_id, table_title, headers, year_text, count_text]
  - kind: not_null
    col: jurisdiction_id
  - kind: not_null
    col: table_title
  - kind: not_null
    col: headers
  - kind: not_null
    col: year_text
  - kind: not_null
    col: count_text
  - kind: row_floor
    min: 1036
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
