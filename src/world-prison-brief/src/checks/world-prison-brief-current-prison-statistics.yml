# compiled by `hardened compile-checks` — post-publish audit of `world-prison-brief-current-prison-statistics`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [jurisdiction_name, country_url, jurisdiction_id, region, indicator]
checks:
  - kind: unique
    columns: [jurisdiction_name, country_url, jurisdiction_id, region, indicator]
  - kind: not_null
    col: jurisdiction_name
  - kind: not_null
    col: country_url
  - kind: not_null
    col: jurisdiction_id
  - kind: not_null
    col: region
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 873
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
