# compiled by `hardened compile-checks` — post-publish audit of `world-prison-brief-source-notes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [note_text, jurisdiction_name, country_url, jurisdiction_id, subject]
checks:
  - kind: unique
    columns: [note_text, jurisdiction_name, country_url, jurisdiction_id, subject]
  - kind: not_null
    col: note_text
  - kind: not_null
    col: jurisdiction_name
  - kind: not_null
    col: country_url
  - kind: not_null
    col: jurisdiction_id
  - kind: not_null
    col: subject
  - kind: row_floor
    min: 1609
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
