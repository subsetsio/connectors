spec_id: umweltbundesamt-stations
status: active
tests:
  - row_count: {min: 2000}
    reason: station register contains historical and active German air-quality stations.
    certainty: 95
  - not_null: station_id
  - not_null: station_code
  - not_null: station_name
  - not_null: station_active_from
  - unique: station_id
  - column_type: {col: station_id, type: integer}
  - column_type: {col: station_active_from, type: date}
  - column_type: {col: station_longitude, type: float}
  - column_type: {col: station_latitude, type: float}
  - freshness: {col: station_active_from, reaches: today - 800d}
    reason: new stations are added to the register over time; recent starts should keep the register advancing.
    certainty: 75
    points_outward: true
