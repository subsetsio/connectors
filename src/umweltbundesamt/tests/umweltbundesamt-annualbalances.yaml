spec_id: umweltbundesamt-annualbalances
status: active
tests:
  - row_count: {min: 10000}
    reason: annual balances cover many stations, pollutants, scopes, and years since 2016.
    certainty: 90
  - not_null: component_id
  - not_null: scope_id
  - not_null: year
  - not_null: station_id
  - column_type: {col: component_id, type: integer}
  - column_type: {col: scope_id, type: integer}
  - column_type: {col: year, type: integer}
  - column_type: {col: annual_mean, type: float}
  - between: {col: year, lo: 2016, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: 2025}
    reason: annualbalances publishes finalized annual station statistics with a lag; by July 2026 the latest annual balance year is 2025.
    certainty: 75
    points_outward: true
  - distinct_count: {col: component_id, min: 3}
    reason: annual balances are available for the pollutant components exposed by the annualbalances endpoint.
    certainty: 90
