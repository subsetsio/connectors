spec_id: our-world-in-data-taxes-as-a-share-of-cigarette-price
status: active
tests:
  - not_null: entity
    reason: Every OWID Grapher CSV row is keyed to a named entity (country/region/aggregate). A null entity means the CSV backbone changed or an HTML error page was saved instead of data.
    certainty: 98
  - column_type: {col: entity, type: string}
    reason: The OWID backbone 'entity' column is always a string label.
    certainty: 95
  - column_type: {col: code, type: string}
    reason: OWID Grapher CSVs always carry a 'code' column (ISO/OWID code) of string type, even when some rows are null (sub-national/regional entities).
    certainty: 88
  - row_count: {min: 1}
    reason: A published chart's full-table CSV always returns at least one observation; an empty table means the fetch saved an error page or the chart was unpublished.
    certainty: 95
