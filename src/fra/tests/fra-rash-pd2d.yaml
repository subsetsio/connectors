spec_id: fra-rash-pd2d
status: active
tests:
  - row_count: {min: 900000}
    reason: FRA safety tables accumulate over time; a drop below this floor means the full-corpus Socrata export truncated on our side.
    certainty: 90
  - not_null: railroadcode
    reason: Column railroadcode is a primary identifier present on every submitted record; nulls indicate a parse or column-shift bug.
    certainty: 90
  - freshness: {col: date, reaches: today - 400d}
    reason: FRA Form 55A casualty data is reported monthly; the full export should contain recent incident dates allowing annual reporting lag.
    certainty: 80
    points_outward: true
