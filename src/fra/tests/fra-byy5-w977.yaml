spec_id: fra-byy5-w977
status: active
tests:
  - row_count: {min: 150000}
    reason: FRA safety tables accumulate over time; a drop below this floor means the full-corpus Socrata export truncated on our side.
    certainty: 90
  - not_null: reportingrailroadcode
    reason: Column reportingrailroadcode is a primary identifier present on every submitted record; nulls indicate a parse or column-shift bug.
    certainty: 90
  - freshness: {col: date, reaches: today - 400d}
    reason: FRA unique train accident data is reported monthly; the full export should contain recent accident dates allowing annual reporting lag.
    certainty: 80
    points_outward: true
