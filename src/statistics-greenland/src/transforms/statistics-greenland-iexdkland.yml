# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-iexdkland` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [enhed, modtagerland, aar]
temporal: aar
sort: [aar, enhed, modtagerland]
columns:
  - name: enhed
    type: VARCHAR
    description: "Cube dimension `enhed`; values are the source's English category labels."
  - name: modtagerland
    type: VARCHAR
    description: "Cube dimension `Modtagerland` (renamed to snake_case); values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
