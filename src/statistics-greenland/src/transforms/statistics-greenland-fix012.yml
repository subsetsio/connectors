# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fix012` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [district, species, fishing_segment, vessel_type, enhed, month, time]
temporal: time
sort: [time, district, species, fishing_segment, vessel_type, enhed, month]
columns:
  - name: district
    type: VARCHAR
    description: "Cube dimension `district`; values are the source's English category labels."
  - name: species
    type: VARCHAR
    description: "Cube dimension `species`; values are the source's English category labels."
  - name: fishing_segment
    type: VARCHAR
    description: "Cube dimension `fishing segment` (renamed to snake_case); values are the source's English category labels."
  - name: vessel_type
    type: VARCHAR
    description: "Cube dimension `vessel type` (renamed to snake_case); values are the source's English category labels."
  - name: enhed
    type: VARCHAR
    description: "Cube dimension `enhed`; values are the source's English category labels."
  - name: month
    type: VARCHAR
    description: "Cube dimension `month`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
