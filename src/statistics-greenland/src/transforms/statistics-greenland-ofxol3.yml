# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-ofxol3` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `for_sek_code`, `kon`, `lon_type` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [for_code, for_sek_code, lonart_mrk, kon, time, lon_type]
temporal: time
sort: [time, for_code, for_sek_code, lonart_mrk, kon, lon_type]
columns:
  - name: for_code
    type: VARCHAR
    description: "Cube dimension `for_code`; values are the source's English category labels."
  - name: for_sek_code
    type: VARCHAR
    description: "Cube dimension `for_sek_code`; values are the source's English category labels."
  - name: lonart_mrk
    type: VARCHAR
    description: "Cube dimension `lonart_mrk`; values are the source's English category labels."
  - name: kon
    type: VARCHAR
    description: "Cube dimension `kon`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: lon_type
    type: VARCHAR
    description: "Cube dimension `lon_type`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
