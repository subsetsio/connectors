# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexoutreg` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `pob`, `sex.code` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [area, pob, rate_code, age, sex_code, src_code, period]
temporal: period
sort: [period, area, pob, rate_code, age, sex_code, src_code]
columns:
  - name: area
    type: VARCHAR
    description: "Cube dimension `area`; values are the source's English category labels."
  - name: pob
    type: VARCHAR
    description: "Cube dimension `pob`; values are the source's English category labels."
  - name: rate_code
    type: VARCHAR
    description: "Cube dimension `rate.code` (renamed to snake_case); values are the source's English category labels."
  - name: age
    type: BIGINT
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: sex_code
    type: VARCHAR
    description: "Cube dimension `sex.code` (renamed to snake_case); values are the source's English category labels."
  - name: src_code
    type: VARCHAR
    description: "Cube dimension `src.code` (renamed to snake_case); values are the source's English category labels."
  - name: period
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
