# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-koxres` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [specification, type, time]
temporal: time
sort: [time, specification, type]
columns:
  - name: specification
    type: VARCHAR
    description: "Cube dimension `specification`; values are the source's English category labels."
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: time
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as half-year code (YYYYHn)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
