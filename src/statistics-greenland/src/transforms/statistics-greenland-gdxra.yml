# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-gdxra` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `gender`, `age`, `socioeconomic status`, `affiliation` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [gender, age, socioeconomic_status, affiliation, time]
temporal: time
sort: [time, gender, age, socioeconomic_status, affiliation]
columns:
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: age
    type: VARCHAR
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: socioeconomic_status
    type: VARCHAR
    description: "Cube dimension `socioeconomic status` (renamed to snake_case); values are the source's English category labels."
  - name: affiliation
    type: VARCHAR
    description: "Cube dimension `affiliation`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
