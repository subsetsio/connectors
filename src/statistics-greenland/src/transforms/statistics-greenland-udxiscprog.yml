# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxiscprog` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [alder_grp, dist, isced11_level, sex, aar]
temporal: aar
sort: [aar, alder_grp, dist, isced11_level, sex]
columns:
  - name: alder_grp
    type: VARCHAR
    description: "Cube dimension `alder_grp`; values are the source's English category labels."
  - name: dist
    type: VARCHAR
    description: "Cube dimension `Dist` (renamed to snake_case); values are the source's English category labels."
  - name: isced11_level
    type: VARCHAR
    description: "Cube dimension `ISCED11_level` (renamed to snake_case); values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `Sex` (renamed to snake_case); values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
