# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxisc11i` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [isced, sex, skolenr_ny, uddkode_ny, startalder, startaar]
temporal: startaar
sort: [startaar, isced, sex, skolenr_ny, uddkode_ny, startalder]
columns:
  - name: isced
    type: VARCHAR
    description: "Cube dimension `Isced` (renamed to snake_case); values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: skolenr_ny
    type: VARCHAR
    description: "Cube dimension `skolenr_ny`; values are the source's English category labels."
  - name: uddkode_ny
    type: VARCHAR
    description: "Cube dimension `uddkode_ny`; values are the source's English category labels."
  - name: startalder
    type: VARCHAR
    description: "Cube dimension `startalder`; values are the source's English category labels."
  - name: startaar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
