# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxumg7` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `registrering` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [alder, kon, registrering, aar]
temporal: aar
sort: [aar, alder, kon, registrering]
columns:
  - name: alder
    type: VARCHAR
    description: "Cube dimension `alder`; values are the source's English category labels."
  - name: kon
    type: VARCHAR
    description: "Cube dimension `kon`; values are the source's English category labels."
  - name: registrering
    type: VARCHAR
    description: "Cube dimension `registrering`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
