# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fixfleet` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [ff, dis, taar]
temporal: taar
sort: [taar, ff, dis]
columns:
  - name: ff
    type: VARCHAR
    description: "Cube dimension `FF` (renamed to snake_case); values are the source's English category labels."
  - name: dis
    type: VARCHAR
    description: "Cube dimension `DIS` (renamed to snake_case); values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
