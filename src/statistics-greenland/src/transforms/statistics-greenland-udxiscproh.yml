# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxiscproh` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: `unit` is a dimension of this cube, not a table-wide constant: rows in the same `obs_value` column are expressed in different units. Filter to one `unit` before aggregating or comparing values.
key: [unit, alder_grp, komm, isced11_level_grp, aar, sex]
temporal: aar
sort: [aar, unit, alder_grp, komm, isced11_level_grp, sex]
columns:
  - name: unit
    type: VARCHAR
    description: "Cube dimension `unit`; values are the source's English category labels."
  - name: alder_grp
    type: VARCHAR
    description: "Cube dimension `alder_grp`; values are the source's English category labels."
  - name: komm
    type: VARCHAR
    description: "Cube dimension `Komm` (renamed to snake_case); values are the source's English category labels."
  - name: isced11_level_grp
    type: VARCHAR
    description: "Cube dimension `ISCED11_level_grp` (renamed to snake_case); values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `Sex` (renamed to snake_case); values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell. The unit of measure varies by row -- read it from `unit`."
