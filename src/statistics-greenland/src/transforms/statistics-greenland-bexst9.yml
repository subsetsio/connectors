# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexst9` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `gender`, `district`, `residence`, `basecode` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [gender, age, district, residence, basecode, time]
temporal: time
sort: [time, gender, age, district, residence, basecode]
columns:
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: age
    type: BIGINT
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: district
    type: VARCHAR
    description: "Cube dimension `district`; values are the source's English category labels."
  - name: residence
    type: VARCHAR
    description: "Cube dimension `residence`; values are the source's English category labels."
  - name: basecode
    type: VARCHAR
    description: "Cube dimension `basecode`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
