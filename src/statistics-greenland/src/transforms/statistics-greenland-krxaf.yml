# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-krxaf` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [k_kode, f_kode, time]
temporal: time
sort: [time, k_kode, f_kode]
columns:
  - name: k_kode
    type: VARCHAR
    description: "Cube dimension `k_kode`; values are the source's English category labels."
  - name: f_kode
    type: VARCHAR
    description: "Cube dimension `f_kode`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
