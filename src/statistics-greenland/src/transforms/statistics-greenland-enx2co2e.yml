# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-enx2co2e` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `gas` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [type, gas, product, branch, time]
temporal: time
sort: [time, type, gas, product, branch]
columns:
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: gas
    type: VARCHAR
    description: "Cube dimension `gas`; values are the source's English category labels."
  - name: product
    type: VARCHAR
    description: "Cube dimension `product`; values are the source's English category labels."
  - name: branch
    type: VARCHAR
    description: "Cube dimension `branch`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
