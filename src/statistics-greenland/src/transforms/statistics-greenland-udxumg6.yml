# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxumg6` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [alder, kon, status, aar]
temporal: aar
sort: [aar, alder, kon, status]
columns:
  - name: alder
    type: VARCHAR
    description: "Cube dimension `alder`; values are the source's English category labels."
  - name: kon
    type: VARCHAR
    description: "Cube dimension `kon`; values are the source's English category labels."
  - name: status
    type: VARCHAR
    description: "Cube dimension `status`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
