# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-tuxpax` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [direction, airport, aar, kvt]
temporal: aar
sort: [aar, direction, airport, kvt]
columns:
  - name: direction
    type: VARCHAR
    description: "Cube dimension `direction`; values are the source's English category labels."
  - name: airport
    type: VARCHAR
    description: "Cube dimension `airport`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: kvt
    type: VARCHAR
    description: "Cube dimension `kvt`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
