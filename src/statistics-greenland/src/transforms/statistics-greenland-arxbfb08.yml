# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-arxbfb08` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `branche`, `udd_grp` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [branche, udd_grp, aar]
temporal: aar
sort: [aar, branche, udd_grp]
columns:
  - name: branche
    type: VARCHAR
    description: "Cube dimension `branche`; values are the source's English category labels."
  - name: udd_grp
    type: VARCHAR
    description: "Cube dimension `udd_grp`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
