# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-arxbfb02` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `branche`, `alder_grp`, `sex` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [branche, alder_grp, sex, aar, opg_var]
temporal: aar
sort: [aar, branche, alder_grp, sex, opg_var]
columns:
  - name: branche
    type: VARCHAR
    description: "Cube dimension `branche`; values are the source's English category labels."
  - name: alder_grp
    type: VARCHAR
    description: "Cube dimension `alder_grp`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: opg_var
    type: VARCHAR
    description: "Cube dimension `opg_var`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
