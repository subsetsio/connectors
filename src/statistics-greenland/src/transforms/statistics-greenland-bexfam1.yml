# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexfam1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type_of_address, age, district, gender, type_of_family, time]
temporal: time
sort: [time, type_of_address, age, district, gender, type_of_family]
columns:
  - name: type_of_address
    type: VARCHAR
    description: "Cube dimension `type of address` (renamed to snake_case); values are the source's English category labels."
  - name: age
    type: VARCHAR
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: district
    type: VARCHAR
    description: "Cube dimension `district`; values are the source's English category labels."
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: type_of_family
    type: VARCHAR
    description: "Cube dimension `type of family` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
