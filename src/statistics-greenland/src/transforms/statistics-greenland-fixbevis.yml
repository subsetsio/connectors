# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fixbevis` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type, municipality, geographic_location, sex, time]
temporal: time
sort: [time, type, municipality, geographic_location, sex]
columns:
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: municipality
    type: VARCHAR
    description: "Cube dimension `municipality`; values are the source's English category labels."
  - name: geographic_location
    type: VARCHAR
    description: "Cube dimension `geographic location` (renamed to snake_case); values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
