# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexstdt` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `place of birth`, `locality`, `gender` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [age, place_of_birth, locality, gender, seniority_years_in_locality, time]
temporal: time
sort: [time, age, place_of_birth, locality, gender, seniority_years_in_locality]
columns:
  - name: age
    type: BIGINT
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: place_of_birth
    type: VARCHAR
    description: "Cube dimension `place of birth` (renamed to snake_case); values are the source's English category labels."
  - name: locality
    type: VARCHAR
    description: "Cube dimension `locality`; values are the source's English category labels."
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: seniority_years_in_locality
    type: BIGINT
    description: "Cube dimension `seniority (years in locality)` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
