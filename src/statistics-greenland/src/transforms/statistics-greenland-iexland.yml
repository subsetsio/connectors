# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-iexland` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [time, transaction, country, quarter]
temporal: time
sort: [time, transaction, country, quarter]
columns:
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: transaction
    type: VARCHAR
    description: "Cube dimension `transaction`; values are the source's English category labels."
  - name: country
    type: VARCHAR
    description: "Cube dimension `country`; values are the source's English category labels."
  - name: quarter
    type: VARCHAR
    description: "Cube dimension `quarter`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
