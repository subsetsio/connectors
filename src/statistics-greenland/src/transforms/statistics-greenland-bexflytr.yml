# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexflytr` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `place of birth`, `gender` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [place_of_birth, gender, to_area, from_area, year_of_birth, time]
temporal: time
sort: [time, place_of_birth, gender, to_area, from_area, year_of_birth]
columns:
  - name: place_of_birth
    type: VARCHAR
    description: "Cube dimension `place of birth` (renamed to snake_case); values are the source's English category labels."
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: to_area
    type: VARCHAR
    description: "Cube dimension `to-area` (renamed to snake_case); values are the source's English category labels."
  - name: from_area
    type: VARCHAR
    description: "Cube dimension `from-area` (renamed to snake_case); values are the source's English category labels."
  - name: year_of_birth
    type: BIGINT
    description: "Cube dimension `year of birth` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
