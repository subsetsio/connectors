# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-prxprisw` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `commodity group` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [commodity_group, time]
temporal: time
sort: [time, commodity_group]
columns:
  - name: commodity_group
    type: VARCHAR
    description: "Cube dimension `commodity group` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as period label as published by the source."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
