# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-arxbfb01` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `beskbrch`, `bybygd`, `fsted`, `sex`, `alder_grp` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [beskbrch, bybygd, fsted, sex, alder_grp, aar, opg_var]
temporal: aar
sort: [aar, beskbrch, bybygd, fsted, sex, alder_grp, opg_var]
columns:
  - name: beskbrch
    type: VARCHAR
    description: "Cube dimension `beskbrch`; values are the source's English category labels."
  - name: bybygd
    type: VARCHAR
    description: "Cube dimension `bybygd`; values are the source's English category labels."
  - name: fsted
    type: VARCHAR
    description: "Cube dimension `fsted`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: alder_grp
    type: VARCHAR
    description: "Cube dimension `alder_grp`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: opg_var
    type: VARCHAR
    description: "Cube dimension `opg_var`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
