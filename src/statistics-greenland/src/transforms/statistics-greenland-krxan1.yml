# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-krxan1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type_of_offence, station, time]
temporal: time
sort: [time, type_of_offence, station]
columns:
  - name: type_of_offence
    type: VARCHAR
    description: "Cube dimension `type of offence` (renamed to snake_case); values are the source's English category labels."
  - name: station
    type: VARCHAR
    description: "Cube dimension `station`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
