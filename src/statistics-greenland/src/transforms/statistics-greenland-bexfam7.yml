# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexfam7` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type_of_address, age, municipality, type_of_family, gender, place_of_birth, place_of_birth_partner, time]
temporal: time
sort: [time, type_of_address, age, municipality, type_of_family, gender, place_of_birth, place_of_birth_partner]
columns:
  - name: type_of_address
    type: VARCHAR
    description: "Cube dimension `type of address` (renamed to snake_case); values are the source's English category labels."
  - name: age
    type: VARCHAR
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: municipality
    type: VARCHAR
    description: "Cube dimension `municipality`; values are the source's English category labels."
  - name: type_of_family
    type: VARCHAR
    description: "Cube dimension `type of family` (renamed to snake_case); values are the source's English category labels."
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: place_of_birth
    type: VARCHAR
    description: "Cube dimension `place of birth` (renamed to snake_case); values are the source's English category labels."
  - name: place_of_birth_partner
    type: VARCHAR
    description: "Cube dimension `place of birth, partner` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
