# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexhus1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `residence type`, `municipality` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [type_of_address, size, residence_type, municipality, time]
temporal: time
sort: [time, type_of_address, size, residence_type, municipality]
columns:
  - name: type_of_address
    type: VARCHAR
    description: "Cube dimension `type of address` (renamed to snake_case); values are the source's English category labels."
  - name: size
    type: VARCHAR
    description: "Cube dimension `size`; values are the source's English category labels."
  - name: residence_type
    type: VARCHAR
    description: "Cube dimension `residence type` (renamed to snake_case); values are the source's English category labels."
  - name: municipality
    type: VARCHAR
    description: "Cube dimension `municipality`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
