# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexstfsgrl` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [cohort, gender, status, parents_birthplace, time]
temporal: time
sort: [time, cohort, gender, status, parents_birthplace]
columns:
  - name: cohort
    type: BIGINT
    description: "Cube dimension `cohort`; values are the source's English category labels."
  - name: gender
    type: VARCHAR
    description: "Cube dimension `gender`; values are the source's English category labels."
  - name: status
    type: VARCHAR
    description: "Cube dimension `status`; values are the source's English category labels."
  - name: parents_birthplace
    type: VARCHAR
    description: "Cube dimension `parents birthplace` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
