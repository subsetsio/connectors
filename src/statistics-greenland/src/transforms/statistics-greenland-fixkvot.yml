# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fixkvot` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [time, nation, fishplace, area, species]
temporal: time
sort: [time, nation, fishplace, area, species]
columns:
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: nation
    type: VARCHAR
    description: "Cube dimension `nation`; values are the source's English category labels."
  - name: fishplace
    type: VARCHAR
    description: "Cube dimension `fishplace`; values are the source's English category labels."
  - name: area
    type: VARCHAR
    description: "Cube dimension `area`; values are the source's English category labels."
  - name: species
    type: VARCHAR
    description: "Cube dimension `species`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
