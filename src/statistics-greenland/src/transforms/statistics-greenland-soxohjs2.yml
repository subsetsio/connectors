# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-soxohjs2` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `interval`, `alder_grp`, `sex`, `type2` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [interval, alder_grp, sex, type2, taar]
temporal: taar
sort: [taar, interval, alder_grp, sex, type2]
columns:
  - name: interval
    type: VARCHAR
    description: "Cube dimension `interval`; values are the source's English category labels."
  - name: alder_grp
    type: VARCHAR
    description: "Cube dimension `alder_grp`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: type2
    type: VARCHAR
    description: "Cube dimension `type2`; values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
