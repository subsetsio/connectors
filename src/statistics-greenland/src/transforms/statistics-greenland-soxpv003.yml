# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-soxpv003` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `first adress in greenland` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [first_adress_in_greenland, year]
temporal: year
sort: [year, first_adress_in_greenland]
columns:
  - name: first_adress_in_greenland
    type: VARCHAR
    description: "Cube dimension `first adress in greenland` (renamed to snake_case); values are the source's English category labels."
  - name: year
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
