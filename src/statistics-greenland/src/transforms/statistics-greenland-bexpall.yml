# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexpall` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `sex`, `pob` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [age, sex, pob, version, time]
temporal: time
sort: [time, age, sex, pob, version]
columns:
  - name: age
    type: BIGINT
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: pob
    type: VARCHAR
    description: "Cube dimension `pob`; values are the source's English category labels."
  - name: version
    type: VARCHAR
    description: "Cube dimension `version`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
