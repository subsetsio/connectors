# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexfam1x` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `area` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [adrtype, alder, area, sex, status, taar]
temporal: taar
sort: [taar, adrtype, alder, area, sex, status]
columns:
  - name: adrtype
    type: VARCHAR
    description: "Cube dimension `adrtype`; values are the source's English category labels."
  - name: alder
    type: VARCHAR
    description: "Cube dimension `alder`; values are the source's English category labels."
  - name: area
    type: VARCHAR
    description: "Cube dimension `area`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: status
    type: VARCHAR
    description: "Cube dimension `status`; values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
