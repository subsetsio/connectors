# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-koxobl` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [time, type_of_property]
temporal: time
sort: [time, type_of_property]
columns:
  - name: time
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as quarter code (YYYYQn)."
  - name: type_of_property
    type: VARCHAR
    description: "Cube dimension `type of property` (renamed to snake_case); values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
