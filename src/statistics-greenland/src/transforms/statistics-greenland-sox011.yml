# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-sox011` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `no of children`, `no of adults`, `amount intervals` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [no_of_children, no_of_adults, amount_intervals, type, time]
temporal: time
sort: [time, no_of_children, no_of_adults, amount_intervals, type]
columns:
  - name: no_of_children
    type: VARCHAR
    description: "Cube dimension `no of children` (renamed to snake_case); values are the source's English category labels."
  - name: no_of_adults
    type: VARCHAR
    description: "Cube dimension `no of adults` (renamed to snake_case); values are the source's English category labels."
  - name: amount_intervals
    type: VARCHAR
    description: "Cube dimension `amount intervals` (renamed to snake_case); values are the source's English category labels."
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
