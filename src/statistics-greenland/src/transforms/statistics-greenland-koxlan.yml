# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-koxlan` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [domestic_sector, time]
temporal: time
sort: [time, domestic_sector]
columns:
  - name: domestic_sector
    type: VARCHAR
    description: "Cube dimension `domestic sector` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as quarter code (YYYYQn)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
