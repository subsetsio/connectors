# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-enx2co2` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type, gas, product, branch, time]
temporal: time
sort: [time, type, gas, product, branch]
columns:
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: gas
    type: VARCHAR
    description: "Cube dimension `gas`; values are the source's English category labels."
  - name: product
    type: VARCHAR
    description: "Cube dimension `product`; values are the source's English category labels."
  - name: branch
    type: VARCHAR
    description: "Cube dimension `branch`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
