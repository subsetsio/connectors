# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexhus4` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [type_of_address, size, type, districts, time]
temporal: time
sort: [time, type_of_address, size, type, districts]
columns:
  - name: type_of_address
    type: VARCHAR
    description: "Cube dimension `type of address` (renamed to snake_case); values are the source's English category labels."
  - name: size
    type: VARCHAR
    description: "Cube dimension `size`; values are the source's English category labels."
  - name: type
    type: VARCHAR
    description: "Cube dimension `type`; values are the source's English category labels."
  - name: districts
    type: VARCHAR
    description: "Cube dimension `districts`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
