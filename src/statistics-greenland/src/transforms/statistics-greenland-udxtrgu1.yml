# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxtrgu1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [aar, isced, skole, status, dim_aar]
temporal: dim_aar
sort: [dim_aar, aar, isced, skole, status]
columns:
  - name: aar
    type: VARCHAR
    description: "Cube dimension `aar`; values are the source's English category labels."
  - name: isced
    type: VARCHAR
    description: "Cube dimension `isced`; values are the source's English category labels."
  - name: skole
    type: VARCHAR
    description: "Cube dimension `skole`; values are the source's English category labels."
  - name: status
    type: VARCHAR
    description: "Cube dimension `status`; values are the source's English category labels."
  - name: dim_aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
