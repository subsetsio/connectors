# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-krxan3` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `niv_kode`, `pkr` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [niv_kode, pkr, anmy]
temporal: anmy
sort: [anmy, niv_kode, pkr]
columns:
  - name: niv_kode
    type: VARCHAR
    description: "Cube dimension `niv_kode`; values are the source's English category labels."
  - name: pkr
    type: VARCHAR
    description: "Cube dimension `pkr`; values are the source's English category labels."
  - name: anmy
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
