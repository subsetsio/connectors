# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-arxled1a` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `koen`, `dist_k` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [aar, koen, dist_k, alderskat, md]
temporal: aar
sort: [aar, koen, dist_k, alderskat, md]
columns:
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: koen
    type: VARCHAR
    description: "Cube dimension `koen`; values are the source's English category labels."
  - name: dist_k
    type: VARCHAR
    description: "Cube dimension `dist_k`; values are the source's English category labels."
  - name: alderskat
    type: VARCHAR
    description: "Cube dimension `Alderskat` (renamed to snake_case); values are the source's English category labels."
  - name: md
    type: VARCHAR
    description: "Cube dimension `md`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
