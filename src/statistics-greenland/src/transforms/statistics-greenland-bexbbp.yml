# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexbbp` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [mothers_place_of_birth, mothers_age, parity, time]
temporal: time
sort: [time, mothers_place_of_birth, mothers_age, parity]
columns:
  - name: mothers_place_of_birth
    type: VARCHAR
    description: "Cube dimension `mothers place of birth` (renamed to snake_case); values are the source's English category labels."
  - name: mothers_age
    type: VARCHAR
    description: "Cube dimension `mothers age` (renamed to snake_case); values are the source's English category labels."
  - name: parity
    type: VARCHAR
    description: "Cube dimension `parity`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
