# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxflk` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `sex` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [grading_system, sex, grade, subject, type_of_grades, time]
temporal: time
sort: [time, grading_system, sex, grade, subject, type_of_grades]
columns:
  - name: grading_system
    type: VARCHAR
    description: "Cube dimension `grading system` (renamed to snake_case); values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: grade
    type: VARCHAR
    description: "Cube dimension `grade`; values are the source's English category labels."
  - name: subject
    type: VARCHAR
    description: "Cube dimension `subject`; values are the source's English category labels."
  - name: type_of_grades
    type: VARCHAR
    description: "Cube dimension `type of grades` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
