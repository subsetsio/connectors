# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-suxa1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [age, quarter, cohabiting, length_of_pregnancy, time]
temporal: time
sort: [time, age, quarter, cohabiting, length_of_pregnancy]
columns:
  - name: age
    type: BIGINT
    description: "Cube dimension `age`; values are the source's English category labels."
  - name: quarter
    type: VARCHAR
    description: "Cube dimension `quarter`; values are the source's English category labels."
  - name: cohabiting
    type: VARCHAR
    description: "Cube dimension `cohabiting`; values are the source's English category labels."
  - name: length_of_pregnancy
    type: VARCHAR
    description: "Cube dimension `length of pregnancy` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
