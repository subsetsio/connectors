# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-enx4nuk` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [product, location, time]
temporal: time
sort: [time, product, location]
columns:
  - name: product
    type: VARCHAR
    description: "Cube dimension `product`; values are the source's English category labels."
  - name: location
    type: VARCHAR
    description: "Cube dimension `location`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
