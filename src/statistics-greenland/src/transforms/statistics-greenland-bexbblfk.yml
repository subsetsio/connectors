# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexbblfk` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `place of birth(mother)`, `municipality(mother)` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [place_of_birth_mother, age_mother, municipality_mother, time]
temporal: time
sort: [time, place_of_birth_mother, age_mother, municipality_mother]
columns:
  - name: place_of_birth_mother
    type: VARCHAR
    description: "Cube dimension `place of birth(mother)` (renamed to snake_case); values are the source's English category labels."
  - name: age_mother
    type: BIGINT
    description: "Cube dimension `age(mother)` (renamed to snake_case); values are the source's English category labels."
  - name: municipality_mother
    type: VARCHAR
    description: "Cube dimension `municipality(mother)` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as month code (YYYYMmm)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
