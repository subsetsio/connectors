# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-ofxk1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `account name` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [artskonto, account_name, year]
temporal: year
sort: [year, artskonto, account_name]
columns:
  - name: artskonto
    type: VARCHAR
    description: "Cube dimension `artskonto`; values are the source's English category labels."
  - name: account_name
    type: VARCHAR
    description: "Cube dimension `account name` (renamed to snake_case); values are the source's English category labels."
  - name: year
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
