# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-soxou05` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `district` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [inventory_variable, district, year]
temporal: year
sort: [year, inventory_variable, district]
columns:
  - name: inventory_variable
    type: VARCHAR
    description: "Cube dimension `inventory variable` (renamed to snake_case); values are the source's English category labels."
  - name: district
    type: VARCHAR
    description: "Cube dimension `district`; values are the source's English category labels."
  - name: year
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
