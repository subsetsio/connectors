# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fix010` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [nation, species, fishsegm, area, vessel_type, time, quarter]
temporal: time
sort: [time, nation, species, fishsegm, area, vessel_type, quarter]
columns:
  - name: nation
    type: VARCHAR
    description: "Cube dimension `nation`; values are the source's English category labels."
  - name: species
    type: VARCHAR
    description: "Cube dimension `species`; values are the source's English category labels."
  - name: fishsegm
    type: VARCHAR
    description: "Cube dimension `fishsegm`; values are the source's English category labels."
  - name: area
    type: VARCHAR
    description: "Cube dimension `area`; values are the source's English category labels."
  - name: vessel_type
    type: VARCHAR
    description: "Cube dimension `vessel type` (renamed to snake_case); values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: quarter
    type: VARCHAR
    description: "Cube dimension `quarter`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
