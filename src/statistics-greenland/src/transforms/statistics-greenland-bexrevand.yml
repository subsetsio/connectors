# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-bexrevand` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `sex`, `fsted` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [sex, alder_ult, vandrn, vandrnmd, fsted, taar]
temporal: taar
sort: [taar, sex, alder_ult, vandrn, vandrnmd, fsted]
columns:
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: alder_ult
    type: BIGINT
    description: "Cube dimension `alder_ult`; values are the source's English category labels."
  - name: vandrn
    type: VARCHAR
    description: "Cube dimension `vandrn`; values are the source's English category labels."
  - name: vandrnmd
    type: VARCHAR
    description: "Cube dimension `vandrnmd`; values are the source's English category labels."
  - name: fsted
    type: VARCHAR
    description: "Cube dimension `fsted`; values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
