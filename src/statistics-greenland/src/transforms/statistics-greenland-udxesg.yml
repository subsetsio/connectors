# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxesg` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `kommune`, `efterskole`, `sex` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
# caution: `unit` is a dimension of this cube, not a table-wide constant: rows in the same `obs_value` column are expressed in different units. Filter to one `unit` before aggregating or comparing values.
key: [unit, kommune, efterskole, status, skoleaar, sex]
temporal: skoleaar
sort: [skoleaar, unit, kommune, efterskole, status, sex]
columns:
  - name: unit
    type: VARCHAR
    description: "Cube dimension `unit`; values are the source's English category labels."
  - name: kommune
    type: VARCHAR
    description: "Cube dimension `kommune`; values are the source's English category labels."
  - name: efterskole
    type: VARCHAR
    description: "Cube dimension `efterskole`; values are the source's English category labels."
  - name: status
    type: VARCHAR
    description: "Cube dimension `status`; values are the source's English category labels."
  - name: skoleaar
    type: VARCHAR
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as period label as published by the source."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell. The unit of measure varies by row -- read it from `unit`."
