# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-ofxukn1b` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `btypaar`, `koen` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [btypaar, koen, born_var, aar]
temporal: aar
sort: [aar, btypaar, koen, born_var]
columns:
  - name: btypaar
    type: VARCHAR
    description: "Cube dimension `btypaar`; values are the source's English category labels."
  - name: koen
    type: VARCHAR
    description: "Cube dimension `koen`; values are the source's English category labels."
  - name: born_var
    type: VARCHAR
    description: "Cube dimension `born_var`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
