    type: VARCHAR
    description: "Cube dimension `isced_field`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: skoleomr
    type: VARCHAR
    description: "Cube dimension `skoleomr`; values are the source's English category labels."
  - name: startalder
    type: VARCHAR
    description: "Cube dimension `startalder`; values are the source's English category labels."
