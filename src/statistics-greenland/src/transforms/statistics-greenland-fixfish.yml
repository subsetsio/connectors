# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-fixfish` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [nat_id, area_id, art_id, taar, m]
temporal: taar
sort: [taar, nat_id, area_id, art_id, m]
columns:
  - name: nat_id
    type: VARCHAR
    description: "Cube dimension `nat_id`; values are the source's English category labels."
  - name: area_id
    type: VARCHAR
    description: "Cube dimension `area_id`; values are the source's English category labels."
  - name: art_id
    type: VARCHAR
    description: "Cube dimension `art_id`; values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: m
    type: VARCHAR
    description: "Cube dimension `m`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
