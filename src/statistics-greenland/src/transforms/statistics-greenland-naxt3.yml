# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-naxt3` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [number_of_given_names, surname, time]
temporal: time
sort: [time, number_of_given_names, surname]
columns:
  - name: number_of_given_names
    type: BIGINT
    description: "Cube dimension `number of given names` (renamed to snake_case); values are the source's English category labels."
  - name: surname
    type: VARCHAR
    description: "Cube dimension `surname`; values are the source's English category labels."
  - name: time
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
