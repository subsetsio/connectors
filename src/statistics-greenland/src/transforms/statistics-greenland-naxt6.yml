# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-naxt6` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [first_firstname, cohort]
temporal: cohort
sort: [cohort, first_firstname]
columns:
  - name: first_firstname
    type: VARCHAR
    description: "Cube dimension `first firstname` (renamed to snake_case); values are the source's English category labels."
  - name: cohort
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
