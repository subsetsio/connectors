# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-udxese` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
key: [befo, distrikt, sex, aargang]
temporal: aargang
sort: [aargang, befo, distrikt, sex]
columns:
  - name: befo
    type: VARCHAR
    description: "Cube dimension `Befo` (renamed to snake_case); values are the source's English category labels."
  - name: distrikt
    type: VARCHAR
    description: "Cube dimension `distrikt`; values are the source's English category labels."
  - name: sex
    type: VARCHAR
    description: "Cube dimension `sex`; values are the source's English category labels."
  - name: aargang
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
