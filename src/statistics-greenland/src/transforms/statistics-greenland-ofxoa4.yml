# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-ofxoa4` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `sektor`, `dist`, `kon` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [sektor, dist, kon, taar, opg_var]
temporal: taar
sort: [taar, sektor, dist, kon, opg_var]
columns:
  - name: sektor
    type: VARCHAR
    description: "Cube dimension `sektor`; values are the source's English category labels."
  - name: dist
    type: VARCHAR
    description: "Cube dimension `dist`; values are the source's English category labels."
  - name: kon
    type: VARCHAR
    description: "Cube dimension `kon`; values are the source's English category labels."
  - name: taar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: opg_var
    type: VARCHAR
    description: "Cube dimension `opg_var`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
