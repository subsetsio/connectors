# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-ofxukn1` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `bosted`, `inst_type2`, `born_var`, `kom` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [bosted, inst_type2, born_var, aar, kom]
temporal: aar
sort: [aar, bosted, inst_type2, born_var, kom]
columns:
  - name: bosted
    type: VARCHAR
    description: "Cube dimension `bosted`; values are the source's English category labels."
  - name: inst_type2
    type: VARCHAR
    description: "Cube dimension `inst_type2`; values are the source's English category labels."
  - name: born_var
    type: VARCHAR
    description: "Cube dimension `born_var`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: kom
    type: VARCHAR
    description: "Cube dimension `kom`; values are the source's English category labels."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
