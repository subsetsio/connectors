# compiled by `hardened compile-transforms`, then curated at the model stage.
# Faithful pass-through of raw asset `statistics-greenland-esx6a` (a PxWeb json-stat2 cube
# flattened to long form: one column per dimension carrying the English
# category label, plus the cell value).
# caution: Dimension column(s) `ai2`, `section` carry source-provided aggregate members (labels such as 'Total' / 'All Greenland') that summarise the other members of the same dimension alongside them. Filter each of those columns to a single level before summing `obs_value`, or the aggregate rows are counted twice.
key: [ai2, section, aar]
temporal: aar
sort: [aar, ai2, section]
columns:
  - name: ai2
    type: VARCHAR
    description: "Cube dimension `ai2`; values are the source's English category labels."
  - name: section
    type: VARCHAR
    description: "Cube dimension `section`; values are the source's English category labels."
  - name: aar
    type: BIGINT
    description: "Observation period -- the cube dimension Statistics Greenland tags role=time. Encoded as calendar year (YYYY)."
  - name: obs_value
    type: DOUBLE
    description: "Observed value of the cube cell."
