# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-ofxoa4`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sektor, dist, kon, taar, opg_var]
temporal: taar
checks:
  - kind: unique
    columns: [sektor, dist, kon, taar, opg_var]
  - kind: not_null
    col: sektor
  - kind: not_null
    col: dist
  - kind: not_null
    col: kon
  - kind: not_null
    col: taar
  - kind: not_null
    col: opg_var
  - kind: row_floor
    min: 4590
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
