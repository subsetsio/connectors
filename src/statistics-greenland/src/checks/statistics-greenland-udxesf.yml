# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-udxesf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unit, alder, efterskole, status, skoleaar, sex]
temporal: skoleaar
checks:
  - kind: unique
    columns: [unit, alder, efterskole, status, skoleaar, sex]
  - kind: not_null
    col: unit
  - kind: not_null
    col: alder
  - kind: not_null
    col: efterskole
  - kind: not_null
    col: status
  - kind: not_null
    col: skoleaar
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 2168
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
