# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexstk4`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [place_of_birth, age, locality, sex, time_primo]
temporal: time_primo
checks:
  - kind: unique
    columns: [place_of_birth, age, locality, sex, time_primo]
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: age
  - kind: not_null
    col: locality
  - kind: not_null
    col: sex
  - kind: not_null
    col: time_primo
  - kind: row_floor
    min: 528415
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
