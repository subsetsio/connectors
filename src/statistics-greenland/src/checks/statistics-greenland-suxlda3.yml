# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-suxlda3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, causes, month_of_death, sex, time]
temporal: time
checks:
  - kind: unique
    columns: [age, causes, month_of_death, sex, time]
  - kind: not_null
    col: age
  - kind: not_null
    col: causes
  - kind: not_null
    col: month_of_death
  - kind: not_null
    col: sex
  - kind: not_null
    col: time
  - kind: row_floor
    min: 29500
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
