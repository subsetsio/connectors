# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexfertr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [omr, faar, alder, m_fsted, sex, taar]
temporal: taar
checks:
  - kind: unique
    columns: [omr, faar, alder, m_fsted, sex, taar]
  - kind: not_null
    col: omr
  - kind: not_null
    col: faar
  - kind: not_null
    col: alder
  - kind: not_null
    col: m_fsted
  - kind: not_null
    col: sex
  - kind: not_null
    col: taar
  - kind: row_floor
    min: 105520
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
