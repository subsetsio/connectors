# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-soxbs01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [size_of_household, amount_interval, unit, time]
temporal: time
checks:
  - kind: unique
    columns: [size_of_household, amount_interval, unit, time]
  - kind: not_null
    col: size_of_household
  - kind: not_null
    col: amount_interval
  - kind: not_null
    col: unit
  - kind: not_null
    col: time
  - kind: row_floor
    min: 595
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
