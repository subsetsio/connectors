# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbbpl`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mother_s_place_of_birth, mother_s_age, parity, mother_s_birthsday, time]
temporal: time
checks:
  - kind: unique
    columns: [mother_s_place_of_birth, mother_s_age, parity, mother_s_birthsday, time]
  - kind: not_null
    col: mother_s_place_of_birth
  - kind: not_null
    col: mother_s_age
  - kind: not_null
    col: parity
  - kind: not_null
    col: mother_s_birthsday
  - kind: not_null
    col: time
  - kind: row_floor
    min: 19456
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
