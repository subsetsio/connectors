# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-fix010`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nation, species, fishsegm, area, vessel_type, time, quarter]
temporal: time
checks:
  - kind: unique
    columns: [nation, species, fishsegm, area, vessel_type, time, quarter]
  - kind: not_null
    col: nation
  - kind: not_null
    col: species
  - kind: not_null
    col: fishsegm
  - kind: not_null
    col: area
  - kind: not_null
    col: vessel_type
  - kind: not_null
    col: time
  - kind: not_null
    col: quarter
  - kind: row_floor
    min: 1286
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
