# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexstayy`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, residence_type_2024, place_of_birth, gender, time]
temporal: time
checks:
  - kind: unique
    columns: [age, residence_type_2024, place_of_birth, gender, time]
  - kind: not_null
    col: age
  - kind: not_null
    col: residence_type_2024
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: gender
  - kind: not_null
    col: time
  - kind: row_floor
    min: 143334
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
