    columns: [municipality, unit, gender, age, place_of_residence, place_of_birth, type_of_income, time]
  - kind: not_null
    col: municipality
  - kind: not_null
    col: unit
  - kind: not_null
    col: gender
  - kind: not_null
    col: age
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: type_of_income
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1511373
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
