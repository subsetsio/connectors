# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-nrx16`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [price_unit, time, production, coicop]
temporal: time
checks:
  - kind: unique
    columns: [price_unit, time, production, coicop]
  - kind: not_null
    col: price_unit
  - kind: not_null
    col: time
  - kind: not_null
    col: production
  - kind: not_null
    col: coicop
  - kind: row_floor
    min: 44308
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
