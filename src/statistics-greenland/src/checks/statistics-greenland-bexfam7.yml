# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexfam7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type_of_address, age, municipality, type_of_family, gender, place_of_birth, place_of_birth_partner, time]
temporal: time
checks:
  - kind: unique
    columns: [type_of_address, age, municipality, type_of_family, gender, place_of_birth, place_of_birth_partner, time]
  - kind: not_null
    col: type_of_address
  - kind: not_null
    col: age
  - kind: not_null
    col: municipality
  - kind: not_null
    col: type_of_family
  - kind: not_null
    col: gender
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: place_of_birth_partner
  - kind: not_null
    col: time
  - kind: row_floor
    min: 88983
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
