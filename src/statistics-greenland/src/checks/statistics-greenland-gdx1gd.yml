# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-gdx1gd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, gender, affiliation, period, time]
temporal: time
checks:
  - kind: unique
    columns: [age, gender, affiliation, period, time]
  - kind: not_null
    col: age
  - kind: not_null
    col: gender
  - kind: not_null
    col: affiliation
  - kind: not_null
    col: period
  - kind: not_null
    col: time
  - kind: row_floor
    min: 8636
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
