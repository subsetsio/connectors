# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexstfsgrl`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cohort, gender, status, parents_birthplace, time]
temporal: time
checks:
  - kind: unique
    columns: [cohort, gender, status, parents_birthplace, time]
  - kind: not_null
    col: cohort
  - kind: not_null
    col: gender
  - kind: not_null
    col: status
  - kind: not_null
    col: parents_birthplace
  - kind: not_null
    col: time
  - kind: row_floor
    min: 10933
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
