# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-enx1mid`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measuring, time, weather_station, month]
temporal: time
checks:
  - kind: unique
    columns: [measuring, time, weather_station, month]
  - kind: not_null
    col: measuring
  - kind: not_null
    col: time
  - kind: not_null
    col: weather_station
  - kind: not_null
    col: month
  - kind: row_floor
    min: 9757
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
