# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-fix003`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time, municipality, species, unit, month]
temporal: time
checks:
  - kind: unique
    columns: [time, municipality, species, unit, month]
  - kind: not_null
    col: time
  - kind: not_null
    col: municipality
  - kind: not_null
    col: species
  - kind: not_null
    col: unit
  - kind: not_null
    col: month
  - kind: row_floor
    min: 36720
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
