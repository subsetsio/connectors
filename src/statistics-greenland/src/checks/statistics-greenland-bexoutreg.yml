# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexoutreg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [area, pob, rate_code, age, sex_code, src_code, period]
temporal: period
checks:
  - kind: unique
    columns: [area, pob, rate_code, age, sex_code, src_code, period]
  - kind: not_null
    col: area
  - kind: not_null
    col: pob
  - kind: not_null
    col: rate_code
  - kind: not_null
    col: age
  - kind: not_null
    col: sex_code
  - kind: not_null
    col: src_code
  - kind: not_null
    col: period
  - kind: row_floor
    min: 1049760
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
