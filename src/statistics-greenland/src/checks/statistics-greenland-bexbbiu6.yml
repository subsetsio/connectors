# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbbiu6`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, reporting_country, gender, citizenship, migration, time]
temporal: time
checks:
  - kind: unique
    columns: [country, reporting_country, gender, citizenship, migration, time]
  - kind: not_null
    col: country
  - kind: not_null
    col: reporting_country
  - kind: not_null
    col: gender
  - kind: not_null
    col: citizenship
  - kind: not_null
    col: migration
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1576
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
