# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-arxled2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [aar, md, koen, type_k, alderskat]
temporal: aar
checks:
  - kind: unique
    columns: [aar, md, koen, type_k, alderskat]
  - kind: not_null
    col: aar
  - kind: not_null
    col: md
  - kind: not_null
    col: koen
  - kind: not_null
    col: type_k
  - kind: not_null
    col: alderskat
  - kind: row_floor
    min: 11340
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
