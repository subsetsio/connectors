# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-udxffk`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unit, municipality, grade, subject, type_of_grades, grading_system, time]
temporal: time
checks:
  - kind: unique
    columns: [unit, municipality, grade, subject, type_of_grades, grading_system, time]
  - kind: not_null
    col: unit
  - kind: not_null
    col: municipality
  - kind: not_null
    col: grade
  - kind: not_null
    col: subject
  - kind: not_null
    col: type_of_grades
  - kind: not_null
    col: grading_system
  - kind: not_null
    col: time
  - kind: row_floor
    min: 19405
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
