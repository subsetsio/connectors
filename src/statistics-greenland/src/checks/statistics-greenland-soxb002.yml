# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-soxb002`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [parentel_leave, sector, gender, time]
temporal: time
checks:
  - kind: unique
    columns: [parentel_leave, sector, gender, time]
  - kind: not_null
    col: parentel_leave
  - kind: not_null
    col: sector
  - kind: not_null
    col: gender
  - kind: not_null
    col: time
  - kind: row_floor
    min: 108
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
