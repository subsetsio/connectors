# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-iexdet`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [transaction, month, unit, time, product]
temporal: time
checks:
  - kind: unique
    columns: [transaction, month, unit, time, product]
  - kind: not_null
    col: transaction
  - kind: not_null
    col: month
  - kind: not_null
    col: unit
  - kind: not_null
    col: time
  - kind: not_null
    col: product
  - kind: row_floor
    min: 57943
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
