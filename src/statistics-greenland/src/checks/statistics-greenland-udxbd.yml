    columns: [aar, bosted, udd_land, ud_niveau, slutaar]
  - kind: not_null
    col: aar
  - kind: not_null
    col: bosted
  - kind: not_null
    col: udd_land
  - kind: not_null
    col: ud_niveau
  - kind: not_null
    col: slutaar
  - kind: row_floor
    min: 981
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
