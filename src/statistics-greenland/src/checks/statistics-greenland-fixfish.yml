# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-fixfish`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nat_id, area_id, art_id, taar, m]
temporal: taar
checks:
  - kind: unique
    columns: [nat_id, area_id, art_id, taar, m]
  - kind: not_null
    col: nat_id
  - kind: not_null
    col: area_id
  - kind: not_null
    col: art_id
  - kind: not_null
    col: taar
  - kind: not_null
    col: m
  - kind: row_floor
    min: 282
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
