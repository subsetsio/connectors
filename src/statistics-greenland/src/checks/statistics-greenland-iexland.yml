# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-iexland`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time, transaction, country, quarter]
temporal: time
checks:
  - kind: unique
    columns: [time, transaction, country, quarter]
  - kind: not_null
    col: time
  - kind: not_null
    col: transaction
  - kind: not_null
    col: country
  - kind: not_null
    col: quarter
  - kind: row_floor
    min: 5228
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
