# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbbl3gen`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mothers_residence, cohort_of_mother, place_of_birth, district_mother, gender, time]
temporal: time
checks:
  - kind: unique
    columns: [mothers_residence, cohort_of_mother, place_of_birth, district_mother, gender, time]
  - kind: not_null
    col: mothers_residence
  - kind: not_null
    col: cohort_of_mother
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: district_mother
  - kind: not_null
    col: gender
  - kind: not_null
    col: time
  - kind: row_floor
    min: 398560
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
