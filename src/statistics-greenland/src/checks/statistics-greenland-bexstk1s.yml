# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexstk1s`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, residence_type, citizenship, sex, time_primo]
temporal: time_primo
checks:
  - kind: unique
    columns: [age, residence_type, citizenship, sex, time_primo]
  - kind: not_null
    col: age
  - kind: not_null
    col: residence_type
  - kind: not_null
    col: citizenship
  - kind: not_null
    col: sex
  - kind: not_null
    col: time_primo
  - kind: row_floor
    min: 107256
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
