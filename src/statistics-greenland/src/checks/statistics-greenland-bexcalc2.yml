# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexcalc2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, place_of_birth, year_of_birth, triangles_lexis, event, time]
temporal: time
checks:
  - kind: unique
    columns: [sex, place_of_birth, year_of_birth, triangles_lexis, event, time]
  - kind: not_null
    col: sex
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: year_of_birth
  - kind: not_null
    col: triangles_lexis
  - kind: not_null
    col: event
  - kind: not_null
    col: time
  - kind: row_floor
    min: 778255
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
