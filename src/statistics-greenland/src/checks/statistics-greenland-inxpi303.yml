# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-inxpi303`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [locality, unit, gender, age, place_of_residence, place_of_birth, income_interval, time]
temporal: time
checks:
  - kind: unique
    columns: [locality, unit, gender, age, place_of_residence, place_of_birth, income_interval, time]
  - kind: not_null
    col: locality
  - kind: not_null
    col: unit
  - kind: not_null
    col: gender
  - kind: not_null
    col: age
  - kind: not_null
    col: place_of_residence
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: income_interval
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1210101
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
