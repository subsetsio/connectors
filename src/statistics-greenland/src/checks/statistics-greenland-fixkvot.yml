# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-fixkvot`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time, nation, fishplace, area, species]
temporal: time
checks:
  - kind: unique
    columns: [time, nation, fishplace, area, species]
  - kind: not_null
    col: time
  - kind: not_null
    col: nation
  - kind: not_null
    col: fishplace
  - kind: not_null
    col: area
  - kind: not_null
    col: species
  - kind: row_floor
    min: 21120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
