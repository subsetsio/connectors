# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexst9`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [gender, age, district, residence, basecode, time]
temporal: time
checks:
  - kind: unique
    columns: [gender, age, district, residence, basecode, time]
  - kind: not_null
    col: gender
  - kind: not_null
    col: age
  - kind: not_null
    col: district
  - kind: not_null
    col: residence
  - kind: not_null
    col: basecode
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1074067
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
