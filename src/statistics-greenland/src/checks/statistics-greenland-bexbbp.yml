# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbbp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mothers_place_of_birth, mothers_age, parity, time]
temporal: time
checks:
  - kind: unique
    columns: [mothers_place_of_birth, mothers_age, parity, time]
  - kind: not_null
    col: mothers_place_of_birth
  - kind: not_null
    col: mothers_age
  - kind: not_null
    col: parity
  - kind: not_null
    col: time
  - kind: row_floor
    min: 9216
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
