# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbaf2k`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type, from_municipality, place_of_birth, to_municipality, time]
temporal: time
checks:
  - kind: unique
    columns: [type, from_municipality, place_of_birth, to_municipality, time]
  - kind: not_null
    col: type
  - kind: not_null
    col: from_municipality
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: to_municipality
  - kind: not_null
    col: time
  - kind: row_floor
    min: 16073
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
