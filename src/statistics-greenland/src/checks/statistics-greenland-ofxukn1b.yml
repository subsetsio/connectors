    col: koen
  - kind: not_null
    col: born_var
  - kind: not_null
    col: aar
  - kind: row_floor
    min: 609
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
