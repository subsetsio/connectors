# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexstall`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [district, pob, sex, content, time]
temporal: time
checks:
  - kind: unique
    columns: [district, pob, sex, content, time]
  - kind: not_null
    col: district
  - kind: not_null
    col: pob
  - kind: not_null
    col: sex
  - kind: not_null
    col: content
  - kind: not_null
    col: time
  - kind: row_floor
    min: 214993
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
