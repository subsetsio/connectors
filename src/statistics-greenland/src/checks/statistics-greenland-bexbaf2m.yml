# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexbaf2m`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, type, municipality_from, place_of_birth, gender, municipality_of_migration, time]
temporal: time
checks:
  - kind: unique
    columns: [month, type, municipality_from, place_of_birth, gender, municipality_of_migration, time]
  - kind: not_null
    col: month
  - kind: not_null
    col: type
  - kind: not_null
    col: municipality_from
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: gender
  - kind: not_null
    col: municipality_of_migration
  - kind: not_null
    col: time
  - kind: row_floor
    min: 199584
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
