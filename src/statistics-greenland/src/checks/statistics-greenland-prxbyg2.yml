# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-prxbyg2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [buildingtype, tradearea, costtype, contenttype, time]
temporal: time
checks:
  - kind: unique
    columns: [buildingtype, tradearea, costtype, contenttype, time]
  - kind: not_null
    col: buildingtype
  - kind: not_null
    col: tradearea
  - kind: not_null
    col: costtype
  - kind: not_null
    col: contenttype
  - kind: not_null
    col: time
  - kind: row_floor
    min: 360
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
