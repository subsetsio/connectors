    columns: [antal_md_kod, bybygd, sex, aar]
  - kind: not_null
    col: antal_md_kod
  - kind: not_null
    col: bybygd
  - kind: not_null
    col: sex
  - kind: not_null
    col: aar
  - kind: row_floor
    min: 202
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
