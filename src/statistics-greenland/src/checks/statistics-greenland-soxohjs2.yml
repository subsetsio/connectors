# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-soxohjs2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [interval, alder_grp, sex, type2, taar]
temporal: taar
checks:
  - kind: unique
    columns: [interval, alder_grp, sex, type2, taar]
  - kind: not_null
    col: interval
  - kind: not_null
    col: alder_grp
  - kind: not_null
    col: sex
  - kind: not_null
    col: type2
  - kind: not_null
    col: taar
  - kind: row_floor
    min: 484
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
