# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-fix012`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [district, species, fishing_segment, vessel_type, enhed, month, time]
temporal: time
checks:
  - kind: unique
    columns: [district, species, fishing_segment, vessel_type, enhed, month, time]
  - kind: not_null
    col: district
  - kind: not_null
    col: species
  - kind: not_null
    col: fishing_segment
  - kind: not_null
    col: vessel_type
  - kind: not_null
    col: enhed
  - kind: not_null
    col: month
  - kind: not_null
    col: time
  - kind: row_floor
    min: 18054
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
