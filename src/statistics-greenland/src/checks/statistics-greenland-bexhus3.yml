# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexhus3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type_of_address, size, residence_type, municipality, type_of_household, time]
temporal: time
checks:
  - kind: unique
    columns: [type_of_address, size, residence_type, municipality, type_of_household, time]
  - kind: not_null
    col: type_of_address
  - kind: not_null
    col: size
  - kind: not_null
    col: residence_type
  - kind: not_null
    col: municipality
  - kind: not_null
    col: type_of_household
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1426686
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
