# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-udxkaf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unit, fag_edit, eksamensaar, level]
temporal: eksamensaar
checks:
  - kind: unique
    columns: [unit, fag_edit, eksamensaar, level]
  - kind: not_null
    col: unit
  - kind: not_null
    col: fag_edit
  - kind: not_null
    col: eksamensaar
  - kind: not_null
    col: level
  - kind: row_floor
    min: 168
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
