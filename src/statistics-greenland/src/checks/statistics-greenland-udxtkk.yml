# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-udxtkk`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subject, grade, municipality, sex, unit, time]
temporal: time
checks:
  - kind: unique
    columns: [subject, grade, municipality, sex, unit, time]
  - kind: not_null
    col: subject
  - kind: not_null
    col: grade
  - kind: not_null
    col: municipality
  - kind: not_null
    col: sex
  - kind: not_null
    col: unit
  - kind: not_null
    col: time
  - kind: row_floor
    min: 2016
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
