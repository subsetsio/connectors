# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-enx2co2e`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type, gas, product, branch, time]
temporal: time
checks:
  - kind: unique
    columns: [type, gas, product, branch, time]
  - kind: not_null
    col: type
  - kind: not_null
    col: gas
  - kind: not_null
    col: product
  - kind: not_null
    col: branch
  - kind: not_null
    col: time
  - kind: row_floor
    min: 19600
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
