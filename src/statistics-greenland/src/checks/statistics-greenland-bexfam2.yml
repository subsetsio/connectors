# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexfam2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type_of_address, number_of_children, district, type_of_family, time]
temporal: time
checks:
  - kind: unique
    columns: [type_of_address, number_of_children, district, type_of_family, time]
  - kind: not_null
    col: type_of_address
  - kind: not_null
    col: number_of_children
  - kind: not_null
    col: district
  - kind: not_null
    col: type_of_family
  - kind: not_null
    col: time
  - kind: row_floor
    min: 16500
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
