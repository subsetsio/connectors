# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-bexfam1x`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [adrtype, alder, area, sex, status, taar]
temporal: taar
checks:
  - kind: unique
    columns: [adrtype, alder, area, sex, status, taar]
  - kind: not_null
    col: adrtype
  - kind: not_null
    col: alder
  - kind: not_null
    col: area
  - kind: not_null
    col: sex
  - kind: not_null
    col: status
  - kind: not_null
    col: taar
  - kind: row_floor
    min: 152833
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
