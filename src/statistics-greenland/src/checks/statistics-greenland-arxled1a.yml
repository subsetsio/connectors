# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-arxled1a`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [aar, koen, dist_k, alderskat, md]
temporal: aar
checks:
  - kind: unique
    columns: [aar, koen, dist_k, alderskat, md]
  - kind: not_null
    col: aar
  - kind: not_null
    col: koen
  - kind: not_null
    col: dist_k
  - kind: not_null
    col: alderskat
  - kind: not_null
    col: md
  - kind: row_floor
    min: 57240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
