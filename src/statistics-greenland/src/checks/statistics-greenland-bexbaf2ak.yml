    columns: [age, type, from, place_of_birth, sex, to, time]
  - kind: not_null
    col: age
  - kind: not_null
    col: type
  - kind: not_null
    col: from
  - kind: not_null
    col: place_of_birth
  - kind: not_null
    col: sex
  - kind: not_null
    col: to
  - kind: not_null
    col: time
  - kind: row_floor
    min: 53463
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
