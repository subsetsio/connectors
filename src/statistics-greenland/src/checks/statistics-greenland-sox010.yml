# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-sox010`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [no_of_children, no_of_adults, municipality, unit, time]
temporal: time
checks:
  - kind: unique
    columns: [no_of_children, no_of_adults, municipality, unit, time]
  - kind: not_null
    col: no_of_children
  - kind: not_null
    col: no_of_adults
  - kind: not_null
    col: municipality
  - kind: not_null
    col: unit
  - kind: not_null
    col: time
  - kind: row_floor
    min: 1620
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
