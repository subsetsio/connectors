# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-ofxukn1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [bosted, inst_type2, born_var, aar, kom]
temporal: aar
checks:
  - kind: unique
    columns: [bosted, inst_type2, born_var, aar, kom]
  - kind: not_null
    col: bosted
  - kind: not_null
    col: inst_type2
  - kind: not_null
    col: born_var
  - kind: not_null
    col: aar
  - kind: not_null
    col: kom
  - kind: row_floor
    min: 7700
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
