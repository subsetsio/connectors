# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-inxpi601`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [income_interval, unit, gender, type_of_income, time]
temporal: time
checks:
  - kind: unique
    columns: [income_interval, unit, gender, type_of_income, time]
  - kind: not_null
    col: income_interval
  - kind: not_null
    col: unit
  - kind: not_null
    col: gender
  - kind: not_null
    col: type_of_income
  - kind: not_null
    col: time
  - kind: row_floor
    min: 4408
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
