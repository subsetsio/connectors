# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-soxpen7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pension_type, family_type, unit, time]
temporal: time
checks:
  - kind: unique
    columns: [pension_type, family_type, unit, time]
  - kind: not_null
    col: pension_type
  - kind: not_null
    col: family_type
  - kind: not_null
    col: unit
  - kind: not_null
    col: time
  - kind: row_floor
    min: 180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
