# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-ofxkrds`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time, sector, function, transaction]
temporal: time
checks:
  - kind: unique
    columns: [time, sector, function, transaction]
  - kind: not_null
    col: time
  - kind: not_null
    col: sector
  - kind: not_null
    col: function
  - kind: not_null
    col: transaction
  - kind: row_floor
    min: 82708
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
