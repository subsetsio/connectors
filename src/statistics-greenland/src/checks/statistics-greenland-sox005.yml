# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-sox005`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, amount_intervals, gender, type, time]
temporal: time
checks:
  - kind: unique
    columns: [age, amount_intervals, gender, type, time]
  - kind: not_null
    col: age
  - kind: not_null
    col: amount_intervals
  - kind: not_null
    col: gender
  - kind: not_null
    col: type
  - kind: not_null
    col: time
  - kind: row_floor
    min: 2524
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
