# compiled by `hardened compile-checks` — post-publish audit of `statistics-greenland-udxisc11o`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [aar, isced, sex, status, startaar]
temporal: startaar
checks:
  - kind: unique
    columns: [aar, isced, sex, status, startaar]
  - kind: not_null
    col: aar
  - kind: not_null
    col: isced
  - kind: not_null
    col: sex
  - kind: not_null
    col: status
  - kind: not_null
    col: startaar
  - kind: row_floor
    min: 2491
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
