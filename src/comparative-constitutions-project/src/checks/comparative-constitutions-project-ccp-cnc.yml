# compiled by `hardened compile-checks` — post-publish audit of `comparative-constitutions-project-ccp-cnc`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cowcode, country, evnttype, wg]
temporal: year
checks:
  - kind: unique
    columns: [year, cowcode, country, evnttype, wg]
  - kind: not_null
    col: year
  - kind: not_null
    col: cowcode
  - kind: not_null
    col: country
  - kind: not_null
    col: evnttype
  - kind: not_null
    col: wg
  - kind: row_floor
    min: 10867
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
