spec_id: comparative-constitutions-project-ccp-cnc
status: active
tests:
  - not_null: cowcode
    reason: every coded country-year row carries a Correlates-of-War country code
    certainty: 90
  - not_null: country
    certainty: 95
  - not_null: year
    reason: the panel is keyed by country-year; year is the time axis
    certainty: 95
  - column_type: {col: year, type: string}
    reason: raw CCP CSV columns are preserved as strings; the transform casts the year key to BIGINT
    certainty: 90
  - column_type: {col: cowcode, type: string}
    reason: raw CCP CSV columns are preserved as strings; the transform casts cowcode to BIGINT
    certainty: 80
  - row_count: {min: 12000}
    reason: CNC v5 ships ~21.7k country-year rows; well above any plausible floor
    certainty: 90
  - between: {col: year, lo: 1789, hi: current_year()}
    reason: CCP coding begins with the first modern constitutions (1789) and cannot exceed the current year
    certainty: 92
  - distinct_count: {col: year, min: 150}
    reason: 1789-present yields ~235 distinct years of constitutional history
    certainty: 85
  - freshness: {col: year, reaches: 2023}
    reason: CCP-CNC v5 is a versioned country-year panel release documented through 2023; a lower max year means the current bulk file regressed or an older release was fetched
    certainty: 90
    points_outward: true
