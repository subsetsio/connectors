spec_id: steamdb-most-played
status: active
tests:
  - row_count: {min: 50, max: 150}
    reason: GetMostPlayedGames is a weekly top-100 style leaderboard
    certainty: 95
  - not_null: rank
  - not_null: appid
  - not_null: peak_in_game
  - not_null: rollup_date
  - column_type: {col: rank, type: integer}
  - column_type: {col: appid, type: integer}
  - column_type: {col: peak_in_game, type: integer}
  - column_type: {col: rollup_date, type: timestamp}
  - unique: rank
    reason: each leaderboard position should appear once in the weekly rollup
    certainty: 95
  - unique: appid
    reason: an app should occupy at most one weekly most-played rank
    certainty: 95
  - between: {col: rank, lo: 1, hi: 150}
  - at_least: {col: peak_in_game, expr: 0}
  - freshness: {col: rollup_date, reaches: today - 120d}
    reason: Valve's weekly most-played chart can lag publication, but should remain within the last few months
    certainty: 75
    points_outward: true
