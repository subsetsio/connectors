spec_id: inei-values-monthly
status: active
tests:
  - not_null: indicador_id
    reason: every monthly row belongs to an indicator
    certainty: 95
  - not_null: anio
    reason: each wide monthly row is one year of an indicator
    certainty: 95
  - column_type: {col: anio, type: integer}
    certainty: 95
  - unique: [indicador_id, anio]
    reason: dato_mensual returns one wide row (12 months) per indicator-year
    certainty: 85
  - between: {col: anio, lo: 1900, hi: 2100}
    certainty: 90
  - freshness: {col: anio, reaches: current_year()}
    reason: monthly SIRTOD national series include observations in the current calendar year
    certainty: 80
    points_outward: true
  - column_type: {col: m1, type: float}
    reason: month columns are numeric (missing months carry a -9999999999.99999 sentinel)
    certainty: 80
  - row_count: {min: 100}
    reason: a minority of indicators publish monthly; still expect at least a few hundred year-rows
    certainty: 55
    severity: warn
