# Current Employment Statistics (CES), Annual Average (labor-force layout).
tests:
  - row_count: {min: 1}
    reason: the fetch fn raises on a 0-row pull, so a materialized raw asset must carry annual-average rows
    certainty: 95
  - not_null: Area Name
    reason: every annual-average observation is scoped to a named area
    certainty: 85
  - between: {col: Year, lo: 1990, hi: current_year()}
    reason: the CES annual-average series runs from 1990 onward; no row should post-date the current year
    certainty: 75
    severity: warn
