status: active
# Current Employment Statistics (CES) - nonfarm payroll by industry.
tests:
  - row_count: {min: 1}
    reason: the fetch fn raises on a 0-row pull, so a materialized raw asset must carry CES rows
    certainty: 95
  - not_null: Area Name
    reason: every CES observation is scoped to a named area
    certainty: 85
  - not_null: Series Code
    reason: the CES series code identifies the industry/aggregate and is always populated
    certainty: 85
    severity: warn
  - between: {col: Year, lo: 1990, hi: current_year()}
    reason: California CES industry series run from 1990 onward; no row should post-date the current year
    certainty: 85
    severity: warn
