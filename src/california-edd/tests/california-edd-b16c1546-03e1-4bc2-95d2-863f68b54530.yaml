# Unemployment Rate by Age Groups.
tests:
  - row_count: {min: 1}
    reason: the fetch fn raises on a 0-row pull, so a materialized raw asset must carry rows
    certainty: 95
  - not_null: Year
    reason: every observation carries its calendar year
    certainty: 90
  - between: {col: Year, lo: 1976, hi: current_year()}
    reason: the age-group unemployment series begins in 1976; no row should post-date the current year
    certainty: 80
    severity: warn
  - median_between: {col: Age 16-19, lo: 0, hi: 50}
    reason: youth (16-19) unemployment runs high but stays a percentage; a median outside 0-50 means a unit/parse error
    certainty: 55
    severity: warn
