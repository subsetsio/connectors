# Local Area Unemployment Statistics (LAUS), Annual Average.
tests:
  - row_count: {min: 1}
    reason: the fetch fn raises on a 0-row pull, so a materialized raw asset must carry annual-average rows
    certainty: 95
  - not_null: Area Name
    reason: every LAUS annual-average observation is scoped to a named area
    certainty: 90
  - between: {col: Year, lo: 1976, hi: current_year()}
    reason: LAUS annual averages for CA areas begin in 1976; no row should post-date the current year
    certainty: 85
    severity: warn
  - median_between: {col: Unemployment Rate, lo: 0, hi: 30}
    reason: an unemployment rate is a percentage in low double digits; a median outside 0-30 means a unit/parse error
    certainty: 65
    severity: warn
