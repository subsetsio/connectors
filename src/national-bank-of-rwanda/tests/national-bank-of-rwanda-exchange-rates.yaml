spec_id: national-bank-of-rwanda-exchange-rates
status: active
tests:
  - not_null: currency_name
    reason: every record carries its currency code
    certainty: 99
  - not_null: post_date
    reason: every daily quote is dated
    certainty: 99
  - not_null: average_rate
    reason: the average (mid) reference rate is the primary published value
    certainty: 95
  - matches: {col: post_date, pattern: "^[0-9]{2}-[A-Za-z]{3}-[0-9]{2}$"}
    reason: API serves post_date as DD-Mon-YY (e.g. 02-Jan-12)
    certainty: 90
  - matches: {col: average_rate, pattern: "^[0-9][0-9.,]*$"}
    reason: rates are positive decimal strings, sometimes with thousands commas
    certainty: 85
  - unique: [currency_name, post_date]
    reason: one quote per currency per day; a dup means the per-currency window was double-counted
    certainty: 90
  - distinct_count: {col: currency_name, min: 30, max: 80}
    reason: BNR quotes ~43 currencies; far fewer means the currency enumeration degraded
    certainty: 80
  - row_count: {min: 30000}
    reason: ~43 currencies x thousands of trading days since ~2012; a tiny corpus means truncation
    certainty: 75
