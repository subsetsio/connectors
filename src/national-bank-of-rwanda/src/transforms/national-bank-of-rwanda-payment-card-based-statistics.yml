key: [sheet_name, cell_ref]
temporal: source_modified_date
sort: [source_modified_date, sheet_name, row_number, column_number]
columns:
  - name: source_entity_id
    type: VARCHAR
    description: Stable collect entity id for this BNR statistical workbook.
  - name: source_endpoint
    type: VARCHAR
    description: BNR CMS endpoint where the workbook record was resolved.
  - name: source_url
    type: VARCHAR
    description: Resolved URL of the downloaded Excel workbook.
  - name: source_file
    type: VARCHAR
    description: File path published by the BNR CMS record.
  - name: release_name
    type: VARCHAR
    description: Source release title for the workbook.
  - name: source_modified_date
    type: DATE
    description: Date the BNR CMS record was last modified.
  - name: sheet_name
    type: VARCHAR
    description: Excel worksheet name.
  - name: row_number
    type: INTEGER
    description: One-based Excel row number of the non-empty cell.
  - name: column_number
    type: INTEGER
    description: One-based Excel column number of the non-empty cell.
  - name: cell_ref
    type: VARCHAR
    description: Excel A1-style cell reference.
  - name: cell_value
    type: VARCHAR
    description: Cell value rendered as text for downstream workbook-specific parsing.
