spec_id: arcep-qualite-des-reseaux-en-fibre-optique--historique-des-indicateurs-de-qualite-ftth-par-maison-mere
status: active
tests:
  - row_count: {min: 1}
    reason: FttH quality per parent operator per month; a collapse to near-zero means the CSV family stopped enumerating
    certainty: 80
  - not_null: date
    reason: date is a key/identifier column present on every source row
    certainty: 85
  - column_type: {col: date, type: string}
    reason: raw is preserved verbatim as strings (decimal commas / leading zeros / NA sentinels)
    certainty: 90
  - not_null: maison_mere
    reason: maison_mere is a key/identifier column present on every source row
    certainty: 85
  - column_type: {col: maison_mere, type: string}
    reason: raw is preserved verbatim as strings (decimal commas / leading zeros / NA sentinels)
    certainty: 90
  - not_null: _resource_title
    reason: provenance column stamped on every row by the fetch fn
    certainty: 99
  - not_null: _period
    reason: this family's resources are date/quarter partitioned, so a period is derivable from the title
    certainty: 75
  - freshness: {col: date, reaches: today - 365d}
    reason: ARCEP updates the parent-operator FttH quality history with recent monthly observations; the latest observation should stay within about one year
    certainty: 75
