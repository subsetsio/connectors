spec_id: arcep-tableau-bord-du-new-deal-mobile--liste-sites-operateurs-mobiles
status: active
coverage:
  frozen: true
  reason: This accepted family is a historical 2018-T2 through 2018-T3 New Deal Mobile site inventory extract; newer dashboard resources are separate schema families.
tests:
  - row_count: {min: 1000}
    reason: one row per mobile site per operator; a collapse to near-zero means the CSV family stopped enumerating
    certainty: 80
  - nullable: {col: code_op, max_null_frac: 0.55}
    reason: the two historical source vintages alternate between code_op-style columns; at least about half the rows should still expose code_op
    certainty: 75
  - column_type: {col: code_op, type: string}
    reason: raw is preserved verbatim as strings (decimal commas / leading zeros / NA sentinels)
    certainty: 90
  - not_null: _resource_title
    reason: provenance column stamped on every row by the fetch fn
    certainty: 99
