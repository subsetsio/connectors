spec_id: arcep-ressources-en-numerotation-telephonique--majporta-liste-des-prefixes-de-routage
status: active
tests:
  - row_count: {min: 50}
    reason: one row per routing prefix; a collapse to near-zero means the CSV family stopped enumerating
    certainty: 80
  - not_null: ezabpqm
    reason: ezabpqm is a key/identifier column present on every source row
    certainty: 85
  - column_type: {col: ezabpqm, type: string}
    reason: raw is preserved verbatim as strings (decimal commas / leading zeros / NA sentinels)
    certainty: 90
  - not_null: _resource_title
    reason: provenance column stamped on every row by the fetch fn
    certainty: 99
