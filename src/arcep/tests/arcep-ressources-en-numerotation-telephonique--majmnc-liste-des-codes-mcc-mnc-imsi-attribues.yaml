spec_id: arcep-ressources-en-numerotation-telephonique--majmnc-liste-des-codes-mcc-mnc-imsi-attribues
status: active
tests:
  - row_count: {min: 50}
    reason: one row per allocated MCC-MNC (IMSI) code; a collapse to near-zero means the CSV family stopped enumerating
    certainty: 80
  - not_null: mcc_mnc
    reason: mcc_mnc is a key/identifier column present on every source row
    certainty: 85
  - column_type: {col: mcc_mnc, type: string}
    reason: raw is preserved verbatim as strings (decimal commas / leading zeros / NA sentinels)
    certainty: 90
  - not_null: _resource_title
    reason: provenance column stamped on every row by the fetch fn
    certainty: 99
