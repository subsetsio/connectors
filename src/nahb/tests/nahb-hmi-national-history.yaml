spec_id: nahb-hmi-national-history
status: active
tests:
  - freshness: {col: date, reaches: today - 70d}
  - not_null: date
    reason: every parsed row is a (year, month) cell; a null date means the year/month grid parse drifted
    certainty: 97
  - not_null: hmi
    reason: rows are only emitted for non-null cells, so the value column is always present
    certainty: 97
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: date is built as YYYY-MM-01 from the workbook year row and month column
    certainty: 95
  - between: {col: hmi, lo: 0, hi: 100}
    reason: the HMI composite is a diffusion index bounded 0-100
    certainty: 95
  - row_count: {min: 400}
    reason: monthly history runs from 1985 to present (>40 years x 12 months ~= 490 rows); far fewer means a truncated parse
    certainty: 90
  - unique: [date]
    reason: one national composite value per month
    certainty: 90
