spec_id: nahb-hmi-regional-history
status: active
tests:
  - freshness: {col: date, reaches: today - 70d}
  - not_null: date
    reason: every row is a (year, month) cell within a regional year-block
    certainty: 95
  - not_null: region
    reason: region is the col0 label of each data row
    certainty: 97
  - not_null: hmi
    reason: rows are emitted only for non-null cells
    certainty: 97
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: date is built as YYYY-MM-01 from the forward-filled year row and month row
    certainty: 92
  - enum: {col: region, values: [Northeast, Midwest, South, West]}
    reason: regional HMI is reported for the four Census regions
    certainty: 95
  - distinct_count: {col: region, min: 4}
    reason: all four regions must be present; fewer means a region row was dropped
    certainty: 92
  - between: {col: hmi, lo: 0, hi: 100}
    reason: regional HMI is a diffusion index bounded 0-100
    certainty: 95
  - row_count: {min: 800}
    reason: four regions x ~250 months (from Dec 2004) ~= 1000
    certainty: 85
  - unique: [date, region]
    reason: one regional value per region per month
    certainty: 88
