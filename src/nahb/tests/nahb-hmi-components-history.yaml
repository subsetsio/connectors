spec_id: nahb-hmi-components-history
status: active
tests:
  - not_null: date
    reason: every row is a (year, month) cell of a component block
    certainty: 97
  - not_null: component
    reason: component is set from the block label before any value rows are read
    certainty: 95
  - not_null: value
    reason: rows are emitted only for non-null cells
    certainty: 97
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: date is built as YYYY-MM-01
    certainty: 95
  - enum: {col: component, values: [present_sales, future_sales, traffic]}
    reason: Table 3 has exactly three component blocks (present sales, next six months, traffic)
    certainty: 95
  - distinct_count: {col: component, min: 3}
    reason: all three component series must be parsed; fewer means a block was missed
    certainty: 90
  - between: {col: value, lo: 0, hi: 100}
    reason: each HMI component is a diffusion index bounded 0-100
    certainty: 95
  - row_count: {min: 1000}
    reason: three components x ~490 monthly rows ~= 1470
    certainty: 88
  - unique: [date, component]
    reason: one value per component per month
    certainty: 90
