# compiled by `hardened compile-checks` — post-publish audit of `kraftfahrt-bundesamt-vd-g-terverkehrsflotte`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [monat_text, monat, jahr, region_lab]
checks:
  - kind: unique
    columns: [monat_text, monat, jahr, region_lab]
  - kind: not_null
    col: monat_text
  - kind: not_null
    col: monat
  - kind: not_null
    col: jahr
  - kind: not_null
    col: region_lab
  - kind: row_floor
    min: 405
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
