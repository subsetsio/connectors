spec_id: department-of-census-and-statistics-ccpi
status: active
tests:
  - not_null: date
  - not_null: category_code
  - not_null: measure
  - not_null: value
  - enum: {col: measure, values: ["index", "mom_pct", "yoy_pct"]}
    reason: "CPI dashboard exposes index value plus month-on-month and year-on-year change"
    certainty: 90
  - column_type: {col: value, type: float}
    certainty: 90
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: "date is normalised to ISO YYYY-MM-DD in the fetch fn"
    certainty: 95
  - row_count: {min: 1}
    certainty: 95
