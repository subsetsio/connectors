spec_id: department-of-census-and-statistics-iip
status: active
tests:
  - freshness: {col: date, reaches: today - 4y}
    reason: "DCS statistical series are published with substantial annual or periodic lag; the latest observation should remain within four years."
    certainty: 80
  - not_null: date
  - not_null: category_code
  - not_null: value
  - column_type: {col: value, type: float}
    certainty: 90
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: "date is normalised to ISO YYYY-MM-DD in the fetch fn"
    certainty: 95
  - row_count: {min: 1}
    certainty: 95
