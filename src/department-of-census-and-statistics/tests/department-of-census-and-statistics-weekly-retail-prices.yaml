spec_id: department-of-census-and-statistics-weekly-retail-prices
status: active
tests:
  - freshness: {col: date, reaches: today - 120d}
    reason: "weekly retail prices should include observations from the last four months."
    certainty: 85
  - not_null: week_label
  - not_null: product
  - not_null: price_lkr
  - column_type: {col: price_lkr, type: float}
    certainty: 90
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: "date is normalised to ISO YYYY-MM-DD in the fetch fn"
    certainty: 95
  - row_count: {min: 1}
    certainty: 95
