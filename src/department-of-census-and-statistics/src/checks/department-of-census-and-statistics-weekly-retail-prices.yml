# compiled by `hardened compile-checks` — post-publish audit of `department-of-census-and-statistics-weekly-retail-prices`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, week_label, product_name, product, category]
temporal: date
checks:
  - kind: unique
    columns: [date, week_label, product_name, product, category]
  - kind: not_null
    col: date
  - kind: not_null
    col: week_label
  - kind: not_null
    col: product_name
  - kind: not_null
    col: product
  - kind: not_null
    col: category
  - kind: row_floor
    min: 24883
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
