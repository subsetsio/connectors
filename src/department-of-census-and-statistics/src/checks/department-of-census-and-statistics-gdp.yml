# compiled by `hardened compile-checks` — post-publish audit of `department-of-census-and-statistics-gdp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, period, frequency, price_basis, measure, sector_code]
temporal: date
checks:
  - kind: unique
    columns: [date, period, frequency, price_basis, measure, sector_code]
  - kind: not_null
    col: date
  - kind: not_null
    col: period
  - kind: not_null
    col: frequency
  - kind: not_null
    col: price_basis
  - kind: not_null
    col: measure
  - kind: not_null
    col: sector_code
  - kind: row_floor
    min: 7410
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
