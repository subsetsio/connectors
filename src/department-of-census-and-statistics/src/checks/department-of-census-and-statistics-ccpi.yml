# compiled by `hardened compile-checks` — post-publish audit of `department-of-census-and-statistics-ccpi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, period, category_code, category_title, measure]
temporal: date
checks:
  - kind: unique
    columns: [date, period, category_code, category_title, measure]
  - kind: not_null
    col: date
  - kind: not_null
    col: period
  - kind: not_null
    col: category_code
  - kind: not_null
    col: category_title
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 434
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
