spec_id: journey-north-sightings
status: active
tests:
  - not_null: sighting_id
    reason: every Journey North observation carries a stable record id.
    certainty: 95
  - not_null: map_slug
    reason: each batch is tagged with the map layer it was fetched from.
    certainty: 99
  - not_null: date
    reason: every sighting has a report date (MM/DD/YYYY) in the source.
    certainty: 90
  - column_type: {col: year, type: integer}
    certainty: 95
  - between: {col: year, lo: 1994, hi: current_year()}
    reason: Journey North began in 1994; queries span the founding year to the present calendar year.
    certainty: 90
  - column_type: {col: latitude, type: float}
    certainty: 90
  - column_type: {col: longitude, type: float}
    certainty: 90
  - between: {col: latitude, lo: 0, hi: 85}
    reason: sightings are Northern-Hemisphere (North/Central America) phenology observations.
    certainty: 80
    severity: warn
    points_outward: true
  - between: {col: longitude, lo: -180, hi: -30}
    reason: western-hemisphere longitudes covering North/Central America and adjacent waters.
    certainty: 80
    severity: warn
    points_outward: true
  - distinct_count: {col: map_slug, min: 20}
    reason: the raw asset unions ~34 map layers across years; far fewer means slug enumeration or fetching silently broke.
    certainty: 90
  - unique: [map_slug, sighting_id]
    reason: an observation should appear once per map layer; dupes within a layer mean a batch was written twice.
    certainty: 70
    severity: warn
