spec_id: cnam-medecins-optam-infra-annuelle
status: active
tests:
  - not_null: annee
    reason: the in-year CNAM access-to-care series is stamped with its observation year
    certainty: 95
  - not_null: region
    reason: every row carries a territorial code at national, regional, or departmental level
    certainty: 90
  - row_count: {min: 2856}
    reason: ODS reported 3360 records at authoring time; a full bulk export should return at least about 85% of that
    certainty: 85
  - column_type: {col: taux_adhesion_integer, type: float}
    reason: OPTAM adhesion rates should remain numeric in the ODS export
    certainty: 75
    severity: warn
