spec_id: cnam-couverture-sas-infra-annuelle
status: active
tests:
  - not_null: annee
    reason: the in-year CNAM access-to-care series is stamped with its observation year
    certainty: 95
  - not_null: region
    reason: every row carries a territorial code at national, regional, or departmental level
    certainty: 90
  - row_count: {min: 102}
    reason: ODS reported 120 records at authoring time; a full bulk export should return at least about 85% of that
    certainty: 85
  - column_type: {col: taux_population_couverte, type: float}
    reason: population coverage rates should remain numeric in the ODS export
    certainty: 80
    severity: warn
  - freshness: {col: date, reaches: today - 2y}
    reason: current-year snapshot refreshed in place; date carries the end of the reference period, so it should advance every year and 2y of slack marks a dead refresh
    certainty: 85
