spec_id: cnam-depenses
status: active
tests:
  - not_null: annee
    reason: every row of a CNAM annual series is stamped with its year; a null year means the export lost the time dimension
    certainty: 95
  - not_null: top
    reason: this national series has no territory dimension; the pathology code is what identifies a row, so a null top means the export lost its subject dimension
    certainty: 95
  - not_null: dep_niv_2
    reason: the spending post completes the row identity alongside top; a null post means the spending hierarchy was dropped
    certainty: 90
  - row_count: {min: 18972}
    reason: ODS reported 22320 records at collect time; a full bulk export should return at least ~85% of that, so a large shortfall means truncation or a partial export
    certainty: 85
  - column_type: {col: montant, type: integer}
    reason: the numeric measure column montant should remain numeric; a string type means the ODS export changed its field typing
    certainty: 70
    severity: warn
  - freshness: {col: annee, reaches: today - 4y}
    reason: annual series stamped at the observation year's Jan 1; CNAM publishes a year roughly 18 months after it closes, so one missed release cycle (4y of slack) is the point at which the export has gone stale
    certainty: 85
