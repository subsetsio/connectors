spec_id: cnam-medgen-zones-sous-dotees-annuelle
status: active
tests:
  - not_null: annee
    reason: every row of a CNAM annual series is stamped with its year; a null year means the export lost the time dimension
    certainty: 95
  - not_null: region
    reason: every row carries a territorial code (national/region/departement); a null region means a dropped geography column
    certainty: 90
  - row_count: {min: 612}
    reason: ODS reported 720 records at collect time; a full bulk export should return at least ~85% of that, so a large shortfall means truncation or a partial export
    certainty: 85
  - column_type: {col: effectif_medecin_install_zsd, type: integer}
    reason: the numeric measure column effectif_medecin_install_zsd should remain numeric; a string type means the ODS export changed its field typing
    certainty: 70
    severity: warn
  - freshness: {col: annee, reaches: today - 3y}
    reason: annual series whose annee is a 4-digit year string; a new year appears each release, so 3y of slack blocks only after a whole publication cycle is missed
    certainty: 85
