spec_id: cnam-referentiel-departements
status: active
tests:
  - not_null: dep_code
    reason: each department reference row should carry a department code
    certainty: 95
  - not_null: dep_name
    reason: each department reference row should carry a department label
    certainty: 95
  - row_count: {min: 93}
    reason: ODS reported 110 records at authoring time; a full bulk export should return at least about 85% of that
    certainty: 85
  - column_type: {col: tri, type: integer}
    reason: the display sort field is numeric in the ODS reference metadata
    certainty: 80
    severity: warn
