spec_id: cnam-demographie-effectifs-et-les-densites
status: active
tests:
  - not_null: annee
    reason: every row of a CNAM annual series is stamped with its year; a null year means the export lost the time dimension
    certainty: 95
  - not_null: region
    reason: every row carries a territorial code (national/region/departement); a null region means a dropped geography column
    certainty: 90
  - row_count: {min: 2938416}
    reason: ODS reported 3456960 records at collect time; a full bulk export should return at least ~85% of that, so a large shortfall means truncation or a partial export
    certainty: 85
  - column_type: {col: effectif, type: integer}
    reason: the numeric measure column effectif should remain numeric; a string type means the ODS export changed its field typing
    certainty: 70
    severity: warn
  - freshness: {col: annee, reaches: today - 4y}
    reason: annual series stamped at the observation year's Jan 1; CNAM publishes a year roughly 18 months after it closes, so one missed release cycle (4y of slack) is the point at which the export has gone stale
    certainty: 85
