# compiled by `hardened compile-checks` — post-publish audit of `cnam-effectifs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, pathology_code, age_class_code, sex_code, region_code, department_code]
temporal: year
checks:
  - kind: unique
    columns: [year, pathology_code, age_class_code, sex_code, region_code, department_code]
  - kind: not_null
    col: year
  - kind: not_null
    col: pathology_code
  - kind: not_null
    col: age_class_code
  - kind: not_null
    col: sex_code
  - kind: not_null
    col: region_code
  - kind: not_null
    col: department_code
  - kind: row_floor
    min: 2898000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
