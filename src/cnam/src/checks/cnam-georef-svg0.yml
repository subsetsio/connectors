# compiled by `hardened compile-checks` — post-publish audit of `cnam-georef-svg0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [map_panel, territory_code, territory_name, fill_id, label_anchor_y]
checks:
  - kind: unique
    columns: [map_panel, territory_code, territory_name, fill_id, label_anchor_y]
  - kind: not_null
    col: map_panel
  - kind: not_null
    col: territory_code
  - kind: not_null
    col: territory_name
  - kind: not_null
    col: fill_id
  - kind: not_null
    col: label_anchor_y
  - kind: row_floor
    min: 61
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
