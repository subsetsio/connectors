# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `cnam-comorbidites`. Regenerate after model-verify.
# caution: One row per (year, index pathology `top`, comorbid pathology). `ntop` repeats the index pathology's patient count on every comorbidity row — summing `ncomorb` or `ntop` across rows double-counts patients.
# caution: `top` and the comorbidity columns span several levels of the pathology hierarchy (patho_niv1/2/3); rows at different levels overlap, so never sum across levels.
key: [annee, top, libelle_comorbidite]
temporal: annee
sort: [annee, top, libelle_comorbidite]
columns:
  - name: annee
    type: DATE
  - name: patho_niv1
    type: VARCHAR
  - name: patho_niv2
    type: VARCHAR
  - name: patho_niv3
    type: VARCHAR
  - name: top
    type: VARCHAR
  - name: comorbidite
    type: VARCHAR
  - name: libelle_comorbidite
    type: VARCHAR
  - name: region
    type: BIGINT
  - name: dept
    type: BIGINT
  - name: ncomorb
    type: BIGINT
  - name: ntop
    type: BIGINT
  - name: proportion_comorb
    type: DOUBLE
  - name: patho_niv1_comorb
    type: VARCHAR
  - name: patho_niv2_comorb
    type: VARCHAR
  - name: patho_niv3_comorb
    type: VARCHAR
  - name: niveau_prioritaire
    type: VARCHAR
