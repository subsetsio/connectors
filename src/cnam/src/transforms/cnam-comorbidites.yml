key: [year, pathology_code, comorbidity]
temporal: year
sort: [year, pathology_code, comorbidity]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: pathology_level_1
    type: VARCHAR
    description: "Top level of the CNAM pathology hierarchy (e.g. `Cancers`), in French."
  - name: pathology_level_2
    type: VARCHAR
    description: "Second level of the pathology hierarchy, in French."
  - name: pathology_level_3
    type: VARCHAR
    description: "Third (finest) level of the pathology hierarchy, in French."
  - name: pathology_code
    type: VARCHAR
    description: "Pathology code (`top`) of the CNAM cartographie, e.g. `CAN_BPU_ACT`. Joins `cnam-referentiel-pathologies`.`pathology_code`."
  - name: comorbidity_code
    type: VARCHAR
    description: "Pathology code of the associated comorbidity, drawn from the same `top` coding system."
  - name: comorbidity
    type: VARCHAR
    description: "Name of the associated comorbidity, in French."
  - name: comorbidity_level_1
    type: VARCHAR
    description: "Top level of the pathology hierarchy for the comorbidity."
  - name: comorbidity_level_2
    type: VARCHAR
    description: "Second level of the pathology hierarchy for the comorbidity."
  - name: comorbidity_level_3
    type: VARCHAR
    description: "Third level of the pathology hierarchy for the comorbidity."
  - name: patients_with_pathology
    type: BIGINT
    description: "Patients with the index pathology nationally. Repeated identically on every comorbidity row of that pathology."
  - name: patients_with_comorbidity
    type: BIGINT
    description: "Patients with the index pathology who also have the comorbidity."
  - name: comorbidity_share
    type: DOUBLE
    description: "patients_with_comorbidity / patients_with_pathology, as a fraction between 0 and 1."
  - name: priority_levels
    type: VARCHAR
    description: "Comma-separated CNAM priority levels the pathology belongs to (`1`, `2`, `3`, or combinations such as `2,3`)."
