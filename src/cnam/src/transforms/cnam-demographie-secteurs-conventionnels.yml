key: [year, profession, region_code, department_code, sector_code]
temporal: year
sort: [year, profession, region_code, department_code, sector_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: sector_code
    type: VARCHAR
    description: "Fee-agreement (secteur conventionnel) code, `1` to `5`."
  - name: sector
    type: VARCHAR
    description: "Fee agreement, in French (`conventionnés de secteur 1`, `secteur 2`, `non conventionnés`, ...). Sector 1 practitioners charge the regulated tariff; sector 2 may bill above it."
  - name: headcount
    type: BIGINT
    description: "Number of practitioners under this fee agreement."
