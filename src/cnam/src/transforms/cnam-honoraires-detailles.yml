key: [year, profession, region_code, department_code, fee_level_1_code, fee_level_2_code, fee_level_3_code]
temporal: year
sort: [year, profession, region_code, department_code, fee_level_1_code, fee_level_2_code, fee_level_3_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: fee_level_1_code
    type: BIGINT
    description: "Code of the top fee-type level, `1` to `6`."
  - name: fee_level_1
    type: VARCHAR
    description: "Top fee-type level, in French (`Actes`, `Dépassements`, `Rémunérations forfaitaires`, ...)."
  - name: fee_level_2_code
    type: BIGINT
    description: "Code of the second fee-type level; `99` on rows that stop at level 1."
  - name: fee_level_2
    type: VARCHAR
    description: "Second fee-type level, in French (`Actes cliniques`, `Actes techniques`, `ROSP`, ...); null on rows that stop at level 1."
  - name: fee_level_3_code
    type: BIGINT
    description: "Code of the third fee-type level; `99` on rows that stop at level 1 or 2."
  - name: fee_level_3
    type: VARCHAR
    description: "Third fee-type level, in French (`Consultations`, `Visites`, `Actes techniques médicaux`, ...); null on rows that stop at level 1 or 2."
  - name: fees_eur
    type: DOUBLE
    description: "Total fees billed for this fee type by the practitioners of the cell, in euros."
  - name: mean_fees_eur
    type: DOUBLE
    description: "Mean fees for this fee type per practitioner, in euros."
