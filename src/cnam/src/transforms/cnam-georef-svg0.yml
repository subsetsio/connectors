key: [map_panel, territory_code, territory_name, fill_id, label_anchor_y]
sort: [map_panel, territory_code, territory_name, fill_id, label_anchor_y]
columns:
  - name: map_panel
    type: VARCHAR
    description: "Map panel the shape belongs to (`dep_fxx_text` metropolitan departments, `reg_guf_text` Guyane regions, ...). The same territory appears once per panel it is drawn on."
  - name: level
    type: VARCHAR
    description: "Territory level of the shape: `dep` (department) or `reg` (region)."
  - name: map_key
    type: VARCHAR
    description: "Geographic grouping of the panel (`fxx` metropolitan France, `idf` Île-de-France inset, `reu`, `guf`, `myt`, `glp`, `mtq`)."
  - name: territory_code
    type: VARCHAR
    description: "Department or region code of the shape, matching the `region_code` / `department_code` used by the indicator tables."
  - name: fill_id
    type: VARCHAR
    description: "Identifier the portal uses to colour the shape; equal to `territory_code` in this export."
  - name: territory_name
    type: VARCHAR
    description: "Territory name, in French."
  - name: svg_path
    type: VARCHAR
    description: "SVG path `d` attribute drawing the territory outline, in the panel's local drawing space."
  - name: label_anchor_x
    type: VARCHAR
    description: "X coordinate for the territory label, in the panel's local drawing space (not a projected coordinate)."
  - name: label_anchor_y
    type: VARCHAR
    description: "Y coordinate for the territory label, in the panel's local drawing space (not a projected coordinate)."
