key: [region_code, department_code]
temporal: period_end
sort: [period_end, region_code, department_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: period_end
    type: DATE
    description: "Last day of the reference period this snapshot covers."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: medical_assistant_contracts
    type: BIGINT
    description: "Physicians who signed a contract for financial help employing a medical assistant (assistant médical), cumulative to `period_end`."
  - name: adhesion_rate_pct
    type: DOUBLE
    description: "Share of eligible physicians who signed such a contract, in percent (0-100)."
