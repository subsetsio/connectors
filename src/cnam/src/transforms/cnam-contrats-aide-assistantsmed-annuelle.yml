key: [year, region_code, department_code]
temporal: year
sort: [year, region_code, department_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: medical_assistant_contracts
    type: BIGINT
    description: "Physicians who signed a contract for financial help employing a medical assistant (assistant médical), cumulative at year end."
  - name: adhesion_rate_pct
    type: DOUBLE
    description: "Share of eligible physicians who signed such a contract, in percent (0-100). The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
