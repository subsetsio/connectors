key: [department_code]
sort: [department_code]
columns:
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica. The code the indicator tables join on."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French."
  - name: department_type
    type: VARCHAR
    description: "`département` or `collectivité d'outre-mer` (overseas collectivity)."
  - name: region_code
    type: VARCHAR
    description: "Code of the region the department belongs to. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Name of the region the department belongs to, in French."
