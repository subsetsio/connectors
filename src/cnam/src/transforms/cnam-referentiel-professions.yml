key: [profession]
sort: [profession]
columns:
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: portal_menu
    type: VARCHAR
    description: "Portal menu the profession is listed under: `médecins` or `autres`."
  - name: in_general_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the portal's general view."
  - name: in_prescriptions_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the prescriptions view."
  - name: in_profession_territory_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the profession-by-territory view."
  - name: in_fees_acts_level_2_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the level-2 fees breakdown for medical acts."
  - name: in_fees_payments_level_2_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the level-2 fees breakdown for flat-rate payments."
  - name: in_fees_clinical_acts_level_3_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the level-3 fees breakdown for clinical acts."
  - name: in_fees_technical_acts_level_3_view
    type: VARCHAR
    description: "`oui`/`non`: the profession appears in the level-3 fees breakdown for technical acts."
