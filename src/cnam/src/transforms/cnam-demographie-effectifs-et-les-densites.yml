key: [year, profession, region_code, department_code, age_class_code, sex]
temporal: year
sort: [year, profession, region_code, department_code, age_class_code, sex]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: age_class_code
    type: VARCHAR
    description: "Age-band code (`00-24`, `35-39`, `70 et +`, `inconnu` = unknown, and an all-ages aggregate)."
  - name: age_class
    type: VARCHAR
    description: "Age band, in French."
  - name: sex
    type: VARCHAR
    description: "Sex: `femmes`, `hommes`, `sexe inconnu` (unknown), or the `tout sexe` aggregate."
  - name: headcount
    type: BIGINT
    description: "Number of self-employed (libéral) practitioners."
  - name: density
    type: DOUBLE
    description: "Practitioners per 100,000 inhabitants of the territory."
