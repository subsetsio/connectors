key: [year, pathology_code, age_class_code, sex_code, region_code, department_code]
temporal: year
sort: [year, pathology_code, age_class_code, sex_code, region_code, department_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: pathology_level_1
    type: VARCHAR
    description: "Top level of the CNAM pathology hierarchy (e.g. `Cancers`), in French."
  - name: pathology_level_2
    type: VARCHAR
    description: "Second level of the pathology hierarchy, in French."
  - name: pathology_level_3
    type: VARCHAR
    description: "Third (finest) level of the pathology hierarchy, in French."
  - name: pathology_code
    type: VARCHAR
    description: "Pathology code (`top`) of the CNAM cartographie, e.g. `CAN_BPU_ACT`. Joins `cnam-referentiel-pathologies`.`pathology_code`."
  - name: age_class_code
    type: VARCHAR
    description: "Five-year age-band code (`00-04` ... `95et+`); `tsage` is the all-ages aggregate."
  - name: age_class
    type: VARCHAR
    description: "Age band, in French; `tous âges` is the all-ages aggregate."
  - name: sex_code
    type: BIGINT
    description: "Sex code: `1` men, `2` women, `9` both sexes (aggregate)."
  - name: sex
    type: VARCHAR
    description: "Sex, in French (`hommes`, `femmes`, `tous sexes`)."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded; `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded; `999` is the all-departments aggregate. Joins `cnam-referentiel-departements`.`department_code`."
  - name: patients
    type: BIGINT
    description: "Patients with the pathology in this cell, rounded by the source to the nearest ten."
  - name: reference_population
    type: BIGINT
    description: "Insured reference population of the cell — the denominator of `prevalence_pct`."
  - name: prevalence_pct
    type: DOUBLE
    description: "patients / reference_population, in percent (0-100)."
  - name: priority_levels
    type: VARCHAR
    description: "Comma-separated CNAM priority levels the pathology belongs to (`1`, `2`, `3`, or combinations such as `2,3`)."
