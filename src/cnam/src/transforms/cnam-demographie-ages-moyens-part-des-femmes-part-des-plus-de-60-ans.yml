key: [year, profession]
temporal: year
sort: [year, profession]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: share_women
    type: DOUBLE
    description: "Share of the profession who are women, as a fraction between 0 and 1."
  - name: share_men
    type: DOUBLE
    description: "Share of the profession who are men, as a fraction between 0 and 1."
  - name: share_aged_60_and_over
    type: DOUBLE
    description: "Share of the profession aged 60 or over, as a fraction between 0 and 1."
  - name: share_aged_under_60
    type: DOUBLE
    description: "Share of the profession aged under 60, as a fraction between 0 and 1."
  - name: mean_age
    type: BIGINT
    description: "Mean age of the profession, in whole years."
  - name: mean_age_women
    type: BIGINT
    description: "Mean age of the women in the profession, in whole years."
  - name: mean_age_men
    type: BIGINT
    description: "Mean age of the men in the profession, in whole years."
