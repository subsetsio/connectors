key: [year, profession, region_code, department_code]
temporal: year
sort: [year, profession, region_code, department_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: fees_total_eur
    type: BIGINT
    description: "Total fees billed by the practitioners of this cell, extra billing included, in euros."
  - name: fees_mean_eur
    type: BIGINT
    description: "Mean total fees per practitioner, extra billing included, in euros."
  - name: fees_excl_extra_billing_total_eur
    type: BIGINT
    description: "Total fees billed at the regulated tariff, excluding extra billing (dépassements), in euros."
  - name: fees_excl_extra_billing_mean_eur
    type: BIGINT
    description: "Mean fees per practitioner at the regulated tariff, excluding extra billing, in euros."
  - name: extra_billing_total_eur
    type: BIGINT
    description: "Total extra billing (dépassements d'honoraires) charged above the regulated tariff, in euros."
  - name: extra_billing_mean_eur
    type: BIGINT
    description: "Mean extra billing per practitioner, in euros."
  - name: extra_billing_rate_sector_2_pct
    type: DOUBLE
    description: "Extra billing as a percentage of regulated-tariff fees, for sector-2 practitioners (0-100). The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
  - name: extra_billing_rate_sector_2_optam_pct
    type: DOUBLE
    description: "Same rate, restricted to sector-2 practitioners who joined the OPTAM fee-moderation agreement (0-100). The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
  - name: extra_billing_rate_sector_2_non_optam_pct
    type: DOUBLE
    description: "Same rate, restricted to sector-2 practitioners outside OPTAM (0-100). The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
