key: [year, profession, region_code, department_code, prescription_post_code]
temporal: year
sort: [year, profession, region_code, department_code, prescription_post_code]
columns:
  - name: year
    type: BIGINT
    description: "Observation year. The source stamps it as a January 1 date; only the year is meaningful."
  - name: profession
    type: VARCHAR
    description: "Healthcare profession or medical specialty, in French. Labels beginning `Ensemble des` are aggregates over several professions."
  - name: region_code
    type: VARCHAR
    description: "CNAM region code, zero-padded (e.g. `11` Île-de-France); `99` is the national aggregate. Joins `cnam-referentiel-regions`.`region_code`."
  - name: region_name
    type: VARCHAR
    description: "Region name, in French."
  - name: department_code
    type: VARCHAR
    description: "Department code, zero-padded, `2A`/`2B` for Corsica; `999` is the all-departments aggregate row. Joins `cnam-referentiel-departements`.`department_code`."
  - name: department_name
    type: VARCHAR
    description: "Department name, in French; `Tout département` marks the aggregate row."
  - name: prescription_post_code
    type: VARCHAR
    description: "Prescription-post code `1` to `8`; `total` is the all-posts aggregate row."
  - name: prescription_post
    type: VARCHAR
    description: "Prescription post, in French (`kinésithérapie`, `dispositifs médicaux inscrits à la liste des produits et prestations`, `autres`, ...)."
  - name: total_prescription_amount_eur
    type: BIGINT
    description: "Total amount prescribed by the practitioners of this cell for this post, in euros. The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
  - name: mean_prescription_amount_eur
    type: BIGINT
    description: "Mean amount prescribed per practitioner for this post, in euros. The source suppresses small or unreliable cells (NS 'non significatif', NC 'non communiqué'); those rows carry no value here."
