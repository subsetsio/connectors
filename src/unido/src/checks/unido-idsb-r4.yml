# compiled by `hardened compile-checks` — post-publish audit of `unido-idsb-r4`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_code, indicator_code, classification_code, classification_combo_code, time_period]
temporal: year
checks:
  - kind: unique
    columns: [country_code, indicator_code, classification_code, classification_combo_code, time_period]
  - kind: not_null
    col: country_code
  - kind: not_null
    col: indicator_code
  - kind: not_null
    col: classification_code
  - kind: not_null
    col: classification_combo_code
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 295856
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
