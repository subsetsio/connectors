spec_id: banco-central-do-brasil-ptax-cotacaomoedaperiodo
status: active
tests:
  - not_null: cotacaoVenda
  - not_null: moeda
    reason: the per-currency symbol is injected on every row during the fetch
    certainty: 95
  - distinct_count: {col: moeda, min: 2, max: 100}
    reason: PTAX quotes dozens of currencies; one symbol would mean the loop broke
    certainty: 80
  - row_count: {min: 2000}
    reason: many currencies x daily bulletins x 25 years is large
    certainty: 85
  - freshness: {col: dataHoraCotacao, reaches: today - 45d}
    reason: PTAX currency bulletins publish every business day
    certainty: 70
    points_outward: true
    severity: warn
