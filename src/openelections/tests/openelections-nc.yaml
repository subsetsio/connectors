spec_id: openelections-nc
status: active
coverage:
  frozen: true
  reason: OpenElections publishes historical CSV repositories without a guaranteed update cadence; this connector reflects the canonical CSV files present in each repository snapshot.
tests:
  - not_null: state
    reason: every row is stamped with the state slug from the repo name
    certainty: 99
  - enum: {col: state, values: ["nc"]}
    reason: this asset holds only the nc repo; any other value means cross-state contamination
    certainty: 99
  - row_count: {min: 0, max: 0}
    reason: the North Carolina OpenElections repository currently has no canonical dated CSV result files; the download spec is waived until upstream adds standardized CSVs.
    certainty: 95
