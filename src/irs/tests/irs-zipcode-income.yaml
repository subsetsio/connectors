spec_id: irs-zipcode-income
status: active
tests:
  - not_null: tax_year
  - not_null: statefips
  - not_null: zipcode
  - not_null: agi_stub
  - column_type: {col: tax_year, type: integer}
  - column_type: {col: n1, type: integer}
  - column_type: {col: a00100, type: float}
  - between: {col: tax_year, lo: 2011, hi: current_year()}
    reason: SOI ZIP income CSVs are annual tax-year files; future years indicate filename parsing drift
    certainty: 90
  - freshness: {col: tax_year, reaches: 2022}
    reason: IRS ZIP Code income data lags the filing year; tax year 2022 was the latest file seen during research
    points_outward: true
    certainty: 75
  - enum: {col: agi_stub, values: [0, 1, 2, 3, 4, 5, 6]}
    reason: ZIP income files use AGI-size classes plus an all-returns row
    certainty: 90
  - row_count: {min: 1000000}
    reason: ZIP income spans tens of thousands of ZIP codes, AGI classes, and many annual files
    certainty: 85
