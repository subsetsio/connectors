spec_id: irs-county-migration
status: active
tests:
  - not_null: year
  - not_null: direction
  - column_type: {col: year, type: integer}
  - column_type: {col: n1, type: integer}
  - column_type: {col: agi, type: float}
  - enum: {col: direction, values: [inflow, outflow]}
    certainty: 95
  - between: {col: year, lo: 2005, hi: current_year()}
    reason: migration files are annual year-pair extracts ending in the destination tax year
    certainty: 90
  - freshness: {col: year, reaches: 2023}
    reason: IRS county migration data had reached the 2022-2023 year pair during research
    points_outward: true
    certainty: 75
  - row_count: {min: 500000}
    reason: county migration includes county-to-county flows in both directions across many year pairs
    certainty: 80
