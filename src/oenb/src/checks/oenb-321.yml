# compiled by `hardened compile-checks` — post-publish audit of `oenb-321`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [series_code, dimensions, frequency, period]
temporal: date
checks:
  - kind: unique
    columns: [series_code, dimensions, frequency, period]
  - kind: not_null
    col: series_code
  - kind: not_null
    col: dimensions
  - kind: not_null
    col: frequency
  - kind: not_null
    col: period
  - kind: row_floor
    min: 13930
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
