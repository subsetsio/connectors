# compiled by `hardened compile-checks` — post-publish audit of `stats19-casualties`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [collision_index, vehicle_reference, casualty_reference]
temporal: collision_year
checks:
  - kind: unique
    columns: [collision_index, vehicle_reference, casualty_reference]
  - kind: not_null
    col: collision_index
  - kind: not_null
    col: vehicle_reference
  - kind: not_null
    col: casualty_reference
  - kind: row_floor
    min: 5987125
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
