    columns: [obs_time, year, age_group_residence, education, sex]
  - kind: not_null
    col: obs_time
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group_residence
  - kind: not_null
    col: education
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 2475
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
