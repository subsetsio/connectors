spec_id: canadian-centre-for-energy-information-stc:df-estma
status: active
tests:
  - freshness: {col: REPYEAREND, reaches: 2025-01-01}
    reason: ESTMA annual reporting table should include reports for the current reporting cycle
    certainty: 85
    points_outward: true
  - not_null: TIME_PERIOD
    reason: SDMX-CSV always carries the observation dimension (TIME_PERIOD) on every row
    certainty: 95
  - not_null: FREQ
    reason: every SDMX series declares a frequency code
    certainty: 90
  - row_count:
      min: 1
    reason: a rank-active (non-archived) dataflow publishes at least one observation
    certainty: 90
