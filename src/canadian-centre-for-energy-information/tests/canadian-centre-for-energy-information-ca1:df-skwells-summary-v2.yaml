spec_id: canadian-centre-for-energy-information-ca1:df-skwells-summary-v2
status: active
tests:
  - freshness: {col: TIME_PERIOD, reaches: 2025-01}
    reason: monthly provincial wells summary should continue to include recent monthly periods; allow roughly six months release lag
    certainty: 85
    points_outward: true
  - not_null: TIME_PERIOD
    reason: SDMX-CSV always carries the observation dimension (TIME_PERIOD) on every row
    certainty: 95
  - not_null: FREQ
    reason: every SDMX series declares a frequency code
    certainty: 90
  - row_count:
      min: 1
    reason: a rank-active (non-archived) dataflow publishes at least one observation
    certainty: 90
