spec_id: canadian-centre-for-energy-information-ca1:df-skwells-summary
coverage:
  frozen: true
  reason: legacy Saskatchewan wells summary dataflow is superseded by df-skwells-summary-v2; latest observed period remains 2023-07 while v2 is current.
status: active
tests:
  - not_null: TIME_PERIOD
    reason: SDMX-CSV always carries the observation dimension (TIME_PERIOD) on every row
    certainty: 95
  - not_null: FREQ
    reason: every SDMX series declares a frequency code
    certainty: 90
  - row_count:
      min: 1
    reason: an accepted dataflow should publish at least one observation
    certainty: 85
