spec_id: norges-bank-govt-irs
status: active
coverage:
  frozen: true
  reason: Norges Bank's GOVT_IRS dataflow is a historical interest-rate-swaps series whose latest observed period is 2014-11.
tests:
  - not_null: TIME_PERIOD
    reason: every SDMX observation has a time period; nulls mean the CSV component columns were misaligned during parsing
    certainty: 95
  - row_count: {min: 470}
    reason: dataflow exposes ~470 series via the SDMX 'all' key, each with historical observations; far fewer rows means a truncated download
    certainty: 80
  - not_null: OBS_VALUE
    reason: the CSV always emits an OBS_VALUE cell per row (may be empty/NaN string in raw; the transform drops non-finite values)
    certainty: 70
    severity: warn
