spec_id: norges-bank-ann-fx-spu
status: active
tests:
  - not_null: TIME_PERIOD
    reason: every SDMX observation has a time period; nulls mean the CSV component columns were misaligned during parsing
    certainty: 95
  - column_type: {col: TIME_PERIOD, type: string}
    reason: raw is unparsed SDMX CSV; TIME_PERIOD kept as string because grain varies by dataflow (daily date, year, quarter, datetime)
    certainty: 90
  - row_count: {min: 250}
    reason: monthly SPU FX-transaction announcements back to 1999-12 (~324 rows observed); far fewer means a truncated download
    certainty: 80
  - not_null: OBS_VALUE
    reason: the CSV always emits an OBS_VALUE cell per row (numeric transaction amount here)
    certainty: 75
    severity: warn
