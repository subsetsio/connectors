spec_id: norges-bank-cbc-calendar
status: active
tests:
  - not_null: TIME_PERIOD
    reason: every SDMX observation has a time period; nulls mean the CSV component columns were misaligned during parsing
    certainty: 95
  - freshness: {col: TIME_PERIOD, reaches: today - 120d}
    reason: Norges Bank SDMX dataflows are maintained as current public data; the latest observation period should stay within a broad operational freshness window.
    certainty: 80
  - not_null: ISIN
    reason: the issuance calendar keys each auction row by the certificate ISIN; a null means the CSV component columns misaligned
    certainty: 85
  - row_count: {min: 30}
    reason: rolling central-bank certificate issuance calendar (~70 auction rows observed); a near-empty table means a broken pull
    certainty: 70
