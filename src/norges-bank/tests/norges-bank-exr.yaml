spec_id: norges-bank-exr
status: active
tests:
  - not_null: TIME_PERIOD
    reason: every SDMX observation has a time period; nulls mean the CSV component columns were misaligned during parsing
    certainty: 95
  - freshness: {col: TIME_PERIOD, reaches: today - 120d}
    reason: Norges Bank SDMX dataflows are maintained as current public data; the latest observation period should stay within a broad operational freshness window.
    certainty: 80
  - row_count: {min: 123}
    reason: dataflow exposes ~123 series via the SDMX 'all' key, each with historical observations; far fewer rows means a truncated download
    certainty: 80
  - not_null: OBS_VALUE
    reason: the CSV always emits an OBS_VALUE cell per row (may be empty/NaN string in raw; the transform drops non-finite values)
    certainty: 70
    severity: warn
