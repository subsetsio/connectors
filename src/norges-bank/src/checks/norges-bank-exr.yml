# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-exr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, base_cur, decimals, freq]
checks:
  - kind: unique
    columns: [obs_value, time_period, base_cur, decimals, freq]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: base_cur
  - kind: not_null
    col: decimals
  - kind: not_null
    col: freq
  - kind: row_floor
    min: 172258
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
