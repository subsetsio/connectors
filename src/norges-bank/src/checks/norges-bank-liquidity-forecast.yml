# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-liquidity-forecast`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, obs_value, forecast_date, forecast_year, forecast_type]
temporal: forecast_date
checks:
  - kind: unique
    columns: [time_period, obs_value, forecast_date, forecast_year, forecast_type]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: forecast_date
  - kind: not_null
    col: forecast_year
  - kind: not_null
    col: forecast_type
  - kind: row_floor
    min: 380169
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
