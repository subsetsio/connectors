# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-govt-primary-market`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [instrument_type, unit_measure, freq, isin, issue_type, maturity, coupon, instr, decimals, unit_mult, time_period]
temporal: maturity
checks:
  - kind: unique
    columns: [instrument_type, unit_measure, freq, isin, issue_type, maturity, coupon, instr, decimals, unit_mult, time_period]
  - kind: not_null
    col: instrument_type
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: freq
  - kind: not_null
    col: isin
  - kind: not_null
    col: issue_type
  - kind: not_null
    col: maturity
  - kind: not_null
    col: coupon
  - kind: not_null
    col: instr
  - kind: not_null
    col: decimals
  - kind: not_null
    col: unit_mult
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 5632
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
