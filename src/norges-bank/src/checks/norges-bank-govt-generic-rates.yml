# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-govt-generic-rates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, tenor, freq, instrument_type]
checks:
  - kind: unique
    columns: [obs_value, time_period, tenor, freq, instrument_type]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: tenor
  - kind: not_null
    col: freq
  - kind: not_null
    col: instrument_type
  - kind: row_floor
    min: 6930
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
