# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-govt-secondary-market`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, isin, instrument_type, counterparty_area, counterparty_type, unit_measure, decimals, unit_mult, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, isin, instrument_type, counterparty_area, counterparty_type, unit_measure, decimals, unit_mult, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: isin
  - kind: not_null
    col: instrument_type
  - kind: not_null
    col: counterparty_area
  - kind: not_null
    col: counterparty_type
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: decimals
  - kind: not_null
    col: unit_mult
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 14587
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
