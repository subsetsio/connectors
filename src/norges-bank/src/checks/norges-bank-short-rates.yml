# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-short-rates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, time_period, unit_measure, calc_method, tenor]
checks:
  - kind: unique
    columns: [obs_value, time_period, unit_measure, calc_method, tenor]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: calc_method
  - kind: not_null
    col: tenor
  - kind: row_floor
    min: 21292
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
