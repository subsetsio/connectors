# compiled by `hardened compile-checks` — post-publish audit of `norges-bank-regnet`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, regnet_topic, regnet_sector, region, horizon, decimals, unit_measure, time_period]
checks:
  - kind: unique
    columns: [freq, regnet_topic, regnet_sector, region, horizon, decimals, unit_measure, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: regnet_topic
  - kind: not_null
    col: regnet_sector
  - kind: not_null
    col: region
  - kind: not_null
    col: horizon
  - kind: not_null
    col: decimals
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2706
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
