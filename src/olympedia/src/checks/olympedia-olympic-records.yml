# compiled by `hardened compile-checks` — post-publish audit of `olympedia-olympic-records`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [event, current_record, athletes, date, noc_code]
temporal: date
checks:
  - kind: unique
    columns: [event, current_record, athletes, date, noc_code]
  - kind: not_null
    col: event
  - kind: not_null
    col: current_record
  - kind: not_null
    col: athletes
  - kind: not_null
    col: date
  - kind: not_null
    col: noc_code
  - kind: row_floor
    min: 15
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
