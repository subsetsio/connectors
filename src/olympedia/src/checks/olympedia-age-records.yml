# compiled by `hardened compile-checks` — post-publish audit of `olympedia-age-records`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, athlete, born, dates, placement]
checks:
  - kind: unique
    columns: [age, athlete, born, dates, placement]
  - kind: not_null
    col: age
  - kind: not_null
    col: athlete
  - kind: not_null
    col: born
  - kind: not_null
    col: dates
  - kind: not_null
    col: placement
  - kind: row_floor
    min: 50
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
