spec_id: speedrun-categories
status: active
tests:
  - not_null: id
    reason: every category record has a stable Speedrun.com category id
    certainty: 98
  - not_null: name
    reason: category names are required leaderboard labels
    certainty: 95
  - not_null: _game
    reason: categories are fetched as game-embedded resources and must retain their parent game id
    certainty: 98
  - row_count: {min: 1000}
    reason: the public game catalog exposes many per-game and per-level categories
    certainty: 90
  - unique: id
    reason: category ids are source-wide stable identifiers
    certainty: 90
  - freshness: {col: _fetched_at, reaches: today - 7d}
    reason: _fetched_at is stamped during download; a stale max means the raw asset was not refreshed
    points_outward: false
