spec_id: speedrun-series
status: active
tests:
  - not_null: id
    reason: every series record has a stable Speedrun.com series id
    certainty: 98
  - not_null: abbreviation
    reason: series records expose source abbreviations
    certainty: 90
  - not_null: weblink
    reason: series records expose a human web link
    certainty: 95
  - row_count: {min: 100}
    reason: Speedrun.com tracks many game series; fewer than 100 suggests pagination broke
    certainty: 85
  - unique: id
    reason: each series id should appear once
    certainty: 95
