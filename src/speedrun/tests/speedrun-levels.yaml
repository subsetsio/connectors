spec_id: speedrun-levels
status: active
tests:
  - not_null: id
    reason: every level record has a stable Speedrun.com level id
    certainty: 98
  - not_null: name
    reason: level names are required leaderboard labels
    certainty: 95
  - not_null: _game
    reason: levels are fetched as game-embedded resources and must retain their parent game id
    certainty: 98
  - row_count: {min: 100}
    reason: many games expose individual-level leaderboards
    certainty: 80
  - unique: id
    reason: level ids are source-wide stable identifiers
    certainty: 90
  - freshness: {col: _fetched_at, reaches: today - 7d}
    reason: _fetched_at is stamped during download; a stale max means the raw asset was not refreshed
    points_outward: false
