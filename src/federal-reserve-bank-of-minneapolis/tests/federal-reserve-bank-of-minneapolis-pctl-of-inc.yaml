spec_id: federal-reserve-bank-of-minneapolis-pctl-of-inc
status: active
tests:
  - not_null: year
  - column_type: {col: year, type: integer}
  - at_least: {col: year, expr: 1998}
    reason: IDDA income statistics in the public files begin in 1998
    certainty: 80
  - freshness: {col: year, reaches: 2019}
    reason: IDDA public files lag current calendar time because they are built from administrative tax data
    points_outward: true
  - at_most: {col: year, expr: current_year()}
    reason: observation year cannot exceed the current calendar year
    certainty: 85
    points_outward: true
    severity: warn
  - enum: {col: geo_var, values: [usst, state, native_areas]}
    reason: union of the all_data (US+states) and na_all_data (native areas) files
    certainty: 85
  - not_null: pctl50
  - row_count: {min: 50000}
    reason: ~100k rows observed (US+states+native x W-2/1040 x groups x years); a big drop means a variant file failed to load
    certainty: 80
