spec_id: pypi-stats-overall-downloads
status: active
tests:
  - row_count: {min: 3500}
    reason: 21 top packages with about 180 daily observations each should produce thousands of rows.
    certainty: 90
  - not_null: package
  - not_null: metric
  - not_null: category
  - not_null: date
  - not_null: downloads
  - column_type: {col: package, type: string}
  - column_type: {col: metric, type: string}
  - column_type: {col: category, type: string}
  - column_type: {col: date, type: date}
  - column_type: {col: downloads, type: integer}
  - enum: {col: metric, values: [overall_downloads]}
    reason: this spec fetches only the overall endpoint.
    certainty: 99
  - enum: {col: category, values: [with_mirrors, without_mirrors]}
    reason: pypistats overall endpoint splits by mirror inclusion when mirrors is omitted.
    certainty: 95
  - unique: [package, category, date]
    reason: one daily overall observation per package/category/date.
    certainty: 95
  - freshness: {col: date, reaches: today - 7d}
    reason: pypistats says data is updated daily and retains only the last 180 days.
    points_outward: true
    certainty: 90
