spec_id: pypi-stats-python-major-downloads
status: active
tests:
  - row_count: {min: 8000}
    reason: 21 top packages by roughly three Python major categories over 180 days should produce thousands of rows.
    certainty: 85
  - not_null: package
  - not_null: metric
  - not_null: category
  - not_null: date
  - not_null: downloads
  - column_type: {col: package, type: string}
  - column_type: {col: metric, type: string}
  - column_type: {col: category, type: string}
  - column_type: {col: date, type: date}
  - column_type: {col: downloads, type: integer}
  - enum: {col: metric, values: [python_major_downloads]}
    reason: this spec fetches only the python_major endpoint.
    certainty: 99
  - enum: {col: category, values: ["2", "3", "null"]}
    reason: pypistats groups Python major downloads into Python 2, Python 3, and null.
    certainty: 95
  - unique: [package, category, date]
    reason: one daily observation per package/Python-major/date.
    certainty: 95
  - freshness: {col: date, reaches: today - 7d}
    reason: pypistats says data is updated daily and retains only the last 180 days.
    points_outward: true
    certainty: 90
