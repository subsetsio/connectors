spec_id: pypi-stats-python-minor-downloads
status: active
tests:
  - row_count: {min: 15000}
    reason: 21 top packages by Python minor version over 180 days should produce many rows.
    certainty: 80
  - not_null: package
  - not_null: metric
  - not_null: category
  - not_null: date
  - not_null: downloads
  - column_type: {col: package, type: string}
  - column_type: {col: metric, type: string}
  - column_type: {col: category, type: string}
  - column_type: {col: date, type: date}
  - column_type: {col: downloads, type: integer}
  - enum: {col: metric, values: [python_minor_downloads]}
    reason: this spec fetches only the python_minor endpoint.
    certainty: 99
  - unique: [package, category, date]
    reason: one daily observation per package/Python-minor/date.
    certainty: 95
  - freshness: {col: date, reaches: today - 7d}
    reason: pypistats says data is updated daily and retains only the last 180 days.
    points_outward: true
    certainty: 90
