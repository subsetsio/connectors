spec_id: pypi-stats-system-downloads
status: active
tests:
  - row_count: {min: 12000}
    reason: 21 top packages by operating-system category over 180 days should produce many rows.
    certainty: 85
  - not_null: package
  - not_null: metric
  - not_null: category
  - not_null: date
  - not_null: downloads
  - column_type: {col: package, type: string}
  - column_type: {col: metric, type: string}
  - column_type: {col: category, type: string}
  - column_type: {col: date, type: date}
  - column_type: {col: downloads, type: integer}
  - enum: {col: metric, values: [system_downloads]}
    reason: this spec fetches only the system endpoint.
    certainty: 99
  - enum: {col: category, values: [Darwin, Linux, Windows, "null", other]}
    reason: pypistats system endpoint currently reports these operating-system categories.
    certainty: 90
  - unique: [package, category, date]
    reason: one daily observation per package/system/date.
    certainty: 95
  - freshness: {col: date, reaches: today - 7d}
    reason: pypistats says data is updated daily and retains only the last 180 days.
    points_outward: true
    certainty: 90
