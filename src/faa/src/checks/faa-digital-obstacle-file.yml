# compiled by `hardened compile-checks` — post-publish audit of `faa-digital-obstacle-file`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [oas_number, long_dms, long_dd, lat_dms, lat_dd]
checks:
  - kind: unique
    columns: [oas_number, long_dms, long_dd, lat_dms, lat_dd]
  - kind: not_null
    col: oas_number
  - kind: not_null
    col: long_dms
  - kind: not_null
    col: long_dd
  - kind: not_null
    col: lat_dms
  - kind: not_null
    col: lat_dd
  - kind: row_floor
    min: 320603
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
