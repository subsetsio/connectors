# compiled by `hardened compile-checks` — post-publish audit of `faa-navaid-component`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [global_id, longitude, ident, navsys_id, name]
checks:
  - kind: unique
    columns: [global_id, longitude, ident, navsys_id, name]
  - kind: not_null
    col: global_id
  - kind: not_null
    col: longitude
  - kind: not_null
    col: ident
  - kind: not_null
    col: navsys_id
  - kind: not_null
    col: name
  - kind: row_floor
    min: 1098
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
