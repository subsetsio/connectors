# compiled by `hardened compile-checks` — post-publish audit of `faa-runways`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [global_id, airport_id, designator, comp_code]
checks:
  - kind: unique
    columns: [global_id, airport_id, designator, comp_code]
  - kind: not_null
    col: global_id
  - kind: not_null
    col: airport_id
  - kind: not_null
    col: designator
  - kind: not_null
    col: comp_code
  - kind: row_floor
    min: 11700
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
