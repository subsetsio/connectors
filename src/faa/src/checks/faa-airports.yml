# compiled by `hardened compile-checks` — post-publish audit of `faa-airports`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [global_id, name, country, type_code, operstatus]
checks:
  - kind: unique
    columns: [global_id, name, country, type_code, operstatus]
  - kind: not_null
    col: global_id
  - kind: not_null
    col: name
  - kind: not_null
    col: country
  - kind: not_null
    col: type_code
  - kind: not_null
    col: operstatus
  - kind: row_floor
    min: 9779
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
