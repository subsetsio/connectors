# compiled by `hardened compile-checks` — post-publish audit of `faa-acftref`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [code, mfr, model, speed, tc_data_sheet]
checks:
  - kind: unique
    columns: [code, mfr, model, speed, tc_data_sheet]
  - kind: not_null
    col: code
  - kind: not_null
    col: mfr
  - kind: not_null
    col: model
  - kind: not_null
    col: speed
  - kind: not_null
    col: tc_data_sheet
  - kind: row_floor
    min: 46940
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
