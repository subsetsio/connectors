# compiled by `hardened compile-checks` — post-publish audit of `faa-dereg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [n_number, serial_number, mfr_mdl_code, cancel_date]
checks:
  - kind: unique
    columns: [n_number, serial_number, mfr_mdl_code, cancel_date]
  - kind: not_null
    col: n_number
  - kind: not_null
    col: serial_number
  - kind: not_null
    col: mfr_mdl_code
  - kind: not_null
    col: cancel_date
  - kind: row_floor
    min: 191358
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
