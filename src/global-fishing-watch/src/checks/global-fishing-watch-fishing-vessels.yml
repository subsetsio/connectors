# compiled by `hardened compile-checks` — post-publish audit of `global-fishing-watch-fishing-vessels`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mmsi, flag_gfw, vessel_class_gfw, year]
temporal: year
checks:
  - kind: unique
    columns: [mmsi, flag_gfw, vessel_class_gfw, year]
  - kind: not_null
    col: mmsi
  - kind: not_null
    col: flag_gfw
  - kind: not_null
    col: vessel_class_gfw
  - kind: not_null
    col: year
  - kind: row_floor
    min: 386582
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
