# compiled by `hardened compile-checks` — post-publish audit of `global-fishing-watch-fleet-monthly-10`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, cell_ll_lat, cell_ll_lon, flag, geartype]
temporal: date
checks:
  - kind: unique
    columns: [date, cell_ll_lat, cell_ll_lon, flag, geartype]
  - kind: not_null
    col: date
  - kind: not_null
    col: cell_ll_lat
  - kind: not_null
    col: cell_ll_lon
  - kind: not_null
    col: flag
  - kind: not_null
    col: geartype
  - kind: row_floor
    min: 61583873
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
