spec_id: cbe-domestic-debt--the-outstanding-balance-of-treasury-bills-quarterly
status: active
tests:
  - not_null: value
    reason: every melted cell is a numeric observation; a null value means a non-data cell leaked into the value column
    certainty: 95
  - not_null: indicator_en
    reason: each long row carries the English indicator/row label it was melted from
    certainty: 90
  - column_type: {col: value, type: float}
    certainty: 95
  - column_type: {col: date, type: date}
    reason: period header (month/quarter/fiscal-year) parsed to a calendar date
    certainty: 80
    points_outward: false
  - row_count: {min: 5}
    reason: this dataset concatenates many fiscal-year workbooks; a tiny table means scraping or parsing broke
    certainty: 85
  - enum: {col: frequency, values: [monthly, quarterly, annual]}
    reason: frequency derived from the workbook filename tag / header cadence
    certainty: 75
    severity: warn
  - between: {col: year, lo: 1995, hi: current_year()}
    reason: CBE time series start in the 1990s-2000s; fiscal-year labels can reach the current year
    certainty: 75
    points_outward: true
    severity: warn
