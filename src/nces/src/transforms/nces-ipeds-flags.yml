# authored to match the uniform IPEDS passthrough transform (unitid+year typed,
# every survey-response flag kept as VARCHAR); columns from the FLAGS2024 header.
temporal: year
sort: [year]
columns:
  - name: unitid
    type: BIGINT
  - name: year
    type: INTEGER
  - name: STAT_IC
    type: VARCHAR
  - name: LOCK_IC
    type: VARCHAR
  - name: IMP_IC
    type: VARCHAR
  - name: STAT_C
    type: VARCHAR
  - name: LOCK_C
    type: VARCHAR
  - name: PRCH_C
    type: VARCHAR
  - name: IDX_C
    type: VARCHAR
  - name: PCC_F
    type: VARCHAR
  - name: IMP_C
    type: VARCHAR
  - name: STAT_E12
    type: VARCHAR
  - name: LOCK_E12
    type: VARCHAR
  - name: PRCH_E12
    type: VARCHAR
  - name: IDX_E12
    type: VARCHAR
  - name: PCE12_F
    type: VARCHAR
  - name: IMP_E12
    type: VARCHAR
