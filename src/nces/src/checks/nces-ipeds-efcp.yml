# compiled by `hardened compile-checks` — post-publish audit of `nces-ipeds-efcp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unitid, year, efciplev, cipcode, line, section, lstudy]
temporal: year
checks:
  - kind: unique
    columns: [unitid, year, efciplev, cipcode, line, section, lstudy]
  - kind: not_null
    col: unitid
  - kind: not_null
    col: year
  - kind: not_null
    col: efciplev
  - kind: not_null
    col: cipcode
  - kind: not_null
    col: line
  - kind: not_null
    col: section
  - kind: not_null
    col: lstudy
  - kind: row_floor
    min: 859092
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
