# compiled by `hardened compile-checks` — post-publish audit of `nces-ipeds-gr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unitid, year, grtype, chrtstat, section, cohort, line]
temporal: year
checks:
  - kind: unique
    columns: [unitid, year, grtype, chrtstat, section, cohort, line]
  - kind: not_null
    col: unitid
  - kind: not_null
    col: year
  - kind: not_null
    col: grtype
  - kind: not_null
    col: chrtstat
  - kind: not_null
    col: section
  - kind: not_null
    col: cohort
  - kind: not_null
    col: line
  - kind: row_floor
    min: 600454
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
