# compiled by `hardened compile-checks` — post-publish audit of `nces-ipeds-s-nh`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [unitid, year, snhcat, occupcat, facstat, sgtype]
temporal: year
checks:
  - kind: unique
    columns: [unitid, year, snhcat, occupcat, facstat, sgtype]
  - kind: not_null
    col: unitid
  - kind: not_null
    col: year
  - kind: not_null
    col: snhcat
  - kind: not_null
    col: occupcat
  - kind: not_null
    col: facstat
  - kind: not_null
    col: sgtype
  - kind: row_floor
    min: 224772
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
