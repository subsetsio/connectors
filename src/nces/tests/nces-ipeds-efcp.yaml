spec_id: nces-ipeds-efcp
status: active
coverage:
  frozen: true
  reason: NCES IPEDS complete-data-file bulk ZIPs for EFCP are available through EF2022CP.zip, but EF2023CP.zip and EF2024CP.zip return 404 as of 2026-07-11; treat this table as a discontinued/frozen IPEDS component.
tests:
  - not_null: UNITID
    reason: IPEDS complete data files are keyed on UNITID (the institution id); every row carries one.
    certainty: 95
  - column_type: {col: year, type: integer}
    reason: the fetch fn adds an integer `year` (collection year) to every row.
    certainty: 95
  - at_least: {col: year, expr: 1980}
    reason: IPEDS Data Center floors its collection-year dropdown at 1980; nothing earlier is published.
    certainty: 90
  - at_most: {col: year, expr: current_year()}
    reason: a collection year cannot exceed the current calendar year.
    certainty: 90
    points_outward: true
