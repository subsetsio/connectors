spec_id: gbif-occurrences-by-license
status: active
tests:
  - not_null: facet_value
  - column_type: {col: facet_value, type: string}
  - column_type: {col: n, type: integer}
  - unique: facet_value
    reason: one row per occurrence license facet
    certainty: 95
  - row_count: {min: 3, max: 5}
    reason: GBIF occurrence records are licensed under CC0, CC BY, or CC BY-NC
    certainty: 95
  - at_least: {col: n, expr: 1}
    certainty: 95

