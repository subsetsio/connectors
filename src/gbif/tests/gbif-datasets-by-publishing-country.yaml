spec_id: gbif-datasets-by-publishing-country
status: active
tests:
  - not_null: facet_value
  - column_type: {col: facet_value, type: string}
  - column_type: {col: n, type: integer}
  - unique: facet_value
    reason: one row per publishing country facet
    certainty: 95
  - row_count: {min: 100, max: 300}
    reason: GBIF has dataset publishers across many countries, but the ISO country universe is bounded
    certainty: 90
  - at_least: {col: n, expr: 1}
    certainty: 95

