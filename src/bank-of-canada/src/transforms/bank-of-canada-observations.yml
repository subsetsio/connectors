key: [series_id, obs_index]
temporal: obs_date
sort: [obs_date, series_id, obs_index]
columns:
  - name: series_id
    type: VARCHAR
    description: Bank of Canada Valet series identifier.
  - name: obs_index_key
    type: VARCHAR
    description: Upstream observation index key; `d` means date-indexed, while other values identify category or entity-indexed series.
  - name: obs_index
    type: VARCHAR
    description: Upstream observation index value for this series, such as an ISO date, survey category label, or entity identifier.
  - name: obs_date
    type: DATE
    description: Date projection of obs_index for date-indexed observations; null for category or entity-indexed observations.
  - name: value
    type: VARCHAR
    description: Raw Bank of Canada observation value string.
  - name: value_number
    type: DOUBLE
    description: Numeric projection of value when the raw value is parseable as a number; null for suppressed or textual values.
