spec_id: bank-of-canada-observations
status: active
tests:
  - not_null: series_id
    reason: every observation row is emitted under its source series_id; a null means the long-format key was dropped
    certainty: 99
  - column_type: {col: series_id, type: string}
    certainty: 99
  - column_type: {col: obs_date, type: string}
    reason: obs_date is kept as the raw ISO string the API returns; the transform TRY_CASTs it to DATE
    certainty: 99
  - nullable: {col: obs_date, max_null_frac: 0.4}
    reason: some Valet rows have blank or non-date period labels that the transform filters; a higher null fraction would suggest the observations shape changed
    certainty: 85
  - freshness: {col: obs_date, reaches: today - 7d}
    reason: the broad Valet corpus includes forward-dated projection/scenario series, but at least one observation date should reach the current publication window
    certainty: 80
  - row_count: {min: 100000}
    reason: full history across thousands of series yields well over 100k long-format rows; far below means the crawl aborted early
    certainty: 85
  - nullable: {col: value, max_null_frac: 0.1}
    reason: rows are only emitted when the API cell has a value; most carry a numeric string, though some are blank/suppressed
    certainty: 70
    severity: warn
