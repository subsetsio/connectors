spec_id: nasdaq-earnings
status: active
tests:
  - not_null: symbol
    reason: every earnings calendar row names the reporting company
    certainty: 92
  - not_null: report_date
    reason: report_date is the queried calendar day, stamped by the fetch fn on every row
    certainty: 95
  - column_type: {col: symbol, type: string}
    reason: raw is ndjson, all scalars string-coerced via _s
    certainty: 95
  - matches: {col: report_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: report_date is generated by the fetch fn as date.isoformat() (ISO YYYY-MM-DD)
    certainty: 92
  - row_count: {min: 30}
    reason: a ~105-day window of market-wide earnings reports yields well over 30 rows
    certainty: 70
    severity: warn
