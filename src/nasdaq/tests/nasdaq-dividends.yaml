spec_id: nasdaq-dividends
status: active
tests:
  - not_null: symbol
    reason: every dividend calendar row names the paying instrument
    certainty: 92
  - column_type: {col: symbol, type: string}
    reason: raw is ndjson, all scalars string-coerced via _s
    certainty: 95
  - column_type: {col: dividend_Ex_Date, type: string}
    reason: dates are kept as raw m/d/Y strings; the transform parses them
    certainty: 90
  - matches: {col: dividend_Ex_Date, pattern: '^[0-9]{1,2}/[0-9]{1,2}/[0-9]{4}$'}
    reason: ex-dates render as US m/d/Y; a few rows may carry blanks/N/A, hence warn
    certainty: 70
    severity: warn
  - row_count: {min: 30}
    reason: a ~105-day market-wide window (90 back + 14 fwd) yields far more than 30 ex-dividend events
    certainty: 70
    severity: warn
