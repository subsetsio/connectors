# provisional fixed-schema pass-through; regenerate after model-verify with hardened compile-transforms
key: []
write_mode: overwrite
# sort omitted: this package's raw is 38.5 GB uncompressed. ORDER BY makes
# DuckDB materialize the whole result (measured: 26.7 GB spilled for emxjy at a
# 12.8 GB memory_limit), which exhausts the GitHub runner's disk and kills the VM
# outright -- 'runner lost communication', no run record. Unsorted, the node streams.
columns:
  - name: package_id
    type: VARCHAR
  - name: package_title
    type: VARCHAR
  - name: resource_id
    type: VARCHAR
  - name: resource_name
    type: VARCHAR
  - name: resource_format
    type: VARCHAR
  - name: resource_url
    type: VARCHAR
  - name: member_path
    type: VARCHAR
  - name: sheet_name
    type: VARCHAR
  - name: source_row_number
    type: VARCHAR
  - name: data_json
    type: VARCHAR
