# compiled by `hardened compile-checks` — post-publish audit of `american-enterprise-institute-housing-market-indicators`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [metro, year_quarter, segment]
temporal: year_quarter
checks:
  - kind: unique
    columns: [metro, year_quarter, segment]
  - kind: not_null
    col: metro
  - kind: not_null
    col: year_quarter
  - kind: not_null
    col: segment
  - kind: row_floor
    min: 8400
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
