spec_id: openchargemap-connectiontypes
status: active
tests:
  - not_null: id
    reason: ConnectionTypes entries are keyed by integer ID in referencedata.json
    certainty: 99
  - unique: id
    reason: connection type ID is the primary key of this lookup table
    certainty: 98
  - not_null: title
    certainty: 95
  - row_count: {min: 35, max: 100}
    reason: referencedata.json contained 43 connection types when researched
    certainty: 90
  - column_type: {col: is_discontinued, type: boolean}
    certainty: 90
