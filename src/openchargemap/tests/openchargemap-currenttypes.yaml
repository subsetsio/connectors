spec_id: openchargemap-currenttypes
status: active
tests:
  - not_null: id
    reason: CurrentTypes entries are keyed by integer ID in referencedata.json
    certainty: 99
  - unique: id
    reason: current type ID is the primary key of this lookup table
    certainty: 98
  - not_null: title
    certainty: 95
  - row_count: {min: 3, max: 10}
    reason: OCM has three current types; allow only small taxonomy growth
    certainty: 90
