spec_id: openchargemap-usagetypes
status: active
tests:
  - not_null: id
    reason: UsageTypes entries are keyed by integer ID in referencedata.json
    certainty: 99
  - unique: id
    reason: usage type ID is the primary key and joins to POIs
    certainty: 98
  - not_null: title
    certainty: 95
  - row_count: {min: 6, max: 30}
    reason: referencedata.json contained 8 usage types when researched
    certainty: 90
  - column_type: {col: is_pay_at_location, type: boolean}
    certainty: 90
