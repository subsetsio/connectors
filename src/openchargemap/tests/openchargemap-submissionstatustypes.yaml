spec_id: openchargemap-submissionstatustypes
status: active
tests:
  - not_null: id
    reason: SubmissionStatusTypes entries are keyed by integer ID in referencedata.json
    certainty: 99
  - unique: id
    reason: submission status type ID is the primary key and joins to POIs
    certainty: 98
  - not_null: title
    certainty: 95
  - row_count: {min: 8, max: 30}
    reason: referencedata.json contained 11 submission status types when researched
    certainty: 90
  - column_type: {col: is_live, type: boolean}
    certainty: 90
