spec_id: pvgis-country-stats-classic-2007
status: active
coverage:
  frozen: true
  reason: PVGIS publishes this as a fixed historical country-summary workbook; source Last-Modified is unchanged since 2019.
tests:
  - row_count: {min: 2000, max: 2500}
    reason: the 30-country workbook normalizes to 2110 long metric/statistic rows
    certainty: 90
  - not_null: country_code
    certainty: 95
  - nullable: {col: country_name, max_null_frac: 0.07}
    reason: workbook summary rows such as min/max/country average do not carry a country name
    certainty: 95
  - not_null: metric_group
    certainty: 95
  - not_null: statistic
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 95
  - distinct_count: {col: country_code, min: 35, max: 40}
    reason: classic workbook includes country codes plus preserved workbook summary row labels
    certainty: 90
  - distinct_count: {col: sheet, min: 6, max: 6}
    reason: workbook has six data sheets plus the explanation sheet, which is normalized as metadata
    certainty: 95
  - between: {col: value, lo: 0, hi: 2500}
    reason: values are annual irradiation/yield, optimum angle, and derived differences
    certainty: 85
