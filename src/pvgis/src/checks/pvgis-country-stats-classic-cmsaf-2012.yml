# compiled by `hardened compile-checks` — post-publish audit of `pvgis-country-stats-classic-cmsaf-2012`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_code, sheet, metric_group, statistic]
checks:
  - kind: unique
    columns: [country_code, sheet, metric_group, statistic]
  - kind: not_null
    col: country_code
  - kind: not_null
    col: sheet
  - kind: not_null
    col: metric_group
  - kind: not_null
    col: statistic
  - kind: row_floor
    min: 1152
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
