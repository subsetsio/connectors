# compiled by `hardened compile-checks` — post-publish audit of `em-dat-events`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dis_no, entry_date, last_update, iso, country]
temporal: last_update
checks:
  - kind: unique
    columns: [dis_no, entry_date, last_update, iso, country]
  - kind: not_null
    col: dis_no
  - kind: not_null
    col: entry_date
  - kind: not_null
    col: last_update
  - kind: not_null
    col: iso
  - kind: not_null
    col: country
  - kind: row_floor
    min: 13473
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
