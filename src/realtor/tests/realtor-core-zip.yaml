spec_id: realtor-core-zip
status: active
tests:
  - not_null: month_date_yyyymm
  - not_null: postal_code
  - column_type: {col: month_date_yyyymm, type: integer}
  - row_count: {min: 1000000}
    reason: tens of thousands of ZIP codes across monthly history should produce more than one million rows
    certainty: 90
  - distinct_count: {col: postal_code, min: 10000}
    reason: ZIP-level coverage should include many thousands of postal codes
    certainty: 85
  - freshness: {col: month_date_yyyymm, reaches: 202605}
    reason: monthly Realtor.com data should include at least May 2026 in current full-history files
    certainty: 90
    points_outward: true
