# Foreign Exchange Markets (Daily Transactions)
spec_id: cbn-table-48
status: active
tests:
  - not_null: indicator_id
  - not_null: value
  - not_null: period
  - column_type: {col: indicator_id, type: integer}
  - column_type: {col: value, type: float}
  - column_type: {col: date, type: date}
  - unique: [indicator_id, period]
    reason: one observation per indicator per period; dupes mean a window was re-emitted without dedup
    certainty: 95
  - row_count: {min: 1}
  - distinct_count: {col: indicator_id, min: 2}
    reason: table lists 38 indicators; a collapse to one id means positional row->indicator_id mapping broke
    certainty: 80
  - at_most: {col: date, expr: today}
    reason: observations are historical/current, not future-dated
    certainty: 80
    points_outward: true
    severity: warn
  - at_least: {col: date, expr: "2010-01-01"}
    reason: CBN official daily FX rate window data spans roughly the mid-2010s to ~2023
    certainty: 60
    severity: warn
