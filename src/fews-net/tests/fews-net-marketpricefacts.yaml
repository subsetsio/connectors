spec_id: fews-net-marketpricefacts
status: active
tests:
  - not_null: country
    reason: every price observation is tied to a reporting country
    certainty: 88
  - not_null: product
    reason: every price observation names the commodity priced
    certainty: 85
  - not_null: market
    reason: prices are observed at a named market
    certainty: 80
  - column_type: {col: value, type: float}
    reason: the observed price is delivered as a JSON number
    certainty: 80
  - matches: {col: period_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: period_date is an ISO date string in the raw JSON
    certainty: 85
    severity: warn
  - freshness: {col: period_date, reaches: today - 120d}
    reason: FEWS NET market prices are a continuing time-series feed; latest price periods should remain within roughly a quarter.
    certainty: 80
    points_outward: true
  - row_count: {min: 1000000}
    reason: the global price corpus is ~4.1M observations
    certainty: 70
    severity: warn
    points_outward: true
