spec_id: fews-net-tradeflowquantityvalue
status: active
tests:
  - not_null: id
    reason: every FDW datapoint carries a numeric row id (the natural key)
    certainty: 97
  - unique: id
    reason: one raw row per FDW tradeflowquantityvalue datapoint id
    certainty: 88
  - column_type: {col: id, type: integer}
    reason: FDW row ids are integers
    certainty: 90
  - not_null: reporting_country_code
    reason: every trade flow is reported by a country (ISO-3166 code)
    certainty: 85
  - not_null: product
    reason: every trade flow names the commodity traded
    certainty: 85
  - column_type: {col: value, type: float}
    reason: the traded quantity/value is delivered as a JSON number
    certainty: 80
  - row_count: {min: 50000}
    reason: the global cross-border trade corpus is ~249k flow records
    certainty: 70
    severity: warn
    points_outward: true
