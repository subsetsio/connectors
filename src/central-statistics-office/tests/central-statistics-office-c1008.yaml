spec_id: central-statistics-office-c1008
coverage:
  frozen: true
  reason: "census table: the permanent record of the 2006 census. CSO republishes it but never extends its time axis"
tests:
  - not_null: matrix
  - not_null: statistic_code
  - not_null: time_code
  - not_null: time_dimension
  - not_null: unit
  - column_type: {col: value, type: float}
    reason: PxStat VALUE is numeric-or-blank; blanks are suppressed cells and must land as NULL
    certainty: 95
  - row_count: {min: 1}
    reason: a ReadDataset response with no cells means the matrix was emptied upstream
  - unique: [statistic_code, time_code, dim1_code, dim2_code, dim3_code]
    reason: PxStat serves a dense cube - one cell per statistic x time x dimension coordinate
    certainty: 90
