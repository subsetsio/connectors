# compiled by `hardened compile-checks` — post-publish audit of `environment-and-climate-change-canada-ahccd-stations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [start_date_date_debut, feature_id]
temporal: start_date_date_debut
checks:
  - kind: unique
    columns: [start_date_date_debut, feature_id]
  - kind: not_null
    col: start_date_date_debut
  - kind: not_null
    col: feature_id
  - kind: row_floor
    min: 696
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
