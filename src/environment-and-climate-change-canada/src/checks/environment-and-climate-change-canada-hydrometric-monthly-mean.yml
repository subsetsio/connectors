# compiled by `hardened compile-checks` — post-publish audit of `environment-and-climate-change-canada-hydrometric-monthly-mean`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [feature_id, identifier, station_name, station_number, date]
temporal: date
checks:
  - kind: unique
    columns: [feature_id, identifier, station_name, station_number, date]
  - kind: not_null
    col: feature_id
  - kind: not_null
    col: identifier
  - kind: not_null
    col: station_name
  - kind: not_null
    col: station_number
  - kind: not_null
    col: date
  - kind: row_floor
    min: 1131380
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
