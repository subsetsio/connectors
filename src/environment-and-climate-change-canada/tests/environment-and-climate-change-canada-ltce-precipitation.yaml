spec_id: environment-and-climate-change-canada-ltce-precipitation
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 250000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: VIRTUAL_CLIMATE_ID
  - unique: [VIRTUAL_CLIMATE_ID, LOCAL_MONTH, LOCAL_DAY]
    reason: one extremes record per virtual station per calendar day
    certainty: 95
  - between: {col: LOCAL_MONTH, lo: 1, hi: 12}
  - between: {col: LOCAL_DAY, lo: 1, hi: 31}
  - at_most: {col: RECORD_PRECIPITATION_YR, expr: current_year()}
    certainty: 90
  - freshness: {col: RECORD_PRECIPITATION_YR, reaches: current_year()}
    reason: some station somewhere sets a new precipitation extreme every year, so the max record-year should be the current year. This collection has no LAST_UPDATED stamp.
    points_outward: true
