spec_id: environment-and-climate-change-canada-ahccd-seasonal
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 400000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - column_type: {col: year__annee, type: integer}
  - unique: [station_id__id_station, year__annee, period_value__valeur_periode]
    reason: one row per station per year per season
    certainty: 95
  - enum: {col: period_value__valeur_periode, values: [Fal, Spr, Smr, Win]}
    certainty: 80
  - freshness: {col: year__annee, reaches: 2020}
    reason: AHCCD release extends to 2020; see ahccd-annual
    points_outward: true
