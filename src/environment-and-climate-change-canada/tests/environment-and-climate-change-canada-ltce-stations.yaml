spec_id: environment-and-climate-change-canada-ltce-stations
status: active
coverage:
  frozen: true
  reason: Virtual station registry; START_DATE is the station operating start date, not an observation freshness axis.
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 10000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: VIRTUAL_CLIMATE_ID
  - unique: IDENTIFIER
    reason: one row per virtual station per measured element
    certainty: 90
