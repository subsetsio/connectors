spec_id: environment-and-climate-change-canada-hydrometric-annual-statistics
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 170000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: STATION_NUMBER
  - relationship: {left: MIN_VALUE, op: <=, right: MAX_VALUE}
    reason: the annual minimum cannot exceed the annual maximum
    certainty: 95
  - freshness: {col: MAX_DATE, reaches: today - 730d}
    reason: published a season or more after the water year closes; 2y slack
    points_outward: true
