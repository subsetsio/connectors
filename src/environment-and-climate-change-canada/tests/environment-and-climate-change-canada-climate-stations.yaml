spec_id: environment-and-climate-change-canada-climate-stations
status: active
coverage:
  frozen: true
  reason: Station registry; FIRST_DATE is the station operating start date, not an observation freshness axis.
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 8000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: CLIMATE_IDENTIFIER
  - unique: CLIMATE_IDENTIFIER
    reason: station registry; one row per registered station. A shrink means the registry fetch truncated.
    certainty: 95
