spec_id: environment-and-climate-change-canada-climate-normals
status: active
coverage:
  frozen: true
  reason: >-
    1981-2010 is a fixed 30-year reference period - every row carries
    PERIOD_BEGIN=1981 and PERIOD_END=2010. The corpus does not advance until ECCC
    publishes the 1991-2020 normals as a new collection.
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 550000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: CLIMATE_IDENTIFIER
  - enum: {col: PERIOD_BEGIN, values: [1981]}
    reason: the published normals are the 1981-2010 period only
    certainty: 90
  - enum: {col: PERIOD_END, values: [2010]}
    certainty: 90
  - between: {col: MONTH, lo: 1, hi: 13}
    reason: months 1-12 plus 13 for the annual normal
    certainty: 75
