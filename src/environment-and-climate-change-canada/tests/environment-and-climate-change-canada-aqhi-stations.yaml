spec_id: environment-and-climate-change-canada-aqhi-stations
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 100}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: location_id
  - unique: location_id
    certainty: 95
