spec_id: environment-and-climate-change-canada-ahccd-trends
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 80000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: station_id__id_station
  - unique: [station_id__id_station, period__periode, measurement_type__type_mesure]
    reason: one trend per station per period per measured element
    certainty: 90
  - matches: {col: year_range__annees, pattern: '^[0-9]{4}-[0-9]{4}$'}
    certainty: 80
    reason: trends are computed over a closed year range
