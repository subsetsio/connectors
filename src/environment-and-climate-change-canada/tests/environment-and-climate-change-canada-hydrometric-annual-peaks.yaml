spec_id: environment-and-climate-change-canada-hydrometric-annual-peaks
status: active
tests:
  - not_null: feature_id
  - unique: feature_id
    reason: feature_id is the OGC feature id; duplicates mean a station partition was written twice
    certainty: 95
  - row_count: {min: 150000}
    reason: floor set well under the count observed while authoring; a drop means partial loss
    certainty: 90
  - not_null: STATION_NUMBER
  - freshness: {col: DATE, reaches: today - 730d}
    reason: annual peaks are published a season or more after the water year closes; 2y slack. A stale max means ECCC has not released, not that we dropped rows.
    points_outward: true
