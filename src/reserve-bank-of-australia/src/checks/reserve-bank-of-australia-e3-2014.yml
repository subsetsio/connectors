# compiled by `hardened compile-checks` — post-publish audit of `reserve-bank-of-australia-e3-2014`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value_text, details, series_title, description, series_id]
temporal: obs_date
checks:
  - kind: unique
    columns: [value_text, details, series_title, description, series_id]
  - kind: not_null
    col: value_text
  - kind: not_null
    col: details
  - kind: not_null
    col: series_title
  - kind: not_null
    col: description
  - kind: not_null
    col: series_id
  - kind: row_floor
    min: 144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
