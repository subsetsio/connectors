# provisional transform for accepted RBA asset without a measured raw profile yet
# Regenerate with `hardened compile-transforms` after model-verify profiles this raw asset.
# caution: Rows are the source statistical table in long form; series metadata columns identify the measure and unit, and value_text preserves non-numeric source cells.
key: [record_type, source_csv, obs_date, series_id, value_text]
temporal: obs_date
sort: [record_type, source_csv, obs_date, series_id, value_text]
columns:
  - name: series_id
    type: VARCHAR
  - name: series_title
    type: VARCHAR
  - name: description
    type: VARCHAR
  - name: frequency
    type: VARCHAR
  - name: series_type
    type: VARCHAR
  - name: units
    type: VARCHAR
  - name: source
    type: VARCHAR
  - name: publication_date
    type: VARCHAR
  - name: obs_date
    type: DATE
  - name: dimension_date
    type: VARCHAR
  - name: value_text
    type: VARCHAR
  - name: source_csv
    type: VARCHAR
  - name: partition_key
    type: VARCHAR
  - name: record_type
    type: VARCHAR
  - name: break_type
    type: VARCHAR
  - name: details
    type: VARCHAR
