spec_id: reserve-bank-of-australia-f1-use-of-expert-judgement
status: active
coverage:
  frozen: true
  reason: RBA publishes each accepted CSV as a complete backfile or reference file; the connector re-downloads the full file and validates shape/content, while table-level recency varies across live, historical, discontinued, and event assets.
tests:
  - row_count: {min: 1}
    reason: every accepted RBA statistical CSV should produce at least one long-format row
    certainty: 85
    points_outward: true
  - not_null: obs_date
    reason: observation rows are keyed by the date in the first CSV column
    certainty: 95
  - not_null: source_csv
    reason: downloader stamps the source CSV slug on every raw row
    certainty: 99
  - enum: {col: record_type, values: [annotation]}
    reason: this RBA reference file records expert-judgement annotation dates rather than regular statistical observations
    certainty: 95
  - not_null: series_title
    reason: expert-judgement annotations identify the affected RBA series by title
    certainty: 95
