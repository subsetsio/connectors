# compiled by `hardened compile-checks` — post-publish audit of `eba-te-credit-risk`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lei_code, nsa, period, item, portfolio, country, country_rank, exposure, status, perf_status, nace_codes]
temporal: period
checks:
  - kind: unique
    columns: [lei_code, nsa, period, item, portfolio, country, country_rank, exposure, status, perf_status, nace_codes]
  - kind: not_null
    col: lei_code
  - kind: not_null
    col: nsa
  - kind: not_null
    col: period
  - kind: not_null
    col: item
  - kind: not_null
    col: portfolio
  - kind: not_null
    col: country
  - kind: not_null
    col: country_rank
  - kind: not_null
    col: exposure
  - kind: not_null
    col: status
  - kind: not_null
    col: perf_status
  - kind: not_null
    col: nace_codes
  - kind: row_floor
    min: 303461
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
