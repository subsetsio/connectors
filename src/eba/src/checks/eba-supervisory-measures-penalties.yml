# compiled by `hardened compile-checks` — post-publish audit of `eba-supervisory-measures-penalties`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [item_code, item_label, competent_authority, category, framework]
temporal: reporting_year
checks:
  - kind: unique
    columns: [item_code, item_label, competent_authority, category, framework]
  - kind: not_null
    col: item_code
  - kind: not_null
    col: item_label
  - kind: not_null
    col: competent_authority
  - kind: not_null
    col: category
  - kind: not_null
    col: framework
  - kind: row_floor
    min: 844
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
