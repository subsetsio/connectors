# compiled by `hardened compile-checks` — post-publish audit of `eba-te-capital-own-funds`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lei_code, nsa, period, item, assets_fv, assets_stages, exposure, financial_instruments, fin_end_year, n_quarters]
temporal: period
checks:
  - kind: unique
    columns: [lei_code, nsa, period, item, assets_fv, assets_stages, exposure, financial_instruments, fin_end_year, n_quarters]
  - kind: not_null
    col: lei_code
  - kind: not_null
    col: nsa
  - kind: not_null
    col: period
  - kind: not_null
    col: item
  - kind: not_null
    col: assets_fv
  - kind: not_null
    col: assets_stages
  - kind: not_null
    col: exposure
  - kind: not_null
    col: financial_instruments
  - kind: not_null
    col: fin_end_year
  - kind: not_null
    col: n_quarters
  - kind: row_floor
    min: 13794
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
