# compiled by `hardened compile-checks` — post-publish audit of `eba-risk-dashboard-kri`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, country, indicator_name, indicator_code]
temporal: period
checks:
  - kind: unique
    columns: [period, country, indicator_name, indicator_code]
  - kind: not_null
    col: period
  - kind: not_null
    col: country
  - kind: not_null
    col: indicator_name
  - kind: not_null
    col: indicator_code
  - kind: row_floor
    min: 13329
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
