# compiled by `hardened compile-checks` — post-publish audit of `eba-te-data-dictionary`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [label, item, template, category, csv_file]
checks:
  - kind: unique
    columns: [label, item, template, category, csv_file]
  - kind: not_null
    col: label
  - kind: not_null
    col: item
  - kind: not_null
    col: template
  - kind: not_null
    col: category
  - kind: not_null
    col: csv_file
  - kind: row_floor
    min: 172
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
