# compiled by `hardened compile-checks` — post-publish audit of `eba-risk-dashboard-credit-parameters`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, segment, period, statistic, metric]
temporal: period
checks:
  - kind: unique
    columns: [country, segment, period, statistic, metric]
  - kind: not_null
    col: country
  - kind: not_null
    col: segment
  - kind: not_null
    col: period
  - kind: not_null
    col: statistic
  - kind: not_null
    col: metric
  - kind: row_floor
    min: 21752
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
