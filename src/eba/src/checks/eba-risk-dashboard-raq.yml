# compiled by `hardened compile-checks` — post-publish audit of `eba-risk-dashboard-raq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [answer, question, period_label, period]
temporal: period
checks:
  - kind: unique
    columns: [answer, question, period_label, period]
  - kind: not_null
    col: answer
  - kind: not_null
    col: question
  - kind: not_null
    col: period_label
  - kind: not_null
    col: period
  - kind: row_floor
    min: 712
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
