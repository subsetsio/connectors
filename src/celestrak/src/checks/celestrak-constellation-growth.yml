# compiled by `hardened compile-checks` — post-publish audit of `celestrak-constellation-growth`.
# Grain/temporal from the transform contract. Row floor is hand-tuned because
# this table is an aggregate rollup over the measured SATCAT raw profile.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [constellation, year]
temporal: year
checks:
  - kind: unique
    columns: [constellation, year]
  - kind: not_null
    col: constellation
  - kind: not_null
    col: year
  - kind: row_floor
    min: 200
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
