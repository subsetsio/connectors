spec_id: celestrak-launches-by-country
status: active
# Raw table derived from SATCAT object rows by owner code and launch year.
tests:
  - not_null: year
    reason: every aggregate row is keyed by launch year
    certainty: 95
  - not_null: country
    reason: every aggregate row is keyed by SATCAT owner country or organization code
    certainty: 95
  - unique: [year, country]
    reason: the raw aggregate has one row per launch year and owner code
    certainty: 92
  - column_type: {col: payloads, type: integer}
  - column_type: {col: rocket_bodies, type: integer}
  - column_type: {col: debris, type: integer}
  - column_type: {col: total, type: integer}
  - row_count: {min: 1000, max: 5000}
    reason: SATCAT owner-year aggregation should remain a compact annual panel
    certainty: 85
  - freshness: {col: year, reaches: current_year()}
    reason: CelesTrak SATCAT updates daily and current-year launches should be represented
    certainty: 80
  - matches: {col: year, pattern: '^\d{4}$'}
    reason: launch years are four-digit calendar years
    certainty: 90
  - between: {col: total, lo: 1, hi: 5000}
    reason: owner-year total object counts are positive and bounded below full SATCAT size
    certainty: 80
    severity: warn
