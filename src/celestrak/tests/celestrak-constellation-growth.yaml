spec_id: celestrak-constellation-growth
status: active
# Raw table derived from SATCAT payload rows by object-name prefix.
tests:
  - not_null: year
    reason: every aggregate row is keyed by launch year
    certainty: 95
  - not_null: constellation
    reason: every aggregate row is keyed by inferred constellation name
    certainty: 95
  - unique: [constellation, year]
    reason: the raw aggregate has one row per inferred constellation and launch year
    certainty: 92
  - column_type: {col: launched_that_year, type: integer}
  - column_type: {col: cumulative_total, type: integer}
  - column_type: {col: active_count, type: integer}
  - row_count: {min: 200, max: 1000}
    reason: major named constellations produce a compact annual panel, not object-level rows
    certainty: 85
  - freshness: {col: year, reaches: current_year()}
    reason: CelesTrak SATCAT updates daily and major constellation launches should be represented through the current year
    certainty: 75
  - enum: {col: category, values: [communications, navigation, weather, earth_observation]}
    reason: constellation groups are assigned to the authored broad category vocabulary
    certainty: 85
  - between: {col: launched_that_year, lo: 1, hi: 5000}
    reason: annual launch counts are positive and bounded far below full SATCAT size
    certainty: 80
    severity: warn
  - between: {col: cumulative_total, lo: 1, hi: 50000}
    reason: cumulative constellation counts should be positive and bounded below the full catalog size
    certainty: 80
    severity: warn
