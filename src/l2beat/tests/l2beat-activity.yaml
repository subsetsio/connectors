spec_id: l2beat-activity
status: active
tests:
  - row_count: {min: 30000}
    reason: full max-range activity history across roughly 100 projects produces tens of thousands of daily rows; a smaller table suggests many project fetches were skipped.
    certainty: 85
  - not_null: project_slug
  - not_null: timestamp
  - column_type: {col: project_slug, type: string}
  - column_type: {col: timestamp, type: integer}
  - column_type: {col: tx_count, type: integer}
  - column_type: {col: uops_count, type: integer}
  - unique: [project_slug, timestamp]
    reason: each activity chart has at most one daily point per project/timestamp.
    certainty: 90
  - distinct_count: {col: project_slug, min: 70}
    reason: most tracked projects plus the ecosystem aggregate should have an activity series; a much lower count indicates silent partial fetch loss.
    certainty: 80
  - between: {col: timestamp, lo: 1609459200, hi: 4102444800}
    reason: activity history starts after 2021 and should not contain dates beyond year 2100.
    certainty: 90
  - freshness: {col: timestamp, reaches: today - 7d}
    reason: L2BEAT activity charts are daily/current; max timestamp older than one week means the feed or fetch is stale.
    certainty: 90
    points_outward: true
