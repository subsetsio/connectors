# compiled by `hardened compile-checks` — post-publish audit of `geostat-gender-20statistics-demography-05-live-births-by-order-of-birth`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, birth_order, gender]
checks:
  - kind: unique
    columns: [year, birth_order, gender]
  - kind: not_null
    col: year
  - kind: not_null
    col: birth_order
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 94
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
