    columns: [grade, years, sex]
  - kind: not_null
    col: grade
  - kind: not_null
    col: years
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 24
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
