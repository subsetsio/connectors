# compiled by `hardened compile-checks` — post-publish audit of `geostat-environment-20statistics-natural-20hazards-20and-20violations-20of-20law-2-envr-hydro-hazard`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, year, hydrometeorological_hazard]
checks:
  - kind: unique
    columns: [month, year, hydrometeorological_hazard]
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: not_null
    col: hydrometeorological_hazard
  - kind: row_floor
    min: 468
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
