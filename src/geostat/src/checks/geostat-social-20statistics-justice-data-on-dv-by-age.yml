# compiled by `hardened compile-checks` — post-publish audit of `geostat-social-20statistics-justice-data-on-dv-by-age`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, age, year, gender, perpetrator_victim]
checks:
  - kind: unique
    columns: [region, age, year, gender, perpetrator_victim]
  - kind: not_null
    col: region
  - kind: not_null
    col: age
  - kind: not_null
    col: year
  - kind: not_null
    col: gender
  - kind: not_null
    col: perpetrator_victim
  - kind: row_floor
    min: 1560
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
