    columns: [years, age, gender]
  - kind: not_null
    col: years
  - kind: not_null
    col: age
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 84
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
