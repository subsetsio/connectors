# compiled by `hardened compile-checks` — post-publish audit of `geostat-gender-20statistics-agriculture-10-production-volume-of-agricultural-holdings-per-labour-day`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, year, holdings]
checks:
  - kind: unique
    columns: [sex, year, holdings]
  - kind: not_null
    col: sex
  - kind: not_null
    col: year
  - kind: not_null
    col: holdings
  - kind: row_floor
    min: 6
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
