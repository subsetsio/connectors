# compiled by `hardened compile-checks` — post-publish audit of `geostat-social-20statistics-health-morbidity-by-main-disease-groups`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [years, main_diseases, population_group]
checks:
  - kind: unique
    columns: [years, main_diseases, population_group]
  - kind: not_null
    col: years
  - kind: not_null
    col: main_diseases
  - kind: not_null
    col: population_group
  - kind: row_floor
    min: 500
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
