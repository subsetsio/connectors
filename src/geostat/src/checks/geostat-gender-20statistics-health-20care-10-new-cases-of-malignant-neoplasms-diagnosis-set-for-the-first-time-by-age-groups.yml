# compiled by `hardened compile-checks` — post-publish audit of `geostat-gender-20statistics-health-20care-10-new-cases-of-malignant-neoplasms-diagnosis-set-for-the-first-time-by-age-groups`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
