# compiled by `hardened compile-checks` — post-publish audit of `geostat-environment-20statistics-environmental-20indicators-a1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cutting_purpose, forest_type]
checks:
  - kind: unique
    columns: [year, cutting_purpose, forest_type]
  - kind: not_null
    col: year
  - kind: not_null
    col: cutting_purpose
  - kind: not_null
    col: forest_type
  - kind: row_floor
    min: 88
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
