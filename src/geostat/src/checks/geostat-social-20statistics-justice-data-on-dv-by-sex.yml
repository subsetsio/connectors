    columns: [years, regions, sex, victims_perpetrators]
  - kind: not_null
    col: years
  - kind: not_null
    col: regions
  - kind: not_null
    col: sex
  - kind: not_null
    col: victims_perpetrators
  - kind: row_floor
    min: 702
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
