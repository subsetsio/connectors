spec_id: geysertimes-geysers
status: active
tests:
  - not_null: geyser_id
    certainty: 99
  - unique: geyser_id
    reason: one row per geyser in the reference catalog
    certainty: 95
  - not_null: geyser_name
    certainty: 95
  - row_count: {min: 300}
    reason: ~480 geysers catalogued; far fewer means /geysers returned a partial payload
    certainty: 85
  - between: {col: latitude, lo: -45.0, hi: 65.0}
    reason: geyser catalog includes Yellowstone plus some international geysers; valid latitudes stay in a plausible terrestrial range
    certainty: 80
    severity: warn
  - between: {col: longitude, lo: -180.0, hi: 180.0}
    reason: longitude values should be valid decimal degrees
    certainty: 80
    severity: warn
