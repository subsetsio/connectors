spec_id: geysertimes-eruptions
status: active
tests:
  - not_null: eruption_id
    reason: every eruption record has an eruptionID primary key
    certainty: 99
  - unique: eruption_id
    reason: one row per eruption; dupes mean a year batch was double-counted or QUALIFY dedup failed
    certainty: 95
  - column_type: {col: geyser_id, type: integer}
    certainty: 95
  - not_null: geyser_id
    reason: every eruption references a geyser
    certainty: 95
  - not_null: eruption_time
    certainty: 95
  - column_type: {col: eruption_time, type: timestamp}
    certainty: 90
  - row_count: {min: 500000}
    reason: corpus is ~1M+ eruptions 1970-present (2015 alone ~57k); <500k means year chunking dropped batches
    certainty: 85
  - freshness: {col: eruption_time, reaches: today - 30d}
    reason: an active community logs eruptions continuously; a stale max means harvesting stopped
    certainty: 75
    points_outward: true
    severity: warn
