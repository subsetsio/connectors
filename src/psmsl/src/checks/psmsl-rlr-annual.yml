# compiled by `hardened compile-checks` — post-publish audit of `psmsl-rlr-annual`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [station_id, year, data_flag, missing_flag]
temporal: year
checks:
  - kind: unique
    columns: [station_id, year, data_flag, missing_flag]
  - kind: not_null
    col: station_id
  - kind: not_null
    col: year
  - kind: not_null
    col: data_flag
  - kind: not_null
    col: missing_flag
  - kind: row_floor
    min: 32739
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
