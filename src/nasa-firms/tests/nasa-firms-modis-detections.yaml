spec_id: nasa-firms-modis-detections
status: active
tests:
  - not_null: latitude
    reason: every detection has a geolocation; nulls mean a parse/column-shift bug
    certainty: 98
  - not_null: longitude
    certainty: 98
  - column_type: {col: latitude, type: float}
    certainty: 95
  - column_type: {col: frp, type: float}
    certainty: 90
  - between: {col: latitude, lo: -90, hi: 90}
    reason: WGS84 latitude bounds
    certainty: 98
  - between: {col: longitude, lo: -180, hi: 180}
    reason: WGS84 longitude bounds
    certainty: 98
  - at_least: {col: frp, expr: 0}
    reason: fire radiative power is non-negative
    certainty: 90
  - enum: {col: daynight, values: [D, N]}
    reason: MODIS day/night flag is D or N
    certainty: 95
  - matches: {col: acq_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: acq_date is a raw YYYY-MM-DD string at the raw layer
    certainty: 95
  - enum: {col: satellite, values: [Terra, Aqua]}
    reason: MODIS flies on Terra and Aqua
    certainty: 85
    severity: warn
  - matches: {col: confidence, pattern: '^[0-9]{1,3}$'}
    reason: MODIS confidence is an integer 0-100 (stored as string in raw)
    certainty: 85
    severity: warn
  - between: {col: brightness, lo: 200, hi: 600}
    reason: MODIS band-21/22 brightness temperature in Kelvin
    certainty: 70
    severity: warn
  - row_count: {min: 1000000}
    reason: full MODIS history across all countries is tens of millions of rows; a tiny table means the archive crawl broke
    certainty: 90
