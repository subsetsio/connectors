# compiled by `hardened compile-checks` — post-publish audit of `stanford-open-policing-project-ca-anaheim`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, row_number, raw_row_number, reason_for_stop]
temporal: date
checks:
  - kind: unique
    columns: [date, row_number, raw_row_number, reason_for_stop]
  - kind: not_null
    col: date
  - kind: not_null
    col: row_number
  - kind: not_null
    col: raw_row_number
  - kind: not_null
    col: reason_for_stop
  - kind: row_floor
    min: 43938
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
