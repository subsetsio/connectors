# compiled by `hardened compile-checks` — post-publish audit of `stanford-open-policing-project-ct-hartford`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, raw_row_number, location, lat, lng]
temporal: date
checks:
  - kind: unique
    columns: [row_number, raw_row_number, location, lat, lng]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: raw_row_number
  - kind: not_null
    col: location
  - kind: not_null
    col: lat
  - kind: not_null
    col: lng
  - kind: row_floor
    min: 9219
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
