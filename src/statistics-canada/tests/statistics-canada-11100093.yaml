spec_id: statistics-canada-11100093
status: active
tests:
  - not_null: REF_DATE
    reason: every StatCan full-table CSV row carries a reference period (REF_DATE); nulls mean a column-shift or parse break in the bulk CSV
    certainty: 95
  - not_null: VECTOR
    reason: every series row in the WDS full-table CSV carries its vector id (e.g. v12345); a null VECTOR means the standard envelope columns did not parse
    certainty: 95
  - not_null: COORDINATE
    reason: every observation carries its dotted dimension-member COORDINATE; nulls indicate a malformed/truncated download
    certainty: 95
  - matches: {col: VECTOR, pattern: '^v[0-9]+$'}
    reason: StatCan vector ids are the literal 'v' followed by digits; a mismatch means the VECTOR column is misaligned
    certainty: 85
    severity: warn
  - row_count:
      min: 1
    reason: a rank-accepted cube exposes at least one observation; 0 rows means the bulk zip resolved but the inner CSV was empty/truncated
    certainty: 85
