# compiled by `hardened compile-checks` — post-publish audit of `who-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [observation_id, updated_at, indicator_code, spatial_dim, time_dimension_value]
temporal: time_dimension_begin
checks:
  - kind: unique
    columns: [observation_id, updated_at, indicator_code, spatial_dim, time_dimension_value]
  - kind: not_null
    col: observation_id
  - kind: not_null
    col: updated_at
  - kind: not_null
    col: indicator_code
  - kind: not_null
    col: spatial_dim
  - kind: not_null
    col: time_dimension_value
  - kind: row_floor
    min: 5087085
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
