spec_id: eurofound-covid19-eu-policywatch
status: active
coverage:
  frozen: true
  reason: COVID-19 EU PolicyWatch is a closed pandemic-era policy-measures database, fetched as a full static JSON export; its observation dates are historical policy dates rather than an advancing publication stream
tests:
  - not_null: record_id
  - not_null: country
  - row_count: {min: 1000}
    reason: ~3167 COVID-19 EU PolicyWatch measures
    certainty: 85
  - distinct_count: {col: country, min: 20}
    reason: measures recorded across EU27+ countries
    certainty: 70
    severity: warn
  - matches: {col: start_date, pattern: '^[0-9]{2}/[0-9]{2}/[0-9]{4}$'}
    reason: raw start dates are MM/DD/YYYY strings (the transform casts them to DATE)
    certainty: 65
    severity: warn
