spec_id: eurofound-collectively-agreed-wages-nace
status: active
tests:
  - not_null: agreement_id
  - not_null: country
  - not_null: nace_code
  - row_count: {min: 1000}
    reason: NACE lookup sheet has roughly 1.2k agreement-sector rows in the collectively agreed wages workbook
    certainty: 80
  - distinct_count: {col: country, min: 10}
    reason: collective-agreement wage coverage spans many EU member states
    certainty: 70
    severity: warn
  - matches: {col: agreement_id, pattern: '^CA-.*'}
    reason: wage database agreement identifiers use the CA-* convention
    certainty: 70
    severity: warn
