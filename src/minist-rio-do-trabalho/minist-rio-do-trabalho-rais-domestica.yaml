spec_id: minist-rio-do-trabalho-rais-domestica
status: active
tests:
  - not_null: arquivo_fonte
    reason: every row is injected with its source archive name during parsing
    certainty: 98
  - not_null: ano
    reason: RAIS TXT carries no year column; the reference year is injected from the FTP directory
    certainty: 98
  - column_type: {col: ano, type: integer}
    certainty: 90
  - at_least: {col: ano, expr: 1985}
    reason: PDET RAIS microdata begins in 1985
    certainty: 90
  - at_most: {col: ano, expr: current_year()}
    reason: annual census; a future year would mean a mislabelled directory
    certainty: 85
    points_outward: true
    severity: warn
