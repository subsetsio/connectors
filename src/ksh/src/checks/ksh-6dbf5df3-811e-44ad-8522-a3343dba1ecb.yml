    columns: [obs_value, activity, indicator, obs_status, conf_status]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: activity
  - kind: not_null
    col: indicator
  - kind: not_null
    col: obs_status
  - kind: not_null
    col: conf_status
  - kind: row_floor
    min: 216
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
