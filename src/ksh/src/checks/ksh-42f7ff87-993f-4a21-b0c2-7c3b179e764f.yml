    col: time_period
  - kind: not_null
    col: activity
  - kind: not_null
    col: seasonal_adjust
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 4515
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
