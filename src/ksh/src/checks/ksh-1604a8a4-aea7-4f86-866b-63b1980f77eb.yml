# compiled by `hardened compile-checks` — post-publish audit of `ksh-1604a8a4-aea7-4f86-866b-63b1980f77eb`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [values, age, c_birth, time, sex]
temporal: time
checks:
  - kind: unique
    columns: [values, age, c_birth, time, sex]
  - kind: not_null
    col: values
  - kind: not_null
    col: age
  - kind: not_null
    col: c_birth
  - kind: not_null
    col: time
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 7128
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
