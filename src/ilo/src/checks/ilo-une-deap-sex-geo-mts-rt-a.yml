# compiled by `hardened compile-checks` — post-publish audit of `ilo-une-deap-sex-geo-mts-rt-a`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ref_area, source, time_period, sex, classif1, classif2]
temporal: date
checks:
  - kind: unique
    columns: [ref_area, source, time_period, sex, classif1, classif2]
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: source
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sex
  - kind: not_null
    col: classif1
  - kind: not_null
    col: classif2
  - kind: row_floor
    min: 52051
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
