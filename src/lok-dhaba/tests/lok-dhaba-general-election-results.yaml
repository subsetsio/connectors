spec_id: lok-dhaba-general-election-results
status: active
coverage:
  frozen: true
  reason: static bulk export snapshot last modified 2023-06-02; no published update cadence found
tests:
  - not_null: State_Name
  - not_null: Assembly_No
  - not_null: Constituency_No
  - not_null: Year
