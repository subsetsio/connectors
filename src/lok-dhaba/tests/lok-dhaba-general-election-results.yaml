    certainty: 90
  - not_null: Election_Type
  - column_type: {col: Year, type: string}
  - column_type: {col: Votes, type: string}
  - column_type: {col: Candidate, type: string}
  - row_count: {min: 50000}
    reason: verified all-states GE export has roughly ninety thousand rows
    certainty: 85
  - matches: {col: Election_Type, pattern: '.*Lok Sabha Election.*'}
    certainty: 90
