spec_id: odepa-precios-mayoristas-de-flores-y-follajes
status: active
tests:
  - freshness: {col: Fecha, reaches: today - 14d}
    reason: wholesale flower and foliage prices are published on regular market days
    certainty: 85
  - not_null: Fecha
    reason: each wholesale flower price is stamped with its capture date
    certainty: 98
  - not_null: Producto
    reason: a price observation without a product is meaningless
    certainty: 95
  - matches: {col: Fecha, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: Fecha is an ISO date string in the raw CSV
    certainty: 92
  - row_count: {min: 1000}
    reason: daily flower-market prices across products and varieties over several years
    certainty: 80
