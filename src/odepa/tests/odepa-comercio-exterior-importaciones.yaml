spec_id: odepa-comercio-exterior-importaciones
status: active
tests:
  - not_null: Anio
    reason: every trade record carries its year
    certainty: 98
  - not_null: Producto
    reason: every import line names the product
    certainty: 95
  - not_null: Pais origen
    reason: imports record an origin country (distinguishes the import schema from exports)
    certainty: 90
  - matches: {col: Anio, pattern: '^\d{4}$'}
    reason: Anio is a 4-digit year string
    certainty: 95
  - row_count: {min: 10000}
    reason: monthly product x origin imports across 1998..present is a large table
    certainty: 85
