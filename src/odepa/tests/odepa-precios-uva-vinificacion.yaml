spec_id: odepa-precios-uva-vinificacion
status: active
tests:
  - freshness: {col: Fecha precio vigente, reaches: today - 180d}
    reason: wine-grape purchase prices are seasonal, so the latest effective price date can lag outside harvest windows
    certainty: 80
  - not_null: Anio
    reason: each wine-grape spot price carries its year
    certainty: 98
  - not_null: Variedad
    reason: the grape variety is the core dimension of this dataset
    certainty: 92
  - matches: {col: Anio, pattern: '^\d{4}$'}
    reason: Anio is a 4-digit year string
    certainty: 95
  - row_count: {min: 100}
    reason: spot prices from buying centres since 2020 — smaller, seasonal dataset
    certainty: 80
