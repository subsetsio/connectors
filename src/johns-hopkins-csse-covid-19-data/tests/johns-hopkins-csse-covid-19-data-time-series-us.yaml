spec_id: johns-hopkins-csse-covid-19-data-time-series-us
status: active
tests:
  - not_null: date
    reason: every melted row is a (geography, date, metric) cell; a null date means the wide->long melt mis-indexed the date header columns.
    certainty: 95
  - not_null: value
    reason: empty cells are skipped during melt, so every emitted row carries a cumulative count.
    certainty: 90
  - not_null: uid
    reason: UID is the first column and populated on every JHU US time-series row.
    certainty: 90
  - not_null: combined_key
    reason: Combined_Key (county, state, US) is populated on every US time-series row.
    certainty: 85
  - enum: {col: metric, values: [confirmed, deaths]}
    reason: the US time series exposes only confirmed and deaths (no recovered file).
    certainty: 95
  - row_count: {min: 3000000}
    reason: ~3340 US county-level rows x ~1140 daily columns x 2 metrics ~= 7.6M cells.
    certainty: 75
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: dates are reformatted from M/D/YY headers to ISO during melt.
    certainty: 80
    severity: warn
