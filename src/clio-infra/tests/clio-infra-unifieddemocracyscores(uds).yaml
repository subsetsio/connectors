spec_id: clio-infra-unifieddemocracyscores(uds)
status: active
tests:
  - not_null: year
  - not_null: value
  - not_null: country
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - row_count: {min: 5903}
    reason: upstream badge reports ~8434 observations; >=70% guards against a truncated/partial download
    certainty: 80
  - between: {col: year, lo: 1941, hi: 2013}
    reason: indicator's stated coverage span is 1946-2008 (+/-5y slack)
    certainty: 75
    points_outward: true
    severity: warn
  - at_most: {col: year, expr: current_year()}
    reason: historical reconstruction; no future-dated observations expected
    certainty: 90
    points_outward: true
