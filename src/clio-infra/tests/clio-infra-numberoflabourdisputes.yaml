spec_id: clio-infra-numberoflabourdisputes
status: active
tests:
  - not_null: year
  - not_null: value
  - not_null: country
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - row_count: {min: 3365}
    reason: upstream badge reports ~4808 observations; >=70% guards against a truncated/partial download
    certainty: 80
  - between: {col: year, lo: 1922, hi: 2018}
    reason: indicator's stated coverage span is 1927-2013 (+/-5y slack)
    certainty: 75
    points_outward: true
    severity: warn
  - at_most: {col: year, expr: current_year()}
    reason: historical reconstruction; no future-dated observations expected
    certainty: 90
    points_outward: true
