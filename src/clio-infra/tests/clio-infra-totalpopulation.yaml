spec_id: clio-infra-totalpopulation
status: active
coverage:
  frozen: true
  reason: Clio Infra compact indicator workbooks are historical reconstruction snapshots with no published update cadence; treat temporal coverage as frozen until the source republishes the files.
tests:
  - not_null: year
  - not_null: value
  - not_null: country
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - row_count: {min: 2254}
    reason: upstream badge reports ~3221 observations; >=70% guards against a truncated/partial download
    certainty: 80
  - between: {col: year, lo: 1495, hi: 2005}
    reason: indicator's stated coverage span is 1500-2000 (+/-5y slack)
    certainty: 75
    points_outward: true
    severity: warn
  - at_most: {col: year, expr: current_year()}
    reason: historical reconstruction; no future-dated observations expected
    certainty: 90
    points_outward: true
