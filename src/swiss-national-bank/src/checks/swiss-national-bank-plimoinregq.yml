# compiled by `hardened compile-checks` — post-publish audit of `swiss-national-bank-plimoinregq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period_start, period, series_key, dimensions_json, series_label]
temporal: period_start
checks:
  - kind: unique
    columns: [period_start, period, series_key, dimensions_json, series_label]
  - kind: not_null
    col: period_start
  - kind: not_null
    col: period
  - kind: not_null
    col: series_key
  - kind: not_null
    col: dimensions_json
  - kind: not_null
    col: series_label
  - kind: row_floor
    min: 3927
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
