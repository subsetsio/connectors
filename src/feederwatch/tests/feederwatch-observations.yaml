spec_id: feederwatch-observations
status: active
tests:
  - unique: [SUB_ID, LOC_ID, LATITUDE, LONGITUDE, SPECIES_CODE]
    reason: verified raw grain is one species observation per submitted checklist at a location
    certainty: 90
  - not_null: LOC_ID
    reason: every observation is tied to a count location
    certainty: 95
  - not_null: Year
    certainty: 95
  - row_count: {min: 1000000}
    reason: 1988-1995 alone holds ~2.95M rows; the full 1988-2024 corpus is tens of millions
    certainty: 95
  - matches: {col: LOC_ID, pattern: '^L[0-9]+$'}
    reason: FeederWatch location ids are 'L' followed by digits
    certainty: 85
  - matches: {col: Year, pattern: '^(19|20)[0-9]{2}$'}
    reason: counts span 1988 to the latest published season
    certainty: 90
  - freshness: {col: Year, reaches: current_year()}
    reason: FeederWatch publishes a refreshed full public data release annually, usually around June
    certainty: 80
  - distinct_count: {col: SPECIES_CODE, min: 100}
    reason: hundreds of species are reported across the corpus
    certainty: 80
