# compiled by `hardened compile-checks` — post-publish audit of `feederwatch-observations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sub_id, loc_id, latitude, longitude, species_code]
temporal: month
checks:
  - kind: unique
    columns: [sub_id, loc_id, latitude, longitude, species_code]
  - kind: not_null
    col: sub_id
  - kind: not_null
    col: loc_id
  - kind: not_null
    col: latitude
  - kind: not_null
    col: longitude
  - kind: not_null
    col: species_code
  - kind: row_floor
    min: 22586898
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
