spec_id: canada-mortgage-and-housing-corporation-17ef49cd-d0e2-4945-98f6-9ed7e153b4b0
status: active
tests:
  - not_null: ref_date
    reason: every StatCan long-format row carries a reference period (REF_DATE)
    certainty: 97
  - not_null: geo
    reason: StatCan tables are geographically dimensioned; GEO is always present
    certainty: 95
  - not_null: vector
    reason: StatCan assigns a series vector id to every observation
    certainty: 95
  - column_type: {col: value, type: float}
    reason: VALUE is the numeric observation; normalised to double (null when suppressed)
    certainty: 90
  - column_type: {col: ref_date, type: string}
    reason: REF_DATE is kept verbatim (YYYY or YYYY-MM), not date-cast
    certainty: 95
  - row_count: {min: 1}
    reason: a CMHC/StatCan housing table always has at least one observation
    certainty: 99
  - unique: [vector, ref_date]
    reason: one observation per (series vector, reference period) within the source
    certainty: 80
    severity: warn
