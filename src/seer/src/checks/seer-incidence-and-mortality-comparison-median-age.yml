# compiled by `hardened compile-checks` — post-publish audit of `seer-incidence-and-mortality-comparison-median-age`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, race, data_type, site]
checks:
  - kind: unique
    columns: [sex, race, data_type, site]
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: data_type
  - kind: not_null
    col: site
  - kind: row_floor
    min: 880
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
