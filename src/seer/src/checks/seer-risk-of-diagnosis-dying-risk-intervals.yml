# compiled by `hardened compile-checks` — post-publish audit of `seer-risk-of-diagnosis-dying-risk-intervals`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [stat_type, sex, race, age_range, site, risk_interval]
checks:
  - kind: unique
    columns: [stat_type, sex, race, age_range, site, risk_interval]
  - kind: not_null
    col: stat_type
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: age_range
  - kind: not_null
    col: site
  - kind: not_null
    col: risk_interval
  - kind: row_floor
    min: 18240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
