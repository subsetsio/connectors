# compiled by `hardened compile-checks` — post-publish audit of `seer-survival-long-term-trends`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [relative_survival_interval, sex, race, age_range, site, year]
temporal: year
checks:
  - kind: unique
    columns: [relative_survival_interval, sex, race, age_range, site, year]
  - kind: not_null
    col: relative_survival_interval
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: age_range
  - kind: not_null
    col: site
  - kind: not_null
    col: year
  - kind: row_floor
    min: 24768
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
