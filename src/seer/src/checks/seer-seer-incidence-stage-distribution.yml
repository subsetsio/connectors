# compiled by `hardened compile-checks` — post-publish audit of `seer-seer-incidence-stage-distribution`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sex, race, age_range, stage, site]
checks:
  - kind: unique
    columns: [sex, race, age_range, stage, site]
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: age_range
  - kind: not_null
    col: stage
  - kind: not_null
    col: site
  - kind: row_floor
    min: 25240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
