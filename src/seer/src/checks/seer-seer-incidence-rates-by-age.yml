# compiled by `hardened compile-checks` — post-publish audit of `seer-seer-incidence-rates-by-age`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [rate_type, sex, race, subtype, site, age_range]
checks:
  - kind: unique
    columns: [rate_type, sex, race, subtype, site, age_range]
  - kind: not_null
    col: rate_type
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: subtype
  - kind: not_null
    col: site
  - kind: not_null
    col: age_range
  - kind: row_floor
    min: 23227
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
