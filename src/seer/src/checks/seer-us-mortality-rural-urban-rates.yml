# compiled by `hardened compile-checks` — post-publish audit of `seer-us-mortality-rural-urban-rates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [rucc, sex, race, age_range, site]
checks:
  - kind: unique
    columns: [rucc, sex, race, age_range, site]
  - kind: not_null
    col: rucc
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: age_range
  - kind: not_null
    col: site
  - kind: row_floor
    min: 449
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
