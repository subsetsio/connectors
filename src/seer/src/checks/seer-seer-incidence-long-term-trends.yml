# compiled by `hardened compile-checks` — post-publish audit of `seer-seer-incidence-long-term-trends`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [rate_type, sex, race, age_range, subtype, site, year]
temporal: year
checks:
  - kind: unique
    columns: [rate_type, sex, race, age_range, subtype, site, year]
  - kind: not_null
    col: rate_type
  - kind: not_null
    col: sex
  - kind: not_null
    col: race
  - kind: not_null
    col: age_range
  - kind: not_null
    col: subtype
  - kind: not_null
    col: site
  - kind: not_null
    col: year
  - kind: row_floor
    min: 212358
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
