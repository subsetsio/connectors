spec_id: dallas-fed-wei
status: active
tests:
  - not_null: date
  - not_null: wei
  - column_type: {col: date, type: date}
  - column_type: {col: wei, type: float}
  - between: {col: wei, lo: -15, hi: 15}
    reason: WEI is scaled to four-quarter GDP growth; historically roughly -12..+12
    certainty: 80
    severity: warn
  - row_count: {min: 700}
    reason: weekly since 2008
    certainty: 85
  - freshness: {col: date, reaches: today - 30d}
    reason: weekly release; latest point should be within a few weeks
    certainty: 75
    points_outward: true
    severity: warn
