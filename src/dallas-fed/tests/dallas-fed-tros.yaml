spec_id: dallas-fed-tros
status: active
coverage:
  frozen: true
  reason: >-
    The Texas Retail Outlook Survey was discontinued; the final release was the
    December 2025 data (last observation 2025-12-01) and no results are
    published starting with the January 2026 release. Retail conditions now live
    only inside the Texas Service Sector Outlook Survey (tssos). The tros_alldata
    workbooks are a closed historical corpus that no longer advances.
tests:
  - not_null: date
  - not_null: value
  - not_null: series_code
  - column_type: {col: date, type: date}
  - column_type: {col: value, type: float}
  - enum: {col: component, values: [net_index, increase, no_change, decrease]}
    reason: each survey question yields a net diffusion index plus increase/no_change/decrease shares
    certainty: 90
  - row_count: {min: 8000}
    reason: long monthly/quarterly history across many questions; far fewer means a workbook or sheet failed to parse
    certainty: 80
