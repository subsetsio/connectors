spec_id: correlates-of-war-mid-dispute
status: active
tests:
  - not_null: dispnum
    reason: dispnum is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - row_count: {min: 1500}
    reason: COW publishes these as complete static panels; far fewer rows than the published release means a truncated download or wrong member extracted.
    certainty: 90
  - unique: dispnum
    reason: one row per dispnum in this panel; duplicates would mean the raw was double-written or the source shipped overlap.
    certainty: 88
    severity: warn
