    reason: StateAbb is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - not_null: CCode
    reason: CCode is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
