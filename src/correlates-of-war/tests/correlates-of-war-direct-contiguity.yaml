spec_id: correlates-of-war-direct-contiguity
status: active
tests:
  - not_null: statelno
    reason: statelno is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - not_null: statehno
    reason: statehno is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - not_null: conttype
    reason: conttype is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - row_count: {min: 200}
    reason: COW publishes these as complete static panels; far fewer rows than the published release means a truncated download or wrong member extracted.
    certainty: 90
