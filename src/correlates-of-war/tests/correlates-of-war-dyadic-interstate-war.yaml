    reason: statea is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
  - not_null: stateb
    reason: stateb is a primary identifier column present on every COW row for this table; a null means the CSV header misaligned or columns shifted on parse.
    certainty: 95
