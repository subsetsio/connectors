# compiled by `hardened compile-checks` — post-publish audit of `eiopa-group-own-funds`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reporting_entity, reference_period, frequency, item_code]
temporal: reference_period
checks:
  - kind: unique
    columns: [reporting_entity, reference_period, frequency, item_code]
  - kind: not_null
    col: reporting_entity
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: frequency
  - kind: not_null
    col: item_code
  - kind: row_floor
    min: 462
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
