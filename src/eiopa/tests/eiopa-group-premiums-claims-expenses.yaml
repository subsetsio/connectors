spec_id: eiopa-group-premiums-claims-expenses
status: active
tests:
  - freshness: {col: reference_period, reaches: "2025 Q3"}
  - not_null: item_code
    reason: every published row is a Solvency II reporting item; a null item code means a header/footer row leaked
    certainty: 95
  - not_null: reporting_entity
    reason: every row is attributed to a reporting country (solo) or region (group)
    certainty: 92
  - column_type: {col: value, type: float}
    certainty: 90
  - column_type: {col: extraction_date, type: string}
    reason: raw Date of extraction values are yyyymmdd strings; the transform parses them to DATE
    certainty: 88
  - enum: {col: frequency, values: [quarterly]}
    reason: this subset unions only the listed reporting frequencies
    certainty: 95
  - row_count: {min: 1000}
    reason: ~30 EEA reporters x ~10 years x dozens of items yields many thousands of value rows; far fewer means a truncated download
    certainty: 85
  - not_null: metric
    reason: premiums/claims/expenses rows carry the metric-group 'Item' column
    certainty: 80
    severity: warn
