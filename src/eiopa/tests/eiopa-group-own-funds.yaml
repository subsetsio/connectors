spec_id: eiopa-group-own-funds
status: active
tests:
  - freshness: {col: reference_period, reaches: "2025 Q4"}
  - not_null: item_code
    reason: every published row is a Solvency II reporting item; a null item code means a header/footer row leaked
    certainty: 95
  - not_null: reporting_entity
    reason: every row is attributed to a reporting country (solo) or region (group)
    certainty: 92
  - not_null: value
    reason: the transform filters out null Value cells, so the published value column is fully populated
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 90
  - column_type: {col: extraction_date, type: string}
    reason: raw Date of extraction values are yyyymmdd strings; the transform parses them to DATE
    certainty: 88
  - enum: {col: frequency, values: [quarterly, annual]}
    reason: this subset unions only the listed reporting frequencies
    certainty: 95
  - row_count: {min: 900}
    reason: group own-funds data is EEA aggregate only across annual and quarterly periods; far fewer than the current ~900 rows means a truncated download
    certainty: 85
