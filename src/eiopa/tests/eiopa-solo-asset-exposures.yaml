spec_id: eiopa-solo-asset-exposures
status: active
tests:
  - not_null: value_eur_millions
    reason: the transform filters out null Value (euro millions) cells, so the published value column is fully populated
    certainty: 95
  - column_type: {col: value_eur_millions, type: float}
    certainty: 92
  - not_null: reporting_country
    reason: every exposure row is attributed to a reporting country
    certainty: 90
  - not_null: reference_period
    reason: every row carries the quarter it was reported for
    certainty: 90
  - column_type: {col: extraction_date, type: date}
    reason: Date of extraction (yyyymmdd) is parsed to a DATE in the transform
    certainty: 85
  - row_count: {min: 100000}
    reason: the raw-data sheet held ~800k rows (country x CIC category x location of investment x quarter); far fewer means a truncated xlsx parse
    certainty: 85
  - enum: {col: undertaking_type, values: [Life undertakings, Non-Life undertakings, Other undertakings]}
    reason: Solvency II asset exposures split by these three undertaking types
    certainty: 70
    severity: warn
