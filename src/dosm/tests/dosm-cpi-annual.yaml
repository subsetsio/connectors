spec_id: dosm-cpi-annual
# Catalog connector: OpenDOSM dataset; the column list is materialized
# from the first pull. Freshness/coverage authored from the observed shape.
status: deferred
tests:
  - freshness: {col: date, reaches: today - 950d}
    reason: >-
      DOSM still refreshes this annual series (source data_as_of 2025); latest observed date is 2025-01-01. reaches slack = one annual period plus publication lag, so a normal release keeps max(date) within range; a miss points at DOSM, not our fetch.
    points_outward: true
    certainty: 75
