spec_id: dosm-cpi-state
# Catalog connector: OpenDOSM dataset; the column list is materialized
# from the first pull. Freshness/coverage authored from the observed shape.
status: deferred
tests:
  - freshness: {col: date, reaches: today - 160d}
    reason: >-
      DOSM still refreshes this monthly series (source data_as_of 2026-05); latest observed date is 2026-05-01. reaches slack = one monthly period plus publication lag, so a normal release keeps max(date) within range; a miss points at DOSM, not our fetch.
    points_outward: true
    certainty: 75
