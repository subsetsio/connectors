# compiled by `hardened compile-checks` — post-publish audit of `dosm-mcoicop`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [desc_en, subclass, class, group, division]
checks:
  - kind: unique
    columns: [desc_en, subclass, class, group, division]
  - kind: not_null
    col: desc_en
  - kind: not_null
    col: subclass
  - kind: not_null
    col: class
  - kind: not_null
    col: group
  - kind: not_null
    col: division
  - kind: row_floor
    min: 171
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
