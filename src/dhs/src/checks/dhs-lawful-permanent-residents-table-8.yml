# compiled by `hardened compile-checks` — post-publish audit of `dhs-lawful-permanent-residents-table-8`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [category, section, breakdown, parent_category]
checks:
  - kind: unique
    columns: [category, section, breakdown, parent_category]
  - kind: not_null
    col: category
  - kind: not_null
    col: section
  - kind: not_null
    col: breakdown
  - kind: not_null
    col: parent_category
  - kind: row_floor
    min: 86
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
