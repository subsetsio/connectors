spec_id: sveriges-riksbank-values
status: active
tests:
  - row_count: {min: 100000}
    reason: daily exchange-rate histories back to the early 1900s should produce a six-figure observation table.
    certainty: 85
  - not_null: series_id
  - not_null: group_id
  - not_null: date
  - not_null: value
  - column_type: {col: series_id, type: string}
  - column_type: {col: group_id, type: integer}
  - column_type: {col: date, type: string}
  - column_type: {col: value, type: float}
  - unique: [series_id, date]
    reason: the SWEA API publishes at most one observation per series per date.
    certainty: 95
  - coverage: {col: series_id, expected: 100}
    reason: collect observed more than one hundred SWEA series; values must include every active or historical series with observations.
    certainty: 85
  - matches: {col: date, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"}
    reason: API observation dates are ISO YYYY-MM-DD.
    certainty: 95
  - freshness: {col: date, reaches: today - 14d}
    reason: active interest-rate and exchange-rate series are updated on business days.
    certainty: 85
    points_outward: true
