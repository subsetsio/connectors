spec_id: inpe-focos-brasil-municipio-anual
status: active
tests:
  - freshness: {col: ano, reaches: 2025}
  - not_null: ano
  - not_null: estado
  - not_null: municipio
  - not_null: n_focos
  - column_type: {col: ano, type: integer}
  - column_type: {col: n_focos, type: integer}
  - between: {col: ano, lo: 2002, hi: current_year()}
    certainty: 95
    points_outward: true
  - at_least: {col: n_focos, expr: 1}
    certainty: 99
  - unique: [ano, estado, municipio]
    reason: one row per municipality-year; the same municipio name recurs across states, so estado is part of the key
    certainty: 96
  - distinct_count: {col: municipio, min: 1000, max: 6500}
    reason: INPE stores municipality labels rather than stable codes, so spelling and historical-name variation can exceed the current ~5570 municipalities while remaining in the low thousands
    certainty: 75
