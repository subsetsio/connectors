# compiled by `hardened compile-checks` — post-publish audit of `ipc-food-security-national-estimates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [anl_id, classification, period_code]
temporal: period_from_date
checks:
  - kind: unique
    columns: [anl_id, classification, period_code]
  - kind: not_null
    col: anl_id
  - kind: not_null
    col: classification
  - kind: not_null
    col: period_code
  - kind: row_floor
    min: 365
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
