spec_id: entsog-transparency-platform-interconnections
status: active
tests:
  - not_null: id
    certainty: 95
  - not_null: pointKey
    certainty: 90
  - not_null: fromOperatorKey
    reason: an interconnection always names the operator on the from-side
    certainty: 85
  - not_null: toOperatorKey
    reason: an interconnection always names the operator on the to-side
    certainty: 80
    severity: warn
  - unique: id
    reason: reference topology catalog — one row per interconnection record
    certainty: 85
  - row_count: {min: 500}
    reason: cross-border interconnections between adjacent operators number in the hundreds-to-thousands
    certainty: 85
