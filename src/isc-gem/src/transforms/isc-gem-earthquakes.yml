key: [event_id]
temporal: time
sort: [time, event_id]
columns:
  - name: event_id
    type: VARCHAR
    description: ISC-GEM event identifier from the USGS ComCat mirror.
  - name: time
    type: TIMESTAMP
    description: Earthquake origin time in UTC.
  - name: latitude
    type: DOUBLE
    description: Epicenter latitude in decimal degrees.
  - name: longitude
    type: DOUBLE
    description: Epicenter longitude in decimal degrees.
  - name: depth_km
    type: DOUBLE
    description: Hypocentral depth in kilometers.
  - name: magnitude
    type: DOUBLE
    description: Moment magnitude (Mw) reported by ISC-GEM.
  - name: magnitude_error
    type: DOUBLE
    description: Reported uncertainty of the moment magnitude estimate, when supplied.
  - name: depth_error_km
    type: DOUBLE
    description: Reported uncertainty of hypocentral depth in kilometers, when supplied.
  - name: place
    type: VARCHAR
    description: Human-readable region string supplied by the USGS ComCat mirror.
  - name: updated
    type: TIMESTAMP
    description: Timestamp when the mirrored event record was last updated.
