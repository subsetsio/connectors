spec_id: federal-reserve-bank-of-kansas-city-kcfsi
status: active
tests:
  - not_null: date
  - not_null: series
  - not_null: value
  - column_type: {col: date, type: date}
  - column_type: {col: value, type: float}
  - distinct_count: {col: series, min: 1, max: 1}
    reason: KCFSI is a single composite index series sourced from FRED id=KCFSI
    certainty: 90
  - row_count: {min: 300}
    reason: monthly from Feb 1990 -> ~430 obs; far fewer means a truncated CSV
    certainty: 80
  - between: {col: value, lo: -10, hi: 15}
    reason: KCFSI is a standardized stress index, typically ~-1 to ~6 with crisis spikes
    certainty: 70
    severity: warn
  - freshness: {col: date, reaches: today - 120d}
    reason: monthly release; stale max usually means the source has not refreshed
    points_outward: true
    severity: warn
    certainty: 70
