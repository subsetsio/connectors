spec_id: jepx-spot-market
status: active
tests:
  - not_null: delivery_date
    reason: every settlement row has a delivery date
    certainty: 99
  - not_null: slot
    reason: every row carries its half-hourly slot code (時刻コード)
    certainty: 99
  - column_type: {col: slot, type: integer}
    certainty: 95
  - between: {col: slot, lo: 1, hi: 48}
    reason: Japan runs 48 half-hourly settlement slots per day; no DST
    certainty: 98
  - distinct_count: {col: slot, min: 48, max: 48}
    reason: exactly 48 distinct slot codes across the corpus
    certainty: 90
  - nullable: {col: system_price, max_null_frac: 0.05}
    reason: the spot market clears every slot; system price is essentially always present
    certainty: 85
  - median_between: {col: system_price, lo: 1, hi: 60}
    reason: JEPX system price is typically ~5-30 yen/kWh; crisis spikes raise the mean but the median stays moderate
    certainty: 70
    severity: warn
  - row_count: {min: 100000}
    reason: FY2016-present at 48 slots/day is ~175k rows; well over 100k
    certainty: 85
  - matches: {col: delivery_date, pattern: '^[0-9]{4}/[0-9]{2}/[0-9]{2}$'}
    reason: source formats dates as YYYY/MM/DD
    certainty: 90
