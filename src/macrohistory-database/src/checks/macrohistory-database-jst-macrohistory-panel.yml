# compiled by `hardened compile-checks` — post-publish audit of `macrohistory-database-jst-macrohistory-panel`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, iso, country, peg_base, peg_type]
temporal: year
checks:
  - kind: unique
    columns: [year, iso, country, peg_base, peg_type]
  - kind: not_null
    col: year
  - kind: not_null
    col: iso
  - kind: not_null
    col: country
  - kind: not_null
    col: peg_base
  - kind: not_null
    col: peg_type
  - kind: row_floor
    min: 1359
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
