spec_id: ftc-hsr-merger-transactions-by-month
coverage:
  frozen: true
  reason: FTC static HSR monthly transaction CSV currently covers FY1990 through FY2020
tests:
  - row_count: {min: 300}
    reason: HSR monthly transaction table begins in FY1990 and should have one row per month
    certainty: 95
  - not_null: FYTransaction
  - not_null: MonthTransaction
  - not_null: TransactionReceived
  - column_type: {col: FYTransaction, type: string}
  - column_type: {col: MonthTransaction, type: string}
  - column_type: {col: TransactionReceived, type: string}
  - unique: [FYTransaction, MonthTransaction]
    reason: one HSR transaction count per fiscal year-month
    certainty: 95
