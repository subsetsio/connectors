# caution: Historical civil penalty actions file is frozen; use the fiscal year and enforcement date columns as source-reported enforcement timing.
key: [matter_number, enforcement_date]
temporal: enforcement_date
sort: [enforcement_date, matter_number]
columns:
  - name: enforcement_fy
    type: BIGINT
    description: FTC fiscal year of the enforcement action.
  - name: enforcement_date
    type: DATE
    description: Source-reported enforcement action date.
  - name: matter_name
    type: VARCHAR
    description: FTC matter name.
  - name: matter_number
    type: VARCHAR
    description: FTC matter number, preserved as an identifier.
  - name: enforcement_type
    type: VARCHAR
    description: Source category for the enforcement action.
  - name: url
    type: VARCHAR
    description: FTC matter URL when provided.
  - name: matter_type
    type: VARCHAR
    description: Source matter type, such as merger or nonmerger.
