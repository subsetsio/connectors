# caution: Rows are FTC nonmerger enforcement matters; the upstream CSV contains at least one exact duplicate row, and industry is a source category rather than a complete industry taxonomy.
key: []
temporal: enforcement_date
sort: [enforcement_date, matter_number, enforcement_type]
columns:
  - name: enforcement_fy
    type: BIGINT
    description: FTC fiscal year of the enforcement action.
  - name: enforcement_date
    type: DATE
    description: Source-reported enforcement action date.
  - name: matter_number
    type: VARCHAR
    description: FTC matter number, preserved as an identifier.
  - name: matter_name
    type: VARCHAR
    description: FTC matter name.
  - name: enforcement_type
    type: VARCHAR
    description: Source category for the nonmerger enforcement action.
  - name: matter_industry
    type: VARCHAR
    description: Source industry category.
  - name: url
    type: VARCHAR
    description: FTC matter URL when provided.
