# caution: Fiscal year-month rows use FTC fiscal-year numbering; month values are source-reported fiscal-period months, not derived calendar dates.
key: [fiscal_year, fiscal_month]
temporal: fiscal_year
sort: [fiscal_year, fiscal_month]
columns:
  - name: fiscal_year
    type: BIGINT
    description: FTC fiscal year for the HSR transaction count.
  - name: fiscal_month
    type: BIGINT
    description: Source-reported month number within the fiscal year.
  - name: transactions_received
    type: BIGINT
    description: Number of HSR merger transactions received.
