# caution: Rows are FTC merger enforcement matters; enforcement type and industry are source categories, not mutually exclusive broader market classifications.
key: [matter_number, enforcement_date]
temporal: enforcement_date
sort: [enforcement_date, matter_number]
columns:
  - name: enforcement_fy
    type: BIGINT
    description: FTC fiscal year of the enforcement action.
  - name: enforcement_date
    type: DATE
    description: Source-reported enforcement action date.
  - name: matter_number
    type: VARCHAR
    description: FTC matter number, preserved as an identifier.
  - name: matter_name
    type: VARCHAR
    description: FTC matter name.
  - name: matter_industry
    type: VARCHAR
    description: Source industry category.
  - name: url
    type: VARCHAR
    description: FTC matter URL when provided.
  - name: enforcement_type
    type: VARCHAR
    description: Source category for the merger enforcement action.
