    columns: [enforcement_fy, enforcement_date, matter_number, matter_name, enforcement_type, matter_industry, url]
  - kind: not_null
    col: enforcement_fy
  - kind: not_null
    col: enforcement_date
  - kind: not_null
    col: matter_number
  - kind: not_null
    col: matter_name
  - kind: not_null
    col: enforcement_type
  - kind: not_null
    col: matter_industry
  - kind: not_null
    col: url
  - kind: row_floor
    min: 83
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
