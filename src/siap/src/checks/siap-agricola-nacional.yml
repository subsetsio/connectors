# compiled by `hardened compile-checks` — post-publish audit of `siap-agricola-nacional`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_year, idestado, idciclo, idmodalidad, idunidadmedida, idcultivo]
temporal: source_year
checks:
  - kind: unique
    columns: [source_year, idestado, idciclo, idmodalidad, idunidadmedida, idcultivo]
  - kind: not_null
    col: source_year
  - kind: not_null
    col: idestado
  - kind: not_null
    col: idciclo
  - kind: not_null
    col: idmodalidad
  - kind: not_null
    col: idunidadmedida
  - kind: not_null
    col: idcultivo
  - kind: row_floor
    min: 35234
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
