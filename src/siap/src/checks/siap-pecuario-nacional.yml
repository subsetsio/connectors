# compiled by `hardened compile-checks` — post-publish audit of `siap-pecuario-nacional`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cveestado, nomestado, source_year, cveproducto, cveespecie]
temporal: source_year
checks:
  - kind: unique
    columns: [cveestado, nomestado, source_year, cveproducto, cveespecie]
  - kind: not_null
    col: cveestado
  - kind: not_null
    col: nomestado
  - kind: not_null
    col: source_year
  - kind: not_null
    col: cveproducto
  - kind: not_null
    col: cveespecie
  - kind: row_floor
    min: 6465
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
