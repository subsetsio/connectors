    columns: [source_year, cveestado, cveddr, cvempio, cveespecie, cveproducto]
  - kind: not_null
    col: source_year
  - kind: not_null
    col: cveestado
  - kind: not_null
    col: cveddr
  - kind: not_null
    col: cvempio
  - kind: not_null
    col: cveespecie
  - kind: not_null
    col: cveproducto
  - kind: row_floor
    min: 279729
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
