spec_id: siap-agricola-nacional
status: active
coverage:
  frozen: true
  reason: SIAP publishes this national historical agricultural series only for 1980-2002; current years use the municipal schema.
tests:
  - not_null: source_year
    certainty: 99
  - column_type: {col: source_year, type: integer}
    certainty: 99
  - between: {col: source_year, lo: 1980, hi: 2002}
    certainty: 99
  - not_null: anio
    certainty: 99
  - not_null: idcultivo
    certainty: 95
  - column_type: {col: volumenproduccion, type: float}
    certainty: 95
  - row_count: {min: 50000}
    reason: all national agricultural years combined should be much larger than a single partial CSV
    certainty: 90
  - distinct_count: {col: source_year, min: 23}
    certainty: 99
