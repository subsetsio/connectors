spec_id: nasa-gistemp-zonal-annual
status: active
tests:
  - not_null: year
  - not_null: zone
  - not_null: anomaly_c
  - column_type: {col: year, type: integer}
  - column_type: {col: zone, type: string}
  - column_type: {col: anomaly_c, type: float}
  - unique: [year, zone]
    reason: one annual anomaly per year and latitude zone
    certainty: 95
  - distinct_count: {col: zone, min: 14, max: 14}
    reason: ZonAnn.Ts+dSST.csv publishes 14 latitude-band columns
    certainty: 95
  - between: {col: year, lo: 1880, hi: current_year()}
    reason: GISTEMP v4 begins in 1880 and should not publish future annual observations
    certainty: 95
  - at_least: {col: year, expr: 2025}
    reason: annual zonal anomalies should include the last completed calendar year
    certainty: 80
    points_outward: true
  - between: {col: anomaly_c, lo: -5.0, hi: 5.0}
    reason: latitude-band anomalies are decimal degrees C and can be wider than global means
    certainty: 90
