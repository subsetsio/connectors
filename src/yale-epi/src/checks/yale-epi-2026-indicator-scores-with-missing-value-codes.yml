# compiled by `hardened compile-checks` — post-publish audit of `yale-epi-2026-indicator-scores-with-missing-value-codes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value_text, source_column, iso, country, country_code]
checks:
  - kind: unique
    columns: [value_text, source_column, iso, country, country_code]
  - kind: not_null
    col: value_text
  - kind: not_null
    col: source_column
  - kind: not_null
    col: iso
  - kind: not_null
    col: country
  - kind: not_null
    col: country_code
  - kind: row_floor
    min: 171600
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
