# compiled by `hardened compile-checks` — post-publish audit of `kff-heart-disease-deaths-and-death-rates-by-sex`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, timeframe, col_index, metric]
temporal: timeframe
checks:
  - kind: unique
    columns: [location, timeframe, col_index, metric]
  - kind: not_null
    col: location
  - kind: not_null
    col: timeframe
  - kind: not_null
    col: col_index
  - kind: not_null
    col: metric
  - kind: row_floor
    min: 936
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
