# compiled by `hardened compile-checks` — post-publish audit of `ucdp-esd-ty`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, actor_id, oppo_id, dyad_id, actor_name]
temporal: year
checks:
  - kind: unique
    columns: [id, actor_id, oppo_id, dyad_id, actor_name]
  - kind: not_null
    col: id
  - kind: not_null
    col: actor_id
  - kind: not_null
    col: oppo_id
  - kind: not_null
    col: dyad_id
  - kind: not_null
    col: actor_name
  - kind: row_floor
    min: 5426
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
