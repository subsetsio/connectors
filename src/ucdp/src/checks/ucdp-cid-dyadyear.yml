# compiled by `hardened compile-checks` — post-publish audit of `ucdp-cid-dyadyear`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [side_b_id, dyad_id, conflict_id, year, active_year]
temporal: year
checks:
  - kind: unique
    columns: [side_b_id, dyad_id, conflict_id, year, active_year]
  - kind: not_null
    col: side_b_id
  - kind: not_null
    col: dyad_id
  - kind: not_null
    col: conflict_id
  - kind: not_null
    col: year
  - kind: not_null
    col: active_year
  - kind: row_floor
    min: 893
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
