# compiled by `hardened compile-checks` — post-publish audit of `drees-departretraite-et-incapacite`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [annee, sexe, niveau_d_incapacite_personnes]
temporal: annee
checks:
  - kind: unique
    columns: [annee, sexe, niveau_d_incapacite_personnes]
  - kind: not_null
    col: annee
  - kind: not_null
    col: sexe
  - kind: not_null
    col: niveau_d_incapacite_personnes
  - kind: row_floor
    min: 36
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
