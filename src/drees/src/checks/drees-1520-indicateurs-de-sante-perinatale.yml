# compiled by `hardened compile-checks` — post-publish audit of `drees-1520-indicateurs-de-sante-perinatale`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fichiers, url_de_telechargement, dossier]
checks:
  - kind: unique
    columns: [fichiers, url_de_telechargement, dossier]
  - kind: not_null
    col: fichiers
  - kind: not_null
    col: url_de_telechargement
  - kind: not_null
    col: dossier
  - kind: row_floor
    min: 7
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
