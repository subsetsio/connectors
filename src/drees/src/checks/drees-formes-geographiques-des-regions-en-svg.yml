# compiled by `hardened compile-checks` — post-publish audit of `drees-formes-geographiques-des-regions-en-svg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [d, data_fill_id, data_name, id, filename]
checks:
  - kind: unique
    columns: [d, data_fill_id, data_name, id, filename]
  - kind: not_null
    col: d
  - kind: not_null
    col: data_fill_id
  - kind: not_null
    col: data_name
  - kind: not_null
    col: id
  - kind: not_null
    col: filename
  - kind: row_floor
    min: 9
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
