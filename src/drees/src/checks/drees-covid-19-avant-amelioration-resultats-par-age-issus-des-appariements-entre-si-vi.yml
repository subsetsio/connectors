# compiled by `hardened compile-checks` — post-publish audit of `drees-covid-19-avant-amelioration-resultats-par-age-issus-des-appariements-entre-si-vi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, vac_statut, age]
temporal: date
checks:
  - kind: unique
    columns: [date, vac_statut, age]
  - kind: not_null
    col: date
  - kind: not_null
    col: vac_statut
  - kind: not_null
    col: age
  - kind: row_floor
    min: 12174
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
