spec_id: drees-skyline
status: active
tests:
  - row_count: {min: 2790}
    reason: full ODS parquet export held 5580 rows when authored; a much smaller count means the export was truncated or the fetch failed.
    certainty: 90
  - not_null: "geo"
    reason: dimension column, observed fully populated across the export.
    certainty: 80
  - column_type: {col: "geo", type: string}
    certainty: 90
  - not_null: "pays"
    reason: dimension column, observed fully populated across the export.
    certainty: 80
  - column_type: {col: "pays", type: string}
    certainty: 90
  - column_type: {col: "valeur", type: float}
    reason: numeric measure column; type drift here means the export schema changed.
    certainty: 80
