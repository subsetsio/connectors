spec_id: drees-departretraite-parcsp
status: active
tests:
  - row_count: {min: 28}
    reason: full ODS parquet export held 56 rows when authored; a much smaller count means the export was truncated or the fetch failed.
    certainty: 90
  - not_null: "categorie_socioprofessionnelle"
    reason: dimension column, observed fully populated across the export.
    certainty: 80
  - column_type: {col: "categorie_socioprofessionnelle", type: string}
    certainty: 90
  - column_type: {col: "proportion_de_personnes_fortement_limitees_au_cours_de_la_premiere_annee_de_retraite", type: integer}
    reason: numeric measure column; type drift here means the export schema changed.
    certainty: 80
