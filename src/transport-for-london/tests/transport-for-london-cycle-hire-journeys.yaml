spec_id: transport-for-london-cycle-hire-journeys
status: active
tests:
  - not_null: start_station_id
    reason: every Santander hire trip records a start station; nulls mean a column-name drift was missed
    certainty: 85
  - not_null: start_date
    reason: start timestamp is present on every trip across all extract eras
    certainty: 90
  - row_count: {min: 1000000}
    reason: hundreds of fortnightly extracts of ~300k trips each; a low count means batches were dropped
    certainty: 80
    severity: warn
