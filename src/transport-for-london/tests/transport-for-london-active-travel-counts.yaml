spec_id: transport-for-london-active-travel-counts
status: active
tests:
  - not_null: site_id
    reason: every count observation is tied to a monitoring site (SiteID)
    certainty: 90
  - row_count: {min: 15000000}
    reason: the current Active Travel Counts extract has more than 15 million observation rows even after allowing occasional blank measurement rows from the source CSVs
    certainty: 80
  - not_null: date
    reason: each count row carries its survey date
    certainty: 85
  - freshness: {col: date, reaches: today - 550d}
    reason: TfL Active Travel Counts has files through 2025 and is periodically refreshed
    certainty: 75
    points_outward: true
  - row_count: {min: 100000}
    reason: ~87 quarterly/regional CSVs at tens of thousands of 15-minute rows each
    certainty: 75
    severity: warn
