spec_id: transport-for-london-cycle-counters
status: active
tests:
  - not_null: site_id
    reason: every counter record carries a SITE_ID
    certainty: 90
  - not_null: date
    reason: each per-vehicle record is timestamped (DATE column)
    certainty: 85
  - row_count: {min: 100000}
    reason: ~183 daily counter files of thousands of per-vehicle rows each
    certainty: 75
    severity: warn
