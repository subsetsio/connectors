# compiled by `hardened compile-checks` — post-publish audit of `transport-for-london-active-travel-monitoring-locations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location_description, site_id, northing, borough, road_type]
checks:
  - kind: unique
    columns: [location_description, site_id, northing, borough, road_type]
  - kind: not_null
    col: location_description
  - kind: not_null
    col: site_id
  - kind: not_null
    col: northing
  - kind: not_null
    col: borough
  - kind: not_null
    col: road_type
  - kind: row_floor
    min: 1088
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
