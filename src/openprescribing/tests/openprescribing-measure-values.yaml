spec_id: openprescribing-measure-values
tests:
  - not_null: org_id
    reason: each row is a measure value for one organisation
    certainty: 90
  - not_null: date
    certainty: 90
  - enum: {col: org_level, values: [sicbl, icb]}
    reason: we pull measure values at Sub-ICB and ICB levels only
    certainty: 95
  - between: {col: percentile, lo: 0, hi: 100}
    reason: percentile is a 0-100 rank across orgs
    certainty: 75
    severity: warn
  - at_least: {col: numerator, expr: 0}
    reason: numerators are non-negative counts/quantities
    certainty: 80
    severity: warn
  - row_count: {min: 1000}
    reason: ~80 measures x ~100 Sub-ICBs + ~40 ICBs x monthly history
    certainty: 70
    points_outward: true
