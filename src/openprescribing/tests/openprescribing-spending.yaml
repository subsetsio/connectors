spec_id: openprescribing-spending
tests:
  - not_null: org_id
    certainty: 90
  - not_null: date
    certainty: 90
  - enum: {col: org_level, values: [sicbl]}
    reason: spending is pulled at Sub-ICB level
    certainty: 95
  - at_least: {col: actual_cost, expr: 0}
    reason: actual cost is non-negative
    certainty: 80
    severity: warn
  - at_least: {col: items, expr: 0}
    certainty: 80
    severity: warn
  - row_count: {min: 500}
    reason: ~20 BNF chapters x ~100 Sub-ICBs x monthly history
    certainty: 70
    points_outward: true
