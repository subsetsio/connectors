# compiled by `hardened compile-checks` — post-publish audit of `maddison-project-country-panel`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_code, year]
temporal: year
checks:
  - kind: unique
    columns: [country_code, year]
  - kind: not_null
    col: country_code
  - kind: not_null
    col: year
  # Hand-tuned: the compiler derived min=65572 from the RAW row count (131,144),
  # but the transform drops the ~82% of grid cells carrying neither estimate, so
  # only 23,280 rows are published. Floor set at half of the published count.
  - kind: row_floor
    min: 11640
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
