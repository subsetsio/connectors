key: [year, countrycode, country, region]
temporal: year
sort: [year, countrycode, country, region]
columns:
  - name: countrycode
    type: VARCHAR
    description: ISO 3166-1 alpha-3 country code, with source-specific aggregate-region codes where the row is not a country.
  - name: country
    type: VARCHAR
    description: Country or aggregate-region name used by the Maddison Project.
  - name: region
    type: VARCHAR
    description: Maddison Project world-region grouping for the country or aggregate row.
  - name: year
    type: INTEGER
    description: Observation year.
  - name: gdppc
    type: DOUBLE
    description: Real GDP per capita in 2011 international dollars.
  - name: pop
    type: DOUBLE
    description: Population in thousands.
