# compiled by `hardened compile-checks` — post-publish audit of `opec-table-11-2`.
# Grain/temporal from the transform contract. Row floor is authored for the
# published latest-vintage shape because the raw profile contains multiple
# report vintages per series/period.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [series, period]
temporal: period_start
checks:
  - kind: unique
    columns: [series, period]
  - kind: not_null
    col: series
  - kind: not_null
    col: period
  - kind: row_floor
    min: 700
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
