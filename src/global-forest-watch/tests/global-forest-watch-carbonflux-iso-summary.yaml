spec_id: global-forest-watch-carbonflux-iso-summary
status: active
tests:
  - not_null: iso
  - column_type: {col: iso, type: string}
  - not_null: canopy_density_threshold
  - column_type: {col: canopy_density_threshold, type: integer}
  - between: {col: canopy_density_threshold, lo: 0, hi: 100}
  - unique: [iso, canopy_density_threshold]
    reason: aggregated to one row per country and canopy-density threshold
  - column_type: {col: gross_emissions_mg_co2e, type: float}
  - row_count: {min: 500}
