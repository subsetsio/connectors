# compiled by `hardened compile-checks` — post-publish audit of `global-forest-watch-gadm--tcl--iso-change`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso, loss_year, canopy_density_threshold]
temporal: loss_year
checks:
  - kind: unique
    columns: [iso, loss_year, canopy_density_threshold]
  - kind: not_null
    col: iso
  - kind: not_null
    col: loss_year
  - kind: not_null
    col: canopy_density_threshold
  - kind: row_floor
    min: 20005
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
