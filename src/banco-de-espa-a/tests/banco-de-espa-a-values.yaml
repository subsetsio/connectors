spec_id: banco-de-espa-a-values
status: active
tests:
  - not_null: series_code
    reason: every observation belongs to a series
    certainty: 99
  - not_null: date
    reason: every observation is dated; unparseable period labels are dropped in fetch
    certainty: 95
  - not_null: value
    reason: missing values ('_') are dropped during unpivot, so raw holds only real numbers
    certainty: 95
  - column_type: {col: date, type: date}
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 95
  - at_most: {col: date, expr: today}
    reason: observations are historical; no future-dated data expected
    certainty: 80
    points_outward: true
    severity: warn
  - at_least: {col: date, expr: "1900-01-01"}
    reason: deepest BdE history (e.g. long interest-rate series) starts in the 20th century
    certainty: 80
    severity: warn
  - row_count: {min: 500000}
    reason: ~16k series with up to thousands of observations each -> several million rows; a tiny count means ZIP parsing degraded
    certainty: 85
  - distinct_count: {col: series_code, min: 1000}
    reason: the catalogue lists ~16k distinct series; <1000 means most value files failed to parse
    certainty: 85
