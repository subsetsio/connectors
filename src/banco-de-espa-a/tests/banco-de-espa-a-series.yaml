spec_id: banco-de-espa-a-series
status: active
tests:
  - not_null: series_code
    reason: the series code is the catalogue key and join key to values
    certainty: 99
  - unique: series_code
    reason: deduped across publications in fetch_series; one row per distinct series
    certainty: 95
  - not_null: frequency
    reason: every catalogued series declares a frequency (MENSUAL/TRIMESTRAL/DIARIA/...)
    certainty: 85
    severity: warn
  - row_count: {min: 10000}
    reason: 5 publication catalogues hold ~15.7k rows (~12.8k distinct); <10k means a catalogue failed to load
    certainty: 85
  - distinct_count: {col: series_code, min: 10000}
    reason: expect well over 10k distinct series across the corpus
    certainty: 85
  - distinct_count: {col: publication, min: 2, max: 5}
    reason: rows come from up to 5 publications, deduped first-wins
    certainty: 90
