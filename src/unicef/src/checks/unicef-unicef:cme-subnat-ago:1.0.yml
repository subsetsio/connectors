# compiled by `hardened compile-checks` — post-publish audit of `unicef-unicef:cme-subnat-ago:1.0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_value, dimensions, ref_area, ref_area_name, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [obs_value, dimensions, ref_area, ref_area_name, time_period]
  - kind: not_null
    col: obs_value
  - kind: not_null
    col: dimensions
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: ref_area_name
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 4853
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
