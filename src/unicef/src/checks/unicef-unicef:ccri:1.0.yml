# compiled by `hardened compile-checks` — post-publish audit of `unicef-unicef:ccri:1.0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ref_area, ref_area_name, dimensions, indicator, indicator_name]
temporal: time_period
checks:
  - kind: unique
    columns: [ref_area, ref_area_name, dimensions, indicator, indicator_name]
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: ref_area_name
  - kind: not_null
    col: dimensions
  - kind: not_null
    col: indicator
  - kind: not_null
    col: indicator_name
  - kind: row_floor
    min: 2167
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
