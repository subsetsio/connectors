spec_id: unicef-unicef:chld-pvty:1.0
status: active
tests:
  - not_null: time_period
    reason: "every SDMX observation carries TIME_PERIOD; a null means the CSV header mapping missed the period column for this flow"
    certainty: 95
  - not_null: indicator
    reason: "every observation is keyed by an indicator concept; a null means this flow names its indicator dimension something the alias table does not cover"
    certainty: 90
  - row_count: {min: 1}
    reason: "an empty-key data query returns the whole dataflow; zero rows means the flow was retired or the pull was truncated"
    certainty: 95
  - freshness: {col: time_period, reaches: today - 10y}
    reason: "UNICEF republishes each dataflow on an annual cycle, but the underlying indicators are survey- and estimate-based (DHS/MICS/IGME), so the latest reference period trails the release by several years. A max period older than ten years means the flow has gone dormant upstream, not that the fetch dropped rows."
    certainty: 80
    points_outward: true
