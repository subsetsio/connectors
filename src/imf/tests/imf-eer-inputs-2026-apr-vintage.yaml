spec_id: imf-eer-inputs-2026-apr-vintage
status: active
tests:
  - row_count: {min: 1}
    reason: a full-dataflow SDMX-CSV pull ('~/*' = latest version, all series) of a rank-active IMF dataflow always returns observations; an empty raw table means the dataflow id is wrong or the endpoint changed.
    certainty: 95
    points_outward: false
  - freshness: {col: TIME_PERIOD, reaches: today - 5y}
    reason: this accepted vintage is recent; the latest TIME_PERIOD should still be within the broad five-year IMF freshness window.
    certainty: 75
    points_outward: true
