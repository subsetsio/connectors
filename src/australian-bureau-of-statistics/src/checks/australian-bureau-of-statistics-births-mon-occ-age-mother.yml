# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-births-mon-occ-age-mother`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [age, time_period, month_occur, region]
temporal: time_period
checks:
  - kind: unique
    columns: [age, time_period, month_occur, region]
  - kind: not_null
    col: age
  - kind: not_null
    col: time_period
  - kind: not_null
    col: month_occur
  - kind: not_null
    col: region
  - kind: row_floor
    min: 50544
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
