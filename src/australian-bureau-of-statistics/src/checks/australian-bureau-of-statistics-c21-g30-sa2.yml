# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-c21-g30-sa2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, fmcbpfbpmp, state, agep, region_type]
temporal: time_period
checks:
  - kind: unique
    columns: [region, fmcbpfbpmp, state, agep, region_type]
  - kind: not_null
    col: region
  - kind: not_null
    col: fmcbpfbpmp
  - kind: not_null
    col: state
  - kind: not_null
    col: agep
  - kind: not_null
    col: region_type
  - kind: row_floor
    min: 153140
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
