# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-res-dwell`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, region, measure, unit_measure, unit_mult]
temporal: time_period
checks:
  - kind: unique
    columns: [time_period, region, measure, unit_measure, unit_mult]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: region
  - kind: not_null
    col: measure
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: unit_mult
  - kind: row_floor
    min: 2778
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
