    columns: [lga_2020, measure, unit_measure, time_period]
  - kind: not_null
    col: lga_2020
  - kind: not_null
    col: measure
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 595169
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
