# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-c21-g47-sa2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, ffmclfsf, mfmclfsf, state, agep]
temporal: time_period
checks:
  - kind: unique
    columns: [region, ffmclfsf, mfmclfsf, state, agep]
  - kind: not_null
    col: region
  - kind: not_null
    col: ffmclfsf
  - kind: not_null
    col: mfmclfsf
  - kind: not_null
    col: state
  - kind: not_null
    col: agep
  - kind: row_floor
    min: 1696320
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
