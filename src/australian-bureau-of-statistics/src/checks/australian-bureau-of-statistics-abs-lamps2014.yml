# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-lamps2014`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mgt_practice, region_acz, anzsic, unit_measure, measure]
temporal: time_period
checks:
  - kind: unique
    columns: [mgt_practice, region_acz, anzsic, unit_measure, measure]
  - kind: not_null
    col: mgt_practice
  - kind: not_null
    col: region_acz
  - kind: not_null
    col: anzsic
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 108874
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
