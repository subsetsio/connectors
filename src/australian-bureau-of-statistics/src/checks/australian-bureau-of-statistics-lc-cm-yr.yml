# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-lc-cm-yr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, lc_from, lc_to, state, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [region, lc_from, lc_to, state, time_period]
  - kind: not_null
    col: region
  - kind: not_null
    col: lc_from
  - kind: not_null
    col: lc_to
  - kind: not_null
    col: state
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 884345
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
