# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-regional-remoteness-asgs2021`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measure, region, time_period, unit_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [measure, region, time_period, unit_measure]
  - kind: not_null
    col: measure
  - kind: not_null
    col: region
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 15238
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
