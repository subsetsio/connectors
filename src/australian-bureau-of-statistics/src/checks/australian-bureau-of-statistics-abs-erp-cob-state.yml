# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-erp-cob-state`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_birth, age, region, time_period, sex]
temporal: time_period
checks:
  - kind: unique
    columns: [country_birth, age, region, time_period, sex]
  - kind: not_null
    col: country_birth
  - kind: not_null
    col: age
  - kind: not_null
    col: region
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 391935
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
