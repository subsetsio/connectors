# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-regional-migration`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [asgs_2016, age, regiontype, time_period, mig_type]
temporal: time_period
checks:
  - kind: unique
    columns: [asgs_2016, age, regiontype, time_period, mig_type]
  - kind: not_null
    col: asgs_2016
  - kind: not_null
    col: age
  - kind: not_null
    col: regiontype
  - kind: not_null
    col: time_period
  - kind: not_null
    col: mig_type
  - kind: row_floor
    min: 65640
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
