    columns: [region, mrerd, measure]
  - kind: not_null
    col: region
  - kind: not_null
    col: mrerd
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 159549
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
