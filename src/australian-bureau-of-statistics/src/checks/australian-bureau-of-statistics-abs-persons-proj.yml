# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-persons-proj`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, time_period, age, person_la, proj_series]
temporal: time_period
checks:
  - kind: unique
    columns: [region, time_period, age, person_la, proj_series]
  - kind: not_null
    col: region
  - kind: not_null
    col: time_period
  - kind: not_null
    col: age
  - kind: not_null
    col: person_la
  - kind: not_null
    col: proj_series
  - kind: row_floor
    min: 308256
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
