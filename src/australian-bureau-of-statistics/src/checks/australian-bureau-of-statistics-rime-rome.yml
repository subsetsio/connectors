# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-rime-rome`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, region_type, age_group, time_period, migr_type]
temporal: time_period
checks:
  - kind: unique
    columns: [region, region_type, age_group, time_period, migr_type]
  - kind: not_null
    col: region
  - kind: not_null
    col: region_type
  - kind: not_null
    col: age_group
  - kind: not_null
    col: time_period
  - kind: not_null
    col: migr_type
  - kind: row_floor
    min: 52362
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
