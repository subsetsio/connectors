# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-erp-comp-sa-asgs2021`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, pop_comp, region_type, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [region, pop_comp, region_type, time_period]
  - kind: not_null
    col: region
  - kind: not_null
    col: pop_comp
  - kind: not_null
    col: region_type
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 58180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
