    columns: [dlc_11nc, dlc_11, nrm_2012]
  - kind: not_null
    col: dlc_11nc
  - kind: not_null
    col: dlc_11
  - kind: not_null
    col: nrm_2012
  - kind: row_floor
    min: 3393
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
