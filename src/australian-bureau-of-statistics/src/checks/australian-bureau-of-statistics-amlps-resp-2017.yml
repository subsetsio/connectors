# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-amlps-resp-2017`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [aec_fed_2017, response_cat, region_type, measure, unit_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [aec_fed_2017, response_cat, region_type, measure, unit_measure]
  - kind: not_null
    col: aec_fed_2017
  - kind: not_null
    col: response_cat
  - kind: not_null
    col: region_type
  - kind: not_null
    col: measure
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 1120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
