# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-ana-agg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, data_item, measure, unit_measure, tsest]
temporal: time_period
checks:
  - kind: unique
    columns: [time_period, data_item, measure, unit_measure, tsest]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: data_item
  - kind: not_null
    col: measure
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: tsest
  - kind: row_floor
    min: 11934
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
