# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-lstock-slaught`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, state, lstock_slaught, tsest]
temporal: time_period
checks:
  - kind: unique
    columns: [time_period, state, lstock_slaught, tsest]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: state
  - kind: not_null
    col: lstock_slaught
  - kind: not_null
    col: tsest
  - kind: row_floor
    min: 17879
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
