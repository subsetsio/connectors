# compiled by `hardened compile-checks` тАФ post-publish audit of `australian-bureau-of-statistics-ag-horticulture`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, dataitem, unit_measure, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [region, dataitem, unit_measure, time_period]
  - kind: not_null
    col: region
  - kind: not_null
    col: dataitem
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 2647
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
