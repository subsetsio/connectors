# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-c21-g01-ucl`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, pchar, state, sexp, region_type]
temporal: time_period
checks:
  - kind: unique
    columns: [region, pchar, state, sexp, region_type]
  - kind: not_null
    col: region
  - kind: not_null
    col: pchar
  - kind: not_null
    col: state
  - kind: not_null
    col: sexp
  - kind: not_null
    col: region_type
  - kind: row_floor
    min: 106677
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
