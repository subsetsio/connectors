# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-abs-acld-lfstatus`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [asgs_2011, age, lf_2006, lf_2011, sex_abs]
temporal: time_period
checks:
  - kind: unique
    columns: [asgs_2011, age, lf_2006, lf_2011, sex_abs]
  - kind: not_null
    col: asgs_2011
  - kind: not_null
    col: age
  - kind: not_null
    col: lf_2006
  - kind: not_null
    col: lf_2011
  - kind: not_null
    col: sex_abs
  - kind: row_floor
    min: 3282
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
