# compiled by `hardened compile-checks` — post-publish audit of `australian-bureau-of-statistics-c21-t26-lga`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, fmcfinf, state, time_period, sum]
temporal: time_period
checks:
  - kind: unique
    columns: [region, fmcfinf, state, time_period, sum]
  - kind: not_null
    col: region
  - kind: not_null
    col: fmcfinf
  - kind: not_null
    col: state
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sum
  - kind: row_floor
    min: 31692
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
