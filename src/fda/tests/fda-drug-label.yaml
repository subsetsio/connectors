spec_id: fda-drug-label
status: active
tests:
  - not_null: id
    reason: each SPL label document carries its unique document id
    certainty: 95
  - unique: id
    reason: the label export is one record per current SPL document id
    certainty: 90
  - matches: {col: effective_time, pattern: '[0-9]{8}'}
    reason: SPL effective_time is a YYYYMMDD string
    certainty: 85
    severity: warn
  - row_count: {min: 200000}
    reason: current-label corpus only grows; June 2026 export held ~259k
    certainty: 80
  - freshness: {col: effective_time, reaches: today - 90d}
    reason: labels publish weekly; some carry future effective times, so max easily reaches the bound
    points_outward: true
