spec_id: fda-device-pma
status: active
tests:
  - not_null: pma_number
    reason: every PMA record carries its P/N/D application number
    certainty: 95
  - unique: [pma_number, supplement_number]
    reason: the endpoint is one row per PMA original or supplement; uncertain whether FDA ever re-lists a supplement
    certainty: 60
    severity: warn
  - matches: {col: decision_date, pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2}'}
    reason: device endpoints serialize dates as ISO YYYY-MM-DD
    certainty: 85
    severity: warn
  - row_count: {min: 45000}
    reason: PMA originals + supplements only accumulate; June 2026 export held ~57k
    certainty: 80
  - freshness: {col: decision_date, reaches: today - 120d}
    reason: PMA decisions release monthly
    points_outward: true
