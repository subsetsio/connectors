spec_id: fda-device-registrationlisting
status: active
tests:
  - nullable: {col: establishment_type, max_null_frac: 0.001}
    reason: establishment_type is present on all but a handful of registration records (11 nulls of ~327k observed June 2026)
    certainty: 80
  - enum: {col: initial_importer_flag, values: ['N', 'Y']}
    reason: importer flag is a Y/N field
    certainty: 85
    severity: warn
  - row_count: {min: 250000}
    reason: active registrations hover above 300k; June 2026 export held ~327k
    certainty: 75
  - freshness: {col: reg_expiry_date_year, reaches: today - 400d}
    reason: registrations renew annually, so the max expiry year must be at least the prior year
    points_outward: true
