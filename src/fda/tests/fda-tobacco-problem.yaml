spec_id: fda-tobacco-problem
status: active
tests:
  - not_null: report_id
    reason: every tobacco problem report carries its report id
    certainty: 90
  - unique: report_id
    reason: one row per problem report; the published table keys on it
    certainty: 85
  - matches: {col: date_submitted, pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2}'}
    reason: the endpoint ships MM/DD/YYYY; the fetch fn normalizes to ISO YYYY-MM-DD so raw sorts correctly
    certainty: 85
    severity: warn
  - freshness: {col: date_submitted, reaches: today - 400d}
    reason: quarterly-ish export with ~6-month reporting lag (observed max 2025-12-28 on the 2026-07 run)
    points_outward: true
  - row_count: {min: 1000, max: 100000}
    reason: small reporting program; June 2026 export held ~1.3k
    certainty: 70
