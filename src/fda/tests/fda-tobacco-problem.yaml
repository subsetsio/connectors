spec_id: fda-tobacco-problem
status: active
tests:
  - not_null: report_id
    reason: every tobacco problem report carries its report id
    certainty: 90
  - unique: report_id
    reason: one row per problem report; the published table keys on it
    certainty: 85
  - matches: {col: date_submitted, pattern: '[0-9]{2}/[0-9]{2}/[0-9]{4}'}
    reason: tobacco problem dates serialize as MM/DD/YYYY (unlike most of openFDA)
    certainty: 80
    severity: warn
  - row_count: {min: 1000, max: 100000}
    reason: small reporting program; June 2026 export held ~1.3k
    certainty: 70
