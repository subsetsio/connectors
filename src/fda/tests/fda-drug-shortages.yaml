spec_id: fda-drug-shortages
status: active
tests:
  - not_null: generic_name
    reason: every shortage record names the drug in shortage
    certainty: 90
  - enum: {col: update_type, values: ['New', 'Revised', 'Reverified']}
    reason: shortage updates are typed New/Revised/Reverified (observed vocabulary, June 2026)
    certainty: 80
    severity: warn
  - matches: {col: update_date, pattern: '[0-9]{4}-[0-9]{2}-[0-9]{2}'}
    reason: the endpoint ships MM/DD/YYYY; the fetch fn normalizes to ISO YYYY-MM-DD so raw sorts correctly
    certainty: 85
    severity: warn
  - freshness: {col: update_date, reaches: today - 90d}
    reason: the shortage list updates near-daily (observed max 2026-06-17 on the 2026-07 run)
    points_outward: true
  - row_count: {min: 1000, max: 50000}
    reason: active+resolved shortage list is small; June 2026 export held ~1.6k. 50k+ means the grain changed
    certainty: 70
