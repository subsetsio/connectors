spec_id: fda-drug-shortages
status: active
tests:
  - not_null: generic_name
    reason: every shortage record names the drug in shortage
    certainty: 90
  - enum: {col: update_type, values: ['New', 'Revised', 'Resolved']}
    reason: shortage updates are typed New/Revised/Resolved
    certainty: 60
    severity: warn
  - matches: {col: update_date, pattern: '[0-9]{2}/[0-9]{2}/[0-9]{4}'}
    reason: the shortages endpoint serializes dates as MM/DD/YYYY (unlike the rest of openFDA)
    certainty: 80
    severity: warn
  - row_count: {min: 1000, max: 50000}
    reason: active+resolved shortage list is small; June 2026 export held ~1.6k. 50k+ means the grain changed
    certainty: 70
