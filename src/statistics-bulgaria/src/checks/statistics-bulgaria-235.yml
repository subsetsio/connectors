# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-235`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, relative_median_income_ratio, sex, unit]
temporal: period
checks:
  - kind: unique
    columns: [period, relative_median_income_ratio, sex, unit]
  - kind: not_null
    col: period
  - kind: not_null
    col: relative_median_income_ratio
  - kind: not_null
    col: sex
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 54
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
