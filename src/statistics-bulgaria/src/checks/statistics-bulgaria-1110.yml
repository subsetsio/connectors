# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-1110`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, reasons_leaving_job, sex, employment_experience_unempl]
temporal: period
checks:
  - kind: unique
    columns: [period, reasons_leaving_job, sex, employment_experience_unempl]
  - kind: not_null
    col: period
  - kind: not_null
    col: reasons_leaving_job
  - kind: not_null
    col: sex
  - kind: not_null
    col: employment_experience_unempl
  - kind: row_floor
    min: 1067
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
