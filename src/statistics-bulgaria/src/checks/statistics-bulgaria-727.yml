# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-727`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, monetary_expenditure, meassure, residence]
temporal: period
checks:
  - kind: unique
    columns: [period, monetary_expenditure, meassure, residence]
  - kind: not_null
    col: period
  - kind: not_null
    col: monetary_expenditure
  - kind: not_null
    col: meassure
  - kind: not_null
    col: residence
  - kind: row_floor
    min: 1296
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
