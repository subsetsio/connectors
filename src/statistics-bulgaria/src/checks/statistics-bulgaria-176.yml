# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-176`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, nuts, mean_median_income, sex, age, unit]
temporal: period
checks:
  - kind: unique
    columns: [period, nuts, mean_median_income, sex, age, unit]
  - kind: not_null
    col: period
  - kind: not_null
    col: nuts
  - kind: not_null
    col: mean_median_income
  - kind: not_null
    col: sex
  - kind: not_null
    col: age
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 8059
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
