# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-169`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [nuts, period, mean_median_income, unit, household_type]
temporal: period
checks:
  - kind: unique
    columns: [nuts, period, mean_median_income, unit, household_type]
  - kind: not_null
    col: nuts
  - kind: not_null
    col: period
  - kind: not_null
    col: mean_median_income
  - kind: not_null
    col: unit
  - kind: not_null
    col: household_type
  - kind: row_floor
    min: 3042
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
