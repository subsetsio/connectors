# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-1893`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [weeks, district, age, period, sex]
temporal: period
checks:
  - kind: unique
    columns: [weeks, district, age, period, sex]
  - kind: not_null
    col: weeks
  - kind: not_null
    col: district
  - kind: not_null
    col: age
  - kind: not_null
    col: period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 522000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
