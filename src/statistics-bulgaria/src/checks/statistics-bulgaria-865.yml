# compiled by `hardened compile-checks` — post-publish audit of `statistics-bulgaria-865`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, nuts, size_class_by_employed, indicators, unit]
temporal: period
checks:
  - kind: unique
    columns: [period, nuts, size_class_by_employed, indicators, unit]
  - kind: not_null
    col: period
  - kind: not_null
    col: nuts
  - kind: not_null
    col: size_class_by_employed
  - kind: not_null
    col: indicators
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 1912
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
