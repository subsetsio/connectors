spec_id: statistics-bulgaria-1150
status: active
tests:
  - row_count: {min: 1}
    reason: every rank-active NSI dataset has at least one published data cell; 0 rows means the JSON-stat endpoint changed or the dataset was retired
    certainty: 90
  - not_null: value
    reason: null/suppressed cells are dropped during melt, so every surviving row carries a numeric value
    certainty: 95
  - column_type: {col: value, type: float}
    reason: all NSI measures are coerced to double in the fetch fn
    certainty: 95
