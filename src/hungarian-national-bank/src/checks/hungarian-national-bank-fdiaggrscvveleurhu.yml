# compiled by `hardened compile-checks` — post-publish audit of `hungarian-national-bank-fdiaggrscvveleurhu`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cell_value, row_number, column_number, sheet_name, cell_type]
temporal: last_update_date
checks:
  - kind: unique
    columns: [cell_value, row_number, column_number, sheet_name, cell_type]
  - kind: not_null
    col: cell_value
  - kind: not_null
    col: row_number
  - kind: not_null
    col: column_number
  - kind: not_null
    col: sheet_name
  - kind: not_null
    col: cell_type
  - kind: row_floor
    min: 7570
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
