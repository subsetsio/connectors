# compiled by `hardened compile-checks` — post-publish audit of `enisa-affected-products`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [euvd_id, product_name, vendor_name, product_version]
checks:
  - kind: unique
    columns: [euvd_id, product_name, vendor_name, product_version]
  - kind: not_null
    col: euvd_id
  - kind: not_null
    col: product_name
  - kind: not_null
    col: vendor_name
  - kind: not_null
    col: product_version
  - kind: row_floor
    min: 88117
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
