spec_id: enisa-affected-products
status: active
tests:
  - not_null: euvd_id
  - not_null: product_name
  - matches: {col: euvd_id, pattern: '^EUVD-'}
    reason: foreign key back to the vulnerabilities corpus; same EUVD-YYYY-NNNNN format
    certainty: 95
  - row_count: {min: 200000}
    reason: most of ~359k vulnerabilities list at least one affected product, exploded one row per (vuln, product)
    certainty: 80
  - distinct_count: {col: euvd_id, min: 100000}
    reason: a large fraction of distinct vulnerabilities carry product mappings
    certainty: 70
    severity: warn
