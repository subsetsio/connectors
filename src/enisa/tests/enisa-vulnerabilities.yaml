spec_id: enisa-vulnerabilities
status: active
tests:
  - not_null: id
  - matches: {col: id, pattern: '^EUVD-'}
    reason: every EUVD record id is formatted EUVD-YYYY-NNNNN
    certainty: 95
  - unique: id
    reason: >-
      one row per EUVD identifier. Raw may carry a few duplicates: the crawl walks a
      live newest-first feed, so records inserted mid-crawl shift into pages not yet
      read and can be seen twice. The transform dedups on id; a large duplicate count
      here would instead mean pagination is repeating pages.
    certainty: 60
    severity: warn
  - row_count: {min: 200000}
    reason: the corpus was 364k records in July 2026 and only grows; a small count means the crawl truncated
    certainty: 85
  - column_type: {col: base_score, type: float}
    certainty: 80
  - between: {col: base_score, lo: 0, hi: 10}
    reason: CVSS base scores are bounded 0-10 across all versions (null for ~50% of records, which this does not assert against)
    certainty: 90
  - between: {col: epss, lo: 0, hi: 100}
    reason: EPSS is an exploit-prediction probability the API reports on a 0-100 scale
    certainty: 75
    severity: warn
  - freshness: {col: date_published, reaches: today - 30d}
    reason: ENISA publishes new vulnerabilities continuously; a stale max means the source paused or our crawl missed the front pages
    certainty: 70
    points_outward: true
    severity: warn
