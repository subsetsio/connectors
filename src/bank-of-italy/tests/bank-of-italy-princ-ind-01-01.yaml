spec_id: bank-of-italy-princ-ind-01-01
status: active
tests:
  - row_count: {min: 1}
    reason: a PROSPETTODATI pull of this measure-named (rate-decision registry) table always returns observations.
    certainty: 95
  - not_null: MEASURES
    reason: each row of a measure-named (wide) table names the measure whose value it carries; the value lives in the column of that name rather than in VALORE.
    certainty: 90
  - not_null: DATA_PROV
    reason: each provision carries its publication/provision date.
    certainty: 80
    severity: warn
  - freshness: {col: DATA_DECOR, reaches: "1900-01-01"}
    reason: this special rate-decision table uses DATA_DECOR as its effective observation date instead of DATA_OSS.
    certainty: 80
    points_outward: true
