spec_id: bank-of-italy-princ-ind-01-01
status: active
tests:
  - not_null: series_id
  - not_null: date
  - row_count: {min: 1}
  - coverage: {col: series_id, expected: 1}
    reason: collect enumerated this table's member cubes; every one must land - a shortfall is silent partial loss, not a successful run
    certainty: 95
  - freshness: {col: date, reaches: today - 1500d}
    reason: no coverage end advertised for this table; bound is the observed worst-case publication lag for unknown-frequency BDS tables
    certainty: 70
    points_outward: true
  - not_null: MEASURES
    reason: every row of a rate-decision registry names the column carrying its value
  - nullable: {col: value, max_null_frac: 0.85}
    reason: date-valued measures (DATA_DECOR) and unset rate fields cast to null; only the numeric rate rows carry a value
    certainty: 70
    severity: warn
