spec_id: bank-of-italy-tri30361
status: active
tests:
  - not_null: series_id
  - not_null: date
  - row_count: {min: 1}
  - coverage: {col: series_id, expected: 3}
    reason: collect enumerated this table's member cubes; every one must land - a shortfall is silent partial loss, not a successful run
    certainty: 95
  - freshness: {col: date, reaches: '2025-12-31'}
    reason: the BDS catalog advertises this table's coverage as ending on this date; fetching less means we truncated it
    certainty: 90
  - nullable: {col: value, max_null_frac: 0.05}
    reason: VALORE is populated on essentially every observation; a spike of nulls means the value column moved
    certainty: 80
    severity: warn
