spec_id: continuous-plankton-recorder-sahfos-cpr-phyto
status: active
tests:
  - not_null: occurrenceID
    reason: occurrenceID is the DwC core record id; every occurrence row must carry one
    certainty: 97
  - column_type: {col: occurrenceID, type: string}
    reason: raw is parsed all-VARCHAR; the transform casts downstream
    certainty: 95
  - not_null: eventID
    reason: every CPR occurrence is tied to a sampling event (the silk sample)
    certainty: 90
  - not_null: scientificName
    reason: the North Atlantic phytoplankton core names every observed taxon
    certainty: 85
    severity: warn
  - distinct_count: {col: scientificName, min: 100}
    reason: CPR phytoplankton spans hundreds of taxa; far fewer means a truncated pull
    certainty: 80
    severity: warn
  - row_count: {min: 900000}
    reason: v4.7 publishes ~1.1M phytoplankton occurrence rows (1958-2018)
    certainty: 75
    severity: warn
