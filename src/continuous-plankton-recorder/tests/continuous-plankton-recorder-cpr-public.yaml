spec_id: continuous-plankton-recorder-cpr-public
status: active
tests:
  - not_null: occurrenceID
    reason: occurrenceID is the DwC core record id; every occurrence row must carry one
    certainty: 97
  - column_type: {col: occurrenceID, type: string}
    reason: raw is parsed all-VARCHAR; the transform casts downstream
    certainty: 95
  - not_null: eventID
    reason: every CPR occurrence is tied to a sampling event (the silk sample)
    certainty: 90
  - not_null: scientificName
    reason: the public CPR occurrence core names every observed taxon
    certainty: 85
    severity: warn
  - row_count: {min: 2500000}
    reason: the aggregate public CPR Survey occurrence core holds ~3.5M rows
    certainty: 70
    severity: warn
