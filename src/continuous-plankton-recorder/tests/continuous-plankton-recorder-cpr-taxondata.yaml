spec_id: continuous-plankton-recorder-cpr-taxondata
status: active
coverage:
  frozen: true
  reason: CPR Survey Taxon Data is a versioned checklist/codebook archive; it changes only when the source republishes the checklist, not on a regular observation cadence.
tests:
  - not_null: taxonID
    reason: taxonID is the Darwin Core checklist key; every checklist row must carry one
    certainty: 97
  - column_type: {col: taxonID, type: string}
    reason: raw is parsed all-VARCHAR; the transform casts downstream
    certainty: 95
  - not_null: scientificName
    reason: the taxon checklist names every CPR taxon
    certainty: 95
  - row_count: {min: 500}
    reason: the CPR Survey taxon checklist contains hundreds of plankton taxa; far fewer means a truncated pull
    certainty: 80
    severity: warn
