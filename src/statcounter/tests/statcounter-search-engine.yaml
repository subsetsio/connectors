spec_id: statcounter-search-engine
status: active
tests:
  - not_null: date
  - not_null: region_code
  - not_null: region_name
  - not_null: region_type
  - not_null: category
  - not_null: market_share
  - column_type: {col: date, type: string}
  - column_type: {col: region_code, type: string}
  - column_type: {col: region_name, type: string}
  - column_type: {col: region_type, type: string}
  - column_type: {col: category, type: string}
  - column_type: {col: market_share, type: float}
  - matches: {col: date, pattern: '^\d{4}-\d{2}$'}
  - enum: {col: region_type, values: [worldwide, continent, country]}
  - between: {col: market_share, lo: 0, hi: 100}
  - unique: [date, region_code, category]
    reason: one search-engine market-share observation per month and region
    certainty: 90
  - row_count: {min: 5000}
  - freshness: {col: date, reaches: today - 75d}
    reason: StatCounter Global Stats is refreshed monthly
    certainty: 85
    points_outward: true
