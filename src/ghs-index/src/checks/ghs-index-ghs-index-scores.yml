# compiled by `hardened compile-checks` — post-publish audit of `ghs-index-ghs-index-scores`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator_label, indicator_code, country, level, year]
temporal: year
checks:
  - kind: unique
    columns: [indicator_label, indicator_code, country, level, year]
  - kind: not_null
    col: indicator_label
  - kind: not_null
    col: indicator_code
  - kind: not_null
    col: country
  - kind: not_null
    col: level
  - kind: not_null
    col: year
  - kind: row_floor
    min: 60645
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
