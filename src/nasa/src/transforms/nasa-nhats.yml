# NHATS (Near-Earth Object Human Space Flight Accessible Targets Study)
# compliant-object snapshot (nhats.api summary mode). One row per NEA meeting
# the round-trip delta-v/duration constraints; membership grows with discovery.
key: [des]
temporal: obs_window_end
columns:
  - name: des
    type: VARCHAR
    description: primary designation of the near-Earth asteroid
  - name: fullname
    type: VARCHAR
    description: full object name/designation as displayed by JPL (trimmed)
  - name: orbit_id
    type: BIGINT
    description: orbit solution id
  - name: h_mag
    type: DOUBLE
    description: absolute magnitude H
  - name: orbit_condition_code
    type: BIGINT
    description: MPC orbit condition code (0 = well determined .. 9 = poorly determined)
  - name: min_size_m
    type: DOUBLE
    description: minimum estimated diameter, meters (albedo 0.60 bound when size unmeasured)
  - name: max_size_m
    type: DOUBLE
    description: maximum estimated diameter, meters (albedo 0.03 bound when size unmeasured)
  - name: size_m
    type: DOUBLE
    description: measured/estimated diameter, meters; null when unmeasured
  - name: size_sigma_m
    type: DOUBLE
    description: 1-sigma uncertainty on size_m, meters; null when unmeasured
  - name: min_dv_kms
    type: DOUBLE
    description: minimum round-trip delta-v across compliant trajectories, km/s
  - name: min_dv_duration_days
    type: BIGINT
    description: total mission duration of the minimum-delta-v trajectory, days
  - name: min_dur_dv_kms
    type: DOUBLE
    description: delta-v of the minimum-duration trajectory, km/s
  - name: min_dur_days
    type: BIGINT
    description: minimum total mission duration across compliant trajectories, days
  - name: n_trajectories
    type: BIGINT
    description: number of compliant round-trip trajectory solutions found
  - name: obs_window_start
    type: DATE
    description: start of the next optical observation opportunity window; null when none upcoming
  - name: obs_window_end
    type: DATE
    description: end of the next optical observation opportunity window; null when none upcoming
  - name: obs_flag
    type: VARCHAR
    description: observation-window quality flag; null when no window
  - name: obs_mag
    type: DOUBLE
    description: brightest apparent magnitude during the observation window
  - name: radar_obs_arecibo
    type: DATE
    description: date of a potential Arecibo radar observation opportunity; null when none
  - name: radar_obs_goldstone
    type: DATE
    description: date of a potential Goldstone radar observation opportunity; null when none
  - name: radar_snr_arecibo
    type: DOUBLE
    description: predicted radar signal-to-noise at Arecibo; null when no opportunity
  - name: radar_snr_goldstone
    type: DOUBLE
    description: predicted radar signal-to-noise at Goldstone; null when no opportunity
