# Kepler Q1-Q17 DR25 threshold-crossing events: one row per (kepid, tce_plnt_num) (verified unique). Frozen 2017 delivery.
# curation: dropped 12 all-null, 0 *_reflink (HTML), 0 *_solnid, 0 '*str' display-dup columns.
