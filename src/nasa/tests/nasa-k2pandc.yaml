spec_id: nasa-k2pandc
status: active
tests:
  - not_null: pl_name
    certainty: 90
  - enum: {col: default_flag, values: [0, 1]}
    certainty: 95
  - between: {col: disc_year, lo: 2009, hi: current_year()}
    reason: mostly K2-era (2014+) but a few entries carry earlier Kepler-era discovery years (2011 observed 2026-07); 2009 = Kepler launch floor
    certainty: 85
    severity: warn
  - row_count: {min: 3500}
    reason: probed 4049 rows (planets and candidates, one per reference)
    certainty: 90
  - freshness: {col: rowupdate, reaches: today - 365d}
    reason: still actively curated (max rowupdate 2 days old at probe time), but K2 updates are sporadic - a year of slack
    points_outward: true
