spec_id: nasa-events
status: active
tests:
  - not_null: event_id
    certainty: 95
  - not_null: title
    certainty: 90
  - not_null: date
    reason: our fetch emits one row per event geometry, and every geometry carries a date
    certainty: 90
  - freshness: {col: date, reaches: today - 30d}
    reason: EONET tracks live natural events (wildfires, storms) with new geometries daily
    points_outward: true
  - enum: {col: geom_type, values: [Point, Polygon]}
    reason: EONET v3 geometries are GeoJSON Points or Polygons
    certainty: 80
    severity: warn
  - between: {col: latitude, lo: -90, hi: 90}
    reason: a few upstream feeds ship invalid/swapped coordinates (lat 200 observed 2026-07); source-side quality issue, the transform nulls out-of-range pairs
    certainty: 60
    points_outward: true
    severity: warn
  - between: {col: longitude, lo: -180, hi: 180}
    reason: same source-side coordinate quality issue as latitude
    certainty: 60
    points_outward: true
    severity: warn
  - row_count: {min: 3000}
    reason: the all-status archive spans 2016..now with thousands of events, most multi-geometry
    certainty: 75
