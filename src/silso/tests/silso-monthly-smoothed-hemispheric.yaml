spec_id: silso-monthly-smoothed-hemispheric
status: active
tests:
  - row_count: {min: 300}
    reason: monthly smoothed hemispheric series starts in 1992
    certainty: 95
  - not_null: year
  - not_null: month
  - column_type: {col: year, type: integer}
  - column_type: {col: smoothed_sn_total, type: float}
  - column_type: {col: smoothed_sn_north, type: float}
  - column_type: {col: smoothed_sn_south, type: float}
  - unique: [year, month]
    reason: one row per calendar month
    certainty: 95
  - between: {col: year, lo: 1992, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: current_year()}
    reason: SILSO publishes recent provisional smoothed hemispheric rows even though final smoothing lags
    certainty: 75
    points_outward: true
