spec_id: silso-monthly-hemispheric
status: active
tests:
  - row_count: {min: 300}
    reason: monthly hemispheric series starts in 1992
    certainty: 95
  - not_null: year
  - not_null: month
  - column_type: {col: year, type: integer}
  - column_type: {col: sn_total, type: float}
  - column_type: {col: sn_north, type: float}
  - column_type: {col: sn_south, type: float}
  - unique: [year, month]
    reason: one row per calendar month
    certainty: 95
  - between: {col: year, lo: 1992, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: current_year()}
    reason: SILSO monthly hemispheric series is updated monthly
    certainty: 85
    points_outward: true
