spec_id: silso-monthly-smoothed-total
status: active
tests:
  - row_count: {min: 3000}
    reason: monthly smoothed total series starts in 1749
    certainty: 95
  - not_null: year
  - not_null: month
  - column_type: {col: year, type: integer}
  - column_type: {col: smoothed_sunspot_number, type: float}
  - unique: [year, month]
    reason: one row per calendar month
    certainty: 95
  - between: {col: year, lo: 1749, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: current_year()}
    reason: SILSO publishes recent provisional smoothed monthly rows even though final smoothing lags
    certainty: 75
    points_outward: true
