# compiled by `hardened compile-checks` — post-publish audit of `new-york-state-department-of-labor-xbjp-8sra`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, month, region, county]
checks:
  - kind: unique
    columns: [year, month, region, county]
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: region
  - kind: not_null
    col: county
  - kind: row_floor
    min: 9760
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
