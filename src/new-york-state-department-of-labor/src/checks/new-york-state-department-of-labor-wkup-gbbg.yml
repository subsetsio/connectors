    columns: [employed, demographic_description, year, demographics]
  - kind: not_null
    col: employed
  - kind: not_null
    col: demographic_description
  - kind: not_null
    col: year
  - kind: not_null
    col: demographics
  - kind: row_floor
    min: 269
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
