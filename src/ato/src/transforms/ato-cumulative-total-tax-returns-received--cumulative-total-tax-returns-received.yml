key: [income_year, date]
temporal: date
sort: [date, income_year]
columns:
  - name: income_year
    type: VARCHAR
    description: Australian income year for the cumulative return-receipt series.
  - name: date
    type: DATE
    description: Weekly reporting date.
  - name: cumulative_total_tax_returns_received
    type: BIGINT
    description: Cumulative total tax returns received by the ATO as of the reporting date.
  - name: electronic
    type: BIGINT
    description: Cumulative tax returns received electronically.
  - name: paper
    type: BIGINT
    description: Cumulative tax returns received on paper.
  - name: of_current_year_returns_digitally_submitted
    type: DOUBLE
    description: Share of current-year returns submitted digitally.
