key: [name]
temporal: added_date
sort: [added_date, name]
columns:
  - name: name
    type: VARCHAR
    description: Name of the entity listed in BNM's financial consumer alert list.
  - name: registration_number
    type: VARCHAR
    description: Registration number as published by BNM, where provided.
  - name: added_date
    type: DATE
    description: Date the entity was added to BNM's financial consumer alert list.
  - name: websites
    type: VARCHAR
    description: Source-published website list serialized from the API array.
