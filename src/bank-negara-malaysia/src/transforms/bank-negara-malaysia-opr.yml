# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `bank-negara-malaysia-opr`. Regenerate after model-verify.
# caution: Rows record policy-rate decision dates and levels, not a daily forward-filled policy-rate calendar.
# caution: The raw feed can repeat a decision date; use the published transform for one row per decision date.
key: [date]
temporal: date
sort: [date]
columns:
  - name: year
    type: BIGINT
  - name: date
    type: DATE
  - name: change_in_opr
    type: DOUBLE
  - name: new_opr_level
    type: DOUBLE
