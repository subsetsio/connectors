spec_id: bank-negara-malaysia-base-rate
status: active
coverage:
  frozen: true
  reason: BNM exposes base-rate as a latest-state bank snapshot; effective_date is the rate-effective date for current rows, not a regularly advancing observation date.
tests:
  - not_null: bank_name
    reason: bank_name is the populated natural key; the API leaves bank_code blank
      for many banks (Islamic banks, Agrobank, ...), so bank_name is what identifies a row
    certainty: 95
  - not_null: base_rate
    reason: the base rate is the headline measure and is quoted for every bank
    certainty: 90
  - not_null: effective_date
    reason: the snapshot's effective_date is stamped onto every row from the meta block
    certainty: 90
  - unique: bank_name
    reason: this is a latest-state snapshot — one row per bank, no history
    certainty: 85
  - row_count: {min: 10, max: 100}
    reason: ~35 licensed Malaysian banks publish a base rate
    certainty: 80
  - column_type: {col: base_rate, type: float}
    reason: base rates are reported to 2 decimals (e.g. 2.70)
    certainty: 80
  - between: {col: base_rate, lo: 0, hi: 20}
    reason: a bank base rate is a small annual percentage
    certainty: 85
    severity: warn
