spec_id: bank-negara-malaysia-islamic-interbank-rate
status: active
tests:
  - not_null: date
    reason: every observation is keyed by date
    certainty: 95
  - column_type: {col: overnight, type: float}
    reason: rates are decimal annual percentages
    certainty: 75
  - between: {col: overnight, lo: 0, hi: 20}
    reason: an overnight Islamic interbank rate is a small annual percentage
    certainty: 80
    severity: warn
  - row_count: {min: 500}
    reason: daily series spanning many years
    certainty: 75
  - freshness: {col: date, reaches: today - 45d}
    reason: published each business day; stale max = source lag
    certainty: 75
    points_outward: true
    severity: warn
