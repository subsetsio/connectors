# compiled by `hardened compile-checks` — post-publish audit of `bundesagentur-f-r-arbeit-fst-current`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [metric, group_code, group_name, period_label, date]
temporal: date
checks:
  - kind: unique
    columns: [metric, group_code, group_name, period_label, date]
  - kind: not_null
    col: metric
  - kind: not_null
    col: group_code
  - kind: not_null
    col: group_name
  - kind: not_null
    col: period_label
  - kind: not_null
    col: date
  - kind: row_floor
    min: 308
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
