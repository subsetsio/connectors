# compiled by `hardened compile-checks` — post-publish audit of `bundesagentur-f-r-arbeit-alo-current`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [metric, period_label, date, month, year]
temporal: date
checks:
  - kind: unique
    columns: [metric, period_label, date, month, year]
  - kind: not_null
    col: metric
  - kind: not_null
    col: period_label
  - kind: not_null
    col: date
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: row_floor
    min: 40
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
