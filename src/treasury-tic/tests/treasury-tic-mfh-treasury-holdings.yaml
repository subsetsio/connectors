spec_id: treasury-tic-mfh-treasury-holdings
status: active
tests:
  - not_null: country
    reason: each MFH observation is keyed by country or aggregate holder label.
    certainty: 95
  - not_null: date
    reason: each MFH observation belongs to a month.
    certainty: 95
  - column_type: {col: country, type: string}
    certainty: 95
  - column_type: {col: date, type: string}
    certainty: 95
  - column_type: {col: holdings_billions, type: float}
    certainty: 95
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: the fetch normalizes TIC month headers to YYYY-MM before the transform casts to DATE.
    certainty: 95
  - unique: [country, date]
    reason: the merged MFH raw table is one holdings value per holder and month; duplicate keys mean overlap was appended instead of overwritten.
    certainty: 95
  - row_count: {min: 5000}
    reason: MFH combines pre-2000 aggregate history with by-country monthly history and recent current table values.
    certainty: 90
  - distinct_count: {col: country, min: 50}
    reason: recent MFH tables cover many foreign holders, not just the aggregate historical total.
    certainty: 90
  - freshness: {col: date, reaches: today - 220d}
    reason: TIC is a monthly publication with reporting lag; the raw month should reach roughly the last several months.
    certainty: 85
    points_outward: true
