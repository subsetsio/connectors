# compiled by `hardened compile-checks` — post-publish audit of `dsec-macao-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [indicator_id, reference_period, unit, year, data_period]
temporal: last_update_date
checks:
  - kind: unique
    columns: [indicator_id, reference_period, unit, year, data_period]
  - kind: not_null
    col: indicator_id
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: unit
  - kind: not_null
    col: year
  - kind: not_null
    col: data_period
  - kind: row_floor
    min: 591309
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
