spec_id: hugging-face-hub-models
status: active
tests:
  - not_null: id
    reason: every model row is keyed by its repo id; a null id means a malformed page
    certainty: 98
  - unique: id
    reason: full cursor crawl should yield one row per repo; rare dupes across page boundaries are dedup'd in transform
    certainty: 80
    severity: warn
  - row_count: {min: 200000}
    reason: the Hub hosts ~2M model repos; <200k means pagination broke after the first pages
    certainty: 90
  - between: {col: downloads, lo: 0, hi: 100000000000}
    reason: download counts are non-negative cumulative integers
    certainty: 85
    severity: warn
  - between: {col: likes, lo: 0, hi: 100000000}
    reason: like counts are small non-negative integers
    certainty: 85
    severity: warn
  - not_null: lastModified
    reason: every repo carries a lastModified timestamp
    certainty: 90
    severity: warn
