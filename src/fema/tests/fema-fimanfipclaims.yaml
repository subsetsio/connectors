spec_id: fema-fimanfipclaims
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: string}
    reason: OpenFEMA serves id as text in the typed full-file
    certainty: 90
  - row_count: {min: 1360890}
    reason: catalog recordCount=2721780 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - column_type: {col: asOfDate, type: timestamp}
    reason: server typed full-file delivers asOfDate as timestamp; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - column_type: {col: basementEnclosureCrawlspaceType, type: integer}
    reason: server typed full-file delivers basementEnclosureCrawlspaceType as integer; a string here means format drift (CSV fallback / changed export)
    certainty: 80
