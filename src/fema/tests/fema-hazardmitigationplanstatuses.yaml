spec_id: fema-hazardmitigationplanstatuses
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: string}
    reason: OpenFEMA serves id as uuid in the typed full-file
    certainty: 90
  - row_count: {min: 18297}
    reason: catalog recordCount=36595 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - freshness: {col: planApprovalDate, reaches: today - 540d}
    reason: "OpenFEMA mitigation plan approvals should advance as plans are newly approved or updated"
    certainty: 55
    points_outward: true
    severity: warn
  - not_null: femaRegion
    reason: femaRegion is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: stateAbbreviation
    reason: stateAbbreviation is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: state
    reason: state is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - column_type: {col: apaDate, type: date}
    reason: server typed full-file delivers apaDate as date; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - column_type: {col: femaRegion, type: integer}
    reason: server typed full-file delivers femaRegion as integer; a string here means format drift (CSV fallback / changed export)
    certainty: 80
