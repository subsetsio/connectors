spec_id: fema-hmasubapplicationscongressionaldistricts
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: integer}
    reason: OpenFEMA serves id as bigint in the typed full-file
    certainty: 90
  - row_count: {min: 5444}
    reason: catalog recordCount=10888 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: subapplicationIdentifier
    reason: subapplicationIdentifier is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: stateNumberCode
    reason: stateNumberCode is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: districtNumberCode
    reason: districtNumberCode is non-nullable per the OpenFEMA data dictionary
    certainty: 85
