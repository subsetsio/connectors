spec_id: fema-individualsandhouseholdsprogramvalidregistrations
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - row_count: {min: 12919338}
    reason: catalog recordCount=25838677 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: incidentTypeCode
    reason: incidentTypeCode is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: declarationDate
    reason: declarationDate is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: disasterNumber
    reason: disasterNumber is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - freshness: {col: lastRefresh, reaches: today - 540d}
    reason: "OpenFEMA stamps lastRefresh on every refresh; a max older than ~18mo suggests the dataset is frozen upstream (reconcile, not necessarily our bug)"
    certainty: 55
    points_outward: true
    severity: warn
