spec_id: fema-ipawsarchivedalerts
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - row_count: {min: 2439260}
    reason: catalog recordCount=4878521 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: originalMessage
    reason: originalMessage is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: identifier
    reason: identifier is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: sender
    reason: sender is non-nullable per the OpenFEMA data dictionary
    certainty: 85
