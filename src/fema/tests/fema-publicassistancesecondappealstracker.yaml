spec_id: fema-publicassistancesecondappealstracker
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: integer}
    reason: OpenFEMA serves id as bigint in the typed full-file
    certainty: 90
  - row_count: {min: 842}
    reason: catalog recordCount=1685 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: region
    reason: region is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: disasterNumber
    reason: disasterNumber is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: declarationType
    reason: declarationType is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - column_type: {col: hqReceivedDate, type: date}
    reason: server typed full-file delivers hqReceivedDate as date; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - column_type: {col: region, type: integer}
    reason: server typed full-file delivers region as integer; a string here means format drift (CSV fallback / changed export)
    certainty: 80
