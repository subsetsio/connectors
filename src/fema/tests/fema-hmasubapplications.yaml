spec_id: fema-hmasubapplications
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: string}
    reason: OpenFEMA serves id as uuid in the typed full-file
    certainty: 90
  - row_count: {min: 2603}
    reason: catalog recordCount=5206 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: subapplicationIdentifier
    reason: subapplicationIdentifier is a documented primary-key component (non-nullable in the data dictionary)
    certainty: 90
  - not_null: program
    reason: program is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: fiscalYear
    reason: fiscalYear is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: region
    reason: region is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - column_type: {col: eo12372ReviewDate, type: date}
    reason: server typed full-file delivers eo12372ReviewDate as date; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - column_type: {col: fiscalYear, type: integer}
    reason: server typed full-file delivers fiscalYear as integer; a string here means format drift (CSV fallback / changed export)
    certainty: 80
