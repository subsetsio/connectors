spec_id: fema-hazardmitigationgrantprogramdisastersummaries
status: active
tests:
  - not_null: id
    reason: OpenFEMA appends a system-generated record id to every row of every dataset
    certainty: 95
  - unique: id
    reason: the OpenFEMA record id is a per-row unique key; dupes mean the full-file was concatenated/double-pulled
    certainty: 95
  - column_type: {col: id, type: string}
    reason: OpenFEMA serves id as uuid in the typed full-file
    certainty: 90
  - row_count: {min: 1279}
    reason: catalog recordCount=2559 at migration; a full-corpus snapshot should not fall below ~half that without a truncated download
    certainty: 80
    severity: block
  - not_null: disasterNumber
    reason: disasterNumber is a documented primary-key component (non-nullable in the data dictionary)
    certainty: 90
  - not_null: declarationDate
    reason: declarationDate is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: disasterType
    reason: disasterType is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - not_null: incidentType
    reason: incidentType is non-nullable per the OpenFEMA data dictionary
    certainty: 85
  - column_type: {col: declarationDate, type: date}
    reason: server typed full-file delivers declarationDate as date; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - column_type: {col: disasterNumber, type: integer}
    reason: server typed full-file delivers disasterNumber as integer; a string here means format drift (CSV fallback / changed export)
    certainty: 80
  - freshness: {col: lastRefresh, reaches: today - 540d}
    reason: "OpenFEMA stamps lastRefresh on every refresh; a max older than ~18mo suggests the dataset is frozen upstream (reconcile, not necessarily our bug)"
    certainty: 55
    points_outward: true
    severity: warn
