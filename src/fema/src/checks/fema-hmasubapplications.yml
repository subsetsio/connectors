# compiled by `hardened compile-checks` — post-publish audit of `fema-hmasubapplications`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dateinitiatedinsystem, subapplicationidentifier]
temporal: dateinitiatedinsystem
checks:
  - kind: unique
    columns: [dateinitiatedinsystem, subapplicationidentifier]
  - kind: not_null
    col: dateinitiatedinsystem
  - kind: not_null
    col: subapplicationidentifier
  - kind: row_floor
    min: 2603
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
