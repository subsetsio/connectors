# compiled by `hardened compile-checks` — post-publish audit of `fema-hazardmitigationassistanceprojects`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, projectidentifier, state, statenumbercode, programarea]
temporal: dateapproved
checks:
  - kind: unique
    columns: [id, projectidentifier, state, statenumbercode, programarea]
  - kind: not_null
    col: id
  - kind: not_null
    col: projectidentifier
  - kind: not_null
    col: state
  - kind: not_null
    col: statenumbercode
  - kind: not_null
    col: programarea
  - kind: row_floor
    min: 28012
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
