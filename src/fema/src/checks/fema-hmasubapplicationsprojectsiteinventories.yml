# compiled by `hardened compile-checks` — post-publish audit of `fema-hmasubapplicationsprojectsiteinventories`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, subapplicationid, city, stateabbreviation, statecode]
checks:
  - kind: unique
    columns: [id, subapplicationid, city, stateabbreviation, statecode]
  - kind: not_null
    col: id
  - kind: not_null
    col: subapplicationid
  - kind: not_null
    col: city
  - kind: not_null
    col: stateabbreviation
  - kind: not_null
    col: statecode
  - kind: row_floor
    min: 8005
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
