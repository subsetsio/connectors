# compiled by `hardened compile-checks` — post-publish audit of `fema-housingassistancerenters`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, zipcode, city, county, disasternumber]
checks:
  - kind: unique
    columns: [id, zipcode, city, county, disasternumber]
  - kind: not_null
    col: id
  - kind: not_null
    col: zipcode
  - kind: not_null
    col: city
  - kind: not_null
    col: county
  - kind: not_null
    col: disasternumber
  - kind: row_floor
    min: 73825
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
