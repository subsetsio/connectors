spec_id: football-data-co-uk-matches-main
status: active
tests:
  - not_null: HomeTeam
    reason: every match row has both teams; nulls mean blank lines slipped through
    certainty: 95
  - not_null: AwayTeam
    certainty: 95
  - not_null: Season
    reason: season is injected from the file URL for every row
    certainty: 95
  - between: {col: FTHG, lo: 0, hi: 30}
    reason: full-time goals for one team in one match
    certainty: 90
  - between: {col: FTAG, lo: 0, hi: 30}
    certainty: 90
  - enum: {col: FTR, values: [H, D, A]}
    reason: full-time result is home win / draw / away win
    certainty: 90
    severity: warn
  - between: {col: B365H, lo: 0.0, hi: 1000.0}
    reason: decimal match odds are >= 1.0 when populated; historical files also use 0 as a missing-value sentinel
    certainty: 70
    severity: warn
  - row_count: {min: 100000}
    reason: ~690 season-division files of a few hundred matches each
    certainty: 90
  - freshness: {col: Date, reaches: today - 120d}
    reason: current-season files updated twice weekly in-season; off-season the max date lags
    certainty: 70
    points_outward: true
    severity: warn
