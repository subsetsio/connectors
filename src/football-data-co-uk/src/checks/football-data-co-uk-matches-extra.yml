# compiled by `hardened compile-checks` — post-publish audit of `football-data-co-uk-matches-extra`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, home_team, away_team, kickoff_time, season]
temporal: date
checks:
  - kind: unique
    columns: [date, home_team, away_team, kickoff_time, season]
  - kind: not_null
    col: date
  - kind: not_null
    col: home_team
  - kind: not_null
    col: away_team
  - kind: not_null
    col: kickoff_time
  - kind: not_null
    col: season
  - kind: row_floor
    min: 31036
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
