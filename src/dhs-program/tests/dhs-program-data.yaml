spec_id: dhs-program-data
status: active
tests:
  - row_count: {min: 700000}
    reason: >-
      the DHS /data endpoint exposes ~825k observation cells across the ~92
      covered countries; a floor well below that catches a partial paging run
    certainty: 90
  - not_null: DataId
  - not_null: IndicatorId
  - not_null: DHS_CountryCode
  - not_null: SurveyId
  - not_null: SurveyYear
  - column_type: {col: DataId, type: integer}
  - column_type: {col: SurveyYear, type: integer}
  - column_type: {col: Value, type: float}
  - distinct_count: {col: DHS_CountryCode, min: 80}
    reason: data should cover most DHS countries; a much lower count means country paging dropped slices
    certainty: 90
  - between: {col: SurveyYear, lo: 1980, hi: current_year()}
    certainty: 90
    points_outward: true
  - freshness: {col: SurveyYear, reaches: today - 5y}
    reason: DHS indicator data is updated as recent surveys are released, though survey publication lags fieldwork
    certainty: 80
    points_outward: true
