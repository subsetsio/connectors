spec_id: dhs-program-indicators
status: active
tests:
  - row_count: {min: 4000}
    reason: the DHS indicators catalog has more than four thousand indicators
    certainty: 95
  - not_null: IndicatorId
  - not_null: Label
  - column_type: {col: IndicatorId, type: string}
  - column_type: {col: Label, type: string}
  - column_type: {col: IsQuickStat, type: integer}
  - unique: [IndicatorId, IndicatorOrder, Label]
    reason: >-
      IndicatorId alone is NOT unique — 31 IndicatorIds carry two definitional
      variants ('(of ANC)' vs '(of all)') that share IndicatorId/SDRID/IndicatorOrder
      but differ in Label/Definition/Denominator. Row identity is (IndicatorId,
      IndicatorOrder, Label).
    certainty: 95
