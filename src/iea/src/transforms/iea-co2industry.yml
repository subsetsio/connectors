# Carbon intensity of industry energy consumption — IEA Energy Statistics Data Browser, /stats/indicator/CO2Industry
# Dropped: seriesLabel (duplicates the dim label), flowOrder/productOrder
# (presentational), units (constant 'gCO2 per MJ', folded into value description)
# and the constant/all-null flow+product columns (single-series indicator).
key:
- year
- country
temporal: year
columns:
- name: year
  type: BIGINT
  description: Observation year (calendar year; parsed from the API's string year).
- name: country
  type: VARCHAR
  description: 'IEA country/region code: ISO3 alpha-3 for individual countries, IEA aggregate codes (e.g.
    WORLD, OECDTOT, AFRICA, WEOEUR) for regions.'
- name: country_label
  type: VARCHAR
  description: IEA short display name for the country/region (uppercase, abbreviated; renamed from `short`).
- name: value
  type: DOUBLE
  description: 'Carbon intensity of industry energy consumption, in gCO2 per MJ. Source publication: IEA
    Energy Transitions Indicators. No-observation (null) rows are dropped.'
