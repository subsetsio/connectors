# Residential total final consumption (TFC) by source — IEA Energy Statistics Data Browser, /stats/indicator/ResidentialBySource
# Dropped: seriesLabel (duplicates the dim label), flowOrder/productOrder
# (presentational), units (constant 'TJ', folded into value description)
# and the constant/all-null flow* columns.
key:
- year
- country
- product
temporal: year
columns:
- name: year
  type: BIGINT
  description: Observation year (calendar year; parsed from the API's string year).
- name: country
  type: VARCHAR
  description: 'IEA country/region code: ISO3 alpha-3 for individual countries, IEA aggregate codes (e.g.
    WORLD, OECDTOT, AFRICA, WEOEUR) for regions.'
- name: country_label
  type: VARCHAR
  description: IEA short display name for the country/region (uppercase, abbreviated; renamed from `short`).
- name: product
  type: VARCHAR
  description: IEA product/source code for this indicator's breakdown dimension (e.g. 'COAL', 'GEOTHERM',
    'COMRENEW', 'HEAT').
- name: product_label
  type: VARCHAR
  description: Human-readable label for `product`.
- name: value
  type: DOUBLE
  description: 'Residential total final consumption (TFC) by source, in TJ. Source publication: IEA World
    Energy Balances. No-observation (null) rows are dropped.'
