spec_id: iea-countries
status: active
tests:
  - not_null: name
    reason: country and region dimension records always carry a display name
    certainty: 95
  - not_null: stats
    reason: stats is the IEA code used by indicator rows for countries/regions
    certainty: 95
  - column_type: {col: isRegion, type: boolean}
    reason: separates aggregate regions from individual countries
    certainty: 95
  - row_count: {min: 150}
    reason: /stats/countries returned 185 records during probing; a much smaller payload would indicate truncation or schema change
    certainty: 90
  - distinct_count: {col: stats, min: 150}
    reason: stats codes should identify nearly all dimension records
    certainty: 90
