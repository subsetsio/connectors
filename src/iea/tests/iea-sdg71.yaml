spec_id: iea-sdg71
status: active
tests:
  - not_null: year
    reason: long-format annual series; every row is one country-year observation
    certainty: 95
  - not_null: country
    reason: rows are keyed by country/region code (ISO3 or region name)
    certainty: 95
  - not_null: units
    reason: every observation carries its unit label; probing showed 100% presence
    certainty: 85
    severity: warn
  - matches: {col: year, pattern: '(19|20)\d{2}'}
    reason: year is a 4-digit calendar year (arrives as string for most indicators)
    certainty: 90
  - between: {col: year, lo: 1960, hi: 2055}
    reason: SDG 7.1 electricity-access series ships IEA projection years through 2050 (observed max 2050 in the 2026 corpus)
    certainty: 85
  - freshness: {col: year, reaches: 2021}
    reason: IEA annual releases lag ~2 years (probed indicators reach 2023/2024 in mid-2026); a max below 2021 means a truncated fetch or a frozen corpus
    points_outward: true
  - row_count: {min: 100}
    reason: full corpus per indicator spans >=150 countries x >=30 years; probed 1.9k-37k rows. <100 rows means a stub/error payload
    certainty: 85
  - nullable: {col: value, max_null_frac: 0.9}
    reason: sparse country/flow combos are null (probed 1-4%), but a near-all-null series means a soft-error stub response
    certainty: 80
    severity: warn
  - unique: [year, country, flow, product]
    reason: one observation per country-year-flow-product; probing found 0 dups. The transform declares this as its key, so learn about dupes here
    certainty: 75
    severity: warn
