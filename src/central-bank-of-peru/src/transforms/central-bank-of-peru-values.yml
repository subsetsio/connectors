# compiled by `hardened compile-transforms`, then curated (renames + descriptions)
# of raw asset `central-bank-of-peru-values`. Regenerate after model-verify.
# caution: Long-format observations spanning ~17,100 heterogeneous series (CPI, GDP, FX rates, interest rates, balance of payments, fiscal, expectations) in many different units — never aggregate value across series_code; always filter to a single series (join central-bank-of-peru-series for its unit and label).
# caution: frequency mixes Diaria/Mensual/Trimestral/Anual across rows, so the date column carries different granularities depending on the series — filter by frequency (or a single series_code) before any time aggregation.
key: [series_code, date, frequency]
temporal: date
sort: [date, series_code, frequency]
columns:
  - name: series_code
    type: VARCHAR
    description: BCRPData series identifier (codigo_serie); join to central-bank-of-peru-series for the series name, category, unit and frequency label.
  - name: frequency
    type: VARCHAR
    description: Observation frequency of this row (frecuencia) — Diaria (daily), Mensual (monthly), Trimestral (quarterly) or Anual (annual). Determines the granularity of `date`.
  - name: date
    type: DATE
    description: Observation date. For sub-annual series it is the exact period date; for monthly/quarterly/annual series BCRP reports a representative date within the period.
  - name: value
    type: DOUBLE
    description: Observed value of the series at `date`, in the unit described by the series' name/category in central-bank-of-peru-series. Units vary by series — never aggregate across series_code.
