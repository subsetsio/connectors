# compiled by `hardened compile-checks` — post-publish audit of `gem-entrepreneurship-nes-national`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [variable, indicator, economy_name, year]
temporal: year
checks:
  - kind: unique
    columns: [variable, indicator, economy_name, year]
  - kind: not_null
    col: variable
  - kind: not_null
    col: indicator
  - kind: not_null
    col: economy_name
  - kind: not_null
    col: year
  - kind: row_floor
    min: 64032
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
