# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `gem-entrepreneurship-aps-national`. Regenerate after model-verify.
# caution: APS rows are national-level survey indicators; compare indicators within the same survey instrument and avoid aggregating different indicator variables as if they were one measure.
# caution: A small number of source rows have missing economy identifiers, so the raw APS table is published without a strict row key.
key: []
temporal: year
sort: [year]
columns:
  - name: year
    type: INTEGER
  - name: economy_code
    type: BIGINT
  - name: economy_name
    type: VARCHAR
  - name: economy_iso
    type: VARCHAR
  - name: indicator
    type: VARCHAR
  - name: variable
    type: VARCHAR
  - name: label
    type: VARCHAR
  - name: value
    type: DOUBLE
