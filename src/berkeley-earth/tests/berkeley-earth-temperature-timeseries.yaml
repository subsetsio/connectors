spec_id: berkeley-earth-temperature-timeseries
status: active
tests:
  - not_null: region_slug
  - not_null: variable
  - not_null: year
  - not_null: month
  - nullable: {col: monthly_anomaly, max_null_frac: 0.5}
    reason: most rows carry a monthly anomaly, but regional series have NaN gaps in low-coverage months (~15% on some countries); the moving-average columns are nullier still
    certainty: 80
  - column_type: {col: year, type: integer}
  - column_type: {col: month, type: integer}
  - between: {col: month, lo: 1, hi: 12}
    certainty: 99
  - between: {col: year, lo: 1700, hi: 2100}
    reason: the longest series (global land TAVG) starts 1750; an upper bound of 2100 leaves slack without admitting parse garbage
    certainty: 95
  - at_most: {col: year, expr: current_year()}
    reason: observational record cannot run past the current year
    certainty: 95
    points_outward: true
    severity: warn
  - enum: {col: variable, values: [TAVG, TMAX, TMIN]}
    certainty: 99
  - enum: {col: domain, values: [land, land_and_ocean]}
    certainty: 99
  - enum: {col: level, values: [global, continent, country, us-state]}
    certainty: 99
  - unique: [region_slug, level, variable, domain, year, month]
    reason: the raw source can contain duplicate region/variable/domain/month rows; the transform deduplicates this grain before publishing, so raw duplicates should be reviewed but are not a download failure
    certainty: 90
    severity: warn
  - distinct_count: {col: region_slug, min: 50}
    reason: ~160 continent/country/state slugs are enumerated; even with some 404s well over 50 should resolve
    certainty: 85
  - between: {col: monthly_anomaly, lo: -40, hi: 40}
    reason: monthly temperature anomalies vs a 1951-1980 baseline sit within a few degrees; +/-40C bounds parse/unit errors, not climate
    certainty: 80
    severity: warn
  - row_count: {min: 100000}
    reason: ~160 regions x 3 variables x ~1500-3000 monthly rows plus global products is well over 100k rows
    certainty: 85
  - freshness: {col: year, reaches: 2024}
    reason: Berkeley Earth updates these files in-place on an approximately monthly release cycle, but the regional archive can lag the monthly global report; allow enough slack for delayed annualized regional refreshes while still flagging multi-year staleness
    certainty: 75
