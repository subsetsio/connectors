# compiled by `hardened compile-checks` — post-publish audit of `berkeley-earth-temperature-timeseries`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region_slug, level, variable, domain, year, month]
temporal: date
checks:
  - kind: unique
    columns: [region_slug, level, variable, domain, year, month]
  - kind: not_null
    col: region_slug
  - kind: not_null
    col: level
  - kind: not_null
    col: variable
  - kind: not_null
    col: domain
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: row_floor
    min: 526579
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
