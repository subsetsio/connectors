spec_id: noaa-northeast-snowfall-impact-scale
status: active
coverage:
  frozen: true
  reason: >-
    NCEI publishes NESIS as a single file, ne-snow-impact-scale_c20130529.csv,
    and has not regenerated it since 2013-05-29; the latest storm in it ends
    2013-03-04. The corpus does not advance, so this spec carries no freshness
    assertion. Replace this declaration with one the day NCEI ships a newer
    dated file.
tests:
  - row_count: {min: 20}
    reason: NESIS is a compact historical ranked-event table, but it should contain many named storms.
    certainty: 90
  - not_null: Rank
  - not_null: NESIS
  - column_type: {col: Rank, type: string}
  - column_type: {col: NESIS, type: string}
  - column_type: {col: Category, type: string}
  - between: {col: Category, lo: 1, hi: 5}
    reason: NESIS categories are defined on a 1-5 impact scale.
    certainty: 90
  - distinct_count: {col: Rank, min: 20}
    reason: rank values should cover the event list, not collapse to one malformed row.
    certainty: 85
  - not_null: "Start Date"
  - not_null: "End Dat"
