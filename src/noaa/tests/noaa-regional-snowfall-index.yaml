spec_id: noaa-regional-snowfall-index
status: active
tests:
  - row_count: {min: 100}
    reason: RSI spans multiple regions and historical storms; a smaller pull means the dated access CSV discovery likely broke.
    certainty: 95
  - not_null: STORM_ID
  - not_null: REGION
  - column_type: {col: STORM_ID, type: string}
  - column_type: {col: REGION, type: string}
  - column_type: {col: YEAR, type: string}
  - distinct_count: {col: REGION, min: 5}
    reason: RSI is regional, so the raw table should include all major regional buckets.
    certainty: 90
  - between: {col: REGION_CODE, lo: 101, hi: 110}
    reason: NOAA RSI region codes are a fixed set — 101-106 for the six climate regions, 110 for the national roll-up.
    certainty: 90
  - not_null: End
    reason: a null End marks a row the upstream CSV emitted with a missing field; the fetch drops those, so none should survive.
    certainty: 90
  - freshness: {col: End, reaches: today - 2y}
    reason: >-
      End is stored ISO (YYYY-MM-DD) by the fetch, so max(End) really is the
      latest storm. RSI only advances when a storm qualifies, and the record has
      no two consecutive stormless years since 1928, so a 2-year bound detects a
      dead feed without firing on a quiet winter.
    certainty: 85
