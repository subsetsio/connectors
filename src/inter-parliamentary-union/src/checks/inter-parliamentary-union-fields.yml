# compiled by `hardened compile-checks` — post-publish audit of `inter-parliamentary-union-fields`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [field_id, short_description, description, data_entry_format, data_type]
checks:
  - kind: unique
    columns: [field_id, short_description, description, data_entry_format, data_type]
  - kind: not_null
    col: field_id
  - kind: not_null
    col: short_description
  - kind: not_null
    col: description
  - kind: not_null
    col: data_entry_format
  - kind: not_null
    col: data_type
  - kind: row_floor
    min: 252
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
