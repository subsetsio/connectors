# fao-sxs — grain verified against run 20260704-101214 raw (0 duplicate groups).
# year_code dropped (redundant with year); leading apostrophes stripped from M49/CPC/SDG/FBS codes.
key: [area_code, item_code, element_code, sex_code, population_age_group_code, geographic_level_code, activity_code, year]
temporal: year
columns:
  - name: area_code
    type: BIGINT
    description: "FAOSTAT numeric area code for the country or region"
  - name: area_code_m49
    type: VARCHAR
    description: "UN M49 area code (3-digit, zero-padded string)"
  - name: area
    type: VARCHAR
    description: "Country, territory or regional aggregate name"
  - name: item_code
    type: VARCHAR
    description: "FAOSTAT numeric item code"
  - name: item_code_sdg
    type: VARCHAR
    description: "SDG-series item code"
  - name: item
    type: VARCHAR
    description: "Item name (commodity, product, land-use class or category)"
  - name: element_code
    type: BIGINT
    description: "FAOSTAT element code identifying the measure"
  - name: element
    type: VARCHAR
    description: "Measure name (e.g. Production, Import quantity); determines `unit`"
  - name: sex_code
    type: BIGINT
    description: "FAOSTAT sex dimension code"
  - name: sex_code_sdg
    type: VARCHAR
    description: "SDG-convention sex code"
  - name: sex
    type: VARCHAR
    description: "Sex dimension label (Male / Female / Total)"
  - name: population_age_group_code
    type: VARCHAR
    description: "Population age-group code"
  - name: population_age_group
    type: VARCHAR
    description: "Population age group of the estimate"
  - name: geographic_level_code
    type: BIGINT
    description: "Geographic-level code (national / urban / rural ...)"
  - name: geographic_level
    type: VARCHAR
    description: "Geographic level of the estimate"
  - name: activity_code
    type: BIGINT
    description: "Work-activity code"
  - name: activity_code_sdg
    type: VARCHAR
    description: "SDG-convention activity code"
  - name: activity
    type: VARCHAR
    description: "Work activity of the employed population"
  - name: year
    type: BIGINT
    description: "Observation year"
  - name: unit
    type: VARCHAR
    description: "Unit of measure for `value`"
  - name: value
    type: DOUBLE
    description: "Observed value in `unit`; rows without a numeric value (flag-only or censored entries) are dropped"
  - name: flag
    type: VARCHAR
    description: "FAOSTAT observation-status flag (A official, E estimated, I imputed, X international source, ...)"
  - name: note
    type: VARCHAR
    description: "Free-text footnote from the source; usually null"
