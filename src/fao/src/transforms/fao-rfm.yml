# fao-rfm — grain verified against run 20260704-101214 raw (0 duplicate groups).
# year_code dropped (redundant with year); leading apostrophes stripped from M49/CPC/SDG/FBS codes.
key: [reporter_country_code, partner_country_code, item_code, element_code, year]
temporal: year
columns:
  - name: reporter_country_code
    type: BIGINT
    description: "FAOSTAT numeric code of the reporting country"
  - name: reporter_country_code_m49
    type: VARCHAR
    description: "UN M49 code of the reporting country (zero-padded string)"
  - name: reporter_countries
    type: VARCHAR
    description: "Reporting country name"
  - name: partner_country_code
    type: BIGINT
    description: "FAOSTAT numeric code of the partner country"
  - name: partner_country_code_m49
    type: VARCHAR
    description: "UN M49 code of the partner country (zero-padded string)"
  - name: partner_countries
    type: VARCHAR
    description: "Partner country name"
  - name: item_code
    type: BIGINT
    description: "FAOSTAT numeric item code"
  - name: item_code_cpc
    type: VARCHAR
    description: "CPC v2.1 expanded item code"
  - name: item
    type: VARCHAR
    description: "Item name (commodity, product, land-use class or category)"
  - name: element_code
    type: BIGINT
    description: "FAOSTAT element code identifying the measure"
  - name: element
    type: VARCHAR
    description: "Measure name (e.g. Production, Import quantity); determines `unit`"
  - name: year
    type: BIGINT
    description: "Observation year"
  - name: unit
    type: VARCHAR
    description: "Unit of measure for `value`"
  - name: value
    type: DOUBLE
    description: "Observed value in `unit`; rows without a numeric value (flag-only or censored entries) are dropped"
  - name: flag
    type: VARCHAR
    description: "FAOSTAT observation-status flag (A official, E estimated, I imputed, X international source, ...)"
