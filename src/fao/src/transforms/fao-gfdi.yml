# fao-gfdi — grain verified against run 20260704-101214 raw (0 duplicate groups).
# year_code dropped (redundant with year); leading apostrophes stripped from M49/CPC/SDG/FBS codes.
key: [area_code, food_value_code, industry_code, factor_code, element_code, year]
temporal: year
columns:
  - name: area_code
    type: BIGINT
    description: "FAOSTAT numeric area code for the country or region"
  - name: area_code_m49
    type: VARCHAR
    description: "UN M49 area code (3-digit, zero-padded string)"
  - name: area
    type: VARCHAR
    description: "Country, territory or regional aggregate name"
  - name: food_value_code
    type: BIGINT
    description: "Food-value component code"
  - name: food_value
    type: VARCHAR
    description: "Food-value component (quantity/value dimension)"
  - name: industry_code
    type: BIGINT
    description: "Industry (ISIC-based) code"
  - name: industry
    type: VARCHAR
    description: "Industry of the food-dollar decomposition"
  - name: factor_code
    type: BIGINT
    description: "Factor code of the food-dollar decomposition"
  - name: factor
    type: VARCHAR
    description: "Factor (bilateral/marketing-bill component) of the decomposition"
  - name: element_code
    type: BIGINT
    description: "FAOSTAT element code identifying the measure"
  - name: element
    type: VARCHAR
    description: "Measure name (e.g. Production, Import quantity); determines `unit`"
  - name: year
    type: BIGINT
    description: "Observation year"
  - name: unit
    type: VARCHAR
    description: "Unit of measure for `value`"
  - name: value
    type: DOUBLE
    description: "Observed value in `unit`; rows without a numeric value (flag-only or censored entries) are dropped"
  - name: flag
    type: VARCHAR
    description: "FAOSTAT observation-status flag (A official, E estimated, I imputed, X international source, ...)"
