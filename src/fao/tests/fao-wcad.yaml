spec_id: fao-wcad
status: active
tests:
  - row_count: {min: 100}
    reason: prior full pull published 0 rows after the non-numeric-value filter; the raw superset dropping below half of that means a truncated download or a changed ZIP layout
    certainty: 90
  - not_null: area_code
    reason: area_code is the primary key dimension of every FAOSTAT Normalized row; nulls mean a header/parse shift
    certainty: 95
  - not_null: element_code
    reason: every FAOSTAT Normalized row carries a element code; nulls mean a header/parse shift
    certainty: 95
  - nullable: {col: value, max_null_frac: 0.9}
    reason: raw keeps flag-only rows with empty value, but a >90%-null value column means the data CSV was misparsed
    certainty: 80
    severity: warn
  - not_null: wca_round_code
    reason: every WCA row is keyed to a census round
    certainty: 95
  - between: {col: wca_round_code, lo: 1930, hi: 2040}
    reason: World Census of Agriculture rounds run decennially from 1930; the 2030 round is the next possible addition
    certainty: 90
    severity: warn
  - freshness: {col: wca_round_code, reaches: 2010}
    reason: the corpus must include at least the 2010 census round; rounds are decennial so a literal bound is the honest cadence
    certainty: 95
    points_outward: true
