spec_id: obr-forecast-evaluation-report-annex-b-supplementary-fiscal-tables
status: active
# Raw is the universal "melted workbook" schema: one row per non-empty cell,
# identical across every OBR product. These invariants are the tripwire for the
# melt/scrape breaking (wrong resolve, empty workbook, grain collision).
tests:
  - not_null: sheet
  - not_null: excel_row
  - not_null: excel_col
  - column_type: {col: excel_row, type: integer}
  - column_type: {col: excel_col, type: integer}
  - column_type: {col: value_num, type: float}
  - unique: [sheet, excel_row, excel_col]
    reason: the melt emits exactly one row per (sheet, Excel row, Excel col) cell; a duplicate means grain collision (e.g. an un-prefixed sheet across zip members)
    certainty: 95
  - row_count: {min: 50}
    reason: every OBR workbook melts to hundreds+ of cells; <50 means the download resolved the wrong file or the workbook came back empty
    certainty: 90
  - nullable: {col: value_text, max_null_frac: 0.999}
    reason: at least some cells carry text labels/headers; an all-null value_text column means text extraction broke
    certainty: 70
    severity: warn
