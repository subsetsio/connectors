spec_id: oesterreichische-nationalbank-values
status: active
tests:
  - not_null: pos
    reason: every observation row carries the position code it belongs to
    certainty: 99
  - not_null: period
    reason: every observation is timestamped by its source period label
    certainty: 99
  - not_null: value
    reason: rows with a missing/non-numeric value are dropped in the download parse
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 99
  - column_type: {col: pos, type: string}
    certainty: 99
  - column_type: {col: freq, type: string}
    certainty: 95
  - distinct_count: {col: pos, min: 1000}
    reason: observations span the full ~1862-position catalog
    certainty: 80
  - distinct_count: {col: freq, min: 2}
    reason: OeNB series come in multiple frequencies (A, Q, M, H, ...)
    certainty: 85
  - row_count: {min: 100000}
    reason: each position fans across dimensions x frequencies x long history into many observations
    certainty: 75
