spec_id: nflfastr-pfr-rosters
status: active
tests:
  - freshness: {col: season, reaches: 2022}
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: PFR roster seasons should not exceed the current year
  - row_count: {min: 20000}
    certainty: 80
    severity: warn
    reason: historical PFR roster file contains many decades of player-season rows
