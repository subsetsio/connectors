spec_id: nflfastr-ftn-charting
status: active
tests:
  - freshness: {col: season, reaches: 2025}
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: nflverse seasons never exceed the current year; a higher value means a parse/union error
  - row_count: {min: 23658}
    certainty: 70
    severity: warn
    reason: at least ~0.5x one observed season (~47316 rows); combined corpus is larger, a lower count means truncation
