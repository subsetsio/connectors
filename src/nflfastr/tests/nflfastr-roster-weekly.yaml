spec_id: nflfastr-roster-weekly
status: active
tests:
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: nflverse seasons never exceed the current year; a higher value means a parsing/union error
  - row_count: {min: 21975}
    certainty: 70
    reason: conservative floor (~0.3x of 25 season file(s) at ~2930 rows each); a lower count means dropped files
