spec_id: nflfastr-player-stats-kicking
status: active
tests:
  - freshness: {col: season, reaches: 2025}
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: kicking stat seasons should not exceed the current year
  - row_count: {min: 5000}
    certainty: 80
    severity: warn
    reason: weekly kicking stats contain thousands of player-week rows across seasons
