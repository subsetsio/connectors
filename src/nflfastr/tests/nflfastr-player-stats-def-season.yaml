spec_id: nflfastr-player-stats-def-season
status: active
tests:
  - freshness: {col: season, reaches: 2024}
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: defensive player stat seasons should not exceed the current year
  - row_count: {min: 20000}
    certainty: 80
    severity: warn
    reason: defensive season player stats contain many player-season rows across seasons
