spec_id: nflfastr-advstats-week-pass
status: active
tests:
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: nflverse seasons never exceed the current year; a higher value means a parsing/union error
  - row_count: {min: 1641}
    certainty: 70
    reason: conservative floor (~0.3x of 8 season file(s) at ~684 rows each); a lower count means dropped files
