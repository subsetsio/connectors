spec_id: nflfastr-stats-team-regpost
status: active
tests:
  - not_null: season
  - column_type: {col: season, type: integer}
  - at_most: {col: season, expr: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
    reason: nflverse seasons never exceed the current year; a higher value means a parse/union error
  - row_count: {min: 50}
    certainty: 70
    severity: warn
    reason: at least ~0.5x one observed season (~32 rows); combined corpus is larger, a lower count means truncation
