# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-pbp-participation-old`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [players_on_play, defense_players, offense_players, play_id, nflverse_game_id]
checks:
  - kind: unique
    columns: [players_on_play, defense_players, offense_players, play_id, nflverse_game_id]
  - kind: not_null
    col: players_on_play
  - kind: not_null
    col: defense_players
  - kind: not_null
    col: offense_players
  - kind: not_null
    col: play_id
  - kind: not_null
    col: nflverse_game_id
  - kind: row_floor
    min: 23580
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
