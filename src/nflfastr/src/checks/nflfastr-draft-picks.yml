# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-draft-picks`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pfr_player_name, college, team, position, category]
checks:
  - kind: unique
    columns: [pfr_player_name, college, team, position, category]
  - kind: not_null
    col: pfr_player_name
  - kind: not_null
    col: college
  - kind: not_null
    col: team
  - kind: not_null
    col: position
  - kind: not_null
    col: category
  - kind: row_floor
    min: 6463
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
