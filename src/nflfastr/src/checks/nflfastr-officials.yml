# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-officials`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [game_id, game_key, official_id, official_name, position]
checks:
  - kind: unique
    columns: [game_id, game_key, official_id, official_name, position]
  - kind: not_null
    col: game_id
  - kind: not_null
    col: game_key
  - kind: not_null
    col: official_id
  - kind: not_null
    col: official_name
  - kind: not_null
    col: position
  - kind: row_floor
    min: 10950
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
