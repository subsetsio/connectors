# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-qbr-week-level`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [game_id, name_display, name_last, player_id, name_short]
checks:
  - kind: unique
    columns: [game_id, name_display, name_last, player_id, name_short]
  - kind: not_null
    col: game_id
  - kind: not_null
    col: name_display
  - kind: not_null
    col: name_last
  - kind: not_null
    col: player_id
  - kind: not_null
    col: name_short
  - kind: row_floor
    min: 5354
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
