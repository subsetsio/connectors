# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-advstats-week-def`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pfr_player_id, pfr_game_id, pfr_player_name, game_id, team]
checks:
  - kind: unique
    columns: [pfr_player_id, pfr_game_id, pfr_player_name, game_id, team]
  - kind: not_null
    col: pfr_player_id
  - kind: not_null
    col: pfr_game_id
  - kind: not_null
    col: pfr_player_name
  - kind: not_null
    col: game_id
  - kind: not_null
    col: team
  - kind: row_floor
    min: 31172
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
