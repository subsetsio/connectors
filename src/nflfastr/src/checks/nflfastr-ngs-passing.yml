# compiled by `hardened compile-checks` — post-publish audit of `nflfastr-ngs-passing`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [season, season_type, week, player_gsis_id]
checks:
  - kind: unique
    columns: [season, season_type, week, player_gsis_id]
  - kind: not_null
    col: season
  - kind: not_null
    col: season_type
  - kind: not_null
    col: week
  - kind: not_null
    col: player_gsis_id
  - kind: row_floor
    min: 2966
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
