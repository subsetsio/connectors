spec_id: comex-stat-exports-ncm
status: active
tests:
  - not_null: CO_ANO
  - not_null: CO_NCM
  - not_null: CO_PAIS
  - column_type: {col: CO_ANO, type: string}
    reason: raw is parsed all-string so codes keep leading zeros; typing happens in the transform
    certainty: 95
  - matches: {col: CO_ANO, pattern: "^[0-9]{4}$"}
    reason: CO_ANO is a 4-digit calendar year
    certainty: 95
  - matches: {col: CO_MES, pattern: "^[0-9]{2}$"}
    reason: CO_MES is a zero-padded month 01-12
    certainty: 90
  - matches: {col: CO_NCM, pattern: "^[0-9]{8}$"}
    reason: NCM is an 8-digit HS-derived product code
    certainty: 88
  - distinct_count: {col: CO_ANO, min: 25}
    reason: full history streams 1997..latest (~29 years); fewer means the year loop truncated
    certainty: 90
  - distinct_count: {col: CO_MES, min: 12, max: 12}
    reason: across the whole corpus all twelve months appear exactly once each as codes
    certainty: 85
    severity: warn
  - freshness: {col: CO_ANO, reaches: today - 500d}
    reason: >-
      raw carries no date column: the observation period is split across the
      string columns CO_ANO and CO_MES, so freshness can only be asserted at
      year granularity. Comex publishes monthly, but a calendar year's file
      only appears once its first month is released (early February), so the
      bound is slacked past that rollover; it still catches a corpus that has
      stopped advancing for more than a year.
    certainty: 90
    points_outward: true
