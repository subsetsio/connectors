# compiled by `hardened compile-checks` ‚Äî post-publish audit of `comex-stat-imports-municipality`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, month, sh4_code, country_code, state_abbr, municipality_code]
temporal: period
checks:
  - kind: unique
    columns: [year, month, sh4_code, country_code, state_abbr, municipality_code]
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: sh4_code
  - kind: not_null
    col: country_code
  - kind: not_null
    col: state_abbr
  - kind: not_null
    col: municipality_code
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
