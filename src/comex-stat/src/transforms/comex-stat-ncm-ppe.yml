# caution: PPE is the export product list (Lista de Produtos Primarios e Industrializados para exportacao); it applies to export flows only.
key: [ppe_code]
sort: [ppe_code]
columns:
  - name: ppe_code
    type: BIGINT
    description: "Export product list (PPE) code."
  - name: name_pt
    type: VARCHAR
    description: "Product name in Portuguese."
  - name: name_pt_short
    type: VARCHAR
    description: "Abbreviated product name in Portuguese."
  - name: name_en
    type: VARCHAR
    description: "Product name in English."
