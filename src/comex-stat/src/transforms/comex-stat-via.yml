# caution: The reference list carries transport modes that never occur in the transaction tables, plus explicit codes for undeclared and unknown.
key: [transport_mode_code]
sort: [transport_mode_code]
columns:
  - name: transport_mode_code
    type: VARCHAR
    description: "Transport mode code, as used by the transaction tables. Zero-padded; keep as text."
  - name: name_pt
    type: VARCHAR
    description: "Transport mode name in Portuguese (e.g. MARITIMA, AEREA, RODOVIARIA)."
