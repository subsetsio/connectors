# caution: NBM is the nomenclature used before 1997 and does not appear in any of the published transaction tables; it is provided for historical correlation only.
key: [nbm_code]
sort: [nbm_code]
columns:
  - name: nbm_code
    type: VARCHAR
    description: "NBM (Nomenclatura Brasileira de Mercadorias) product code used before 1997."
  - name: name_pt
    type: VARCHAR
    description: "Product description in Portuguese."
