# caution: A country belongs to several overlapping blocs at once, so there are multiple rows per country_code; joining this table to a transaction table multiplies rows and double-counts trade unless one bloc is selected first.
key: [country_code, bloc_code]
sort: [country_code, bloc_code]
columns:
  - name: country_code
    type: VARCHAR
    description: "Comex Stat country code; joins to comex-stat-pais."
  - name: bloc_code
    type: BIGINT
    description: "Economic bloc code."
  - name: bloc_name_pt
    type: VARCHAR
    description: "Bloc name in Portuguese."
  - name: bloc_name_en
    type: VARCHAR
    description: "Bloc name in English."
  - name: bloc_name_es
    type: VARCHAR
    description: "Bloc name in Spanish."
