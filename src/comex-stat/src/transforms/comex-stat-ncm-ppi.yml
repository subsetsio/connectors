# caution: PPI is the import product list; it applies to import flows only.
key: [ppi_code]
sort: [ppi_code]
columns:
  - name: ppi_code
    type: BIGINT
    description: "Import product list (PPI) code."
  - name: name_pt
    type: VARCHAR
    description: "Product name in Portuguese."
  - name: name_pt_short
    type: VARCHAR
    description: "Abbreviated product name in Portuguese."
  - name: name_en
    type: VARCHAR
    description: "Product name in English."
