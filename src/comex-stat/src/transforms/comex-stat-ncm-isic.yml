# caution: A denormalized ISIC hierarchy: group, division and section attributes repeat across the class rows beneath them.
key: [isic_class_code]
sort: [isic_class_code]
columns:
  - name: isic_class_code
    type: VARCHAR
    description: "ISIC class code \u2014 the most detailed level of the International Standard Industrial Classification."
  - name: isic_class_name_pt
    type: VARCHAR
    description: "Class name in Portuguese."
  - name: isic_class_name_en
    type: VARCHAR
    description: "Class name in English."
  - name: isic_class_name_es
    type: VARCHAR
    description: "Class name in Spanish."
  - name: isic_group_code
    type: VARCHAR
    description: "ISIC group code containing this class."
  - name: isic_group_name_pt
    type: VARCHAR
    description: "Group name in Portuguese."
  - name: isic_group_name_en
    type: VARCHAR
    description: "Group name in English."
  - name: isic_group_name_es
    type: VARCHAR
    description: "Group name in Spanish."
  - name: isic_division_code
    type: VARCHAR
    description: "ISIC division code containing this group."
  - name: isic_division_name_pt
    type: VARCHAR
    description: "Division name in Portuguese."
  - name: isic_division_name_en
    type: VARCHAR
    description: "Division name in English."
  - name: isic_division_name_es
    type: VARCHAR
    description: "Division name in Spanish."
  - name: isic_section_code
    type: VARCHAR
    description: "ISIC one-letter section code \u2014 the top level of the classification."
  - name: isic_section_name_pt
    type: VARCHAR
    description: "Section name in Portuguese."
  - name: isic_section_name_en
    type: VARCHAR
    description: "Section name in English."
  - name: isic_section_name_es
    type: VARCHAR
    description: "Section name in Spanish."
