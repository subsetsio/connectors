# caution: Alongside the 26 states and the Federal District the table carries administrative pseudo-states used by the transaction tables (e.g. undeclared / consolidated entries).
key: [state_code]
sort: [state_code]
columns:
  - name: state_code
    type: BIGINT
    description: "IBGE code of the Brazilian federative unit."
  - name: state_abbr
    type: VARCHAR
    description: "Two-letter state abbreviation, as it appears in the transaction tables."
  - name: name_pt
    type: VARCHAR
    description: "State name in Portuguese."
  - name: region_pt
    type: VARCHAR
    description: "Name of the macro-region the state belongs to, in Portuguese (Norte, Nordeste, Sudeste, Sul, Centro-Oeste)."
