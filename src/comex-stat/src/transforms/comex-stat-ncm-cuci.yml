# caution: A denormalized CUCI/SITC hierarchy: subgroup, group, division and section attributes repeat across the item rows beneath them.
key: [cuci_item_code]
sort: [cuci_item_code]
columns:
  - name: cuci_item_code
    type: VARCHAR
    description: "CUCI/SITC item code \u2014 the most detailed level of the Standard International Trade Classification."
  - name: cuci_item_name_pt
    type: VARCHAR
    description: "Item name in Portuguese."
  - name: cuci_subgroup_code
    type: VARCHAR
    description: "CUCI subgroup code containing this item."
  - name: cuci_subgroup_name_pt
    type: VARCHAR
    description: "Subgroup name in Portuguese."
  - name: cuci_group_code
    type: VARCHAR
    description: "CUCI group code containing this subgroup."
  - name: cuci_group_name_pt
    type: VARCHAR
    description: "Group name in Portuguese."
  - name: cuci_division_code
    type: VARCHAR
    description: "CUCI division code containing this group."
  - name: cuci_division_name_pt
    type: VARCHAR
    description: "Division name in Portuguese."
  - name: cuci_section_code
    type: BIGINT
    description: "CUCI section code \u2014 the top level of the classification."
  - name: cuci_section_name_pt
    type: VARCHAR
    description: "Section name in Portuguese."
