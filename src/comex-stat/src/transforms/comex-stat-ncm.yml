# caution: One row per NCM code carrying every classification correlation at once; the correlated codes repeat across rows and must not be counted from this table.
# caution: Includes NCM codes retired in earlier years, so the row count exceeds the set of codes valid today.
key: [ncm_code]
sort: [ncm_code]
columns:
  - name: ncm_code
    type: VARCHAR
    description: "8-digit NCM product code. Zero-padded; keep as text."
  - name: unit_code
    type: BIGINT
    description: "Statistical unit this product's quantities are reported in; joins to comex-stat-ncm-unidade."
  - name: sh6_code
    type: VARCHAR
    description: "6-digit Harmonized System subheading this NCM code falls under; joins to comex-stat-ncm-sh."
  - name: ppe_code
    type: BIGINT
    description: "Export product list (PPE) code; joins to comex-stat-ncm-ppe."
  - name: ppi_code
    type: BIGINT
    description: "Import product list (PPI) code; joins to comex-stat-ncm-ppi."
  - name: factor_aggregate_code
    type: VARCHAR
    description: "Factor-aggregate class (basic / semi-manufactured / manufactured); joins to comex-stat-ncm-fat-agreg."
  - name: cuci_item_code
    type: VARCHAR
    description: "CUCI/SITC item code; joins to comex-stat-ncm-cuci."
  - name: cgce_n3_code
    type: BIGINT
    description: "CGCE broad-economic-category level-3 code; joins to comex-stat-ncm-cgce."
  - name: siit_code
    type: BIGINT
    description: "Industrial-technology-intensity (SIIT) class; joins to comex-stat-ncm-siit."
  - name: isic_class_code
    type: VARCHAR
    description: "ISIC industrial class; joins to comex-stat-ncm-isic."
  - name: export_subset_code
    type: VARCHAR
    description: "Comex export product subgroup; joins to comex-stat-ncm-grupo."
  - name: name_pt
    type: VARCHAR
    description: "Product description in Portuguese."
  - name: name_es
    type: VARCHAR
    description: "Product description in Spanish."
  - name: name_en
    type: VARCHAR
    description: "Product description in English."
