# caution: Alongside real countries the table carries special entries used by the transaction tables (ship and aircraft stores, undeclared origin/destination, central banks, international organisations) as well as extinct states and some dependent territories. All of these share the ISO sentinels 898 / ZZZ rather than a null, so neither ISO column can be used as a key or as a country filter.
key: [country_code]
sort: [country_code]
columns:
  - name: country_code
    type: VARCHAR
    description: "Comex Stat country code, as used by the transaction tables."
  - name: iso_numeric
    type: VARCHAR
    description: "ISO 3166-1 numeric country code. Entries without an ISO code all carry the sentinel 898, so this column is not unique."
  - name: iso_alpha3
    type: VARCHAR
    description: "ISO 3166-1 alpha-3 country code. Entries without an ISO code all carry the sentinel ZZZ, so this column is not unique."
  - name: name_pt
    type: VARCHAR
    description: "Country name in Portuguese."
  - name: name_en
    type: VARCHAR
    description: "Country name in English."
  - name: name_es
    type: VARCHAR
    description: "Country name in Spanish."
