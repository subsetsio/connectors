# compiled by `hardened compile-checks` — post-publish audit of `statswales-04eb4d05-55ab-4c1c-80fa-627fa809fc14`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [data_values, year, authority, row, column]
temporal: year
checks:
  - kind: unique
    columns: [data_values, year, authority, row, column]
  - kind: not_null
    col: data_values
  - kind: not_null
    col: year
  - kind: not_null
    col: authority
  - kind: not_null
    col: row
  - kind: not_null
    col: column
  - kind: row_floor
    min: 5070
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
