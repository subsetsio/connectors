# compiled by `hardened compile-checks` — post-publish audit of `statswales-5039e6eb-1262-41e7-881f-fded830354f2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, local_authority, stage_of_development]
temporal: year
checks:
  - kind: unique
    columns: [year, local_authority, stage_of_development]
  - kind: not_null
    col: year
  - kind: not_null
    col: local_authority
  - kind: not_null
    col: stage_of_development
  - kind: row_floor
    min: 1230
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
