# compiled by `hardened compile-checks` — post-publish audit of `statswales-f4020589-05bd-48e0-ba41-b0c10aad09cd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [data_values, year, measure, area]
temporal: year
checks:
  - kind: unique
    columns: [data_values, year, measure, area]
  - kind: not_null
    col: data_values
  - kind: not_null
    col: year
  - kind: not_null
    col: measure
  - kind: not_null
    col: area
  - kind: row_floor
    min: 1305
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
