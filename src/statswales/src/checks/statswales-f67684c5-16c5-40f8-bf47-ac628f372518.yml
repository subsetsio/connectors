# compiled by `hardened compile-checks` — post-publish audit of `statswales-f67684c5-16c5-40f8-bf47-ac628f372518`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, geography, data_description, sex]
temporal: year
checks:
  - kind: unique
    columns: [year, geography, data_description, sex]
  - kind: not_null
    col: year
  - kind: not_null
    col: geography
  - kind: not_null
    col: data_description
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 12384
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
