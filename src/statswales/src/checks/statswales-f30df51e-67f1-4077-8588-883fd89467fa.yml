# compiled by `hardened compile-checks` — post-publish audit of `statswales-f30df51e-67f1-4077-8588-883fd89467fa`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [data_values, year, region, data_description]
temporal: year
checks:
  - kind: unique
    columns: [data_values, year, region, data_description]
  - kind: not_null
    col: data_values
  - kind: not_null
    col: year
  - kind: not_null
    col: region
  - kind: not_null
    col: data_description
  - kind: row_floor
    min: 162
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
