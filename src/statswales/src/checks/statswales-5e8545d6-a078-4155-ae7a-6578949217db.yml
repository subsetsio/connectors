    columns: [year, data_description, subject, sex, fsm]
  - kind: not_null
    col: year
  - kind: not_null
    col: data_description
  - kind: not_null
    col: subject
  - kind: not_null
    col: sex
  - kind: not_null
    col: fsm
  - kind: row_floor
    min: 3355
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
