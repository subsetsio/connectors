    columns: [period, data_description, notes]
  - kind: not_null
    col: period
  - kind: not_null
    col: data_description
  - kind: not_null
    col: notes
  - kind: row_floor
    min: 140
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
