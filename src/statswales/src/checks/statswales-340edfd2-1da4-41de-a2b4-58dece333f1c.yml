# compiled by `hardened compile-checks` — post-publish audit of `statswales-340edfd2-1da4-41de-a2b4-58dece333f1c`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [data_values, area, year, indicator]
temporal: year
checks:
  - kind: unique
    columns: [data_values, area, year, indicator]
  - kind: not_null
    col: data_values
  - kind: not_null
    col: area
  - kind: not_null
    col: year
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 270
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
