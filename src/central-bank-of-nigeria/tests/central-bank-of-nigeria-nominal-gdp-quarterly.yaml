# Expectations for central-bank-of-nigeria-nominal-gdp-quarterly (CBN GetAll* raw, NDJSON; every source value is a JSON string
# except integer id/tmonth/tyear-on-monthly-endpoints). `*_iso` / `period_start_iso` are the
# sortable ISO-8601 temporal columns the download node derives beside the source's own
# date encoding — the source's encodings do not sort, so they cannot carry a freshness probe.
spec_id: central-bank-of-nigeria-nominal-gdp-quarterly
status: active
tests:
- not_null: id
  certainty: 95
  reason: source row id; distinct from the empty GetAllYears* shell endpoints
- column_type: {col: id, type: integer}
  certainty: 90
- not_null: tyear
  certainty: 99
- column_type: {col: tyear, type: string}
  certainty: 90
  reason: the GDP endpoints return tyear as a JSON string (unlike the monthly endpoints)
- matches: {col: tyear, pattern: '^\d{4}$'}
  certainty: 90
- not_null: period
  certainty: 95
  reason: Q1..Q4 for recent years, "Annual" for the full 1981-2024 history
- enum: {col: period, values: [Q1, Q2, Q3, Q4, Annual]}
  certainty: 90
- unique: [tyear, period]
  certainty: 85
  reason: one GDP record per year x period is the natural grain
- not_null: period_start_iso
  certainty: 95
  reason: derived from (tyear, period); a null means an unrecognised period label
- column_type: {col: period_start_iso, type: date}
  certainty: 90
- freshness: {col: period_start_iso, reaches: today - 900d}
  points_outward: true
  reason: NBS national accounts run ~18 months behind (Q4-2024 is the latest as of mid-2026); 900d flags a series that has stopped advancing altogether
- column_type: {col: agriculture, type: string}
  certainty: 85
  reason: sector value at current basic prices (NGN billion), as string
- column_type: {col: gdPatCurrentMarketPrices, type: string}
  certainty: 80
  reason: total GDP aggregate column, as string
- row_count: {min: 100}
  certainty: 85
  reason: 44 annual rows (1981-2024) + 60 quarterly rows (2010-2024), ~104 total
