# Expectations for central-bank-of-nigeria-nafem-nof-rates (CBN GetAll* raw, NDJSON; every source value is a JSON string
# except integer id/tmonth/tyear-on-monthly-endpoints). `*_iso` / `period_start_iso` are the
# sortable ISO-8601 temporal columns the download node derives beside the source's own
# date encoding — the source's encodings do not sort, so they cannot carry a freshness probe.
spec_id: central-bank-of-nigeria-nafem-nof-rates
status: active
tests:
- not_null: id
  certainty: 99
- column_type: {col: id, type: integer}
  certainty: 95
- unique: id
  certainty: 90
- not_null: ratedate
  certainty: 99
- not_null: ratedate_iso
  certainty: 95
- column_type: {col: ratedate_iso, type: date}
  certainty: 90
- freshness: {col: ratedate_iso, reaches: today - 21d}
  points_outward: true
  reason: quoted each FX trading day; 21d absorbs holidays and publication lag
- column_type: {col: nofr, type: string}
  certainty: 85
  reason: Net Open Forex rate in percent, as string
- median_between: {col: nofr, lo: 1, hi: 60}
  certainty: 50
  severity: warn
- row_count: {min: 30}
  certainty: 75
  reason: new daily series started 2026 (~61 observed); short history
