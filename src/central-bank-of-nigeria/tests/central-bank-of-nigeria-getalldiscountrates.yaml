# Expectations for GetAllDiscountRates (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getalldiscountrates
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: ratedate
  certainty: 99
- column_type:
    col: ratedate
    type: string
  certainty: 95
- matches:
    col: ratedate
    pattern: ^\d{2}/\d{2}/\d{4}$
  certainty: 90
- not_null: ratetype
  certainty: 90
  reason: each rate row names its instrument
- distinct_count:
    col: ratetype
    min: 2
  certainty: 80
  severity: warn
  reason: several rate types (MPR, reverse rate, ...)
- median_between:
    col: amount
    lo: 1
    hi: 40
  certainty: 50
  severity: warn
  reason: policy/discount rates are single-to-low-double-digit percent
- row_count:
    min: 3500
  certainty: 85
