# Expectations for central-bank-of-nigeria-crude-oil-price-daily (CBN GetAll* raw, NDJSON; every source value is a JSON string
# except integer id/tmonth/tyear-on-monthly-endpoints). `*_iso` / `period_start_iso` are the
# sortable ISO-8601 temporal columns the download node derives beside the source's own
# date encoding — the source's encodings do not sort, so they cannot carry a freshness probe.
spec_id: central-bank-of-nigeria-crude-oil-price-daily
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source integer primary key on every record
- column_type: {col: id, type: integer}
  certainty: 95
- unique: id
  certainty: 90
  reason: id is the source PK; dupes mean the array was fetched/concatenated twice
- not_null: postDate
  certainty: 99
  reason: daily posting date, the observation index
- matches: {col: postDate, pattern: '^\d{2}/\d{2}/\d{4}$'}
  certainty: 90
  reason: source serves the date as dd/mm/yyyy strings
- not_null: postDate_iso
  certainty: 95
  reason: every postDate must parse as dd/mm/yyyy; a null means the source changed encoding
- column_type: {col: postDate_iso, type: date}
  certainty: 90
- freshness: {col: postDate_iso, reaches: today - 30d}
  points_outward: true
  reason: price is posted each trading day but the feed has run up to ~1wk behind; 30d absorbs holidays and publication lag
- column_type: {col: crudeOilPrice, type: string}
  certainty: 95
  reason: CBN returns all numeric values as JSON strings
- median_between: {col: crudeOilPrice, lo: 20, hi: 200}
  certainty: 60
  severity: warn
  reason: USD/barrel Nigerian crude spot price
- row_count: {min: 3000}
  certainty: 85
  reason: daily since 2009 (~3.9k observed), grows ~250/yr
