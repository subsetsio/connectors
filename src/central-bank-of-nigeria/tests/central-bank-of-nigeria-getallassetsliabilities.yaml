# Expectations for GetAllAssetsLiabilities (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallassetsliabilities
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: payDate
  certainty: 99
  reason: monthly balance-sheet date index
- column_type:
    col: payDate
    type: string
  certainty: 95
  reason: raw keeps the dd/mm/yyyy string; casting to DATE is the transform's job
- matches:
    col: payDate
    pattern: ^\d{2}/\d{2}/\d{4}$
  certainty: 90
  reason: source emits dd/mm/yyyy
- not_null: period
  certainty: 90
- column_type:
    col: totalAss
    type: string
  certainty: 90
  reason: numeric values come back as quoted strings
- median_between:
    col: totalAss
    lo: 1000000.0
    hi: 10000000000000.0
  certainty: 45
  severity: warn
  reason: central-bank total assets are large positive Naira-thousands; unit guard
- row_count:
    min: 150
  certainty: 85
  reason: monthly since 2005 (~229 now), grows one row/month; a sharp drop = partial pull
