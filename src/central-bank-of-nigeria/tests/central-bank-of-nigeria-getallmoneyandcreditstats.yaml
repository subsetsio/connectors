# Expectations for GetAllMoneyAndCreditStats (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallmoneyandcreditstats
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: period
  certainty: 95
- column_type:
    col: tyear
    type: integer
  certainty: 95
- at_least:
    col: tyear
    expr: 1955
  certainty: 90
  reason: monetary aggregates reach back to ~1960
- at_most:
    col: tyear
    expr: current_year()
  certainty: 75
  severity: warn
  points_outward: true
- median_between:
    col: moneySupply_M2
    lo: 100
    hi: 1000000000.0
  certainty: 40
  severity: warn
  reason: broad money in Naira-millions; wide positive unit guard
- row_count:
    min: 300
  certainty: 85
  reason: monthly+early-annual since 1960 (~433 now)
