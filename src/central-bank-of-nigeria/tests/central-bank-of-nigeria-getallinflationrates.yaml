# Expectations for GetAllInflationRates (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallinflationrates
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: period
  certainty: 95
- column_type:
    col: tyear
    type: integer
  certainty: 95
- column_type:
    col: tmonth
    type: integer
  certainty: 95
- at_least:
    col: tyear
    expr: 2000
  certainty: 90
- at_most:
    col: tyear
    expr: current_year()
  certainty: 75
  severity: warn
  points_outward: true
- median_between:
    col: allItemsYearOn
    lo: 2
    hi: 60
  certainty: 55
  severity: warn
  reason: Nigeria headline YoY CPI inflation, percent
- row_count:
    min: 180
  certainty: 85
  reason: monthly since 2003 (~281 now)
