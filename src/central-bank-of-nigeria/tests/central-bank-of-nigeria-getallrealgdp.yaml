# Expectations for GetAllRealGDP (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallrealgdp
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: period
  certainty: 95
- enum:
    col: period
    values:
    - Q1
    - Q2
    - Q3
    - Q4
    - Annual
  certainty: 70
  severity: warn
- column_type:
    col: tyear
    type: string
  certainty: 85
- between:
    col: tyear
    lo: 1980
    hi: current_year()
  certainty: 80
  severity: warn
- column_type:
    col: gdPatCurrentMarketPrices
    type: string
  certainty: 90
- row_count:
    min: 60
  certainty: 80
