# Expectations for GetAllExchangeRates (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallexchangerates
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: ratedate
  certainty: 99
- column_type:
    col: ratedate
    type: date
  certainty: 85
  reason: ISO yyyy-mm-dd strings are auto-detected as DATE by read_json_auto
- matches:
    col: ratedate
    pattern: ^\d{4}-\d{2}-\d{2}$
  certainty: 90
  reason: source emits ISO dates; cast-to-varchar stays yyyy-mm-dd
- not_null: currency
  certainty: 95
- distinct_count:
    col: currency
    min: 5
  certainty: 85
  severity: warn
  reason: multiple quoted currencies (USD, GBP, EUR, YEN, CFA, ...)
- column_type:
    col: sellingrate
    type: string
  certainty: 90
- freshness:
    col: ratedate
    reaches: today - 21d
  certainty: 70
  severity: warn
  points_outward: true
  reason: FX is published most business days; a stale max usually means source lag
- row_count:
    min: 40000
  certainty: 85
  reason: per-currency daily since 2001 (~61k now)
