# Expectations for GetAllSecuritiesOMO (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallsecuritiesomo
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: auctionDate
  certainty: 99
  reason: auction date index
- column_type:
    col: auctionDate
    type: string
  certainty: 95
- matches:
    col: auctionDate
    pattern: ^[A-Za-z]+-\d{1,2}-\d{4}$
  certainty: 85
  reason: source emits 'June-22-2026' style auction dates
- not_null: securityType
  certainty: 90
- column_type:
    col: rate
    type: string
  certainty: 90
- row_count:
    min: 1500
  certainty: 85
