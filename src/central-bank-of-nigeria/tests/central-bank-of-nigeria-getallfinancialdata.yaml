# Expectations for GetAllFinancialData (CBN GetAll* raw, NDJSON).
spec_id: central-bank-of-nigeria-getallfinancialdata
status: active
tests:
- not_null: id
  certainty: 99
  reason: id is the source primary key; every record carries one
- column_type:
    col: id
    type: integer
  certainty: 95
  reason: id arrives as a JSON number -> BIGINT
- unique: id
  certainty: 90
  reason: id is the source primary key; dupes mean the array was fetched/concatenated twice
- not_null: recDate
  certainty: 99
- column_type:
    col: recDate
    type: string
  certainty: 95
- matches:
    col: recDate
    pattern: ^\d{2}/\d{2}/\d{4}$
  certainty: 90
- column_type:
    col: opeBal
    type: string
  certainty: 90
- row_count:
    min: 2500
  certainty: 85
  reason: daily money-market flows since 2009 (~3.6k now)
