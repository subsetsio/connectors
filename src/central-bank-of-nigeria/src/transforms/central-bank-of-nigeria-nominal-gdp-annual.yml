# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `central-bank-of-nigeria-nominal-gdp-annual`. Regenerate after model-verify.
# caution: The raw payload mixes frequencies: 44 rows carry `period = 'Annual'` (1981-2024) and 60 rows carry `period` in Q1..Q4 (2010-2024). Only the Annual rows belong to this table; the published transform filters on them.
# caution: The activity columns are a nested hierarchy, not a flat list: `agriculture`, `industry` and `services` each sum their own sub-sectors, and `gdPatCurrentBasicPrices` is the total of the three. Summing every activity column in a row multiply-counts the sub-sectors.
# caution: `gdPatCurrentMarketPrices` = `gdPatCurrentBasicPrices` + `netTaxesOnProducts`; the two GDP totals are alternative valuations of the same output, never additive.
# caution: Values are nominal (current-price) naira in billions.
