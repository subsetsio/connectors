# one column per money-market operation; all amounts NGN million
# caution: `record_date` is NOT unique: 50 dates carry more than one row — about half exact duplicates, the rest divergent restatements. Deduplicate before aggregating by date.
# caution: The columns are distinct operations, not components of a total: summing a row is meaningless. `cash_reserve_requirement` is a balance, the rest are daily flows.
key: [source_row_id]
temporal: record_date
sort: [record_date, source_row_id]
columns:
  - name: source_row_id
    type: BIGINT
    description: "The source's own row id. It is the only unique column, so it is the key: 50 dates carry more than one row."
  - name: record_date
    type: DATE
    description: "Date of the money-market operations, parsed from the source's dd/mm/yyyy `recDate`."
  - name: opening_balance
    type: DOUBLE
    description: "Opening balance of banks' current accounts with the CBN, in NGN million."
  - name: rediscounted_bills
    type: DOUBLE
    description: "Bills rediscounted at the CBN, in NGN million."
  - name: standing_lending_facility
    type: DOUBLE
    description: "Standing lending facility drawn by banks, in NGN million."
  - name: standing_deposit_facility
    type: DOUBLE
    description: "Standing deposit facility placed by banks with the CBN, in NGN million."
  - name: repo
    type: DOUBLE
    description: "Repurchase agreements, in NGN million."
  - name: reverse_repo
    type: DOUBLE
    description: "Reverse repurchase agreements, in NGN million."
  - name: omo_sales
    type: DOUBLE
    description: "Open market operation sales, in NGN million."
  - name: omo_repayments
    type: DOUBLE
    description: "Open market operation repayments, in NGN million."
  - name: primary_market_sales
    type: DOUBLE
    description: "Primary market sales, in NGN million."
  - name: primary_market_repayments
    type: DOUBLE
    description: "Primary market repayments, in NGN million."
  - name: cash_reserve_requirement
    type: DOUBLE
    description: "Cash reserve requirement — a balance held at the CBN, not a flow like the columns around it, in NGN million."
  - name: net_wdas
    type: DOUBLE
    description: "Net Wholesale Dutch Auction System foreign-exchange settlement, in NGN million."
  - name: statutory_allocation
    type: DOUBLE
    description: "Statutory allocation disbursed to the tiers of government, in NGN million."
  - name: jv_cash_call
    type: DOUBLE
    description: "Joint-venture cash call payments to oil operators, in NGN million."
  - name: net_clearing
    type: DOUBLE
    description: "Net inter-bank clearing settlement, in NGN million."
  - name: ndic_premium
    type: DOUBLE
    description: "Deposit-insurance premium paid to the NDIC, in NGN million."
  - name: other_major
    type: DOUBLE
    description: "Other major money-market flows not itemised above, in NGN million."
