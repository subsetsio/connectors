# `allItemsLessFrmProd*` renamed to the standard `core_*`: CBN's "all items less farm produce" IS the core index
# `id` and the `period` label are dropped: (year, month) is the source's real grain
# caution: Every column is a rate, never an index level. The `_yoy` and `_12m_average` variants answer different questions and must not be mixed in one series.
# caution: The CPI basket was rebased in 2025 (base year 2024); rates either side of that break are not computed on the same basket.
key: [year, month]
temporal: month_start
sort: [month_start]
columns:
  - name: month_start
    type: DATE
    description: "First day of the observation month."
  - name: year
    type: BIGINT
    description: "Calendar year of the observation."
  - name: month
    type: BIGINT
    description: "Calendar month of the observation, 1-12."
  - name: all_items_yoy
    type: DOUBLE
    description: "Headline (all items) inflation, year-on-year, in percent."
  - name: all_items_12m_average
    type: DOUBLE
    description: "Headline (all items) inflation, 12-month moving average, in percent."
  - name: food_yoy
    type: DOUBLE
    description: "Food inflation, year-on-year, in percent."
  - name: food_12m_average
    type: DOUBLE
    description: "Food inflation, 12-month moving average, in percent."
  - name: core_yoy
    type: DOUBLE
    description: "Core inflation (all items less farm produce), year-on-year, in percent."
  - name: core_12m_average
    type: DOUBLE
    description: "Core inflation (all items less farm produce), 12-month moving average, in percent."
  - name: core_less_energy_yoy
    type: DOUBLE
    description: "Core inflation excluding energy (all items less farm produce and energy), year-on-year, in percent."
  - name: core_less_energy_12m_average
    type: DOUBLE
    description: "Core inflation excluding energy (all items less farm produce and energy), 12-month moving average, in percent."
