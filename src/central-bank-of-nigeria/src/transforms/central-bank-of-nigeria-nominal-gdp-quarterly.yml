# the quarterly slice of the shared GetAllNominalGDP payload (2010-2024); the dedicated GetAllYears* endpoints are empty shells
# `id` is dropped: it numbers rows across both frequencies and means nothing after the split
# `gdPatCurrent{Basic,Market}Prices` renamed `gdp_at_{basic,market}_prices`
# caution: The upstream payload also carries a longer annual series; this table is the Q1-Q4 slice of it.
# caution: Quarterly values are the output of that quarter alone (not year-to-date) and are NOT seasonally adjusted — compare a quarter with the same quarter a year earlier, not with the one before it.
# caution: Values are NOMINAL, at current prices.
# caution: The activity columns are a nested hierarchy, not a flat list: `agriculture`, `industry` and `services` each sum their own sub-sectors, and `gdp_at_basic_prices` is the sum of the three. Summing every activity column multiply-counts the sub-sectors.
# caution: `gdp_at_market_prices` = `gdp_at_basic_prices` + `net_taxes_on_products`; the two totals are alternative valuations of the same output, never additive.
key: [year, quarter]
temporal: quarter_start
sort: [quarter_start]
columns:
  - name: quarter_start
    type: DATE
    description: "First day of the observation quarter."
  - name: year
    type: BIGINT
    description: "Calendar year of the observation."
  - name: quarter
    type: VARCHAR
    description: "Quarter of the observation: `Q1`, `Q2`, `Q3` or `Q4`."
  - name: agriculture
    type: DOUBLE
    description: "Agriculture — the sum of crop production, livestock, forestry and fishing, in NGN billion at current basic prices."
  - name: crop_production
    type: DOUBLE
    description: "Crop production, in NGN billion at current basic prices."
  - name: livestock
    type: DOUBLE
    description: "Livestock, in NGN billion at current basic prices."
  - name: forestry
    type: DOUBLE
    description: "Forestry, in NGN billion at current basic prices."
  - name: fishing
    type: DOUBLE
    description: "Fishing, in NGN billion at current basic prices."
  - name: industry
    type: DOUBLE
    description: "Industry — the sum of mining and quarrying, manufacturing, electricity, water supply and construction, in NGN billion at current basic prices."
  - name: mining_and_quarrying
    type: DOUBLE
    description: "Mining and quarrying — the sum of the four extractive activities that follow, in NGN billion at current basic prices."
  - name: crude_petroleum_and_natural_gas
