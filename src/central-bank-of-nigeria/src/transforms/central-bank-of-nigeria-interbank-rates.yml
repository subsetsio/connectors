# `weightedaverage` is space-padded in the source; TRIMmed before the cast
# caution: (`rate_date`, `rate_type`) is NOT unique: 46 pairs carry more than one row, most divergent restatements.
# caution: Rows of different `rate_type` are different instruments and must never be averaged together.
# caution: Group on a normalised rate type, not the raw string — `OBB` and `OBB Rate` are the same instrument.
key: [source_row_id]
temporal: rate_date
sort: [rate_date, rate_type, source_row_id]
columns:
  - name: source_row_id
    type: BIGINT
    description: "The source's own row id. It is the only unique column, so it is the key: 46 (date, rate type) pairs carry more than one row."
  - name: rate_date
    type: DATE
    description: "Date the rate was quoted, parsed from the source's `September-30-2024` encoding."
  - name: rate_type
    type: VARCHAR
    description: "Instrument the rate belongs to, as published: `OBB Rate` (overnight open buy-back), `Call Rate`, or a term placement (`7-Day` ... `360-Day`). The domain is not clean — a single row says `OBB` rather than `OBB Rate`, and two one-off buckets (`4-7 Days`, `8-35 Days`) use a different convention."
  - name: rate_range
    type: VARCHAR
    description: "The day's low-high range as free text, exactly as published. It is deliberately NOT parsed into numbers: roughly half the rows do not split cleanly on a hyphen and many carry typos (`26.50 26.50`, `2.00 - 10 00`, `12,00 - 14.00`)."
  - name: weighted_average_rate
    type: DOUBLE
    description: "Volume-weighted average rate for the day and instrument, in percent per annum."
