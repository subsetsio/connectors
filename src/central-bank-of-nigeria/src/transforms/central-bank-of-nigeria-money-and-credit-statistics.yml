# `frequency` is derived from the source's tmonth-holds-the-year encoding for the 33 pre-1993 annual rows
# `month` is nulled on those rows rather than left holding a year
# caution: Two frequencies share this table: 33 annual rows (1960-1992) and monthly rows thereafter. Filter `frequency` first, or annual and monthly levels interleave.
# caution: The aggregates are nested, not additive: M3 contains M2, which contains narrow and quasi money. Summing a row's columns is always wrong.
# caution: All amounts are end-of-period balances (stocks). Difference consecutive rows to get a flow.
# caution: The M3-era columns are absent from the early rows because they did not exist then — that is a definitional change, not a zero.
key: [source_row_id]
temporal: period_start
sort: [period_start, source_row_id]
columns:
  - name: source_row_id
    type: BIGINT
    description: "The source's own row id, used as the key because this table interleaves two observation frequencies."
  - name: period_start
    type: DATE
    description: "First day of the observation period — the month for monthly rows, 1 January for the early annual rows."
  - name: frequency
    type: VARCHAR
    description: "`monthly` or `annual`. The source encodes an annual row by setting its month field to the year; this column makes that explicit. ALWAYS filter on it before treating the table as one series."
  - name: year
    type: BIGINT
    description: "Calendar year of the observation."
  - name: month
    type: BIGINT
    description: "Calendar month of the observation, 1-12; null on the annual rows."
  - name: money_supply_m3
    type: DOUBLE
    description: "Broad money M3 — contains M2, in NGN million at end of period."
  - name: cbn_bills
    type: DOUBLE
    description: "CBN bills held outside the CBN, in NGN million at end of period."
  - name: money_supply_m2
    type: DOUBLE
    description: "Broad money M2 — contains narrow money and quasi money, in NGN million at end of period."
  - name: quasi_money
    type: DOUBLE
    description: "Quasi money (savings and time deposits), in NGN million at end of period."
  - name: narrow_money
    type: DOUBLE
    description: "Narrow money M1 — currency outside banks plus demand deposits, in NGN million at end of period."
  - name: currency_outside_banks
    type: DOUBLE
    description: "Currency held outside the banking system, in NGN million at end of period."
  - name: demand_deposits
    type: DOUBLE
    description: "Demand deposits, in NGN million at end of period."
  - name: net_foreign_assets
    type: DOUBLE
    description: "Net foreign assets of the banking system, in NGN million at end of period."
  - name: net_domestic_assets
    type: DOUBLE
    description: "Net domestic assets of the banking system, in NGN million at end of period."
  - name: net_domestic_credit
    type: DOUBLE
    description: "Net domestic credit, in NGN million at end of period."
  - name: credit_to_government
    type: DOUBLE
    description: "Net credit to government, in NGN million at end of period."
  - name: credit_to_government_federal
    type: DOUBLE
    description: "Net credit to the federal government, in NGN million at end of period."
  - name: mirror_accounts
    type: DOUBLE
    description: "Mirror accounts, in NGN million at end of period."
  - name: credit_to_private_sector
    type: DOUBLE
    description: "Credit to the private sector, in NGN million at end of period."
  - name: other_assets_net
    type: DOUBLE
    description: "Other assets, net, in NGN million at end of period."
  - name: base_money
    type: DOUBLE
    description: "Base money (currency in circulation plus bank reserves), in NGN million at end of period."
  - name: currency_in_circulation
    type: DOUBLE
    description: "Currency in circulation, in NGN million at end of period."
  - name: bank_reserves
    type: DOUBLE
    description: "Bank reserves held at the CBN, in NGN million at end of period."
  - name: special_intervention_reserves
    type: DOUBLE
    description: "Special intervention reserves, in NGN million at end of period."
