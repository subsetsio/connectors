spec_id: espncricinfo-statsguru-batting
tests:
  - not_null: player
    reason: every Statsguru batting record names a player
    certainty: 95
  - not_null: match_class
    reason: each record is tagged with the match class it was pulled under
    certainty: 95
  - enum: {col: match_class, values: [Test, ODI, T20I]}
    reason: we crawl exactly classes 1/2/3
    certainty: 95
  - row_count: {min: 100}
    reason: thousands of career batting records exist across the three classes
    certainty: 90
