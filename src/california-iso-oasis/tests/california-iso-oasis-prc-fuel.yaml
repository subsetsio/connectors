spec_id: california-iso-oasis-prc-fuel
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    certainty: 95
  - matches: {col: INTERVALSTARTTIME_GMT, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'}
    certainty: 90
  - not_null: FUEL_REGION_ID
    reason: each fuel-price row is scoped to a CAISO fuel region
    certainty: 88
  - not_null: PRC
    reason: the gas price index is the payload of this report
    certainty: 85
  - between: {col: PRC, lo: -5, hi: 500}
    reason: gas $/MMBtu sits in low single-to-double digits; allow spikes but flag unit errors
    certainty: 55
    severity: warn
    points_outward: true
  - row_count: {min: 500}
    certainty: 85
