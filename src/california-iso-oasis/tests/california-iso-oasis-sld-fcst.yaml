spec_id: california-iso-oasis-sld-fcst
status: active
tests:
  - not_null: INTERVALSTARTTIME_GMT
    certainty: 95
  - matches: {col: INTERVALSTARTTIME_GMT, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}T'}
    certainty: 90
  - enum: {col: MARKET_RUN_ID, values: [DAM]}
    reason: demand forecast is fetched for the DAM (day-ahead) forecast run
    certainty: 88
  - not_null: TAC_AREA_NAME
    reason: each forecast row is scoped to a TAC area
    certainty: 85
  - not_null: MW
    reason: a load forecast row without an MW value is malformed
    certainty: 80
  - row_count: {min: 500}
    certainty: 85
