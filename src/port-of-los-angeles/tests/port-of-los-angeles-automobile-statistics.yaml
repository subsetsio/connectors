spec_id: port-of-los-angeles-automobile-statistics
status: active
tests:
  - not_null: page_slug
    certainty: 98
  - not_null: value
    reason: raw HTML statistics are normalized to one non-empty cell per row
    certainty: 95
  - enum: {col: page_slug, values: [automobile-statistics]}
    certainty: 98
  - row_count: {min: 30}
    reason: the page has automobile and auto-parts tables; fewer cells means table extraction collapsed
    certainty: 85
  - distinct_count: {col: table_index, min: 2}
    reason: the page normally exposes separate automobiles and auto-parts tables
    certainty: 85
