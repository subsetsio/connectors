spec_id: port-of-los-angeles-container-statistics
status: active
tests:
  - not_null: page_slug
    certainty: 98
  - not_null: value
    reason: raw HTML statistics are normalized to one non-empty cell per row
    certainty: 95
  - enum: {col: page_slug, values: [container-statistics]}
    certainty: 98
  - row_count: {min: 60}
    reason: the page has latest-month and annual container statistics; fewer cells means table extraction collapsed
    certainty: 85
  - distinct_count: {col: table_index, min: 2}
    reason: the page should expose at least latest monthly and annual tables
    certainty: 80
