spec_id: port-of-los-angeles-tonnage-statistics
status: active
tests:
  - not_null: page_slug
    certainty: 98
  - not_null: value
    reason: raw HTML statistics are normalized to one non-empty cell per row
    certainty: 95
  - enum: {col: page_slug, values: [tonnage-statistics]}
    certainty: 98
  - row_count: {min: 200}
    reason: monthly/fiscal tonnage history has dozens of rows; fewer cells means table extraction collapsed
    certainty: 85
  - distinct_count: {col: table_index, min: 2}
    reason: the page should expose tonnage history and a conversion reference table
    certainty: 80
