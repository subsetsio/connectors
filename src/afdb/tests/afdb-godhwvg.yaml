spec_id: afdb-godhwvg
status: active
tests:
  - not_null: date
    reason: every observation is a (date, value) point; date is always present
    certainty: 95
  - not_null: value
    reason: null values are dropped during expansion, so every written row has a value
    certainty: 95
  - not_null: frequency
    certainty: 95
  - row_count: {min: 1}
    reason: a rank-active dataset must yield at least one observation; 0 = fetch/expansion broke
    certainty: 95
  - freshness: {col: date, reaches: "2027-01-01"}
    reason: latest published observation/projection for this AfDB table reached 2027-01-01 in the profiled run; older output means the portal fetch or transform lost temporal coverage
    certainty: 80
  - enum: {col: frequency, values: [A]}
    reason: this dataset's native Knoema grid is 'A'; we fetch native to avoid forward-filled upsampling. A different value means native-frequency detection picked something else.
    certainty: 75
    severity: warn
    points_outward: true
  - column_type: {col: value, type: float}
    reason: observations are numeric measures (counts, ratios, prices, scores)
    certainty: 70
    severity: warn
