# compiled by `hardened compile-checks` — post-publish audit of `global-mangrove-watch-fishery-mitigation-potentials`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location_id, iso, location_name, indicator, indicator_type]
checks:
  - kind: unique
    columns: [location_id, iso, location_name, indicator, indicator_type]
  - kind: not_null
    col: location_id
  - kind: not_null
    col: iso
  - kind: not_null
    col: location_name
  - kind: not_null
    col: indicator
  - kind: not_null
    col: indicator_type
  - kind: row_floor
    min: 410
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
