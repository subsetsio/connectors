# compiled by `hardened compile-checks` — post-publish audit of `global-mangrove-watch-drivers-of-change`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso, location_name, location_id, variable, primary_driver]
checks:
  - kind: unique
    columns: [iso, location_name, location_id, variable, primary_driver]
  - kind: not_null
    col: iso
  - kind: not_null
    col: location_name
  - kind: not_null
    col: location_id
  - kind: not_null
    col: variable
  - kind: not_null
    col: primary_driver
  - kind: row_floor
    min: 177
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
