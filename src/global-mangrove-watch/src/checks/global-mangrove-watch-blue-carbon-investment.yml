# compiled by `hardened compile-checks` — post-publish audit of `global-mangrove-watch-blue-carbon-investment`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [description, iso, location_name, location_id, category]
checks:
  - kind: unique
    columns: [description, iso, location_name, location_id, category]
  - kind: not_null
    col: description
  - kind: not_null
    col: iso
  - kind: not_null
    col: location_name
  - kind: not_null
    col: location_id
  - kind: not_null
    col: category
  - kind: row_floor
    min: 104
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
