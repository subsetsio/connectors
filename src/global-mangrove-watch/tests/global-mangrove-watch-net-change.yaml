spec_id: global-mangrove-watch-net-change
status: active
coverage:
  frozen: true
  reason: GMW widget annual epochs exposed by the API are a fixed historical series through 2020, not a rolling annual feed.
tests:
  - not_null: location_id
    reason: every widget row is scoped to a location
    certainty: 95
  - enum: {col: location_type, values: [country, worldwide]}
    reason: we fetch only countries + worldwide aggregate
    certainty: 95
  - distinct_count: {col: location_id, min: 10}
    reason: a healthy pull covers many countries; <10 means the locations enumeration broke after one entry
    certainty: 80
  - between: {col: year, lo: 1996, hi: 2025}
    reason: GMW annual epochs span 1996-2020; 2025 allows for new releases
    certainty: 85
    points_outward: true
    severity: warn
