# compiled by `hardened compile-checks` ‚Äî post-publish audit of `base-dos-dados-br-ibge-censo-2022--dicionario`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id_tabela, nome_coluna, chave, cobertura_temporal, valor]
checks:
  - kind: unique
    columns: [id_tabela, nome_coluna, chave, cobertura_temporal, valor]
  - kind: not_null
    col: id_tabela
  - kind: not_null
    col: nome_coluna
  - kind: not_null
    col: chave
  - kind: not_null
    col: cobertura_temporal
  - kind: not_null
    col: valor
  - kind: row_floor
    min: 15
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
