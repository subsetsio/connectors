# compiled by `hardened compile-checks` — post-publish audit of `base-dos-dados-nl-ug-pwt--microdados`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_id_iso_3, country, currency_unit, year]
temporal: year
checks:
  - kind: unique
    columns: [country_id_iso_3, country, currency_unit, year]
  - kind: not_null
    col: country_id_iso_3
  - kind: not_null
    col: country
  - kind: not_null
    col: currency_unit
  - kind: not_null
    col: year
  - kind: row_floor
    min: 6405
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
