# compiled by `hardened compile-checks` — post-publish audit of `base-dos-dados-br-bd-indicadores--receitas-planejadas`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ano_competencia, mes_competencia, ano_caixa, mes_caixa, categoria, tipo, frequencia, valor]
checks:
  - kind: unique
    columns: [ano_competencia, mes_competencia, ano_caixa, mes_caixa, categoria, tipo, frequencia, valor]
  - kind: not_null
    col: ano_competencia
  - kind: not_null
    col: mes_competencia
  - kind: not_null
    col: ano_caixa
  - kind: not_null
    col: mes_caixa
  - kind: not_null
    col: categoria
  - kind: not_null
    col: tipo
  - kind: not_null
    col: frequencia
  - kind: not_null
    col: valor
  - kind: row_floor
    min: 4
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
