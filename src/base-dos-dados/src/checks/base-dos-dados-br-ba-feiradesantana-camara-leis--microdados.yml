# compiled by `hardened compile-checks` — post-publish audit of `base-dos-dados-br-ba-feiradesantana-camara-leis--microdados`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [resumo, titulo, texto, categoria]
checks:
  - kind: unique
    columns: [resumo, titulo, texto, categoria]
  - kind: not_null
    col: resumo
  - kind: not_null
    col: titulo
  - kind: not_null
    col: texto
  - kind: not_null
    col: categoria
  - kind: row_floor
    min: 3016
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
