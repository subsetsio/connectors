# compiled by `hardened compile-checks` — post-publish audit of `base-dos-dados-br-inep-ana--prova`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ano, serie, tipo_prova, disciplina, bloco, posicao, item, descritor, gabarito]
checks:
  - kind: unique
    columns: [ano, serie, tipo_prova, disciplina, bloco, posicao, item, descritor, gabarito]
  - kind: not_null
    col: ano
  - kind: not_null
    col: serie
  - kind: not_null
    col: tipo_prova
  - kind: not_null
    col: disciplina
  - kind: not_null
    col: bloco
  - kind: not_null
    col: posicao
  - kind: not_null
    col: item
  - kind: not_null
    col: descritor
  - kind: not_null
    col: gabarito
  - kind: row_floor
    min: 240
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
