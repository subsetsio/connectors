# compiled by `hardened compile-checks` — post-publish audit of `google-community-mobility-reports`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country_region_code, country_region, sub_region_1, sub_region_2, metro_area, iso_3166_2_code, census_fips_code, place_id, date]
temporal: date
checks:
  - kind: unique
    columns: [country_region_code, country_region, sub_region_1, sub_region_2, metro_area, iso_3166_2_code, census_fips_code, place_id, date]
  - kind: not_null
    col: country_region_code
  - kind: not_null
    col: country_region
  - kind: not_null
    col: sub_region_1
  - kind: not_null
    col: sub_region_2
  - kind: not_null
    col: metro_area
  - kind: not_null
    col: iso_3166_2_code
  - kind: not_null
    col: census_fips_code
  - kind: not_null
    col: place_id
  - kind: not_null
    col: date
  - kind: row_floor
    min: 5865012
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
