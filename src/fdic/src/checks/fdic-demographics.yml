# compiled by `hardened compile-checks` — post-publish audit of `fdic-demographics`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, cert, cntynum, mnrtydte, callym]
checks:
  - kind: unique
    columns: [id, cert, cntynum, mnrtydte, callym]
  - kind: not_null
    col: id
  - kind: not_null
    col: cert
  - kind: not_null
    col: cntynum
  - kind: not_null
    col: mnrtydte
  - kind: not_null
    col: callym
  - kind: row_floor
    min: 832655
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
