spec_id: fdic-failures
status: active
tests:
  - row_count: {min: 4000}
    reason: FDIC failed-bank history runs back to 1934 and should contain more than four thousand rows.
    certainty: 95
  - not_null: ID
    reason: ID is the stable row identifier used by the FDIC failures endpoint.
    certainty: 95
  - column_type: {col: CERT, type: string}
  - column_type: {col: QBFASSET, type: float}
  - freshness: {col: FAILYR, reaches: "2023"}
    reason: the failures corpus should include recent failures when they occur; max year materially below 2023 would indicate stale source coverage.
    certainty: 80
    points_outward: true
