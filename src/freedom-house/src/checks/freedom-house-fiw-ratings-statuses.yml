# compiled by `hardened compile-checks` — post-publish audit of `freedom-house-fiw-ratings-statuses`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, status, entity_kind]
temporal: year
checks:
  - kind: unique
    columns: [country, year, status, entity_kind]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: status
  - kind: not_null
    col: entity_kind
  - kind: row_floor
    min: 4982
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
