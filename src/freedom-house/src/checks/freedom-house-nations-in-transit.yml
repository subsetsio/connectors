# compiled by `hardened compile-checks` — post-publish audit of `freedom-house-nations-in-transit`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, regime_classification, region]
temporal: year
checks:
  - kind: unique
    columns: [country, year, regime_classification, region]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: regime_classification
  - kind: not_null
    col: region
  - kind: row_floor
    min: 290
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
