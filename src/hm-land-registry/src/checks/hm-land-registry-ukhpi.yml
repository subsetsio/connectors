# compiled by `hardened compile-checks` — post-publish audit of `hm-land-registry-ukhpi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ref_date, ref_month, region_name, region_slug]
temporal: ref_month
checks:
  - kind: unique
    columns: [ref_date, ref_month, region_name, region_slug]
  - kind: not_null
    col: ref_date
  - kind: not_null
    col: ref_month
  - kind: not_null
    col: region_name
  - kind: not_null
    col: region_slug
  - kind: row_floor
    min: 75352
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
