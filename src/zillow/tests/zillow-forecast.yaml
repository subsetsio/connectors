spec_id: zillow-forecast
status: active
tests:
  - not_null: region_id
    reason: every Zillow forecast row carries a RegionID; a null means the id column moved or the melt lost it
    certainty: 98
  - column_type: {col: region_id, type: integer}
    reason: RegionID is Zillow's integer region key, cast to int64 in the melt
    certainty: 95
  - not_null: region_type
    certainty: 98
  - enum: {col: region_type, values: [country, msa, zip]}
    reason: ZHVF is published for Metro & U.S. and ZIP Code geographies
    certainty: 90
  - not_null: region_name
    certainty: 95
  - not_null: base_date
    reason: ZHVF files carry the source forecast vintage in BaseDate
    certainty: 95
  - matches: {col: base_date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: BaseDate is a month-end date string
    certainty: 95
  - not_null: date
    certainty: 98
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: forecast horizon columns are month-end YYYY-MM-DD headers from the wide CSV
    certainty: 95
  - relationship: {left: base_date, op: <, right: date}
    reason: forecast horizon dates should be after the forecast base date
    certainty: 95
  - not_null: metric
    certainty: 98
  - enum: {col: metric, values: [forecast_smoothed_seasonally_adjusted, forecast_raw]}
    reason: the two ZHVF variants this theme fetches
    certainty: 95
  - not_null: value
    reason: the melt drops null observations, so surviving rows must have a value
    certainty: 98
  - between: {col: value, lo: -50, hi: 50}
    reason: ZHVF values are percentage growth forecasts, not dollar levels
    certainty: 85
  - unique: [region_id, base_date, date, metric]
    reason: one forecast observation per region / vintage / horizon / metric variant
    certainty: 95
  - freshness: {col: base_date, reaches: today - 75d}
    reason: Zillow refreshes ZHVF monthly; the forecast vintage should stay within about 2.5 months of today
    certainty: 90
  - row_count: {min: 1000}
    reason: two metrics x Metro/U.S. and ZIP geographies x three forecast horizons
    certainty: 85
