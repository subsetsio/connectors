spec_id: zillow-inventory
status: active
tests:
  - not_null: region_id
    certainty: 98
  - column_type: {col: region_id, type: integer}
    certainty: 95
  - not_null: region_type
    certainty: 98
  - enum: {col: region_type, values: [Metro, State, County, City, Zip]}
    certainty: 88
  - not_null: region_name
    certainty: 95
  - not_null: date
    certainty: 98
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    certainty: 95
  - not_null: metric
    certainty: 98
  - enum: {col: metric, values: [for_sale_inventory, new_listings, new_pending]}
    reason: the three inventory-flow series this theme fetches
    certainty: 95
  - not_null: value
    reason: the melt drops null observations
    certainty: 98
  - at_least: {col: value, expr: 0}
    reason: inventory / listing / pending counts are non-negative
    certainty: 97
  - unique: [region_id, date, metric]
    reason: one count per region / month / series
    certainty: 90
  - row_count: {min: 10000}
    reason: three metrics across several geographies x thousands of regions x monthly points
    certainty: 85
