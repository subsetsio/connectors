spec_id: zillow-market-heat
status: active
tests:
  - not_null: region_id
    certainty: 98
  - column_type: {col: region_id, type: integer}
    certainty: 95
  - not_null: region_type
    certainty: 98
  - enum: {col: region_type, values: [country, msa, state, county, city, zip]}
    reason: the RegionType column carries Zillow's internal geography codes (not the URL folder names)
    certainty: 88
  - not_null: region_name
    certainty: 95
  - not_null: date
    certainty: 98
  - matches: {col: date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    certainty: 95
  - not_null: metric
    certainty: 98
  - enum: {col: metric, values: [market_heat]}
    reason: this theme fetches the single Market Heat Index series
    certainty: 98
  - not_null: value
    reason: the melt drops null observations
    certainty: 98
  - between: {col: value, lo: -500, hi: 1000}
    reason: the Market Heat Index is a relative temperature measure that can go negative in cold markets (observed range roughly -150..600)
    certainty: 80
    severity: warn
  - unique: [region_id, date, metric]
    reason: one index observation per region / month
    certainty: 90
  - row_count: {min: 5000}
    reason: one metric across several geographies x thousands of regions x monthly points
    certainty: 85
