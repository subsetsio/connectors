# Zillow for-sale housing inventory flows (active listings, new listings, new pending) by geography and month.
key: [region_id, date]
temporal: date
columns:
  - name: date
    type: DATE
    description: "Observation month, as the month-end date (YYYY-MM-DD)."
  - name: region_id
    type: BIGINT
    description: "Zillow RegionID; globally unique across geography levels."
  - name: region_type
    type: VARCHAR
    description: "Geography level of the region: one of country, msa (metro), state, county, city, zip."
  - name: region_name
    type: VARCHAR
    description: "Human-readable region name."
  - name: state_code
    type: VARCHAR
    description: "USPS two-letter state code; null for the national row and for regions that span states."
  - name: for_sale_inventory
    type: DOUBLE
    description: "Count of unique for-sale listings active at any point during the month (smoothed)."
  - name: new_listings
    type: DOUBLE
    description: "Count of new for-sale listings that appeared during the month (smoothed)."
  - name: new_pending
    type: DOUBLE
    description: "Count of listings that went into contract (pending) during the month (smoothed)."
