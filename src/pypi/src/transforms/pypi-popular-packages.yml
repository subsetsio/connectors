    type: VARCHAR
  - name: author
    type: VARCHAR
  - name: author_email
    type: VARCHAR
  - name: license
    type: VARCHAR
  - name: license_expression
    type: VARCHAR
  - name: requires_python
    type: VARCHAR
  - name: home_page
    type: VARCHAR
  - name: project_urls
    type: VARCHAR
  - name: keywords
    type: VARCHAR
  - name: classifiers
    type: VARCHAR
  - name: yanked
    type: BOOLEAN
