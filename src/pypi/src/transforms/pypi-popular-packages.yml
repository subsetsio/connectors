# compiled by `hardened compile-transforms` ‚Äî faithful pass-through
# of raw asset `pypi-popular-packages`. Regenerate after model-verify.
# caution: This is a current popularity snapshot ranked by recent 30-day downloads, not a historical download time series.
key: [package]
temporal: snapshot_last_update
sort: [snapshot_last_update, package]
columns:
