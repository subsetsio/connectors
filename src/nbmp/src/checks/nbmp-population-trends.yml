# compiled by `hardened compile-checks` — post-publish audit of `nbmp-population-trends`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, species, survey_type, term]
checks:
  - kind: unique
    columns: [country, species, survey_type, term]
  - kind: not_null
    col: country
  - kind: not_null
    col: species
  - kind: not_null
    col: survey_type
  - kind: not_null
    col: term
  - kind: row_floor
    min: 36
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
