# compiled by `hardened compile-checks` — post-publish audit of `nbmp-trend-indices`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geographical_scale, species, survey, year]
temporal: year
checks:
  - kind: unique
    columns: [geographical_scale, species, survey, year]
  - kind: not_null
    col: geographical_scale
  - kind: not_null
    col: species
  - kind: not_null
    col: survey
  - kind: not_null
    col: year
  - kind: row_floor
    min: 1006
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
