# compiled by `hardened compile-checks` — post-publish audit of `ioc-nocs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_url, archive_timestamp, edition, games]
checks:
  - kind: unique
    columns: [source_url, archive_timestamp, edition, games]
  - kind: not_null
    col: source_url
  - kind: not_null
    col: archive_timestamp
  - kind: not_null
    col: edition
  - kind: not_null
    col: games
  - kind: row_floor
    min: 100
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
