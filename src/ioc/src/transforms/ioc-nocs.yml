key: [edition, noc_code]
sort: [edition, noc_code]
columns:
  - name: edition
    type: VARCHAR
    description: ODF competition code, e.g. OG2024.
  - name: games
    type: VARCHAR
    description: Games family label.
  - name: noc_code
    type: VARCHAR
    description: IOC/ODF National Olympic Committee code.
  - name: archive_timestamp
    type: VARCHAR
    description: Wayback Machine capture timestamp used for the raw payload.
  - name: source_url
    type: VARCHAR
    description: Original olympics.com ODF JSON URL.
  - name: payload_json
    type: VARCHAR
    description: Original nested GLO_NocBio JSON payload as text.
