key: [indicator_code, country_iso3, year]
temporal: year
sort: [year, indicator_code, country_iso3]
columns:
  - name: indicator_code
    type: VARCHAR
    description: Data360/IBP Open Budget Survey indicator code.
  - name: country_iso3
    type: VARCHAR
    description: ISO 3166-1 alpha-3 country code from the source REF_AREA field.
  - name: year
    type: INTEGER
    description: Open Budget Survey round year.
  - name: value
    type: DOUBLE
    description: Observed survey score or rank for the indicator, in the source unit_measure.
  - name: unit_measure
    type: VARCHAR
    description: Source unit code, such as 0_TO_100 for scores.
