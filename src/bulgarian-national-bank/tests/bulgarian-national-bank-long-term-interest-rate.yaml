spec_id: bulgarian-national-bank-long-term-interest-rate
status: active
tests:
  - freshness: {col: period, reaches: today - 60d}
    reason: the BNB long-term interest-rate series is actively updated and the latest profiled run reached 2026-05-29
    certainty: 80
  - not_null: keyfamily
  - not_null: series_key
  - not_null: period
  - not_null: value
    reason: blank/":"/"-" cells are dropped in the parser; surviving rows carry a numeric value
    certainty: 90
  - column_type: {col: value, type: float}
  - column_type: {col: series_key, type: string}
  - matches: {col: period, pattern: '^[0-9]{4}(-[0-9]{2}(-[0-9]{2})?|-Q[1-4])?$'}
    reason: every SDMX period begins with a 4-digit year (YYYY, YYYY-MM, YYYY-Qn, YYYY-MM-DD)
    certainty: 90
  - between: {col: value, lo: -5, hi: 30}
    reason: a long-term government-bond yield (percent) sits in single-to-low-double digits
    certainty: 70
    severity: warn
  - row_count: {min: 1}
