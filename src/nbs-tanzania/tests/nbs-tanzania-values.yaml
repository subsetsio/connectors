spec_id: nbs-tanzania-values
status: active
tests:
  - not_null: indicator_id
    certainty: 95
  - not_null: area
    certainty: 95
  - not_null: year
    certainty: 95
  - column_type: {col: year, type: integer}
    certainty: 90
  - enum: {col: area, values: [mainland, zanzibar]}
    certainty: 95
  - unique: [indicator_id, area, year, disaggregation]
    reason: one observation per indicator x area x year x disaggregation slice (deduped in fetch)
    certainty: 90
  - between: {col: year, lo: 1990, hi: current_year()}
    reason: SDG monitoring starts ~2000; latest values track the current year (some targets land on it)
    certainty: 85
    points_outward: true
    severity: warn
  - at_least: {col: year, expr: 2000}
    certainty: 80
    severity: warn
  - row_count: {min: 3000, max: 20000}
    reason: ~5.7k observations across reported indicators; bounds allow growth
    certainty: 80
  - distinct_count: {col: indicator_id, min: 50}
    reason: reported indicators that actually carry data
    certainty: 80
    severity: warn
