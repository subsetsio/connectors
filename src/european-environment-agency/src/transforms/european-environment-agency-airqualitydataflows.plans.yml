columns:
  - name: "AdoptionDate"
    type: VARCHAR
    description: "The date of official adoption of the plan by the country of administration."
  - name: "AirPollutant"
    type: VARCHAR
    description: "Air polluting substance (see notation in Data Dictionary: http://dd.eionet.europa.eu/vocabulary/aq/pollutant) for which the air quality assessment regime has been reported."
  - name: "AQPlanId"
    type: VARCHAR
    description: "Inspire identifier (Local Id) of plan, given by data provider."
  - name: "Attainment_ReportingYear"
    type: VARCHAR
    description: "Year for which the corresponding attainment report has been reported."
  - name: "AttainmentId"
    type: VARCHAR
    description: "Inspire identifier (Local Id) of air quality attainment, given by data provider."
  - name: "AuthorityAddress"
    type: VARCHAR
    description: "Address of competent authority."
  - name: "AuthorityOrganisation"
    type: VARCHAR
    description: "Name of responsible authority, institution or body."
  - name: "AuthorityTelephone"
    type: VARCHAR
    description: "Telephone number of competent authority."
  - name: "AuthorityWebsite"
    type: VARCHAR
    description: "Website of competent authority."
  - name: "B2G_Namespace"
    type: VARCHAR
    description: "Inspire identifier/namespace of reporting entity, given by data provider."
  - name: "Country"
    type: VARCHAR
    description: "Country or territory name."
  - name: "CountryCode"
    type: VARCHAR
    description: "Country or territory ISO2 code."
  - name: "CountryComment"
    type: VARCHAR
    description: "A short description or notes for clarification in relation to the plan from data provider."
  - name: "FirstExceedanceYear"
    type: VARCHAR
    description: "Year of the (first) exceedance of the LV, LV+MoT) or TV, which triggered the implementation of the air quality plan."
  - name: "H2K_Namespace"
    type: VARCHAR
    description: "Inspire identifier/namespace of reporting entity, given by data provider."
  - name: "Imported"
    type: VARCHAR
    description: "Date and time of source data import into EEA's databases."
  - name: "LocalCode"
    type: VARCHAR
    description: "Unique local reference to air quality plan provided by data provider."
  - name: "Name"
    type: VARCHAR
    description: "Name of the air quality plan(s)."
  - name: "ObjectiveType"
    type: VARCHAR
    description: "Objective type (see notation in Data Dictionary: http://dd.eionet.europa.eu/vocabulary/aq/objectivetype) for which the air quality assessment regime has been reported."
  - name: "OnlineDocumentURL"
    type: VARCHAR
    description: "A URL to document or web resource describing the last version of full air quality plan."
  - name: "ProtectionTarget"
    type: VARCHAR
    description: "Protection target (see notation in Data Dictionary: http://dd.eionet.europa.eu/vocabulary/aq/protectiontarget) for which the air quality assessment regime has been reported."
  - name: "ReportingMetric"
    type: VARCHAR
    description: "Reporting metric (see notation in Data Dictionary: http://dd.eionet.europa.eu/vocabulary/aq/reportingmetric) for which the air quality assessment regime has been reported."
  - name: "ReportingYear"
    type: VARCHAR
    description: "Year for which the data flow item has been reported."
  - name: "SourceDataURL"
    type: VARCHAR
    description: "URL of source data reported to the EEA."
  - name: "Status"
    type: VARCHAR
    description: "The current status of the air quality plan based on a controlled vocabulary."
  - name: "TimeTable"
    type: VARCHAR
    description: "Description of timetable for the implementation of the air quality plan."
  - name: "ValidAttainmentLink"
    type: VARCHAR
    description: "Yes if there is valid link between plan and attainment report."
  - name: "ZoneId"
    type: VARCHAR
    description: "Inspire identifier (Local Id) of air quality zone, given by data provider."
