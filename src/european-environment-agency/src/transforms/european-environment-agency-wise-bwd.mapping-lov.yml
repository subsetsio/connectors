columns:
  - name: "altLabel"
    type: VARCHAR
    description: "Data management attribute: Alternative label for a given concept or code."
  - name: "broader"
    type: VARCHAR
    description: "Data management attribute: Broader concept or code, for hierarchical concepts."
  - name: "broadMatch"
    type: VARCHAR
    description: "Data management attribute: Broad match concept or code, for similar concepts."
  - name: "definition"
    type: VARCHAR
    description: "Data management attribute: Definition of a given concept or code."
  - name: "id"
    type: VARCHAR
    description: "Data management attribute: internal identifier of a given concept or code."
  - name: "label"
    type: VARCHAR
    description: "Data management attribute: Label for a given concept or code."
  - name: "notation"
    type: VARCHAR
    description: "Data management attribute: Code used for a given concept."
  - name: "sameAs"
    type: VARCHAR
    description: "Data management attribute: alternative URI for an equivalent concept."
  - name: "statusCode"
    type: VARCHAR
    description: "Data management attribute: See definitions in http://dd.eionet.europa.eu/vocabulary/datadictionary/status/."
  - name: "statusDate"
    type: VARCHAR
    description: "Data management attribute: Date when the statusCode was assigned."
  - name: "statusRemarks"
    type: VARCHAR
    description: "Data management attribute: Explanation of the statusCode assignment."
  - name: "tableName"
    type: VARCHAR
    description: "Data management attribute: name of the set of codes or vocabulary of codes."
  - name: "URI"
    type: VARCHAR
    description: "Data management attribute: persistent URI for the concept."
