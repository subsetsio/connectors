columns:
  - name: "classification"
    type: VARCHAR
    description: "Name of the classification system. It may contain a date."
  - name: "code"
    type: VARCHAR
    description: "Code in the other classification."
  - name: "habitat_type_name"
    type: VARCHAR
    description: "Name of the habitat in the other classification system."
  - name: "habitat_unique_id"
    type: VARCHAR
  - name: "id_dc"
    type: VARCHAR
    description: "Dublin Core index ID."
  - name: "id_habitat"
    type: VARCHAR
    description: "ID of the habitat type."
  - name: "relation_type_code"
    type: VARCHAR
    description: "Relation type with other classifications. Possible values are: \">\": wider, \"<\": narrower, \"=\": same, \"#\": overlap and \"?\": not determined."
  - name: "relation_type_name"
    type: VARCHAR
    description: "Relation type with other classifications. Possible values are: \">\": wider, \"<\": narrower, \"=\": same, \"#\": overlap and \"?\": not determined."
  - name: "sort_order"
    type: VARCHAR
    description: "Order of classification."
