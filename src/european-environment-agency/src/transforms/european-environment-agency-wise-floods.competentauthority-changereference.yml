columns:
  - name: "acronym"
    type: VARCHAR
    description: "Max length: 100 characters.\r\nOptional.\r\nAcronym for the Competent Authority (if it exists)."
  - name: "changeReference"
    type: VARCHAR
    description: "Optional.\r\nProvide a reference or references to document(s) if the Competent Authorities, or their roles, have changed since the previous cycle of reporting under the Floods Directive. This should include information on the reasons for the change(s) and how the change(s) will support the improved implementation of the FD. Only actual Competent Authorities need to be reported, explanation should also be provided if a Competent Authority is a successor of another one.\r\nMore than one option can be selected. If more than one, values need to be separated by a semicolon followed by a whitespace. e.g., \"value1; value2; value3\"."
  - name: "competentAuthorityName"
    type: VARCHAR
    description: "Max length: 100 characters.\r\nRequired.\r\nOfficial name of the Competent Authority in English."
  - name: "competentAuthorityNameNL"
    type: VARCHAR
    description: "Max length: 100 characters.\r\nRequired.\r\nOfficial name of the Competent Authority in the Member State’s national language."
  - name: "competentAuthorityNameNLLanguage"
    type: VARCHAR
    description: "Required. \r\nChoose from the 'LanguageCode' codelist values.\r\nLanguage used for reporting the name of the Competent Authority in a national language."
  - name: "country"
    type: VARCHAR
    description: "Max length: 100 characters.\r\nRequired.\r\nCountry where the Competent Authority is located in English."
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "euCACode"
    type: VARCHAR
    description: "Max length: 42 characters.\r\nRequired.\r\nUnique EU code for the Competent Authority. Add the Two-letter ISO Country code followed by the Member State unique ID."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "url"
    type: VARCHAR
    description: "Max length: 2100 characters.\r\nRequired.\r\nWebsite address of the Competent Authority."
