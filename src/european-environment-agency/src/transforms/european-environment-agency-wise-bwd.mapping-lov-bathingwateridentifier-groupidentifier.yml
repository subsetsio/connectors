columns:
  - name: "bathingWaterIdentifier"
    type: VARCHAR
    description: "Bathing water reporting attribute: Unique identifier of the bathing water."
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "fromSeason"
    type: VARCHAR
    description: "Data management attribute: Last season when the bathing water belonged to a given bathing water group."
  - name: "groupIdentifier"
    type: VARCHAR
    description: "Bathing water reporting attribute: Unique identifier of the group of bathing waters. ."
  - name: "toSeason"
    type: VARCHAR
    description: "Data management attribute: First season when the bathing water belonged to a given bathing water group."
