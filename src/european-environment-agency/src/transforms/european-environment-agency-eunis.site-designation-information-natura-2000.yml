columns:
  - name: "code_site"
    type: VARCHAR
    description: "Code of the site."
  - name: "confirmed_date"
    type: VARCHAR
    description: "Confirmation date."
  - name: "proposed_date"
    type: VARCHAR
    description: "Date the site was proposed as eligible as SCI."
  - name: "sac_date"
    type: VARCHAR
    description: "Date the site was designated as SAC."
  - name: "sci_check_mark"
    type: VARCHAR
    description: "1=A check mark should be shown for SCI, 0=Otherwise."
  - name: "site_type"
    type: VARCHAR
  - name: "spa_check_mark"
    type: VARCHAR
    description: "1=A check mark should be shown for SPA, 0=Otherwise."
  - name: "spa_date"
    type: VARCHAR
    description: "Date the site was classified as SPA."
  - name: "update_date"
    type: VARCHAR
    description: "Date the site information was last updated."
