columns:
  - name: "cArea"
    type: VARCHAR
    description: "Data management attribute: Area in square kilometer."
  - name: "cLength"
    type: VARCHAR
    description: "Data management attribute: Length in kilometer."
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "euSubUnitCode"
    type: VARCHAR
    description: "Conditional. If applicable, report the unique EU code of the Sub-unit. If there are no sub-units this element does not need to be reported and the reporting of the information is done at RBD level. Sub-units are only relevant for surface water.    Quality checks: Conditional check: report if and only if RBDSUCA/RBD/subUnitsDefined is 'Yes'.    Within-schema check: euSubUnitCode must be unique.  Cross-schema check: euSubUnitCode must be consistent with the codes reported in RBDSUCA/RBD/euSubUnitCode.    Element check: Each combination of sub unit and surfaceWaterOrGroundWater can only be reported once."
  - name: "euSurfaceWaterBodyCode"
    type: VARCHAR
    description: "Required. Unique EU code of the surface water body. Prefix the surface water body's national, unique code with the Member State's 2-letter ISO country code.   Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.   Within-schema check: euSurfaceWaterBodyCode must be unique.   Cross-schema check: euSurfaceWaterBodyCode must be identical to a thematicIdIdentifier reported for surface water bodies in spatial data."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "hasDescriptiveData"
    type: VARCHAR
    description: "Data management attribute: 0, if only spatial data was delivered; 1, if descriptive data has been delivered."
  - name: "naturalAWBHMWB"
    type: VARCHAR
    description: "Required. Indicate whether the surface water body is natural, artificial, or heavily modified.   Note: a water body cannot be both artificial and heavily modified.   A reservoir may be artificial (e.g. constructed for bankside storage) or heavily modified (e.g. a dammed or impounded river).   A canal may be artificial (e.g. specifically constructed for navigation where there was no surface water body before) or heavily modified (e.g. a river that has been deepened or widened or otherwise engineered for navigation).   The identification of the category for heavily modified water bodies (HMWBs), as described in the element surfaceWaterBodyCategory, does not preclude any decision regarding the factors to use in deriving typology and the quality elements to use in the assessment of the HMWBs. According to the WFD Annex II, 1.1.v, the typology differentiation should be undertaken in accordance with the descriptors for whichever natural surface water category most closely resembles the HMWB concerned. Similarly, the quality elements should be those applicable to whichever natural surface water category most closely resembles the HMWB (WFD Annex V, 1.1.5).   The option \"Natural\" should be chosen for territorial waters.   Quality checks: The option 'Natural' must be chosen if surfaceWaterBodyCategory is 'TeW'."
  - name: "NCSWaterBodyType"
    type: VARCHAR
    description: "Water body type in the National Classification System."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
  - name: "reservoir"
    type: VARCHAR
    description: "Conditional. For heavily modified lake water bodies, indicate whether the water body is a reservoir that has been created by damming a river or a pre-existing lake.   All reservoirs should be reported as heavily modified lake water bodies. The 'reservoir' schema element must be reported so that Member States can clarify whether the water bodies were created by damming rivers or pre-existing lakes.   Select 'Reservoir in a water body that was originally a river / rivers' only if the whole surface water body represents a reservoir (or part of a reservoir) created by damming a river.   Select 'Reservoir in a water body that was originally a lake / lakes' if the whole surface water body represents a reservoir (or part of a reservoir) created by modifying a pre-existing lake, or if the surface water body includes some small reservoirs which are not significant enough to be identified as separate surface water bodies.   Select 'Reservoir in what were originally chained rivers and lakes' in cases where the reservoir has been created by damming a water body which contained chained rivers and lakes.   Select 'Not a reservoir' if the lake water body is not a reservoir.   Quality checks: Conditional check: Report if and only if surfaceWaterBodyCategory is 'LW' AND naturalAWBHMWB is 'Heavily Modified'."
  - name: "subUnitName"
    type: VARCHAR
    description: "Required. Readily understandable name of the Sub-unit in English that is meaningful outside of the RBD or Member State."
  - name: "surfaceWaterBodyCategory"
    type: VARCHAR
    description: "Required. Category of surface water body must be reported.    'RW' = River water body.   'LW' = Lake water body.   'TW' = Transitional water body.   'CW' = Coastal water body.   'TeW' = Territorial water body.   Territorial waters are not a water body category under the WFD. However, Article 2.1 of the WFD indicates that chemical status applies also to territorial waters. Member States are therefore asked to report the relevant information for the part of territorial waters which extend beyond coastal waters. Non-relevant information, such as water body type or ecological status, should not be reported for territorial waters (see the guidance provided for these schema elements).   Reservoirs should be reported as lake water bodies ('LW') even when they were formed by damming rivers. The schema element reservoir allows for distinguishing heavily modified lake water bodies which were originally rivers from those which were already lakes before being modified."
  - name: "surfaceWaterBodyName"
    type: VARCHAR
    description: "Required. Readily understandable name of the surface water body in English that is meaningful outside of the RBD or Member State. It should include the name of the river, lake, transitional water, coastal water or territorial water in which the surface water body is located."
  - name: "surfaceWaterBodyTransboundary"
    type: VARCHAR
    description: "Required. The Directive requires co-ordination among Member States for the management of transboundary waters. Transboundary water bodies are those crossing the border between countries or constituting part of the border between two countries for a certain length. A water body that is entirely within one Member State but is contiguous with a water body in another country is, for the purposes of this reporting, also considered as a transboundary water body.   For the sake of clarity, each Member State should report on its own part of these water bodies. In the case of water bodies shared by more than one country (as opposed to contiguous water bodies), geographic information should therefore be provided for the part of the water body within the reporting Member State and for all elements which have a clear geographical reference (e.g. size, monitoring stations). Each Member State should also report on all elements that apply to the whole water body (status, pressures, etc), even in the cases in which these are identical in each of the Member States concerned as a result of the co-ordinated management required by the Directive.   Similarly, for water bodies which constitute part of the border between two countries the same principles apply. In the case of rivers represented as lines, the same line will have to be reported by both Member States concerned, instead of reporting different but adjacent areas, as is the case, for example, for a lake that extends across the border.   Not applicable for territorial waters.   Quality checks: Within-schema check: 'Not applicable' should be reported if and only if SurfaceWaterBodyCategory is 'TeW'."
  - name: "surfaceWaterBodyTypeCode"
    type: VARCHAR
    description: "Required. Member State code for the characterisation type of the surface water body, as reported in the surface water methodology schema (SWMET), and in the RBMP and background documents.   Report 'Not applicable' for territorial waters.   Quality checks:   Within-schema check: 'Not applicable' should be reported if and only if surfaceWaterBodyCategory is 'TeW'.   Cross-schema check: The reported surfaceWaterBodyTypeCode must be consistent with the codes reported in SWMET/SWType/swTypeCode."
  - name: "swChemicalStatusValue"
    type: VARCHAR
    description: "Required. Indicate the chemical status of the water body.   '2' = Good status.   '3' = Failing to achieve good status.   'U' = Unknown status.   This should be based on the standards laid down in Directive 2013/39/EU, for all the substances listed in Directive 2008/105/EC."
  - name: "swChemicalStatusValueWithoutUPBT"
    type: VARCHAR
    description: "Chemical status calculated without uPBT substances."
  - name: "swEcologicalStatusOrPotentialValue"
    type: VARCHAR
    description: "Required. Indicate the ecological status or potential of the surface water body, based on the most recent assessment.   '1' = High status.   '2' = Good status or good or better potential.   '3' = Moderate status or potential.   '4' = Poor status or potential.   '5' = Bad status or potential.   'Unknown' = Unknown status or potential.   'Not applicable' = Not applicable (for territorial waters only).   Quality checks: Within-schema check: 'Not applicable' must be selected if and only if surfaceWaterBodyCategory is 'TeW'.   Within-schema check: If SWB/SurfaceWaterBody/naturalAWBHMWB is not 'natural', option '1' is not valid.   Within-schema check: If a value is reported, it cannot be lower than the highest of the values reported under SWB/QualityElement/qeStatusOrPotentialValue."
  - name: "wiseEvolutionType"
    type: VARCHAR
    description: "--Definition--   Type of event that produced or modified the version of the object being reported (creation, change, deletion, aggregation, splitting).  This attribute is required to explicitly report changes and update the current status of the object in the Water Information System for Europe.    -- Further information --    The allowable values are based on those defined in http://inspire.ec.europa.eu/codelist/EvolutionTypeValue/. See also Annex F of the INSPIRE Data Specification on Statistical Units (D2.8.III.1_v3.0RC3) for examples of application.   See the GIS guidance for additional information on the management of life-cycle information."
