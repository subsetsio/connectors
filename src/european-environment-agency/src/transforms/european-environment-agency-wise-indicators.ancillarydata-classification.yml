columns:
  - name: "classificationType"
    type: VARCHAR
    description: "Type of classification applied: Fixed = using fixed thresholds, FixedDescending = using fixed descending thresholds (higher is better), Quintile = using quintile thresholds."
  - name: "eeaIndicator"
    type: VARCHAR
    description: "Ammonium, Benthic invertebrates, BOD5, Chlorophyll a, Cyanobacteria biomass, Cyanobacteria proportion, Dissolved organic carbon (DOC), Macrophytes, Nitrate, Nitrite, Phosphate, Phytobenthos, Phytoplankton, Secchi depth, Total organic carbon (TOC), Total phosphorus, Total phytoplankton biomass, etc."
  - name: "fixedClassBoundary12"
    type: VARCHAR
    description: "Threshold value between class 1 and class 2, if applicable."
  - name: "fixedClassBoundary23"
    type: VARCHAR
    description: "Threshold value between class 3 and class 4, if applicable."
  - name: "fixedClassBoundary34"
    type: VARCHAR
    description: "Threshold value between class 3 and class 4, if applicable."
  - name: "fixedClassBoundary45"
    type: VARCHAR
    description: "Threshold value between class 4 and class 5, if applicable."
  - name: "qualityElementCode"
    type: VARCHAR
    description: "Code of the quality element. See https://dd.eionet.europa.eu/vocabulary/wise/WFDQualityElement."
  - name: "qualityElementLabel"
    type: VARCHAR
    description: "Label of the quality element. See https://dd.eionet.europa.eu/vocabulary/wise/WFDQualityElement."
  - name: "remarks"
    type: VARCHAR
    description: "Remarks, comments or explanatory notes."
  - name: "resultUom"
    type: VARCHAR
    description: "Unit of measure for the reported values."
  - name: "sortKey"
    type: VARCHAR
    description: "Data portrayal attribute: sort order."
  - name: "waterBodyCategory"
    type: VARCHAR
    description: "Water body category code. GW = Groundwater body, RW = River, LW = Lake, TW = Transitional water body, CW = Coastal water body, TeW = Territorial waters."
