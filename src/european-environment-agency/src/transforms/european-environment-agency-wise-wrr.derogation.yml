columns:
  - name: "competentAuthority"
    type: VARCHAR
    description: "Unique identifier responsible for grating the permit and carrying out the WRR obligations under the respective permit."
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "cYear"
    type: VARCHAR
  - name: "derogationEndDate"
    type: VARCHAR
    description: "end date of the derogation in the format YYYY-MM-DD\nGuidance: reporting is required."
  - name: "derogationIdentifier"
    type: VARCHAR
    description: "unique European identifier for the derogation\nGuidance: reporting is required. Provide a unique identifier code for the derogation. The identifier must also be used in subsequent reporting years if the derogation is still in place. The identifier must follow the syntax defined for WISE identifiers (see the guidance for the responsiblePartyIdentifier element)."
  - name: "derogationStartDate"
    type: VARCHAR
    description: "start date of the derogation in the format YYYY-MM-DD\nGuidance: reporting is required."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "remarks"
    type: VARCHAR
    description: "additional information about the record, in English or in the national language.\nGuidance: reporting is optional."
  - name: "spatialUnitIdentifier"
    type: VARCHAR
    description: "unique European identifier of WFD River Basin Districts, Subunit, or Surface water bodies or Groundwater bodies\nGuidance: reporting is required.\nProvide the unique identifier of the area where water reuse is not implemented. WFD River basin districts, subunits, and surface and groundwater bodies must exist in the WISE spatial data. In the WISE spatial data set, the European identifier is reported in the thematicIdIdentifier field."
  - name: "spatialUnitIdentifierScheme"
    type: VARCHAR
    description: "unique European identifier of reporting units i.e. countryCode, euRBDcode, euSubUnitCode, euSurfaceWaterBodyCode, euGroundWaterBodyCode\nGuidance: reporting is required.\nProvide the unique identifier of the reporting unit where WRR is not implemented. Reporting unit of countryCode, euRBDcode, euSubUnitCode, euSurfaceWaterBodyCode, euGroundWaterBodyCode must exist in the WISE spatial reference data set under thematicIdIdentifierScheme field."
