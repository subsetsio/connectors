columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "crossBorderRelationship"
    type: VARCHAR
    description: "Required. \r\nChoose an option from the 'YesNo' codelist values.\r\nPlease indicate whether the APSFR crosses the national border."
  - name: "euFloodsRiskZoneCode"
    type: VARCHAR
    description: "Max length: 42 characters.\r\nRequired.\r\nUnique EU code for the area of potential significant flood risk. Add the two-letter ISO Country code to the Member State unique id - up to 42 characters in total."
  - name: "euFloodsUnitOfManagementCode"
    type: VARCHAR
    description: "Max length: 42 characters.\r\nRequired.\r\nUnique EU code for the Unit of Management or WFD River Basin District following the WISE identifier syntax. Add the two-letter ISO Country code to the Member State unique id - up to 42 characters in total."
  - name: "generalAdditionalCommentsReference"
    type: VARCHAR
    description: "Optional.\r\nProvide a reference or references to document(s) that will be helpful to explain the data and information provided.\r\nMore than one option can be selected. If more than one, values need to be separated by a semicolon followed by a whitespace. e.g., \"value1; value2; value3\"."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "otherCharacteristicsFloodingDescription"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nIf ‘Other’ selected from enumeration list provide a description of the other characteristics or state whether there are no special characteristics."
  - name: "otherMechanismFloodingDescription"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nIf ‘Other’ selected from enumeration list provide a description of the other mechanism(s)."
  - name: "otherSourceFloodingDescription"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nIf ‘Other’ selected from enumeration list provide a description of the other source(s)."
