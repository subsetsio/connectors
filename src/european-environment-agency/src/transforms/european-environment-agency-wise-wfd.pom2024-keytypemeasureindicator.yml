columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2024 for the Progress on the Program of Measures reporting for 3rd River Basin Management Plans (PoM2024)."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Unique EU code of the River Basin District. Required. This element can be pre-filled.  A FeatureUniqueEUCodeType identifier must follow the syntax of the WISE identifiers. It must start with the two-letter country code of the Member State, followed by one character that can be a digit or an uppercase letter, followed by a sequence of characters (0 to 38 characters long) that can be digits or uppercase letters, with no consecutive double hyphens or double underscores, but allowing for single hyphens or underscores between characters. The code can optionally end with one character that can be a digit or an uppercase letter.  Examples: FR123, FR1_XYZ1234_1, FR1-XYZ1234-1, FR1XYZ12341 but not FR1__XYZ1234__1 or FRa123."
  - name: "euSubUnitCode"
    type: VARCHAR
    description: "Conditional. If applicable, report the unique EU code of the Sub-unit. If there are no sub-units this element does not need to be reported and the reporting of the information is done at RBD level. Subunits are only relevant for surface water. This element can be pre-filled."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: pseudo-URL of data delivery."
  - name: "hasDescriptiveData"
    type: VARCHAR
    description: "Data management attribute: 1, if structure descriptive data has been delivered; 0, if not."
  - name: "keyTypeMeasure"
    type: VARCHAR
    description: "For each significant pressure type or chemical substance selected report the Key Types of Measures chosen to address the reported gap and quantitative indicators of the expected progress during the next management cycle. Required. For the significant pressure type or chemical substance being reported, select from the enumeration list the pre-defined Key Type of Measure (KTM) that will be made operational to reduce it.   Select the option ‘KTM99 – Other key type measure reported under PoM’ only if some of your   measures do not fit into any of the pre-defined KTMs included in the enumeration list. This element can be pre-filled."
  - name: "keyTypeMeasureIndicator"
    type: VARCHAR
    description: "Quantitative indicators have been proposed for each pressure or chemical substance causing failure and for the relevant KTMs. Required. Select from the enumeration list the predefined quantitative indicator that relates to the KTM reported in keyTypeMeasure (or keyTypeMeasureOther). The indicator selected should give an indication of the measures that will need to be made operational to achieve Environmental Objectives.   Select the option 'other' only if the indicator you use is not included in the enumeration list.   Select the option 'notAvailable' if you cannot report information on quantitative indicators of the expected progress related to this KTM in the form required in this guidance. This element can be pre-filled.  ."
  - name: "keyTypeMeasureIndicatorOther"
    type: VARCHAR
    description: "Conditional. If keyTypeMeasureIndicator is 'other', report a short name and description of the quantitative indicator related to the KTM being reported. More than one 'other' indicator may be reported by repeating the reporting of this class. This element can be pre-filled."
  - name: "keyTypeMeasureIndicatorValue2024"
    type: VARCHAR
    description: "If data is available, report the expected value in 2024 for the indicator selected in keyTypeMeasureIndicator (or keyTypeMeasureIndicatorOther). Conditional.    This value should give a quantitative indication of the scale of the measures still needed to achieve Environmental Objectives."
  - name: "keyTypeMeasureIndicatorValue2027"
    type: VARCHAR
    description: "If data is available, report the expected value in 2027 for the indicator selected in keyTypeMeasureIndicator (or keyTypeMeasureIndicatorOther). Conditional.   This value should give a quantitative indication of the scale of the measures still needed to achieve Environmental Objectives."
  - name: "keyTypeMeasureIndicatorValue2033"
    type: VARCHAR
    description: "If data is available, report the expected value in 2033 for the indicator selected in keyTypeMeasureIndicator (or keyTypeMeasureIndicatorOther). Conditional.   This value should give a quantitative indication of the scale of the measures still needed to achieve Environmental Objectives."
  - name: "keyTypeMeasureOther"
    type: VARCHAR
    description: "Conditional. If keyTypeMeasure is 'other', report a descriptive name for the additional Key Type of Measure (KTM). More than one ‘other’ KTM may be reported by repeating the reporting of this class."
  - name: "otherSubstanceFailing"
    type: VARCHAR
    description: "Conditional. If 'substanceFailing' is 'EEA_00-00-0' (meaning 'Other parameter') please indicate in this field the CAS number (if relevant) and the name of the pollutant or indicator. This element can be pre-filled.  ."
  - name: "rbdArea"
    type: VARCHAR
    description: "Required. Area of the RBD in km2 including coastal waters but excluding territorial waters as required for the chemical status under WFD Article 2(1)."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
  - name: "significantPressure"
    type: VARCHAR
    description: "Conditional. Select from the enumeration list, in turn: each significant pressure type that is, by itself or in combination with other pressures, causing failure of surface water good ecological status or potential, or failure of good chemical status, or failure of groundwater good quantitative status and for which measures are required to reduce the pressure to a level and extent that enables the Environmental Objectives to be met. This element can be pre-filled."
  - name: "substanceFailing"
    type: VARCHAR
    description: "Conditional. Select from the enumeration list, in turn:   - each RBSP that is causing failure of good ecological status or potential - each Priority Substance that is causing failure of good chemical status - each groundwater pollutant that is causing failure of good chemical status and for which measures are required to reduce the pressure to a level and extent that enables the Environmental Objectives to be met.   The option 'EEA_00-00-0' (meaning 'Other parameter') should be selected only if the substance that has to be reported is not included in the enumeration list. This element can be pre-filled."
  - name: "surfaceWaterOrGroundwater"
    type: VARCHAR
    description: "Required. Select from the enumeration list whether measures required to achieve the WFD Environmental Objectives are being reported for surface water or groundwater. This element can be pre-filled."
