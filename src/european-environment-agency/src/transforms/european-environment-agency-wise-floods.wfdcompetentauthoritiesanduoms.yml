columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "url"
    type: VARCHAR
    description: "Max length: 2100 characters.\r\nOptional.\r\nURL for integration of your own internet-based information."
  - name: "wfdCompetentAuthorities"
    type: VARCHAR
    description: "Required.\r\nChoose from the 'YesNo' codelist values.\r\nAre the competent authorities the same as reported under the Water Framework Directive?."
  - name: "wfdRiverBasinDistricts"
    type: VARCHAR
    description: "Required.\r\nChoose from the 'YesNo' codelist values.\r\nSelect 'Yes' if the RBDs reported under the Water Framework Directive are being used (if a Member State has reported Sub-units then it's assumed these are the scale of management)."
