columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "monitoringSiteIdentifier"
    type: VARCHAR
    description: "EU Identifier of the monitoring station."
  - name: "ND_NatStatCode"
    type: VARCHAR
    description: "Nationally assigned, unique identifier of the monitoring station. ."
  - name: "ND_StationType"
    type: VARCHAR
    description: "Station Type as defined in code list. ."
  - name: "ND_Year"
    type: VARCHAR
    description: "Year for which Average annual concentration value in given record reported for Nitrate directive is provided."
  - name: "parameterWaterBodyCategory"
    type: VARCHAR
    description: "Water body category code, as defined in the codelist."
  - name: "phenomenonTimeReferenceYear"
    type: VARCHAR
    description: "Year during which the data were sampled."
  - name: "resultMeanValue"
    type: VARCHAR
    description: "Mean value of the data used for aggregation."
  - name: "resultNumberOfSamples"
    type: VARCHAR
    description: "Number of sample values included in the aggregated data."
