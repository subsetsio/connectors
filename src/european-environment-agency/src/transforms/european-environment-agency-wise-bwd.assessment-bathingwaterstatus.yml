columns:
  - name: "bathingWaterIdentifier"
    type: VARCHAR
    description: "Bathing water reporting attribute: Unique identifier of the bathing water."
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "management"
    type: VARCHAR
    description: "Bathing water assessment attribute: Management status assessment for a bathing water."
  - name: "monitoringCalendar"
    type: VARCHAR
    description: "Bathing water assessment attribute: Monitoring calendar status assessment for a bathing water."
  - name: "quality"
    type: VARCHAR
    description: "Bathing water assessment attribute: Bathing water quality status assessment."
  - name: "qualityOriginalClassification"
    type: VARCHAR
    description: "Bathing water assessment attribute: Bathing water quality status assessment (according to the procedure originally applied for the assessment)."
  - name: "reportedSpecialisedZoneType"
    type: VARCHAR
    description: "Spatial data attribute: Additional classification value which further specialises the type of management, regulation or restriction zone relevant to the domain. Reported value."
  - name: "season"
    type: VARCHAR
    description: "Bathing water reporting attribute: Year of the bathing season."
  - name: "specialisedZoneType"
    type: VARCHAR
    description: "Spatial data attribute: Additional classification value which further specialises the type of management, regulation or restriction zone relevant to the domain. Current value."
  - name: "uid"
    type: VARCHAR
    description: "Data management attribute: Unique identifier of the record in the Bathing Water Directive database."
