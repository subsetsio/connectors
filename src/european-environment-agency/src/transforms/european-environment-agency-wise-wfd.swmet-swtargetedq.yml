columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "gepApproach"
    type: VARCHAR
    description: "Conditional. If GEP has been defined, report the approach that has been adopted for defining GEP.  Quality checks: Conditional check: Report if and only if gepDefined is 'Yes'."
  - name: "gepBiology"
    type: VARCHAR
    description: "Conditional. If GEP has been defined, indicate whether GEP has been defined in terms of biology (BQEs).  Quality checks: Conditional check: Report if and only if gepDefined is 'Yes'."
  - name: "gepDefined"
    type: VARCHAR
    description: "Required. Indicate whether good ecological potential (GEP) has been defined."
  - name: "gepLevel"
    type: VARCHAR
    description: "Conditional. Indicate at what level GEP has been defined.  Quality checks: Conditional check: Report if gepDefined is 'Yes'."
  - name: "gesGepComparison"
    type: VARCHAR
    description: "Conditional. If GEP has been defined, indicate whether good ecological status (GES) and GEP have been compared, e.g. measured on a common scale69.  If 'Yes', provide a document describing the comparison that has been carried out.  If 'No', provide a document explaining why a comparison has not been carried out.  The documents in question should be reported using the schema element gepMethodReference.  Quality checks: Conditional check: Report if and only if gepDefined is 'Yes'."
  - name: "groupingExtrapolation"
    type: VARCHAR
    description: "Required. Indicate whether grouping of water bodies has been used in extrapolating the assessment and classification of ecological status from monitored water bodies to water bodies with no monitoring sites."
  - name: "hasDescriptiveData"
    type: VARCHAR
  - name: "oneOutAllOut"
    type: VARCHAR
    description: "Required. Indicate whether the 'one-out, all-out' principle has been applied in deriving the overall classification of the ecological status of water bodies."
  - name: "rbdArea"
    type: VARCHAR
    description: "Required. Area of the RBD in km2 including coastal waters but excluding territorial waters as required for the chemical status under WFD Article 2(1)."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
