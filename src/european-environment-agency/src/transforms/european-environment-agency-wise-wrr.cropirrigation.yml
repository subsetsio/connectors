columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "cropCategory"
    type: VARCHAR
    description: "crop category applied in the place of use. They consist of following five options: edible part  consumed raw and edible part is in direct contact with reclaimed water (‘EdiblePartConsumedRawDirectContactWithWater’), root crops consumed raw (‘RootCropsConsumedRaw’), edible part consumed raw and edible part is produced above ground and not in direct contact with reclaimed water (‘EdiblePartConsumedRawAboveGroundNotDirectContactWithWater’), \r\nprocessed food crops (‘ProcessedFoodCrops’) and non food crops (‘NonFoodCrops’). Guidance: reporting is required. Use the values in the CropCategory codelist value. If a different crop category is applied and it is not present in the codelist, please contact water-reuse.helpdesk@eionet.europa.eu."
  - name: "cropIrrigationIdentifier"
    type: VARCHAR
    description: "unique European identifier for the crop irrigation\nGuidance: reporting is required. Provide a unique identifier code for each place for WRR reporting, where the reclaimed water is used for irrigation. The same identifier must also be used in subsequent reporting years. The identifier must follow the syntax defined for WISE identifiers (see the guidance for the responsiblePartyIdentifier element)."
  - name: "cYear"
    type: VARCHAR
  - name: "irrigatedArea"
    type: VARCHAR
    description: "area of place where reclaimed water in a distinct quality class is used for irrigation under the respective permit. Area unit 1 ha = 10000 m<sup>2</sup> Guidance: reporting is required. Total area in ha per water quality class. ."
  - name: "irrigationSystemType"
    type: VARCHAR
    description: "irrigation system type applied in the place of use i.e. surface, sprinkler or micro irrigation. \nGuidance: reporting is required.\nUse the values in the IrrigationSystemType codelist. If a different irrigation system is applied and it is not present in the codelist, please contact water-reuse.helpdesk@eionet.europa.eu ."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "placeOfUseIdentifier"
    type: VARCHAR
    description: "unique European identifier for the place of use the reclaimed water\nGuidance: reporting is required."
  - name: "remarks"
    type: VARCHAR
    description: "additional information about the record, in English or in the national language.\nGuidance: reporting is optional."
  - name: "waterQualityClass"
    type: VARCHAR
    description: "Water quality class as permitted by the competent authority. Guidance: reporting is required.\r\nThe reported value should comply with \"Table 1 - Classes of reclaimed water quality and permitted agricultural use and irrigation method\" of the document \"REGULATION (EU) 2020/741 OF THE EUROPEAN PARLIAMENT AND OF THE COUNCIL of 25 May 2020 on minimum requirements for water reuse\"\r\n."
