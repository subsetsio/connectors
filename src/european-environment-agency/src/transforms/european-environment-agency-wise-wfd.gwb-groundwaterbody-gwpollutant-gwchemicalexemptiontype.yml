columns:
  - name: "cArea"
    type: VARCHAR
    description: "Data management attribute: Area in square kilometer."
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euGroundWaterBodyCode"
    type: VARCHAR
    description: "Required. Unique EU code of the groundwater body.  Prefix the groundwater body's national, unique code with the Member State's 2-letter ISO country code (*).  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euGroundWaterBodyCode must be unique.  Cross-schema check: euGroundWaterBodyCode must be identical to a thematicIdIdentifier reported for groundwater bodies in spatial data.    (*)Member State's 2-letter ISO country code: http://publications.europa.eu/code/en/en-370100.htm (Note: for Greece use 'EL')."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "geologicalFormation"
    type: VARCHAR
    description: "Required. Describe the main geological formation of the aquifer type."
  - name: "groundWaterBodyName"
    type: VARCHAR
    description: "Required. Readily understandable name of the groundwater body in English that is meaningful outside of the RBD or Member State.  ."
  - name: "groundwaterBodyTransboundary"
    type: VARCHAR
    description: "Required. The Directive requires coordination among Member States for the management of transboundary Water Bodies. Transboundary water bodies are those crossing the border between countries or constituting part of the border between two countries for a certain length. For reporting purposes in the case of water bodies that cross the border between countries, and for the sake of clarity, each Member State should report on its own part of these trans-boundary Water Bodies. Geographic information should therefore be provided for the part of the Water Body within the reporting Member State and likewise for all elements which have a clear geographical reference (e.g. size, monitoring stations). Each Member State should also report on all elements that apply to the whole water body (status, pressures, etc). For the latter the Commission expects that the information provided by each of the Member States concerned will be identical, as a result of the coordinated management required by the Directive."
  - name: "gwAtRiskChemical"
    type: VARCHAR
    description: "Required. Report whether the groundwater body is at risk of failing to be in good chemical status. The identification of groundwater bodies at risk should follow the approach given in the CIS Guidance Document No. 26, 'Risk assessment and the use of conceptual models' . Quality checks: Within-schema check: 'Yes' has to be selected if GWPollutant/gwPollutantCausingRisk is 'Yes' for at least one pollutant or indicator of pollution."
  - name: "gwAtRiskQuantitative"
    type: VARCHAR
    description: "Required. Report whether the groundwater body is at risk of failing to be of good quantitative status. Please follow the approach given in the 'CIS Guidance Document No. 26: Risk assessment and the use of conceptual models' (*).    (*) CIS Guidance Document No. 26: Risk assessment and the use of conceptual models:  https://circabc.europa.eu/sd/a/8564a357-0e17-4619-bd76-a54a23fa7885/Guidance%20No%2026%20-  %20GW%20risk%20assessment%20and%20conceptual%20models.pdf."
  - name: "gwChemicalAssessmentConfidence"
    type: VARCHAR
    description: "Required. Indicate the confidence on the chemical status assigned. '0' = No information. '1' = Low confidence (e.g. no monitoring data, or no conceptual model or understanding of the system). '2' = Medium confidence (e.g. limited or insufficiently robust monitoring data and expert judgment plays a significant role in assessment of status). '3' = High confidence (e.g. good monitoring data, and a good conceptual model or understanding of the system based on information on its natural characteristics and its pressures). The criteria used by Member States to assess confidence vary considerably, but the above examples provide some general guidance. For further information, please see CIS Guidance Document No. 7, 'Monitoring under the Water Framework Directive'41 and CIS Guidance Document No. 15, 'Groundwater monitoring'."
  - name: "gwChemicalAssessmentYear"
    type: VARCHAR
    description: "Required. Provide the year on which the assessment of status is based. This may be the year when the groundwater body was monitored or, in case of grouping, the year in which monitoring took place in the groundwater bodies within the group that are used to extrapolate results to non-monitored groundwater bodies. It is possible to report a single year or a period (e.g. 2018--2020)."
  - name: "gwChemicalExemptionPressure"
    type: VARCHAR
    description: "Conditional. If any GWD Article 6(3) or WFD Article 4(4) or 4(5) exemptions apply to this groundwater body for chemical status, report the significant pressure(s) that are causing failure in order to justify the exemption.   Quality checks: Conditional check: If gwChemicalExemptionType is 'GWD Article 6(3)...', 'Article 4(4)...' or 'Article 4(5)...', at least one significant pressure type must be selected from the enumeration list.   The options 'No significant pressure' and 'Not applicable' are not valid."
  - name: "gwChemicalExemptionPressureGroup"
    type: VARCHAR
    description: "Group of gwChemicalExemptionPressure. Conditional. If any GWD Article 6(3) or WFD Article 4(4) or 4(5) exemptions apply to this groundwater body for chemical status, report the significant pressure(s) that are causing failure in order to justify the exemption(s). Quality checks: Conditional check: If gwChemicalExemptionType is not 'No exemption', at least one significant pressure type must be selected from the enumeration list. The options 'No significant pressure' and 'Not applicable' are not valid."
  - name: "gwChemicalExemptionType"
    type: VARCHAR
    description: "Required. Report which type(s) of exemption apply if good chemical status is not expected to be achieved by 2021 for the pollutant or indicator of pollution being reported.   Article 4(7) exemptions are not relevant for good chemical status and therefore cannot be reported.   Quality checks: Within-schema check: The option 'No exemption' is not compatible with any other.   The options 'Article4(7) - New modification' and 'Article4(7) - Sustainable human development' are not valid options.   ."
  - name: "gwChemicalExemptionTypeGroup"
    type: VARCHAR
    description: "Group of gwChemicalExemptionType. Required. Report which type(s) of exemption(s) apply if good chemical status is not expected to be achieved by 2015 for that pollutant or indicator. Quality checks: Within-schema check: The option 'No exemption' is not compatible with any other. Therefore, if reported, no more instances of 'gwChemicalExemptionType' should be reported. The options 'Article4(7) - New modification' and 'Article4(7) - Sustainable human development' are not valid for groundwater chemical status and therefore cannot be reported."
  - name: "gwChemicalStatusExpectedAchievementDate"
    type: VARCHAR
    description: "Required. Report the period in which good chemical status is expected to be achieved. Select the option '2021 or ealier' if good chemical status has already been reached or is expected to be reached by 2021. The methodology of this assessment should be clearly explained in the RBMP or background documents (reference reported under classification methodologies, see section 8.3). If good chemical status will not be achieved by 2021, exemptions have to be reported. Please report the period in which it is expected that good chemical status will be achieved in full, not the date relating to individual exemptions. However, please note the following: Article 4(4) exemptions relate to the extension of deadlines. According to Article 4(4)(c) of the WFD, postponing the achievement of objectives beyond 2027 is only possible due to natural conditions. If Article 4(5) exemptions apply, report the period in which the less stringent objective is expected to be achieved. If the less stringent objective has already been achieved then select 'Less stringent objectives already achieved'. Quality checks: Within-schema check: 'Less stringent objectives already achieved' is only a valid option if 'Article 4(5)...' is reported under gwChemicalExemptionType.  ."
  - name: "gwChemicalStatusValue"
    type: VARCHAR
    description: "Required. Indicate the chemical status of the groundwater body. '2' = Good status. '3' = Poor status. 'U' = Unknown status. Quality checks: Within-schema check: '3' has to be selected if GWPollutant/gwPollutantCausingFailure is 'Yes' for at least one pollutant or indicator of pollution."
  - name: "gwEORiskChemical"
    type: VARCHAR
    description: "Conditional. If the groundwater body is at risk of failing to be in good chemical status, select from the enumeration list the Environmental Objective to which the risk is related: 'Uses or functions' = The risk is related to the actual or potential legitimate uses or functions of the groundwater body. 'Surface waters / terrestrial ecosystems' = The risk is related to the relationship between groundwater bodies and the associated surface waters and directly dependent terrestrial ecosystems. 'Both' = The risk is related to both objectives above. Further guidance can be found in CIS Guidance Document no. 18, 'Groundwater Status and Trends Assessment'. Quality checks: Conditional check: Report if and only if gwAtRiskChemical is 'Yes'.  ."
  - name: "gwEORiskQuantitative"
    type: VARCHAR
    description: "Conditional. If the groundwater body is at risk of failing to be in good quantitative status, select the Environmental Objective related to the risk from the enumeration list. 'Uses or functions' = The actual or potential legitimate uses or functions of the groundwater body. 'Surface waters / terrestrial ecosystems' = The relationship between groundwater bodies and the associated surface waters and directly dependent terrestrial ecosystems. Quality checks: Conditional check: Report if and only if gwAtRiskQuantitative is 'Yes'."
  - name: "gwPollutantBackgroundLevelSet"
    type: VARCHAR
    description: "Required. Indicate whether a background level of natural substances has been set. ."
  - name: "gwPollutantBackgroundLevelUnit"
    type: VARCHAR
    description: "Conditional. If a background level is set, select the relevant units for the natural background concentrations or levels.   Quality checks: Conditional check: report if and only if 'gwPollutantBackgroundLevelSet' is 'Yes'."
  - name: "gwPollutantBackgroundLevelValue"
    type: VARCHAR
    description: "Conditional. If a background level is set, report the numeric value or range of the natural background level.   Quality checks: Conditional check: report if and only if 'gwPollutantBackgroundLevelSet' is 'Yes'."
  - name: "gwPollutantCausingFailure"
    type: VARCHAR
    description: "Required. Indicate whether the pollutant or indicator of pollution is causing failure to achieve good chemical status.   Quality checks: Within-schema check: If GroundWaterBody/gwChemicalStatusValue is '3' then at least one pollutant or indicator of pollution should be reported as 'Yes'."
  - name: "gwPollutantCausingRisk"
    type: VARCHAR
    description: "Required. Indicate whether the pollutant or indicator of pollution is causing risk of the groundwater body failing to be in good chemical status.   Quality checks: Within-schema check: If GroundWaterBody/gwAtRiskChemical is 'Yes' then at least one pollutant or indicator of pollution should be reported as 'Yes'."
  - name: "gwPollutantCode"
    type: VARCHAR
    description: "Required. Select from the enumeration list each pollutant or indicator for which one or more of the following circumstances occur in the relevant water body: - The pollutant or indicator is causing risk of failure of chemical status - The pollutant or indicator is causing failure of chemical status due to exceedance of the relevant EQS or threshold value - The pollutant or indicator is showing an upward trend - The pollutant or indicator is showing a trend reversal - The pollutant or indicator is showing exceedance(s) of the EQS or threshold value but, after an appropriate investigation according to Article 4(2)(c) and Annex III of the Groundwater Directive, the Member State considers that this does not result in a failure of chemical status - Background levels have been set for the pollutant or indicator 'EEA_00-00-0 - Other chemical parameter' must be reported only when the failing RBSP is not included in the enumeration list RBSP_Enum."
  - name: "gwPollutantOther"
    type: VARCHAR
    description: "Conditional. If gwPollutantCode is 'EEA_00-00-0 Other chemical parameter' please indicate in this field the CAS number (if relevant) and the name of the pollutant or indicator.   Quality check: Conditional check: report if and only if gwPollutantCode is 'EEA_00-00-0 Other chemical parameter'."
  - name: "gwPollutantsExceedancesNotCounted"
    type: VARCHAR
    description: "Required. Indicate whether there are exceedances of the pollutant or indicator of pollution which are not considered as failures to achieve good chemical status (according to Article 4(2)(c) of the GWD). ."
  - name: "gwPollutantTrendReversal"
    type: VARCHAR
    description: "Required. Indicate whether there is a trend reversal in the concentration of the pollutant or indicator of pollution. Report 'Not applicable' if there is no significant and sustained upward trend in the concentration of the pollutant or indicator of pollution.   Quality checks: Within-schema check: the option 'Not applicable' is only valid if gwPollutantUpwardTrend is 'No'."
  - name: "gwPollutantTrendReversalProcess"
    type: VARCHAR
    description: "Required. If there is a significant and sustained upward trend in the concentration of the pollutant or indicator of pollution, indicate whether there is a process in place that will lead to a trend reversal. Report 'Not applicable' if there is no significant and sustained upward trend in the concentration of the pollutant or indicator of pollution.   Quality checks: Within-schema check: the option 'Not applicable' is only valid if gwPollutantUpwardTrend is 'No'."
  - name: "gwPollutantUpwardTrend"
    type: VARCHAR
    description: "Required. Indicate whether there is a significant and sustained upward trend in the concentration of the pollutant or indicator of pollution."
  - name: "gwQuantitativeAssessmentConfidence"
    type: VARCHAR
    description: "Required. Indicate the confidence on the quantitative status assigned.   '0' = No information.  '1' = Low confidence (e.g. no monitoring data, or no conceptual model or understanding of the system).  '2' = Medium confidence (e.g. limited or insufficiently robust monitoring data and expert judgment plays a significant role in assessment of status).   '3' = High confidence (e.g. good monitoring data and a good conceptual model or understanding of the system based on information on its natural characteristics and its pressures).   The criteria used by Member States to assess confidence vary considerably, but the above examples provide some general guidance. For further information, please see CIS Guidance Document No. 7, 'Monitoring under the Water Framework Directive' and CIS Guidance Document No. 15, 'Groundwater monitoring'.  ."
  - name: "gwQuantitativeAssessmentYear"
    type: VARCHAR
    description: "Required. Provide the year on which the assessment of status is based. This may be the year when the groundwater body was monitored or, in case of grouping, the year in which monitoring took place in the groundwater bodies within the group that are used to extrapolate results to non-monitored groundwater bodies. It is possible to report a single year or a period (e.g. 2018--2020)."
  - name: "gwQuantitativeStatusExpectedAchievementDate"
    type: VARCHAR
    description: "Required. Report the period in which good quantitative status is expected to be achieved. Select the option '2021 or ealier' if good quantitative status has already been reached or is expected to be reached by 2021. The methodology of this assessment should be clearly explained in the RBMP or background documents (reference reported under classification methodologies, see section 8.3). If good quantitative status will not be achieved by 2021, exemptions have to be reported. Please report the period in which it is expected that good quantitative status will be achieved in full, not the date relating to individual exemptions. However, please note the following:  Article 4(4) exemptions relate to the extension of deadlines. According to Article 4(4)(c) of the WFD, postponing the achievement of objectives beyond 2027 is only possible due to natural conditions.   If Article 4(5) exemptions apply, report the period in which the less stringent objective is expected to be achieved. If the less stringent objective has already been achieved then select 'Less stringent objectives already achieved'. Quality checks: Within-schema check: 'Less stringent objectives already achieved' is only a valid option if 'Article 4(5)...' is reported under gwQuantitativeExemptionType.  ."
  - name: "gwQuantitativeStatusValue"
    type: VARCHAR
    description: "Required. Indicate the quantitative status of the groundwater body, based on the most recent assessment.  '2' = Good status.  '3' = Poor status.  'U' = Unknown status."
  - name: "hasDescriptiveData"
    type: VARCHAR
    description: "Data management attribute: 0, if only spatial data was delivered; 1, if descriptive data has been delivered."
  - name: "horizons"
    type: VARCHAR
    description: "--Definition--  Horizons present in the waterbody, to be reproted as a comma-separated list of integer values.    -- Guidance --  Data Providers reporting under WFD should provide a comma-separated list of the horizons present in the groundwater body.  Example 1: if the all the groundwater body belongs to horizon 1, simply report '1'.  Example 2: if the groundwater body belongs to horizon 2 and 3, report '2,3'. In this situation, the geometry of the part belonging to horizon 2 and the geometry of the part belong to horizon 3, should be reported in the GroundWaterBodyHorizon dataset."
  - name: "linkSurfaceWaterBody"
    type: VARCHAR
    description: "Required. Indicate whether the groundwater body is associated with one or more surface water bodies."
  - name: "linkTerrestrialEcosystem"
    type: VARCHAR
    description: "Required. Indicate whether a terrestrial ecosystem is  directly dependent on the groundwater body.  In order for terrestrial ecosystems to be considered as part of the classification for groundwater  bodies, they need to be 'directly dependent' on the groundwater body. This means that the  groundwater body should provide quantity (flow, level) or quality of water needed to sustain the  significance of the groundwater-dependent terrestrial ecosystem. This critical dependence upon a  groundwater body is most likely to occur where groundwater supplies the terrestrial ecosystem for  a significant part of the year or a significant time period during the year. For more information see  Technical Report No. 6 Technical Report on Groundwater-Dependent Terrestrial Ecosystems (*).    (*)http://bookshop.europa.eu/en/technical-report-on-groundwater-dependent-terrestrial-ecosystems-pbKHAV12006/."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
  - name: "wiseEvolutionType"
    type: VARCHAR
    description: "--Definition--   Type of event that produced or modified the version of the object being reported (creation, change, deletion, aggregation, splitting).  This attribute is required to explicitly report changes and update the current status of the object in the Water Information System for Europe.    -- Further information --    The allowable values are based on those defined in http://inspire.ec.europa.eu/codelist/EvolutionTypeValue/. See also Annex F of the INSPIRE Data Specification on Statistical Units (D2.8.III.1_v3.0RC3) for examples of application.   See the GIS guidance for additional information on the management of life-cycle information."
