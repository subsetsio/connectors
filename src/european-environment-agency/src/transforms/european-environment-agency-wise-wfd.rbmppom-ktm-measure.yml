columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "hasDescriptiveData"
    type: VARCHAR
  - name: "keyTypeMeasure"
    type: VARCHAR
    description: "Required. For the significant pressure type or chemical substance being reported, select from the enumeration list the pre-defined Key Type of Measure (KTM) that will be made operational to reduce it.   Select the option 'KTM99 - Other key type measure reported under PoM' only if some of your measures do not fit into any of the pre-defined KTMs included in the enumeration list.  Quality checks:<b> </b>Within-schema check: the KTMs reported have to be consistent with those reported under RBMPPoM/KTM/keyTypeMeasure."
  - name: "keyTypeMeasureOther"
    type: VARCHAR
    description: "Conditional. If keyTypeMeasure is 'KTM99 - Other key type measure reported under PoM', report a descriptive name for the additional Key Type of Measure (KTM). More than one 'other' KTM may be reported by repeating the reporting of this class.  Quality checks:<b> </b>Conditional check: report if and only if keyTypeMeasure is 'KTM99 - Other key type measure reported under PoM'."
  - name: "measureCode"
    type: VARCHAR
    description: "Required. Report the unique code of the national or RBD-specific measure."
  - name: "measureName"
    type: VARCHAR
    description: "Required. Provide the name of the national or RBD-specific measure. The name should reflect the pressure that is being tackled by the measure."
  - name: "measureType"
    type: VARCHAR
    description: "Required. Indicate whether the national or RBD-specific measure is a basic measure as required under Article 11(3)(a) or Article 11(3)(b-l), a supplementary measure for the achievement of Environmental Objectives as required under Article 11(4) when basic measures are not enough to tackle specific significant pressures, or a supplementary measure for additional protection or improvement of waters as foreseen in Article 11(4)."
  - name: "msfdRelevance"
    type: VARCHAR
    description: "Required. Report whether or not the national or RBD-specific measure is relevant for the purpose of the Marine Strategy Framework Directive. Report 'Not relevant' for the French Overseas Territories and for landlocked countries if the relevance for MSFD was not considered. Please note, however, that measures taken in a landlocked country may well be relevant  for the MSFD (e.g. reduction of nutrients in rivers may have an impact on eutrophication in marine waters). If this possible relevance was considered, you should report 'Yes' or 'No'."
  - name: "rbdArea"
    type: VARCHAR
    description: "Required. Area of the RBD in km2 including coastal waters but excluding territorial waters as required for the chemical status under WFD Article 2(1)."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
