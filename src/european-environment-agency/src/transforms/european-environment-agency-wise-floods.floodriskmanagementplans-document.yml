columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "documentCode"
    type: VARCHAR
    description: "Max length: 50 characters.\r\nRequired.\r\nUnique identifier of the document. The value must contain only latin characters, digits, underscores, hyphens and dots. No consecutive underscores, hyphens and dots are allowed."
  - name: "documentFile"
    type: VARCHAR
    description: "Conditional.\r\nDocument file as an attachment. The size of the file can be up to 100 MB and the valid file extensions are: 'xlsx' (Excel), 'docx' (Word) and 'pdf'. Either URL or documentFile must be reported, but not both."
  - name: "documentName"
    type: VARCHAR
    description: "Max length: 250 characters.\r\nRequired.\r\nName of the document."
  - name: "hyperlink"
    type: VARCHAR
    description: "Max length: 2100 characters.\r\nConditional.\r\nURL of the document if available on the internet. Either URL or document file as an attachment. The size of the file can be up to 100 MB and the valid file extensions are: 'xlsx' (Excel), 'docx' (Word) and 'pdf'. Either URL or documentFile must be reported, but not both."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_endLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was retired or replaced, if applicable."
  - name: "metadata_observationStatus"
    type: VARCHAR
    description: "Data management attribute: Status of the record regarding its reliability."
  - name: "metadata_replacedBy"
    type: VARCHAR
    description: "Data management attribute: unique identifier of the record that replaced the current record, if applicable."
  - name: "metadata_replaces"
    type: VARCHAR
    description: "Data management attribute: unique identifier of the record that the current record replaces, if applicable."
  - name: "metadata_statements"
    type: VARCHAR
    description: "Data management attribute: Additional information or statements regarding the reliability of the feature or record."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_statusDate"
    type: VARCHAR
    description: "Data management attribute: Date when the metadata status code was set."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "UID"
    type: VARCHAR
    description: "Record ID at ReportNet 3."
