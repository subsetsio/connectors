columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "hasDescriptiveData"
    type: VARCHAR
  - name: "managementObjectivesContinuity"
    type: VARCHAR
    description: "Required. Indicate whether overall management objectives have been set for river continuity."
  - name: "managementObjectivesContinuityQuantitative"
    type: VARCHAR
    description: "Conditional. Indicate whether quantitative objectives have been set in terms of river continuity (e.g. km of rivers connected, number of obstacles to be made passable, etc). Quality checks: Conditional check: Report if managementObjectivesContinuity is 'Yes'."
  - name: "managementObjectivesNutrients"
    type: VARCHAR
    description: "Required. Indicate whether overall management objectives have been set for nutrient pollution."
  - name: "managementObjectivesNutrientsQuantitativeN"
    type: VARCHAR
    description: "Conditional. Indicate whether quantitative objectives have been set in terms of nitrogen load reduction. Quality checks: Conditional check: Report if managementObjectivesNutrients is 'Yes'."
  - name: "managementObjectivesNutrientsQuantitativeP"
    type: VARCHAR
    description: "Conditional. Indicate whether quantitative objectives have been set in terms of phosphorus load reduction. Quality checks: Conditional check: Report if managementObjectivesNutrients is 'Yes'."
  - name: "rbdArea"
    type: VARCHAR
    description: "Required. Area of the RBD in km2 including coastal waters but excluding territorial waters as required for the chemical status under WFD Article 2(1)."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
  - name: "waterResourcePlans"
    type: VARCHAR
    description: "Required. Indicate whether separate Water Resource Plans have been developed in relation to abstractions and e-flows or whether this topic is included in the RBMP."
