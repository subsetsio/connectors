columns:
  - name: "code_2000"
    type: VARCHAR
    description: "Natura 2000 code for the species name."
  - name: "habitat_unique_id"
    type: VARCHAR
  - name: "id_eunis"
    type: VARCHAR
    description: "EUNIS ID for the species name."
  - name: "id_habitat"
    type: VARCHAR
    description: "ID of the habitat type."
  - name: "picture_url"
    type: VARCHAR
    description: "URL of the picture for the species."
  - name: "relationship_code"
    type: VARCHAR
    description: "Code of the relationship between habitat type and species. Possible values are: 'mentioned', 'constant', 'diagnostic' and 'dominant'."
  - name: "relationship_description"
    type: VARCHAR
    description: "Description of the relationship between habitat type and species."
  - name: "scientific_name"
    type: VARCHAR
    description: "Scientific name of the species."
  - name: "species_group_common_name"
    type: VARCHAR
    description: "Common name for the species group."
