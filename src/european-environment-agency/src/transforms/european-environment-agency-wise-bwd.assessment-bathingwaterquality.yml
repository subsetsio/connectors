columns:
  - name: "bathingWaterIdentifier"
    type: VARCHAR
    description: "Bathing water reporting attribute: Unique identifier of the bathing water."
  - name: "classification"
    type: VARCHAR
    description: "Bathing water assessment attribute: Bathing water quality classification for all parameters."
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "escherichiaColi90thPercentile"
    type: VARCHAR
    description: "Bathing water assessment attribute: 90th percentile of the observed values for the parameter Escherichia coli."
  - name: "escherichiaColi95thPercentile"
    type: VARCHAR
    description: "Bathing water assessment attribute: 95th percentile of the observed values for the parameter Escherichia coli."
  - name: "escherichiaColiAverageLog10"
    type: VARCHAR
    description: "Bathing water assessment attribute: Mean of the log10 observed values for the parameter Escherichia coli."
  - name: "escherichiaColiClassification"
    type: VARCHAR
    description: "Bathing water assessment attribute: Bathing water quality classification for the parameter Escherichia coli."
  - name: "escherichiaColiNumberOfSamples"
    type: VARCHAR
    description: "Bathing water assessment attribute: Number of samples in the assessment of the parameter Escherichia coli."
  - name: "escherichiaColiSampleStdDevLog10"
    type: VARCHAR
    description: "Bathing water assessment attribute: Sample standard deviation of the log10 observed values for the parameter Escherichia coli."
  - name: "intestinalEnterococci90thPercentile"
    type: VARCHAR
    description: "Bathing water assessment attribute: 90th percentile of the observed values for the parameter intetinal Enteroccoci."
  - name: "intestinalEnterococci95thPercentile"
    type: VARCHAR
    description: "Bathing water assessment attribute: 95th percentile of the observed values for the parameter intetinal Enteroccoci."
  - name: "intestinalEnterococciAverageLog10"
    type: VARCHAR
    description: "Bathing water assessment attribute: Mean of the log10 observed values for the parameter intetinal Enteroccoci."
  - name: "intestinalEnterococciClassification"
    type: VARCHAR
    description: "Bathing water assessment attribute: Bathing water quality classification for the parameter intestinal Enterococci."
  - name: "intestinalEnterococciNumberOfSamples"
    type: VARCHAR
    description: "Bathing water assessment attribute: Number of samples in the assessment of the parameter intestinal Enterococci."
  - name: "intestinalEnterococciSampleStdDevLog10"
    type: VARCHAR
    description: "Bathing water assessment attribute: Sample standard deviation of the log10 observed values for the parameter intetinal Enteroccoci."
  - name: "season"
    type: VARCHAR
    description: "Bathing water reporting attribute: Year of the bathing season."
  - name: "UID"
    type: VARCHAR
    description: "Data management attribute: Unique identifier of the record in the Bathing Water Directive database."
