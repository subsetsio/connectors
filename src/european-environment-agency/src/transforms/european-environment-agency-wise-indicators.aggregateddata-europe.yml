columns:
  - name: "class1"
    type: VARCHAR
    description: "Number of observations assigned to class 1."
  - name: "class2"
    type: VARCHAR
    description: "Number of observations assigned to class 2."
  - name: "class3"
    type: VARCHAR
    description: "Number of observations assigned to class 3."
  - name: "class4"
    type: VARCHAR
    description: "Number of observations assigned to class 4."
  - name: "class5"
    type: VARCHAR
    description: "Number of observations assigned to class 5."
  - name: "eeaIndicator"
    type: VARCHAR
    description: "Ammonium, Benthic invertebrates, BOD5, Chlorophyll a, Cyanobacteria biomass, Cyanobacteria proportion, Dissolved organic carbon (DOC), Macrophytes, Nitrate, Nitrite, Phosphate, Phytobenthos, Phytoplankton, Secchi depth, Total organic carbon (TOC), Total phosphorus, Total phytoplankton biomass, etc."
  - name: "maxValue"
    type: VARCHAR
    description: "Maximum value."
  - name: "meanValue"
    type: VARCHAR
    description: "Average value."
  - name: "minValue"
    type: VARCHAR
    description: "Minimum value."
  - name: "numberOfCountries"
    type: VARCHAR
    description: "Total number of countries with values."
  - name: "numberOfReportedCountries"
    type: VARCHAR
    description: "Total number of countries with reported values."
  - name: "numberOfReportedSites"
    type: VARCHAR
    description: "Total number of monitoring sites with reported values."
  - name: "numberOfSites"
    type: VARCHAR
    description: "Total number of sites."
  - name: "phenomenonTimeReferenceYear"
    type: VARCHAR
    description: "Year during which the data were sampled."
  - name: "resultUom"
    type: VARCHAR
    description: "Unit of measure for the reported values."
  - name: "stdevValue"
    type: VARCHAR
    description: "Standard deviation value of the data used for aggregation."
  - name: "waterBodyCategory"
    type: VARCHAR
    description: "Water body category code. GW = Groundwater body, RW = River, LW = Lake, TW = Transitional water body, CW = Coastal water body, TeW = Territorial waters."
