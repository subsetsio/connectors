columns:
  - name: "article_6_6_Applied"
    type: VARCHAR
    description: "Required. \r\nChoose from the 'YesNo' codelist values.\r\nHas Article 6(6) been applied or not?."
  - name: "article_6_6_JustificationOther"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nIf 'Other justification' is selected in 'Article6.6Justification', provide a description."
  - name: "article_6_7_Applied"
    type: VARCHAR
    description: "Required.\r\nChoose from the 'YesNo' codelist values.\r\nHas Article 6(7) been applied?\r\n."
  - name: "article_6_7_JustificationOther"
    type: VARCHAR
    description: "Conditional.\r\nIf 'Other' is selected in 'article6_7_Justification', provide a description."
  - name: "characteristicsOfFlooding"
    type: VARCHAR
    description: "Optional.\r\nChoose from the 'CharacteristicsOfFlooding' codelist values.\r\nDefine relevant characteristics of flooding included in the FHRMs.\r\nMore than one option can be selected. If more than one, values need to be separated by a semicolon followed by a whitespace. e.g., \"value1; value2; value3\"."
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "euFloodsRiskZoneCode"
    type: VARCHAR
    description: "Max length: 42 characters.\r\nRequired.\r\nUnique EU code for the area of potential significant flood risk. Add the two-letter ISO Country code to the Member State unique id - up to 42 characters in total."
  - name: "euFloodsUnitOfManagementCode"
    type: VARCHAR
    description: "Max length: 42 characters.\r\nRequired.\r\nUnique EU code for the Unit of Management or WFD River Basin District following the WISE identifier syntax. Add the two-letter ISO Country code to the Member State unique id - up to 42 characters in total."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "otherCharacteristicsDescription"
    type: VARCHAR
    description: "Max length: 1000 characters\r\nConditional.\r\nProvide a description if type is set to 'Other' under Characteristics in the enumeration list."
  - name: "otherMechanismDescription"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nProvide a description if type is set to 'Other' under Mechanism in the enumeration list."
  - name: "otherSourceDescription"
    type: VARCHAR
    description: "Max length: 1000 characters.\r\nConditional.\r\nProvide a description if type is set to 'Other' under Source in the enumeration list."
