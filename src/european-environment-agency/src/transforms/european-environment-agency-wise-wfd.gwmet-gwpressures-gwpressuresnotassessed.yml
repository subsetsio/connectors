columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Ancillary attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "cYear"
    type: VARCHAR
    description: "Data management attribute: Reporting cycle. 2022 for the 3rd River Basin Management Plans (RBMP); 2016 for 2nd rbmp; 2010 for the 1st RBMP."
  - name: "euRBDCode"
    type: VARCHAR
    description: "Required. Unique EU code of each River Basin District. Prefix the RBD's national, unique code with the Member State's 2-letter ISO country code.  Quality checks: Element check: String length must be within the range of 3 to 42 characters. First 2 characters must be the Member State's 2-letter ISO country code.  Within-schema check: euRBDCode must be unique.  Cross-schema check: euRBDCode must be identical to a thematicIdIdentifier reported for River Basin Districts in spatial data.  ."
  - name: "fileUrl"
    type: VARCHAR
    description: "Data management attribute: URL of data delivery."
  - name: "gwPressuresNotAssessed"
    type: VARCHAR
    description: "Required. Select from the enumeration list the pressure types that have not been assessed (i.e. pressure types that have not been considered because they are not relevant for groundwater, they were not deemed to be important in the RBD, no information was available, or any other reason). If all pressures have been assessed report 'Not applicable'. The option 'No significant pressure' is not valid.  Quality checks: Element check: the option 'No significant pressure' is not valid."
  - name: "gwPressuresNotAssessedGroup"
    type: VARCHAR
    description: "Group of gwPressuresNotAssessed. Required. Select any pressure types from the enumeration list that have not been assessed (i.e. pressure types that have not been considered because they were not deemed to be important in the RBD, no information was available, or any other reason). If all pressures have been assessed report 'Not applicable'. The option 'No significant pressure' is not valid."
  - name: "gwSignificanceDefinition"
    type: VARCHAR
    description: "Required. Indicate whether significance has been defined in terms of thresholds (see CIS Guidance no. 18). ."
  - name: "gwSignificanceLinkFailure"
    type: VARCHAR
    description: "Required. Indicate whether the definition of significance is linked to the potential failure of good status.  ."
  - name: "gwSignificantPressureArtificialRecharge"
    type: VARCHAR
    description: "Required. Report the tools that have been used to define significant pressures from artificial recharge. 'Numerical tools' includes modelling."
  - name: "gwSignificantPressureDiffuseSourceTools"
    type: VARCHAR
    description: "Required. Report the tools that have been used to define significant pressures from diffuse sources. 'Numerical tools' includes modelling.  ."
  - name: "gwSignificantPressureOtherSourceTools"
    type: VARCHAR
    description: "Required. Report the tools that have been used to define significant pressures from other sources. 'Numerical tools' includes modelling. ."
  - name: "gwSignificantPressurePointSourceTools"
    type: VARCHAR
    description: "Required. Report the tools that have been used to define significant pressures from point sources. 'Numerical tools' includes modelling.  ."
  - name: "gwSignificantPressureWaterAbstractionTools"
    type: VARCHAR
    description: "Required. Report the tools that have been used to define significant pressures from water abstractions. 'Numerical tools' includes modelling."
  - name: "hasDescriptiveData"
    type: VARCHAR
  - name: "rbdArea"
    type: VARCHAR
    description: "Required. Area of the RBD in km2 including coastal waters but excluding territorial waters as required for the chemical status under WFD Article 2(1)."
  - name: "rbdName"
    type: VARCHAR
    description: "Required. Readily understandable name of the RBD in English that is meaningful outside of the RBD or Member State. ."
