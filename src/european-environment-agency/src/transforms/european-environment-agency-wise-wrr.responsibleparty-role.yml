columns:
  - name: "city"
    type: VARCHAR
    description: "name of city where the organisation is located.\nGuidance: reporting is optional."
  - name: "countryCode"
    type: VARCHAR
    description: "Unique 2 character ISO Code for the EU Member State."
  - name: "countryName"
    type: VARCHAR
    description: "Name for the EU Member State."
  - name: "cYear"
    type: VARCHAR
  - name: "link"
    type: VARCHAR
    description: "URL of competent authority’s website.\nGuidance: reporting is optional."
  - name: "metadata_beginLifeSpanVersion"
    type: VARCHAR
    description: "Data management attribute: Timestamp when the feature or record was created. In case of reported data, it is the release date and time of the respective data delivery."
  - name: "metadata_statusCode"
    type: VARCHAR
    description: "Data management attribute: Status of the feature or record regarding its registration."
  - name: "metadata_versionId"
    type: VARCHAR
    description: "Data management attribute: Unique metadata identifier of version of the feature or record. URL that points either to the source of the reported data or to a page providing information on the data origin."
  - name: "postalCode"
    type: VARCHAR
    description: "postal code of city where the organisation is located.\nGuidance: reporting is optional."
  - name: "remarks"
    type: VARCHAR
    description: "additional information about the record, in English or in the national language.\nGuidance: reporting is optional."
  - name: "responsiblePartyIdentifier"
    type: VARCHAR
    description: "unique European identifier for the Responsible party.  Please consult with the \"role\" field for further clarification on the types of responsible parties. \nGuidance: reporting is required. Provide a unique identifier code for each role  identified in the water reuse system. The same identifier must also be used in subsequent reporting years. \nThe identifier must follow the syntax of the WISE identifiers. \nIt must start with the two-letter country code of the Member State, followed by one character that can be a digit or an uppercase letter, followed by a sequence of characters (0 to 38 characters long) that can be digits or uppercase letters, with no consecutive double hyphens or double underscores, but allowing for single hyphens or underscores between characters. The code can optionally end with one character that can be a digit or an uppercase letter. Example: FR123, FR1_XYZ1234_1, FR1-XYZ1234-1, FR1XYZ12341 but not FR1__XYZ1234__1 or FR1–XYZ1234–1. ."
  - name: "role"
    type: VARCHAR
    description: "role of the Responsible party in the water reuse system, in English. Responsible parties can be authorities responsible for grating the permit and carrying out the WRR obligations, contact point defined by the member state or separate operator of the reclamation facility. \ncompetentAuthority; Authority responsible for grating the permit and carrying out the WRR obligations under the respective permit\ncontactPoint; A contact point assigned by Member States for the purposes of\ncooperation with other Member States’ contact points and competent authorities”\nreclamationFacilityOperator;\tOperator responsible for supplying the reclaimed water in the required quality of the permit and responsible for reporting the data on non-compliance cases. \nreclaimedWaterDistributionOperator; Operator responsible for distributing the reclaimed water in accordance with permit conditions\nreclaimedWaterStorageOperator; Operator responsible for managing the reclaimed water storage in accordance with the specifications in the permit\nGuidance: reporting is required."
