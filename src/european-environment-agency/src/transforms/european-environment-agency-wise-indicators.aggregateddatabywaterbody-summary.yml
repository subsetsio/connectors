columns:
  - name: "countryCode"
    type: VARCHAR
    description: "Data management attribute: ISO 3166-1 alpha-2 country code, except for Greece (EL) and the United Kingdom (UK)."
  - name: "countryGroup"
    type: VARCHAR
    description: "Data management attribute: EU27 or other country."
  - name: "countryName"
    type: VARCHAR
    description: "Data management attribute: Country name."
  - name: "eeaIndicator"
    type: VARCHAR
    description: "Ammonium, Benthic invertebrates, BOD5, Chlorophyll a, Cyanobacteria biomass, Cyanobacteria proportion, Dissolved organic carbon (DOC), Macrophytes, Nitrate, Nitrite, Phosphate, Phytobenthos, Phytoplankton, Secchi depth, Total organic carbon (TOC), Total phosphorus, Total phytoplankton biomass, etc."
  - name: "matrixDissolved"
    type: VARCHAR
    description: "Number of years when the reported sample matrix was the dissolved matrix."
  - name: "matrixTotal"
    type: VARCHAR
    description: "Number of years when the reported sample matrix was the total."
  - name: "matrixTotalOrDissolved"
    type: VARCHAR
    description: "Number of years with mixed records (dissolved matrix or total matrix)."
  - name: "maxGapLongTimeSeries"
    type: VARCHAR
    description: "Length of the largest gap in the time series, for the long reference period."
  - name: "maxGapShortTimeSeries"
    type: VARCHAR
    description: "Length of the largest gap in the time series, for the short reference period."
  - name: "maxGapSinceFirstYear"
    type: VARCHAR
    description: "Length of the largest gap in the time series, since first reported."
  - name: "maxYear"
    type: VARCHAR
    description: "Last year reported."
  - name: "meanValue"
    type: VARCHAR
    description: "Average value."
  - name: "minYear"
    type: VARCHAR
    description: "First year reported."
  - name: "numberOfYears"
    type: VARCHAR
    description: "Total number of years."
  - name: "resultUom"
    type: VARCHAR
    description: "Unit of measure for the reported values."
  - name: "seriesSpan"
    type: VARCHAR
    description: "Data management attribute: type of time series according to its length."
  - name: "seriesUID"
    type: VARCHAR
    description: "Data management attribute: unique UID for each time series."
  - name: "stdevValue"
    type: VARCHAR
    description: "Standard deviation value of the data used for aggregation."
  - name: "waterBodyCategory"
    type: VARCHAR
    description: "Water body category code. GW = Groundwater body, RW = River, LW = Lake, TW = Transitional water body, CW = Coastal water body, TeW = Territorial waters."
  - name: "waterBodyIdentifier"
    type: VARCHAR
    description: "Unique identifier of the associated surface water body."
  - name: "waterBodyIdentifierScheme"
    type: VARCHAR
    description: "Specification of whether the water body is a WFD water body (euGroundwaterBodyCode or euSurfaceWaterBodyCode) or not (eionetGroundwaterBodyCode or eionetSurfaceWaterBodyCode)."
  - name: "waterBodyStatusCode"
    type: VARCHAR
    description: "Data management attribute: See definitions in http://dd.eionet.europa.eu/vocabulary/datadictionary/status/."
