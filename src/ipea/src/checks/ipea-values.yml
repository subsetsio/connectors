# compiled by `hardened compile-checks` — post-publish audit of `ipea-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [series_code, date, geo_level, territory_code]
temporal: date
checks:
  - kind: unique
    columns: [series_code, date, geo_level, territory_code]
  - kind: not_null
    col: series_code
  - kind: not_null
    col: date
  - kind: not_null
    col: geo_level
  - kind: not_null
    col: territory_code
  - kind: row_floor
    min: 39486449
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
