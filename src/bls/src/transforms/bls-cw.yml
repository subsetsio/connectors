# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `bls-cw`. Regenerate after model-verify.
# caution: `period` mixes regular observations with BLS aggregate period codes — M13 (annual average) and S01/S02/S03 (semiannual and semiannual-annual). `period_start_date` is derived as the first day of the observation period, so an aggregate row lands on the same date as the year's first regular row (M13/S01/S03/A01 and Q05 all stamp January 1). Filter on `period` — grouping or summing by `period_start_date` alone double-counts.
# caution: Carries both seasonally adjusted (`seasonal` = 'S') and unadjusted ('U') versions of the same underlying series; filter `seasonal` or you will mix two measurements of the same quantity.
# caution: `value` is untyped across rows: what it measures is selected by `item_code`, `area_code` and `base_code`/`base_period` (the index reference base). Never aggregate `value` without first pinning those dimensions to a single measure.
# caution: `item_code` is a hierarchy ('All items' contains the major groups, which contain their own items) and `area_code` carries the 'U.S. city average' (0000) aggregate alongside regions and metro areas; summing or averaging across either double-counts.
# caution: Index values are only comparable within one `base_period` — series on different reference bases share the table.
key: [series_id, year, period]
temporal: period_start_date
sort: [period_start_date, series_id, year, period]
columns:
  - name: series_id
    type: VARCHAR
  - name: year
    type: INTEGER
  - name: period
    type: VARCHAR
  - name: period_start_date
    type: DATE
  - name: value
    type: DOUBLE
  - name: footnote_codes
    type: VARCHAR
  - name: area_code
    type: VARCHAR
  - name: area_name
    type: VARCHAR
  - name: item_code
    type: VARCHAR
  - name: item_name
    type: VARCHAR
  - name: seasonal
    type: VARCHAR
  - name: seasonal_name
    type: VARCHAR
  - name: periodicity_code
    type: VARCHAR
  - name: periodicity_name
    type: VARCHAR
  - name: base_code
    type: VARCHAR
  - name: base_name
    type: VARCHAR
  - name: base_period
    type: VARCHAR
  - name: series_title
    type: VARCHAR
