# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `bls-tu`. Regenerate after model-verify.
# caution: `period` mixes regular observations with BLS aggregate period codes — A01 (annual average). `period_start_date` is derived as the first day of the observation period, so an aggregate row lands on the same date as the year's first regular row (M13/S01/S03/A01 and Q05 all stamp January 1). Filter on `period` — grouping or summing by `period_start_date` alone double-counts.
# caution: A single table holds quarterly (Q01-Q04) and annual (A01) observations; `period` is the only column that tells them apart.
# caution: `value` is untyped across rows: what it measures is selected by `stattype_code` (average hours vs participation rate) and `datays_code`. Never aggregate `value` without first pinning those dimensions to a single measure.
# caution: Demographic dimension codes carry 'all'/'total' rows alongside their breakdowns; crossing them and summing double-counts the same respondents.
key: [series_id, year, period]
temporal: period_start_date
sort: [period_start_date, series_id, year, period]
