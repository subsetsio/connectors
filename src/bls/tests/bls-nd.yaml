spec_id: bls-nd
status: active
coverage:
  frozen: true
  reason: >-
    ND is the PPI "Revision-Discontinued Series" archive (nd.txt section 1):
    every series in it has already been terminated, and its end_year is when
    BLS retired it. 87% of the 6,484 catalogued series ended before 2020 and
    the newest observation anywhere in the corpus is 2025-06. The observation
    frontier therefore does not advance on a release cadence - it moves only
    when BLS discontinues another batch of PPI series and appends their
    closed histories. Live PPI freshness is asserted on its successors,
    bls-pc (current industry series) and bls-wp (commodity series). The
    directory itself is still rewritten monthly, so MAINTAIN_SPECS keeps
    re-fetching it on nd.series ETag change; that is republication of a
    closed corpus, not new observations.
tests:
  - not_null: series_id
  - not_null: period
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - unique: [series_id, year, period]
    reason: one observation per series and period; the survey's data files overlap (a `.data.0.Current` subset, and for LAUS per-state files that restate the aggregate ones) so the fetch dedups the union - a duplicate here means two files disagreed on a value
    certainty: 90
  - row_count: {min: 540000}
    reason: floor derived from the survey's published flat-file size; a smaller load means data files went missing from the union
    certainty: 80
  - matches: {col: period, pattern: '^[AMQS][0-9]{2}$'}
    reason: BLS period codes are M01-M13, Q01-Q05, S01-S03, A01
    certainty: 95
  - at_most: {col: year, expr: current_year()}
    reason: observations are historical; a future year means a projection series leaked into an observation file
    certainty: 85
    points_outward: true
    severity: warn
  - nullable: {col: value, max_null_frac: 0.05}
    reason: BLS writes '-' for suppressed/unavailable observations, which we null; a large null share means the value column stopped parsing
    certainty: 75
    severity: warn
