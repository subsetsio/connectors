spec_id: bls-tu
status: active
tests:
  - not_null: series_id
  - not_null: period
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - unique: [series_id, year, period]
    reason: one observation per series and period; the survey's data files overlap (a `.data.0.Current` subset, and for LAUS per-state files that restate the aggregate ones) so the fetch dedups the union - a duplicate here means two files disagreed on a value
    certainty: 90
  - row_count: {min: 870000}
    reason: floor derived from the survey's published flat-file size; a smaller load means data files went missing from the union
    certainty: 80
  - matches: {col: period, pattern: '^[AMQS][0-9]{2}$'}
    reason: BLS period codes are M01-M13, Q01-Q05, S01-S03, A01
    certainty: 95
  - at_most: {col: year, expr: current_year()}
    reason: observations are historical; a future year means a projection series leaked into an observation file
    certainty: 85
    points_outward: true
    severity: warn
  - nullable: {col: value, max_null_frac: 0.3}
    reason: >-
      BLS writes '-' for suppressed/unavailable observations and the fetch
      TRY_CASTs them to NULL, so the null share equals the source's '-' share.
      That share is legitimately high here (16.2% of observations, verified
      against the upstream flat files): ATUS suppresses cells whose sample size falls below its reliability threshold. The threshold is therefore set
      well above the survey's normal suppression rate - this guard exists to
      catch the value column failing to parse at all (a near-1.0 null share),
      not to police how much the source suppresses.
    certainty: 75
    severity: warn
  - freshness: {col: period_start_date, reaches: today - 3y}
    reason: slack matched to this survey's release cadence and publication lag
    points_outward: true
