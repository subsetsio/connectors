# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `bls-oe`. Regenerate after model-verify.
# caution: `value` is untyped across rows: what it measures is selected by `datatype_code` (employment, mean wage, wage percentiles). Never aggregate `value` without first pinning those dimensions to a single measure.
# caution: `area_code` ships undecoded (no `area_name`): the OES area map is keyed on (`state_code`, `areatype_code`, `area_code`), so it could not be joined on `area_code` alone; use `areatype_code` + `state_code` to interpret it.
# caution: `occupation_code` is a SOC hierarchy (major groups contain detailed occupations) and `industry_code` carries cross-industry totals — summing employment across either double-counts.
key: [series_id, year, period]
temporal: period_start_date
sort: [period_start_date, series_id, year, period]
columns:
  - name: series_id
    type: VARCHAR
  - name: year
    type: INTEGER
  - name: period
    type: VARCHAR
  - name: period_start_date
    type: DATE
  - name: value
    type: DOUBLE
  - name: footnote_codes
    type: BIGINT
  - name: seasonal
    type: VARCHAR
  - name: seasonal_name
    type: VARCHAR
  - name: areatype_code
    type: VARCHAR
  - name: areatype_name
    type: VARCHAR
  - name: industry_code
    type: VARCHAR
  - name: industry_name
    type: VARCHAR
  - name: occupation_code
    type: VARCHAR
  - name: occupation_name
    type: VARCHAR
  - name: datatype_code
    type: VARCHAR
  - name: datatype_name
    type: VARCHAR
  - name: state_code
    type: VARCHAR
  - name: area_code
    type: VARCHAR
  - name: sector_code
    type: VARCHAR
  - name: sector_name
    type: VARCHAR
  - name: series_title
    type: VARCHAR
