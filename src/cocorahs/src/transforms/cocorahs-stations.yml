key: [station_number]
temporal: updated_at
sort: [updated_at, station_number]
columns:
  - name: station_number
    type: VARCHAR
    description: CoCoRaHS station identifier.
  - name: station_name
    type: VARCHAR
    description: Station display name.
  - name: station_type
    type: VARCHAR
    description: CoCoRaHS station type.
  - name: state
    type: VARCHAR
    description: Two-letter state or territory code for the station.
  - name: county
    type: VARCHAR
    description: County name for the station location.
  - name: city
    type: VARCHAR
    description: City or locality for the station location.
  - name: latitude
    type: DOUBLE
    description: Station latitude in decimal degrees.
  - name: longitude
    type: DOUBLE
    description: Station longitude in decimal degrees.
  - name: elevation_ft
    type: DOUBLE
    description: Station elevation, in feet.
  - name: status
    type: VARCHAR
    description: Current station status in the CoCoRaHS station export.
  - name: created_at
    type: TIMESTAMP
    description: Station creation timestamp from the CoCoRaHS export.
  - name: updated_at
    type: TIMESTAMP
    description: Timestamp carried by the CoCoRaHS export for this station row.
