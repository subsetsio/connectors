key: [station_number, observation_date]
temporal: observation_date
sort: [observation_date, station_number]
columns:
  - name: station_number
    type: VARCHAR
    description: CoCoRaHS station identifier.
  - name: station_name
    type: VARCHAR
    description: Station display name at the time of export.
  - name: state
    type: VARCHAR
    description: Two-letter state or territory code used for the export partition.
  - name: observation_date
    type: DATE
    description: Local date of the daily precipitation observation.
  - name: observation_time
    type: VARCHAR
    description: Observer-reported local observation time.
  - name: latitude
    type: DOUBLE
    description: Station latitude in decimal degrees.
  - name: longitude
    type: DOUBLE
    description: Station longitude in decimal degrees.
  - name: total_precip_in
    type: DOUBLE
    description: Total precipitation amount for the observation day, in inches.
  - name: new_snow_in
    type: DOUBLE
    description: New snow depth for the observation day, in inches.
  - name: new_snow_swe_in
    type: DOUBLE
    description: Snow water equivalent of new snow, in inches.
  - name: total_snow_depth_in
    type: DOUBLE
    description: Total snow depth on the ground, in inches.
  - name: total_snow_swe_in
    type: DOUBLE
    description: Snow water equivalent of total snow on the ground, in inches.
  - name: flooding
    type: VARCHAR
    description: Observer-reported flooding category or indicator.
  - name: notes
    type: VARCHAR
    description: Free-text observer notes supplied with the daily report.
  - name: updated_at
    type: TIMESTAMP
    description: Timestamp carried by the CoCoRaHS export for this report row.
