# compiled by `hardened compile-checks` — post-publish audit of `cocorahs-multiday-reports`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [station_number, start_date, end_datetime, entry_datetime]
temporal: start_date
checks:
  - kind: unique
    columns: [station_number, start_date, end_datetime, entry_datetime]
  - kind: not_null
    col: station_number
  - kind: not_null
    col: start_date
  - kind: not_null
    col: end_datetime
  - kind: not_null
    col: entry_datetime
  - kind: row_floor
    min: 669589
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
