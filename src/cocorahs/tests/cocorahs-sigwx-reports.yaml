spec_id: cocorahs-sigwx-reports
status: active
tests:
  - freshness: {col: ObservationDate, reaches: today - 14d}
  - not_null: StationNumber
    reason: every significant-weather report is filed by a station
    certainty: 96
  - not_null: ObservationDate
    reason: the observation date is the row's primary temporal key
    certainty: 95
  - not_null: State
    reason: State is stamped on every row from the request path
    certainty: 99
  - matches: {col: ObservationDate, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: ObservationDate is the first CSV field, an unpadded ISO date
    certainty: 90
  - matches: {col: State, pattern: '^[A-Z]{2}$'}
    reason: State is the 2-letter code we stamp
    certainty: 95
  - distinct_count: {col: State, min: 10}
    reason: significant-weather reports over full history span many states
    certainty: 78
    severity: warn
  - row_count: {min: 50}
    reason: full-history SigWx reports across all states number at least in the hundreds
    certainty: 82
