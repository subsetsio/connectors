spec_id: cocorahs-multiday-reports
status: active
tests:
  - not_null: StationNumber
    reason: every multi-day accumulation report is filed by a station
    certainty: 96
  - not_null: StartDate
    reason: the accumulation period start is the row's primary temporal key
    certainty: 95
  - not_null: State
    reason: State is stamped on every row from the request path
    certainty: 99
  - matches: {col: StartDate, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: StartDate is the first CSV field, an unpadded ISO date
    certainty: 90
  - matches: {col: State, pattern: '^[A-Z]{2}$'}
    reason: State is the 2-letter code we stamp
    certainty: 95
  - distinct_count: {col: State, min: 10}
    reason: multi-day reports come from many states over full history
    certainty: 80
    severity: warn
  - row_count: {min: 100}
    reason: full-history multi-day accumulation reports across all states are at least in the thousands
    certainty: 85
