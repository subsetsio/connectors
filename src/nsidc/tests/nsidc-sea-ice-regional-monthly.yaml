spec_id: nsidc-sea-ice-regional-monthly
status: active
tests:
  - not_null: hemisphere
  - not_null: region
  - not_null: year
  - not_null: month
  - not_null: date
  - column_type: {col: date, type: date}
  - enum: {col: hemisphere, values: [Arctic, Antarctic]}
  - unique: [hemisphere, region, year, month]
    reason: one regional monthly-average row per hemisphere/sub-region/calendar month
    certainty: 95
  - distinct_count: {col: region, min: 15}
    reason: ~14 Arctic + ~5 Antarctic sub-regions across the two workbooks
    certainty: 85
  - between: {col: year, lo: 1978, hi: current_year()}
    certainty: 95
  - between: {col: month, lo: 1, hi: 12}
  - freshness: {col: date, reaches: today - 75d}
    reason: regional monthly workbook publishes with a lag; a max older than ~2.5 months means we are behind
    points_outward: true
