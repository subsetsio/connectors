# compiled by `hardened compile-checks` — post-publish audit of `nsidc-sea-ice-extent-monthly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, year, month, source_dataset, hemisphere]
temporal: date
checks:
  - kind: unique
    columns: [date, year, month, source_dataset, hemisphere]
  - kind: not_null
    col: date
  - kind: not_null
    col: year
  - kind: not_null
    col: month
  - kind: not_null
    col: source_dataset
  - kind: not_null
    col: hemisphere
  - kind: row_floor
    min: 572
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
