spec_id: suez-canal-authority-04-yearly-cargo-ton-by-direction
status: active
tests:
  - not_null: "Year"
  - not_null: "Direction"
  - unique: ["Year", "Direction"]
    reason: one cargo-ton figure per year per direction
    certainty: 90
  - enum: {col: "Direction", values: ["N/S", "S/N"]}
    reason: two transit directions (northbound/southbound)
    certainty: 85
  - between: {col: "Year", lo: 2000, hi: "current_year()"}
    certainty: 90
  - at_least: {col: "Cargo Ton", expr: 0}
    certainty: 90
