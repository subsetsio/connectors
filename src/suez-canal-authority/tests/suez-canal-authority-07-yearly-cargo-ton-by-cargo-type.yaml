spec_id: suez-canal-authority-07-yearly-cargo-ton-by-cargo-type
status: active
tests:
  - not_null: "Year"
  - not_null: "CargoType"
  - between: {col: "Year", lo: 2010, hi: "current_year()"}
    certainty: 90
  - at_least: {col: "CargoTonnage", expr: 0}
    certainty: 90
  - distinct_count: {col: "CargoType", min: 5}
    reason: cargo is split across many commodity types
    certainty: 80
  - row_count: {min: 500}
    reason: observed ~4300 component rows
    certainty: 70
