spec_id: suez-canal-authority-01-monthly-number-net-ton-by-ship-type
status: active
coverage:
  frozen: true
  reason: this Power BI tab is a historical monthly ship-type table ending in 2020; newer SCA statistics are covered by the separate current annual and quarterly tabs.
tests:
  - not_null: year
  - column_type: {col: year, type: integer}
  - not_null: "Ship Type"
  - between: {col: year, lo: 2010, hi: "current_year()"}
    certainty: 90
  - between: {col: "Month", lo: 1, hi: 12}
    reason: monthly report; month must be 1-12
    certainty: 95
  - unique: [year, "Month", "Ship Type", "Direction", "State"]
    reason: one component row per month x ship type x direction x ballast/laden state
    certainty: 85
  - at_least: {col: "No", expr: 0}
    reason: vessel transit counts are non-negative
    certainty: 95
  - distinct_count: {col: "Ship Type", min: 5}
    reason: SCA tracks ~10 ship-type categories
    certainty: 80
  - row_count: {min: 800}
    reason: ~10 years x 12 months x ~10 ship types x 2 directions, observed ~4200
    certainty: 70
