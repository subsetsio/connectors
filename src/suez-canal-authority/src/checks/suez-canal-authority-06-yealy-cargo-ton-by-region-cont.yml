# compiled by `hardened compile-checks` — post-publish audit of `suez-canal-authority-06-yealy-cargo-ton-by-region-cont`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, region_code, direction, terminal]
temporal: year
checks:
  - kind: unique
    columns: [year, region_code, direction, terminal]
  - kind: not_null
    col: year
  - kind: not_null
    col: region_code
  - kind: not_null
    col: direction
  - kind: not_null
    col: terminal
  - kind: row_floor
    min: 144
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
