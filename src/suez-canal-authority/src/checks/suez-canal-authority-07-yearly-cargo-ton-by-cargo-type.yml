# compiled by `hardened compile-checks` — post-publish audit of `suez-canal-authority-07-yearly-cargo-ton-by-cargo-type`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, cargo_type, cargo_group, direction]
temporal: year
checks:
  - kind: unique
    columns: [year, cargo_type, cargo_group, direction]
  - kind: not_null
    col: year
  - kind: not_null
    col: cargo_type
  - kind: not_null
    col: cargo_group
  - kind: not_null
    col: direction
  - kind: row_floor
    min: 2150
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
