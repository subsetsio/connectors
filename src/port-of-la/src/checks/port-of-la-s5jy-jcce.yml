# compiled by `hardened compile-checks` — post-publish audit of `port-of-la-s5jy-jcce`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [incrementalid, adpnumber, adpreceiveddate, applicant, adpstatus]
temporal: adpreceiveddate
checks:
  - kind: unique
    columns: [incrementalid, adpnumber, adpreceiveddate, applicant, adpstatus]
  - kind: not_null
    col: incrementalid
  - kind: not_null
    col: adpnumber
  - kind: not_null
    col: adpreceiveddate
  - kind: not_null
    col: applicant
  - kind: not_null
    col: adpstatus
  - kind: row_floor
    min: 465
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
