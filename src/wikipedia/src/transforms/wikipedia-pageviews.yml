# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `wikipedia-pageviews`. Regenerate after model-verify.
# caution: Rows are already aggregated for each Wikimedia project and month; sum across projects only when a cross-project total is intended.
key: [project, date]
temporal: date
sort: [date, project]
columns:
  - name: project
    type: VARCHAR
  - name: date
    type: DATE
  - name: views
    type: BIGINT
