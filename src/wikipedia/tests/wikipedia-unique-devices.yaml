spec_id: wikipedia-unique-devices
status: active
tests:
  - not_null: project
  - not_null: date
  - not_null: devices
  - column_type: {col: project, type: string}
  - column_type: {col: date, type: string}
  - column_type: {col: devices, type: integer}
  - column_type: {col: offset, type: integer}
  - column_type: {col: underestimate, type: integer}
  - unique: [project, date]
    reason: monthly all-sites aggregate should have one row per project-month
    certainty: 95
  - distinct_count: {col: project, min: 100}
    reason: Wikimedia sitematrix should yield data for many active projects
    certainty: 90
  - row_count: {min: 1000}
    reason: monthly history across many projects should be far above a smoke-test-sized pull
    certainty: 95
  - at_least: {col: devices, expr: 0}
    reason: unique-device estimates cannot be negative
    certainty: 95
  - freshness: {col: date, reaches: today - 75d}
    reason: AQS monthly aggregate should include a recent complete month
    certainty: 85
    points_outward: true
