    columns: [quarter, types, indicator]
  - kind: not_null
    col: quarter
  - kind: not_null
    col: types
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 392
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
