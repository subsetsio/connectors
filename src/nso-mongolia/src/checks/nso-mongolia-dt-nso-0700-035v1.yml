    columns: [quarter, loan_type, indicator, industry_classification]
  - kind: not_null
    col: quarter
  - kind: not_null
    col: loan_type
  - kind: not_null
    col: indicator
  - kind: not_null
    col: industry_classification
  - kind: row_floor
    min: 445
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
