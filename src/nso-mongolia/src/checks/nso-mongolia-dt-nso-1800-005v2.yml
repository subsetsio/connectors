# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-1800-005v2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, geographical_region, purpose_of_visit]
temporal: year
checks:
  - kind: unique
    columns: [year, geographical_region, purpose_of_visit]
  - kind: not_null
    col: year
  - kind: not_null
    col: geographical_region
  - kind: not_null
    col: purpose_of_visit
  - kind: row_floor
    min: 720
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
