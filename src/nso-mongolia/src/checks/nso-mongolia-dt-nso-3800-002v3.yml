# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-3800-002v3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [type, indicator, relationship_to_the_perpetrator]
temporal: year
checks:
  - kind: unique
    columns: [type, indicator, relationship_to_the_perpetrator]
  - kind: not_null
    col: type
  - kind: not_null
    col: indicator
  - kind: not_null
    col: relationship_to_the_perpetrator
  - kind: row_floor
    min: 18
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
