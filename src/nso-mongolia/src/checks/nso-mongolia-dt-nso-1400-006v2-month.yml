# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-1400-006v2-month`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month_cumulative, main_commodities, statistical_indicator]
temporal: month_cumulative
checks:
  - kind: unique
    columns: [month_cumulative, main_commodities, statistical_indicator]
  - kind: not_null
    col: month_cumulative
  - kind: not_null
    col: main_commodities
  - kind: not_null
    col: statistical_indicator
  - kind: row_floor
    min: 6138
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
