# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-0400-006v12-1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, year, age_group, occupation, sex]
temporal: year
checks:
  - kind: unique
    columns: [region, year, age_group, occupation, sex]
  - kind: not_null
    col: region
  - kind: not_null
    col: year
  - kind: not_null
    col: age_group
  - kind: not_null
    col: occupation
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 98455
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
