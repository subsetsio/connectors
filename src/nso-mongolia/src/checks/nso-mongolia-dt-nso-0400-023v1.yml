    columns: [times_annual, types_of_ownership, sex]
  - kind: not_null
    col: times_annual
  - kind: not_null
    col: types_of_ownership
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 264
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
