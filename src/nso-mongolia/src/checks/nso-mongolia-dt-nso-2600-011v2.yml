# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-2600-011v2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, status_of_activity, ownership_type]
temporal: year
checks:
  - kind: unique
    columns: [year, status_of_activity, ownership_type]
  - kind: not_null
    col: year
  - kind: not_null
    col: status_of_activity
  - kind: not_null
    col: ownership_type
  - kind: row_floor
    min: 195
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
