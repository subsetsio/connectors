    columns: [region, classification_of_crimes, year]
  - kind: not_null
    col: region
  - kind: not_null
    col: classification_of_crimes
  - kind: not_null
    col: year
  - kind: row_floor
    min: 443
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
