# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-br-01v33`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, employment_size_group, sales_size_group]
temporal: year
checks:
  - kind: unique
    columns: [year, employment_size_group, sales_size_group]
  - kind: not_null
    col: year
  - kind: not_null
    col: employment_size_group
  - kind: not_null
    col: sales_size_group
  - kind: row_floor
    min: 64
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
