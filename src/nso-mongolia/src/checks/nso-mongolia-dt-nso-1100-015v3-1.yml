# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-1100-015v3-1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, statistical_indicator, classification]
temporal: month
checks:
  - kind: unique
    columns: [month, statistical_indicator, classification]
  - kind: not_null
    col: month
  - kind: not_null
    col: statistical_indicator
  - kind: not_null
    col: classification
  - kind: row_floor
    min: 400
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
