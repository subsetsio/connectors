# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-0400-082v7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region, status, year, gender, economic_activites]
temporal: year
checks:
  - kind: unique
    columns: [region, status, year, gender, economic_activites]
  - kind: not_null
    col: region
  - kind: not_null
    col: status
  - kind: not_null
    col: year
  - kind: not_null
    col: gender
  - kind: not_null
    col: economic_activites
  - kind: row_floor
    min: 6075
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
