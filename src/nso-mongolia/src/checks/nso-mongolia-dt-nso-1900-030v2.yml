# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-1900-030v2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [quarter, grouping, location, indicator]
temporal: quarter
checks:
  - kind: unique
    columns: [quarter, grouping, location, indicator]
  - kind: not_null
    col: quarter
  - kind: not_null
    col: grouping
  - kind: not_null
    col: location
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 1860
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
