# compiled by `hardened compile-checks` — post-publish audit of `nso-mongolia-dt-nso-1800-009v202`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, age_group, duration_of_stay, sex]
temporal: month
checks:
  - kind: unique
    columns: [month, age_group, duration_of_stay, sex]
  - kind: not_null
    col: month
  - kind: not_null
    col: age_group
  - kind: not_null
    col: duration_of_stay
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 1632
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
