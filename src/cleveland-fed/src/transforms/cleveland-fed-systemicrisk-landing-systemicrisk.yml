# Cleveland Fed Systemic Risk Indicator, daily. Observations exist on trading days only — the gaps are weekends and holidays, not missing data.
# The three columns are related by construction: `systemic_risk_indicator` = `portfolio_distance_to_default` - `average_distance_to_default`. A LOW (or negative) indicator signals elevated systemic stress.
# Renamed from the source's `add` / `pdd` / `sri` headers.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Trading day of the observation."
  - name: average_distance_to_default
    type: DOUBLE
    description: "Average distance to default of the individual banks in the sample, in percentage points of asset value — insolvency risk of the average bank on its own."
  - name: portfolio_distance_to_default
    type: DOUBLE
    description: "Distance to default of a hypothetical portfolio of the same banks, in percentage points of asset value — insolvency risk of the banking system taken as a whole."
  - name: systemic_risk_indicator
    type: DOUBLE
    description: "Portfolio distance to default minus average distance to default, in percentage points. Falls when markets expect bank defaults to happen together."
