# Yield curve spread against real GDP growth. Quarterly, dated to the first month of the quarter.
# `real_gdp` is the year-AHEAD growth aligned to the quarter of the spread — which is why the most recent quarters carry a spread but no GDP value. This is the only difference from its sibling chart3 table.
# `nber_recession` is decoded from the source's chart-shading sentinel (100 inside an NBER recession, -100 outside it) into a boolean.
# The earliest quarters have no spread observation.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Observation quarter, dated to the first month of the quarter."
  - name: spread
    type: DOUBLE
    description: "Yield curve spread: the ten-year Treasury yield minus the three-month Treasury yield, in percentage points."
  - name: real_gdp
    type: DOUBLE
    description: "Year-over-year growth of US real GDP one year AFTER this quarter, in percent, aligned to the quarter in which the `spread` was observed. Absent for the most recent quarters, whose year-ahead GDP is not yet observed."
  - name: nber_recession
    type: BOOLEAN
    description: "True when the NBER dates this quarter as inside a recession."
