# Cleveland Fed 'Federal Funds Rates Based on 7 Simple Rules'. Every row is a PROJECTION for a quarter that has not happened yet — there is no realized history in this table.
# The columns are order statistics ACROSS the seven simple policy rules for that quarter, not five distinct rates: `maximum` and `minimum` are the envelope of the seven prescriptions. A different rule can occupy a given statistic in different quarters, so a column is NOT the time series of one rule.
# Quarterly, dated to the first month of the quarter.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Projected quarter, dated to the first month of the quarter."
  - name: maximum
    type: DOUBLE
    description: "Highest federal funds rate prescribed by any of the seven simple monetary policy rules for this quarter, in percent per year."
  - name: percentile_75
    type: DOUBLE
    description: "75th percentile of the seven rules' prescribed federal funds rates for this quarter, in percent per year."
  - name: median
    type: DOUBLE
    description: "Median of the seven rules' prescribed federal funds rates for this quarter, in percent per year."
  - name: percentile_25
    type: DOUBLE
    description: "25th percentile of the seven rules' prescribed federal funds rates for this quarter, in percent per year."
  - name: minimum
    type: DOUBLE
    description: "Lowest federal funds rate prescribed by any of the seven simple monetary policy rules for this quarter, in percent per year."
