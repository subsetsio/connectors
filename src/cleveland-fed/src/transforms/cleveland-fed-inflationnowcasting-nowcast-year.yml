# Cleveland Fed 'Inflation Nowcasting Monthly Year-Over-Year' (despite the `year` filename this is the MONTHLY year-over-year nowcast).
# The file covers the CURRENT nowcasting cycle only and is overwritten each cycle: it keeps no history, and the target period being nowcast is not encoded anywhere in the data.
# The source ships one wide column per series and silently drops series it leaves empty for a cycle, so the wide column set is unstable across runs. This transform unpivots to long (`series`, `percent_change`) so the published schema is stable; unpopulated cells become absent rows.
# The source file's row order is the chronological order of updates within the cycle. That order is NOT recoverable from `update_label` alone (it carries no year and mixes update dates with release markers).
key: [update_label, series]
sort: [update_label, series]
columns:
  - name: update_label
    type: VARCHAR
    description: "When the nowcast was updated, as the source stamps it: either a month/day within the current cycle (e.g. `08/20`, no year) or a data-release marker (e.g. `PCE Jul`, `CPI Aug`) marking the day the official statistic for that reference month was published."
  - name: series
    type: VARCHAR
    description: "Which measure this row reports: `cpi_inflation`, `core_cpi_inflation`, `pce_inflation` or `core_pce_inflation` for the model's nowcast, and the same names prefixed `actual_` for the realized official statistic, which is populated only on release-marker rows."
  - name: percent_change
    type: DOUBLE
    description: "The nowcast (or, for `actual_*` series, the realized value) expressed as year-over-year percent change for the month being nowcast."
