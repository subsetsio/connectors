# Probability of recession estimated from the yield curve spread. Monthly, dated to the first of the month, running years into the future.
# `recession_probability` is populated only on historical rows and `recession_probability_forecast` only on forecast rows — exactly one of the two per row.
# `nber_recession` is decoded from the source's chart-shading sentinel (1000 inside an NBER recession, 0 outside it) into a boolean.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Observation month, dated to the first of the month."
  - name: recession_probability
    type: DOUBLE
    description: "Estimated probability, in percent, that the economy is in recession one year after this month, over realized history. Absent on forecast rows."
  - name: recession_probability_forecast
    type: DOUBLE
    description: "The same probability, in percent, over the forecast horizon. Absent on historical rows."
  - name: nber_recession
    type: BOOLEAN
    description: "True when the NBER dates this month as inside a recession."
