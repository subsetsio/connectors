# A short chart window (the most recent years only) of series that exist in full elsewhere in this source; do not treat it as a complete history.
# All four columns are year-over-year percent changes, monthly, dated to the first of the month.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Observation date, ISO calendar date."
  - name: median_cpi
    type: DOUBLE
    description: "Median CPI, year-over-year percent change."
  - name: trimmed_mean_cpi
    type: DOUBLE
    description: "16 percent trimmed-mean CPI, year-over-year percent change."
  - name: cpi
    type: DOUBLE
    description: "All-items CPI, year-over-year percent change."
  - name: core_cpi
    type: DOUBLE
    description: "Core CPI (all items less food and energy), year-over-year percent change."
