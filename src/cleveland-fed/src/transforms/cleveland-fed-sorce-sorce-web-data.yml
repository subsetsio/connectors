# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `cleveland-fed-sorce-sorce-web-data`. Regenerate after model-verify.
# caution: One row per SORCE collection date; the survey covers firms in the Fourth Federal Reserve District (Ohio and parts of Pennsylvania, West Virginia and Kentucky), not the US as a whole.
# caution: Every column is a diffusion index (share reporting an increase minus share reporting a decrease, roughly -100 to 100), so values are not levels and must not be summed.
# caution: The `manu_`, `oth_` and `total_` prefixes are industry cuts of the same question: `total_` is the all-firms index, NOT the sum of the manufacturing and other-industry indexes.
# caution: Questions were added to the survey over time, so early collection dates have no observation for the later question blocks.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
  - name: manu_cap_ex_di
    type: DOUBLE
  - name: oth_cap_ex_di
    type: DOUBLE
  - name: total_cap_ex_di
    type: DOUBLE
  - name: manu_conditions_di
    type: DOUBLE
  - name: oth_conditions_di
    type: DOUBLE
  - name: total_conditions_di
    type: DOUBLE
  - name: manu_employment_di
    type: DOUBLE
  - name: oth_employment_di
    type: DOUBLE
  - name: total_employment_di
    type: DOUBLE
  - name: manu_expect_cond_di
    type: DOUBLE
  - name: oth_expect_cond_di
    type: DOUBLE
  - name: total_expect_cond_di
    type: DOUBLE
  - name: manu_expect_costs_di
    type: DOUBLE
  - name: oth_expect_costs_di
    type: DOUBLE
  - name: total_expect_costs_di
    type: DOUBLE
  - name: manu_expect_employment_di
    type: DOUBLE
  - name: oth_expect_employment_di
    type: DOUBLE
  - name: total_expect_employment_di
    type: DOUBLE
  - name: manu_nonlabor_costs_di
    type: DOUBLE
  - name: oth_nonlabor_costs_di
    type: DOUBLE
  - name: total_nonlabor_costs_di
    type: DOUBLE
  - name: manu_prices_di
    type: DOUBLE
  - name: oth_prices_di
    type: DOUBLE
  - name: total_prices_di
    type: DOUBLE
  - name: manu_wages_di
    type: DOUBLE
  - name: oth_wages_di
    type: DOUBLE
  - name: total_wages_di
    type: DOUBLE
