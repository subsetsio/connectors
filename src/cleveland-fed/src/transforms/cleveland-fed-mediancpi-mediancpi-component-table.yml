# A cross-sectional snapshot of the LATEST month only, overwritten each month: it has no time axis, and nothing in the table says which month it describes.
# `cumulative_relative_importance` is a running total down the source's own sort order (ascending one-month annualized percent change) — it is meaningful only in that order and must never be aggregated.
# Renamed from the source's `Component` / `1-Month Annualized Percent Change` / `Relative Importance (Normalized)` headers.
key: [component]
sort: [one_month_annualized_percent_change, component]
columns:
  - name: component
    type: VARCHAR
    description: "Name of the CPI expenditure component, as the source labels it (e.g. 'Motor vehicle insurance')."
  - name: one_month_annualized_percent_change
    type: DOUBLE
    description: "Annualized one-month percent change in this component's price index for the snapshot month."
  - name: relative_importance
    type: DOUBLE
    description: "This component's weight in the CPI basket, in percent, normalized so the components sum to about 100."
  - name: cumulative_relative_importance
    type: DOUBLE
    description: "Running total of `relative_importance` accumulated down the source's ascending price-change ordering; the component whose cumulative weight crosses 50 is the median component."
