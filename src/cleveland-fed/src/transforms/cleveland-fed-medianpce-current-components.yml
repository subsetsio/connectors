# A cross-sectional snapshot of the LATEST month only, overwritten each month: it has no time axis, and nothing in the table says which month it describes.
# `cumulative_relative_importance` is a running total down the source's own sort order (ascending monthly percent change) — it is meaningful only in that order and must never be aggregated.
# Renamed from the source's `Component` header.
key: [component]
sort: [monthly_percent_change, component]
columns:
  - name: component
    type: VARCHAR
    description: "Name of the PCE expenditure component, as the source labels it (e.g. 'Motor vehicle rental')."
  - name: monthly_percent_change
    type: DOUBLE
    description: "One-month percent change in this component's price index for the snapshot month (not annualized)."
  - name: relative_importance
    type: DOUBLE
    description: "This component's weight in the PCE consumption basket, in percent, summing to about 100 across components."
  - name: cumulative_relative_importance
    type: DOUBLE
    description: "Running total of `relative_importance` accumulated down the source's ascending price-change ordering; the component whose cumulative weight crosses 50 is the median component."
