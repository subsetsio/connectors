# Credit Easing Policy Tools: weekly (Wednesday) levels outstanding, in millions of US dollars — stocks, not flows.
# A facility that did not exist in a given week carries 0, not null: a zero means 'programme inactive', not 'no observation'.
# Single-column detail view of the aggregate that also appears in the Credit Easing summary table.
key: [date]
temporal: date
sort: [date]
columns:
  - name: date
    type: DATE
    description: "Observation date, ISO calendar date."
  - name: traditional_security_holdings
    type: DOUBLE
    description: "Traditional open-market security holdings — the pre-crisis Treasury portfolio. Level outstanding on the reporting Wednesday, in millions of US dollars."
