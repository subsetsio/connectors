spec_id: data-gov-organizations
status: active
coverage:
  frozen: true
  reason: The created column is organization metadata, not an observation period; organization coverage is governed by catalog membership tests rather than a time-series freshness window.
tests:
  - row_count: {min: 100}
    reason: Data.gov lists federal and non-federal publishing organizations.
    certainty: 95
  - not_null: id
  - not_null: name
  - unique: id
    reason: CKAN organization ids identify publishing organizations.
    certainty: 95
  - column_type: {col: package_count, type: integer}
    certainty: 85
