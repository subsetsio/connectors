spec_id: undata-nasec-idcnfsa-a
status: active
tests:
  - row_count: {min: 1}
    reason: each UNdata SDMX dataflow selected by rank returned observations during research and prior runs
    certainty: 95
  - not_null: DATAFLOW
    reason: SDMX-CSV rows identify their originating dataflow
    certainty: 95
  - nullable: {col: LAST_UPDATE, max_null_frac: 0.2}
    reason: this UNdata flow carries sparse TIME_PERIOD values, while LAST_UPDATE is the maintained temporal field for recency but is absent on a minority of rows.
    certainty: 90
  - not_null: OBS_VALUE
    reason: raw observations should include a measure cell, even though some flows may have sparse values
    certainty: 70
    severity: warn
  - column_type: {col: LAST_UPDATE, type: timestamp}
    reason: LAST_UPDATE is parsed from SDMX-CSV as the source-maintenance timestamp.
    certainty: 90
  - freshness: {col: LAST_UPDATE, reaches: today - 10y}
    reason: UNdata redistributes actively maintained statistical dataflows, with some annual series lagging several years.
    certainty: 70
    points_outward: true
