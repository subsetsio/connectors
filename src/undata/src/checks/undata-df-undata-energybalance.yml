# compiled by `hardened compile-checks` — post-publish audit of `undata-df-undata-energybalance`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ref_area, commodity, transaction, unit, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [ref_area, commodity, transaction, unit, time_period]
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: commodity
  - kind: not_null
    col: transaction
  - kind: not_null
    col: unit
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 522945
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
