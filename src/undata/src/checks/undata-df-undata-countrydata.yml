# compiled by `hardened compile-checks` — post-publish audit of `undata-df-undata-countrydata`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, series, unit, location, age_group, sex, ref_area, source_type, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, series, unit, location, age_group, sex, ref_area, source_type, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: series
  - kind: not_null
    col: unit
  - kind: not_null
    col: location
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: source_type
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 7687
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
