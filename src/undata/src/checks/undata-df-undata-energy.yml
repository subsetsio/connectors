# compiled by `hardened compile-checks` — post-publish audit of `undata-df-undata-energy`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, ref_area, commodity, transaction, time_period, unit_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, ref_area, commodity, transaction, time_period, unit_measure]
  - kind: not_null
    col: freq
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: commodity
  - kind: not_null
    col: transaction
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 959617
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
