# compiled by `hardened compile-checks` — post-publish audit of `undata-df-seea-energy`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [freq, ref_area, demand_prod, accounting_entry, counterpart_area, interactors, bridge_items, energy_flows, sto, unit_measure, product, sector, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [freq, ref_area, demand_prod, accounting_entry, counterpart_area, interactors, bridge_items, energy_flows, sto, unit_measure, product, sector, time_period]
  - kind: not_null
    col: freq
  - kind: not_null
    col: ref_area
  - kind: not_null
    col: demand_prod
  - kind: not_null
    col: accounting_entry
  - kind: not_null
    col: counterpart_area
  - kind: not_null
    col: interactors
  - kind: not_null
    col: bridge_items
  - kind: not_null
    col: energy_flows
  - kind: not_null
    col: sto
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: product
  - kind: not_null
    col: sector
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 567284
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
