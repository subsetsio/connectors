# compiled by `hardened compile-checks` — post-publish audit of `harvard-growth-lab-atlas-of-economic-complexity-weighted-classification-conversion-tables`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_classification, target_classification, source_code, target_code]
checks:
  - kind: unique
    columns: [source_classification, target_classification, source_code, target_code]
  - kind: not_null
    col: source_classification
  - kind: not_null
    col: target_classification
  - kind: not_null
    col: source_code
  - kind: not_null
    col: target_code
  - kind: row_floor
    min: 1602883
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
