# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `harvard-growth-lab-atlas-of-economic-complexity-location-country`. Regenerate after model-verify.
# caution: `ANS` (`country_id` 999, "Undeclared Countries") is a residual bucket for unattributable trade rather than a real location, and `ANT` (Netherlands Antilles) is a dissolved country retained for historical years — both sit alongside the sovereign states and territories.
# caution: `in_rankings` marks the subset of countries that carry ECI ranks and growth projections; join on it before treating this table as the analysis universe.
key: [country_id]
sort: [country_id]
columns:
  - name: country_id
    type: BIGINT
    description: "Growth Lab numeric country identifier; the primary key every trade table joins on."
  - name: country_iso3_code
    type: VARCHAR
    description: "ISO 3166-1 alpha-3 code of the country."
  - name: country_name
    type: VARCHAR
    description: "Full English name of the country or territory."
  - name: country_name_short
    type: VARCHAR
    description: "Short English name of the country or territory."
  - name: in_rankings
    type: BOOLEAN
    description: "True if the country is part of the Atlas ranking universe, which carries ECI ranks and growth projections. Countries outside it are excluded from `growth-proj-eci-rankings`."
  - name: former_country
    type: BOOLEAN
    description: "True if the entry is a country that no longer exists and appears only in historical years."
