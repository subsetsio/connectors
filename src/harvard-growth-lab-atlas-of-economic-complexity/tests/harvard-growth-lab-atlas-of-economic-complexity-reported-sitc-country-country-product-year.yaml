spec_id: harvard-growth-lab-atlas-of-economic-complexity-reported-sitc-country-country-product-year
status: active
tests:
  - not_null: year
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 1960, hi: current_year()}
    certainty: 85
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
    reason: Atlas years are historical trade; a future year means a source/parse shift.
  - not_null: exporter
  - not_null: commoditycode
  - row_count: {min: 1000000}
    reason: as-reported bilateral product-year is tens of millions of rows
    certainty: 85
