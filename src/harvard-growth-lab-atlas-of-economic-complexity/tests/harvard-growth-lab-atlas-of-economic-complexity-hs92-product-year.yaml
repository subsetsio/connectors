spec_id: harvard-growth-lab-atlas-of-economic-complexity-hs92-product-year
status: active
tests:
  - not_null: year
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 1960, hi: current_year()}
    certainty: 85
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
    reason: Atlas years are historical trade; a future year means a source/parse shift.
  - not_null: product_id
  - not_null: product_level
  - enum: {col: product_level, values: [1, 2, 4, 6]}
    certainty: 90
  - unique: [product_id, product_level, year]
    reason: one global aggregate per product(level)-year
    certainty: 90
