spec_id: harvard-growth-lab-atlas-of-economic-complexity-hs22-country-country-product-year
status: active
tests:
  - not_null: year
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 1960, hi: current_year()}
    certainty: 85
  - at_most: {col: year, expr: current_year()}
    certainty: 80
    points_outward: true
    severity: warn
    reason: Atlas years are historical trade; a future year means a source/parse shift.
  - not_null: product_id
  - column_type: {col: product_id, type: integer}
  - row_count: {min: 1000000}
    reason: bilateral product-year is hundreds of millions of rows
    certainty: 90
