spec_id: harvard-growth-lab-atlas-of-economic-complexity-services-unilateral-country-product-year
status: active
tests:
  - row_count: {min: 50000}
    reason: floor set well under observed size; catches a truncated stream
  - not_null: country_id
  - not_null: product_id
  - not_null: product_services_unilateral_code
  - column_type: {col: product_services_unilateral_code, type: string}
    reason: >-
      Classification codes must stay strings - HS '0101' is not the integer 101.
      A numeric type here means leading zeros were destroyed at parse time.
  - unique: [country_id, product_id, year]
    reason: >-
      product_id is unique across depths in the Atlas's own id space, so the union of
      the per-depth files is still one row per country-product-year.
  - column_type: {col: global_market_share, type: float}
  - between: {col: global_market_share, lo: -1.0, hi: 1.0}
    certainty: 90
    reason: >-
      A share of world exports of the product. It goes slightly negative where the
      underlying export value is a negative net service flow; magnitude above 1
      would mean a unit change.
  - not_null: product_level
  - enum: {col: product_level, values: [1, 2, 4, 6]}
    reason: >-
      product_level is recovered from the source filename suffix; [1, 2, 4, 6] are the
      depths this classification publishes. An unexpected value means a new file
      landed in this entity and its digit depth was misread.
  - not_null: year
  - column_type: {col: year, type: integer}
  - between: {col: year, lo: 1980, hi: current_year()}
    certainty: 90
    reason: this classification's published coverage starts in 1980
  - freshness: {col: year, reaches: 2024}
    points_outward: true
    reason: >-
      The Atlas republishes annually with an ~18-month reporting lag, so the
      newest observation year should be at least 2024. A miss means the source
      has not released, or we pulled a superseded dataset version.
  - not_null: export_value
  - not_null: import_value
  - column_type: {col: export_value, type: integer}
  - at_least: {col: export_value, expr: -10000000000}
    certainty: 90
    reason: >-
      Trade values are whole US dollars and are overwhelmingly non-negative, but
      the Atlas does publish negative cells: a reconciliation residual on the
      `ANS` ("areas not elsewhere specified") pseudo-country, and negative net
      service flows. The floor is set well below the largest observed negative
      (-3.7e9) so a genuine sign flip on a real flow, which would be orders of
      magnitude larger, still trips it.  - at_least: {col: import_value, expr: -10000000000}
    certainty: 90
    reason: >-
      Trade values are whole US dollars and are overwhelmingly non-negative, but
      the Atlas does publish negative cells: a reconciliation residual on the
      `ANS` ("areas not elsewhere specified") pseudo-country, and negative net
      service flows. The floor is set well below the largest observed negative
      (-3.7e9) so a genuine sign flip on a real flow, which would be orders of
      magnitude larger, still trips it.