spec_id: mapping-police-violence-killings
status: active
tests:
  - row_count: {min: 14000}
    reason: MPV has logged ~15.9k police killings since 2013 and grows weekly; a count far below 14k means the single Airtable fetch was truncated or the signed url silently failed.
    certainty: 90
  - not_null: mpv_id
    reason: every MPV record carries an internal mpv_id; nulls mean the id column was renamed upstream or the flatten dropped it.
    certainty: 85
  - column_type: {col: mpv_id, type: integer}
    certainty: 85
  - unique: mpv_id
    reason: mpv_id is MPV's per-incident record key — one row per victim. Duplicates mean the corpus was double-counted.
    certainty: 80
    severity: warn
  - not_null: name
    reason: each record names the person killed (or "Name withheld by police"); a null name column means the field was renamed.
    certainty: 80
    severity: warn
  - column_type: {col: age, type: integer}
    certainty: 75
  - between: {col: age, lo: 0, hi: 120}
    reason: victim ages are plausible human ages; a value outside this range signals a parse error or unit mixup.
    certainty: 80
    severity: warn
  - distinct_count: {col: state, min: 40, max: 60}
    reason: killings occur across ~50 states + DC + a few territories; far fewer distinct states means the corpus was truncated to one region.
    certainty: 70
    severity: warn
  - column_type: {col: date, type: date}
    reason: date is emitted as a YYYY-MM-DD calendar date; DuckDB json auto-detect should type it DATE.
    certainty: 70
    severity: warn
  - freshness: {col: date, reaches: today - 45d}
    reason: the database is updated every weekend through the prior week, so the max incident date should be recent; a stale max means the source hasn't refreshed (their side, not ours).
    certainty: 70
    points_outward: true
    severity: warn
