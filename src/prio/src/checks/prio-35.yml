# compiled by `hardened compile-checks` — post-publish audit of `prio-35`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [gdlcode, region, isocode3, country, year]
temporal: year
checks:
  - kind: unique
    columns: [gdlcode, region, isocode3, country, year]
  - kind: not_null
    col: gdlcode
  - kind: not_null
    col: region
  - kind: not_null
    col: isocode3
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: row_floor
    min: 4473
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
