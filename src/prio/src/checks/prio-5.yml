# compiled by `hardened compile-checks` — post-publish audit of `prio-5`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, conflict_site, conflict_territory, year]
temporal: year
checks:
  - kind: unique
    columns: [id, conflict_site, conflict_territory, year]
  - kind: not_null
    col: id
  - kind: not_null
    col: conflict_site
  - kind: not_null
    col: conflict_territory
  - kind: not_null
    col: year
  - kind: row_floor
    min: 395
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
