spec_id: norwegian-meteorological-institute-textforecast
status: active
tests:
  - not_null: forecast
    reason: every row is tied to one of the finite forecast products from available.json
    certainty: 98
  - distinct_count: {col: forecast, min: 7, max: 10}
    reason: textforecast available.json currently exposes seven forecast types
    certainty: 90
  - not_null: last_change
    reason: forecast documents expose lastChange or Last-Modified metadata
    certainty: 85
  - row_count: {min: 7}
    reason: at least one row per available forecast type should be saved
    certainty: 90
  - freshness: {col: fetched_at, reaches: today - 2d}
    reason: text forecasts are current operational products
    certainty: 95
    points_outward: false
