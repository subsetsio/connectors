# compiled by `hardened compile-checks` — post-publish audit of `irena-country-elecgen`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, country, technology, data_type, grid_connection]
temporal: year
checks:
  - kind: unique
    columns: [year, country, technology, data_type, grid_connection]
  - kind: not_null
    col: year
  - kind: not_null
    col: country
  - kind: not_null
    col: technology
  - kind: not_null
    col: data_type
  - kind: not_null
    col: grid_connection
  - kind: row_floor
    min: 43628
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
