spec_id: irena-re-share
status: active
tests:
  - row_count: {min: 3000}
    reason: renewable share covers country and regional areas, two indicators, and annual years
    certainty: 85
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - not_null: year
  - not_null: region
  - not_null: indicator
  - not_null: value
  - unique: [year, region, indicator]
    reason: one JSON-stat cell per full dimension combination after dropping null values
    certainty: 95
  - between: {col: year, lo: 2000, hi: current_year()}
    certainty: 95
  - between: {col: value, lo: 0, hi: 100}
    reason: renewable shares are percentages
    certainty: 95
  - freshness: {col: year, reaches: 2023}
    reason: current IRENASTAT renewable share metadata exposes years through 2023
    points_outward: true
  - distinct_count: {col: region, min: 200}
    certainty: 90
  - distinct_count: {col: indicator, min: 2, max: 2}
    certainty: 95
