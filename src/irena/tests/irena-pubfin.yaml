spec_id: irena-pubfin
status: active
tests:
  - row_count: {min: 1000}
    reason: public finance covers many countries, technologies, and annual years
    certainty: 80
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - not_null: year
  - not_null: country
  - not_null: technology
  - not_null: value
  - unique: [year, country, technology]
    reason: one JSON-stat cell per full dimension combination after dropping null values
    certainty: 95
  - between: {col: year, lo: 2000, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: 2023}
    reason: current IRENASTAT public investment metadata exposes years through 2023
    points_outward: true
  - distinct_count: {col: country, min: 150}
    certainty: 85
  - distinct_count: {col: technology, min: 15}
    certainty: 85
