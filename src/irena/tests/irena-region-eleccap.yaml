spec_id: irena-region-eleccap
status: active
tests:
  - row_count: {min: 1000}
    reason: regional capacity spans 10 regions, technologies, grid connection, and annual years
    certainty: 85
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - not_null: year
  - not_null: region
  - not_null: technology
  - not_null: grid_connection
  - not_null: value
  - unique: [year, region, technology, grid_connection]
    reason: one JSON-stat cell per full dimension combination after dropping null values
    certainty: 95
  - between: {col: year, lo: 2000, hi: current_year()}
    certainty: 95
  - freshness: {col: year, reaches: 2025}
    reason: renewable capacity statistics 2026 covers calendar years through 2025
    points_outward: true
  - distinct_count: {col: region, min: 10, max: 10}
    certainty: 95
  - distinct_count: {col: technology, min: 10}
    certainty: 90
