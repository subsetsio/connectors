# compiled by `hardened compile-checks` — post-publish audit of `county-health-rankings-analytic`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [release_year, state_fips, county_fips, measure_id]
temporal: release_year
checks:
  - kind: unique
    columns: [release_year, state_fips, county_fips, measure_id]
  - kind: not_null
    col: release_year
  - kind: not_null
    col: state_fips
  - kind: not_null
    col: county_fips
  - kind: not_null
    col: measure_id
  - kind: row_floor
    min: 1673650
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
