spec_id: eu-open-data-portal-datasets
status: active
tests:
  - not_null: id
    reason: the DCAT-AP dataset UUID is the grain; a null means normalisation dropped the key
  - not_null: resource
    reason: every harvested dataset is minted a data.europa.eu resource URI
    certainty: 95
  - unique: id
    reason: one row per dataset; the scroll dedupes by id, so a dupe means the cursor replayed a page
    certainty: 95

  - column_type: {col: id, type: string}
  - column_type: {col: is_hvd, type: boolean}
  - column_type: {col: distribution_count, type: integer}
  - column_type: {col: catalog_record_modified, type: timestamp}

  - enum: {col: country_id, values: ["eu"]}
    reason: the fetch filters on the country=eu facet, so any other value means the filter silently stopped applying and we pulled the ~1.8M-row national federation
    certainty: 95

  - coverage: {col: id, expected: 47699, tolerance: 0.02}
    reason: |
      The search API declares its own total (`count`) and the scroll is snapshot-consistent,
      so we must land all of it. This guards the API's nastiest trap: past offset 10,000 the
      paged endpoint returns HTTP 200 with an empty result list, so a page loop would ship
      ~10k of ~48k rows and look successful. Tolerance absorbs ordinary de-registration.
    certainty: 90

  - row_count: {min: 40000}
    reason: the EU-institution slice has held ~48k datasets; a collapse to a few thousand is a broken filter, not a real shrink
    certainty: 90

  - freshness: {col: catalog_record_modified, reaches: today - 30d}
    reason: catalog_record.modified is the portal's own harvest timestamp and is present on every record; the federation re-harvests continuously, so the max should be within days
    points_outward: true
    certainty: 90

  - distinct_count: {col: catalog_id, min: 80, max: 300}
    reason: ~112 federated catalogs currently carry EU-institution datasets
    certainty: 85

  - between: {col: quality_score, lo: 0, hi: 405}
    reason: DCAT-AP MQA scoring runs 0-405; out-of-range means the metric changed shape
    certainty: 80
    severity: warn

  - nullable: {col: title, max_null_frac: 0.6}
    reason: |
      Only ~62% of records carry a title dict upstream; we resolve English first and fall back
      to any language, so nulls are genuinely titleless records rather than a language miss.
      A sharp rise means the label resolver broke.
    certainty: 70
    severity: warn
