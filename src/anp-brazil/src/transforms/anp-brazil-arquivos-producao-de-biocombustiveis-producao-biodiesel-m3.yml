key: [date, grande_regiao, unidade_da_federacao, produtor, produto]
temporal: date
columns:
  - name: date
    type: DATE
    description: "First day of the observation month or collection date."
  - name: year
    type: INTEGER
    description: "Observation year parsed from the source period."
  - name: month
    type: INTEGER
    description: "Observation month parsed from the source period."
  - name: grande_regiao
    type: VARCHAR
    description: "Brazilian macro-region reported by ANP."
  - name: unidade_da_federacao
    type: VARCHAR
    description: "Brazilian state or federal district name reported by ANP."
  - name: produtor
    type: VARCHAR
    description: "Producer label reported by ANP."
  - name: produto
    type: VARCHAR
    description: "Product or fuel category label reported by ANP."
  - name: producao
    type: DOUBLE
    description: "Production volume in the unit identified by the source table title."
