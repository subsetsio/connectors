key: [date, grande_regiao, unidade_da_federacao, produto, localizacao]
temporal: date
columns:
  - name: date
    type: DATE
    description: "First day of the observation month or collection date."
  - name: year
    type: INTEGER
    description: "Observation year parsed from the source period."
  - name: month
    type: INTEGER
    description: "Observation month parsed from the source period."
  - name: grande_regiao
    type: VARCHAR
    description: "Brazilian macro-region reported by ANP."
  - name: unidade_da_federacao
    type: VARCHAR
    description: "Brazilian state or federal district name reported by ANP."
  - name: produto
    type: VARCHAR
    description: "Product or fuel category label reported by ANP."
  - name: localizacao
    type: VARCHAR
    description: "Onshore or offshore location category reported by ANP."
  - name: disponivel
    type: DOUBLE
    description: "Available natural gas volume, in thousand cubic meters."
