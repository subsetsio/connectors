key: [year, grande_regiao, uf, produto, codigo_ibge, municipio]
temporal: year
columns:
  - name: year
    type: INTEGER
    description: "Observation year parsed from the source period."
  - name: grande_regiao
    type: VARCHAR
    description: "Brazilian macro-region reported by ANP."
  - name: uf
    type: VARCHAR
    description: "Brazilian state abbreviation reported by ANP."
  - name: produto
    type: VARCHAR
    description: "Product or fuel category label reported by ANP."
  - name: codigo_ibge
    type: VARCHAR
    description: "IBGE municipality code reported by ANP."
  - name: municipio
    type: VARCHAR
    description: "Brazilian municipality name reported by ANP."
  - name: vendas
    type: DOUBLE
    description: "Sales volume in cubic meters unless the source table title states otherwise."
