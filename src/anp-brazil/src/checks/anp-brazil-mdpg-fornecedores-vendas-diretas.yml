    columns: [date, codigo_operacao, nome_operacao, codigo_do_produto, nome_do_produto, codigo_agente_regulado, agente_regulado, regiao_origem, regiao_destinatario, mercado_destinatario]
  - kind: not_null
    col: date
  - kind: not_null
    col: codigo_operacao
  - kind: not_null
    col: nome_operacao
  - kind: not_null
    col: codigo_do_produto
  - kind: not_null
    col: nome_do_produto
  - kind: not_null
    col: codigo_agente_regulado
  - kind: not_null
    col: agente_regulado
