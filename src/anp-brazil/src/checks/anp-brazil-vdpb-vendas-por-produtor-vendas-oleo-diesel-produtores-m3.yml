    columns: [date, derivado, regiao, estado]
  - kind: not_null
    col: date
  - kind: not_null
    col: derivado
  - kind: not_null
    col: regiao
  - kind: not_null
    col: estado
  - kind: row_floor
    min: 229
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
