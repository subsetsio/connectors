spec_id: anp-brazil-shpc-dsas-ca-ca
status: active
tests:
  - row_count: {min: 100000}
    reason: ANP publishes the full history for this series; a tiny table means a download/parse break or a renamed file path.
    certainty: 80
  - nullable: {col: data_da_coleta, max_null_frac: 0.000001}
    reason: ANP's large fuel-price history can contain an isolated blank date row, but more than trace nulls would indicate header misalignment or a delimiter/encoding regression.
    certainty: 90
  - matches: {col: data_da_coleta, pattern: '^[0-9]{2}/[0-9]{2}/[0-9]{4}$'}
    reason: raw period column must match the source's documented format (^[0-9]{2}/[0-9]{2}/[0-9]{4}$); a mismatch flags an encoding/delimiter regression.
    certainty: 85
  - freshness: {col: data_da_coleta, reaches: 01/01/2024}
    reason: ANP's fuel-price survey is a continuing time series; the raw extract should include recent collection dates.
    points_outward: true
