spec_id: epo-top-applicants-by-country
status: active
tests:
  # Single-edition snapshot: the source key carries the edition year
  # ('<cc>_top_applicants_2025_tng') and it moves forward with each annual
  # release, so this asset is temporal via edition_year rather than frozen.
  - freshness: {col: edition_year, reaches: 2025}
    reason: the current edition is stamped 2025; an older edition_year means we loaded a stale file
    certainty: 90
    points_outward: true

  - row_count: {min: 200, max: 400}
    reason: 28 country groups x a top-10 list = 280 rows
    certainty: 90

  - unique: [country_code, edition_year, rank]
    reason: rank is dense within each country's list for a given edition
    certainty: 95

  - unique: [country_code, edition_year, applicant_name]
    reason: an applicant appears at most once in a country's top-N for one edition
    certainty: 90

  - not_null: country_code
  - not_null: applicant_name
  - not_null: number_of_applications

  - column_type: {col: rank, type: integer}

  - between: {col: rank, lo: 1, hi: 10}
    reason: the dashboard publishes a top-10 per country
    certainty: 90

  - distinct_count: {col: country_code, min: 20, max: 60}
    reason: only the ~27 larger filing countries get a top-applicant breakdown, plus the 'ALL' aggregate
    certainty: 85

  - at_least: {col: number_of_applications, expr: 1}
    reason: an applicant with zero filings would not make a top-10 list
    certainty: 90

  - matches: {col: edition_year, pattern: "[0-9]{4}"}
    certainty: 95

  - matches: {col: country_code, pattern: "[A-Z]{2,3}"}
    reason: joins to epo-countries.country_code, including the source's own 'ALL' aggregate
    certainty: 90
