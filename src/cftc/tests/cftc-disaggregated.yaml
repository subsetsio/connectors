spec_id: cftc-disaggregated
status: active
tests:
  - not_null: report_date_as_yyyy_mm_dd
    reason: every COT record is keyed to a weekly Tuesday report date
    certainty: 99
  - not_null: cftc_contract_market_code
    reason: every row identifies the CFTC contract market
    certainty: 95
  - not_null: futonly_or_combined
    reason: this family combines the Futures Only and Combined resources
    certainty: 95
  - row_count: {min: 150000}
    reason: disaggregated COT has weekly market history back to 2006 across futures-only and combined resources
    certainty: 90
  - freshness: {col: report_date_as_yyyy_mm_dd, reaches: today - 21d}
    reason: CFTC COT reports publish weekly, normally Friday for positions as of Tuesday
    certainty: 90
    points_outward: true
