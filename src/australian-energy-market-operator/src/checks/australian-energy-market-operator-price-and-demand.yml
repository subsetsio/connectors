    columns: [settlement_date, region]
  - kind: not_null
    col: settlement_date
  - kind: not_null
    col: region
  - kind: row_floor
    min: 2281672
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
