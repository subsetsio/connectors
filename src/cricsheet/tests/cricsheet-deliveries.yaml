spec_id: cricsheet-deliveries
status: active
tests:
  - not_null: match_id
    reason: every delivery belongs to a match; the csv2 ball file always carries match_id.
    certainty: 98
  - not_null: innings
    reason: each delivery is in a numbered innings (1..n).
    certainty: 95
  - not_null: striker
    reason: a delivery always has a striker on strike.
    certainty: 90
  - not_null: bowler
    reason: a delivery always has a bowler.
    certainty: 90
  - matches: {col: match_id, pattern: '^[A-Za-z0-9_]+$'}
    reason: match_id is the Cricinfo id — usually numeric but some older/domestic matches use string ids like 'wi_201706'.
    certainty: 90
  - row_count: {min: 1000000}
    reason: the full corpus is ~22k matches averaging hundreds of deliveries — millions of rows; a low count means a truncated zip or partial parse.
    certainty: 90
  - distinct_count: {col: match_id, min: 15000}
    reason: ~22k matches are published (minus ~368 withheld); far fewer means missing ball files.
    certainty: 85
  - freshness: {col: start_date, reaches: today - 90d}
    reason: Cricsheet is updated continuously from current scorecards; the full corpus should include matches from the last quarter.
    certainty: 85
    points_outward: true
