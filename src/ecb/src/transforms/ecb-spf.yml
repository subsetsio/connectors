# SPF — Survey of Professional Forecasters (ECB Data Portal SDMX dataflow SPF)
# unit_mult: constant '0' (no scaling) — dropped
# decimals: display metadata — dropped
key: [series_key, time_period]
temporal: time_period
columns:
  - name: series_key
    type: VARCHAR
    description: "full dot-separated SDMX series key identifying one series of the ECB SPF dataflow"
  - name: freq
    type: VARCHAR
    description: "SDMX frequency code of the series (A annual, H half-yearly, S semi-annual, Q quarterly, M monthly, W weekly, B business-daily, D daily, E event)"
  - name: time_period
    type: VARCHAR
    description: "SDMX observation period; format follows the series frequency (YYYY, YYYY-Qn, YYYY-Sn/Hn, YYYY-MM, YYYY-Wnn or YYYY-MM-DD)"
  - name: value
    type: DOUBLE
    description: "numeric observation value"
  - name: obs_status
    type: VARCHAR
    description: "SDMX observation status code (A normal, B break, E estimated, P provisional, U low reliability)"
  - name: title
    type: VARCHAR
    description: "human-readable English series title from the ECB catalog (name plus unit/compilation notes)"
  - name: unit
    type: VARCHAR
    description: "ECB unit code of the observation (e.g. EUR, PC for percent, IX for index, PURE_NUMB)"
