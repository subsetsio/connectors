# KRI — EBA Key Risk Indicators (ECB Data Portal SDMX dataflow KRI)
# freq: constant 'Q' — dropped, noted on time_period
# unit: constant 'PURE_NUMB' — dropped, folded into value description
# unit_mult: constant '0' (no scaling) — dropped
# decimals: display metadata — dropped
key: [series_key, time_period]
temporal: time_period
columns:
  - name: series_key
    type: VARCHAR
    description: "full dot-separated SDMX series key identifying one series of the ECB KRI dataflow"
  - name: time_period
    type: VARCHAR
    description: "SDMX observation period; format follows the series frequency (YYYY, YYYY-Qn, YYYY-Sn/Hn, YYYY-MM, YYYY-Wnn or YYYY-MM-DD); all series in this flow are quarterly"
  - name: value
    type: DOUBLE
    description: "numeric observation value (unit code PURE_NUMB for every series)"
  - name: obs_status
    type: VARCHAR
    description: "SDMX observation status code (A normal, B break, E estimated, P provisional, U low reliability)"
  - name: title
    type: VARCHAR
    description: "human-readable English series title from the ECB catalog (name plus unit/compilation notes)"
