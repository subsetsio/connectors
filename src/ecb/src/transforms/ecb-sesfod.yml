# SESFOD — Survey on credit terms and conditions in euro-denominated securities financing and over-the-counter derivatives markets (ECB Data Portal SDMX dataflow SESFOD)
# freq: constant 'Q' — dropped, noted on time_period
# obs_status: constant 'A' (normal value) — dropped
# unit_mult: constant '0' (no scaling) — dropped
# decimals: display metadata — dropped
key: [series_key, time_period]
temporal: time_period
columns:
  - name: series_key
    type: VARCHAR
    description: "full dot-separated SDMX series key identifying one series of the ECB SESFOD dataflow"
  - name: time_period
    type: VARCHAR
    description: "SDMX observation period; format follows the series frequency (YYYY, YYYY-Qn, YYYY-Sn/Hn, YYYY-MM, YYYY-Wnn or YYYY-MM-DD); all series in this flow are quarterly"
  - name: value
    type: DOUBLE
    description: "numeric observation value"
  - name: title
    type: VARCHAR
    description: "human-readable English series title from the ECB catalog (name plus unit/compilation notes)"
  - name: unit
    type: VARCHAR
    description: "ECB unit code of the observation (e.g. EUR, PC for percent, IX for index, PURE_NUMB)"
