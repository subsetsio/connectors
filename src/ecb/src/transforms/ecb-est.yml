# EST — Euro Short-Term Rate (ECB Data Portal SDMX dataflow EST)
# freq: constant 'B' — dropped, noted on time_period
# obs_status: constant 'A' (normal value) — dropped
# unit: absent in this flow (100% null) — dropped
# decimals: display metadata — dropped
key: [series_key, time_period]
temporal: time_period
columns:
  - name: series_key
    type: VARCHAR
    description: "full dot-separated SDMX series key identifying one series of the ECB EST dataflow"
  - name: time_period
    type: VARCHAR
    description: "SDMX observation period; format follows the series frequency (YYYY, YYYY-Qn, YYYY-Sn/Hn, YYYY-MM, YYYY-Wnn or YYYY-MM-DD); all series in this flow are business-daily"
  - name: value
    type: DOUBLE
    description: "numeric observation value; the unit is encoded in the series key dimensions"
  - name: title
    type: VARCHAR
    description: "human-readable English series title from the ECB catalog (name plus unit/compilation notes)"
  - name: unit_mult
    type: BIGINT
    description: "unit multiplier as a power of ten: the published value is expressed in units of 10^unit_mult"
