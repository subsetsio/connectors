# compiled by `hardened compile-checks` — post-publish audit of `ons-weekly-deaths-region`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [calendar_years, time, administrative_geography, geography, week_number, week, cause_of_death, causeofdeath]
checks:
  - kind: unique
    columns: [calendar_years, time, administrative_geography, geography, week_number, week, cause_of_death, causeofdeath]
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: not_null
    col: administrative_geography
  - kind: not_null
    col: geography
  - kind: not_null
    col: week_number
  - kind: not_null
    col: week
  - kind: not_null
    col: cause_of_death
  - kind: not_null
    col: causeofdeath
  - kind: row_floor
    min: 4004
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
