# compiled by `hardened compile-checks` — post-publish audit of `ons-online-job-advert-estimates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [week, week_number, adzuna_jobs_category, adzunajobscategory, calendar_years]
checks:
  - kind: unique
    columns: [week, week_number, adzuna_jobs_category, adzunajobscategory, calendar_years]
  - kind: not_null
    col: week
  - kind: not_null
    col: week_number
  - kind: not_null
    col: adzuna_jobs_category
  - kind: not_null
    col: adzunajobscategory
  - kind: not_null
    col: calendar_years
  - kind: row_floor
    min: 5565
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
