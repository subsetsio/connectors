# compiled by `hardened compile-checks` — post-publish audit of `ons-retail-sales-index`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mmm_yy, time, sic_unofficial, unofficialstandardindustrialclassification, type_of_prices]
checks:
  - kind: unique
    columns: [mmm_yy, time, sic_unofficial, unofficialstandardindustrialclassification, type_of_prices]
  - kind: not_null
    col: mmm_yy
  - kind: not_null
    col: time
  - kind: not_null
    col: sic_unofficial
  - kind: not_null
    col: unofficialstandardindustrialclassification
  - kind: not_null
    col: type_of_prices
  - kind: row_floor
    min: 22850
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
