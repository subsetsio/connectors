# compiled by `hardened compile-checks` — post-publish audit of `ons-faster-indicators-shipping-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [calendar_years, time, uk_only, geography, week_number, week, shipping_port, port, ship_and_visit_type, shipandvisittype]
checks:
  - kind: unique
    columns: [calendar_years, time, uk_only, geography, week_number, week, shipping_port, port, ship_and_visit_type, shipandvisittype]
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: not_null
    col: uk_only
  - kind: not_null
    col: geography
  - kind: not_null
    col: week_number
  - kind: not_null
    col: week
  - kind: not_null
    col: shipping_port
  - kind: not_null
    col: port
  - kind: not_null
    col: ship_and_visit_type
  - kind: not_null
    col: shipandvisittype
  - kind: row_floor
    min: 14416
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
