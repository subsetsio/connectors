# compiled by `hardened compile-checks` — post-publish audit of `ons-index-private-housing-rental-prices`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mmm_yy, time, geography, administrative_geography, index_and_year_change]
checks:
  - kind: unique
    columns: [mmm_yy, time, geography, administrative_geography, index_and_year_change]
  - kind: not_null
    col: mmm_yy
  - kind: not_null
    col: time
  - kind: not_null
    col: geography
  - kind: not_null
    col: administrative_geography
  - kind: not_null
    col: index_and_year_change
  - kind: row_floor
    min: 3435
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
