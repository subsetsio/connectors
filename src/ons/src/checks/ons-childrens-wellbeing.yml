# compiled by `hardened compile-checks` — post-publish audit of `ons-childrens-wellbeing`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sample_size, calendar_years, time, countries, geography, sex, sex_1, wellbeing_estimate, estimate, measure_of_wellbeing, measureofwellbeing]
checks:
  - kind: unique
    columns: [sample_size, calendar_years, time, countries, geography, sex, sex_1, wellbeing_estimate, estimate, measure_of_wellbeing, measureofwellbeing]
  - kind: not_null
    col: sample_size
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: not_null
    col: countries
  - kind: not_null
    col: geography
  - kind: not_null
    col: sex
  - kind: not_null
    col: sex_1
  - kind: not_null
    col: wellbeing_estimate
  - kind: not_null
    col: estimate
  - kind: not_null
    col: measure_of_wellbeing
  - kind: not_null
    col: measureofwellbeing
  - kind: row_floor
    min: 405
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
