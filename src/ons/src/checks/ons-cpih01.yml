# compiled by `hardened compile-checks` — post-publish audit of `ons-cpih01`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mmm_yy, time, aggregate, cpih1dim1aggid]
checks:
  - kind: unique
    columns: [mmm_yy, time, aggregate, cpih1dim1aggid]
  - kind: not_null
    col: mmm_yy
  - kind: not_null
    col: time
  - kind: not_null
    col: aggregate
  - kind: not_null
    col: cpih1dim1aggid
  - kind: row_floor
    min: 27877
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
