# compiled by `hardened compile-checks` — post-publish audit of `ons-older-people-sex-ratios`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [administrative_geography, geography, agegroups]
checks:
  - kind: unique
    columns: [administrative_geography, geography, agegroups]
  - kind: not_null
    col: administrative_geography
  - kind: not_null
    col: geography
  - kind: not_null
    col: agegroups
  - kind: row_floor
    min: 395
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
