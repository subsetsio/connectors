# compiled by `hardened compile-checks` — post-publish audit of `ons-suicides-in-the-uk`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geography, administrative_geography, calendar_years, time]
checks:
  - kind: unique
    columns: [geography, administrative_geography, calendar_years, time]
  - kind: not_null
    col: geography
  - kind: not_null
    col: administrative_geography
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: row_floor
    min: 4128
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
