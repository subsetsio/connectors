# compiled by `hardened compile-checks` — post-publish audit of `ons-uk-spending-on-cards`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dd_mm, daymonth, calendar_years, time, spend_category]
checks:
  - kind: unique
    columns: [dd_mm, daymonth, calendar_years, time, spend_category]
  - kind: not_null
    col: dd_mm
  - kind: not_null
    col: daymonth
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: not_null
    col: spend_category
  - kind: row_floor
    min: 4537
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
