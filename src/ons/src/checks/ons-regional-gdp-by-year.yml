# compiled by `hardened compile-checks` — post-publish audit of `ons-regional-gdp-by-year`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [calendar_years, time, nuts, geography, sic_unofficial, unofficialstandardindustrialclassification, type_of_prices, prices, quarterly_index_and_growth_rate]
checks:
  - kind: unique
    columns: [calendar_years, time, nuts, geography, sic_unofficial, unofficialstandardindustrialclassification, type_of_prices, prices, quarterly_index_and_growth_rate]
  - kind: not_null
    col: calendar_years
  - kind: not_null
    col: time
  - kind: not_null
    col: nuts
  - kind: not_null
    col: geography
  - kind: not_null
    col: sic_unofficial
  - kind: not_null
    col: unofficialstandardindustrialclassification
  - kind: not_null
    col: type_of_prices
  - kind: not_null
    col: prices
  - kind: not_null
    col: quarterly_index_and_growth_rate
  - kind: row_floor
    min: 2760
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
