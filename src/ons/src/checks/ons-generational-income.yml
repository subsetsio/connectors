# compiled by `hardened compile-checks` — post-publish audit of `ons-generational-income`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [single_year_of_age, age, tax_benefit_type, typeoftaxorbenefit, decade]
checks:
  - kind: unique
    columns: [single_year_of_age, age, tax_benefit_type, typeoftaxorbenefit, decade]
  - kind: not_null
    col: single_year_of_age
  - kind: not_null
    col: age
  - kind: not_null
    col: tax_benefit_type
  - kind: not_null
    col: typeoftaxorbenefit
  - kind: not_null
    col: decade
  - kind: row_floor
    min: 2268
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
