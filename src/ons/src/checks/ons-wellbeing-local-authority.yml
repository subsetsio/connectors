# compiled by `hardened compile-checks` — post-publish audit of `ons-wellbeing-local-authority`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [lower_limit, upper_limit, yyyy_yy, time, administrative_geography, geography, measure_of_wellbeing, measureofwellbeing, wellbeing_estimate, estimate]
checks:
  - kind: unique
    columns: [lower_limit, upper_limit, yyyy_yy, time, administrative_geography, geography, measure_of_wellbeing, measureofwellbeing, wellbeing_estimate, estimate]
  - kind: not_null
    col: lower_limit
  - kind: not_null
    col: upper_limit
  - kind: not_null
    col: yyyy_yy
  - kind: not_null
    col: time
  - kind: not_null
    col: administrative_geography
  - kind: not_null
    col: geography
  - kind: not_null
    col: measure_of_wellbeing
  - kind: not_null
    col: measureofwellbeing
  - kind: not_null
    col: wellbeing_estimate
  - kind: not_null
    col: estimate
  - kind: row_floor
    min: 50160
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
