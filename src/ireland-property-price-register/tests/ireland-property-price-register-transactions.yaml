spec_id: ireland-property-price-register-transactions
status: active
tests:
  - not_null: file_year
    reason: every row is tagged with the calendar year of the file it came from
    certainty: 99
  - column_type: {col: file_year, type: integer}
    certainty: 99
  - between: {col: file_year, lo: 2010, hi: 2027}
    reason: PPR begins 1 Jan 2010; upper bound is the current/next year while crawling
    certainty: 95
  - at_most: {col: file_year, expr: current_year()}
    reason: the source publishes completed and in-progress years, never future years
    certainty: 90
    points_outward: true
    severity: warn
  - not_null: date_of_sale
    reason: every declared sale carries a sale date; transform drops blank dates
    certainty: 95
  - matches: {col: date_of_sale, pattern: '^[0-9]{2}/[0-9]{2}/[0-9]{4}$'}
    reason: dates are dd/mm/yyyy; all probed rows had length-10 dd/mm/yyyy values
    certainty: 90
  - not_null: price
    reason: price is declared for stamp duty on every sale
    certainty: 90
  - matches: {col: price, pattern: '^.*[0-9].*$'}
    reason: price is a currency string like "€250,000.00" and always contains digits
    certainty: 90
  - not_null: county
    reason: county is populated for every Irish property
    certainty: 95
  - enum: {col: not_full_market_price, values: ["Yes", "No"]}
    reason: a Yes/No flag in the register
    certainty: 90
  - enum: {col: vat_exclusive, values: ["Yes", "No"]}
    reason: a Yes/No flag in the register
    certainty: 90
  - distinct_count: {col: county, min: 20, max: 40}
    reason: Ireland has 26 traditional counties; 2024 file showed exactly 26
    certainty: 85
  - row_count: {min: 500000}
    reason: ~1M sales across 2010-present; <500k means a truncated crawl
    certainty: 85
  - freshness: {col: file_year, reaches: current_year()}
    reason: the register publishes a current in-progress year file; a stale maximum file year means the crawl missed the current annual CSV
    certainty: 90
    points_outward: true
