key: []
temporal: sale_date
sort: [sale_date, county]
columns:
  - name: sale_date
    type: DATE
    description: Date the residential property sale was recorded in the register.
  - name: year
    type: BIGINT
    description: Calendar year of the source CSV file that contained the sale record.
  - name: county
    type: VARCHAR
    description: Irish county where the property is located, as published by the PSRA.
  - name: eircode
    type: VARCHAR
    description: Eircode for the property where present in the register.
  - name: address
    type: VARCHAR
    description: Published property address.
  - name: price_eur
    type: DOUBLE
    description: Declared sale price in euro.
  - name: not_full_market_price
    type: BOOLEAN
    description: Whether the sale was flagged by the register as not full market price.
  - name: vat_exclusive
    type: BOOLEAN
    description: Whether the published price is VAT exclusive.
  - name: description
    type: VARCHAR
    description: Published description of the property type or new/second-hand status.
  - name: property_size_description
    type: VARCHAR
    description: Published property size band or description where supplied.
