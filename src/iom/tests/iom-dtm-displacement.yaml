spec_id: iom-dtm-displacement
status: active
tests:
  - not_null: admin0_name
    reason: every DTM IDP figure is reported for a country (admin level 0)
    certainty: 95
  - not_null: num_present_idp_ind
    reason: the transform drops rows whose IDP count fails to parse
    certainty: 95
  - column_type: {col: reporting_date, type: date}
    certainty: 90
  - column_type: {col: num_present_idp_ind, type: integer}
    certainty: 90
  - at_least: {col: num_present_idp_ind, expr: 0}
    reason: IDP head-counts are non-negative
    certainty: 90
  - enum: {col: admin_level, values: [0, 1, 2]}
    reason: DTM API publishes admin levels 0, 1 and 2 only
    certainty: 85
    severity: warn
  - at_least: {col: year_reporting_date, expr: 2010}
    reason: DTM global series begins around 2010
    certainty: 80
  - at_most: {col: year_reporting_date, expr: current_year()}
    reason: reporting dates should not be in the future
    certainty: 90
    points_outward: true
    severity: warn
  - row_count: {min: 100000}
    reason: global admin 0-2 corpus is ~230k rows; far fewer means a truncated pull
    certainty: 80
