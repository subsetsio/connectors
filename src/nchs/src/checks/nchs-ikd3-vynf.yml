# compiled by `hardened compile-checks` — post-publish audit of `nchs-ikd3-vynf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [end_date, week_ending_date, start_date, state, age_group]
temporal: data_as_of
checks:
  - kind: unique
    columns: [end_date, week_ending_date, start_date, state, age_group]
  - kind: not_null
    col: end_date
  - kind: not_null
    col: week_ending_date
  - kind: not_null
    col: start_date
  - kind: not_null
    col: state
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 21730
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
