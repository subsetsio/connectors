# compiled by `hardened compile-checks` — post-publish audit of `nchs-aewi-gwni`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year, year_num, stub_label, stub_label_num, footnote_id_list]
temporal: year
checks:
  - kind: unique
    columns: [year, year_num, stub_label, stub_label_num, footnote_id_list]
  - kind: not_null
    col: year
  - kind: not_null
    col: year_num
  - kind: not_null
    col: stub_label
  - kind: not_null
    col: stub_label_num
  - kind: not_null
    col: footnote_id_list
  - kind: row_floor
    min: 650
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
