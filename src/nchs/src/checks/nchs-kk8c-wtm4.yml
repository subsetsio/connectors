# compiled by `hardened compile-checks` — post-publish audit of `nchs-kk8c-wtm4`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup, measure, group, interview_period, interview_dates]
checks:
  - kind: unique
    columns: [subgroup, measure, group, interview_period, interview_dates]
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: measure
  - kind: not_null
    col: group
  - kind: not_null
    col: interview_period
  - kind: not_null
    col: interview_dates
  - kind: row_floor
    min: 80
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
