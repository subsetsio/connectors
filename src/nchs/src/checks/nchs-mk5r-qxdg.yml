# compiled by `hardened compile-checks` — post-publish audit of `nchs-mk5r-qxdg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fn_text, footnote_id_list, fn_code, fn_type]
checks:
  - kind: unique
    columns: [fn_text, footnote_id_list, fn_code, fn_type]
  - kind: not_null
    col: fn_text
  - kind: not_null
    col: footnote_id_list
  - kind: not_null
    col: fn_code
  - kind: not_null
    col: fn_type
  - kind: row_floor
    min: 20
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
