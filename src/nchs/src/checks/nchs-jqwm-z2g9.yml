# compiled by `hardened compile-checks` — post-publish audit of `nchs-jqwm-z2g9`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [year_and_quarter, indicator, topic, unit, significant]
checks:
  - kind: unique
    columns: [year_and_quarter, indicator, topic, unit, significant]
  - kind: not_null
    col: year_and_quarter
  - kind: not_null
    col: indicator
  - kind: not_null
    col: topic
  - kind: not_null
    col: unit
  - kind: not_null
    col: significant
  - kind: row_floor
    min: 48
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
