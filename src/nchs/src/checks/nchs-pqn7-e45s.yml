# compiled by `hardened compile-checks` — post-publish audit of `nchs-pqn7-e45s`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [survey_years, race_and_hispanic_origin, age_group, sex, infectious_disease]
checks:
  - kind: unique
    columns: [survey_years, race_and_hispanic_origin, age_group, sex, infectious_disease]
  - kind: not_null
    col: survey_years
  - kind: not_null
    col: race_and_hispanic_origin
  - kind: not_null
    col: age_group
  - kind: not_null
    col: sex
  - kind: not_null
    col: infectious_disease
  - kind: row_floor
    min: 170
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
