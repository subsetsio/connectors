# compiled by `hardened compile-checks` — post-publish audit of `nchs-4va6-ph5s`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, end_date, start_date, place_of_death, age_group]
temporal: data_as_of
checks:
  - kind: unique
    columns: [state, end_date, start_date, place_of_death, age_group]
  - kind: not_null
    col: state
  - kind: not_null
    col: end_date
  - kind: not_null
    col: start_date
  - kind: not_null
    col: place_of_death
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 109350
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
