# compiled by `hardened compile-checks` — post-publish audit of `nchs-2m93-xvra`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [stub_label, year, year_num, panel, panel_num]
checks:
  - kind: unique
    columns: [stub_label, year, year_num, panel, panel_num]
  - kind: not_null
    col: stub_label
  - kind: not_null
    col: year
  - kind: not_null
    col: year_num
  - kind: not_null
    col: panel
  - kind: not_null
    col: panel_num
  - kind: row_floor
    min: 1372
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
