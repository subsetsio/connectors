# compiled by `hardened compile-checks` — post-publish audit of `nchs-9dzk-mvmi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [end_date, start_date, month, year, flag_accid]
temporal: data_as_of
checks:
  - kind: unique
    columns: [end_date, start_date, month, year, flag_accid]
  - kind: not_null
    col: end_date
  - kind: not_null
    col: start_date
  - kind: not_null
    col: month
  - kind: not_null
    col: year
  - kind: not_null
    col: flag_accid
  - kind: row_floor
    min: 22
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
