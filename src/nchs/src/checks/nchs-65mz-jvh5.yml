# compiled by `hardened compile-checks` — post-publish audit of `nchs-65mz-jvh5`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [start_date, end_date, agegroup, race_ethnicity, sex]
temporal: analysisdate
checks:
  - kind: unique
    columns: [start_date, end_date, agegroup, race_ethnicity, sex]
  - kind: not_null
    col: start_date
  - kind: not_null
    col: end_date
  - kind: not_null
    col: agegroup
  - kind: not_null
    col: race_ethnicity
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 1980
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
