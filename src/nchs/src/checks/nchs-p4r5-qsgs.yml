# compiled by `hardened compile-checks` — post-publish audit of `nchs-p4r5-qsgs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup, footnote_id_list, time_period_id, group, group_id]
checks:
  - kind: unique
    columns: [subgroup, footnote_id_list, time_period_id, group, group_id]
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: footnote_id_list
  - kind: not_null
    col: time_period_id
  - kind: not_null
    col: group
  - kind: not_null
    col: group_id
  - kind: row_floor
    min: 2139
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
