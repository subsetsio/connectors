# compiled by `hardened compile-checks` — post-publish audit of `nchs-dmnu-8erf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [data_period_end, data_period_start, subgroup1, jurisdiction_residence, subgroup2]
temporal: data_as_of
checks:
  - kind: unique
    columns: [data_period_end, data_period_start, subgroup1, jurisdiction_residence, subgroup2]
  - kind: not_null
    col: data_period_end
  - kind: not_null
    col: data_period_start
  - kind: not_null
    col: subgroup1
  - kind: not_null
    col: jurisdiction_residence
  - kind: not_null
    col: subgroup2
  - kind: row_floor
    min: 88654
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
