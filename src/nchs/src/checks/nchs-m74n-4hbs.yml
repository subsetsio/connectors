# compiled by `hardened compile-checks` — post-publish audit of `nchs-m74n-4hbs`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [weekending, agegroup, raceethnicity, time_period, sex]
temporal: analysisdate
checks:
  - kind: unique
    columns: [weekending, agegroup, raceethnicity, time_period, sex]
  - kind: not_null
    col: weekending
  - kind: not_null
    col: agegroup
  - kind: not_null
    col: raceethnicity
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 87318
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
