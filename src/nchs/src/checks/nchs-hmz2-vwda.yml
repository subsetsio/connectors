# compiled by `hardened compile-checks` — post-publish audit of `nchs-hmz2-vwda`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, month, indicator, year, period]
temporal: year
checks:
  - kind: unique
    columns: [state, month, indicator, year, period]
  - kind: not_null
    col: state
  - kind: not_null
    col: month
  - kind: not_null
    col: indicator
  - kind: not_null
    col: year
  - kind: not_null
    col: period
  - kind: row_floor
    min: 990
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
