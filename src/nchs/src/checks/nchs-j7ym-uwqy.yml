# compiled by `hardened compile-checks` — post-publish audit of `nchs-j7ym-uwqy`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup_id, subgroup, time_period_id, subtopic, subtopic_id]
checks:
  - kind: unique
    columns: [subgroup_id, subgroup, time_period_id, subtopic, subtopic_id]
  - kind: not_null
    col: subgroup_id
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: time_period_id
  - kind: not_null
    col: subtopic
  - kind: not_null
    col: subtopic_id
  - kind: row_floor
    min: 180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
