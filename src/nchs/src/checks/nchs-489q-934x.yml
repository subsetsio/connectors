# compiled by `hardened compile-checks` — post-publish audit of `nchs-489q-934x`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cause_of_death, year_and_quarter, time_period, rate_type]
checks:
  - kind: unique
    columns: [cause_of_death, year_and_quarter, time_period, rate_type]
  - kind: not_null
    col: cause_of_death
  - kind: not_null
    col: year_and_quarter
  - kind: not_null
    col: time_period
  - kind: not_null
    col: rate_type
  - kind: row_floor
    min: 462
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
