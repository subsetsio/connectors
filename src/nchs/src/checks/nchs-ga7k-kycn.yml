# compiled by `hardened compile-checks` — post-publish audit of `nchs-ga7k-kycn`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup, subgroup_id, state_fips, time_period_id, classification]
checks:
  - kind: unique
    columns: [subgroup, subgroup_id, state_fips, time_period_id, classification]
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: subgroup_id
  - kind: not_null
    col: state_fips
  - kind: not_null
    col: time_period_id
  - kind: not_null
    col: classification
  - kind: row_floor
    min: 260
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
