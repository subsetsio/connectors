# compiled by `hardened compile-checks` — post-publish audit of `nchs-rpvx-m2md`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [county, state, year, urban_rural_category]
temporal: year
checks:
  - kind: unique
    columns: [county, state, year, urban_rural_category]
  - kind: not_null
    col: county
  - kind: not_null
    col: state
  - kind: not_null
    col: year
  - kind: not_null
    col: urban_rural_category
  - kind: row_floor
    min: 29792
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
