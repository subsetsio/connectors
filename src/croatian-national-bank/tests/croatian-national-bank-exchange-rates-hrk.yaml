spec_id: croatian-national-bank-exchange-rates-hrk
status: active
tests:
  - not_null: datum
    reason: every legacy rate-list row carries the application date (field name `datum`, not `datum_primjene`)
    certainty: 98
  - not_null: valuta
    reason: every row is a currency quote keyed by ISO alpha code
    certainty: 99
  - not_null: srednji_tecaj
    reason: the middle rate is the primary published value and is present on every quote
    certainty: 97
  - not_null: jedinica
    reason: the kuna list expresses rates per `jedinica` units of currency; the multiplier is always set
    certainty: 95
  - column_type: {col: jedinica, type: integer}
    reason: jedinica is an integer unit multiplier (1, 100, ...)
    certainty: 90
  - matches: {col: datum, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: the API returns the application date as an ISO yyyy-mm-dd string
    certainty: 95
  - matches: {col: srednji_tecaj, pattern: '^-?[0-9]+,[0-9]+$'}
    reason: HNB serialises rates with a comma decimal separator (e.g. 4,987325)
    certainty: 92
  - unique: [datum, valuta]
    reason: one quote per currency per day across the frozen 1994-2022 series
    certainty: 90
  - distinct_count: {col: valuta, min: 12}
    reason: the kuna list carried ~15 currencies (incl. EUR, XDR); a collapse means a truncated pull
    certainty: 88
  - row_count: {min: 80000}
    reason: ~28 years of daily quotes x ~15 currencies is ~105k rows; floor set well below
    certainty: 85
