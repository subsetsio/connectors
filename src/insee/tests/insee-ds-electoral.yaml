spec_id: insee-ds-electoral
status: active
tests:
  - row_count: {min: 102808}
    reason: "catalog numObservations=205617 for DS_ELECTORAL; a >50% shortfall means a truncated/partial pull on our side, not a source change"
    certainty: 85
    severity: block
  - not_null: OBS_MEASURE
    reason: "every Melodi observation carries exactly one measure key; flatten lifts it to OBS_MEASURE, so it is never null"
    certainty: 90
  - column_type: {col: OBS_VALUE, type: float}
    reason: "flatten casts each numeric measure value to float; a non-float column means the measure payload shape changed"
    certainty: 90
  - not_null: TIME_PERIOD
    reason: "periodicity=Aperiodic; TIME_PERIOD is the standard SDMX time dimension but aperiodic datacubes may omit or rename it \u2014 reconcile if absent"
    certainty: 50
    severity: warn
