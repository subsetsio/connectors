# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-ticm-equipement`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ticm_measure, sex, empsta, freq, time_period, educ, pcs_ese, quantile_nivvie, mun_density_level, age, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [ticm_measure, sex, empsta, freq, time_period, educ, pcs_ese, quantile_nivvie, mun_density_level, age, obs_measure, obs_status]
  - kind: not_null
    col: ticm_measure
  - kind: not_null
    col: sex
  - kind: not_null
    col: empsta
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: educ
  - kind: not_null
    col: pcs_ese
  - kind: not_null
    col: quantile_nivvie
  - kind: not_null
    col: mun_density_level
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 2737
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
