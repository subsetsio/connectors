# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-social-economy`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [activity, social_economy_measure, legal_form, time_period, sex]
temporal: time_period
checks:
  - kind: unique
    columns: [activity, social_economy_measure, legal_form, time_period, sex]
  - kind: not_null
    col: activity
  - kind: not_null
    col: social_economy_measure
  - kind: not_null
    col: legal_form
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 2779
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
