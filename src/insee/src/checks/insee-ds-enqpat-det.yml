# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-enqpat-det`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, pcs, quantile, compare_time, quantile_measure, enqpat_measure, time_period, deg_urb_unit, tph, age, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, pcs, quantile, compare_time, quantile_measure, enqpat_measure, time_period, deg_urb_unit, tph, age, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: pcs
  - kind: not_null
    col: quantile
  - kind: not_null
    col: compare_time
  - kind: not_null
    col: quantile_measure
  - kind: not_null
    col: enqpat_measure
  - kind: not_null
    col: time_period
  - kind: not_null
    col: deg_urb_unit
  - kind: not_null
    col: tph
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 2273
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
