# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-rp-td-navettes-sextransport-comp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, trans, work_area, work_urban_area, sex]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, trans, work_area, work_urban_area, sex]
  - kind: not_null
    col: geo
  - kind: not_null
    col: trans
  - kind: not_null
    col: work_area
  - kind: not_null
    col: work_urban_area
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 5000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
