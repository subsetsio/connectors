    columns: [geo, nationality, reu_list_type, reu_reason_reg, sex, reu_reason_rmv, freq, time_period, reu_election_type, reu_measure, age, obs_measure]
  - kind: not_null
    col: geo
  - kind: not_null
    col: nationality
  - kind: not_null
    col: reu_list_type
  - kind: not_null
    col: reu_reason_reg
  - kind: not_null
    col: sex
  - kind: not_null
    col: reu_reason_rmv
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: reu_election_type
  - kind: not_null
    col: reu_measure
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: row_floor
    min: 102808
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
