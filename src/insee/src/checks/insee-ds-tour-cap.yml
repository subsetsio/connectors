# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-tour-cap`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, tour_measure, freq, time_period, activity, unit_loc_ranking, l_stay, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, tour_measure, freq, time_period, activity, unit_loc_ranking, l_stay, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: tour_measure
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: activity
  - kind: not_null
    col: unit_loc_ranking
  - kind: not_null
    col: l_stay
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 1127790
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
