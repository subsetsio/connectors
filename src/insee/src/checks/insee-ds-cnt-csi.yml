# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-cnt-csi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, sto, ref_sector, accounting_entry, unit_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [time_period, sto, ref_sector, accounting_entry, unit_measure]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: sto
  - kind: not_null
    col: ref_sector
  - kind: not_null
    col: accounting_entry
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 49877
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
