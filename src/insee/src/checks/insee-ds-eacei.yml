# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-eacei`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, compare_time, eacei_measure, time_period, unit_measure, nb_empl, activity, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, compare_time, eacei_measure, time_period, unit_measure, nb_empl, activity, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: compare_time
  - kind: not_null
    col: eacei_measure
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: nb_empl
  - kind: not_null
    col: activity
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 3203
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
