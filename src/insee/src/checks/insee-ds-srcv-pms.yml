  - kind: not_null
    col: srcv_hlth_sph
  - kind: not_null
    col: srcv_measure
  - kind: not_null
    col: empsta_enq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: quantile_nivvie
  - kind: not_null
    col: tph
  - kind: not_null
    col: educ
  - kind: not_null
    col: age
  - kind: not_null
