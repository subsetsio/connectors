    col: sex
  - kind: not_null
    col: educ
  - kind: not_null
    col: underemp
  - kind: not_null
    col: empform
  - kind: not_null
    col: unempdur
  - kind: not_null
    col: compohalo
  - kind: not_null
    col: empsta
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: wktime
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: not_null
