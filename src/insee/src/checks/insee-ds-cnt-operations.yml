# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-cnt-operations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period, activity, sto, ref_sector, prices]
temporal: time_period
checks:
  - kind: unique
    columns: [time_period, activity, sto, ref_sector, prices]
  - kind: not_null
    col: time_period
  - kind: not_null
    col: activity
  - kind: not_null
    col: sto
  - kind: not_null
    col: ref_sector
  - kind: not_null
    col: prices
  - kind: row_floor
    min: 105369
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
