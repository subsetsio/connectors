    columns: [cars, build_end, nrg_src, tdw, tsh, carpark, rp_measure, geo, nor, freq, time_period, ocs, l_stay, obs_measure, obs_status]
  - kind: not_null
    col: cars
  - kind: not_null
    col: build_end
  - kind: not_null
    col: nrg_src
  - kind: not_null
    col: tdw
  - kind: not_null
    col: tsh
  - kind: not_null
    col: carpark
  - kind: not_null
    col: rp_measure
  - kind: not_null
    col: geo
  - kind: not_null
    col: nor
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: ocs
  - kind: not_null
    col: l_stay
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 5000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
