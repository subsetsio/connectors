# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-erfs-retropole`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [erfs_measure, empsta_enq, time_period, tph, mun_density_level, age, obs_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [erfs_measure, empsta_enq, time_period, tph, mun_density_level, age, obs_measure]
  - kind: not_null
    col: erfs_measure
  - kind: not_null
    col: empsta_enq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: tph
  - kind: not_null
    col: mun_density_level
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: row_floor
    min: 720
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
