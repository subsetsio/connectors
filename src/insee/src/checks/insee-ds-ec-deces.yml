# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-ec-deces`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, ec_measure, sex, dth_place, freq, time_period, age, obs_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, ec_measure, sex, dth_place, freq, time_period, age, obs_measure]
  - kind: not_null
    col: geo
  - kind: not_null
    col: ec_measure
  - kind: not_null
    col: sex
  - kind: not_null
    col: dth_place
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: row_floor
    min: 464537
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
