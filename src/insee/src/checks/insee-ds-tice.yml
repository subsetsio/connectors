# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-tice`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tice_measure, time_period, activity, nb_empl, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [tice_measure, time_period, activity, nb_empl, obs_measure, obs_status]
  - kind: not_null
    col: tice_measure
  - kind: not_null
    col: time_period
  - kind: not_null
    col: activity
  - kind: not_null
    col: nb_empl
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 4667
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
