# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-dera-public-series-longues`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, quantile, sex, civilservant_status, freq, public_legal_form, time_period, unit_measure, wktime, dera_measure, age, obs_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, quantile, sex, civilservant_status, freq, public_legal_form, time_period, unit_measure, wktime, dera_measure, age, obs_measure]
  - kind: not_null
    col: geo
  - kind: not_null
    col: quantile
  - kind: not_null
    col: sex
  - kind: not_null
    col: civilservant_status
  - kind: not_null
    col: freq
  - kind: not_null
    col: public_legal_form
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: wktime
  - kind: not_null
    col: dera_measure
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: row_floor
    min: 1091
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
