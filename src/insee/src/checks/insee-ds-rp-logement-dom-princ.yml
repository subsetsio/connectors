# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-rp-logement-dom-princ`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, ww, aircond, elec, bainwc, tdw, wss, freq, time_period, rp_measure, ocs, sobo, obs_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, ww, aircond, elec, bainwc, tdw, wss, freq, time_period, rp_measure, ocs, sobo, obs_measure]
  - kind: not_null
    col: geo
  - kind: not_null
    col: ww
  - kind: not_null
    col: aircond
  - kind: not_null
    col: elec
  - kind: not_null
    col: bainwc
  - kind: not_null
    col: tdw
  - kind: not_null
    col: wss
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: rp_measure
  - kind: not_null
    col: ocs
  - kind: not_null
    col: sobo
  - kind: not_null
    col: obs_measure
  - kind: row_floor
    min: 5000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
