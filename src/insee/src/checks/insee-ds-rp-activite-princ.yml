# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-rp-activite-princ`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, sex, empform, freq, empsta_enq, time_period, wktime, rp_measure, age, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, sex, empform, freq, empsta_enq, time_period, wktime, rp_measure, age, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: sex
  - kind: not_null
    col: empform
  - kind: not_null
    col: freq
  - kind: not_null
    col: empsta_enq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: wktime
  - kind: not_null
    col: rp_measure
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 5000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
