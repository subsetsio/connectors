# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-estimation-population`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geo, seasonal_adjust, sex, freq, time_period, unit_measure, ep_measure, ref_period, age, obs_measure, obs_status]
temporal: time_period
checks:
  - kind: unique
    columns: [geo, seasonal_adjust, sex, freq, time_period, unit_measure, ep_measure, ref_period, age, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: seasonal_adjust
  - kind: not_null
    col: sex
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: ep_measure
  - kind: not_null
    col: ref_period
  - kind: not_null
    col: age
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 216441
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
