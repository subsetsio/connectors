# compiled by `hardened compile-checks` — post-publish audit of `insee-ds-ipch`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [coicop_2018, time_period, ind_type, freq, unit_measure]
temporal: time_period
checks:
  - kind: unique
    columns: [coicop_2018, time_period, ind_type, freq, unit_measure]
  - kind: not_null
    col: coicop_2018
  - kind: not_null
    col: time_period
  - kind: not_null
    col: ind_type
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit_measure
  - kind: row_floor
    min: 86115
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
