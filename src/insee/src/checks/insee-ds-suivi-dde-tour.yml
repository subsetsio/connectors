    columns: [geo, seasonal_adjust, tour_measure, travel_dest, mode_transport, freq, time_period, unit_measure, type_tour_accomodation, travel_reason, obs_measure, obs_status]
  - kind: not_null
    col: geo
  - kind: not_null
    col: seasonal_adjust
  - kind: not_null
    col: tour_measure
  - kind: not_null
    col: travel_dest
  - kind: not_null
    col: mode_transport
  - kind: not_null
    col: freq
  - kind: not_null
    col: time_period
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: type_tour_accomodation
  - kind: not_null
    col: travel_reason
  - kind: not_null
    col: obs_measure
  - kind: not_null
    col: obs_status
  - kind: row_floor
    min: 1052
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
