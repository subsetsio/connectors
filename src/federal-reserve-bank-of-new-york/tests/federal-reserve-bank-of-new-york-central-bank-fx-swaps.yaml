spec_id: federal-reserve-bank-of-new-york-central-bank-fx-swaps
status: active
tests:
  - not_null: tradeDate
  - not_null: counterparty
  - row_count: {min: 500}
    reason: ~1600 swap operations observed (concentrated in crisis periods)
    certainty: 75
  - distinct_count: {col: counterparty, min: 3}
    reason: multiple foreign central banks participate in the swap lines
    certainty: 80
