spec_id: federal-reserve-bank-of-new-york-soma-holdings
status: active
tests:
  - not_null: as_of_date
  - not_null: cusip
  - row_count: {min: 30000}
    reason: ~80k monthly CUSIP-level Treasury holding rows in the bulk CSV
    certainty: 80
  - matches: {col: as_of_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: As Of Date is an ISO date string in the bulk CSV
    certainty: 85
