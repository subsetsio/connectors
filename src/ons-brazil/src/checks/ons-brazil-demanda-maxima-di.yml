# compiled by `hardened compile-checks` — post-publish audit of `ons-brazil-demanda-maxima-di`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [din_demandaintegralizada, dat_referencia, id_subsistema, nom_subsistema]
temporal: dat_referencia
checks:
  - kind: unique
    columns: [din_demandaintegralizada, dat_referencia, id_subsistema, nom_subsistema]
  - kind: not_null
    col: din_demandaintegralizada
  - kind: not_null
    col: dat_referencia
  - kind: not_null
    col: id_subsistema
  - kind: not_null
    col: nom_subsistema
  - kind: row_floor
    min: 1740
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
