# compiled by `hardened compile-checks` — post-publish audit of `ons-brazil-subestacao`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id_estacao, val_longitude, nom_subestacao, val_latitude, id_subestacao]
checks:
  - kind: unique
    columns: [id_estacao, val_longitude, nom_subestacao, val_latitude, id_subestacao]
  - kind: not_null
    col: id_estacao
  - kind: not_null
    col: val_longitude
  - kind: not_null
    col: nom_subestacao
  - kind: not_null
    col: val_latitude
  - kind: not_null
    col: id_subestacao
  - kind: row_floor
    min: 856
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
