# compiled by `hardened compile-checks` — post-publish audit of `ons-brazil-ofertapreco-importacao`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [dat_iniciovalidade, dat_fimvalidade, nom_bloco, nom_agente, nom_pais]
temporal: dat_iniciovalidade
checks:
  - kind: unique
    columns: [dat_iniciovalidade, dat_fimvalidade, nom_bloco, nom_agente, nom_pais]
  - kind: not_null
    col: dat_iniciovalidade
  - kind: not_null
    col: dat_fimvalidade
  - kind: not_null
    col: nom_bloco
  - kind: not_null
    col: nom_agente
  - kind: not_null
    col: nom_pais
  - kind: row_floor
    min: 2269
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
