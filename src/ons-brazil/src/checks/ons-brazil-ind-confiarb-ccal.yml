# compiled by `hardened compile-checks` — post-publish audit of `ons-brazil-ind-confiarb-ccal`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [din_referencia, nom_agregacao, cod_tipoagregacao, id_periodicidade]
temporal: din_referencia
checks:
  - kind: unique
    columns: [din_referencia, nom_agregacao, cod_tipoagregacao, id_periodicidade]
  - kind: not_null
    col: din_referencia
  - kind: not_null
    col: nom_agregacao
  - kind: not_null
    col: cod_tipoagregacao
  - kind: not_null
    col: id_periodicidade
  - kind: row_floor
    min: 18377
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
