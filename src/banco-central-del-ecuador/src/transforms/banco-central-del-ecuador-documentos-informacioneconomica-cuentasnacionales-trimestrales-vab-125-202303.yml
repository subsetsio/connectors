# generic BCE workbook melt (uniform long schema across every workbook)
columns:
  - name: sheet
    type: VARCHAR
  - name: row_index
    type: INTEGER
  - name: col_index
    type: INTEGER
  - name: row_label
    type: VARCHAR
  - name: col_header
    type: VARCHAR
  - name: value
    type: DOUBLE
  - name: value_text
    type: VARCHAR
