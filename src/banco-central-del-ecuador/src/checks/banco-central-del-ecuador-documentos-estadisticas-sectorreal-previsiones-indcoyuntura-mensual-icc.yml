# compiled by `hardened compile-checks` — post-publish audit of `banco-central-del-ecuador-documentos-estadisticas-sectorreal-previsiones-indcoyuntura-mensual-icc`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_label, col_header]
temporal: row_label
checks:
  - kind: unique
    columns: [row_label, col_header]
  - kind: not_null
    col: row_label
  - kind: not_null
    col: col_header
  - kind: row_floor
    min: 125
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
