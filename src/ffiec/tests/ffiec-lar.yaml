spec_id: ffiec-lar
status: active
# Expectations on the RAW HMDA LAR asset (all columns stored as VARCHAR;
# one parquet batch per snapshot year, globbed as ffiec-lar-*). Authored from
# the public HMDA LAR data-field definitions and the modern (2018+) schema.
tests:
  - not_null: activity_year
    reason: every loan record carries its reporting year
    certainty: 95
  - matches: {col: activity_year, pattern: '^20[0-9]{2}$'}
    reason: modern snapshot years are 4-digit 20xx
    certainty: 95
  - not_null: lei
    reason: each record identifies its filing institution by LEI
    certainty: 90
  - matches: {col: lei, pattern: '^[A-Z0-9]{20}$'}
    reason: an LEI is exactly 20 uppercase alphanumeric characters (ISO 17442)
    certainty: 85
  - not_null: action_taken
    certainty: 90
  - enum: {col: action_taken, values: ['1', '2', '3', '4', '5', '6', '7', '8']}
    reason: HMDA action_taken is coded 1-8 (originated, approved-not-accepted, denied, withdrawn, incomplete, purchased, preapproval denied/approved)
    certainty: 90
  - enum: {col: loan_type, values: ['1', '2', '3', '4']}
    reason: loan_type codes 1=conventional 2=FHA 3=VA 4=RHS/FSA
    certainty: 88
  - enum: {col: loan_purpose, values: ['1', '2', '31', '32', '4', '5']}
    reason: loan_purpose codes 1/2/31/32/4/5 in the post-2018 schema
    certainty: 80
  - enum: {col: occupancy_type, values: ['1', '2', '3']}
    reason: occupancy_type 1=principal 2=second 3=investment
    certainty: 80
  - enum: {col: conforming_loan_limit, values: ['C', 'NC', 'U', 'NA']}
    reason: derived conforming_loan_limit is C/NC/U/NA
    certainty: 75
    severity: warn
  - not_null: loan_amount
    reason: public LAR reports a (midpoint-rounded) loan amount for every record
    certainty: 78
  - row_count: {min: 1000000}
    reason: the national LAR is ~10-20M loans/year across multiple years unioned
    certainty: 88
  - distinct_count: {col: activity_year, min: 5}
    reason: modern snapshot spans 2018 through the latest released year (>=5 by 2024)
    certainty: 80
    points_outward: true
    severity: warn
