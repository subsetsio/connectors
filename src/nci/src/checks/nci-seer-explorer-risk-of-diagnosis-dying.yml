# compiled by `hardened compile-checks` — post-publish audit of `nci-seer-explorer-risk-of-diagnosis-dying`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [site, sex, stat_type, risk_interval]
checks:
  - kind: unique
    columns: [site, sex, stat_type, risk_interval]
  - kind: not_null
    col: site
  - kind: not_null
    col: sex
  - kind: not_null
    col: stat_type
  - kind: not_null
    col: risk_interval
  - kind: row_floor
    min: 2280
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
