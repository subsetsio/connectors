spec_id: nci-scp-incidence
status: active
tests:
  - not_null: fips
  - not_null: cancer_code
  - not_null: sex_code
  - matches: {col: fips, pattern: '^[0-9]{5}$'}
    reason: State Cancer Profiles reports at US/state level with 5-digit FIPS (state FIPS + 000)
    certainty: 85
  - enum: {col: sex_code, values: ['0', '1', '2']}
    reason: we iterate Both/Male/Female
    certainty: 95
  - unique: [fips, cancer_code, sex_code]
    reason: one row per area x cancer type x sex in the latest 5-year cross-section
    certainty: 85
  - distinct_count: {col: cancer_code, min: 5}
    reason: SCP offers dozens of cancer types; a collapse means the dropdown parse broke
    certainty: 80
