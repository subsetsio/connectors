# compiled by `hardened compile-checks` — post-publish audit of `cms-strr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, cms_certification_number_ccn, zip_code, city, achievement_measure_ratio]
checks:
  - kind: unique
    columns: [address, cms_certification_number_ccn, zip_code, city, achievement_measure_ratio]
  - kind: not_null
    col: address
  - kind: not_null
    col: cms_certification_number_ccn
  - kind: not_null
    col: zip_code
  - kind: not_null
    col: city
  - kind: not_null
    col: achievement_measure_ratio
  - kind: row_floor
    min: 3779
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
