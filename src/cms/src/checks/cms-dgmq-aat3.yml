# compiled by `hardened compile-checks` — post-publish audit of `cms-dgmq-aat3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, sep_1_performance_rate, facility_id, facility_name, sep_1_baseline_rate]
checks:
  - kind: unique
    columns: [address, sep_1_performance_rate, facility_id, facility_name, sep_1_baseline_rate]
  - kind: not_null
    col: address
  - kind: not_null
    col: sep_1_performance_rate
  - kind: not_null
    col: facility_id
  - kind: not_null
    col: facility_name
  - kind: not_null
    col: sep_1_baseline_rate
  - kind: row_floor
    min: 1227
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
