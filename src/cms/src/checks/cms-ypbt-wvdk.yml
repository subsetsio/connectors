# compiled by `hardened compile-checks` — post-publish audit of `cms-ypbt-wvdk`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, facility_id, facility_name, city_town, county_parish]
checks:
  - kind: unique
    columns: [address, facility_id, facility_name, city_town, county_parish]
  - kind: not_null
    col: address
  - kind: not_null
    col: facility_id
  - kind: not_null
    col: facility_name
  - kind: not_null
    col: city_town
  - kind: not_null
    col: county_parish
  - kind: row_floor
    min: 1227
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
