# compiled by `hardened compile-checks` — post-publish audit of `cms-apyc-v239`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [score, state, measure_name, measure_id, condition]
temporal: start_date
checks:
  - kind: unique
    columns: [score, state, measure_name, measure_id, condition]
  - kind: not_null
    col: score
  - kind: not_null
    col: state
  - kind: not_null
    col: measure_name
  - kind: not_null
    col: measure_id
  - kind: not_null
    col: condition
  - kind: row_floor
    min: 868
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
