# compiled by `hardened compile-checks` — post-publish audit of `cms-a55e-5b88`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, score, measure_name, measure_code, footnote]
checks:
  - kind: unique
    columns: [state, score, measure_name, measure_code, footnote]
  - kind: not_null
    col: state
  - kind: not_null
    col: score
  - kind: not_null
    col: measure_name
  - kind: not_null
    col: measure_code
  - kind: not_null
    col: footnote
  - kind: row_floor
    min: 577
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
