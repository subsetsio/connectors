# compiled by `hardened compile-checks` — post-publish audit of `cms-5sqm-2qku`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [measure_code, score, start_date, end_date]
temporal: start_date
checks:
  - kind: unique
    columns: [measure_code, score, start_date, end_date]
  - kind: not_null
    col: measure_code
  - kind: not_null
    col: score
  - kind: not_null
    col: start_date
  - kind: not_null
    col: end_date
  - kind: row_floor
    min: 13
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
