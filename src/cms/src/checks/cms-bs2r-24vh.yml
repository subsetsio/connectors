# compiled by `hardened compile-checks` — post-publish audit of `cms-bs2r-24vh`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [number_of_hospitals_same, number_of_hospitals_too_few, state, number_of_hospitals_better, measure_id]
temporal: start_date
checks:
  - kind: unique
    columns: [number_of_hospitals_same, number_of_hospitals_too_few, state, number_of_hospitals_better, measure_id]
  - kind: not_null
    col: number_of_hospitals_same
  - kind: not_null
    col: number_of_hospitals_too_few
  - kind: not_null
    col: state
  - kind: not_null
    col: number_of_hospitals_better
  - kind: not_null
    col: measure_id
  - kind: row_floor
    min: 560
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
