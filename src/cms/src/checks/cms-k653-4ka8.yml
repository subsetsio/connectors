# compiled by `hardened compile-checks` — post-publish audit of `cms-k653-4ka8`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [score, measure_name, measure_id, facility_name, zip_code]
temporal: start_date
checks:
  - kind: unique
    columns: [score, measure_name, measure_id, facility_name, zip_code]
  - kind: not_null
    col: score
  - kind: not_null
    col: measure_name
  - kind: not_null
    col: measure_id
  - kind: not_null
    col: facility_name
  - kind: not_null
    col: zip_code
  - kind: row_floor
    min: 154
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
