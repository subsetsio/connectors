# compiled by `hardened compile-checks` — post-publish audit of `cms-svdt-c123`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [survey_date, cms_certification_number_ccn, type_of_survey, survey_cycle]
temporal: survey_date
checks:
  - kind: unique
    columns: [survey_date, cms_certification_number_ccn, type_of_survey, survey_cycle]
  - kind: not_null
    col: survey_date
  - kind: not_null
    col: cms_certification_number_ccn
  - kind: not_null
    col: type_of_survey
  - kind: not_null
    col: survey_cycle
  - kind: row_floor
    min: 75000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
