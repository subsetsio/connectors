# compiled by `hardened compile-checks` — post-publish audit of `cms-complete-qip-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, pppw_improvement_period_numerator, cms_certification_number_ccn, pppw_achievement_period_numerator, shr_achievement_period_denominator]
temporal: cms_certification_date
checks:
  - kind: unique
    columns: [address, pppw_improvement_period_numerator, cms_certification_number_ccn, pppw_achievement_period_numerator, shr_achievement_period_denominator]
  - kind: not_null
    col: address
  - kind: not_null
    col: pppw_improvement_period_numerator
  - kind: not_null
    col: cms_certification_number_ccn
  - kind: not_null
    col: pppw_achievement_period_numerator
  - kind: not_null
    col: shr_achievement_period_denominator
  - kind: row_floor
    min: 3779
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
