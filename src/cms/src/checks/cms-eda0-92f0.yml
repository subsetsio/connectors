# compiled by `hardened compile-checks` — post-publish audit of `cms-eda0-92f0`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [score, state, measure_code, measure_name, measure_date_range]
checks:
  - kind: unique
    columns: [score, state, measure_code, measure_name, measure_date_range]
  - kind: not_null
    col: score
  - kind: not_null
    col: state
  - kind: not_null
    col: measure_code
  - kind: not_null
    col: measure_name
  - kind: not_null
    col: measure_date_range
  - kind: row_floor
    min: 550
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
