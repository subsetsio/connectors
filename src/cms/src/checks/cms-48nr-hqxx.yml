# compiled by `hardened compile-checks` — post-publish audit of `cms-48nr-hqxx`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, facility_name, facility_id, zip_code, number_of_sampled_patients]
checks:
  - kind: unique
    columns: [address, facility_name, facility_id, zip_code, number_of_sampled_patients]
  - kind: not_null
    col: address
  - kind: not_null
    col: facility_name
  - kind: not_null
    col: facility_id
  - kind: not_null
    col: zip_code
  - kind: not_null
    col: number_of_sampled_patients
  - kind: row_floor
    min: 2316
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
