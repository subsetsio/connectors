# compiled by `hardened compile-checks` — post-publish audit of `transparency-international-cpi-latest-detail`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso3, country, source_name, region]
checks:
  - kind: unique
    columns: [iso3, country, source_name, region]
  - kind: not_null
    col: iso3
  - kind: not_null
    col: country
  - kind: not_null
    col: source_name
  - kind: not_null
    col: region
  - kind: row_floor
    min: 645
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
