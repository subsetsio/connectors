spec_id: gacc-5-imports-and-exports-by-customs-regime
status: active
# Raw long-format melt of GACC monthly statistical tables. Every report type
# shares one schema (report_type, page_year, page_month, row_label, col_index,
# col_header, unit, value_text, value); period/year/month and report_type are
# stamped by the crawl loop, the rest parsed from the HTML table. Assertions are
# authored from that construction, not from observed data.
tests:
  - not_null: report_type
    reason: stamped on every melted row from the node id; null means the writer was bypassed
    certainty: 99
  - not_null: page_year
    reason: the crawl stamps the index-page year on every row
    certainty: 99
  - not_null: page_month
    reason: the crawl stamps the month (from the index anchor) on every row
    certainty: 99
  - not_null: row_label
    reason: melt skips rows with an empty first-column label, so every emitted row has one
    certainty: 95
  - column_type: {col: page_year, type: integer}
    reason: page_year is an int32 stamped by the loop, not parsed text
    certainty: 95
  - between: {col: page_month, lo: 1, hi: 12}
    reason: months are mapped from Jan..Dec anchors to 1..12
    certainty: 97
  - between: {col: page_year, lo: 2018, hi: current_year()}
    reason: the English monthly index exposes years from 2018 to the current year
    certainty: 85
    points_outward: true
    severity: warn
  - not_null: value_text
    reason: every melted cell keeps its raw text (may be empty, never null)
    certainty: 85
    severity: warn
  - row_count: {min: 50}
    reason: each report type stacks many labels x columns x months; a near-empty raw means the crawl or parse broke
    certainty: 75
    severity: warn
