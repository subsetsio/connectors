key: [source_file, sheet_name, row_index, column_index]
temporal: source_year
checks:
  - kind: unique
    columns: [source_file, sheet_name, row_index, column_index]
  - kind: not_null
    col: source_file
  - kind: not_null
    col: sheet_name
  - kind: not_null
    col: row_index
  - kind: not_null
    col: column_index
  - kind: row_floor
    min: 152
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
