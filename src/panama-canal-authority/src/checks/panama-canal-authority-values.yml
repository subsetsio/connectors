# compiled by `hardened compile-checks` — post-publish audit of `panama-canal-authority-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, series_id, label, location_identifier, parameter]
temporal: date
checks:
  - kind: unique
    columns: [date, series_id, label, location_identifier, parameter]
  - kind: not_null
    col: date
  - kind: not_null
    col: series_id
  - kind: not_null
    col: label
  - kind: not_null
    col: location_identifier
  - kind: not_null
    col: parameter
  - kind: row_floor
    min: 1395647
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
