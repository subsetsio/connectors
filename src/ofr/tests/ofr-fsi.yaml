spec_id: ofr-fsi
status: active
tests:
  - freshness: {col: date, reaches: today - 14d}
    reason: OFR FSI is daily business-day data; the latest observation should remain within about two weeks.
    certainty: 90
  - not_null: date
    reason: every FSI row is dated
    certainty: 99
  - matches: {col: date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: FSI CSV publishes ISO YYYY-MM-DD dates
    certainty: 95
  - unique: date
    reason: one FSI observation per trading day
    certainty: 95
  - column_type: {col: ofr_fsi, type: float}
    reason: the headline index is a numeric z-score-like value
    certainty: 95
  - row_count: {min: 6000}
    reason: daily since 2000-01-03 (~6700 rows as of authoring); far fewer means a truncated download
    certainty: 85
  - between: {col: ofr_fsi, lo: -30, hi: 30}
    reason: FSI is a standardized stress index oscillating around 0; values outside +/-30 would signal a unit/parse error
    certainty: 75
    severity: warn
