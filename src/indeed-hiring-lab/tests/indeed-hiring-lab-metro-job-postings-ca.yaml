spec_id: indeed-hiring-lab-metro-job-postings-ca
status: active
tests:
  - row_count: {min: 10000}
    reason: Canadian metro postings is a daily panel over multiple metros.
    certainty: 85
  - not_null: date
  - not_null: Metro
  - unique: [date, Metro]
    reason: one index row per metro-date.
    certainty: 90
  - distinct_count: {col: Metro, min: 20}
    reason: the CA metro panel covers many metro areas.
    certainty: 80
  - freshness: {col: date, reaches: today - 30d}
    reason: job postings tracker is daily and refreshed weekly.
    certainty: 90
    points_outward: true
