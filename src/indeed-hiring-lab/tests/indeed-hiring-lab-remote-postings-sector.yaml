spec_id: indeed-hiring-lab-remote-postings-sector
status: active
tests:
  - row_count: {min: 10000}
    reason: remote postings by sector is a daily country-sector panel.
    certainty: 80
  - not_null: date
  - not_null: jobcountry
  - not_null: normtitlecategory_consistent
  - unique: [date, jobcountry, normtitlecategory_consistent]
    reason: one remote-postings share per country, sector, and date.
    certainty: 90
  - distinct_count: {col: normtitlecategory_consistent, min: 20}
    reason: sector table should cover the broad Indeed sector taxonomy.
    certainty: 80
  - freshness: {col: date, reaches: today - 30d}
    reason: Indeed documents remote work data as daily.
    certainty: 85
    points_outward: true
