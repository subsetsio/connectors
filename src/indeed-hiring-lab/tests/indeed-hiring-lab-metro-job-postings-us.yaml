spec_id: indeed-hiring-lab-metro-job-postings-us
status: active
tests:
  - row_count: {min: 100000}
    reason: US metro postings is a daily panel over hundreds of CBSAs.
    certainty: 85
  - not_null: date
  - not_null: metro
  - not_null: cbsa_code
  - unique: [date, cbsa_code]
    reason: one index row per CBSA-date.
    certainty: 90
