spec_id: jodi-oil-world-monthly
status: active
tests:
  - not_null: REF_AREA
    reason: country/economy code is part of the observation key in the JODI-Oil long table.
    certainty: 95
  - not_null: TIME_PERIOD
    reason: every JODI-Oil observation is monthly.
    certainty: 95
  - not_null: ENERGY_PRODUCT
    reason: product code distinguishes primary and refined oil products in the unioned panel.
    certainty: 95
  - not_null: FLOW_BREAKDOWN
    reason: flow code distinguishes production, demand, trade, refinery and stock measures.
    certainty: 95
  - not_null: UNIT_MEASURE
    reason: JODI publishes the same flow/product observations in explicit units.
    certainty: 95
  - column_type: {col: REF_AREA, type: string}
  - column_type: {col: TIME_PERIOD, type: string}
  - column_type: {col: ENERGY_PRODUCT, type: string}
  - column_type: {col: FLOW_BREAKDOWN, type: string}
  - column_type: {col: UNIT_MEASURE, type: string}
  - column_type: {col: OBS_VALUE, type: string}
  - column_type: {col: ASSESSMENT_CODE, type: string}
  - matches: {col: TIME_PERIOD, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: source CSV uses YYYY-MM monthly periods.
    certainty: 95
  - row_count: {min: 15000000}
    reason: the combined primary and secondary JODI-Oil world CSVs are roughly 18M long-format rows; a much smaller table means a tier or large chunk was lost.
    certainty: 90
  - distinct_count: {col: REF_AREA, min: 90}
    reason: JODI-Oil covers around 100 reporting economies.
    certainty: 90
  - distinct_count: {col: ENERGY_PRODUCT, min: 10}
    reason: the union must include both primary products and multiple refined petroleum products.
    certainty: 90
  - distinct_count: {col: TIME_PERIOD, min: 250}
    reason: monthly history begins in 2002, so a healthy pull spans well over 20 years.
    certainty: 90
  - unique: [REF_AREA, TIME_PERIOD, ENERGY_PRODUCT, FLOW_BREAKDOWN, UNIT_MEASURE]
    reason: one raw observation is expected per country-month-product-flow-unit after unioning the primary and secondary source tiers.
    certainty: 80
  - freshness: {col: TIME_PERIOD, reaches: today - 120d}
    reason: JODI-Oil is updated monthly around the 20th and normally publishes data about one to two months after the reference month; 120 days allows release lag without masking a stalled feed.
    certainty: 85
    points_outward: true
