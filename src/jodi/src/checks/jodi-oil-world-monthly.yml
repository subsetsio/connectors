# compiled by `hardened compile-checks` — post-publish audit of `jodi-oil-world-monthly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, country_code, product, flow, unit]
temporal: month
checks:
  - kind: unique
    columns: [month, country_code, product, flow, unit]
  - kind: not_null
    col: month
  - kind: not_null
    col: country_code
  - kind: not_null
    col: product
  - kind: not_null
    col: flow
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 11167650
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
