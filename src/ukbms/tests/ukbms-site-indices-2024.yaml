spec_id: ukbms-site-indices-2024
status: active
tests:
  - row_count: {min: 750000}
    reason: site indices cover site-species-year abundance index rows across the long UKBMS series
    certainty: 90
  - not_null: SITE_CODE
  - not_null: COUNTRY
  - not_null: SPECIES_CODE
  - not_null: YEAR
  - column_type: {col: YEAR, type: integer}
  - between: {col: YEAR, lo: 1973, hi: 2024}
    certainty: 95
  - at_least: {col: SITE_INDEX, expr: -2}
    certainty: 85
  - freshness: {col: YEAR, reaches: 2024}
    reason: current accepted package is the 1976-2024 annual release
    certainty: 95
    points_outward: true
