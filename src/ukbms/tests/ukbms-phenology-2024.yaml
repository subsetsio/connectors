spec_id: ukbms-phenology-2024
status: active
tests:
  - row_count: {min: 500000}
    reason: phenology package contains site-species-year observations across the long UKBMS series
    certainty: 85
  - not_null: SITENO
  - not_null: SPECIES_NAME
  - not_null: COMMON_NAME
  - not_null: YEAR
  - column_type: {col: YEAR, type: integer}
  - between: {col: YEAR, lo: 1973, hi: 2024}
    certainty: 95
  - between: {col: FIRSTDAY, lo: -366, hi: 366}
    certainty: 85
  - between: {col: LASTDAY, lo: -366, hi: 366}
    certainty: 85
  - relationship: {left: FIRSTDAY, op: <=, right: LASTDAY}
    certainty: 90
  - freshness: {col: YEAR, reaches: 2024}
    reason: current accepted package is the 1976-2024 annual release
    certainty: 95
    points_outward: true
