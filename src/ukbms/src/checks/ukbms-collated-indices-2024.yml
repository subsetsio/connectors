# compiled by `hardened compile-checks` — post-publish audit of `ukbms-collated-indices-2024`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [common_name, species, species_code, year, country]
temporal: year
checks:
  - kind: unique
    columns: [common_name, species, species_code, year, country]
  - kind: not_null
    col: common_name
  - kind: not_null
    col: species
  - kind: not_null
    col: species_code
  - kind: not_null
    col: year
  - kind: not_null
    col: country
  - kind: row_floor
    min: 3875
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
