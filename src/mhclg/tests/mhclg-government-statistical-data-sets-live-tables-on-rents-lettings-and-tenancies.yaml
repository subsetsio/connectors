spec_id: mhclg-government-statistical-data-sets-live-tables-on-rents-lettings-and-tenancies
status: active
tests:
  - not_null: attachment_filename
    reason: every extracted row records the source attachment it came from
    certainty: 99
  - not_null: cells
    reason: each row stores its cell values as a JSON array string; null means the writer drifted
    certainty: 99
  - column_type: {col: row_index, type: integer}
    certainty: 99
  - column_type: {col: n_cols, type: integer}
    certainty: 99
  - column_type: {col: cells, type: string}
    certainty: 99
  - at_least: {col: n_cols, expr: 1}
    reason: rows with zero non-empty cells are dropped in the transform
    certainty: 99
  - row_count: {min: 1}
    reason: this publication exposes at least one parseable CSV/XLS/XLSX/ODS attachment
    certainty: 90
