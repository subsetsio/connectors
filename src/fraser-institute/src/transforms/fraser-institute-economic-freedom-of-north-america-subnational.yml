key: [year, iso_code]
temporal: year
sort: [year, iso_code]
columns:
  - name: year
    type: INTEGER
    description: Report year for the Economic Freedom of North America subnational-government index observation.
  - name: country
    type: VARCHAR
    description: North American country code for the jurisdiction.
  - name: state_province
    type: VARCHAR
    description: Subnational jurisdiction name.
  - name: iso_code
    type: VARCHAR
    description: ISO-style subnational jurisdiction code identifying the province, state, or Mexican state.
  - name: economic_freedom_summary
    type: DOUBLE
    description: Overall subnational-government Economic Freedom of North America score.
  - name: rank
    type: INTEGER
    description: Rank of the jurisdiction in the subnational-government Economic Freedom of North America index for the year.
  - name: quintile
    type: INTEGER
    description: Quintile grouping assigned by the source for the subnational-government index score.
  - name: government_spending
    type: DOUBLE
    description: Area score for government spending.
  - name: taxes
    type: DOUBLE
    description: Area score for taxes.
  - name: labor_market_freedom
    type: DOUBLE
    description: Area score for labor market freedom.
