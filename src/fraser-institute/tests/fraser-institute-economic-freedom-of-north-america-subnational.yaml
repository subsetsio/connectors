spec_id: fraser-institute-economic-freedom-of-north-america-subnational
status: active
tests:
  - not_null: iso_code
    reason: every EFNA jurisdiction-year row carries a subnational ISO code (e.g. CA-AB)
    certainty: 95
  - not_null: state_province
    reason: the subnational-government EFNA index is reported per province/state
    certainty: 95
  - column_type: {col: year, type: integer}
    reason: year is cast to int in the flatten step
    certainty: 95
  - unique: [year, iso_code]
    reason: one row per subnational jurisdiction per report year
    certainty: 85
  - between: {col: year, lo: 1981, hi: current_year()}
    reason: the subnational-government EFNA series runs from 1981 (longer than all-government)
    certainty: 85
  - freshness: {col: year, reaches: 2023}
    reason: the efotw.org full-pull API currently publishes annual EFNA subnational-government observations through the 2023 report year
    certainty: 85
  - at_most: {col: year, expr: current_year()}
    reason: no future projections
    certainty: 85
    points_outward: true
    severity: warn
  - enum: {col: country, values: [CAN, USA, MEX]}
    reason: EFNA covers Canadian provinces, US states, and Mexican states only
    certainty: 85
  - distinct_count: {col: year, min: 35}
    reason: ~43 annual report years 1981-2023
    certainty: 80
  - row_count: {min: 2000}
    reason: ~60 jurisdictions x ~43 years; a big shortfall means a truncated payload
    certainty: 80
