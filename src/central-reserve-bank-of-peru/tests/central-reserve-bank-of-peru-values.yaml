spec_id: central-reserve-bank-of-peru-values
status: active
tests:
  - not_null: series_code
    certainty: 99
  - not_null: date
    reason: observations with an unparseable period label are dropped in transform
    certainty: 95
  - not_null: value
    reason: missing observations (n.d.) are dropped in transform
    certainty: 95
  - column_type: {col: date, type: date}
    certainty: 95
  - column_type: {col: value, type: float}
    certainty: 90
  - unique: [series_code, date]
    reason: one observation per (series, period); dupes mean a batch overlap
    certainty: 80
  - row_count: {min: 1000000}
    reason: ~17k series each with tens-to-thousands of observations
    certainty: 70
  - between: {col: date, lo: '1900-01-01', hi: today}
    reason: BCRP history spans the 20th century to the present; no future-dated observations
    certainty: 80
    points_outward: true
    severity: warn
  - distinct_count: {col: series_code, min: 10000}
    reason: most of the ~17k series should return at least one observation
    certainty: 70
