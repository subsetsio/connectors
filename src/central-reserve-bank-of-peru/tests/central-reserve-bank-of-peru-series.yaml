spec_id: central-reserve-bank-of-peru-series
status: active
tests:
  - not_null: series_code
    reason: every catalog row is a real series with a code
    certainty: 99
  - unique: series_code
    reason: the metadata file has one row per series; dupes mean a parse split a row
    certainty: 95
  - not_null: name
    certainty: 95
  - row_count: {min: 10000}
    reason: BCRPData publishes ~17k series; far fewer means the metadata download truncated
    certainty: 90
  - distinct_count: {col: frequency, min: 4, max: 8}
    reason: four documented frequencies (Mensual/Anual/Trimestral/Diaria)
    certainty: 85
  - distinct_count: {col: category, min: 30}
    reason: ~53 categories in the taxonomy
    certainty: 80
