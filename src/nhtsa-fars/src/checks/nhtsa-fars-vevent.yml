# compiled by `hardened compile-checks` — post-publish audit of `nhtsa-fars-vevent`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, st_case, veh_no, veventnum, case_year]
checks:
  - kind: unique
    columns: [state, st_case, veh_no, veventnum, case_year]
  - kind: not_null
    col: state
  - kind: not_null
    col: st_case
  - kind: not_null
    col: veh_no
  - kind: not_null
    col: veventnum
  - kind: not_null
    col: case_year
  - kind: row_floor
    min: 884654
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
