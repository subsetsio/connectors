# compiled by `hardened compile-checks` — post-publish audit of `nhtsa-fars-nmimpair`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [st_case, per_no, state, case_year, nmimpair]
checks:
  - kind: unique
    columns: [st_case, per_no, state, case_year, nmimpair]
  - kind: not_null
    col: st_case
  - kind: not_null
    col: per_no
  - kind: not_null
    col: state
  - kind: not_null
    col: case_year
  - kind: not_null
    col: nmimpair
  - kind: row_floor
    min: 56957
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
