spec_id: nhtsa-fars-vpictrailerdecode
status: active
tests:
  - not_null: case_year
    reason: case_year is synthesized from the source ZIP year directory on every row; a null means the year-union loop dropped rows.
  - column_type: {col: case_year, type: integer}
    reason: case_year is written as int32; a non-integer type means the parquet schema was built wrong.
  - between: {col: case_year, lo: 1975, hi: current_year()}
    reason: FARS National files start in 1975 and never exceed the current calendar year; out-of-range means a wrong year was stamped.
  - freshness: {col: case_year, reaches: 2024}
    reason: FARS National CSVs are current through case year 2024; a lower maximum means recent annual files were missed.
    certainty: 80
    points_outward: true
  - row_count: {min: 500}
    severity: warn
    certainty: 70
    points_outward: true
    reason: "Table vpictrailerdecode appears in 9 case years (2016-present); at least ~100 rows/year is a low bar, so a lower total means a year silently produced no rows (member-extract or year-union failure)."
