# compiled by `hardened compile-checks` — post-publish audit of `ember-us-yearly`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, year, category, subcategory, variable, unit]
temporal: year
checks:
  - kind: unique
    columns: [state, year, category, subcategory, variable, unit]
  - kind: not_null
    col: state
  - kind: not_null
    col: year
  - kind: not_null
    col: category
  - kind: not_null
    col: subcategory
  - kind: not_null
    col: variable
  - kind: not_null
    col: unit
  - kind: row_floor
    min: 36721
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
