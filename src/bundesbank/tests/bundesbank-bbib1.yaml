spec_id: bundesbank-bbib1
status: active
coverage:
  frozen: true
  reason: historical Bundesbank interest-rate-statistics dataflow; latest published observation is 2003-06 and current rate statistics are covered by other active dataflows
tests:
  - row_count: {min: 1}
    reason: a whole-dataflow SDMX-CSV pull always returns at least one observation; zero rows means the flowRef 404'd or the media type stopped being honoured
    certainty: 95
  - not_null: series_id
    reason: every SDMX observation row carries its BBK_ID series key
    certainty: 95
  - not_null: time_period
    reason: every observation is stamped with a TIME_PERIOD
    certainty: 95
  - not_null: dataflow
    reason: the DATAFLOW column is emitted on every row of the long SDMX-CSV
    certainty: 90
  - column_type: {col: value, type: float}
    reason: OBS_VALUE is parsed to float64 by the fetch fn
    certainty: 95
  - column_type: {col: series_id, type: string}
    reason: BBK_ID is a dotted string key
    certainty: 95
  - column_type: {col: time_period, type: string}
    reason: TIME_PERIOD is kept as the raw SDMX period string (YYYY, YYYY-MM, YYYY-Qn, ...)
    certainty: 90
  - matches: {col: series_id, pattern: 'BBIB1\..*'}
    reason: the BBK_ID series key for dataflow BBIB1 is dotted and prefixed with the dataflow code
    certainty: 80
    severity: warn
  - unique: [series_id, time_period]
    reason: one observation per series per period; a full re-pull overwrites, so duplicates would mean the SDMX response itself carried repeats
    certainty: 80
    severity: warn
