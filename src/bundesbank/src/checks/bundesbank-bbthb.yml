# compiled by `hardened compile-checks` — post-publish audit of `bundesbank-bbthb`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period_start, time_period, label, series_key, attributes]
temporal: time_period
checks:
  - kind: unique
    columns: [period_start, time_period, label, series_key, attributes]
  - kind: not_null
    col: period_start
  - kind: not_null
    col: time_period
  - kind: not_null
    col: label
  - kind: not_null
    col: series_key
  - kind: not_null
    col: attributes
  - kind: row_floor
    min: 2190
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
