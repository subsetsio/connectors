# compiled by `hardened compile-checks` — post-publish audit of `dares-dares-tempspartiel-annuelles`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, champ, indicateur, sexe, age, secteur, pcs]
checks:
  - kind: unique
    columns: [date, champ, indicateur, sexe, age, secteur, pcs]
  - kind: not_null
    col: date
  - kind: not_null
    col: champ
  - kind: not_null
    col: indicateur
  - kind: not_null
    col: sexe
  - kind: not_null
    col: age
  - kind: not_null
    col: secteur
  - kind: not_null
    col: pcs
  - kind: row_floor
    min: 441
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
