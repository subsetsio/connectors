# compiled by `hardened compile-checks` — post-publish audit of `dares-dares-defm-flux-france-region-cvs-mens`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, code_departement, departement, motif, code_region]
temporal: date
checks:
  - kind: unique
    columns: [date, code_departement, departement, motif, code_region]
  - kind: not_null
    col: date
  - kind: not_null
    col: code_departement
  - kind: not_null
    col: departement
  - kind: not_null
    col: motif
  - kind: not_null
    col: code_region
  - kind: row_floor
    min: 49822
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
