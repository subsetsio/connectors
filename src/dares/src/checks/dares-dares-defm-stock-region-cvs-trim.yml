# compiled by `hardened compile-checks` — post-publish audit of `dares-dares-defm-stock-region-cvs-trim`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, code_region, code_departement, type_de_donnees, categorie, sexe, tranche_d_age, anciennete]
temporal: date
checks:
  - kind: unique
    columns: [date, code_region, code_departement, type_de_donnees, categorie, sexe, tranche_d_age, anciennete]
  - kind: not_null
    col: date
  - kind: not_null
    col: code_region
  - kind: not_null
    col: code_departement
  - kind: not_null
    col: type_de_donnees
  - kind: not_null
    col: categorie
  - kind: not_null
    col: sexe
  - kind: not_null
    col: tranche_d_age
  - kind: not_null
    col: anciennete
  - kind: row_floor
    min: 138073
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
