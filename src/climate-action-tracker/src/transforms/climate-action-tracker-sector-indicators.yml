# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `climate-action-tracker-sector-indicators`. Regenerate after model-verify.
# caution: Rows mix observed historical values with benchmark and extended-benchmark pathway points; filter scenario before interpreting year as observed history or future benchmark.
# caution: Indicators use different units and normalized scales across sectors, so value and normalized_value should only be compared within a single indicator and unit.
key: [id]
temporal: year
sort: [year, id]
columns:
  - name: id
    type: BIGINT
  - name: scenario
    type: VARCHAR
  - name: sector
    type: VARCHAR
  - name: indicator
    type: VARCHAR
  - name: country
    type: VARCHAR
  - name: year
    type: BIGINT
  - name: historic_year
    type: BIGINT
  - name: variable
    type: VARCHAR
  - name: value
    type: DOUBLE
  - name: unit
    type: VARCHAR
  - name: normalized_value
    type: DOUBLE
  - name: edition
    type: BIGINT
