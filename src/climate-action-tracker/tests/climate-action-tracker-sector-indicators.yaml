spec_id: climate-action-tracker-sector-indicators
status: active
tests:
  - not_null: id
  - not_null: country
  - not_null: scenario
  - not_null: sector
  - not_null: indicator
  - not_null: year
  - unique: id
  - column_type: {col: id, type: integer}
  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}
  - column_type: {col: normalized_value, type: float}
  - column_type: {col: edition, type: integer}
  - row_count: {min: 6000}
    reason: CAT Data Explorer sector-indicators endpoint has about 6.7k records; a much smaller table indicates pagination loss.
    certainty: 90
  - distinct_count: {col: country, min: 30}
    reason: source covers about 35 country/EU codes for sector indicators.
    certainty: 90
  - enum: {col: scenario, values: ["historic", "benchmark", "benchmark_extended"]}
    reason: every row is either an observed historical value or a 1.5C benchmark pathway point; a new scenario is a contract change consumers must be told about before they filter on it.
    certainty: 85
  - between: {col: year, lo: 1990, hi: 2050}
    reason: historical observations start in 1990 and benchmark pathways run out to 2050.
    certainty: 90
  - freshness: {col: historic_year, reaches: 2024}
    reason: historic_year is `year` restricted to the observed (scenario=historic) rows, so its max is the last year CAT has actual sector data for; the benchmark rows pin max(year) at 2050 and would mask any staleness. Sector statistics currently lag by about two years, so require the latest observed history year seen in the live CAT feed. (edition is a republish counter, not a date.)
    certainty: 80
    points_outward: true
