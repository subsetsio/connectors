# compiled by `hardened compile-checks` — post-publish audit of `census-and-statistics-department-935-88001`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [mm, ccyy, ffyy, scheme, stat_var]
checks:
  - kind: unique
    columns: [mm, ccyy, ffyy, scheme, stat_var]
  - kind: not_null
    col: mm
  - kind: not_null
    col: ccyy
  - kind: not_null
    col: ffyy
  - kind: not_null
    col: scheme
  - kind: not_null
    col: stat_var
  - kind: row_floor
    min: 86
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
