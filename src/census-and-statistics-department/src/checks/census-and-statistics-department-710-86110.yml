# compiled by `hardened compile-checks` — post-publish audit of `census-and-statistics-department-710-86110`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ccyy, hc_size, occ, stat_var, stat_pres]
checks:
  - kind: unique
    columns: [ccyy, hc_size, occ, stat_var, stat_pres]
  - kind: not_null
    col: ccyy
  - kind: not_null
    col: hc_size
  - kind: not_null
    col: occ
  - kind: not_null
    col: stat_var
  - kind: not_null
    col: stat_pres
  - kind: row_floor
    min: 128
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
