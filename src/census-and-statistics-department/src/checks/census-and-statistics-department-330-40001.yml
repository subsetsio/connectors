# compiled by `hardened compile-checks` — post-publish audit of `census-and-statistics-department-330-40001`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ccyy, mm, ind, stat_var, hor]
checks:
  - kind: unique
    columns: [ccyy, mm, ind, stat_var, hor]
  - kind: not_null
    col: ccyy
  - kind: not_null
    col: mm
  - kind: not_null
    col: ind
  - kind: not_null
    col: stat_var
  - kind: not_null
    col: hor
  - kind: row_floor
    min: 2353
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
