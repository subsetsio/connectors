# compiled by `hardened compile-checks` — post-publish audit of `census-and-statistics-department-210-06822`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ccyy, dc, age, sex, stat_var]
checks:
  - kind: unique
    columns: [ccyy, dc, age, sex, stat_var]
  - kind: not_null
    col: ccyy
  - kind: not_null
    col: dc
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: not_null
    col: stat_var
  - kind: row_floor
    min: 9975
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
