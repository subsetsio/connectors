# compiled by `hardened compile-checks` — post-publish audit of `census-and-statistics-department-420-57001`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ebops, ccyy, stat_pres, stat_var]
checks:
  - kind: unique
    columns: [ebops, ccyy, stat_pres, stat_var]
  - kind: not_null
    col: ebops
  - kind: not_null
    col: ccyy
  - kind: not_null
    col: stat_pres
  - kind: not_null
    col: stat_var
  - kind: row_floor
    min: 3660
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
