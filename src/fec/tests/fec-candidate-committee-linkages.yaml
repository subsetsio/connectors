spec_id: fec-candidate-committee-linkages
status: active
tests:
  - row_count: {min: 100}
    reason: FEC publishes candidate-committee linkages for active and recent cycles; fewer rows means the bulk file parse or cycle loop broke.
    certainty: 95
  - not_null: LINKAGE_ID
  - column_type: {col: cycle, type: string}
  - freshness: {col: cycle, reaches: current_year()}
    reason: the active election-cycle bulk file should be present in the rolling four-cycle snapshot.
    certainty: 90
    points_outward: true
