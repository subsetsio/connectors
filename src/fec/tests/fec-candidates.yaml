spec_id: fec-candidates
status: active
tests:
  - row_count: {min: 1000}
    reason: FEC candidate summaries across four federal cycles should contain thousands of rows.
    certainty: 95
  - not_null: CAND_ID
  - column_type: {col: cycle, type: string}
  - freshness: {col: cycle, reaches: current_year()}
    reason: the active election-cycle candidate summary should be present.
    certainty: 90
    points_outward: true
