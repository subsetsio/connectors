# compiled by `hardened compile-checks` — post-publish audit of `fec-independent-expenditures`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [cycle, file_num, tran_id, image_num]
temporal: exp_date
checks:
  - kind: unique
    columns: [cycle, file_num, tran_id, image_num]
  - kind: not_null
    col: cycle
  - kind: not_null
    col: file_num
  - kind: not_null
    col: tran_id
  - kind: not_null
    col: image_num
  - kind: row_floor
    min: 113222
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
