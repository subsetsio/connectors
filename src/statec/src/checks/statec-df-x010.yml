# compiled by `hardened compile-checks` — post-publish audit of `statec-df-x010`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [surface_area_surface_area, specification_specification]
checks:
  - kind: unique
    columns: [surface_area_surface_area, specification_specification]
  - kind: not_null
    col: surface_area_surface_area
  - kind: not_null
    col: specification_specification
  - kind: row_floor
    min: 125
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
