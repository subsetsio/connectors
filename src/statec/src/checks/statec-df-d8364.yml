    columns: [code_code, activity_activity]
  - kind: not_null
    col: code_code
  - kind: not_null
    col: activity_activity
  - kind: row_floor
    min: 10
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
