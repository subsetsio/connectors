# compiled by `hardened compile-checks` — post-publish audit of `statec-dsd-emploi@df-b3210`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_period_time_period, age_age_class, freq_frequency, sex_sex]
checks:
  - kind: unique
    columns: [time_period_time_period, age_age_class, freq_frequency, sex_sex]
  - kind: not_null
    col: time_period_time_period
  - kind: not_null
    col: age_age_class
  - kind: not_null
    col: freq_frequency
  - kind: not_null
    col: sex_sex
  - kind: row_floor
    min: 200
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
