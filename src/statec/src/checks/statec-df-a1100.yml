# compiled by `hardened compile-checks` — post-publish audit of `statec-df-a1100`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [specification_specification, variable_variable]
checks:
  - kind: unique
    columns: [specification_specification, variable_variable]
  - kind: not_null
    col: specification_specification
  - kind: not_null
    col: variable_variable
  - kind: row_floor
    min: 15
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
