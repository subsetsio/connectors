  - kind: not_null
    col: measure_measure
  - kind: not_null
    col: unit_measure_unit_of_measure
  - kind: not_null
    col: freq_frequency
  - kind: not_null
    col: decimals_decimals
  - kind: row_floor
    min: 4504
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
