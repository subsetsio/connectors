# compiled by `hardened compile-checks` — post-publish audit of `global-health-omicron-usa`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [share, "95ci", day_of_week_ending, usa_or_hhsregion, variant]
checks:
  - kind: unique
    columns: [share, "95ci", day_of_week_ending, usa_or_hhsregion, variant]
  - kind: not_null
    col: share
  - kind: not_null
    col: "95ci"
  - kind: not_null
    col: day_of_week_ending
  - kind: not_null
    col: usa_or_hhsregion
  - kind: not_null
    col: variant
  - kind: row_floor
    min: 627
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
