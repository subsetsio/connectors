# compiled by `hardened compile-checks` — post-publish audit of `coin-metrics-asset-metrics-catalog`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [metric, subcategory, unit, category, type]
checks:
  - kind: unique
    columns: [metric, subcategory, unit, category, type]
  - kind: not_null
    col: metric
  - kind: not_null
    col: subcategory
  - kind: not_null
    col: unit
  - kind: not_null
    col: category
  - kind: not_null
    col: type
  - kind: row_floor
    min: 593
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
