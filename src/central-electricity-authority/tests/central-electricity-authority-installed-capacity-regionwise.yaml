spec_id: central-electricity-authority-installed-capacity-regionwise
status: active
tests:
  - not_null: Month
    reason: every region-wise installed-capacity row carries its Mon-YYYY period; a null means the parse lost the time key
    certainty: 95
  - not_null: Region
    reason: this endpoint is region-wise; every row names a power region
    certainty: 95
  - matches: {col: Month, pattern: '^[A-Za-z]{3}-[0-9]{4}$'}
    reason: period is formatted Mon-YYYY (e.g. Jan-2019) upstream; transform parses it with strptime %b-%Y
    certainty: 85
    severity: warn
  - column_type: {col: Coal, type: string}
    reason: CEA quotes all numeric fields as strings; the transform TRY_CASTs them to DOUBLE. A native number here would mean the source changed encoding
    certainty: 90
  - column_type: {col: Total, type: string}
    reason: capacity totals arrive as quoted strings like '82022.90'
    certainty: 90
  - row_count: {min: 300}
    reason: ~5-6 regions x monthly since Jan-2019 (~490 rows observed); a sharp drop signals truncation
    certainty: 90
  - distinct_count: {col: Region, min: 5}
    reason: India's grid has five regional groupings (Northern/Western/Southern/Eastern/North Eastern); collapse means the region dimension broke
    certainty: 80
    severity: warn
  - unique: [Month, Region]
    reason: one capacity snapshot per region per month; dupes mean a re-pull without overwrite
    certainty: 85
