spec_id: central-electricity-authority-power-supply-position-peak
status: active
tests:
  - not_null: Month
    reason: each power-supply (peak) row carries a Mon-YYYY period
    certainty: 90
  - not_null: State
    reason: peak demand/met is reported per state (plus All India)
    certainty: 90
  - not_null: fy
    reason: rows are grouped by financial year; fy is the flattened object key
    certainty: 90
  - matches: {col: Month, pattern: '^[A-Za-z]{3}-[0-9]{4}$'}
    reason: period is Mon-YYYY; transform parses %b-%Y
    certainty: 80
    severity: warn
  - matches: {col: fy, pattern: '^[0-9]{4}-[0-9]{4}$'}
    reason: financial year is YYYY-YYYY (e.g. 2019-2020)
    certainty: 85
  - column_type: {col: peak_demand, type: string}
    reason: peak figures (MW) arrive as quoted strings; transform TRY_CASTs to DOUBLE
    certainty: 90
  - column_type: {col: peak_met, type: string}
    reason: peak figures arrive as quoted strings
    certainty: 90
  - row_count: {min: 1500}
    reason: ~30+ states x monthly since 2019-20 (~3400 observed); a steep drop signals truncation
    certainty: 90
  - distinct_count: {col: State, min: 20}
    reason: ~36 states/UTs plus All India; far fewer means the state dimension collapsed
    certainty: 80
    severity: warn
