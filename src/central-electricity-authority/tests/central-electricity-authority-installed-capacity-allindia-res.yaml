spec_id: central-electricity-authority-installed-capacity-allindia-res
status: active
tests:
  - not_null: Month
    reason: the all-India RES (renewable) capacity series carries a Mon-YYYY period on every row
    certainty: 95
  - matches: {col: Month, pattern: '^[A-Za-z]{3}-[0-9]{4}$'}
    reason: period is Mon-YYYY; transform parses %b-%Y
    certainty: 85
    severity: warn
  - column_type: {col: solar_power, type: string}
    reason: CEA quotes numerics as strings ('25212.26'); transform TRY_CASTs to DOUBLE
    certainty: 90
  - column_type: {col: wind_power, type: string}
    reason: RES capacity columns arrive as quoted strings
    certainty: 90
  - row_count: {min: 50}
    reason: one all-India RES row per month since Jan-2019 (~65 observed); fewer than ~50 means truncation
    certainty: 90
  - unique: Month
    reason: a single all-India RES snapshot per month; duplicate months mean overwrite did not run
    certainty: 90
