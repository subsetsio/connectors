spec_id: nationwide-hpi-seasonal-regional
status: active
tests:
  - not_null: date
  - not_null: category
  - not_null: measure
  - not_null: value
  - column_type: {col: date, type: date}
  - column_type: {col: value, type: float}
  - column_type: {col: category, type: string}
  - row_count: {min: 10}
    reason: the parser raises on 0 rows; a sub-10-row load means the sheet layout drifted and most rows were skipped
    certainty: 80
  - at_most: {col: date, expr: today}
    reason: HPI never publishes a period-start date in the future
    certainty: 95
    points_outward: true
  - unique: [date, category, measure]
    reason: grain is one value per (period, breakdown, measure); a dup means a region/measure column was double-counted or an overwrite was skipped
    certainty: 85
  - distinct_count: {col: category, min: 2}
    reason: this file breaks the series across regions/occupations/property-classes; a single category means the breakdown header was not parsed
    certainty: 85
  - freshness: {col: date, reaches: today - 150d}
    reason: quarterly HPI release (latest observed Q2 2026 -> 2026-04-01); a stale max = the fetch missed the latest release
    points_outward: true
