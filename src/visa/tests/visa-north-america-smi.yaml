spec_id: visa-north-america-smi
status: active
tests:
  - not_null: date
  - not_null: geography
  - not_null: spending_segment
  - not_null: seasonal_adjustment
  - not_null: index_value
  - column_type: {col: date, type: date}
  - column_type: {col: index_value, type: float}
  - enum: {col: geography, values: ["United States", "Canada"]}
    reason: NA workbook covers only the US and Canada blocks
    certainty: 95
  - enum: {col: spending_segment, values: ["Headline", "Discretionary", "Non-Discretionary"]}
    reason: the three SMI segments published for North America
    certainty: 95
  - enum: {col: seasonal_adjustment, values: ["Seasonally adjusted", "Non-seasonally adjusted"]}
    reason: each NA block carries an SA and an NSA value column
    certainty: 95
  - unique: [date, geography, spending_segment, seasonal_adjustment]
    reason: one index value per geography/segment/adjustment per month; dupes mean a block was double-parsed
    certainty: 90
  - between: {col: index_value, lo: 0, hi: 200}
    reason: SMI is a diffusion index scored 0-200, 100 = neutral
    certainty: 95
  - median_between: {col: index_value, lo: 80, hi: 120}
    reason: index oscillates around the neutral 100 threshold
    certainty: 60
    severity: warn
  - at_least: {col: date, expr: "2014-01-01"}
    reason: NA history starts Jan-2014
    certainty: 90
  - freshness: {col: date, reaches: today - 150d}
    reason: monthly file; latest month should be within ~5 months of today
    certainty: 75
    points_outward: true
    severity: warn
