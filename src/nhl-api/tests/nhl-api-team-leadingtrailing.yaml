spec_id: nhl-api-team-leadingtrailing
status: active
tests:
  - not_null: teamId
    reason: every team stat row keys off teamId
    certainty: 90
  - not_null: seasonId
  - column_type: {col: seasonId, type: integer}
  - between: {col: seasonId, lo: 19171918, hi: 20262027}
    reason: NHL seasons run 1917-18 through the current 2025-26 season
    certainty: 95
  - enum: {col: gameTypeId, values: [2, 3]}
    reason: we fetch and tag only regular season (2) and playoffs (3)
    certainty: 95
