spec_id: federal-reserve-bank-of-atlanta-gdpnow
status: active
tests:
  - not_null: date
  - column_type: {col: gdp_forecast, type: float}
  - between: {col: gdp_forecast, lo: -40, hi: 40}
    reason: annualized real GDP growth nowcast in percent; outside +/-40 would signal a parse/unit error
    certainty: 75
    severity: warn
  - row_count: {min: 500}
    reason: established Atlanta Fed product with years of history; far fewer rows means a truncated or failed download
    certainty: 85
