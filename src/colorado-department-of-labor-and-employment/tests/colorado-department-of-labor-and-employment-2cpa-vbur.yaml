spec_id: colorado-department-of-labor-and-employment-2cpa-vbur
status: active
tests:
  - not_null: periodyear
    reason: every personal-income row is stamped with a period year
    certainty: 95
  - not_null: areaname
    reason: income is reported per geographic area
    certainty: 90
  - matches: {col: periodyear, pattern: '^[0-9]{4}$'}
    reason: periodyear is a 4-digit year (Socrata returns it as a string)
    certainty: 90
  - row_count: {min: 100}
    reason: counties x years since 1969 is well into the thousands
    certainty: 85
