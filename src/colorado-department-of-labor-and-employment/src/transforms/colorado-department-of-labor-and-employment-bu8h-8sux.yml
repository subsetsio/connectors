# Population estimates by year for Colorado counties, as published in the 2015
# vintage of this resource. One row per area and year.
key: [area_type, area_code, period_year]
temporal: period_year
sort: [period_year, area_type, area_code]
columns:
  - name: state_abbrev
    type: VARCHAR
    description: Two-letter postal abbreviation of the state the area belongs to ('CO'; 'US' on the national rows).
  - name: state_name
    type: VARCHAR
    description: Name of the state the area belongs to ('Colorado'; 'United States' on the national rows).
  - name: state_fips
    type: BIGINT
    description: FIPS state code (8 for Colorado, 0 for the United States rows).
  - name: area_type
    type: BIGINT
    description: "CDLE geography-level code: 0 = United States, 1 = State, 4 = County. The levels are nested — filter before summing populations."
  - name: area_type_name
    type: VARCHAR
    description: Human-readable name of `area_type` (United States, State, County).
  - name: area_code
    type: BIGINT
    description: CDLE numeric identifier of the geographic area within its `area_type`. Not a FIPS code.
  - name: area_name
    type: VARCHAR
    description: Name of the geographic area (e.g. 'Mesa County', 'Colorado').
  - name: period_year
    type: BIGINT
    description: Calendar year the population is estimated for. This 2015-vintage table carries a long historical back-series (from 1900) and does not extend past 2015.
  - name: population
    type: BIGINT
    description: Resident population of the area in `period_year`, per US Census Bureau estimates (the sole source in this table).
