# QCEW employer/employment/wage counts by industry and ownership for Colorado areas.
# One row per area, period, industry code and ownership code.
# industry_code and ownership_code stay VARCHAR: their leading zeros ('00') and the
# 'G0' government rollup are meaningful and would be destroyed by a numeric cast.
key: [area_type, area_code, period_year, period_type, period, industry_code, ownership_code]
temporal: period_year
sort: [period_year, period, area_type, area_code, industry_code, ownership_code]
columns:
  - name: area_type
    type: BIGINT
    description: "CDLE geography-level code: 1 = State, 4 = County. State rows are aggregates of the county rows — filter before summing."
  - name: area_type_name
    type: VARCHAR
    description: Human-readable name of `area_type` ('State' or 'County').
  - name: area_code
    type: BIGINT
    description: CDLE numeric identifier of the geographic area within its `area_type`. Not a FIPS code.
  - name: area_name
    type: VARCHAR
    description: Name of the geographic area (e.g. 'El Paso County', 'Colorado').
  - name: period_year
    type: BIGINT
    description: Calendar year of the observation.
  - name: period_type
    type: BIGINT
    description: "Observation frequency: 1 = Annual (with `period` = 0), 2 = Quarterly (with `period` = 1..4). Annual rows aggregate the quarterly rows — filter this column before summing `total_wages` or averaging employment."
  - name: period_type_name
    type: VARCHAR
    description: Human-readable name of `period_type` ('Annual' or 'Quarterly').
  - name: period
    type: BIGINT
    description: Quarter number 1-4 for quarterly rows; 0 for annual rows.
  - name: industry_code
    type: VARCHAR
    description: "NAICS-derived CDLE industry code. A hierarchy that includes explicit aggregate rows: '00' = Total, All Industries and Ownerships and '10' = Total, All Industries sit above the detailed sectors. Filter to one level before summing."
  - name: industry_title
    type: VARCHAR
    description: Name of the industry identified by `industry_code`.
  - name: ownership_code
    type: VARCHAR
    description: "Ownership sector: '00' = Aggregate of all types, '10' = Federal Government, '20' = State Government, '30' = Local Government, '50' = Private, '80' and 'G0' = Total Government. The aggregate and total-government codes are rollups of the others — filter before summing."
  - name: ownership_title
    type: VARCHAR
    description: Name of the ownership sector identified by `ownership_code`.
  - name: preliminary
    type: BOOLEAN
    description: Whether the figures are still preliminary and subject to revision in a later release.
  - name: firms
    type: BIGINT
    description: Number of distinct firms (legal employing entities) covered by unemployment insurance in this cell.
  - name: establishments
    type: BIGINT
    description: Number of establishments (physical worksites) covered by unemployment insurance in this cell. A firm may operate several establishments.
  - name: average_employment
    type: BIGINT
    description: Average monthly covered employment over the period.
  - name: month1_employment
    type: BIGINT
    description: Covered employment in the first month of the period (pay period including the 12th of the month).
  - name: month2_employment
    type: BIGINT
    description: Covered employment in the second month of the period.
  - name: month3_employment
    type: BIGINT
    description: Covered employment in the third month of the period.
  - name: top_employer_average_employment
    type: BIGINT
    description: Average employment of the largest employer in this cell, published by the source as a disclosure-related concentration measure.
  - name: total_wages
    type: BIGINT
    description: Total wages paid to covered employees during the period, in current US dollars.
  - name: average_weekly_wage
    type: BIGINT
    description: Average weekly wage per covered employee, in current US dollars. An average — aggregate it as a mean weighted by `average_employment`, never a sum.
  - name: taxable_wages
    type: BIGINT
    description: Portion of `total_wages` subject to unemployment insurance tax, in current US dollars.
  - name: contributions
    type: BIGINT
    description: Unemployment insurance contributions paid by employers on `taxable_wages`, in current US dollars.
