spec_id: mpa-singapore-d-1714a141d8bbf1996965eb3f71565525
status: active
tests:
- not_null: date
  reason: every row carries its observation period; a null date means the period parse failed
  certainty: 95
- column_type:
    col: date
    type: date
  reason: the fetch fn normalizes the source month/year string to a period-end date32
  certainty: 95
- unique:
  - date
  - category
  reason: one row per date + category; duplicates mean a full-snapshot CSV was appended instead of overwritten
  certainty: 90
- between:
    col: date
    lo: '2002-01-01'
    hi: today
  reason: annual series begins 2002 on data.gov.sg; no observation can post-date the run
  certainty: 90
- freshness:
    col: date
    reaches: today - 400d
  reason: MPA refreshes this annual series continuously; a stale max means the feed stopped advancing (bound allows for period-end dating + publication lag)
  certainty: 80
  points_outward: true
- row_count:
    min: 50
  reason: annual coverage since 2002 implies at least this many rows; far fewer means a truncated download
  certainty: 75
- not_null: category
  reason: category is a breakdown dimension present on every row
  certainty: 90
- distinct_count:
    col: category
    min: 2
  reason: the source publishes several category categories; a collapse to one means the dimension was lost
  certainty: 75
- column_type:
    col: number_of_tankers
    type: float
  reason: number_of_tankers is a numeric measure coerced to float64 in the fetch fn
  certainty: 90
- column_type:
    col: gross_tonnage
    type: float
  reason: gross_tonnage is a numeric measure coerced to float64 in the fetch fn
  certainty: 90
