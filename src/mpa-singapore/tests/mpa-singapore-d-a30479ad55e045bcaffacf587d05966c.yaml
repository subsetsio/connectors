spec_id: mpa-singapore-d-a30479ad55e045bcaffacf587d05966c
status: active
tests:
- not_null: date
  reason: every row carries its observation period; a null date means the period parse failed
  certainty: 95
- column_type:
    col: date
    type: date
  reason: the fetch fn normalizes the source month/year string to a period-end date32
  certainty: 95
- unique:
  - date
  - cargo_type_primary
  - cargo_type_secondary
  reason: one row per date + cargo_type_primary + cargo_type_secondary; duplicates mean a full-snapshot CSV was appended instead of overwritten
  certainty: 90
- between:
    col: date
    lo: '1995-01-01'
    hi: today
  reason: annual series begins 1995 on data.gov.sg; no observation can post-date the run
  certainty: 90
- freshness:
    col: date
    reaches: today - 400d
  reason: MPA refreshes this annual series continuously; a stale max means the feed stopped advancing (bound allows for period-end dating + publication lag)
  certainty: 80
  points_outward: true
- row_count:
    min: 80
  reason: annual coverage since 1995 implies at least this many rows; far fewer means a truncated download
  certainty: 75
- not_null: cargo_type_primary
  reason: cargo_type_primary is a breakdown dimension present on every row
  certainty: 90
- not_null: cargo_type_secondary
  reason: cargo_type_secondary is a breakdown dimension present on every row
  certainty: 90
- distinct_count:
    col: cargo_type_primary
    min: 2
  reason: the source publishes several cargo_type_primary categories; a collapse to one means the dimension was lost
  certainty: 75
- column_type:
    col: cargo_throughput
    type: float
  reason: cargo_throughput is a numeric measure coerced to float64 in the fetch fn
  certainty: 90
