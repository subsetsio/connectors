spec_id: eca-d-stations
status: active
tests:
  - not_null: station_id
  - not_null: station_name
  - not_null: country
  - not_null: latitude
  - not_null: longitude
  - column_type: {col: station_id, type: integer}
  - column_type: {col: latitude, type: float}
  - column_type: {col: longitude, type: float}
  - unique: station_id
    reason: the station index carries one row per station
    certainty: 95
  - between: {col: latitude, lo: -90, hi: 90}
    reason: decimal degrees latitude
  - between: {col: longitude, lo: -180, hi: 180}
    reason: decimal degrees longitude
  - row_count: {min: 10000}
    reason: ECA&D indexes ~25,000 stations; a small count means stations.txt parsing broke
    certainty: 85
