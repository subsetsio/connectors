spec_id: global-volcanism-program-smithsonian-votw-holocene-eruptions
status: active
tests:
  - not_null: Eruption_Number
    reason: every eruption event has a GVP eruption number; it is the primary key
    certainty: 95
  - not_null: Volcano_Number
    reason: every eruption is attributed to a volcano (foreign key to the volcanoes layer)
    certainty: 95
  - unique: Eruption_Number
    reason: one row per eruption event; dupes mean the layer was paged/unioned wrong
    certainty: 95
  - matches: {col: Eruption_Number, pattern: '^[0-9]+$'}
    reason: eruption numbers are positive integers, stored as text in raw CSV
    certainty: 90
  - matches: {col: Volcano_Number, pattern: '^[0-9]+$'}
    reason: volcano numbers are positive integers
    certainty: 90
  - matches: {col: ExplosivityIndexMax, pattern: '^[0-8]$'}
    reason: VEI is an integer 0-8 when present (blank/null where unknown; matches applies to non-null values)
    certainty: 80
    severity: warn
  - row_count: {min: 8000}
    reason: GVP records ~11k confirmed Holocene eruptions; a short pull means paging broke
    certainty: 80
