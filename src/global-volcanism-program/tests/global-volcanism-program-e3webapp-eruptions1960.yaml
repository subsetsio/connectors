spec_id: global-volcanism-program-e3webapp-eruptions1960
status: active
tests:
  - not_null: FID
    reason: each E3 eruption feature carries a GeoServer feature id used as the raw row key
    certainty: 90
  - unique: FID
    reason: one row per E3 eruption feature; duplicates would indicate paging or union duplication
    certainty: 90
  - not_null: VolcanoNumber
    reason: every E3 eruption is attributed to a GVP volcano
    certainty: 90
  - nullable: {col: StartDate, max_null_frac: 0.01}
    reason: nearly every E3 eruption carries a start date used as the event time axis, with rare source blanks tolerated
    certainty: 80
  - matches: {col: StartDate, pattern: '^[0-9]{8}$'}
    reason: E3 raw start dates are encoded as YYYYMMDD before the transform casts them to DATE
    certainty: 85
  - matches: {col: EndDate, pattern: '^[0-9]{8}$'}
    reason: E3 raw end dates are encoded as YYYYMMDD before the transform casts them to DATE
    certainty: 80
  - freshness: {col: EndDateYear, reaches: current_year()}
    reason: the E3 app layer tracks recent/ongoing eruption activity, so at least one end year should reach the current calendar year
    certainty: 70
    points_outward: true
  - row_count: {min: 1000}
    reason: the E3 eruptions-since-1960 layer contains thousands of records; a short pull means paging broke
    certainty: 80
