spec_id: obis-datasets
status: active
tests:
  - not_null: dataset_id
  - nullable: {col: title, max_null_frac: 0.01}
    reason: OBIS dataset metadata can include occasional untitled records, but titles should be present for nearly all datasets
    certainty: 85
  - unique: dataset_id
    reason: one row per OBIS dataset; dataset id is the primary key
    certainty: 95
  - row_count: {min: 5000}
    reason: OBIS reports ~6760 datasets
    certainty: 90
  - at_least: {col: records, expr: 0}
    reason: per-dataset record counts are non-negative
    certainty: 85
    severity: warn
  - freshness: {col: updated, reaches: today - 400d}
    reason: the OBIS dataset catalog is actively maintained; the latest updated timestamp should be within roughly the last year
    certainty: 80
