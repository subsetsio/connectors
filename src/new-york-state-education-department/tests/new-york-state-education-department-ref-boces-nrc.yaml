spec_id: new-york-state-education-department-ref-boces-nrc
status: active
tests:
  - not_null: report_year
    reason: report_year is injected from the source file's school year; every row has it.
    certainty: 99
  - column_type: {col: report_year, type: integer}
    certainty: 99
  - between: {col: report_year, lo: 1995, hi: 2027}
    reason: NYSED publishes school years from the late 1990s through the current cycle.
    certainty: 90
    points_outward: true
    severity: warn
  - row_count: {min: 50}
    reason: BOCES / Need-Resource-Capacity geography covers every NY institution x year (~14k per year).
    certainty: 85
  - not_null: institution_id
    reason: column institution_id is the institution identifier for this reference table; non-null on every data row.
    certainty: 80
    severity: warn
  - freshness: {col: year, reaches: 2025}
    reason: NYSED publishes annual school-year snapshots; the latest data should reach through the latest expected published school year.
    certainty: 80
    points_outward: true

