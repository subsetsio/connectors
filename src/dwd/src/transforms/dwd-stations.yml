# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `dwd-stations`. Regenerate after model-verify.
# caution: This is the station list of ONE product — the historical daily climate (kl) series. Stations that only ever reported other products (10-minute, hourly, precipitation-only) are absent, so it is not the full DWD network.
# caution: Most rows are closed historic stations: `from_date`/`to_date` bound the station's daily-climate record, and only a station whose `to_date` is near today is still reporting.
# caution: `bundesland` is spelled with umlauts (Baden-Württemberg), whereas `region` in the regional-averages tables uses the transliterated form (Baden-Wuerttemberg) and carries combination regions — the two do not join without normalising.
# caution: `height_m` is the station's elevation above sea level, not the height of the instrument.
key: [station_id]
temporal: to_date
sort: [station_id]
columns:
  - name: station_id
    type: INTEGER
    description: "DWD station identifier (Stations_id), unique within the network"
  - name: from_date
    type: DATE
    description: "First day this station contributed to the historical daily climate (kl) series"
  - name: to_date
    type: DATE
    description: "Last day this station contributed to the historical daily climate (kl) series; a date near today means the station is still reporting"
  - name: height_m
    type: DOUBLE
    description: "Elevation of the station above sea level, in metres"
  - name: latitude
    type: DOUBLE
    description: "WGS84 latitude in decimal degrees"
  - name: longitude
    type: DOUBLE
    description: "WGS84 longitude in decimal degrees"
  - name: name
    type: VARCHAR
    description: "Station name (Stationsname) as published by DWD, in German"
  - name: bundesland
    type: VARCHAR
    description: "German federal state the station is located in, spelled with umlauts (e.g. Baden-Wuerttemberg is written Baden-Württemberg here)"
