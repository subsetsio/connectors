# compiled by `hardened compile-transforms` ‚Äî faithful pass-through
# of raw asset `dwd-regional-seasonal`. Regenerate after model-verify.
# caution: `period` is a meteorological season ('winter', 'spring', 'summer', 'autumn'). DWD's winter of year Y spans December of Y-1 through February of Y, so a winter row is NOT contained in its own calendar year ‚Äî the four seasons of a given `year` do not partition that year.
# caution: `region` mixes three aggregation levels: individual federal states, multi-state combinations (Brandenburg/Berlin, Niedersachsen/Hamburg/Bremen, Thueringen/Sachsen-Anhalt) and the national mean 'Deutschland'. Summing or averaging across `region` double-counts ‚Äî filter to the level you want first.
# caution: `value` carries a different unit per `variable` (air_temperature_mean in ¬∞C, precipitation in mm, sunshine_duration in hours). Never aggregate across `variable`.
# caution: The variables do not share a start year: air_temperature_mean and precipitation reach back to 1881, sunshine_duration begins in 1951. A query spanning the earlier period silently covers only the first two.
# caution: Only three variables are published at this resolution; the 10-variable set exists only in the annual table.
key: [year, region, period, variable]
temporal: year
sort: [year, region, period, variable]
columns:
  - name: variable
    type: VARCHAR
    description: "Climate variable measured by `value`, and therefore its unit: air_temperature_mean, precipitation or sunshine_duration"
  - name: region
    type: VARCHAR
    description: "Area-mean region: a German federal state with umlauts transliterated (Baden-Wuerttemberg, Thueringen), one of three multi-state combinations (Brandenburg/Berlin, Niedersachsen/Hamburg/Bremen, Thueringen/Sachsen-Anhalt), or 'Deutschland' for the national mean"
  - name: year
    type: INTEGER
    description: "Calendar year the season is attributed to; note winter of year Y begins in December of Y-1"
  - name: period
    type: VARCHAR
    description: "Meteorological season: 'winter' (December of the prior year through February), 'spring' (March-May), 'summer' (June-August) or 'autumn' (September-November)"
  - name: value
    type: DOUBLE
    description: "Area-mean value for the region and season, in the unit implied by `variable`: degrees Celsius (air_temperature_mean), millimetres (precipitation) or hours (sunshine_duration)"
