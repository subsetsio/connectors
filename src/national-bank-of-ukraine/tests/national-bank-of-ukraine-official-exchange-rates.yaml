spec_id: national-bank-of-ukraine-official-exchange-rates
status: active
tests:
  - freshness: {col: exchangedate, reaches: today - 14d}
    reason: official exchange rates should include recent business days
    certainty: 90
  - not_null: cc
    reason: every FX quote names its currency (cc, ISO alpha-3)
    certainty: 95
  - not_null: exchangedate
    reason: every FX quote is dated (exchangedate, DD.MM.YYYY)
    certainty: 95
  - matches: {col: exchangedate, pattern: '^[0-9]{2}\.[0-9]{2}\.[0-9]{4}$'}
    reason: exchangedate is a DD.MM.YYYY string
    certainty: 90
  - not_null: rate
    reason: every quote carries a rate
    certainty: 90
  - between: {col: rate, lo: 0, hi: 10000000}
    reason: UAH per unit is positive; pre-1996 karbovanets-era rates are large but bounded
    certainty: 80
    severity: warn
  - row_count: {min: 1}
    certainty: 95
