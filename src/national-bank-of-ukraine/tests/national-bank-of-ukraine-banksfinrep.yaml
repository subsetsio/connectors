spec_id: national-bank-of-ukraine-banksfinrep
status: active
tests:
  - freshness: {col: dt, reaches: today - 120d}
    reason: NBU statistical series should include a recent reporting period within quarterly release slack
    certainty: 85
  - not_null: id_api
    reason: most NBU statistics records are tagged with a series identifier (id_api), but banksfinrep also carries bank-level rows identified by bank dimensions
    certainty: 80
    severity: warn
  - not_null: dt
    reason: every observation is keyed by its date (dt, YYYYMMDD)
    certainty: 95
  - matches: {col: dt, pattern: '^[0-9]{8}$'}
    reason: dt is an 8-character YYYYMMDD date string
    certainty: 90
  - not_null: value
    reason: observations carry a numeric value; persistent nulls signal a parse/format break
    certainty: 80
    severity: warn
  - row_count: {min: 1}
    reason: a populated dataset must return at least one record
    certainty: 95
