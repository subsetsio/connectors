# compiled by `hardened compile-checks` — post-publish audit of `guttmacher-institute-mbu6s`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [case_id, psu_optin, weight_as, infert_fillin, weight_optin]
checks:
  - kind: unique
    columns: [case_id, psu_optin, weight_as, infert_fillin, weight_optin]
  - kind: not_null
    col: case_id
  - kind: not_null
    col: psu_optin
  - kind: not_null
    col: weight_as
  - kind: not_null
    col: infert_fillin
  - kind: not_null
    col: weight_optin
  - kind: row_floor
    min: 3268
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
