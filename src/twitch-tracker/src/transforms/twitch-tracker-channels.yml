# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `twitch-tracker-channels`. Regenerate after model-verify.
# caution: Rows are trailing-30-day summaries captured on a single date, not full historical time series observations.
key: [channel]
temporal: captured_date
sort: [captured_date, channel]
columns:
  - name: channel
    type: VARCHAR
  - name: rank
    type: BIGINT
  - name: minutes_streamed
    type: BIGINT
  - name: avg_viewers
    type: BIGINT
  - name: max_viewers
    type: BIGINT
  - name: hours_watched
    type: BIGINT
  - name: followers
    type: BIGINT
  - name: followers_total
    type: BIGINT
  - name: captured_date
    type: DATE
