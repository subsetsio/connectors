# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `twitch-tracker-games`. Regenerate after model-verify.
# caution: Rows are trailing-30-day summaries captured on a single date, not full historical time series observations.
key: [game]
temporal: captured_date
sort: [captured_date, game]
columns:
  - name: game
    type: VARCHAR
  - name: rank
    type: BIGINT
  - name: avg_viewers
    type: BIGINT
  - name: avg_channels
    type: BIGINT
  - name: hours_watched
    type: BIGINT
  - name: captured_date
    type: DATE
