# compiled by `hardened compile-checks` — post-publish audit of `usgs-methods`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, method_name, method_type, method_category]
checks:
  - kind: unique
    columns: [id, method_name, method_type, method_category]
  - kind: not_null
    col: id
  - kind: not_null
    col: method_name
  - kind: not_null
    col: method_type
  - kind: not_null
    col: method_category
  - kind: row_floor
    min: 2020
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
