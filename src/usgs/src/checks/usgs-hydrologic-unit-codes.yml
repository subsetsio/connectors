# compiled by `hardened compile-checks` — post-publish audit of `usgs-hydrologic-unit-codes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, hydrologic_unit_name, hydrologic_unit_classification_code]
checks:
  - kind: unique
    columns: [id, hydrologic_unit_name, hydrologic_unit_classification_code]
  - kind: not_null
    col: id
  - kind: not_null
    col: hydrologic_unit_name
  - kind: not_null
    col: hydrologic_unit_classification_code
  - kind: row_floor
    min: 62559
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
