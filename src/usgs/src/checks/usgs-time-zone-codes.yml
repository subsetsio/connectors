# compiled by `hardened compile-checks` — post-publish audit of `usgs-time-zone-codes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [time_zone_name, id, time_zone_description, time_zone_utc_offset]
checks:
  - kind: unique
    columns: [time_zone_name, id, time_zone_description, time_zone_utc_offset]
  - kind: not_null
    col: time_zone_name
  - kind: not_null
    col: id
  - kind: not_null
    col: time_zone_description
  - kind: not_null
    col: time_zone_utc_offset
  - kind: row_floor
    min: 26
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
