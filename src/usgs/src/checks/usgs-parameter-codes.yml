# compiled by `hardened compile-checks` — post-publish audit of `usgs-parameter-codes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [parameter_description, id, parameter_name, unit_of_measure, parameter_group_code]
checks:
  - kind: unique
    columns: [parameter_description, id, parameter_name, unit_of_measure, parameter_group_code]
  - kind: not_null
    col: parameter_description
  - kind: not_null
    col: id
  - kind: not_null
    col: parameter_name
  - kind: not_null
    col: unit_of_measure
  - kind: not_null
    col: parameter_group_code
  - kind: row_floor
    min: 9808
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
