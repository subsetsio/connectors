spec_id: usgs-continuous
# Continuous (15-minute) sensor readings, published as a recent rolling window
# (WINDOW_DAYS=1) because the national corpus is unbounded (~5.2M rows/day).
# Raw is stringified NDJSON.
status: active
tests:
  - not_null: time_series_id
    reason: every reading belongs to a time series; the transform drops rows without it.
    certainty: 95
  - not_null: time
    reason: a sensor reading without an instant is meaningless; the transform requires it.
    certainty: 95
  - not_null: monitoring_location_id
    reason: every reading is attributed to a monitoring location.
    certainty: 90
  - unique: [time_series_id, time]
    reason: one value per series per instant; a dupe means the page window overlapped and DISTINCT had to clean it.
    certainty: 80
  - matches: {col: monitoring_location_id, pattern: '^USGS-[0-9A-Za-z]+$'}
    reason: location ids are "USGS-<siteno>".
    certainty: 75
    severity: warn
  - matches: {col: parameter_code, pattern: '^\d{5}$'}
    reason: USGS parameter codes are 5-digit zero-padded (e.g. 00060 discharge, 00065 gage height).
    certainty: 80
    severity: warn
  - freshness: {col: time, reaches: today - 3d}
    reason: a 1-day window pinned to run time should always reach within days of today; staler means the source lagged.
    certainty: 70
    points_outward: true
    severity: warn
  - row_count: {min: 1000}
    reason: a national 1-day window of 15-minute readings is large; near-zero signals an empty or failed crawl.
    certainty: 60
    points_outward: true
    severity: warn
