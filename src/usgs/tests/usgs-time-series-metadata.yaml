spec_id: usgs-time-series-metadata
# One row per published time series: its parameter, statistic, unit, and period
# of record. Raw is stringified NDJSON.
status: active
tests:
  - not_null: id
    reason: every time-series-metadata feature has an id (32-char hex); the transform keys on it.
    certainty: 90
  - unique: id
    reason: one row per time series; a dupe means a paging overlap leaked into raw.
    certainty: 80
  - nullable: {col: parameter_code, max_null_frac: 0.001}
    reason: almost every time series is defined by a parameter; a tiny number of upstream metadata rows omit it.
    certainty: 85
    severity: warn
  - matches: {col: parameter_code, pattern: '^\d{5}$'}
    reason: USGS parameter codes are 5-digit zero-padded (e.g. 00010 water temperature).
    certainty: 80
  - nullable: {col: statistic_id, max_null_frac: 0.35}
    reason: instantaneous and non-statistical time series may omit a statistic id; summarized series carry one.
    certainty: 80
    severity: warn
  - matches: {col: statistic_id, pattern: '^\d{5}$'}
    reason: USGS statistic ids are 5-digit zero-padded (e.g. 00003 mean).
    certainty: 75
    severity: warn
  - freshness: {col: last_modified, reaches: today - 400d}
    reason: the time-series catalog is updated as station/parameter metadata changes; a very old latest modification suggests a stale crawl.
    certainty: 60
    points_outward: true
    severity: warn
  - row_count: {min: 100000}
    reason: the catalog of distinct time series across the network is large; a tiny count signals a partial crawl.
    certainty: 60
    points_outward: true
    severity: warn
