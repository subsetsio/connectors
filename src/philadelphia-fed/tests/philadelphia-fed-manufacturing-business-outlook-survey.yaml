spec_id: philadelphia-fed-manufacturing-business-outlook-survey
status: active
tests:
  - not_null: date
  - not_null: indicator
  - not_null: diffusion_index
  - column_type: {col: date, type: string}
  - column_type: {col: indicator, type: string}
  - column_type: {col: diffusion_index, type: float}
  - unique: [date, indicator]
    reason: MBOS diffusion history has one value per month and indicator.
