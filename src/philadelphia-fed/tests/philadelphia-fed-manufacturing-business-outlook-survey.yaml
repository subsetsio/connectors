  - row_count: {min: 5000}
    reason: monthly MBOS history starts in the late 1960s and includes multiple indicators.
    certainty: 85
  - freshness: {col: date, reaches: today - 90d}
    reason: MBOS is monthly, so max date should be within roughly three months.
    certainty: 85
    points_outward: true
