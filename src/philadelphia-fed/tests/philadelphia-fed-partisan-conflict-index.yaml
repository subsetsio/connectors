spec_id: philadelphia-fed-partisan-conflict-index
coverage:
  frozen: true
  reason: The Philadelphia Fed sunsetted the Partisan Conflict Index as of July 2025 and keeps the data posted for archival use.
status: active
tests:
  - not_null: date
  - not_null: partisan_conflict_index
  - column_type: {col: date, type: string}
  - column_type: {col: partisan_conflict_index, type: float}
  - unique: date
    reason: the Partisan Conflict Index publishes one monthly value per date.
    certainty: 95
  - row_count: {min: 400}
    reason: monthly history starts in the early 1980s.
    certainty: 90
