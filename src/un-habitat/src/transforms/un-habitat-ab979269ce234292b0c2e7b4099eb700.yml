# Share of population living in urban areas at mid-year, by country or area,
# 2000-2050. Reshaped from the source's wide Y2000..Y2050 columns to one row
# per (area, year). Renamed: Region__subregion__country_or_a -> area.
key: [area, year]
temporal: year
sort: [year, area]
columns:
  - name: area
    type: VARCHAR
    description: Country, or an M49 region / sub-region aggregate - the source publishes both in this one column (e.g. "Western Asia" sits beside "Armenia"). Filter to the level you want before averaging, or regions are weighted alongside their own members. Names are the source's own and are not harmonised to ISO codes.
  - name: year
    type: BIGINT
    description: Mid-year of observation, parsed from the source's column name (Y2000 -> 2000). Five-year steps from 2000 to 2050; 2025 onward are projections rather than observations.
  - name: urban_population_percent
    type: DOUBLE
    description: Percentage of the area's total population residing in urban areas at mid-year. A share of each area's own population, so values cannot be summed across areas. Underlying source is the UN World Urbanization Prospects, 2018 revision.
