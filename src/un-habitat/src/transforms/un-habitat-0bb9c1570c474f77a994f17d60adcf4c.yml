# Basic services indicators by city and country, 1990-2019.
# Renamed from the source: Region -> m49_region, Region_City -> area_type,
# Region_City_Name -> area_name, Value -> value_percent (the source's title
# states the unit; no per-row unit column exists).
# ArcGIS provenance columns (source_item_id/title/type/kind/name) are constant
# for this table and source_row_number is a synthetic counter; all dropped.
key: [object_id]
temporal: year
sort: [year, object_id]
columns:
  - name: object_id
    type: BIGINT
    description: ArcGIS feature id. The only column that identifies a row - the source stacks differing observations under identical (area_name, country, indicator, year, source) labels. Regenerated by the publisher on re-release, so it is not a stable identifier across versions.
  - name: continent
    type: VARCHAR
    description: Continent the country sits in, as labelled by the source.
  - name: m49_classification
    type: VARCHAR
    description: UN M49 broad classification, e.g. "Sub-Saharan Africa".
  - name: m49_region
    type: VARCHAR
    description: UN M49 sub-region, e.g. "Middle Africa". Narrower than m49_classification.
  - name: country
    type: VARCHAR
    description: Country name as published by UN-Habitat; not harmonised to ISO codes.
  - name: area_type
    type: VARCHAR
    description: Administrative level the row reports. "National" marks a country total; the rest are sub-national levels the source names in its own vocabulary (City, Municipality, Region, Province, District, Ward, Canton, Parish and others). Filter this before aggregating or national totals are counted alongside their own sub-areas.
  - name: area_name
    type: VARCHAR
    description: Name of the area at area_type. For area_type='National' this repeats the country.
  - name: year
    type: BIGINT
    description: Observation year, 1990-2019.
  - name: source
    type: VARCHAR
    description: Survey programme the observation came from - UN-Habitat's compilation of DHS, Census, MICS or BMTHS. Values from different programmes are not necessarily comparable.
  - name: indicator
    type: VARCHAR
    description: The measured basic-services category, spelled out in full (e.g. "Access to basic drinking water services (Improved water source is available with collection time no more than 30 minutes for a round trip)"). Mixes component categories with their own roll-ups ("Total piped", "Total Improved water"), so summing across indicators double-counts.
  - name: value_percent
    type: DOUBLE
    description: Share of the area's population in the indicator category, in percent (0-100).
