spec_id: department-for-transport-region-traffic-by-road-type
status: active
tests:
  - not_null: region_id
  - not_null: year
  - not_null: road_category_id
  - between: {col: year, lo: 1993, hi: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
  - unique: [region_id, year, road_category_id]
    reason: one row per region, year and road category
    certainty: 82
  - at_least: {col: all_motor_vehicles, expr: 0}
    certainty: 95
