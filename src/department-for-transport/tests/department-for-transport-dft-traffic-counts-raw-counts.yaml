spec_id: department-for-transport-dft-traffic-counts-raw-counts
status: active
tests:
  - not_null: count_point_id
  - not_null: count_date
  - column_type: {col: hour, type: integer}
    certainty: 88
  - between: {col: hour, lo: 0, hi: 23}
    reason: raw counts are bucketed by hour of day
    certainty: 80
  - between: {col: year, lo: 2000, hi: current_year()}
    certainty: 85
    points_outward: true
    severity: warn
  - at_least: {col: all_motor_vehicles, expr: 0}
    certainty: 95
