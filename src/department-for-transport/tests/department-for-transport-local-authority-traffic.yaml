spec_id: department-for-transport-local-authority-traffic
status: active
tests:
  - not_null: local_authority_id
  - not_null: year
  - column_type: {col: year, type: integer}
    certainty: 90
  - between: {col: year, lo: 1993, hi: current_year()}
    reason: local-authority aggregates start in 1993 per the road-traffic docs
    certainty: 85
    points_outward: true
    severity: warn
  - unique: [local_authority_id, year]
    reason: one aggregate row per local authority per year
    certainty: 85
  - at_least: {col: all_motor_vehicles, expr: 0}
    certainty: 95
