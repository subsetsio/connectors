# compiled by `hardened compile-checks` — post-publish audit of `wto-batis-bpm6`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reporter, type_reporter, partner, type_partner, flow, item_code, type_item, year]
temporal: year
checks:
  - kind: unique
    columns: [reporter, type_reporter, partner, type_partner, flow, item_code, type_item, year]
  - kind: not_null
    col: reporter
  - kind: not_null
    col: type_reporter
  - kind: not_null
    col: partner
  - kind: not_null
    col: type_partner
  - kind: not_null
    col: flow
  - kind: not_null
    col: item_code
  - kind: not_null
    col: type_item
  - kind: not_null
    col: year
  - kind: row_floor
    min: 24802170
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
