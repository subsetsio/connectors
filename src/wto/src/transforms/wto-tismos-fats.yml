# Provisional pair: authored so the download node has a consumer and the graph
# validates. It will be regenerated by `compile-transforms` from the settled model.
key: [flow, reporter, partner, indicator, year]
temporal: year
sort: [year, flow, reporter, partner, indicator]
columns:
  - name: flow
    type: VARCHAR
    description: "Trade flow leg: M = imports, X = exports."
  - name: reporter
    type: VARCHAR
    description: Reporting economy, ISO 3166-1 alpha-2 code.
  - name: partner
    type: VARCHAR
    description: Partner aggregate, coded (WL = world).
  - name: indicator
    type: VARCHAR
    description: EBOPS 2010 service category code (e.g. F = transport, S = other business services).
  - name: year
    type: INTEGER
    description: Observation year, parsed from the source YEAR field.
  - name: value
    type: DOUBLE
    description: Services supplied through mode 3 (commercial presence / FATS), in millions of US dollars.
  - name: method
    type: VARCHAR
    description: WTO estimation-method code for the observation; NULL where the source left it blank.
