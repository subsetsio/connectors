# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `wto-tismos`. Regenerate after model-verify.
# caution: Imports and exports are combined in one table; filter the flow column before directional analysis.
# caution: The mode-of-supply dimension carries distinct measures for the same reporter, partner, indicator, and year.
key: [flow, reporter, partner, indicator, year, mode]
temporal: year
sort: [year, flow, reporter, partner, indicator, mode]
columns:
  - name: flow
    type: VARCHAR
  - name: reporter
    type: VARCHAR
  - name: partner
    type: VARCHAR
  - name: indicator
    type: VARCHAR
  - name: year
    type: BIGINT
  - name: mode
    type: VARCHAR
  - name: value
    type: DOUBLE
  - name: meth
    type: VARCHAR
