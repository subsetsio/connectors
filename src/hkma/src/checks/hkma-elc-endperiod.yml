# compiled by `hardened compile-checks` — post-publish audit of `hkma-elc-endperiod`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [name_tc, name_en, end_of_month, type_tc, type_en]
temporal: end_of_month
checks:
  - kind: unique
    columns: [name_tc, name_en, end_of_month, type_tc, type_en]
  - kind: not_null
    col: name_tc
  - kind: not_null
    col: name_en
  - kind: not_null
    col: end_of_month
  - kind: not_null
    col: type_tc
  - kind: not_null
    col: type_en
  - kind: row_floor
    min: 9001
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
