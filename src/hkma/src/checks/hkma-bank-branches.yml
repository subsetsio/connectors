# compiled by `hardened compile-checks` — post-publish audit of `hkma-bank-branches`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [address, latitude, branch_name, district, bank_name]
checks:
  - kind: unique
    columns: [address, latitude, branch_name, district, bank_name]
  - kind: not_null
    col: address
  - kind: not_null
    col: latitude
  - kind: not_null
    col: branch_name
  - kind: not_null
    col: district
  - kind: not_null
    col: bank_name
  - kind: row_floor
    min: 525
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
