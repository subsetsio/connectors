# compiled by `hardened compile-checks` — post-publish audit of `hkma-daily-interbank-liquidity`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [end_of_date, interest_payment_issuance_efbn_u]
temporal: end_of_date
checks:
  - kind: unique
    columns: [end_of_date, interest_payment_issuance_efbn_u]
  - kind: not_null
    col: end_of_date
  - kind: not_null
    col: interest_payment_issuance_efbn_u
  - kind: row_floor
    min: 3140
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
