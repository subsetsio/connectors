# compiled by `hardened compile-checks` — post-publish audit of `hkma-govbond-tender-results`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [issue_date, issue_number, expected_maturity_date, segment, ni_ro]
temporal: issue_date
checks:
  - kind: unique
    columns: [issue_date, issue_number, expected_maturity_date, segment, ni_ro]
  - kind: not_null
    col: issue_date
  - kind: not_null
    col: issue_number
  - kind: not_null
    col: expected_maturity_date
  - kind: not_null
    col: segment
  - kind: not_null
    col: ni_ro
  - kind: row_floor
    min: 57
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
