    columns: [row_number, vorname_normalisiert, politischer_bezirk, jahr, geschlecht]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: vorname_normalisiert
  - kind: not_null
    col: politischer_bezirk
  - kind: not_null
    col: jahr
  - kind: not_null
    col: geschlecht
  - kind: row_floor
    min: 670637
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
