# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-natec02-natec02-1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, reference_period, number_of_employees]
checks:
  - kind: unique
    columns: [row_number, reference_period, number_of_employees]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: reference_period
  - kind: not_null
    col: number_of_employees
  - kind: row_floor
    min: 42
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
