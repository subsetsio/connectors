# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-fhsstud-ext-fhs-s-2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [semester, row_number, place_of_study]
checks:
  - kind: unique
    columns: [semester, row_number, place_of_study]
  - kind: not_null
    col: semester
  - kind: not_null
    col: row_number
  - kind: not_null
    col: place_of_study
  - kind: row_floor
    min: 25
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
