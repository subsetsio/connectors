# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-gvd-fahrten-gvd-f-3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, time_period, loading_port_partly_abo, unloading_port_partly_abo]
checks:
  - kind: unique
    columns: [row_number, time_period, loading_port_partly_abo, unloading_port_partly_abo]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: time_period
  - kind: not_null
    col: loading_port_partly_abo
  - kind: not_null
    col: unloading_port_partly_abo
  - kind: row_floor
    min: 19508
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
