# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-bildungsausgaben-bildaus-2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, time, educational_institution, regional_breakdown]
checks:
  - kind: unique
    columns: [row_number, time, educational_institution, regional_breakdown]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: time
  - kind: not_null
    col: educational_institution
  - kind: not_null
    col: regional_breakdown
  - kind: row_floor
    min: 4529
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
