# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-desi-unt-bkl-desi-unt-bkl-1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, federal_state, size, time]
checks:
  - kind: unique
    columns: [row_number, federal_state, size, time]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: federal_state
  - kind: not_null
    col: size
  - kind: not_null
    col: time
  - kind: row_floor
    min: 40
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
