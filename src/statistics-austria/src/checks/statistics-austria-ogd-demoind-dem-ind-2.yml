# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-demoind-dem-ind-2`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, year, province, indicator]
checks:
  - kind: unique
    columns: [row_number, year, province, indicator]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: year
  - kind: not_null
    col: province
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 5438
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
