# compiled by `hardened compile-checks` — post-publish audit of `statistics-austria-ogd-ind003-hvd-ind-1`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row_number, age, time, nuts_regions, gender]
checks:
  - kind: unique
    columns: [row_number, age, time, nuts_regions, gender]
  - kind: not_null
    col: row_number
  - kind: not_null
    col: age
  - kind: not_null
    col: time
  - kind: not_null
    col: nuts_regions
  - kind: not_null
    col: gender
  - kind: row_floor
    min: 22080
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
