    col: row_number
  - kind: not_null
    col: code
  - kind: not_null
    col: ebene
  - kind: not_null
    col: source_file
  - kind: row_floor
    min: 8239
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
