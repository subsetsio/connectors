# compiled by `hardened compile-checks` — post-publish audit of `reuters-institute-survey-observations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [option_id, country_code, year, split_value, question_id]
temporal: year
checks:
  - kind: unique
    columns: [option_id, country_code, year, split_value, question_id]
  - kind: not_null
    col: option_id
  - kind: not_null
    col: country_code
  - kind: not_null
    col: year
  - kind: not_null
    col: split_value
  - kind: not_null
    col: question_id
  - kind: row_floor
    min: 230192
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
