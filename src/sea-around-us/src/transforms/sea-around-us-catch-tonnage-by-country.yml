# faithful pass-through of Sea Around Us raw catch data.
# caution: Region families overlap; filter region_type before aggregating across regions.
key: [region_type, region_id, year, fishing_country]
temporal: year
sort: [year, region_type, region_id, fishing_country]
columns:
  - name: region_type
    type: VARCHAR
    description: Sea Around Us region family for this observation.
  - name: region_id
    type: BIGINT
    description: Region identifier within the Sea Around Us region family.
  - name: region_name
    type: VARCHAR
    description: Sea Around Us region display name.
  - name: year
    type: BIGINT
    description: Observation year.
  - name: fishing_country
    type: VARCHAR
    description: Fishing country or fishing entity label reported by Sea Around Us.
  - name: catch_tonnes
    type: DOUBLE
    description: Reconstructed marine fisheries catch weight in tonnes live weight.
