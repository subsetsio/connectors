# compiled by `hardened compile-checks` — post-publish audit of `sea-around-us-catch-tonnage-by-reporting-status`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [region_type, region_id, year, reporting_status]
temporal: year
checks:
  - kind: unique
    columns: [region_type, region_id, year, reporting_status]
  - kind: not_null
    col: region_type
  - kind: not_null
    col: region_id
  - kind: not_null
    col: year
  - kind: not_null
    col: reporting_status
  - kind: row_floor
    min: 24876
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
