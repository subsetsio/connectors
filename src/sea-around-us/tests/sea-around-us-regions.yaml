spec_id: sea-around-us-regions
status: active
tests:
  - not_null: region_type
  - enum: {col: region_type, values: [eez, lme, rfmo, global]}
    reason: the connector intentionally enumerates spatial catch regions plus the synthetic global region
    certainty: 90
  - not_null: region_id
  - column_type: {col: region_id, type: integer}
  - unique: [region_type, region_id]
    reason: region_type and region_id form the source geography key
    certainty: 95
  - not_null: title
    reason: each region endpoint exposes a title in feature properties
    certainty: 90
  - row_count: {min: 300}
    reason: EEZ, LME, RFMO and global regions should total more than 300 rows
    certainty: 85
