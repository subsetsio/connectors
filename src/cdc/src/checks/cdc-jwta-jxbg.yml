# compiled by `hardened compile-checks` — post-publish audit of `cdc-jwta-jxbg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [weighted_distribution_of_population, unweighted_distribution_of_population, state, agegroup, race_hispanic_origin]
temporal: data_as_of
checks:
  - kind: unique
    columns: [weighted_distribution_of_population, unweighted_distribution_of_population, state, agegroup, race_hispanic_origin]
  - kind: not_null
    col: weighted_distribution_of_population
  - kind: not_null
    col: unweighted_distribution_of_population
  - kind: not_null
    col: state
  - kind: not_null
    col: agegroup
  - kind: not_null
    col: race_hispanic_origin
  - kind: row_floor
    min: 1855
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
