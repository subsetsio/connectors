# compiled by `hardened compile-checks` — post-publish audit of `cdc-fh5p-vkps`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pageviews, visits, weeknum, metricyear]
checks:
  - kind: unique
    columns: [pageviews, visits, weeknum, metricyear]
  - kind: not_null
    col: pageviews
  - kind: not_null
    col: visits
  - kind: not_null
    col: weeknum
  - kind: not_null
    col: metricyear
  - kind: row_floor
    min: 157
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
