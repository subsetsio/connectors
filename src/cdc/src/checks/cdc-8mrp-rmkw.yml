# compiled by `hardened compile-checks` — post-publish audit of `cdc-8mrp-rmkw`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [locationdesc, locationabbr, locationid, yearstart, yearend]
checks:
  - kind: unique
    columns: [locationdesc, locationabbr, locationid, yearstart, yearend]
  - kind: not_null
    col: locationdesc
  - kind: not_null
    col: locationabbr
  - kind: not_null
    col: locationid
  - kind: not_null
    col: yearstart
  - kind: not_null
    col: yearend
  - kind: row_floor
    min: 385
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
