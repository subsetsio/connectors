# compiled by `hardened compile-checks` — post-publish audit of `cdc-pvk6-8bzd`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [denominator, percent, week_ending_date, date_order, race_and_ethnicity]
checks:
  - kind: unique
    columns: [denominator, percent, week_ending_date, date_order, race_and_ethnicity]
  - kind: not_null
    col: denominator
  - kind: not_null
    col: percent
  - kind: not_null
    col: week_ending_date
  - kind: not_null
    col: date_order
  - kind: not_null
    col: race_and_ethnicity
  - kind: row_floor
    min: 616
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
