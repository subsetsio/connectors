# compiled by `hardened compile-checks` — post-publish audit of `cdc-3apk-4u4f`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [total_deaths, covid_19_deaths, age_years, sex]
temporal: data_as_of
checks:
  - kind: unique
    columns: [total_deaths, covid_19_deaths, age_years, sex]
  - kind: not_null
    col: total_deaths
  - kind: not_null
    col: covid_19_deaths
  - kind: not_null
    col: age_years
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 87
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
