# compiled by `hardened compile-checks` — post-publish audit of `cdc-e5zk-7tx5`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month_week_sort_order, month_week_label, month, month_number, season]
checks:
  - kind: unique
    columns: [month_week_sort_order, month_week_label, month, month_number, season]
  - kind: not_null
    col: month_week_sort_order
  - kind: not_null
    col: month_week_label
  - kind: not_null
    col: month
  - kind: not_null
    col: month_number
  - kind: not_null
    col: season
  - kind: row_floor
    min: 88
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
