# compiled by `hardened compile-checks` — post-publish audit of `cdc-hj2x-85ya`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [locationdesc, locationabbr, geolocation, year, quarter]
checks:
  - kind: unique
    columns: [locationdesc, locationabbr, geolocation, year, quarter]
  - kind: not_null
    col: locationdesc
  - kind: not_null
    col: locationabbr
  - kind: not_null
    col: geolocation
  - kind: not_null
    col: year
  - kind: not_null
    col: quarter
  - kind: row_floor
    min: 2581
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
