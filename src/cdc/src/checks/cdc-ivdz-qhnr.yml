# compiled by `hardened compile-checks` — post-publish audit of `cdc-ivdz-qhnr`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [legend, jurisdiction, month, age_group_label, current_season]
checks:
  - kind: unique
    columns: [legend, jurisdiction, month, age_group_label, current_season]
  - kind: not_null
    col: legend
  - kind: not_null
    col: jurisdiction
  - kind: not_null
    col: month
  - kind: not_null
    col: age_group_label
  - kind: not_null
    col: current_season
  - kind: row_floor
    min: 14490
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
