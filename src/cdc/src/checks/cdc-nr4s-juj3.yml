# compiled by `hardened compile-checks` — post-publish audit of `cdc-nr4s-juj3`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [covid_19_deaths, race_or_hispanic_origin_group, age_group, indicator, sex]
temporal: data_as_of
checks:
  - kind: unique
    columns: [covid_19_deaths, race_or_hispanic_origin_group, age_group, indicator, sex]
  - kind: not_null
    col: covid_19_deaths
  - kind: not_null
    col: race_or_hispanic_origin_group
  - kind: not_null
    col: age_group
  - kind: not_null
    col: indicator
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 14
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
