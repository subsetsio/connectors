# compiled by `hardened compile-checks` — post-publish audit of `cdc-ezfr-g6hf`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date_of_death_month, hhsregion, agegroup, date_of_death_year]
temporal: analysisdate
checks:
  - kind: unique
    columns: [date_of_death_month, hhsregion, agegroup, date_of_death_year]
  - kind: not_null
    col: date_of_death_month
  - kind: not_null
    col: hhsregion
  - kind: not_null
    col: agegroup
  - kind: not_null
    col: date_of_death_year
  - kind: row_floor
    min: 1705
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
