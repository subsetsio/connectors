# compiled by `hardened compile-checks` — post-publish audit of `cdc-jkmz-c8jz`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [districtncesid, state, dateclosure, sample_cat, sample_cat_n]
checks:
  - kind: unique
    columns: [districtncesid, state, dateclosure, sample_cat, sample_cat_n]
  - kind: not_null
    col: districtncesid
  - kind: not_null
    col: state
  - kind: not_null
    col: dateclosure
  - kind: not_null
    col: sample_cat
  - kind: not_null
    col: sample_cat_n
  - kind: row_floor
    min: 300
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
