# compiled by `hardened compile-checks` — post-publish audit of `cdc-6rvp-rahv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup, subgroup_id, subgroup_order, footnote_id_list, time_period]
checks:
  - kind: unique
    columns: [subgroup, subgroup_id, subgroup_order, footnote_id_list, time_period]
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: subgroup_id
  - kind: not_null
    col: subgroup_order
  - kind: not_null
    col: footnote_id_list
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 570
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
