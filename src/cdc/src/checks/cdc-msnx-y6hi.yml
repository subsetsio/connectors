# compiled by `hardened compile-checks` — post-publish audit of `cdc-msnx-y6hi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [estimate, week_ending, mmwr_week, race_and_ethnicity, mmwr_year]
checks:
  - kind: unique
    columns: [estimate, week_ending, mmwr_week, race_and_ethnicity, mmwr_year]
  - kind: not_null
    col: estimate
  - kind: not_null
    col: week_ending
  - kind: not_null
    col: mmwr_week
  - kind: not_null
    col: race_and_ethnicity
  - kind: not_null
    col: mmwr_year
  - kind: row_floor
    min: 93
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
