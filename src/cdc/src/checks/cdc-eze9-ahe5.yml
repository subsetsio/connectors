# compiled by `hardened compile-checks` — post-publish audit of `cdc-eze9-ahe5`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [rate_per_100000_visits, month_end, demographics_values, condition, demographics_type]
temporal: month_end
checks:
  - kind: unique
    columns: [rate_per_100000_visits, month_end, demographics_values, condition, demographics_type]
  - kind: not_null
    col: rate_per_100000_visits
  - kind: not_null
    col: month_end
  - kind: not_null
    col: demographics_values
  - kind: not_null
    col: condition
  - kind: not_null
    col: demographics_type
  - kind: row_floor
    min: 5295
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
