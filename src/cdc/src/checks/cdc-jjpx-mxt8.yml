# compiled by `hardened compile-checks` — post-publish audit of `cdc-jjpx-mxt8`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [estimate, week_ending, current_season_week_ending_label, mmwr_week, race_and_ethnicity]
temporal: current_season_week_ending_label
checks:
  - kind: unique
    columns: [estimate, week_ending, current_season_week_ending_label, mmwr_week, race_and_ethnicity]
  - kind: not_null
    col: estimate
  - kind: not_null
    col: week_ending
  - kind: not_null
    col: current_season_week_ending_label
  - kind: not_null
    col: mmwr_week
  - kind: not_null
    col: race_and_ethnicity
  - kind: row_floor
    min: 396
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
