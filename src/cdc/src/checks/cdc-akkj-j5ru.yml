# compiled by `hardened compile-checks` — post-publish audit of `cdc-akkj-j5ru`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [sample_size, estimate, time_period, geography, indicator_category]
checks:
  - kind: unique
    columns: [sample_size, estimate, time_period, geography, indicator_category]
  - kind: not_null
    col: sample_size
  - kind: not_null
    col: estimate
  - kind: not_null
    col: time_period
  - kind: not_null
    col: geography
  - kind: not_null
    col: indicator_category
  - kind: row_floor
    min: 4718
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
