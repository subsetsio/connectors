# compiled by `hardened compile-checks` — post-publish audit of `cdc-ks3g-spdg`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [state, age_group, race_and_hispanic_origin_group]
temporal: data_as_of
checks:
  - kind: unique
    columns: [state, age_group, race_and_hispanic_origin_group]
  - kind: not_null
    col: state
  - kind: not_null
    col: age_group
  - kind: not_null
    col: race_and_hispanic_origin_group
  - kind: row_floor
    min: 3244
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
