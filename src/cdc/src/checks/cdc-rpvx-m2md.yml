# compiled by `hardened compile-checks` — post-publish audit of `cdc-rpvx-m2md`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [upper_confidence_limit, model_based_death_rate, population, standard_deviation, county]
checks:
  - kind: unique
    columns: [upper_confidence_limit, model_based_death_rate, population, standard_deviation, county]
  - kind: not_null
    col: upper_confidence_limit
  - kind: not_null
    col: model_based_death_rate
  - kind: not_null
    col: population
  - kind: not_null
    col: standard_deviation
  - kind: not_null
    col: county
  - kind: row_floor
    min: 29792
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
