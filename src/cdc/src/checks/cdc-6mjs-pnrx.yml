# compiled by `hardened compile-checks` — post-publish audit of `cdc-6mjs-pnrx`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [covid_19_deaths, mmwr_week, end_week, age_group]
temporal: data_as_of
checks:
  - kind: unique
    columns: [covid_19_deaths, mmwr_week, end_week, age_group]
  - kind: not_null
    col: covid_19_deaths
  - kind: not_null
    col: mmwr_week
  - kind: not_null
    col: end_week
  - kind: not_null
    col: age_group
  - kind: row_floor
    min: 25
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
