# compiled by `hardened compile-checks` — post-publish audit of `cdc-mcdp-77g7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reporting_area_sort, reporting_area, mmwr_week, psittacosis_current_week_flag]
checks:
  - kind: unique
    columns: [reporting_area_sort, reporting_area, mmwr_week, psittacosis_current_week_flag]
  - kind: not_null
    col: reporting_area_sort
  - kind: not_null
    col: reporting_area
  - kind: not_null
    col: mmwr_week
  - kind: not_null
    col: psittacosis_current_week_flag
  - kind: row_floor
    min: 1820
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
