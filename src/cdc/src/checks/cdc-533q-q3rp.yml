# compiled by `hardened compile-checks` — post-publish audit of `cdc-533q-q3rp`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [location, antibiotic_class, year, age, sex]
checks:
  - kind: unique
    columns: [location, antibiotic_class, year, age, sex]
  - kind: not_null
    col: location
  - kind: not_null
    col: antibiotic_class
  - kind: not_null
    col: year
  - kind: not_null
    col: age
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 932
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
