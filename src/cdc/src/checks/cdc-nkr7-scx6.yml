# compiled by `hardened compile-checks` — post-publish audit of `cdc-nkr7-scx6`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [percentage_vaccinated, month, race_ethnicity, flu_season]
checks:
  - kind: unique
    columns: [percentage_vaccinated, month, race_ethnicity, flu_season]
  - kind: not_null
    col: percentage_vaccinated
  - kind: not_null
    col: month
  - kind: not_null
    col: race_ethnicity
  - kind: not_null
    col: flu_season
  - kind: row_floor
    min: 140
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
