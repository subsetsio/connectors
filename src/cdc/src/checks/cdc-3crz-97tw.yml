# compiled by `hardened compile-checks` — post-publish audit of `cdc-3crz-97tw`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [row, keyword_search_expanded, title, journal_information, journal]
checks:
  - kind: unique
    columns: [row, keyword_search_expanded, title, journal_information, journal]
  - kind: not_null
    col: row
  - kind: not_null
    col: keyword_search_expanded
  - kind: not_null
    col: title
  - kind: not_null
    col: journal_information
  - kind: not_null
    col: journal
  - kind: row_floor
    min: 826
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
