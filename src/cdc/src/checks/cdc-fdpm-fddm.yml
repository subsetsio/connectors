# compiled by `hardened compile-checks` — post-publish audit of `cdc-fdpm-fddm`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [best_rate_final_year_s, objective_description, hp2020_objective, population_group_with_the_best_rate_baseline_year_s, population_group_with_the_best_rate_final_year_s]
checks:
  - kind: unique
    columns: [best_rate_final_year_s, objective_description, hp2020_objective, population_group_with_the_best_rate_baseline_year_s, population_group_with_the_best_rate_final_year_s]
  - kind: not_null
    col: best_rate_final_year_s
  - kind: not_null
    col: objective_description
  - kind: not_null
    col: hp2020_objective
  - kind: not_null
    col: population_group_with_the_best_rate_baseline_year_s
  - kind: not_null
    col: population_group_with_the_best_rate_final_year_s
  - kind: row_floor
    min: 1015
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
