# compiled by `hardened compile-checks` — post-publish audit of `cdc-qgfq-p8ib`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [case_id, mis_c_onset_month_year, census_region, age_group, pcr_results]
checks:
  - kind: unique
    columns: [case_id, mis_c_onset_month_year, census_region, age_group, pcr_results]
  - kind: not_null
    col: case_id
  - kind: not_null
    col: mis_c_onset_month_year
  - kind: not_null
    col: census_region
  - kind: not_null
    col: age_group
  - kind: not_null
    col: pcr_results
  - kind: row_floor
    min: 4666
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
