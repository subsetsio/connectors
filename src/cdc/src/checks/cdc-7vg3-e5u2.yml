    columns: [fips_county, pop, county_name, prevalence_asd_ci, map_category]
  - kind: not_null
    col: fips_county
  - kind: not_null
    col: pop
  - kind: not_null
    col: county_name
  - kind: not_null
    col: prevalence_asd_ci
  - kind: not_null
    col: map_category
  - kind: row_floor
    min: 197
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
