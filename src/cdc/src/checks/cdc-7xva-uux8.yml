    columns: [week_end, percent_visits, demographics_values, pathogen, demographics_type]
  - kind: not_null
    col: week_end
  - kind: not_null
    col: percent_visits
  - kind: not_null
    col: demographics_values
  - kind: not_null
    col: pathogen
  - kind: not_null
    col: demographics_type
  - kind: row_floor
    min: 6272
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
