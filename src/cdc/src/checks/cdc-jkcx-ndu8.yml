# compiled by `hardened compile-checks` — post-publish audit of `cdc-jkcx-ndu8`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [count, value, character, year, event]
checks:
  - kind: unique
    columns: [count, value, character, year, event]
  - kind: not_null
    col: count
  - kind: not_null
    col: value
  - kind: not_null
    col: character
  - kind: not_null
    col: year
  - kind: not_null
    col: event
  - kind: row_floor
    min: 4294
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
