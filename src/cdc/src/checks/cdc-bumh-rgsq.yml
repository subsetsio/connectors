# compiled by `hardened compile-checks` — post-publish audit of `cdc-bumh-rgsq`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geolocation, locationname, locationid, totalpopulation, measure]
checks:
  - kind: unique
    columns: [geolocation, locationname, locationid, totalpopulation, measure]
  - kind: not_null
    col: geolocation
  - kind: not_null
    col: locationname
  - kind: not_null
    col: locationid
  - kind: not_null
    col: totalpopulation
  - kind: not_null
    col: measure
  - kind: row_floor
    min: 145512
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
