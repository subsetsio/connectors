# compiled by `hardened compile-checks` — post-publish audit of `cdc-fvm6-ic5r`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [table_id, running_total_by_year_range, no_of_illnesses, serotype, year_first_ill]
checks:
  - kind: unique
    columns: [table_id, running_total_by_year_range, no_of_illnesses, serotype, year_first_ill]
  - kind: not_null
    col: table_id
  - kind: not_null
    col: running_total_by_year_range
  - kind: not_null
    col: no_of_illnesses
  - kind: not_null
    col: serotype
  - kind: not_null
    col: year_first_ill
  - kind: row_floor
    min: 1206
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
