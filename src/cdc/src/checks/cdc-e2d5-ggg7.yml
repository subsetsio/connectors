# compiled by `hardened compile-checks` — post-publish audit of `cdc-e2d5-ggg7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [live_births, month_ending_date, month_of_death, subgroup, year_of_death]
temporal: data_as_of
checks:
  - kind: unique
    columns: [live_births, month_ending_date, month_of_death, subgroup, year_of_death]
  - kind: not_null
    col: live_births
  - kind: not_null
    col: month_ending_date
  - kind: not_null
    col: month_of_death
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: year_of_death
  - kind: row_floor
    min: 420
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
