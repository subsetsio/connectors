# compiled by `hardened compile-checks` — post-publish audit of `cdc-8xy9-ubqz`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [subgroup, group, response, round, indicator]
checks:
  - kind: unique
    columns: [subgroup, group, response, round, indicator]
  - kind: not_null
    col: subgroup
  - kind: not_null
    col: group
  - kind: not_null
    col: response
  - kind: not_null
    col: round
  - kind: not_null
    col: indicator
  - kind: row_floor
    min: 399
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
