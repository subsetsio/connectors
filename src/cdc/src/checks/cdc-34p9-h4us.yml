# compiled by `hardened compile-checks` — post-publish audit of `cdc-34p9-h4us`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, series, viewby, yearname, topic]
checks:
  - kind: unique
    columns: [value, series, viewby, yearname, topic]
  - kind: not_null
    col: value
  - kind: not_null
    col: series
  - kind: not_null
    col: viewby
  - kind: not_null
    col: yearname
  - kind: not_null
    col: topic
  - kind: row_floor
    min: 651
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
