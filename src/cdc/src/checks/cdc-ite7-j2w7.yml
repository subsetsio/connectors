# compiled by `hardened compile-checks` — post-publish audit of `cdc-ite7-j2w7`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fips_code, county, cofips, week_ending_date, mmwr_week]
temporal: data_as_of
checks:
  - kind: unique
    columns: [fips_code, county, cofips, week_ending_date, mmwr_week]
  - kind: not_null
    col: fips_code
  - kind: not_null
    col: county
  - kind: not_null
    col: cofips
  - kind: not_null
    col: week_ending_date
  - kind: not_null
    col: mmwr_week
  - kind: row_floor
    min: 267070
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
