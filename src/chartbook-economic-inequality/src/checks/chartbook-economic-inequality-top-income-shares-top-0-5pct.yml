# compiled by `hardened compile-checks` — post-publish audit of `chartbook-economic-inequality-top-income-shares-top-0-5pct`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, series_key, series]
temporal: year
checks:
  - kind: unique
    columns: [country, year, series_key, series]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: series_key
  - kind: not_null
    col: series
  - kind: row_floor
    min: 58
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
