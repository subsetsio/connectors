spec_id: bts-gff
status: active
tests:
  - row_count: {min: 1}
    reason: every fetched period writes at least one record; an empty raw asset means the download surface broke or the table code is wrong
    certainty: 95
  - not_null: obs_year
    reason: every raw row is stamped with the injected obs_year derived from the period being fetched, independent of the source CSV columns
    certainty: 99
  - not_null: obs_date
    reason: every raw row is stamped with the injected obs_date (YYYY-MM-01) for the period being fetched
    certainty: 99
  - column_type: {col: obs_year, type: integer}
    reason: obs_year is injected as a Python int and serialized as a JSON number
    certainty: 95
  - between: {col: obs_year, lo: 2011, hi: current_year()}
    reason: the DL_SelectFields year selector for this table spans 2011..2025
    certainty: 88
  - freshness: {col: obs_date, reaches: today - 700d}
    reason: quarterly (reported at quarter-end months) table; max(obs_date) older than the bound means a stale/stuck load rather than normal BTS publish lag
    certainty: 70
    points_outward: true
