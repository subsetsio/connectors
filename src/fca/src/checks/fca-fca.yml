# compiled by `hardened compile-checks` — post-publish audit of `fca-fca`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [package_name, resource_url, sheet_name, row_number, column_number]
checks:
  - kind: unique
    columns: [package_name, resource_url, sheet_name, row_number, column_number]
  - kind: not_null
    col: package_name
  - kind: not_null
    col: resource_url
  - kind: not_null
    col: sheet_name
  - kind: not_null
    col: row_number
  - kind: not_null
    col: column_number
  - kind: row_floor
    min: 188411
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
