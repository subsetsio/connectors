# compiled by `hardened compile-checks` — post-publish audit of `public-health-scotland-child-and-adolescent-mental-health-waiting-times`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [month, hb, resource_id, resource_name]
temporal: month
checks:
  - kind: unique
    columns: [month, hb, resource_id, resource_name]
  - kind: not_null
    col: month
  - kind: not_null
    col: hb
  - kind: not_null
    col: resource_id
  - kind: not_null
    col: resource_name
  - kind: row_floor
    min: 5377
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
