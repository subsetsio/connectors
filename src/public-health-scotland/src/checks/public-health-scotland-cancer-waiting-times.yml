# compiled by `hardened compile-checks` — post-publish audit of `public-health-scotland-cancer-waiting-times`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [quarter, hbt, hb, cancertype, resource_id]
temporal: quarter
checks:
  - kind: unique
    columns: [quarter, hbt, hb, cancertype, resource_id]
  - kind: not_null
    col: quarter
  - kind: not_null
    col: hbt
  - kind: not_null
    col: hb
  - kind: not_null
    col: cancertype
  - kind: not_null
    col: resource_id
  - kind: row_floor
    min: 22876
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
