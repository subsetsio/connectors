spec_id: public-health-scotland-hospital-activity
status: active
tests:
  - not_null: resource_name
    reason: every row is tagged by us with the source CKAN resource or group it came from
    certainty: 99
  - not_null: resource_id
    reason: every row carries the datastore resource UUID or CKAN group id it came from
    certainty: 99
  - row_count:
      min: 1
    reason: an accepted PHS entity always produces at least one raw row
    certainty: 95
  - freshness: {col: metadata_modified, reaches: today - 1200d}
    reason: accepted PHS temporal extract should include observations reaching the declared source period
    certainty: 80
