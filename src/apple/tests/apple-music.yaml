spec_id: apple-music
status: active
tests:
  - not_null: entity_id
    reason: every chart entry carries an Apple track id; a null means the parse lost the natural key
    certainty: 97
  - not_null: name
    reason: every chart entry has a title
    certainty: 95
  - not_null: storefront
    reason: storefront is a dimension we stamp on every row from the request path
    certainty: 99
  - not_null: rank
    reason: rank is the enumerate() chart position, always set
    certainty: 99
  - column_type: {col: rank, type: integer}
    certainty: 95
  - between: {col: rank, lo: 1, hi: 100}
    reason: the API caps a chart at 100 entries; rank is 1-based
    certainty: 95
  - enum: {col: media, values: [music]}
    reason: this asset is the music media node; media is a constant we stamp
    certainty: 99
  - enum: {col: feed_type, values: [most-played]}
    reason: the songs result_type is fetched only via the most-played feed
    certainty: 90
  - enum: {col: kind, values: [songs]}
    reason: music/songs chart entries report kind=songs (verified while probing)
    certainty: 90
  - not_null: artist_name
    reason: songs charts include artistName on every entry
    certainty: 90
  - nullable: {col: artist_id, max_null_frac: 0.05}
    reason: music entries (unlike apps/podcasts) carry artistId; allow a little slack for occasional missing values
    certainty: 80
    severity: warn
  - unique: [storefront, feed_type, rank]
    reason: one entry per chart position per storefront/feed_type within a snapshot; dupes mean a re-pull without overwrite
    certainty: 85
  - distinct_count: {col: storefront, min: 2}
    reason: a healthy cross-country sweep covers many storefronts; collapse to one means the sweep broke
    certainty: 80
    severity: warn
  - matches: {col: snapshot_date, pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'}
    reason: snapshot_date is derived from feed.updated as an ISO date string in the raw NDJSON
    certainty: 90
