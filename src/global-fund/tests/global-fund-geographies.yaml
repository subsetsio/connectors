spec_id: global-fund-geographies
status: active
tests:
  - not_null: id
    reason: each geography carries a uuid PK
    certainty: 95
  - unique: id
    reason: id is the per-row uuid PK; dupes mean a page was re-pulled into the snapshot
    certainty: 90
  - not_null: name
    reason: every geography has a name
    certainty: 85
  - row_count: {min: 150}
    reason: ~300 rows observed; a large drop signals truncated pagination
    certainty: 80
  - freshness: {col: dateTimeCreated, reaches: today - 500d}
    reason: geography reference records are stable and their creation timestamps advance infrequently
    certainty: 75
