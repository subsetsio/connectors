spec_id: global-fund-documenttypes
status: active
tests:
  - not_null: id
    reason: each document type carries a uuid PK
    certainty: 95
  - unique: id
    reason: id is the per-row uuid PK
    certainty: 90
  - not_null: name
    reason: every document type has a name
    certainty: 85
  - row_count: {min: 5}
    reason: ~9 rows observed; a large drop signals truncated pagination
    certainty: 80
