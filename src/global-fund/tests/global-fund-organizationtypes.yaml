spec_id: global-fund-organizationtypes
status: active
tests:
  - not_null: id
    reason: each organization type carries a uuid PK
    certainty: 95
  - unique: id
    reason: id is the per-row uuid PK
    certainty: 90
  - not_null: name
    reason: every organization type has a name
    certainty: 85
  - row_count: {min: 15}
    reason: ~32 rows observed; a large drop signals truncated pagination
    certainty: 80
