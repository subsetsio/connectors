spec_id: global-fund-activityareas
status: active
tests:
  - not_null: id
    reason: each activity area carries a uuid PK
    certainty: 95
  - unique: id
    reason: id is the per-row uuid PK; dupes mean a page was re-pulled into the snapshot
    certainty: 90
  - not_null: name
    reason: every activity area has a name
    certainty: 85
  - row_count: {min: 500}
    reason: ~1112 rows observed; a large drop signals truncated pagination
    certainty: 80
