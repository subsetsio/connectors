spec_id: global-fund-activityareasgrouped
status: active
tests:
  - not_null: id
    reason: each grouped activity area carries a uuid PK
    certainty: 95
  - unique: id
    reason: id is the per-row uuid PK; dupes mean a page was re-pulled into the snapshot
    certainty: 90
  - not_null: name
    reason: every grouped activity area has a name
    certainty: 85
  - row_count: {min: 500}
    reason: ~1113 rows observed; a large drop signals truncated pagination
    certainty: 80
  - freshness: {col: dateTimeCreated, reaches: today - 120d}
    reason: grouped activity area taxonomy includes recently created rows in the Global Fund data service
    certainty: 80
