# compiled by `hardened compile-checks` — post-publish audit of `statbel-nodeid3413`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [tx_fst_name, ms_frequency, tx_descr_fr, tx_descr_nl, cd_refnis]
checks:
  - kind: unique
    columns: [tx_fst_name, ms_frequency, tx_descr_fr, tx_descr_nl, cd_refnis]
  - kind: not_null
    col: tx_fst_name
  - kind: not_null
    col: ms_frequency
  - kind: not_null
    col: tx_descr_fr
  - kind: not_null
    col: tx_descr_nl
  - kind: not_null
    col: cd_refnis
  - kind: row_floor
    min: 108066
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
