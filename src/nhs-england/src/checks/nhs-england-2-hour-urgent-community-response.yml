# compiled by `hardened compile-checks` — post-publish audit of `nhs-england-2-hour-urgent-community-response`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [period, series, sheet, source_file]
temporal: period
checks:
  - kind: unique
    columns: [period, series, sheet, source_file]
  - kind: not_null
    col: period
  - kind: not_null
    col: series
  - kind: not_null
    col: sheet
  - kind: not_null
    col: source_file
  - kind: row_floor
    min: 12455
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
