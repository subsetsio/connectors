spec_id: un-population-division-demographic-indicators
status: active
tests:
  - not_null: LocID
    certainty: 98
    reason: every WPP row is keyed to a location; a null LocID means a header/footer row leaked into the body
  - not_null: Time
    certainty: 98
    reason: every observation carries a reference year
  - column_type: {col: LocID, type: integer}
    certainty: 95
  - column_type: {col: Time, type: integer}
    certainty: 95
  - between: {col: Time, lo: 1950, hi: 2101}
    certainty: 90
    reason: WPP2024 spans 1950 (series start) through the 2100 projection horizon (demographic indicators carry a 2101 mid-year point)
  - unique: [LocID, Time, Variant]
    certainty: 88
    reason: one row per location-year within a projection variant; dupes mean the split year-range/sex files were concatenated without overwrite or the source grain changed
  - enum: {col: Variant, values: [Medium]}
    certainty: 90
    reason: this file ships only the Medium (standard) projection; a second variant means the wrong source file
  - row_count: {min: 50000}
    certainty: 70
    severity: warn
    reason: guards against a truncated/partial download; the full corpus is far larger than this floor
  - freshness: {col: Time, reaches: current_year()}
    points_outward: true
    reason: WPP publishes projections to 2100, so the max year must always reach beyond the present; a max below the current year means projection rows are missing
