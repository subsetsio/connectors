spec_id: ntsb-aviation-aircraft
tests:
  - not_null: cm_mkey
    reason: each vehicle row is keyed back to its case master key
    certainty: 95
  - not_null: cm_vehicleNum
    reason: each aircraft within a case has a vehicle number
    certainty: 90
  - unique:
      - cm_mkey
      - cm_vehicleNum
    reason: (case, vehicle number) uniquely identifies an aircraft row
    certainty: 85
  - row_count:
      min: 50000
    reason: most cases involve at least one aircraft, so vehicle rows track the case count
    certainty: 85
  - at_least:
      col: cm_vehicleNum
      expr: 1
    reason: vehicle numbering starts at 1
    certainty: 90
  - freshness:
      col: cm_eventDate
      reaches: today - 45d
    reason: aircraft rows inherit the case event date; CAROL refreshes weekly so the newest event should be within ~6 weeks
    certainty: 80
    points_outward: true
