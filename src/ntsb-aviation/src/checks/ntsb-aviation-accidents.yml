# compiled by `hardened compile-checks` — post-publish audit of `ntsb-aviation-accidents`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [event_timestamp, ntsb_number, city, event_type, completion_status]
temporal: event_date
checks:
  - kind: unique
    columns: [event_timestamp, ntsb_number, city, event_type, completion_status]
  - kind: not_null
    col: event_timestamp
  - kind: not_null
    col: ntsb_number
  - kind: not_null
    col: city
  - kind: not_null
    col: event_type
  - kind: not_null
    col: completion_status
  - kind: row_floor
    min: 89992
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
