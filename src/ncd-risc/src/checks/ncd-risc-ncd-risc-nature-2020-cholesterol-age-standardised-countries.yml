# compiled by `hardened compile-checks` — post-publish audit of `ncd-risc-ncd-risc-nature-2020-cholesterol-age-standardised-countries`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [iso, area, year, metric, sex]
temporal: year
checks:
  - kind: unique
    columns: [iso, area, year, metric, sex]
  - kind: not_null
    col: iso
  - kind: not_null
    col: area
  - kind: not_null
    col: year
  - kind: not_null
    col: metric
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 70200
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
