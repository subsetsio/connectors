# compiled by `hardened compile-checks` — post-publish audit of `ncd-risc-ncd-risc-lancet-2020-height-child-adolescent-country`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [area, year, age, metric, sex]
temporal: year
checks:
  - kind: unique
    columns: [area, year, age, metric, sex]
  - kind: not_null
    col: area
  - kind: not_null
    col: year
  - kind: not_null
    col: age
  - kind: not_null
    col: metric
  - kind: not_null
    col: sex
  - kind: row_floor
    min: 420000
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
