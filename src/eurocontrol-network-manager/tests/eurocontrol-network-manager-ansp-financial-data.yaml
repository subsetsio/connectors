spec_id: eurocontrol-network-manager-ansp-financial-data
status: active
tests:
  - not_null: Year
    reason: every observation row carries its reporting year
    certainty: 95
  - column_type: {col: Year, type: integer}
    reason: the year column is a numeric coerced from the source file
    certainty: 85
  - at_least: {col: Year, expr: 2009}
    reason: EUROCONTROL PRU performance series begin no earlier than 2010
    certainty: 85
  - at_most: {col: Year, expr: current_year()}
    reason: a future year would mean the source published projections or a parse offset
    certainty: 75
    points_outward: true
    severity: warn
  - row_count: {min: 1}
    reason: a full-snapshot bulk file should never publish an empty table
    certainty: 95
