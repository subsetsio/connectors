# compiled by `hardened compile-checks` — post-publish audit of `eurocontrol-horizontal-flight-efficiency`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obs_date, entity_name, type_model]
temporal: entry_date
checks:
  - kind: unique
    columns: [obs_date, entity_name, type_model]
  - kind: not_null
    col: obs_date
  - kind: not_null
    col: entity_name
  - kind: not_null
    col: type_model
  - kind: row_floor
    min: 326364
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
