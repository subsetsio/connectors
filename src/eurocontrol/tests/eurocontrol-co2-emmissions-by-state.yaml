spec_id: eurocontrol-co2-emmissions-by-state
status: active
tests:
  - matches: {col: OBS_DATE, pattern: '\d{4}-\d{2}-\d{2}'}
    reason: OBS_DATE is synthesized by the fetch fn for every row; a blank means the source date column was missing or renamed
    certainty: 95

  - freshness: {col: OBS_DATE, reaches: today - 100d}
    reason: the current-year file is appended monthly, so the newest observation should trail today by about a month plus publication lag
    points_outward: true

  - between: {col: YEAR, lo: 2010, hi: current_year()}
    reason: the source publishes one file per calendar year from 2010 to the current year; a YEAR outside that means a stray file or a parse slip
    certainty: 90

  - unique: [OBS_DATE, STATE_NAME]
    reason: monthly aviation CO2 emissions per state — one row per OBS_DATE x STATE_NAME; dupes mean a year batch was written twice
    certainty: 90

  - row_count: {min: 4000}
    reason: conservative floor for 17 calendar years at the per-year volume observed while probing; a shortfall means year batches went missing
    certainty: 85

  - distinct_count: {col: STATE_NAME, min: 20}
    reason: the reporting universe is EUROCONTROL-wide; far fewer STATE_NAME values means a truncated fetch
    certainty: 85

  - not_null: YEAR
