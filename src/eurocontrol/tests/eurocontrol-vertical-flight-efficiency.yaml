spec_id: eurocontrol-vertical-flight-efficiency
status: active
tests:
  - matches: {col: OBS_DATE, pattern: '\d{4}-\d{2}-\d{2}'}
    reason: OBS_DATE is synthesized by the fetch fn for every row; a blank means the source date column was missing or renamed
    certainty: 95

  - freshness: {col: OBS_DATE, reaches: today - 100d}
    reason: the current-year file is appended monthly, so the newest observation should trail today by about a month plus publication lag
    points_outward: true

  - between: {col: YEAR, lo: 2015, hi: current_year()}
    reason: the source publishes one file per calendar year from 2015 to the current year; a YEAR outside that means a stray file or a parse slip
    certainty: 90

  - row_count: {min: 50000}
    reason: conservative floor for 12 calendar years at the per-year volume observed while probing; a shortfall means year batches went missing
    certainty: 85

  - distinct_count: {col: APT_ICAO, min: 100}
    reason: the reporting universe is EUROCONTROL-wide; far fewer APT_ICAO values means a truncated fetch
    certainty: 85

  - not_null: YEAR
