spec_id: nuget-package-versions
status: active
tests:
  - not_null: package_id
    reason: every catalog item carries nuget:id
    certainty: 99
  - not_null: version
    reason: every catalog item carries nuget:version
    certainty: 99
  - not_null: commit_timestamp
    reason: every catalog item carries commitTimeStamp
    certainty: 99
  - column_type: {col: is_delete, type: boolean}
    certainty: 95
  - matches: {col: commit_timestamp, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T"}
    reason: catalog commitTimeStamp is ISO-8601
    certainty: 90
  - row_count: {min: 1000000}
    reason: the NuGet catalog holds ~12M package-version events; far fewer means the page harvest truncated
    certainty: 90
