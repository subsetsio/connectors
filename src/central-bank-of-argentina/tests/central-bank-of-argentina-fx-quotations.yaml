spec_id: central-bank-of-argentina-fx-quotations
status: active
tests:
  - not_null: codigoMoneda
    certainty: 95
  - not_null: fecha
    certainty: 95
  - not_null: tipoCotizacion
    reason: every quotation row carries a peso rate
    certainty: 85
  - column_type: {col: tipoCotizacion, type: float}
    certainty: 90
  - column_type: {col: tipoPase, type: float}
    certainty: 90
  - matches: {col: fecha, pattern: '^\d{4}-\d{2}-\d{2}$'}
    certainty: 90
  - unique: [codigoMoneda, fecha]
    reason: one quotation per currency per date; dupes mean a page was re-pulled
    certainty: 88
  - distinct_count: {col: codigoMoneda, min: 5}
    reason: the currency master lists ~44 codes; only a handful have long histories but several should appear
    certainty: 75
    severity: warn
  - row_count: {min: 5000}
    reason: USD alone returns ~8400 daily quotes since 1992; the union across currencies is larger
    certainty: 80
