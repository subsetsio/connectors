# compiled by `hardened compile-checks` — post-publish audit of `central-bank-of-argentina-fx-quotations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [currency_code, date, rate_vs_usd, rate_in_pesos]
temporal: date
checks:
  - kind: unique
    columns: [currency_code, date, rate_vs_usd, rate_in_pesos]
  - kind: not_null
    col: currency_code
  - kind: not_null
    col: date
  - kind: not_null
    col: rate_vs_usd
  - kind: not_null
    col: rate_in_pesos
  - kind: row_floor
    min: 117390
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
