spec_id: banco-de-m-xico-values
status: active
# Expectations about the RAW payload fetched from the SIE REST API
# (/series/{ids} for metadata + /series/{ids}/datos for history). Raw is kept
# all-string: dates arrive as "DD/MM/YYYY" text and values as strings (with
# thousands separators and "N/E" sentinels); the transform owns parsing/typing.
tests:
  - not_null: series_id
    reason: every observation row is stamped with the SIE series id (idSerie) it came from — the natural key and the join to its metadata
    certainty: 98
  - not_null: fecha
    reason: each entry in a series' `datos` array carries a `fecha`; a null means the response shape changed
    certainty: 97
  - not_null: dato
    reason: every `datos` entry carries a `dato` field (the string value, possibly the "N/E" sentinel); the field itself is always present
    certainty: 95
  - column_type: {col: dato, type: string}
    reason: raw values are stored verbatim as text (thousands separators, "N/E"); numeric casting happens in the transform, so raw must stay string
    certainty: 92
  - matches: {col: series_id, pattern: 'S[FP][0-9]+'}
    reason: every curated id is a stable SIE identifier in the SF/SP families (e.g. SF43718, SP1); a different shape means a typo or a wrong id
    certainty: 88
  - matches: {col: fecha, pattern: '[0-9]{2}/[0-9]{2}/[0-9]{4}'}
    reason: the SIE API formats observation dates as zero-padded DD/MM/YYYY; the transform's try_strptime('%d/%m/%Y') relies on this
    certainty: 88
  - unique: [series_id, fecha]
    reason: a series' history has exactly one observation per date; a duplicate (series_id, fecha) means a re-pull without overwrite or batched id collision
    certainty: 85
  - distinct_count: {col: series_id, min: 12}
    reason: the 17 curated headline series should nearly all return data; collapse to a handful means the metadata/history join broke or most ids 404'd
    certainty: 82
  - not_null: title
    reason: the metadata endpoint supplies a `titulo` for each series, folded onto every observation row
    certainty: 75
    severity: warn
  - not_null: unit
    reason: the metadata endpoint supplies a `unidad` per series; occasionally a series may omit it, so this is advisory
    certainty: 70
    severity: warn
