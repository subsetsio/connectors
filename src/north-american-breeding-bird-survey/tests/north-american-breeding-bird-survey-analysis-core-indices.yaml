spec_id: north-american-breeding-bird-survey-analysis-core-indices
status: active
tests:
  - freshness: {col: Year, reaches: 2025}
  - not_null: AOU
  - not_null: Region
  - between: {col: Year, lo: 1966, hi: 2025}
    reason: core annual indices cover the full 1966-present period
    certainty: 90
  - at_least: {col: Index, expr: 0}
    reason: modeled abundance indices are non-negative
    certainty: 80
    severity: warn
  - row_count: {min: 50000}
    reason: one row per (species, region, year) across ~500 species and many regions
    certainty: 80
