spec_id: north-american-breeding-bird-survey-migrant-nonbreeder
status: active
tests:
  - freshness: {col: Year, reaches: 2025}
  - not_null: AOU
  - not_null: RouteDataID
  - between: {col: Year, lo: 1966, hi: 2025}
    reason: migrant/non-breeder observations are drawn from historical BBS route runs
    certainty: 80
  - row_count: {min: 1000}
    reason: migrant/non-breeder observations are a smaller companion table, but should not be tiny
    certainty: 75
  - at_least: {col: Stop1, expr: 0}
    reason: per-stop bird counts are non-negative
    certainty: 90
    severity: warn
