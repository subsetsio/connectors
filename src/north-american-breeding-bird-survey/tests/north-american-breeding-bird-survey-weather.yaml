spec_id: north-american-breeding-bird-survey-weather
status: active
tests:
  - freshness: {col: Year, reaches: 2025}
  - not_null: RouteDataID
  - between: {col: Year, lo: 1966, hi: 2025}
    reason: survey began in 1966; runs are not dated in the future
    certainty: 90
  - between: {col: Month, lo: 1, hi: 12}
    reason: month-of-year field
    certainty: 95
  - row_count: {min: 100000}
    reason: one row per route-run over ~60 years of thousands of routes
    certainty: 85
  - at_most: {col: Year, expr: 2025}
    certainty: 90
    points_outward: true
    severity: warn
