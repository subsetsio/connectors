# compiled by `hardened compile-checks` — post-publish audit of `north-american-breeding-bird-survey-analysis-core-trends`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [aou, region, model, years]
checks:
  - kind: unique
    columns: [aou, region, model, years]
  - kind: not_null
    col: aou
  - kind: not_null
    col: region
  - kind: not_null
    col: model
  - kind: not_null
    col: years
  - kind: row_floor
    min: 8549
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
