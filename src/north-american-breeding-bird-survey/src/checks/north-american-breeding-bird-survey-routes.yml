# compiled by `hardened compile-checks` — post-publish audit of `north-american-breeding-bird-survey-routes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [longitude, latitude, routename, route, stratum]
checks:
  - kind: unique
    columns: [longitude, latitude, routename, route, stratum]
  - kind: not_null
    col: longitude
  - kind: not_null
    col: latitude
  - kind: not_null
    col: routename
  - kind: not_null
    col: route
  - kind: not_null
    col: stratum
  - kind: row_floor
    min: 2922
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
