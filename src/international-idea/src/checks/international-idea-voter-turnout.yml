# compiled by `hardened compile-checks` — post-publish audit of `international-idea-voter-turnout`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [election_date, iso2, country, election_type]
temporal: election_date
checks:
  - kind: unique
    columns: [election_date, iso2, country, election_type]
  - kind: not_null
    col: election_date
  - kind: not_null
    col: iso2
  - kind: not_null
    col: country
  - kind: not_null
    col: election_type
  - kind: row_floor
    min: 1966
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
