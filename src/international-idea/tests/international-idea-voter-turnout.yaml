spec_id: international-idea-voter-turnout
status: active
tests:
  - not_null: Country
    reason: every voter turnout row identifies the country or territory
    certainty: 95
  - not_null: Year
    reason: election date/year is part of the election observation grain and carries freshness
    certainty: 95
  - not_null: "Election Type"
    reason: IDEA splits turnout rows by election type
    certainty: 95
  - row_count: {min: 1500}
    reason: the global Voter Turnout Database contains many national election observations
    certainty: 85
  - distinct_count: {col: ISO3, min: 150}
    reason: the turnout database has broad country coverage
    certainty: 85
  - enum: {col: "Election Type", values: ["Parliamentary", "Presidential", "EU Parliament"]}
    reason: the export's All sheet combines the three election-type sheets
    certainty: 85
    severity: warn
  - freshness: {col: Year, reaches: current_year() - 3}
    reason: worldwide national elections occur every year, but IDEA updates can lag; a healthy export should include recent elections
    certainty: 75
    points_outward: true
