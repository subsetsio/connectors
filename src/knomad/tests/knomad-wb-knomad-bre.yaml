spec_id: knomad-wb-knomad-bre
status: active
coverage:
  frozen: true
  reason: KNOMAD's Data360 mirror is a static post-wind-down corpus; this bilateral remittance matrix is a fixed 2021 release.
tests:
  - not_null: REF_AREA
  - not_null: COMP_BREAKDOWN_1
  - not_null: TIME_PERIOD
  - not_null: OBS_VALUE
  - column_type: {col: REF_AREA, type: string}
  - column_type: {col: COMP_BREAKDOWN_1, type: string}
  - column_type: {col: TIME_PERIOD, type: string}
  - column_type: {col: OBS_VALUE, type: string}
  - matches: {col: TIME_PERIOD, pattern: "^[0-9]{4}$"}
    reason: KNOMAD bilateral remittance estimates are annual observations.
    certainty: 90
  - enum: {col: INDICATOR, values: ["WB_KNOMAD_BRE"]}
    reason: each bulk CSV is one Data360 indicator file.
    certainty: 95
  - row_count: {min: 9000}
    reason: the 2021 corridor matrix should contain about 10619 observed cells.
    certainty: 80
