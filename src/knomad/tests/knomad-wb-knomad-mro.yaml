spec_id: knomad-wb-knomad-mro
status: active
coverage:
  frozen: true
  reason: KNOMAD's Data360 mirror is a static post-wind-down corpus; the remittance outflow series currently ends at the frozen 2023 release.
tests:
  - not_null: REF_AREA
  - not_null: REF_AREA_LABEL
  - not_null: TIME_PERIOD
  - not_null: OBS_VALUE
  - column_type: {col: REF_AREA, type: string}
  - column_type: {col: TIME_PERIOD, type: string}
  - column_type: {col: OBS_VALUE, type: string}
  - matches: {col: TIME_PERIOD, pattern: "^[0-9]{4}$"}
    reason: KNOMAD remittance outflow observations are annual.
    certainty: 90
  - enum: {col: INDICATOR, values: ["WB_KNOMAD_MRO"]}
    reason: each bulk CSV is one Data360 indicator file.
    certainty: 95
  - row_count: {min: 4000}
    reason: the country-year series should contain about 4824 observations for 2000-2023.
    certainty: 80
