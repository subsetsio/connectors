spec_id: national-bank-currencies
status: active
tests:
  - not_null: currency_code
    reason: title carries the ISO-style currency code for every quoted-currency item
    certainty: 99
  - not_null: currency_name
    reason: fullname carries the official currency label for every quoted-currency item
    certainty: 95
  - not_null: quant
    reason: each NBK quote declares the unit basis for the currency
    certainty: 95
  - unique: currency_code
    reason: the currency reference has one row per quoted currency in the current NBK feed
    certainty: 95
  - column_type: {col: quant, type: integer}
    certainty: 95
  - between: {col: quant, lo: 1, hi: 1000}
    reason: quote basis is one of 1/10/100/1000 units
    certainty: 90
  - distinct_count: {col: currency_code, min: 30}
    reason: NBK currently quotes roughly 30-40 currencies; far fewer means parsing or feed coverage broke
    certainty: 85
  - freshness: {col: source_date, reaches: today - 7d}
    reason: the current rates feed should be refreshed daily with the latest quoted-currency set
    certainty: 75
    points_outward: true
