spec_id: national-bank-fx-rates
status: active
tests:
  - not_null: date
    reason: every snapshot row is keyed by its publication date
    certainty: 99
  - not_null: currency_code
    reason: title (ISO code) is present on every quoted-currency <item>
    certainty: 99
  - not_null: rate
    reason: description (the KZT rate) is the payload; rows without it are dropped in fetch
    certainty: 95
  - column_type: {col: rate, type: float}
    certainty: 95
  - column_type: {col: quant, type: integer}
    certainty: 95
  - column_type: {col: date, type: date}
    certainty: 95
  - at_least: {col: rate, expr: 0}
    reason: exchange rates are strictly positive
    certainty: 95
  - between: {col: quant, lo: 1, hi: 10000}
    reason: quote basis is one of 1/10/100/1000/10000 units
    certainty: 90
  - distinct_count: {col: currency_code, min: 20}
    reason: NBK quotes ~30-39 currencies; far fewer means parsing or coverage broke
    certainty: 85
  - at_most: {col: date, expr: today}
    reason: no future-dated rates
    certainty: 95
    points_outward: true
    severity: warn
  - freshness: {col: date, reaches: today - 7d}
    reason: rates are published daily; the latest date should be within a week
    certainty: 75
    points_outward: true
    severity: warn
