spec_id: cbo-spending-detail
status: active
tests:
  - freshness: {col: vintage, reaches: today - 800d}
    reason: CBO release vintages are irregular/annual; allow multi-year slack while catching a stale GitHub mirror
    certainty: 80
  - not_null: date
    reason: every spending line carries a fiscal year
    certainty: 90
  - not_null: tin
    reason: the Treasury account identifier keys every spending line
    certainty: 88
  - not_null: vintage
    reason: fetch tags every row with the distribution vintage (str)
    certainty: 95
  - not_null: file_type
    reason: fetch tags every row with the distribution file_type (str)
    certainty: 95
  - column_type: {col: date, type: string}
    reason: fiscal-year labels like "FY2024"
    certainty: 88
  - matches: {col: date, pattern: '^FY[0-9]{4}$'}
    reason: spending detail ships annual_fy distributions labelled FYyyyy
    certainty: 82
  - column_type: {col: function_code, type: integer}
    reason: budget function codes are small integers, unique to this dataset so not drift-stringified
    certainty: 80
    severity: warn
  - enum: {col: disc_or_mand, values: [Discretionary, Mandatory]}
    reason: every account is classified discretionary or mandatory
    certainty: 70
    severity: warn
  - row_count: {min: 1000}
    reason: ~22k rows per vintage across 3 vintages
    certainty: 85
