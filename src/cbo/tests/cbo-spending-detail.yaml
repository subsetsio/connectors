spec_id: cbo-spending-detail
status: active
tests:
  - not_null: vintage
  - not_null: file_type
  - column_type: {col: vintage, type: string}
  - matches: {col: vintage, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: a vintage is the release month CBO published the distribution in
    certainty: 95
  - not_null: vintage_date
    reason: derived from vintage; a null means the vintage stopped being YYYY-MM
  - freshness: {col: vintage_date, reaches: today - 400d}
    reason: spending detail is reissued with each baseline; the newest vintage should never be over a year old
    points_outward: true
  - not_null: date
  - not_null: tin
    reason: the Treasury account identifier keys every spending line
    certainty: 88
  - matches: {col: date, pattern: '^FY[0-9]{4}$'}
    reason: spending detail ships annual_fy distributions labelled FYyyyy
    certainty: 85
  - column_type: {col: outlays, type: string}
    reason: raw keeps the CSV's own text; the transform casts to double
  - enum: {col: disc_or_mand, values: [Discretionary, Mandatory]}
    reason: every account is classified discretionary or mandatory
    certainty: 70
    severity: warn
  - distinct_count: {col: file_type, min: 1, max: 1}
  - row_count: {min: 40000}
    reason: shortfall means a distribution silently failed to parse
