spec_id: cbo-economic-projections
status: active
tests:
  - not_null: vintage
  - not_null: file_type
  - column_type: {col: vintage, type: string}
  - matches: {col: vintage, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: a vintage is the release month CBO published the distribution in
    certainty: 95
  - not_null: vintage_date
    reason: derived from vintage; a null means the vintage stopped being YYYY-MM
  - freshness: {col: vintage_date, reaches: today - 400d}
    reason: projections are reissued with each baseline (Jan/Feb) and the mid-year update
    points_outward: true
  - not_null: date
  - not_null: variable
  - not_null: estimate_type
    reason: every projection row is flagged actual vs projected
    certainty: 85
  - column_type: {col: value, type: string}
    reason: raw keeps the CSV's own text; the transform casts to double
  - enum: {col: estimate_type, values: [actual, projected]}
    reason: only these two flags observed while probing
    certainty: 70
    severity: warn
  - distinct_count: {col: file_type, min: 3, max: 3}
    reason: calendar, fiscal and quarterly distributions must all land
  - unique: [vintage, file_type, date, variable, estimate_type]
    reason: one value per variable per period per release; dupes mean a distribution was appended twice
    certainty: 90
  - row_count: {min: 30000}
    reason: shortfall means a distribution silently failed to parse
