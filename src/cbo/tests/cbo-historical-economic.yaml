spec_id: cbo-historical-economic
status: active
tests:
  - freshness: {col: vintage, reaches: today - 800d}
    reason: CBO release vintages are irregular/annual; allow multi-year slack while catching a stale GitHub mirror
    certainty: 80
  - not_null: date
    reason: tidy long CSVs always carry a period label
    certainty: 90
  - not_null: variable
    reason: every observation names its series
    certainty: 90
  - not_null: vintage
    reason: fetch tags every row with the distribution vintage (str)
    certainty: 95
  - not_null: file_type
    reason: fetch tags every row with the distribution file_type (str)
    certainty: 95
  - column_type: {col: date, type: string}
    reason: date is calendar-year int in annual_cy but "FY2002"/"2000q1" elsewhere, so fetch stringifies it everywhere
    certainty: 85
  - enum: {col: file_type, values: [annual_cy, annual_fy, quarterly]}
    reason: the three frequencies for historical_economic in the catalog
    certainty: 80
    severity: warn
  - row_count: {min: 1000}
    reason: tens of thousands of rows across annual/quarterly vintages
    certainty: 85
