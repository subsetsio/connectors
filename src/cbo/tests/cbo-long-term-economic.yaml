spec_id: cbo-long-term-economic
status: active
tests:
  - not_null: vintage
  - not_null: file_type
  - column_type: {col: vintage, type: string}
  - matches: {col: vintage, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: a vintage is the release month CBO published the distribution in
    certainty: 95
  - not_null: vintage_date
    reason: derived from vintage; a null means the vintage stopped being YYYY-MM
  - freshness: {col: vintage_date, reaches: today - 400d}
    reason: long-term projections are reissued annually with the long-term outlook
    points_outward: true
  - enum: {col: file_type, values: [levels, lfp_rates, rates]}
    reason: levels and rates are tidy long; lfp_rates is a wide sub-table with its own sex/age_group dimensions
    certainty: 85
  - distinct_count: {col: file_type, min: 3, max: 3}
    reason: all three sub-tables must land; fewer means a distribution silently failed
  - nullable: {col: variable, max_null_frac: 0.9}
    reason: null exactly on the lfp_rates rows, which carry lfp_rate instead of variable/value
    certainty: 80
  - row_count: {min: 12000}
    reason: shortfall means a distribution silently failed to parse
