spec_id: cbo-trust-fund
status: active
tests:
  - not_null: date
    reason: tidy long CSVs always carry a period label
    certainty: 90
  - not_null: variable
    reason: every observation names its series
    certainty: 90
  - not_null: vintage
    reason: fetch tags every row with the distribution vintage (str)
    certainty: 95
  - not_null: file_type
    reason: fetch tags every row with the distribution file_type (str)
    certainty: 95
  - column_type: {col: date, type: string}
    reason: fiscal-year labels like "FY2023"
    certainty: 90
  - matches: {col: date, pattern: '^FY[0-9]{4}$'}
    reason: trust fund balances are annual_fy, labelled FYyyyy
    certainty: 85
  - enum: {col: file_type, values: [annual_fy]}
    reason: catalog lists only annual_fy for trust_fund
    certainty: 85
    severity: warn
  - row_count: {min: 100}
    reason: ~540 rows per vintage across 3 vintages
    certainty: 85
