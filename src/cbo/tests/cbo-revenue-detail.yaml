spec_id: cbo-revenue-detail
status: active
tests:
  - not_null: vintage
  - not_null: file_type
  - column_type: {col: vintage, type: string}
  - matches: {col: vintage, pattern: '^[0-9]{4}-[0-9]{2}$'}
    reason: a vintage is the release month CBO published the distribution in
    certainty: 95
  - not_null: vintage_date
    reason: derived from vintage; a null means the vintage stopped being YYYY-MM
  - freshness: {col: vintage_date, reaches: today - 400d}
    reason: revenue detail is reissued with each baseline; the newest vintage should never be over a year old
    points_outward: true
  - not_null: date
  - not_null: variable
  - not_null: estimate_type
    reason: every revenue row is flagged actual vs projected
    certainty: 85
  - matches: {col: date, pattern: '^(CY|FY)[0-9]{4}$'}
    reason: annual_cy distributions label periods CYyyyy and annual_fy label them FYyyyy
    certainty: 85
  - nullable: {col: section, max_null_frac: 0.95}
    reason: only some annual_cy vintages carry a section column; the rest get an explicit null from the column union
    certainty: 80
  - distinct_count: {col: file_type, min: 2, max: 2}
    reason: calendar- and fiscal-year distributions must both land
  - row_count: {min: 5000}
    reason: shortfall means a distribution silently failed to parse
