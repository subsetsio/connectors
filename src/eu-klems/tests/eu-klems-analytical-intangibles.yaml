spec_id: eu-klems-analytical-intangibles
status: active

coverage:
  frozen: true
  reason: >-
    wiiw KLEMS 2019 release is a closed archival vintage — the bulk CSVs are
    fixed at 1995-2017 and never advance. Fresher coverage exists only in the
    separate 2025 EUKLEMS & INTANProd release (different, non-persistent URLs).

tests:
  - not_null: country
  - not_null: var
  - not_null: nace_r2
  - not_null: value
    reason: the fetch fn drops melted cells whose value is null; a null here means the drop regressed
    certainty: 95

  - column_type: {col: year, type: integer}
  - column_type: {col: value, type: float}

  - unique: [country, nace_r2, var, year]
    reason: >-
      the analytical modules ship long-by-year / wide-by-variable: one row per
      country x industry x year before the melt, so `var` completes the grain after it.
    certainty: 90

  - distinct_count: {col: var, min: 35, max: 35}
    reason: collect enumerated 35 measure columns for the analytical Intangibles (suppl.) module
    certainty: 85

  - between: {col: year, lo: 1995, hi: 2017}
    reason: the 2019 release covers 1995-2017 inclusive
    certainty: 95

  - at_most: {col: year, expr: current_year()}
    reason: an archival vintage cannot carry future years
    certainty: 95

  - distinct_count: {col: country, min: 25}
    reason: EU member states plus EU/EA aggregates plus US and Japan
    certainty: 80

  - row_count: {min: 200000}
    reason: tens of thousands of country-industry-year rows melted across 35 measures, less the null cells
    certainty: 80
