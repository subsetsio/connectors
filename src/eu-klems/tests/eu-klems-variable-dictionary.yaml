spec_id: eu-klems-variable-dictionary
status: active

# No temporal column: this is the codebook, not an observation table. Neither a
# freshness assertion nor a frozen declaration applies (both govern time).

tests:
  - not_null: File
  - not_null: Variable
  - not_null: Category
  - not_null: Tool
    reason: the human-readable description; a null would make the row useless as a codebook entry
    certainty: 90

  - column_type: {col: Sort_Cat, type: integer}
  - column_type: {col: Sort_ID, type: integer}

  - unique: [File, Variable]
    reason: >-
      a variable code is unique only WITHIN a module — 175 distinct codes across
      209 rows, because shared codes (e.g. VA) recur in several modules.
    certainty: 90

  - distinct_count: {col: Variable, min: 175, max: 175}
    reason: collect counted 175 distinct variable codes in the dictionary
    certainty: 85

  - distinct_count: {col: File, min: 6, max: 6}
    reason: >-
      the codebook documents exactly the six bulk modules this connector downloads;
      a seventh would mean the release added a module we are not fetching.
    certainty: 85
    points_outward: true

  - row_count: {min: 200, max: 250}
    reason: collect measured 209 rows in the 2019 release codebook
    certainty: 85
