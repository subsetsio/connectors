# compiled by `hardened compile-checks` — post-publish audit of `eu-klems-analytical-growth-accounts`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, year, sort_id, indnr, nace_r2, var]
temporal: year
checks:
  - kind: unique
    columns: [country, year, sort_id, indnr, nace_r2, var]
  - kind: not_null
    col: country
  - kind: not_null
    col: year
  - kind: not_null
    col: sort_id
  - kind: not_null
    col: indnr
  - kind: not_null
    col: nace_r2
  - kind: not_null
    col: var
  - kind: row_floor
    min: 452661
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
