# compiled by `hardened compile-checks` — post-publish audit of `eu-klems-statistical-capital`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [country, db, var, sort_id, indnr, code, year]
temporal: year
checks:
  - kind: unique
    columns: [country, db, var, sort_id, indnr, code, year]
  - kind: not_null
    col: country
  - kind: not_null
    col: db
  - kind: not_null
    col: var
  - kind: not_null
    col: sort_id
  - kind: not_null
    col: indnr
  - kind: not_null
    col: code
  - kind: not_null
    col: year
  - kind: row_floor
    min: 793739
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
