spec_id: baker-hughes-na-rig-count-weekly
status: active
# Current NA weekly report, 'NAM Weekly' long sheet. County/basin/trajectory
# granularity. Post-2024-methodology-change long format only (2024-present).
tests:
  - not_null: country
  - not_null: rig_count
  - not_null: publish_date
  - not_null: year
  - not_null: month
  - column_type: {col: year, type: integer}
  - column_type: {col: month, type: integer}
  - column_type: {col: rig_count, type: float}
  - between: {col: month, lo: 1, hi: 12}
    reason: calendar month
    certainty: 99
  - between: {col: year, lo: 2023, hi: current_year()}
    reason: granular long-format begins Jan 2024 (2024 methodology change); 2023 slack for edge rows
    certainty: 88
  - at_least: {col: rig_count, expr: 0}
    reason: rig counts are non-negative
    certainty: 98
  - between: {col: rig_count, lo: 0, hi: 10000}
    reason: county/basin-level granular rows are small integers; a huge value means a total row leaked in
    certainty: 80
    severity: warn
  - enum: {col: country, values: [CANADA, UNITED STATES]}
    reason: North America report covers only US and Canada
    certainty: 90
  - enum: {col: gom, values: [Yes, No]}
    reason: Gulf-of-Mexico flag is a yes/no indicator
    certainty: 85
    severity: warn
  - matches: {col: publish_date, pattern: '^\d{4}-\d{2}-\d{2}$'}
    reason: publish_date is serialized as an ISO date string
    certainty: 90
  - freshness: {col: publish_date, reaches: today - 30d}
    reason: NA report publishes weekly (last working day); a stale max means the current-file discovery went stale
    certainty: 75
    points_outward: true
    severity: warn
