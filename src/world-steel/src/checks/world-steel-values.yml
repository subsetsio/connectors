# compiled by `hardened compile-checks` — post-publish audit of `world-steel-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [geoitem_id, indicator_id, period, year]
temporal: year
checks:
  - kind: unique
    columns: [geoitem_id, indicator_id, period, year]
  - kind: not_null
    col: geoitem_id
  - kind: not_null
    col: indicator_id
  - kind: not_null
    col: period
  - kind: not_null
    col: year
  - kind: row_floor
    min: 54844
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
