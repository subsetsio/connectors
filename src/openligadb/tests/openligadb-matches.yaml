spec_id: openligadb-matches
status: active
tests:
  - not_null: match_id
    reason: every match in the source has a stable integer matchID
    certainty: 95
  - not_null: league_shortcut
    certainty: 95
  - column_type: {col: match_id, type: integer}
    certainty: 90
  - unique: match_id
    reason: each match-id is fetched once (one league-season per shortcut+season); dupes mean overlapping pulls
    certainty: 85
  - between: {col: league_season, lo: 1962, hi: 2027}
    reason: catalog spans 1968..2026; allow slack for new seasons
    certainty: 90
  - at_most: {col: league_season, expr: current_year()}
    certainty: 70
    points_outward: true
    severity: warn
  - between: {col: final_team1, lo: 0, hi: 50}
    reason: a side's full-time score is small and non-negative across all sports here
    certainty: 80
    severity: warn
