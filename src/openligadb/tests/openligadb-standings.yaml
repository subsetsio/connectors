spec_id: openligadb-standings
status: active
tests:
  - not_null: team_id
    certainty: 95
  - not_null: league_shortcut
    certainty: 95
  - column_type: {col: points, type: integer}
    certainty: 90
  - between: {col: points, lo: 0, hi: 600}
    reason: league points are non-negative; some source standings are historical aggregate tables rather than one regular season
    certainty: 85
  - between: {col: matches, lo: 0, hi: 450}
    reason: matches played is non-negative; some source standings are historical aggregate tables rather than one regular season
    certainty: 85
  - between: {col: league_season, lo: 1962, hi: 2027}
    certainty: 90
  - freshness: {col: league_season, reaches: current_year()}
    reason: current-season league tables should exist for active competitions
    certainty: 80
    points_outward: true
