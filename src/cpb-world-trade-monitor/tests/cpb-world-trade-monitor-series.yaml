spec_id: cpb-world-trade-monitor-series
status: active
tests:
  - row_count:
      min: 80
    reason: WTM workbook contains roughly 90 published series across trade and industrial production sheets.
    certainty: 90
  - not_null: series_code
  - not_null: label
  - not_null: sheet
  - not_null: variable
  - not_null: region
  - not_null: measure
  - not_null: weighting
  - column_type:
      col: series_code
      type: string
  - column_type:
      col: weight_2021
      type: float
  - unique: series_code
    reason: each workbook row with a CPB series code is one distinct series.
    certainty: 95
  - matches:
      col: series_code
      pattern: "^[a-z]{3}_[a-z0-9]{2}_[a-z]{4}_[a-z]{2}$"
    reason: CPB WTM codes use variable, region, measure, and weighting tokens.
    certainty: 95
