spec_id: us-treasury-fiscal-data-v1-accounting-od-tcir-annual-table-7
status: active
tests:
  - row_count: {min: 18}
    reason: "the API reported meta.total-count=20 for this table; a load that ships fewer than 90% of those rows means paging stopped early, not that the table shrank"
    certainty: 90
  - not_null: record_date
    reason: "record_date is the observation-period key of every row in this Fiscal Data table; a null means a malformed record slipped through the fetch"
    certainty: 95
  - freshness: {col: record_date, reaches: today - 750d}
    reason: "Treasury Certified Interest Rates: Annual Certification publishes on a annual cadence (median 364-day spacing between distinct record_date values); the newest record was 279 days old when this spec was authored. Slack = one publish period + that observed release lag, so a single skipped release still passes and a dead feed blocks."
    points_outward: true
  - matches: {col: record_date, pattern: '\d{4}-\d{2}-\d{2}'}
    reason: "Fiscal Data serialises every date as an ISO YYYY-MM-DD string; a different shape means the column changed meaning upstream"
    certainty: 90
