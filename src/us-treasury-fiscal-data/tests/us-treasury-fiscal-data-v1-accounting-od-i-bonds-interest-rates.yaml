spec_id: us-treasury-fiscal-data-v1-accounting-od-i-bonds-interest-rates
status: active
tests:
  - row_count: {min: 8721}
    reason: "the API reported meta.total-count=9690 for this table; a load that ships fewer than 90% of those rows means paging stopped early, not that the table shrank"
    certainty: 90
  - not_null: earning_period_start
    reason: "earning_period_start is the observation-period key of every row in this Fiscal Data table; a null means a malformed record slipped through the fetch"
    certainty: 95
  - freshness: {col: earning_period_start, reaches: today - 300d}
    reason: "I Bonds Interest Rates publishes on a semi-annual cadence (median 182-day spacing between distinct earning_period_start values); the newest record was 69 days old when this spec was authored. Slack = one publish period + that observed release lag, so a single skipped release still passes and a dead feed blocks."
    points_outward: true
  - matches: {col: earning_period_start, pattern: '\d{4}-\d{2}-\d{2}'}
    reason: "Fiscal Data serialises every date as an ISO YYYY-MM-DD string; a different shape means the column changed meaning upstream"
    certainty: 90
