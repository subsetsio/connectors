    columns: [record_date, up_to_but_not_including, from_and_including, src_line_nbr, fiscal_year]
  - kind: not_null
    col: record_date
  - kind: not_null
    col: up_to_but_not_including
  - kind: not_null
    col: from_and_including
  - kind: not_null
    col: src_line_nbr
  - kind: not_null
    col: fiscal_year
  - kind: row_floor
    min: 190
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
