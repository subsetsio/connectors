# compiled by `hardened compile-checks` — post-publish audit of `us-treasury-fiscal-data-v1-accounting-od-frn-daily-indexes`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [record_date, cusip, start_of_accrual_period]
temporal: record_date
checks:
  - kind: unique
    columns: [record_date, cusip, start_of_accrual_period]
  - kind: not_null
    col: record_date
  - kind: not_null
    col: cusip
  - kind: not_null
    col: start_of_accrual_period
  - kind: row_floor
    min: 1573
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
