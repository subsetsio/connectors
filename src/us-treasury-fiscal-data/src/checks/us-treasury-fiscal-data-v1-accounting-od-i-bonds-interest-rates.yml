# compiled by `hardened compile-checks` — post-publish audit of `us-treasury-fiscal-data-v1-accounting-od-i-bonds-interest-rates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [earning_period_start, issue_year_month, earning_period, earning_period_end]
temporal: earning_period
checks:
  - kind: unique
    columns: [earning_period_start, issue_year_month, earning_period, earning_period_end]
  - kind: not_null
    col: earning_period_start
  - kind: not_null
    col: issue_year_month
  - kind: not_null
    col: earning_period
  - kind: not_null
    col: earning_period_end
  - kind: row_floor
    min: 4845
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
