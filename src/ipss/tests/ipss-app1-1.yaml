spec_id: ipss-app1-1
status: active
tests:
  - not_null: value
    reason: every emitted record is a parsed numeric data cell; a null value means the cell parser broke
    certainty: 98
  - column_type: {col: value, type: float}
    reason: extracted Excel data cells are coerced to double
    certainty: 95
  - column_type: {col: row, type: integer}
    certainty: 95
  - column_type: {col: col, type: integer}
    certainty: 95
  - row_count: {min: 1}
    reason: this IPSS table contains numeric data, so the long-format extraction must yield at least one cell
    certainty: 95
