spec_id: listenbrainz-sitewide-artist-activity
status: active
tests:
  - not_null: name
    reason: each row names an artist
    certainty: 95
  - not_null: range
    certainty: 99
  - enum: {col: range, values: [week, month, quarter, half_yearly, year, all_time]}
    certainty: 95
  - column_type: {col: listen_count, type: integer}
    certainty: 85
  - between: {col: listen_count, lo: 1, hi: 100000000000}
    certainty: 80
    severity: warn
  - row_count: {min: 20}
    reason: a small top-artists breakdown per window (~15 artists each)
    certainty: 75
  - distinct_count: {col: range, min: 1}
    certainty: 90
