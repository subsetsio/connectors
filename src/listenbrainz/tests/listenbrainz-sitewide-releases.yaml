spec_id: listenbrainz-sitewide-releases
status: active
tests:
  - not_null: release_name
    reason: every top-release row names a release
    certainty: 95
  - not_null: range
    certainty: 99
  - enum: {col: range, values: [week, month, quarter, half_yearly, year, all_time]}
    certainty: 95
  - column_type: {col: listen_count, type: integer}
    certainty: 85
  - between: {col: listen_count, lo: 1, hi: 100000000000}
    certainty: 80
    severity: warn
  - row_count: {min: 200}
    reason: top-1000 releases across several ranges yields hundreds of rows
    certainty: 85
  - distinct_count: {col: range, min: 1}
    certainty: 90
