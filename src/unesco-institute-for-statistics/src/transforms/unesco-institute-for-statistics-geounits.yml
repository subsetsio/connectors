# caution: Mixes countries/territories (type = NATIONAL) with regional aggregates (type = REGIONAL, region_group naming the grouping) in one column — filter on `type` before treating rows as a country list.
key: [id]
sort: [id]
columns:
  - name: id
    type: VARCHAR
    description: UIS geographic unit code — ISO 3166-1 alpha-3 for countries and territories (e.g. ABW, AFG), an aggregate code for regions. Joins to the geo_unit column of the indicator values table.
  - name: name
    type: VARCHAR
    description: English name of the country, territory or regional aggregate.
  - name: type
    type: VARCHAR
    description: NATIONAL for a country or territory, REGIONAL for an aggregate spanning many countries.
  - name: region_group
    type: VARCHAR
    description: For REGIONAL rows, the grouping the aggregate belongs to (e.g. WB for World Bank income groups, UNICEF, SDG). Null for NATIONAL rows.
