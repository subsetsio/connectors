spec_id: unesco-institute-for-statistics-indicators
status: active
tests:
  - row_count: {min: 4000}
    reason: the UIS indicator catalog spans thousands of indicator codes.
    certainty: 95
  - not_null: indicator_code
  - not_null: name
  - not_null: theme
  - column_type: {col: indicator_code, type: string}
  - column_type: {col: name, type: string}
  - column_type: {col: theme, type: string}
  - column_type: {col: total_record_count, type: integer}
  - column_type: {col: year_min, type: integer}
  - column_type: {col: year_max, type: integer}
  - unique: indicator_code
    reason: each indicatorCode is a distinct UIS series definition.
    certainty: 95
  - enum:
      col: theme
      values: [CULTURE, DEMOGRAPHIC_SOCIOECONOMIC, EDUCATION, SCIENCE_TECHNOLOGY_INNOVATION]
    reason: research confirmed these are the four UIS API themes.
    certainty: 95
  - between: {col: year_min, lo: 1900, hi: current_year()}
    severity: warn
    certainty: 85
  - at_most: {col: year_max, expr: current_year()}
    points_outward: true
    severity: warn
    certainty: 80
  - freshness: {col: year_max, reaches: 2024}
    reason: UIS annual data releases currently expose observations through at least 2024.
    points_outward: true
    certainty: 85
