# compiled by `hardened compile-checks` — post-publish audit of `instituto-nacional-de-estad-stica-ine-presupuesto-ine`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [ejecucion, source_row_number, proyecto, auxiliar, asignacion]
checks:
  - kind: unique
    columns: [ejecucion, source_row_number, proyecto, auxiliar, asignacion]
  - kind: not_null
    col: ejecucion
  - kind: not_null
    col: source_row_number
  - kind: not_null
    col: proyecto
  - kind: not_null
    col: auxiliar
  - kind: not_null
    col: asignacion
  - kind: row_floor
    min: 47
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
