# compiled by `hardened compile-transforms` — faithful pass-through
# of raw asset `gapminder-values`. Regenerate after model-verify.
# caution: `geo` includes countries plus regional and income aggregates; filter geography level before aggregating across geographies.
# caution: The table excludes multidimensional datapoints with extra dimensions such as gender or age.
key: [value, time, indicator, geo, geo_dim]
temporal: time
sort: [time, indicator, geo, geo_dim, value]
columns:
  - name: repo
    type: VARCHAR
  - name: geo_dim
    type: VARCHAR
  - name: geo
    type: VARCHAR
  - name: time
    type: BIGINT
  - name: indicator
    type: VARCHAR
  - name: value
    type: VARCHAR
