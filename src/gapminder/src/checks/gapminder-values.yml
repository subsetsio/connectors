# compiled by `hardened compile-checks` — post-publish audit of `gapminder-values`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [value, time, indicator, geo, geo_dim]
checks:
  - kind: unique
    columns: [value, time, indicator, geo, geo_dim]
  - kind: not_null
    col: value
  - kind: not_null
    col: time
  - kind: not_null
    col: indicator
  - kind: not_null
    col: geo
  - kind: not_null
    col: geo_dim
  - kind: row_floor
    min: 3823801
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
