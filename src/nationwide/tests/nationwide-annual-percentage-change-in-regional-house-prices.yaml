spec_id: nationwide-annual-percentage-change-in-regional-house-prices
status: active
tests:
  - not_null: date
  - not_null: series
  - not_null: value
  - column_type: {col: date, type: date}
  - column_type: {col: value, type: float}
  - column_type: {col: series, type: string}
  - distinct_count: {col: series, min: 28}
    reason: one series per region/measure/occupation column in the source spreadsheet; a drop means the header parse collapsed
    certainty: 90
  - row_count: {min: 280}
  - freshness: {col: date, reaches: today - 500d}
    reason: Nationwide refreshes this series (UK monthly / regional & affordability quarterly); a stale max usually means the source has not published yet
    certainty: 70
    points_outward: true
    severity: warn
