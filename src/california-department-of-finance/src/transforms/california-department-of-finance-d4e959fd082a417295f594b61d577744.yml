# thin pass-through contract generated from ArcGIS layer metadata for Top 10 Most Destructive California Wildfires from 2014 to 2024
columns:
  - name: Fire_Name
    type: VARCHAR
  - name: Year
    type: VARCHAR
  - name: Single_Family_Housing_Unit_Loss
    type: BIGINT
  - name: Mobile_Home_Unit_Loss
    type: BIGINT
  - name: Multi_Family_Structure_Loss
    type: BIGINT
  - name: Grand_Total
    type: BIGINT
  - name: Percentage_of_Single_Family_Hou
    type: DOUBLE
  - name: Percentage_of_Mobile_Home_Unit_
    type: DOUBLE
  - name: Percentage_of_Multi_Family_Stru
    type: DOUBLE
  - name: ObjectId
    type: BIGINT
