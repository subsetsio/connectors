# thin pass-through contract generated from ArcGIS layer metadata for Top 10 California Counties with Highest Wildfire Housing Loss
columns:
  - name: County
    type: VARCHAR
  - name: Single_Family_Housing_Unit
    type: DOUBLE
  - name: Mobile_Home_Unit
    type: DOUBLE
  - name: Multi_Family_Structure
    type: DOUBLE
  - name: Grand_Total
    type: BIGINT
  - name: FID
    type: BIGINT
  - name: Percent_SF_Loss
    type: VARCHAR
  - name: Percent_MF_Loss
    type: VARCHAR
  - name: Percent_MHU_Loss
    type: VARCHAR
  - name: County_Rank
    type: BIGINT
