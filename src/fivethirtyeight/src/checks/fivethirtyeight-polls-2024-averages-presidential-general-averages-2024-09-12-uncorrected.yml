# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-polls-2024-averages-presidential-general-averages-2024-09-12-uncorrected`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, state, candidate, party]
temporal: date
checks:
  - kind: unique
    columns: [date, state, candidate, party]
  - kind: not_null
    col: date
  - kind: not_null
    col: state
  - kind: not_null
    col: candidate
  - kind: not_null
    col: party
  - kind: row_floor
    min: 13550
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
