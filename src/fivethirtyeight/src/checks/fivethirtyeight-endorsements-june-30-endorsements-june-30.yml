# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-endorsements-june-30-endorsements-june-30`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [candidate, year, party, won_primary]
temporal: year
checks:
  - kind: unique
    columns: [candidate, year, party, won_primary]
  - kind: not_null
    col: candidate
  - kind: not_null
    col: year
  - kind: not_null
    col: party
  - kind: not_null
    col: won_primary
  - kind: row_floor
    min: 54
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
