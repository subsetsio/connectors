# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-poll-quiz-guns-guns-polls`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [url, pollster, end, start, question]
checks:
  - kind: unique
    columns: [url, pollster, end, start, question]
  - kind: not_null
    col: url
  - kind: not_null
    col: pollster
  - kind: not_null
    col: end
  - kind: not_null
    col: start
  - kind: not_null
    col: question
  - kind: row_floor
    min: 28
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
