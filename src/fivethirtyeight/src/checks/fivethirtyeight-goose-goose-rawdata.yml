# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-goose-goose-rawdata`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [name, key_retro, year, team, league]
temporal: year
checks:
  - kind: unique
    columns: [name, key_retro, year, team, league]
  - kind: not_null
    col: name
  - kind: not_null
    col: key_retro
  - kind: not_null
    col: year
  - kind: not_null
    col: team
  - kind: not_null
    col: league
  - kind: row_floor
    min: 15481
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
