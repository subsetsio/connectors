# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-potential-candidates-2015-01-30-events`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [event, date, person, link, type]
checks:
  - kind: unique
    columns: [event, date, person, link, type]
  - kind: not_null
    col: event
  - kind: not_null
    col: date
  - kind: not_null
    col: person
  - kind: not_null
    col: link
  - kind: not_null
    col: type
  - kind: row_floor
    min: 37
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
