# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-antiquities-act-actions-under-antiquities-act`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [acres_affected, date, current_name, action, original_name]
temporal: year
checks:
  - kind: unique
    columns: [acres_affected, date, current_name, action, original_name]
  - kind: not_null
    col: acres_affected
  - kind: not_null
    col: date
  - kind: not_null
    col: current_name
  - kind: not_null
    col: action
  - kind: not_null
    col: original_name
  - kind: row_floor
    min: 172
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
