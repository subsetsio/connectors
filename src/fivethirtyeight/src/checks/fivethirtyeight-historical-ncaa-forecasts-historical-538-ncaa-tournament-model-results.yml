# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-historical-ncaa-forecasts-historical-538-ncaa-tournament-model-results`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [underdog, favorite, year]
temporal: year
checks:
  - kind: unique
    columns: [underdog, favorite, year]
  - kind: not_null
    col: underdog
  - kind: not_null
    col: favorite
  - kind: not_null
    col: year
  - kind: row_floor
    min: 126
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
