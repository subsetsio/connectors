# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-cabinet-turnover-cabinet-turnover`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [appointee, length, start_date, end_date, position]
checks:
  - kind: unique
    columns: [appointee, length, start_date, end_date, position]
  - kind: not_null
    col: appointee
  - kind: not_null
    col: length
  - kind: not_null
    col: start_date
  - kind: not_null
    col: end_date
  - kind: not_null
    col: position
  - kind: row_floor
    min: 189
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
