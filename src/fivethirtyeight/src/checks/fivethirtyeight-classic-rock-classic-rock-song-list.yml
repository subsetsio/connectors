# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-classic-rock-classic-rock-song-list`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [song_clean, combined, artist_clean, release_year]
checks:
  - kind: unique
    columns: [song_clean, combined, artist_clean, release_year]
  - kind: not_null
    col: song_clean
  - kind: not_null
    col: combined
  - kind: not_null
    col: artist_clean
  - kind: not_null
    col: release_year
  - kind: row_floor
    min: 1114
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
