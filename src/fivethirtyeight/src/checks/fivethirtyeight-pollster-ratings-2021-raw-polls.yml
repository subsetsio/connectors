# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-pollster-ratings-2021-raw-polls`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [question_id, poll_id, race_id, race, cand1_id]
temporal: year
checks:
  - kind: unique
    columns: [question_id, poll_id, race_id, race, cand1_id]
  - kind: not_null
    col: question_id
  - kind: not_null
    col: poll_id
  - kind: not_null
    col: race_id
  - kind: not_null
    col: race
  - kind: not_null
    col: cand1_id
  - kind: row_floor
    min: 5388
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
