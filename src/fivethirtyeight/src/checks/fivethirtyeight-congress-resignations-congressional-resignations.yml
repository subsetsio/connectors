# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-congress-resignations-congressional-resignations`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [district, reason, source, congress, category]
checks:
  - kind: unique
    columns: [district, reason, source, congress, category]
  - kind: not_null
    col: district
  - kind: not_null
    col: reason
  - kind: not_null
    col: source
  - kind: not_null
    col: congress
  - kind: not_null
    col: category
  - kind: row_floor
    min: 307
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
