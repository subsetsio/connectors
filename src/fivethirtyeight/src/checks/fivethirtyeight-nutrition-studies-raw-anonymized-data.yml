# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-nutrition-studies-raw-anonymized-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, cancer, diabetes, heart_disease, belly]
checks:
  - kind: unique
    columns: [id, cancer, diabetes, heart_disease, belly]
  - kind: not_null
    col: id
  - kind: not_null
    col: cancer
  - kind: not_null
    col: diabetes
  - kind: not_null
    col: heart_disease
  - kind: not_null
    col: belly
  - kind: row_floor
    min: 27
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
