# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-primary-project-2022-rep-candidates`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [candidate, primary_votes, primary, trump_date, state]
checks:
  - kind: unique
    columns: [candidate, primary_votes, primary, trump_date, state]
  - kind: not_null
    col: candidate
  - kind: not_null
    col: primary_votes
  - kind: not_null
    col: primary
  - kind: not_null
    col: trump_date
  - kind: not_null
    col: state
  - kind: row_floor
    min: 799
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
