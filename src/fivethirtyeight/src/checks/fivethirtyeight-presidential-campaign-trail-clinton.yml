# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-presidential-campaign-trail-clinton`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, location, city, state]
checks:
  - kind: unique
    columns: [date, location, city, state]
  - kind: not_null
    col: date
  - kind: not_null
    col: location
  - kind: not_null
    col: city
  - kind: not_null
    col: state
  - kind: row_floor
    min: 35
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
