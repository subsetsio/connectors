# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-nba-elo-nbaallelo`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [game_id, date_game, notes, team_id, opp_id]
checks:
  - kind: unique
    columns: [game_id, date_game, notes, team_id, opp_id]
  - kind: not_null
    col: game_id
  - kind: not_null
    col: date_game
  - kind: not_null
    col: notes
  - kind: not_null
    col: team_id
  - kind: not_null
    col: opp_id
  - kind: row_floor
    min: 63157
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
