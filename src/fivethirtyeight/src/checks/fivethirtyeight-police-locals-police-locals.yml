# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-police-locals-police-locals`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [city, black, hispanic, asian]
checks:
  - kind: unique
    columns: [city, black, hispanic, asian]
  - kind: not_null
    col: city
  - kind: not_null
    col: black
  - kind: not_null
    col: hispanic
  - kind: not_null
    col: asian
  - kind: row_floor
    min: 37
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
