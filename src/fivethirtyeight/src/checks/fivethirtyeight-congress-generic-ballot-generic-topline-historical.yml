# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-congress-generic-ballot-generic-topline-historical`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [modeldate]
checks:
  - kind: unique
    columns: [modeldate]
  - kind: not_null
    col: modeldate
  - kind: row_floor
    min: 3834
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
