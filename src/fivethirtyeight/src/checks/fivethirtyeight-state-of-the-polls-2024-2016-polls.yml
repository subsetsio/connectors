# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-state-of-the-polls-2024-2016-polls`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [pollster_name, sponsor_names, start_date, end_date, state]
checks:
  - kind: unique
    columns: [pollster_name, sponsor_names, start_date, end_date, state]
  - kind: not_null
    col: pollster_name
  - kind: not_null
    col: sponsor_names
  - kind: not_null
    col: start_date
  - kind: not_null
    col: end_date
  - kind: not_null
    col: state
  - kind: row_floor
    min: 1338
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
