# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-forecast-methodology-historical-senate-predictions`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [candidate, state, year, result]
temporal: year
checks:
  - kind: unique
    columns: [candidate, state, year, result]
  - kind: not_null
    col: candidate
  - kind: not_null
    col: state
  - kind: not_null
    col: year
  - kind: not_null
    col: result
  - kind: row_floor
    min: 103
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
