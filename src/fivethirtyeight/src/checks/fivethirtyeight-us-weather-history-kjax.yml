# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-us-weather-history-kjax`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [date, record_min_temp_year, record_max_temp_year]
checks:
  - kind: unique
    columns: [date, record_min_temp_year, record_max_temp_year]
  - kind: not_null
    col: date
  - kind: not_null
    col: record_min_temp_year
  - kind: not_null
    col: record_max_temp_year
  - kind: row_floor
    min: 182
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
