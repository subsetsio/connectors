# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-the-big-lies-long-shadow-bills`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [bill, state, category, status, introducing_party]
checks:
  - kind: unique
    columns: [bill, state, category, status, introducing_party]
  - kind: not_null
    col: bill
  - kind: not_null
    col: state
  - kind: not_null
    col: category
  - kind: not_null
    col: status
  - kind: not_null
    col: introducing_party
  - kind: row_floor
    min: 289
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
