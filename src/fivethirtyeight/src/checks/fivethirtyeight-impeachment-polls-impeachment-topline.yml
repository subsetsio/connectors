# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-impeachment-polls-impeachment-topline`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [modeldate, party, category_group]
checks:
  - kind: unique
    columns: [modeldate, party, category_group]
  - kind: not_null
    col: modeldate
  - kind: not_null
    col: party
  - kind: not_null
    col: category_group
  - kind: row_floor
    min: 3854
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
