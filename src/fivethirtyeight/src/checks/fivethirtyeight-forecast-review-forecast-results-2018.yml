# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-forecast-review-forecast-results-2018`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [race, category, branch, version]
checks:
  - kind: unique
    columns: [race, category, branch, version]
  - kind: not_null
    col: race
  - kind: not_null
    col: category
  - kind: not_null
    col: branch
  - kind: not_null
    col: version
  - kind: row_floor
    min: 759
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
