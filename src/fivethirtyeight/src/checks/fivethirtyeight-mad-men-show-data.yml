# compiled by `hardened compile-checks` — post-publish audit of `fivethirtyeight-mad-men-show-data`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [performer, support_notes, show_notes, score_y, lead_notes]
checks:
  - kind: unique
    columns: [performer, support_notes, show_notes, score_y, lead_notes]
  - kind: not_null
    col: performer
  - kind: not_null
    col: support_notes
  - kind: not_null
    col: show_notes
  - kind: not_null
    col: score_y
  - kind: not_null
    col: lead_notes
  - kind: row_floor
    min: 124
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
