tests:
  - row_count: {min: 1}
    reason: a rank-accepted flagship dataset always returns at least one series-observation; empty raw means the dataset id is wrong or the series endpoint changed.
    certainty: 90
    points_outward: true
  - not_null: provider_code
    reason: every flattened observation row is stamped with its DBnomics provider code.
    certainty: 97
