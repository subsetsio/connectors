# compiled by `hardened compile-checks` — post-publish audit of `socialstyrelsen-graviditeterforlossningarochnyfodda`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [source_file, matt, ar, region, variabel, paritet, alder]
temporal: fetched_at
checks:
  - kind: unique
    columns: [source_file, matt, ar, region, variabel, paritet, alder]
  - kind: not_null
    col: source_file
  - kind: not_null
    col: matt
  - kind: not_null
    col: ar
  - kind: not_null
    col: region
  - kind: not_null
    col: variabel
  - kind: not_null
    col: paritet
  - kind: not_null
    col: alder
  - kind: row_floor
    min: 670404
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
