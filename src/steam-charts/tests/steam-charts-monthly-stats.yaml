spec_id: steam-charts-monthly-stats
status: active
tests:
  - not_null: app_id
    reason: every monthly row is attached to one Steam app id
    certainty: 95
  - not_null: period_label
    reason: the source monthly table labels each row by month or Last 30 Days
    certainty: 95
  - column_type: {col: app_id, type: integer}
    certainty: 95
  - column_type: {col: avg_players, type: float}
    certainty: 90
  - column_type: {col: peak_players, type: integer}
    certainty: 90
  - unique: [app_id, period_label]
    reason: each app page has at most one row per displayed period
    certainty: 85
  - row_count: {min: 1000}
    reason: crawling the ranked app catalog should produce thousands of monthly rows
    certainty: 75
  - distinct_count: {col: app_id, min: 100}
    reason: healthy app-page crawling should reach well beyond a handful of games
    certainty: 85
  - freshness: {col: fetched_at, reaches: today - 7d}
    reason: this full-corpus scrape is a live refresh
    certainty: 90
    points_outward: true
