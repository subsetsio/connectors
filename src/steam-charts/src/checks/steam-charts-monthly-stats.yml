# compiled by `hardened compile-checks` — post-publish audit of `steam-charts-monthly-stats`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [fetched_at, app_name, app_id, period_label]
temporal: fetched_at
checks:
  - kind: unique
    columns: [fetched_at, app_name, app_id, period_label]
  - kind: not_null
    col: fetched_at
  - kind: not_null
    col: app_name
  - kind: not_null
    col: app_id
  - kind: not_null
    col: period_label
  - kind: row_floor
    min: 326367
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
