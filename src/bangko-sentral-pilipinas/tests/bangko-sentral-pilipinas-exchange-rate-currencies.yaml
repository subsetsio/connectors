spec_id: bangko-sentral-pilipinas-exchange-rate-currencies
status: active
tests:
  - row_count:
      min: 1
    reason: fetch_exchange_rate raises AssertionError if the SharePoint Exchange Rate list returns no rows
    certainty: 95
  - not_null: currency
    reason: rows whose Title (currency) is missing are skipped, so currency is always present in the raw asset
    certainty: 95
  - unique: currency
    reason: the Exchange Rate list is a current snapshot with one row per currency; duplicate currencies would mean the list was paginated wrong or re-appended
    certainty: 70
    severity: warn
  - distinct_count:
      col: currency
      min: 10
    reason: BSP quotes the peso against several dozen currencies; far fewer distinct currencies would indicate a truncated pull
    certainty: 75
