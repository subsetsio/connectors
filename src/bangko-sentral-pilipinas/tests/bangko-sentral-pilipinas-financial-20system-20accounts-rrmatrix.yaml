spec_id: bangko-sentral-pilipinas-financial-20system-20accounts-rrmatrix
status: active
tests:
  - row_count:
      min: 1
    reason: the fetch fn raises AssertionError if the workbook melts to 0 numeric rows, so a successfully written raw asset always carries at least one observation
    certainty: 95
  - not_null: value
    reason: the melt only emits a row when the cell coerces to a real number via _as_number; null/non-numeric/placeholder cells (-, .., n.a.) are dropped at parse time
    certainty: 95
  - column_type:
      col: value
      type: float
    reason: value is produced by _as_number which always returns a python float
    certainty: 90
  - not_null: row_label
    reason: melt skips any row whose stub-label cells are all empty, so every emitted row carries a non-empty row_label
    certainty: 90
  - not_null: sheet
    reason: every melted row is tagged with the source worksheet name it came from
    certainty: 90
  - not_null: column_header
    reason: _col_header falls back to colN when header cells are blank, so column_header is never null
    certainty: 85
  - column_type:
      col: row_index
      type: integer
    reason: row_index is the integer grid row position assigned during melt
    certainty: 85
