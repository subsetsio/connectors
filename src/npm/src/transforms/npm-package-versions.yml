# migrated from the module TRANSFORM_SPECS snapshot (scripts/migrate_transforms.py)
key: [published_at, version, package]
temporal: published_at
sort: [published_at, package, version]
columns:
  - name: package
    type: VARCHAR
    description: npm package name.
  - name: version
    type: VARCHAR
    description: Published package version.
  - name: published_at
    type: TIMESTAMP
    description: Timestamp when this package version was published.
  - name: deprecated
    type: BOOLEAN
    description: Whether this version is marked deprecated.
  - name: deprecation_message
    type: VARCHAR
    description: Deprecation message supplied by the package, when present.
  - name: dependencies_count
    type: INTEGER
    description: Number of runtime dependencies declared by this version.
  - name: dev_dependencies_count
    type: INTEGER
    description: Number of development dependencies declared by this version.
  - name: unpacked_size_bytes
    type: BIGINT
    description: Unpacked package size in bytes, when reported by the registry.
