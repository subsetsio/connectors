# Hand-curated from the compiled pass-through: the source's category column names run
# up to 83 characters, so they are renamed to standard Census short forms here and the
# full label moved into each column's description (rendered next to the schema).
# caution: Wide 2010 Census (PL 94-171) redistricting cross-tab: one row per congressional_district, and every other column is a population count for a race/Hispanic-origin category, optionally narrowed to not-Hispanic (`_not_hispanic`) and/or to adults (`_18plus`). The count columns are overlapping subtotals, not a partition: `total_population_2010` equals the six `*_alone_2010` race columns plus `two_or_more_races_2010`, and separately equals `hispanic_any_race_2010` plus `not_hispanic_2010` (verified on the data). Hispanic origin is collected separately from race, so Hispanic residents also appear inside the race columns. Summing across columns counts the same people two or three times - pick the single column matching the category you want.
key: [congressional_district]
sort: [congressional_district]
columns:
  - name: entity_id
    type: VARCHAR
    description: "connector entity id for this Socrata dataset."
  - name: source_type
    type: VARCHAR
    description: "provenance marker; constant 'socrata'."
  - name: socrata_dataset_id
    type: VARCHAR
    description: "data.wa.gov dataset id this row came from."
  - name: congressional_district
    type: VARCHAR
    description: "Washington congressional district code, zero-padded."
  - name: total_population_2010
    type: BIGINT
    description: "Total population: 2010 Census count."
  - name: one_race_2010
    type: BIGINT
    description: "Population of one race: 2010 Census count."
  - name: white_alone_2010
    type: BIGINT
    description: "White alone: 2010 Census count."
  - name: black_alone_2010
    type: BIGINT
    description: "Black or African American alone: 2010 Census count."
  - name: aian_alone_2010
    type: BIGINT
    description: "American Indian and Alaska Native alone: 2010 Census count."
  - name: asian_alone_2010
    type: BIGINT
    description: "Asian alone: 2010 Census count."
  - name: nhpi_alone_2010
    type: BIGINT
    description: "Native Hawaiian and Other Pacific Islander alone: 2010 Census count."
  - name: other_race_alone_2010
    type: BIGINT
    description: "Some other race alone: 2010 Census count."
  - name: two_or_more_races_2010
    type: BIGINT
    description: "Population of two or more races: 2010 Census count."
  - name: hispanic_any_race_2010
    type: BIGINT
    description: "Hispanic or Latino of any race: 2010 Census count."
  - name: not_hispanic_2010
    type: BIGINT
    description: "Not Hispanic or Latino: 2010 Census count."
  - name: one_race_not_hispanic_2010
    type: BIGINT
    description: "Population of one race, not Hispanic or Latino: 2010 Census count."
  - name: white_alone_not_hispanic_2010
