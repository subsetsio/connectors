  - name: other_race_alone_not_hispanic_2010
    type: BIGINT
    description: "Some other race alone, not Hispanic or Latino: 2010 Census count."
  - name: two_or_more_races_not_hispanic_2010
    type: BIGINT
    description: "Population of two or more races, not Hispanic or Latino: 2010 Census count."
  - name: total_population_18plus_2010
    type: BIGINT
