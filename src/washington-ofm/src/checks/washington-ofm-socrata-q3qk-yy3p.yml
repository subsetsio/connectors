    columns: [measure_result, organization_zip, name, organization_city, measure_description]
  - kind: not_null
    col: measure_result
  - kind: not_null
    col: organization_zip
  - kind: not_null
    col: name
  - kind: not_null
    col: organization_city
  - kind: not_null
    col: measure_description
