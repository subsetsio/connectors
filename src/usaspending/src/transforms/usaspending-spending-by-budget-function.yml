key: [fiscal_year, budget_function_name]
temporal: fiscal_year
sort: [fiscal_year, budget_function_name]
columns:
  - name: fiscal_year
    type: BIGINT
    description: Federal fiscal year for the annual aggregate.
  - name: budget_function_code
    type: VARCHAR
    description: Budget function code, when reported by the source.
  - name: budget_function_name
    type: VARCHAR
    description: Budget function name.
  - name: total_obligations
    type: DOUBLE
    description: Total obligations for the budget function and fiscal year, in US dollars.
