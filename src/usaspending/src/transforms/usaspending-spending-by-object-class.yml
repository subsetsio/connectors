key: [fiscal_year, object_class_name]
temporal: fiscal_year
sort: [fiscal_year, object_class_name]
columns:
  - name: fiscal_year
    type: BIGINT
    description: Federal fiscal year for the annual aggregate.
  - name: object_class_code
    type: VARCHAR
    description: Object class code, when reported by the source.
  - name: object_class_name
    type: VARCHAR
    description: Object class name describing the nature of the spending.
  - name: total_obligations
    type: DOUBLE
    description: Total obligations for the object class and fiscal year, in US dollars.
