# compiled by `hardened compile-checks` — post-publish audit of `nifc-ebcd309a37844cecb0f68d7c7530ed88-17`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [id, globalid, type, category, subtype]
checks:
  - kind: unique
    columns: [id, globalid, type, category, subtype]
  - kind: not_null
    col: id
  - kind: not_null
    col: globalid
  - kind: not_null
    col: type
  - kind: not_null
    col: category
  - kind: not_null
    col: subtype
  - kind: row_floor
    min: 50
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
