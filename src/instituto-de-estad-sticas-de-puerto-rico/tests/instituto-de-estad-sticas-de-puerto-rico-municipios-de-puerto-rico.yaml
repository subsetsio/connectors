spec_id: instituto-de-estad-sticas-de-puerto-rico-municipios-de-puerto-rico
status: active
coverage: {frozen: true, reason: "Municipal boundary table is a reference snapshot; date_date is source geometry/version date rather than a live freshness axis."}
tests:
  - not_null: source_resource
    reason: every extracted row is tagged by construction with its originating CKAN resource; a null means the extractor failed to record provenance.
    certainty: 99
  - not_null: source_file
    reason: every extracted row records the file it came from (resource filename, zip member, or excel sheet); null means provenance tagging broke.
    certainty: 99
  - row_count:
      min: 1
    reason: a published Datos.PR package must yield at least one tabular row from its dominant-schema resource group; zero rows means extraction silently failed or all resources are non-tabular.
    certainty: 80
