# compiled by `hardened compile-checks` — post-publish audit of `instituto-de-estad-sticas-de-puerto-rico-encuesta-de-consumo-de-alimentos-de-establecimientos-de-comida-rapida`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [seqno, x_psu, x_llcpwt, orgseqno, cati_rn]
checks:
  - kind: unique
    columns: [seqno, x_psu, x_llcpwt, orgseqno, cati_rn]
  - kind: not_null
    col: seqno
  - kind: not_null
    col: x_psu
  - kind: not_null
    col: x_llcpwt
  - kind: not_null
    col: orgseqno
  - kind: not_null
    col: cati_rn
  - kind: row_floor
    min: 3975
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
