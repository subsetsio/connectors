# compiled by `hardened compile-checks` — post-publish audit of `instituto-de-estad-sticas-de-puerto-rico-mapa-de-rutas-de-porteadores-publicos`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [the_geom, rumbo, nombre]
checks:
  - kind: unique
    columns: [the_geom, rumbo, nombre]
  - kind: not_null
    col: the_geom
  - kind: not_null
    col: rumbo
  - kind: not_null
    col: nombre
  - kind: row_floor
    min: 180
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
