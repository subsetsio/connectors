# compiled by `hardened compile-checks` — post-publish audit of `instituto-de-estad-sticas-de-puerto-rico-factores-de-riesgo-del-comportamiento`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [seqno, psu, bmi4, repnum, itsfinl]
checks:
  - kind: unique
    columns: [seqno, psu, bmi4, repnum, itsfinl]
  - kind: not_null
    col: seqno
  - kind: not_null
    col: psu
  - kind: not_null
    col: bmi4
  - kind: not_null
    col: repnum
  - kind: not_null
    col: itsfinl
  - kind: row_floor
    min: 2120
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
