# compiled by `hardened compile-checks` — post-publish audit of `instituto-de-estad-sticas-de-puerto-rico-br`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [biennial_report_link, address, handler_name, handler_id, zip_code]
checks:
  - kind: unique
    columns: [biennial_report_link, address, handler_name, handler_id, zip_code]
  - kind: not_null
    col: biennial_report_link
  - kind: not_null
    col: address
  - kind: not_null
    col: handler_name
  - kind: not_null
    col: handler_id
  - kind: not_null
    col: zip_code
  - kind: row_floor
    min: 366
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
