# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-cis51`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [chodnota, kodobce, text, zkrtext, porczuj]
temporal: admplod
checks:
  - kind: unique
    columns: [chodnota, kodobce, text, zkrtext, porczuj]
  - kind: not_null
    col: chodnota
  - kind: not_null
    col: kodobce
  - kind: not_null
    col: text
  - kind: not_null
    col: zkrtext
  - kind: not_null
    col: porczuj
  - kind: row_floor
    min: 3196
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
