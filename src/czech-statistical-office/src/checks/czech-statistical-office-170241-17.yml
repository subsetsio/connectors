# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-170241-17`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [zsjd_txt, idhod, zsjd_kod, obec_txt, obec_kod]
temporal: datum
checks:
  - kind: unique
    columns: [zsjd_txt, idhod, zsjd_kod, obec_txt, obec_kod]
  - kind: not_null
    col: zsjd_txt
  - kind: not_null
    col: idhod
  - kind: not_null
    col: zsjd_kod
  - kind: not_null
    col: obec_txt
  - kind: not_null
    col: obec_kod
  - kind: row_floor
    min: 10871
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
