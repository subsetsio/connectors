# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-se2022secobv`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obvod, okres, nazev_obv, prvni_vo]
checks:
  - kind: unique
    columns: [obvod, okres, nazev_obv, prvni_vo]
  - kind: not_null
    col: obvod
  - kind: not_null
    col: okres
  - kind: not_null
    col: nazev_obv
  - kind: not_null
    col: prvni_vo
  - kind: row_floor
    min: 40
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
