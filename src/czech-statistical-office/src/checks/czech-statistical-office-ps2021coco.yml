# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-ps2021coco`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [obec, obec_prez, nazevobce, cpou, maxokrsek1]
checks:
  - kind: unique
    columns: [obec, obec_prez, nazevobce, cpou, maxokrsek1]
  - kind: not_null
    col: obec
  - kind: not_null
    col: obec_prez
  - kind: not_null
    col: nazevobce
  - kind: not_null
    col: cpou
  - kind: not_null
    col: maxokrsek1
  - kind: row_floor
    min: 3194
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
