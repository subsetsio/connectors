# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-sldb2021-vyjizdka-pracoviste-cil-pohlavi`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [idhod, hodnota, bydliste_kod, bydliste_txt, bydliste_typ]
temporal: sldb_datum
checks:
  - kind: unique
    columns: [idhod, hodnota, bydliste_kod, bydliste_txt, bydliste_typ]
  - kind: not_null
    col: idhod
  - kind: not_null
    col: hodnota
  - kind: not_null
    col: bydliste_kod
  - kind: not_null
    col: bydliste_txt
  - kind: not_null
    col: bydliste_typ
  - kind: row_floor
    min: 150224
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
