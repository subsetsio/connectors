# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-270248`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [idhod, hodnota, alttext_cz, key, alttext_en]
temporal: datum
checks:
  - kind: unique
    columns: [idhod, hodnota, alttext_cz, key, alttext_en]
  - kind: not_null
    col: idhod
  - kind: not_null
    col: hodnota
  - kind: not_null
    col: alttext_cz
  - kind: not_null
    col: key
  - kind: not_null
    col: alttext_en
  - kind: row_floor
    min: 1652
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
