# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-cis60`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [chodnota, zkrtext, text, admplod, porccob]
temporal: admplod
checks:
  - kind: unique
    columns: [chodnota, zkrtext, text, admplod, porccob]
  - kind: not_null
    col: chodnota
  - kind: not_null
    col: zkrtext
  - kind: not_null
    col: text
  - kind: not_null
    col: admplod
  - kind: not_null
    col: porccob
  - kind: row_floor
    min: 7584
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
