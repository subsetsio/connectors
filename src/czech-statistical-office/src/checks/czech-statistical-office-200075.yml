# compiled by `hardened compile-checks` — post-publish audit of `czech-statistical-office-200075`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [idhod, hodnota, mesic, rok, rokz]
checks:
  - kind: unique
    columns: [idhod, hodnota, mesic, rok, rokz]
  - kind: not_null
    col: idhod
  - kind: not_null
    col: hodnota
  - kind: not_null
    col: mesic
  - kind: not_null
    col: rok
  - kind: not_null
    col: rokz
  - kind: row_floor
    min: 864
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
