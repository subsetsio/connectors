# compiled by `hardened compile-checks` — post-publish audit of `banco-de-la-rep-blica-df-tes-monthly-hist`.
# Grain/temporal from the transform contract, row floor from the measured
# profile. Regenerate after model-verify or a transform contract change.
# Not compiled (deliberate): enums (await an authored closed domain),
# absolute freshness (awaits the maintenance contract).
key: [reference_area, subject, freq, unit_measure, adjustment, time_period]
temporal: time_period
checks:
  - kind: unique
    columns: [reference_area, subject, freq, unit_measure, adjustment, time_period]
  - kind: not_null
    col: reference_area
  - kind: not_null
    col: subject
  - kind: not_null
    col: freq
  - kind: not_null
    col: unit_measure
  - kind: not_null
    col: adjustment
  - kind: not_null
    col: time_period
  - kind: row_floor
    min: 421
regression:
  row_shrink_tolerance: 0.1
  key_shrink_tolerance: 0.1
  temporal_monotonic: true
