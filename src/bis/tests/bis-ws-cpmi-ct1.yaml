spec_id: bis-ws-cpmi-ct1
status: active
tests:
  - not_null: dataflow
    certainty: 99
    reason: every row is stamped with the topic's dataflow id at fetch time
  - enum: {col: dataflow, values: ["WS_CPMI_CT1"]}
    certainty: 99
    reason: this node fetches exactly the WS_CPMI_CT1 bulk file, so dataflow is constant
  - distinct_count: {col: dataflow, min: 1, max: 1}
    certainty: 99
    reason: a single-topic snapshot carries exactly one dataflow id
  - not_null: series_key
    certainty: 90
    reason: series_key is the dot-joined SDMX dimension codes, present on every observation
  - not_null: time_period
    certainty: 95
    reason: observation rows always carry TIME_PERIOD; metadata-only rows are dropped at fetch
  - column_type: {col: time_period, type: string}
    certainty: 95
    reason: time_period keeps the canonical SDMX period string (mixed D/M/Q/S/A granularity)
  - not_null: period_start
    certainty: 95
    reason: period_start is derived from TIME_PERIOD at fetch; an unparsable period raises instead of nulling
  - column_type: {col: period_start, type: date}
    certainty: 95
    reason: period_start is written as date32 - the first calendar day of the observation period
  - column_type: {col: obs_value, type: float}
    certainty: 95
    reason: OBS_VALUE is parsed to float64 at fetch; non-numeric and NaN cells become null
  - row_count: {min: 30000}
    certainty: 80
    reason: WS_CPMI_CT1 held roughly 60,000 observation rows when probed; half that means a truncated download
  - unique: [series_key, time_period]
    certainty: 80
    reason: one observation per series per period in a full snapshot; duplicates mean the bulk file was double-counted on our side
  - enum: {col: freq, values: ['A']}
    certainty: 85
    severity: warn
    reason: WS_CPMI_CT1 is published at a single frequency; a new code means the topic gained a series we do not map
  - freshness: {col: period_start, reaches: today - 1100d}
    certainty: 75
    points_outward: true
    reason: CPMI Red Book, annual with a ~1 year publication lag
